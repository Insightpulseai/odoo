# Databricks Asset Bundle: SQL Warehouse
# Purpose: SQL-first Gold/Platinum marts, serving views, dashboard-supporting assets
# Spec: spec/databricks-bundles-foundation/

bundle:
  name: sql_warehouse

include:
  - ../../shared/*.yml
  - resources/**/*.yml

sync:
  paths:
    - src

variables:
  catalog:
    default: ${var.catalog}
  gold_schema:
    default: ${var.gold_schema}
  warehouse_id:
    default: ${var.warehouse_id}

targets:
  dev:
    default: true
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: ipai_dev

  staging:
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: ipai_staging

  prod:
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: ipai
