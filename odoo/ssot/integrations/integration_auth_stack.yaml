# schema: ssot.integrations.auth_stack.v1
# =============================================================================
# Integration Auth Stack — Unified SSOT
# =============================================================================
# DNS-derived truth + auth/credential configuration for all platform services.
# DNS source: infra/dns/subdomain-registry.yaml
# CI validator: .github/workflows/integration-auth-guard.yml
#
# This file answers: "Which services exist, what are their URLs, and what
# auth/credential wiring do they need?"
#
# Last updated: 2026-03-08
# =============================================================================

schema_version: "1.0"
updated: "2026-03-08"
source_dns: infra/dns/subdomain-registry.yaml

# =============================================================================
# Domain & DNS Layer (derived from subdomain-registry.yaml)
# =============================================================================
domains:
  primary_domain: insightpulseai.com
  origin_ip: 178.128.112.214
  dns_provider: cloudflare
  nameservers:
    - edna.ns.cloudflare.com
    - keanu.ns.cloudflare.com
  tls_mode: "Full (strict)"

# =============================================================================
# Mail Layer
# =============================================================================
mail:
  inbound:
    provider: zoho
    domain: insightpulseai.com
    mx_records:
      - { priority: 10, server: mx.zoho.com }
      - { priority: 20, server: mx2.zoho.com }
      - { priority: 50, server: mx3.zoho.com }
    spf: "v=spf1 include:zohomail.com ~all"
    dkim_selector: zoho._domainkey
    dmarc: quarantine
    smtp_host: smtppro.zoho.com
    smtp_port: 587
    smtp_tls: starttls

  transactional:
    provider: mailgun
    domain: mg.insightpulseai.com
    sender: "no-reply@mg.insightpulseai.com"
    smtp_host: smtp.mailgun.org
    smtp_port: 2525
    smtp_tls: starttls
    spf: "v=spf1 include:mailgun.org ~all"
    dkim_selector: mx._domainkey.mg
    dmarc: monitoring
    env_vars:
      - MAILGUN_API_KEY         # Supabase Vault / .env
      - MAILGUN_SMTP_PASSWORD   # Supabase Vault / .env

# =============================================================================
# System Base URLs (active services only)
# =============================================================================
systems:
  # --- Odoo ERP (System of Record) ---
  odoo:
    url: https://erp.insightpulseai.com
    port: 8069
    health_check: /web/login
    service: odoo_ce_19
    auth_type: session_cookie
    auth_status: configured
    env_vars: []
    notes: "Primary SoR. Session auth via /web/login. No external OAuth needed."

  # --- Plane (System of Work) ---
  plane:
    url: https://plane.insightpulseai.com
    port: 3002
    health_check: /
    service: plane_project_management
    auth_type: api_key
    auth_status: needs_validation
    env_vars:
      - PLANE_API_KEY           # PAT for API access
      - PLANE_WORKSPACE_SLUG    # default: fin-ops
    oauth:
      status: not_configured
      callback_url: https://plane.insightpulseai.com/auth/callback
      notes: "OAuth app registration not yet done. Uses PAT auth for now."

  # --- Shelf.nu (Asset Management) ---
  shelf:
    url: https://shelf.insightpulseai.com
    port: 3003
    health_check: /healthcheck
    service: shelf_asset_management
    auth_type: supabase_auth
    auth_status: needs_validation
    env_vars:
      - SHELF_SUPABASE_URL
      - SHELF_SUPABASE_ANON_KEY
      - SHELF_SUPABASE_SERVICE_ROLE_KEY
    notes: "Supabase-backed auth. Redirect URLs need validation in Supabase dashboard."

  # --- Atomic CRM ---
  crm:
    url: https://crm.insightpulseai.com
    port: 3004
    health_check: /
    service: atomic_crm
    auth_type: supabase_auth
    auth_status: needs_validation
    env_vars:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
    notes: "React/Vite SPA. Supabase project spdtwktxdalcfigzeqrz."

  # --- n8n (Automation) ---
  n8n:
    url: https://n8n.insightpulseai.com
    port: 5678
    health_check: /healthz
    service: n8n_workflow_automation
    auth_type: basic_auth
    auth_status: configured
    env_vars:
      - N8N_BASIC_AUTH_USER
      - N8N_BASIC_AUTH_PASSWORD
    webhook_policy:
      status: needs_validation
      notes: "Webhook endpoints are public. No HMAC signature verification configured."

  # --- MCP Hub Coordinator ---
  mcp:
    url: https://mcp.insightpulseai.com
    port: 8766
    health_check: /healthz
    service: mcp_gateway
    auth_type: bearer_token
    auth_status: needs_validation
    env_vars:
      - MCP_AUTH_TOKEN
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
    notes: "MCP coordinator on droplet. Audit trail via ops.run_events in Supabase."

  # --- Auth Service ---
  auth:
    url: https://auth.insightpulseai.com
    port: 8080
    health_check: /
    service: authentication_service
    auth_type: oidc
    auth_status: broken
    oidc:
      discovery: "/.well-known/openid-configuration"
      status: not_implemented
      idp: supabase
      notes: "Express container healthy but OIDC discovery not implemented. No nginx vhost routing."
    env_vars:
      - SUPABASE_AUTH_URL
      - SUPABASE_AUTH_SITE_URL
      - SUPABASE_AUTH_REDIRECT_URLS

  # --- Apache Superset (BI) ---
  superset:
    url: https://superset.insightpulseai.com
    port: 8088
    health_check: /health
    service: apache_superset_bi
    auth_type: local_db
    auth_status: configured
    env_vars:
      - SUPERSET_SECRET_KEY
    notes: "DO managed PostgreSQL backend (odoo-db-sgp1/superset)."

  # --- PaddleOCR ---
  ocr:
    url: https://ocr.insightpulseai.com
    port: 8001
    health_check: /health
    service: paddleocr_microservice
    auth_type: none
    auth_status: configured
    env_vars: []
    notes: "No auth. Internal microservice exposed via Cloudflare proxy."

  # --- OdooOps Console (Vercel) ---
  ops:
    url: https://ops.insightpulseai.com
    port: 443
    health_check: /api/health
    service: ops_console_vercel
    auth_type: supabase_auth
    auth_status: needs_validation
    env_vars:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
    notes: "Next.js on Vercel. CNAME to cname.vercel-dns.com."

  # --- DO AI Agent ---
  agent:
    url: https://agent.insightpulseai.com
    port: 443
    health_check: /
    service: do_ai_agent
    auth_type: platform_managed
    auth_status: configured
    env_vars: []
    notes: "CNAME to DO AI Agents platform. Auth managed by DigitalOcean."

# =============================================================================
# Supabase Auth Configuration (IdP for multiple services)
# =============================================================================
supabase_auth:
  project_ref: spdtwktxdalcfigzeqrz
  role: identity_provider
  status: needs_validation
  config:
    site_url:
      expected: https://erp.insightpulseai.com
      status: needs_validation
    redirect_urls:
      expected:
        - https://erp.insightpulseai.com/**
        - https://shelf.insightpulseai.com/**
        - https://crm.insightpulseai.com/**
        - https://ops.insightpulseai.com/**
        - https://auth.insightpulseai.com/**
      status: needs_validation
    smtp:
      provider: mailgun
      host: smtp.mailgun.org
      port: 2525
      sender: "no-reply@mg.insightpulseai.com"
      env_vars:
        - SUPABASE_SMTP_USER      # postmaster@mg.insightpulseai.com
        - SUPABASE_SMTP_PASSWORD   # Mailgun SMTP password
      status: needs_validation
  notes: >
    Supabase Auth is IdP for Shelf, CRM, Ops Console.
    Odoo uses session auth (relying party model).
    SMTP credentials for email verification/reset need Mailgun config.

# =============================================================================
# Auth Status Summary
# =============================================================================
# configured        = Auth works, credentials set
# needs_validation  = Config exists but not verified end-to-end
# not_configured    = Auth mechanism not set up
# broken            = Known non-functional (e.g., auth service OIDC)
#
# Priority to fix:
#   P0: auth (OIDC broken), supabase_auth (redirect URLs)
#   P1: plane (OAuth), shelf (Supabase redirect), crm (Supabase redirect)
#   P2: mcp (bearer token), n8n (webhook HMAC)
#   P3: ops (Supabase redirect)
# =============================================================================

validation_checklist:
  - id: supabase_site_url
    check: "Supabase Auth SITE_URL matches expected"
    status: pending
    priority: P0

  - id: supabase_redirect_urls
    check: "All redirect URLs registered in Supabase Auth dashboard"
    status: pending
    priority: P0

  - id: supabase_smtp
    check: "Supabase Auth SMTP configured with Mailgun credentials"
    status: pending
    priority: P0

  - id: auth_oidc_discovery
    check: "auth.insightpulseai.com serves /.well-known/openid-configuration"
    status: failing
    priority: P0

  - id: plane_oauth
    check: "Plane OAuth app registered with correct callback URL"
    status: pending
    priority: P1

  - id: shelf_supabase_auth
    check: "Shelf redirect URLs in Supabase Auth config"
    status: pending
    priority: P1

  - id: crm_supabase_auth
    check: "CRM redirect URLs in Supabase Auth config"
    status: pending
    priority: P1

  - id: mcp_bearer_token
    check: "MCP coordinator auth token configured"
    status: pending
    priority: P2

  - id: n8n_webhook_hmac
    check: "n8n webhook endpoints use HMAC signature verification"
    status: pending
    priority: P2

  - id: ops_supabase_auth
    check: "Ops Console redirect URLs in Supabase Auth config"
    status: pending
    priority: P3
