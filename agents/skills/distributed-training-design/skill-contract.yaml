version: 1
name: distributed-training-design
description: "Design multi-GPU/multi-node training strategies with parallelism selection and memory optimization"
type: benchmark_skill
skill_classification: capability_uplift
owner_persona: distributed-training-engineer
source_family: hf_smol_training_playbook
status: active

triggers:
  - "multi-GPU training"
  - "distributed training"
  - "training doesn't fit in memory"
  - "scale training across nodes"

inputs:
  - model_size: "Model parameter count"
  - available_hardware: "GPU types, count, memory per GPU"
  - training_recipe: "From pretraining/fine-tuning skill"
  - latency_budget: "Acceptable training time"

steps:
  - id: memory_analysis
    action: "Estimate memory requirements (model + optimizer + gradients + activations)"
  - id: fit_check
    action: "Does model fit on single GPU? If yes, single GPU. If not, choose parallelism."
  - id: parallelism_selection
    action: "Choose: data parallel, tensor parallel, pipeline parallel, or FSDP"
  - id: optimization
    action: "Apply: mixed precision, gradient checkpointing, CPU offloading as needed"
  - id: validate
    action: "Run small-scale test to verify configuration"

outputs:
  - strategy: "Parallelism method and configuration"
  - optimizations: "Memory optimizations applied"
  - hardware_config: "GPU allocation and topology"
  - estimated_throughput: "Expected tokens/second or samples/second"

guardrails:
  - "Start with single GPU if it fits — don't distribute unnecessarily"
  - "Mixed precision (bf16/fp16) should be default unless precision-sensitive"
  - "Gradient checkpointing trades compute for memory — use when memory-bound"
  - "Test at small scale before full training run"

benchmark_source: "https://huggingface.co/docs/transformers/accelerate"
