version: 1
type: foundry_skill
family: foundry_model_tool_runtime
skill:
  name: foundry-model-selection
  status: draft
  owner: agents
  purpose: >
    Shortlist models for a concrete workload using Foundry leaderboard dimensions
    and scenario-specific requirements. Produces a ranked candidate set with
    rationale by quality, safety, cost, and throughput.

  triggers:
    - new agent design requiring model selection
    - model review for existing agent
    - workload change affecting model requirements
    - cost optimization initiative

  inputs:
    - workload description (latency SLA, throughput needs, task type)
    - cost budget or constraints
    - safety requirements (content filtering, jailbreak resistance)
    - current model assignment (if reviewing existing)

  steps:
    - identify workload requirements (latency, throughput, cost budget, safety needs)
    - query Foundry leaderboard across all four dimensions
    - rank candidates by workload-specific fit
    - document rejected models with reasons for exclusion
    - recommend top candidates with per-dimension rationale
    - verify safety dimension is covered for all candidates
    - document cost implications for each candidate

  outputs:
    - ranked_candidate_set
    - per_dimension_rationale
    - rejected_models_with_reasons
    - cost_implications
    - safety_assessment

  guardrails:
    - no hardcoded "best model everywhere" — selection must be workload-specific
    - must include safety dimension in every evaluation
    - must document cost implications for each candidate
    - must provide rejection rationale for excluded models
    - never approve a model without workload-specific evaluation evidence

  evidence:
    required: true
    format: "docs/evidence/{stamp}/foundry/model-selection/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - agents/knowledge/benchmarks/microsoft-foundry-models-and-tools.md
  - agents/personas/foundry-model-governor.md
