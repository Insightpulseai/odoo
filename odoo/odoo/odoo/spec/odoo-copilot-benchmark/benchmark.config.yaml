# Benchmark Scoring Configuration
# Controls weights, thresholds, and targets for the benchmark framework.

benchmark:
  version: "1.0.0"
  name: "Odoo Copilot Benchmark"

scoring:
  # Soft score weights (must sum to 1.0 within each capability class)
  weights:
    transactional:
      completeness: 0.40
      clarity: 0.20
      latency: 0.10
      # remaining 0.30 reserved for hard gates (binary, not weighted)

    navigational:
      completeness: 0.35
      clarity: 0.25
      latency: 0.10

    informational:
      completeness: 0.30
      clarity: 0.25
      latency: 0.10
      # grounding quality absorbed into completeness for informational

  # Latency targets per capability class (milliseconds)
  latency_targets:
    transactional: 10000
    navigational: 3000
    informational: 5000

  # Certification threshold (weighted soft score)
  certification_threshold: 0.70

  # Regression tolerance (delta below which is not flagged)
  regression_tolerance: 0.05

hard_gates:
  # Which hard gates apply per capability class
  transactional:
    - capability
    - correctness
    - permission_check
    - confirmation_required
    - audit_trace

  navigational:
    - capability
    - correctness
    - permission_check

  informational:
    - capability
    - correctness
    - grounding

domains:
  - id: crm
    name: CRM
    odoo_apps: [crm]
    priority: P0

  - id: sales
    name: Sales
    odoo_apps: [sale, sale_management]
    priority: P0

  - id: purchase
    name: Purchase
    odoo_apps: [purchase]
    priority: P1

  - id: accounting
    name: Accounting
    odoo_apps: [account]
    priority: P0

  - id: inventory
    name: Inventory
    odoo_apps: [stock]
    priority: P0

  - id: project-helpdesk
    name: Project / Helpdesk
    odoo_apps: [project, ipai_helpdesk]
    priority: P1

  - id: settings-admin
    name: Settings / Admin
    odoo_apps: [base, base_setup]
    priority: P1

  - id: knowledge-sop
    name: Knowledge / SOP
    odoo_apps: [ipai_ai_rag]
    priority: P2

  - id: documents
    name: Documents
    odoo_apps: [ipai_documents_ai]
    priority: P2

personas:
  - id: sales_rep
    name: Sales Representative
    groups: [sales_team.group_sale_salesman]

  - id: sales_mgr
    name: Sales Manager
    groups: [sales_team.group_sale_manager]

  - id: accountant
    name: Accountant
    groups: [account.group_account_user]

  - id: inv_operator
    name: Inventory Operator
    groups: [stock.group_stock_user]

  - id: project_mgr
    name: Project Manager
    groups: [project.group_project_manager]

  - id: admin
    name: System Administrator
    groups: [base.group_system]

  - id: exec_readonly
    name: Read-Only Executive
    groups: [base.group_user]

evidence:
  output_dir: "docs/evidence/{timestamp}/copilot-benchmark"
  formats:
    - json
    - markdown
