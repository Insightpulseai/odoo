# =============================================================================
# Odoo Container Build + Deploy Pipeline
# =============================================================================
# Builds ipai-odoo:18.0-<tag> image, runs Odoo tests, deploys to ACA,
# publishes test results to the Tests tab, runs smoke test.
#
# Trigger: changes to addons/ipai/, Dockerfile.unified, or config
# Canonical: infra/ci/azure-pipelines-odoo-deploy.yml has full 5-stage version
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - addons/oca/**
      - docker/Dockerfile.unified
      - config/**
      - requirements.txt

pr:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - addons/oca/**
      - docker/Dockerfile.unified
      - config/**

variables:
  - name: acrName
    value: acripaiodoo
  - name: imageName
    value: ipai-odoo
  - name: imageTag
    value: '18.0-$(Build.BuildId)'
  - name: resourceGroup
    value: rg-ipai-dev-odoo-runtime
  - name: containerAppName
    value: ipai-odoo-dev-web
  - name: serviceConnection
    value: ipai-dev-wif

stages:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Build
  # ─────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build Odoo CE 18 Image
    jobs:
      - template: templates/jobs/build-container.yml
        parameters:
          imageName: $(imageName)
          imageTag: $(imageTag)
          dockerfile: docker/Dockerfile.unified
          buildContext: .
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Test — Odoo module tests with result publishing
  # ─────────────────────────────────────────────────────────────────
  - stage: Test
    displayName: Odoo Module Tests
    dependsOn: Build
    jobs:
      - template: templates/jobs/odoo-module-test.yml
        parameters:
          imageName: $(imageName)
          imageTag: $(imageTag)
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)
          resourceGroup: $(resourceGroup)

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Deploy (main only)
  # ─────────────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to ACA
    dependsOn: Test
    condition: |
      and(
        succeeded('Test'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - template: templates/jobs/deploy-containerapp.yml
        parameters:
          containerAppName: $(containerAppName)
          resourceGroup: $(resourceGroup)
          imageName: $(imageName)
          imageTag: $(imageTag)
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Smoke
  # ─────────────────────────────────────────────────────────────────
  - stage: Smoke
    displayName: Post-Deploy Smoke
    dependsOn: Deploy
    condition: succeeded('Deploy')
    jobs:
      - template: templates/jobs/smoke-http.yml
        parameters:
          url: https://erp.insightpulseai.com/web/login
          expectedStatus: '200'
          contentMatch: Odoo

  # ─────────────────────────────────────────────────────────────────
  # Stage 5: Evidence
  # ─────────────────────────────────────────────────────────────────
  - stage: Evidence
    displayName: Publish Evidence
    dependsOn:
      - Build
      - Test
      - Deploy
      - Smoke
    condition: succeededOrFailed()
    jobs:
      - template: templates/jobs/publish-evidence.yml
        parameters:
          surface: $(containerAppName)
          imageRef: $(acrName).azurecr.io/$(imageName):$(imageTag)
          smokeUrl: https://erp.insightpulseai.com/web/login
