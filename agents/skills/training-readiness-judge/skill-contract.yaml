version: 1
name: training-readiness-judge
description: "Decide whether a trained checkpoint is ready to advance from experiment to shared/internal/production"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: training-eval-judge
source_family: hf_smol_training_playbook
status: active

triggers:
  - "promote checkpoint"
  - "training run complete"
  - "is this model ready?"
  - "checkpoint review"

inputs:
  - checkpoint: "Model checkpoint to evaluate"
  - training_logs: "Loss curves, eval metrics during training"
  - eval_results: "Post-training benchmark results"
  - data_card: "Training data documentation"
  - config: "Full training configuration"

steps:
  - id: check_data_quality
    action: "Verify data curation was done properly (card, filtering, splits)"
  - id: check_eval_completeness
    action: "Verify all required benchmarks were run"
  - id: check_training_health
    action: "Verify loss converged, no divergence, no anomalies"
  - id: check_reproducibility
    action: "Verify config, seeds, data versions are documented"
  - id: decide
    action: "Promote, reject, or request additional evaluation"

outputs:
  - decision: "promote | reject | needs_more_eval"
  - justification: "Why this decision"
  - gaps: "What's missing if rejected"

guardrails:
  - "No checkpoint advances without eval evidence"
  - "Reproducibility is non-negotiable — must be able to recreate the run"
  - "Loss divergence or anomalies are automatic rejection"
  - "Incomplete eval coverage is grounds for 'needs_more_eval'"

benchmark_source: "https://huggingface.co/spaces/HuggingFaceTB/smol-training-playbook"
