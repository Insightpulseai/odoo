  - All ADO org members are Entra-backed — DONE (admin@=aad, ceo@=aad#EXT#)
  - ceo@ identity resolved — DONE (Entra external guest, not MSA)
  - admin@ elevated to Project Collection Administrators — PENDING (requires ceo@ action)
  - App B service principal (833163d3) added to ADO org — PENDING (requires PCA)
  - WIF service connections active for dev, staging, prod — IN PROGRESS (dev active)
  - 3 managed identities provisioned with correct RBAC — NOT STARTED
  - Pipeline can authenticate via WIF and access Azure resources — BLOCKED on SP add
  - No long-lived client secrets in any ADO service connection — COMPLIANT
  - App A (Odoo Login) client secret in Key Vault — DONE (kv-ipai-dev/odoo-entra-oauth-client-secret)
