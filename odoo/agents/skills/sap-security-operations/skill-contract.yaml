version: 1
name: sap-security-operations
status: draft
owner: agents
type: benchmark_skill

purpose: >
  Extract and apply security benchmark patterns from SAP on Microsoft Cloud
  guidance, covering Entra identity, Security Copilot, Sentinel, and
  monitoring patterns, without requiring SAP products.

triggers:
  - security architecture review for ERP/platform workloads
  - Entra identity integration design
  - SIEM/SOAR pattern design
  - monitoring architecture for Azure workloads
  - user asks about SAP security patterns

inputs:
  - current security architecture
  - identity provider configuration
  - monitoring stack
  - compliance requirements

dependencies:
  - agents/knowledge/benchmarks/sap-on-microsoft-cloud-learning-path.md
  - docs/contracts/foundry-vscode-auth-contract.md

steps:
  - identify security concern category (identity, SIEM, monitoring, SOAR)
  - extract benchmark pattern from Microsoft SAP security guidance
  - translate to current stack (Entra, Sentinel, Azure Monitor)
  - produce recommendation with boundary notes
  - flag patterns that require SAP-specific connectors vs generic Azure security

outputs:
  - benchmark_extracted
  - relevance_to_current_platform
  - recommended_translation
  - risks
  - out_of_scope
  - evidence

guardrails:
  - do not require SAP-specific Sentinel connectors unless SAP is actually in use
  - do not assume SAP BTP is present
  - translate identity patterns to Entra-first model
  - monitoring patterns should use Azure Monitor, not SAP-specific tooling

evidence:
  - cited Microsoft Learn security module
  - translated security recommendation
  - identified non-goals

evals:
  - security pattern correctly extracted
  - no SAP-specific tooling required without justification
  - Entra identity patterns correctly translated
  - monitoring recommendations use Azure-native tooling
