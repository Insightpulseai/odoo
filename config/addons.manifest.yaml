    must_have:
      - mass_editing
      - auditlog
      - auth_admin_passkey
      - base_exception
      - base_tier_validation
      - scheduler_error_mailer
      - base_technical_user
      - base_cron_exclusion
      - module_auto_update

  - repo: server-ux
    url: https://github.com/OCA/server-ux.git
    ref: "19.0"
    tier: 0
    purpose: Server UX helpers, tier validation extras, date_range
    must_have:
      - base_tier_validation_formula
      - base_tier_validation_forward
      - date_range
      - base_substate

  - repo: server-backend
    url: https://github.com/OCA/server-backend.git
    ref: "19.0"
    tier: 0
    purpose: Server backend utilities

  - repo: server-auth
    url: https://github.com/OCA/server-auth.git
    ref: "19.0"
