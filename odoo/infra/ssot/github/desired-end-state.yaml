# =============================================================================
# Org-Wide Standards
# =============================================================================
standards:

  required_files:
    - CLAUDE.md
    - .vscode/settings.json
    - .vscode/extensions.json

  recommended_files:
    - docs/engineering/AI_EDITOR_POLICY.md
    - .github/copilot-instructions.md
    - README.md

  labels:
    priority:
      - {name: "priority:critical", color: "B60205"}
      - {name: "priority:high", color: "D93F0B"}
      - {name: "priority:medium", color: "FBCA04"}
      - {name: "priority:low", color: "0E8A16"}
    type:
      - {name: "type:bug", color: "D73A4A"}
      - {name: "type:feature", color: "0075CA"}
      - {name: "type:chore", color: "CFD3D7"}
      - {name: "type:docs", color: "0075CA"}
    agent:
      - {name: "agent:claude", color: "7B61FF"}
      - {name: "agent:copilot", color: "1F883D"}
      - {name: "agent:gemini", color: "4285F4"}

  commit_convention: "feat|fix|refactor|docs|test|chore(scope): description"

# =============================================================================
# 5-Layer Org Model
# =============================================================================
org_layers:

  - layer: 1_control_plane
    description: "Governance, CI/CD, org-wide workflows, infrastructure"
    repos: [.github, ops-platform, infra]

  - layer: 2_core_runtime
    description: "ERP, product surfaces, data/analytics"
    repos: [odoo, web, lakehouse]

  - layer: 3_shared_systems
    description: "Design tokens, templates, agent framework"
    repos: [design-system, templates, agents]

  - layer: 4_planning_governance
    description: "Planning tools, ADRs, contracts, environment policies"
    systems: [GitHub Projects, ADRs, contracts, environment policies]
    notes: "Not repos — cross-cutting governance surfaces"

  - layer: 5_archived
    description: "Archived repos hold no canonical logic"
    rule: "Archived repos must not hold canonical logic; migrate content before archiving"
    repos_ref: "archived_repos (see above)"

# =============================================================================
# Repo Metadata Requirements
# =============================================================================
repo_metadata_required:
  fields:
    - name: type
      description: "Repo classification (product, platform, governance, shared, template)"
      required: true
    - name: lifecycle
      description: "Current lifecycle stage (active, maintenance, deprecated, archived)"
      required: true
    - name: owner
      description: "Team or individual responsible for the repo"
      required: true
    - name: purpose
      description: "One-line purpose statement"
      required: true
    - name: README.md
      description: "Repository overview document"
      required: true
    - name: CODEOWNERS
      description: "GitHub CODEOWNERS file for review routing"
      required: true
    - name: branch_protection
      description: "Main branch protection rules enabled"
      required: true

# =============================================================================
# Cross-Platform Integration Map
# =============================================================================
platform_map:

  planning:
    strategy: Figma (roadmap visualization)
    execution: Plane (workspace, initiatives, epics, work items)
    engineering: Spec Kit bundles (engineering contracts)

  runtime:
    erp: Odoo CE 19 (system of record)
    control_plane: Supabase (auth, Edge Functions, Vault)
    intelligence: Databricks (lakehouse, Apps)
    agents: Azure Foundry (copilots, tool orchestration)
    infrastructure: Azure + DigitalOcean

  engineering:
    source: GitHub (repos, CI/CD, packages)
    ci_cd: GitHub Actions
    dns: Cloudflare
    hosting_web: Vercel
