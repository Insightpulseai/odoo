schema: ssot.plane.template.v1
type: epic
updated: "2026-03-16"

template:
  name: Epic Template
  description_structure: |
    ## Business Outcome
    What program-level outcome does this achieve?

    ## Success Metric
    How do we measure completion? (quantifiable)

    ## Scope
    Which modules and delivery waves are in scope?

    ## Dependencies
    What must be true before this can start?

    ## Linked Architecture Page
    Reference the relevant Plane Page (Target Architecture, Migration Waves, etc.)

  required_fields:
    - title
    - description
    - assignee (owner)
    - priority
    - start_date
    - target_date

  label_convention:
    - "Type/Epic"
    - "Module/<primary-module>"
    - "Priority/<level>"

  module_assignment_rule: >
    Assign to the primary architecture module this epic spans.
    If cross-cutting, assign to Platform Foundation.

  cycle_assignment_rule: >
    Assign to the delivery wave where the majority of work lands.
    Epics may span multiple cycles.

  done_rule: >
    All child Features are Done or Cancelled.
    Success metric is evidenced.
    Architecture page updated with outcome.
