# Workflow: Coding Agent from Issue
# Triggers when a GitHub issue with label "agent:coding" is created.
# The issue must contain structured task context from a spec bundle.

id: coding-agent-from-issue
name: Coding Agent from Issue
version: 1.0.0
domain: sdlc
source: Microsoft Agentic SDLC (Phase 2)
created: 2026-03-15

trigger:
  type: github_issue
  filters:
    labels:
      - "agent:coding"
    state: open

input_schema:
  required:
    - issue_number
    - repo
  properties:
    issue_number:
      type: integer
      description: GitHub issue number
    repo:
      type: string
      description: "org/repo format"
    spec_id:
      type: string
      format: uuid
      description: Reference to ops.specs row (optional)

steps:
  - id: parse_issue
    name: Parse Issue Context
    action: github.get_issue
    inputs:
      repo: "{{ input.repo }}"
      issue_number: "{{ input.issue_number }}"
    outputs:
      - title
      - body
      - labels
      - assignees

  - id: extract_task
    name: Extract Structured Task
    action: llm.extract
    inputs:
      text: "{{ steps.parse_issue.outputs.body }}"
      schema:
        files_to_modify: array[string]
        acceptance_criteria: array[string]
        tech_constraints: array[string]
        ssot_domain: string
    outputs:
      - task_context

  - id: validate_scope
    name: Validate Task Scope
    action: guard.check
    inputs:
      task_context: "{{ steps.extract_task.outputs.task_context }}"
    rules:
      - max_files: 10
      - no_cross_boundary: true  # Must not cross SSOT boundaries
      - no_banned_patterns: true  # Check against constitution
    on_failure: escalate_to_human

  - id: create_branch
    name: Create Feature Branch
    action: github.create_branch
    inputs:
      repo: "{{ input.repo }}"
      base: main
      name: "agent/issue-{{ input.issue_number }}"

  - id: implement
    name: Agent Implements Change
    action: agent.code
    inputs:
      branch: "{{ steps.create_branch.outputs.branch }}"
      task: "{{ steps.extract_task.outputs.task_context }}"
      constitution: agents/foundry/agentic-sdlc-constitution.md
    timeout: 600  # 10 min max
    sandbox: true  # Run in isolated ACA session

  - id: create_pr
    name: Create Pull Request
    action: github.create_pr
    inputs:
      repo: "{{ input.repo }}"
      head: "{{ steps.create_branch.outputs.branch }}"
      base: main
      title: "fix({{ steps.extract_task.outputs.task_context.ssot_domain }}): {{ steps.parse_issue.outputs.title }}"
      body: |
        ## Summary
        Automated fix for #{{ input.issue_number }}

        ## Changes
        {{ steps.implement.outputs.diff_summary }}

        ## Evidence
        {{ steps.implement.outputs.test_results }}

        ## Spec Reference
        {{ input.spec_id || 'N/A' }}

        ---
        Generated by coding-agent-from-issue workflow
      labels:
        - "agent:generated"

  - id: record_state
    name: Record in Supabase
    action: supabase.upsert
    inputs:
      table: ops.spec_tasks
      match:
        github_issue_number: "{{ input.issue_number }}"
      set:
        status: in_progress
        github_pr_number: "{{ steps.create_pr.outputs.pr_number }}"

  - id: notify
    name: Notify via Slack
    action: slack.post
    inputs:
      channel: "#dev-agents"
      text: "Coding agent created PR #{{ steps.create_pr.outputs.pr_number }} for issue #{{ input.issue_number }}"

on_failure:
  - action: slack.post
    inputs:
      channel: "#dev-agents"
      text: "Coding agent failed on issue #{{ input.issue_number }}: {{ error.message }}"
  - action: github.comment
    inputs:
      repo: "{{ input.repo }}"
      issue_number: "{{ input.issue_number }}"
      body: "Agent failed to implement this task. Error: {{ error.message }}. Escalating to human."
  - action: github.add_label
    inputs:
      repo: "{{ input.repo }}"
      issue_number: "{{ input.issue_number }}"
      label: "agent:failed"
