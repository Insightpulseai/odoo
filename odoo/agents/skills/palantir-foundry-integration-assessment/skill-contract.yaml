version: 1
type: framework_skill
family: agent_sdk_stack
skill:
  name: palantir-foundry-integration-assessment
  status: draft
  owner: agents
  purpose: >
    Assess whether Palantir Foundry integration is actually needed and
    which SDK to use. This is a decision gate — not an implementation
    skill. Default status is out-of-scope unless explicitly needed.
    Never confuse Microsoft Foundry (Azure AI Foundry) with Palantir
    Foundry.

  triggers:
    - Palantir integration proposal or request
    - external platform evaluation involving Foundry
    - naming confusion detected between Microsoft Foundry and Palantir Foundry
    - periodic review of external integration scope

  inputs:
    - integration proposal or business justification
    - whether a real Palantir Foundry workload exists
    - intended use cases (data access, ontology, transforms, admin)
    - current platform boundaries and SSOT ownership
    - naming context (which Foundry is being discussed)

  steps:
    - confirm whether a real Palantir Foundry workload exists in the organization
    - distinguish Microsoft Foundry (Azure AI Foundry) from Palantir Foundry
    - if Palantir workload exists, determine Foundry Platform SDK vs Ontology SDK choice
    - assess integration scope and SSOT boundary implications
    - evaluate data flow direction and ownership
    - produce recommendation: proceed / defer / reject
    - document naming clarification for all stakeholders

  outputs:
    - integration_assessment
    - sdk_recommendation
    - scope_boundary
    - naming_clarification
    - recommendation (proceed / defer / reject)
    - evidence

  guardrails:
    - default status is out-of-scope unless explicitly needed — do not assume Palantir is in baseline
    - never confuse Microsoft Foundry (Azure AI Foundry) with Palantir Foundry
    - prefer Ontology SDK for ontology-based work (per Palantir recommendation)
    - never begin implementation before this assessment gate passes
    - never create bidirectional data flows without SSOT boundary documentation
    - never treat Palantir as a prerequisite for other platform capabilities

  evidence:
    required: true
    format: "docs/evidence/{stamp}/palantir-foundry/assessment/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - agents/personas/external-platform-integrator.md
  - agents/knowledge/benchmarks/palantir-foundry-platform-sdk.md
  - agent-platform/ssot/learning/agent_sdk_stack_map.yaml
