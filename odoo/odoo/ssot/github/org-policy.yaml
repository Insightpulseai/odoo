# schema: ssot.github.org_policy.v1
# =============================================================================
# GitHub Org Policy SSOT — Insightpulseai
# =============================================================================
# Declares the DESIRED security posture for the Insightpulseai GitHub organization.
# Where live values are known to differ from desired, the known_drift block
# captures both current_value and desired_value for CI tracking.
#
# CI drift guard: .github/workflows/github-org-policy-guard.yml
# Drift checker:  scripts/ci/check_github_org_policy.py
#
# Companion files:
#   ssot/github/enterprise-cloud.yaml    — Enterprise Cloud governance
#   ssot/github/apps/pulser-hub.yaml     — Primary automation app
#   ssot/github/apps/org-installed.yaml   — Third-party app inventory
#   ssot/github/branch-protection.yaml    — Branch protection rules
#
# Last reviewed: 2026-03-05
# =============================================================================

schema_version: "1.0"
updated: "2026-03-05"
org: Insightpulseai

# =============================================================================
# Organization-Level Settings
# =============================================================================
# Source: gh api orgs/Insightpulseai
# Docs: https://docs.github.com/en/organizations/managing-organization-settings
# =============================================================================

organization:

  # ── Authentication & Access ────────────────────────────────────────────────

  two_factor_requirement:
    desired: true
    # When enabled, all org members and outside collaborators must have 2FA
    # configured on their personal accounts. Members without 2FA are removed.
    notes: "Non-negotiable. All org members must have 2FA enabled."

  default_repository_permission:
    desired: read
    # Least-privilege: org members get read-only access to all repos by default.
    # Write/admin access is granted per-repo via teams or direct collaborator assignment.
    notes: "Principle of least privilege. Elevated access via teams only."

  # ── Repository Creation ────────────────────────────────────────────────────

  members_can_create_repositories:
    desired: false
    notes: "Only org owners can create repos. Prevents untracked repo sprawl."

  members_can_create_public_repositories:
    desired: false
    notes: "Public repos require owner approval. Prevents accidental exposure."

  members_can_create_private_repositories:
    desired: false
    notes: "All repo creation through owners only. Centralized governance."

  members_can_create_internal_repositories:
    desired: false
    notes: "Internal repos not applicable for non-EMU orgs. Keep disabled."

  # ── Forking Policy ────────────────────────────────────────────────────────

  members_can_fork_private_repositories:
    desired: false
    notes: >
      Forking private repos creates uncontrolled copies of proprietary code.
      Disabled to prevent data exfiltration via fork. Contributors work on
      branches within the org repo instead.

# =============================================================================
# Third-Party Access Controls
# =============================================================================

third_party_access:

  oauth_app_policy:
    desired: restricted
    # "restricted" = OAuth apps must be approved by an org owner before any
    # org member can authorize them. Blocks supply-chain OAuth attacks.
    notes: >
      Allowlisted apps only. Any new OAuth app authorization request appears
      in org Settings > Third-party access for owner approval.

  github_app_install_policy:
    desired: owners_only
    # Only org owners can install new GitHub Apps on the org.
    # Prevents members from granting org-level access to arbitrary apps.
    notes: "Matches the app inventory in ssot/github/apps/org-installed.yaml."

# =============================================================================
# GitHub Actions Security
# =============================================================================

actions:

  enabled_repositories:
    desired: all
    notes: "Actions enabled on all org repos. Per-repo restrictions via rulesets."

  allowed_actions:
    desired: selected
    # "selected" = only actions from approved publishers + specific repos are allowed.
    # Blocks arbitrary marketplace actions from running in org repos.
    notes: "Reduce supply-chain risk by allowlisting action publishers."

  allowed_actions_publishers:
    desired:
      - "actions/*"            # GitHub official actions (checkout, setup-node, etc.)
      - "github/*"             # GitHub-owned utilities (codeql-action, etc.)
      - "docker/*"             # Docker official actions (login-action, build-push)
      - "azure/*"              # Azure deployment actions
      - "cloudflare/*"         # Cloudflare deployment actions
      - "supabase/*"           # Supabase CI/CD actions
      - "digitalocean/*"       # DigitalOcean deployment actions
    notes: >
      Approved publisher list. Adding a new publisher requires updating this
      SSOT and passing CI validation. Wildcard applies to all actions under
      the publisher namespace.

  default_workflow_permissions:
    desired: read
    # Workflow tokens (GITHUB_TOKEN) get read-only permissions by default.
    # Individual workflows must explicitly request write permissions via
    # the `permissions:` key in the workflow YAML.
    notes: >
      Least-privilege for GITHUB_TOKEN. Prevents workflows from modifying
      repo contents, creating releases, or pushing code without explicit
      permission declaration.

  can_approve_pull_request_reviews:
    desired: false
    # Workflows should not be able to approve PRs. Human review required.
    notes: "Prevent automated PR approval. Human reviewers only."

# =============================================================================
# Security Features
# =============================================================================

security:

  secret_scanning:
    desired: true
    scope: all_repositories
    notes: >
      Scans all repos for leaked secrets (API keys, tokens, passwords).
      Alerts sent to repo admins and secret providers.

  push_protection:
    desired: true
    scope: all_repositories
    notes: >
      Blocks pushes that contain known secret patterns before they reach
      the remote. Prevents secrets from entering git history.

  dependabot_alerts:
    desired: true
    scope: all_repositories
    notes: "Alerts on known vulnerabilities in dependencies."

  dependabot_security_updates:
    desired: true
    scope: all_repositories
    notes: "Auto-creates PRs to fix vulnerable dependencies."

  code_scanning_default_setup:
    desired: true
    notes: >
      Enable CodeQL default setup on all repos. Provides SAST coverage
      for supported languages without per-repo configuration.

# =============================================================================
# Known Drift (current vs desired)
# =============================================================================
# Each entry documents a known gap between live and desired state.
# The drift checker (scripts/ci/check_github_org_policy.py) validates these.
# Resolve drift via GitHub org Settings UI or API, then remove the entry.

known_drift:

  - field: organization.two_factor_requirement
    current_value: false
    desired_value: true
    action: "Enable in org Settings > Authentication security > Require 2FA"
    severity: critical
    notes: >
      2FA not currently enforced. This is the highest-priority remediation.
      Enabling will remove any members without 2FA configured.

  - field: organization.default_repository_permission
    current_value: write
    desired_value: read
    action: "Change in org Settings > Member privileges > Base permissions"
    severity: high
    notes: >
      Members currently have write access to all repos by default.
      Downgrade to read and use team-based access for write permissions.

  - field: organization.members_can_create_public_repositories
    current_value: true
    desired_value: false
    action: "Disable in org Settings > Member privileges > Repository creation"
    severity: high

  - field: organization.members_can_create_private_repositories
    current_value: true
    desired_value: false
    action: "Disable in org Settings > Member privileges > Repository creation"
    severity: medium

  - field: organization.members_can_fork_private_repositories
    current_value: true
    desired_value: false
    action: "Disable in org Settings > Member privileges > Repository forking"
    severity: high

  - field: actions.default_workflow_permissions
    current_value: write
    desired_value: read
    action: "Change in org Settings > Actions > General > Workflow permissions"
    severity: high
    notes: >
      GITHUB_TOKEN has write permissions by default. Downgrade to read
      and require explicit permissions: blocks in workflows.

# =============================================================================
# Verification Notes
# =============================================================================
# This file declares desired-state. The drift checker compares against live
# GitHub API responses. Some settings (OAuth app policy, GitHub App install
# policy) are not queryable via API and require manual verification against
# the org Settings UI.
#
# Manual verification checklist:
#   [ ] org Settings > Authentication security > 2FA requirement
#   [ ] org Settings > Member privileges > Base permissions
#   [ ] org Settings > Member privileges > Repository creation
#   [ ] org Settings > Member privileges > Repository forking
#   [ ] org Settings > Third-party access > OAuth app policy
#   [ ] org Settings > Actions > General > Allowed actions
#   [ ] org Settings > Actions > General > Workflow permissions
#   [ ] org Settings > Code security and analysis > All features enabled
