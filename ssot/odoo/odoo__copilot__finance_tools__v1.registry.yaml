name: odoo-copilot-finance-tools
odoo_module_version: "18.0.1.0.0"
generated: "2026-03-15"
odoo_version: "18.0"
category: copilot-tools
depends_on:
  - odoo__finance__finance_entities__v1.entity.yaml
  - odoo__expenses__expense_entities__v1.entity.yaml

tools:

  # ---------------------------------------------------------------------------
  # create_invoice — Create Customer Invoice or Vendor Bill
  # ---------------------------------------------------------------------------
  - name: create_invoice
    description: >
      Create a new customer invoice or vendor bill in draft state.
      The invoice is not posted automatically — use record_payment or
      a separate action_post call to confirm.
    parameters:
      - name: move_type
        type: string
        required: true
        enum: [out_invoice, in_invoice, out_refund, in_refund]
        description: >
          Document type: out_invoice (customer invoice), in_invoice (vendor bill),
          out_refund (credit note), in_refund (vendor credit note).
      - name: partner_id
        type: integer
        required: true
        description: Res.partner ID of the customer or vendor.
      - name: invoice_date
        type: string
        required: false
        format: date
        description: "Invoice date (YYYY-MM-DD). Defaults to today."
      - name: invoice_date_due
        type: string
        required: false
        format: date
        description: "Due date (YYYY-MM-DD). Computed from payment terms if not provided."
      - name: journal_id
        type: integer
        required: false
        description: Journal ID. Defaults to the first journal matching the move_type.
      - name: currency_id
        type: integer
        required: false
        description: Currency ID. Defaults to company currency.
      - name: lines
        type: array
        required: true
        description: Invoice line items.
        items:
          type: object
          properties:
            product_id:
              type: integer
              required: false
              description: Product ID (optional for miscellaneous lines).
            name:
              type: string
              required: true
              description: Line description.
            quantity:
              type: number
              required: false
              description: "Quantity (default: 1.0)."
            price_unit:
              type: number
              required: true
              description: Unit price.
            tax_ids:
              type: array
              items:
                type: integer
              required: false
              description: List of tax IDs to apply.
            account_id:
              type: integer
              required: false
              description: Account ID (defaults from product or journal).
            analytic_distribution:
              type: object
              required: false
              description: "Analytic distribution as {analytic_account_id: percentage}."
      - name: ref
        type: string
        required: false
        description: External reference (vendor bill number, PO reference).
      - name: narration
        type: string
        required: false
        description: Internal notes.
      - name: fiscal_position_id
        type: integer
        required: false
        description: Fiscal position ID for tax/account mapping.
    returns:
      type: object
      properties:
        id:
          type: integer
          description: Created account.move ID.
        name:
          type: string
          description: Document sequence number (assigned on post, "Draft" while in draft).
        state:
          type: string
          description: "Always 'draft' on creation."
        amount_total:
          type: number
          description: Computed total including taxes.
    example:
      request:
        move_type: out_invoice
        partner_id: 42
        invoice_date: "2026-03-15"
        lines:
          - name: "Consulting services - March 2026"
            quantity: 40
            price_unit: 150.00
            tax_ids: [1]
      response:
        id: 1234
        name: "Draft"
        state: draft
        amount_total: 6720.00

  # ---------------------------------------------------------------------------
  # record_payment — Register Payment Against Invoice
  # ---------------------------------------------------------------------------
  - name: record_payment
    description: >
      Register a payment against one or more invoices/bills. Creates an
      account.payment record and reconciles it with the invoice(s).
    parameters:
      - name: invoice_ids
        type: array
        items:
          type: integer
        required: true
        description: List of account.move IDs to pay.
      - name: amount
        type: number
        required: false
        description: Payment amount. Defaults to the total residual of the invoices.
      - name: date
        type: string
        required: false
        format: date
        description: "Payment date (YYYY-MM-DD). Defaults to today."
      - name: journal_id
        type: integer
        required: false
        description: Payment journal ID (bank or cash). Defaults to first bank journal.
      - name: currency_id
        type: integer
        required: false
        description: Payment currency ID. Defaults to invoice currency.
      - name: ref
        type: string
        required: false
        description: Payment reference / memo.
      - name: payment_method_line_id
        type: integer
        required: false
        description: Payment method line ID. Defaults to manual.
    returns:
      type: object
      properties:
        payment_id:
          type: integer
          description: Created account.payment ID.
        state:
          type: string
          description: Payment state (posted).
        amount:
          type: number
          description: Payment amount.
        reconciled_invoice_ids:
          type: array
          items:
            type: integer
          description: Invoice IDs that were reconciled.
    example:
      request:
        invoice_ids: [1234]
        amount: 6720.00
        journal_id: 7
        ref: "Wire transfer ref 20260315"
      response:
        payment_id: 567
        state: posted
        amount: 6720.00
        reconciled_invoice_ids: [1234]

  # ---------------------------------------------------------------------------
  # get_account_balance — Retrieve Account Balances
  # ---------------------------------------------------------------------------
  - name: get_account_balance
    description: >
      Retrieve debit, credit, and balance for one or more accounts
      within a date range. Useful for financial reporting and analysis.
    parameters:
      - name: account_ids
        type: array
        items:
          type: integer
        required: false
        description: List of account.account IDs. If empty, returns all accounts.
      - name: account_codes
        type: array
        items:
          type: string
        required: false
        description: "List of account codes (e.g. ['101001', '401001']). Alternative to account_ids."
      - name: date_from
        type: string
        required: true
        format: date
        description: Start date (YYYY-MM-DD).
      - name: date_to
        type: string
        required: true
        format: date
        description: End date (YYYY-MM-DD).
      - name: company_id
        type: integer
        required: false
        description: Company ID. Defaults to current company.
    returns:
      type: array
      items:
        type: object
        properties:
          account_id:
            type: integer
            description: Account ID.
          account_code:
            type: string
            description: Account code.
          account_name:
            type: string
            description: Account name.
          debit:
            type: number
            description: Total debit in the period.
          credit:
            type: number
            description: Total credit in the period.
          balance:
            type: number
            description: "Debit - Credit."
    example:
      request:
        account_codes: ["101001"]
        date_from: "2026-01-01"
        date_to: "2026-03-15"
      response:
        - account_id: 10
          account_code: "101001"
          account_name: "Bank - BDO"
          debit: 500000.00
          credit: 320000.00
          balance: 180000.00

  # ---------------------------------------------------------------------------
  # reconcile_entries — Reconcile Journal Items
  # ---------------------------------------------------------------------------
  - name: reconcile_entries
    description: >
      Reconcile two or more journal items (account.move.line) together.
      Typically used to match payments against invoices, or to reconcile
      bank statement lines. All lines must share the same account.
    parameters:
      - name: line_ids
        type: array
        items:
          type: integer
        required: true
        description: List of account.move.line IDs to reconcile. Minimum 2.
      - name: write_off_vals
        type: object
        required: false
        description: Optional write-off values if amounts do not match exactly.
        properties:
          account_id:
            type: integer
            description: Write-off account ID.
          amount:
            type: number
            description: Write-off amount.
          label:
            type: string
            description: Write-off label.
    returns:
      type: object
      properties:
        full_reconcile_id:
          type: integer
          description: Full reconciliation record ID (if fully reconciled).
        reconciled_line_ids:
          type: array
          items:
            type: integer
          description: Line IDs that were reconciled.
        is_full:
          type: boolean
          description: Whether the reconciliation is complete (no residual).
    example:
      request:
        line_ids: [4001, 4002]
      response:
        full_reconcile_id: 89
        reconciled_line_ids: [4001, 4002]
        is_full: true

  # ---------------------------------------------------------------------------
  # get_tax_summary — Tax Amounts for Period
  # ---------------------------------------------------------------------------
  - name: get_tax_summary
    description: >
      Get a summary of tax amounts collected and paid for a given period.
      Breaks down by tax, showing base amount, tax amount, and totals.
      Useful for VAT returns and tax reporting.
    parameters:
      - name: date_from
        type: string
        required: true
        format: date
        description: Start date (YYYY-MM-DD).
      - name: date_to
        type: string
        required: true
        format: date
        description: End date (YYYY-MM-DD).
      - name: tax_type
        type: string
        required: false
        enum: [sale, purchase, all]
        description: "Filter by tax type. Default: all."
      - name: company_id
        type: integer
        required: false
        description: Company ID. Defaults to current company.
    returns:
      type: object
      properties:
        date_from:
          type: string
          description: Period start date.
        date_to:
          type: string
          description: Period end date.
        sale_taxes:
          type: array
          items:
            type: object
            properties:
              tax_id:
                type: integer
              tax_name:
                type: string
              base_amount:
                type: number
              tax_amount:
                type: number
        purchase_taxes:
          type: array
          items:
            type: object
            properties:
              tax_id:
                type: integer
              tax_name:
                type: string
              base_amount:
                type: number
              tax_amount:
                type: number
        net_tax:
          type: number
          description: "Sale tax - Purchase tax (amount owed/refundable)."
    example:
      request:
        date_from: "2026-01-01"
        date_to: "2026-03-31"
        tax_type: all
      response:
        date_from: "2026-01-01"
        date_to: "2026-03-31"
        sale_taxes:
          - tax_id: 1
            tax_name: "VAT 12%"
            base_amount: 1000000.00
            tax_amount: 120000.00
        purchase_taxes:
          - tax_id: 2
            tax_name: "Input VAT 12%"
            base_amount: 600000.00
            tax_amount: 72000.00
        net_tax: 48000.00

  # ---------------------------------------------------------------------------
  # create_expense — Create Expense Line for Employee
  # ---------------------------------------------------------------------------
  - name: create_expense
    description: >
      Create a new expense line for an employee. The expense is created
      in draft state and can be submitted to an expense report later.
    parameters:
      - name: employee_id
        type: integer
        required: true
        description: HR employee ID.
      - name: name
        type: string
        required: true
        description: Expense description.
      - name: unit_amount
        type: number
        required: true
        description: Amount per unit.
      - name: quantity
        type: number
        required: false
        description: "Quantity (default: 1.0)."
      - name: date
        type: string
        required: false
        format: date
        description: "Expense date (YYYY-MM-DD). Defaults to today."
      - name: product_id
        type: integer
        required: false
        description: Expense category product ID.
      - name: payment_mode
        type: string
        required: false
        enum: [own_account, company_account]
        description: "Who paid: own_account (employee) or company_account. Default: own_account."
      - name: currency_id
        type: integer
        required: false
        description: Currency ID. Defaults to company currency.
      - name: tax_ids
        type: array
        items:
          type: integer
        required: false
        description: Tax IDs to apply.
      - name: reference
        type: string
        required: false
        description: Receipt or reference number.
      - name: analytic_distribution
        type: object
        required: false
        description: "Analytic distribution as {analytic_account_id: percentage}."
    returns:
      type: object
      properties:
        id:
          type: integer
          description: Created hr.expense ID.
        name:
          type: string
          description: Expense description.
        total_amount:
          type: number
          description: Total expense amount.
        state:
          type: string
          description: "Always 'draft'."
    example:
      request:
        employee_id: 5
        name: "Client dinner - Makati"
        unit_amount: 3500.00
        date: "2026-03-14"
        product_id: 22
        payment_mode: own_account
        reference: "OR-2026-0314-001"
      response:
        id: 891
        name: "Client dinner - Makati"
        total_amount: 3500.00
        state: draft

  # ---------------------------------------------------------------------------
  # submit_expense_report — Submit Expense Sheet for Approval
  # ---------------------------------------------------------------------------
  - name: submit_expense_report
    description: >
      Submit an expense report (hr.expense.sheet) for manager approval.
      Can either submit an existing sheet or create a new sheet from
      a list of draft expense IDs and submit it.
    parameters:
      - name: sheet_id
        type: integer
        required: false
        description: Existing hr.expense.sheet ID to submit. Mutually exclusive with expense_ids.
      - name: expense_ids
        type: array
        items:
          type: integer
        required: false
        description: >
          List of hr.expense IDs in draft state. A new sheet will be created
          containing these expenses and submitted. Mutually exclusive with sheet_id.
      - name: name
        type: string
        required: false
        description: Expense report name (used when creating new sheet from expense_ids).
    returns:
      type: object
      properties:
        sheet_id:
          type: integer
          description: Expense sheet ID.
        name:
          type: string
          description: Expense report name.
        state:
          type: string
          description: "Sheet state after submission (submit)."
        total_amount:
          type: number
          description: Total amount of all expenses in the report.
        expense_count:
          type: integer
          description: Number of expense lines in the report.
    example:
      request:
        expense_ids: [891, 892, 893]
        name: "March 2026 Business Expenses"
      response:
        sheet_id: 456
        name: "March 2026 Business Expenses"
        state: submit
        total_amount: 12500.00
        expense_count: 3

  # ---------------------------------------------------------------------------
  # get_aging_report — Receivable/Payable Aging
  # ---------------------------------------------------------------------------
  - name: get_aging_report
    description: >
      Generate an aging report for receivables or payables. Shows amounts
      grouped by aging buckets (current, 1-30, 31-60, 61-90, 90+ days overdue).
    parameters:
      - name: report_type
        type: string
        required: true
        enum: [receivable, payable]
        description: "Report type: receivable (customers) or payable (vendors)."
      - name: as_of_date
        type: string
        required: false
        format: date
        description: "Aging date (YYYY-MM-DD). Defaults to today."
      - name: partner_ids
        type: array
        items:
          type: integer
        required: false
        description: Filter by partner IDs. If empty, includes all partners.
      - name: company_id
        type: integer
        required: false
        description: Company ID. Defaults to current company.
    returns:
      type: object
      properties:
        report_type:
          type: string
          description: receivable or payable.
        as_of_date:
          type: string
          description: Aging reference date.
        total:
          type: number
          description: Total outstanding amount.
        partners:
          type: array
          items:
            type: object
            properties:
              partner_id:
                type: integer
              partner_name:
                type: string
              current:
                type: number
                description: Not yet due.
              days_1_30:
                type: number
                description: 1-30 days overdue.
              days_31_60:
                type: number
                description: 31-60 days overdue.
              days_61_90:
                type: number
                description: 61-90 days overdue.
              days_over_90:
                type: number
                description: Over 90 days overdue.
              total:
                type: number
                description: Total for this partner.
    example:
      request:
        report_type: receivable
        as_of_date: "2026-03-15"
      response:
        report_type: receivable
        as_of_date: "2026-03-15"
        total: 450000.00
        partners:
          - partner_id: 42
            partner_name: "Acme Corp"
            current: 100000.00
            days_1_30: 50000.00
            days_31_60: 0.00
            days_61_90: 0.00
            days_over_90: 0.00
            total: 150000.00
          - partner_id: 55
            partner_name: "Global Industries"
            current: 0.00
            days_1_30: 200000.00
            days_31_60: 100000.00
            days_61_90: 0.00
            days_over_90: 0.00
            total: 300000.00
