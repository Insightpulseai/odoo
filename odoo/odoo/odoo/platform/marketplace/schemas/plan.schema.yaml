# Microsoft Marketplace Plan Schema
# Plans are first-class objects under offers
# Reference: https://learn.microsoft.com/en-us/partner-center/marketplace-offers/plans-pricing

type: object
required:
  - plan_id
  - name
  - audience
  - billing_model

properties:
  plan_id:
    type: string
    description: Unique plan identifier within the offer
    pattern: "^[a-z0-9-]+$"

  name:
    type: string
    description: Human-readable plan name

  description:
    type: string
    description: Plan description for marketplace listing

  audience:
    type: string
    enum:
      - public
      - private
      - csp-only
    description: Who can see and purchase this plan

  billing_model:
    type: string
    enum:
      - flat-rate-monthly
      - flat-rate-annual
      - per-user-monthly
      - per-user-annual
      - usage-based
      - free
      - bring-your-own-license
      - contact-sales
    description: How the plan is priced

  pricing:
    type: object
    properties:
      currency:
        type: string
        default: USD
      monthly_price:
        type: number
      annual_price:
        type: number
      usage_dimensions:
        type: array
        items:
          type: object
          properties:
            dimension_id:
              type: string
            unit:
              type: string
            price_per_unit:
              type: number
            included_quantity:
              type: number

  trial:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
      duration_days:
        type: integer

  features:
    type: array
    items:
      type: string
    description: Feature list for this plan tier

  limits:
    type: object
    description: Plan-specific resource limits
    additionalProperties: true

  sales_channel_notes:
    type: string
    description: Internal notes for sales team

  status:
    type: string
    enum:
      - draft
      - active
      - deprecated
    default: draft
