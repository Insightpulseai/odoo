# =============================================================================
# Odoo Deploy Pipeline
# =============================================================================
# Build -> Deploy -> Smoke -> Evidence for Odoo CE 18 ERP.
# Surface: ipai-odoo-dev-web ACA, https://erp.insightpulseai.com
# ACR image: acripaiodoo.azurecr.io/ipai-odoo:18.0-copilot
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - config/**
      - platform/runtime/docker/docker/Dockerfile.odoo-copilot

pr:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - config/**

pool:
  vmImage: ubuntu-latest

variables:
  acrName: acripaiodoo
  imageName: ipai-odoo
  imageTag: 18.0-copilot
  containerAppName: ipai-odoo-dev-web
  resourceGroup: rg-ipai-dev-odoo-runtime
  serviceConnection: azure-ipai
  smokeUrl: https://erp.insightpulseai.com/web/login
  # Neutralization: set via pipeline variables or queue-time override
  # neutralizeMode: ''            # 'staging' or 'post-import' (empty = skip)
  # neutralizeDatabase: ''        # target DB name (default: odoo_staging for staging mode)

stages:
  # ── Stage 1: Build ──
  - stage: Build
    displayName: Build Odoo Image
    jobs:
      - template: templates/jobs/build-container.yml
        parameters:
          imageName: $(imageName)
          imageTag: $(imageTag)
          dockerfile: platform/runtime/docker/docker/Dockerfile.odoo-copilot
          buildContext: '.'
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)

  # ── Stage 2: Deploy ──
  - stage: Deploy
    displayName: Deploy to ACA
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - template: templates/jobs/deploy-containerapp.yml
        parameters:
          containerAppName: $(containerAppName)
          resourceGroup: $(resourceGroup)
          imageName: $(imageName)
          imageTag: $(imageTag)
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)

  # ── Stage 3: Neutralize (staging/post-import only) ──
  - stage: Neutralize
    displayName: Neutralize Non-Prod
    dependsOn: Deploy
    condition: and(succeeded(), ne(variables['neutralizeMode'], ''))
    jobs:
      - job: RunNeutralization
        displayName: Neutralize environment
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Run neutralization script
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                # Resolve DB credentials from Key Vault
                export DB_HOST=$(az keyvault secret show --vault-name kv-ipai-dev --name odoo-pg-host --query value -o tsv)
                export DB_USER=$(az keyvault secret show --vault-name kv-ipai-dev --name odoo-pg-user --query value -o tsv)
                export DB_PASSWORD=$(az keyvault secret show --vault-name kv-ipai-dev --name odoo-pg-password --query value -o tsv)
                export DB_PORT=5432

                NEUTRALIZE_DB="${NEUTRALIZE_DATABASE:-odoo_staging}"

                bash scripts/odoo/neutralize_environment.sh \
                  --mode=$(neutralizeMode) \
                  --database="${NEUTRALIZE_DB}" \
                  2>&1 | tee $(Build.ArtifactStagingDirectory)/neutralize-output.log
            env:
              NEUTRALIZE_DATABASE: $(neutralizeDatabase)

          - publish: $(Build.ArtifactStagingDirectory)/neutralize-output.log
            artifact: neutralization-evidence
            condition: always()

  # ── Stage 4: Smoke ──
  - stage: Smoke
    displayName: Smoke Test
    dependsOn:
      - Deploy
      - Neutralize
    condition: |
      and(
        succeeded('Deploy'),
        in(dependencies.Neutralize.result, 'Succeeded', 'Skipped')
      )
    jobs:
      - template: templates/jobs/smoke-http.yml
        parameters:
          url: $(smokeUrl)
          expectedStatus: '200'
          contentMatch: Odoo
          contentExclude: 'Internal Server Error'
          retries: 3
          retryDelaySeconds: 20

  # ── Stage 5: Evidence ──
  - stage: Evidence
    displayName: Publish Evidence
    dependsOn: Smoke
    condition: succeededOrFailed()
    jobs:
      - template: templates/jobs/publish-evidence.yml
        parameters:
          surface: odoo-erp
          imageRef: $(acrName).azurecr.io/$(imageName):$(imageTag)
          smokeUrl: $(smokeUrl)
