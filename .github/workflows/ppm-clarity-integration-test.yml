name: "PPM Clarity: Integration Tests"

on:
  pull_request:
    paths:
      - "scripts/ppm/**"

jobs:
  test:
    name: Run PPM Clarity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/ppm/requirements.txt

      - name: Run field ownership tests
        run: |
          cd /home/runner/work/odoo/odoo
          python -m pytest scripts/ppm/tests/test_field_ownership.py -v

      - name: Run idempotency tests
        run: |
          cd /home/runner/work/odoo/odoo
          python -m pytest scripts/ppm/tests/test_idempotency.py -v

      - name: Run Slack notifier tests
        run: |
          cd /home/runner/work/odoo/odoo
          python -m pytest scripts/ppm/tests/test_slack_notifier.py -v
