# =============================================================================
# SCHEMA SURFACES
# =============================================================================

surfaces:

  - id: odoo_orm
    name: Odoo ORM Models
    technology: python_odoo_orm
    target_database: odoo (Azure PG ipai-odoo-dev-pg)
    authority: de_facto_ssot
    declared_ssot: false
    migration_engine: odoo_orm_auto
    paths:
      - addons/ipai/*/models/*.py
      - vendor/odoo/addons/*/models/*.py
    models_defined:
      new:
        - ipai.copilot.conversation
        - ipai.copilot.message
        - ipai.doc.digitization.config
        - ipai.foundry.provider.config
        - ipai.ppm.import.wizard
      inherited:
        - project.project
        - project.task
        - account.analytic.account
        - res.config.settings
    module_count: 14
    modules_with_orm_models: 4
    drift_detection: none
    ci_gate: none
    generated_docs: archived

  - id: supabase_migrations
    name: Supabase SQL Migrations
    technology: postgresql_sql
    target_database: supabase (Azure VM vm-ipai-supabase-dev)
    authority: declared_ssot
    declared_ssot: true
    declaration_source: .claude/rules/ssot-platform.md (Rule 4)
    migration_engine: supabase_cli
    paths:
      - ops-platform/supabase/migrations/
      - odoo/supabase/migrations/
    duplication_issue: true
    duplication_note: >
      Two copies of the migration corpus exist. It is unclear which is
      canonical. The ops-platform copy and the odoo/supabase copy overlap
      substantially but have differences.
    approximate_file_count: 100+
    schemas_covered:
      - core
      - saas
      - logs
      - scout_dim
      - scout_fact
      - scout_gold
      - scout_meta
      - erp
      - ops
      - mcp_jobs
      - app
      - infra
      - docs
      - kg
      - public
      - auth
    drift_detection: none
    ci_gate: none

  - id: supabase_dbml
    name: Supabase DBML Schema Doc
    technology: dbml
    target_database: supabase
    authority: documentation_only
    declared_ssot: false
    paths:
      - supabase/db/schema/oca_docs_brain.dbml
    freshness: "2025-12-20"
    status: active
    note: Covers OCA Docs Brain subsystem only, not full Supabase schema

  - id: prisma_saas_types
    name: Prisma SaaS Types
    technology: prisma
    target_database: none (design-time only)
    authority: design_artifact
    declared_ssot: false
    paths:
      - platform/pkgs/saas-types/prisma/schema.prisma
    freshness: "2026-01-12"
    status: disconnected
    migration_pipeline: none
    note: >
      Defines multi-tenant Account/User/Subscription models that map to
      Odoo res.company/res.partner. No runtime database connection.

