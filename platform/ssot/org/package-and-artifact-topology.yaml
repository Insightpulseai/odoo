version: 1
kind: package_and_artifact_topology
status: canonical
org:
  enterprise: ipai
  primary_operating_org: Insightpulse-ai
principles:
  - github_packages_is_an_internal_artifact_distribution_layer
  - ghcr_is_the_default_container_registry
  - azure_runtime_is_the_default_deployment_target
  - public_domains_are_application_surfaces_not_package_endpoints
  - shared_packages_should_be_reused_across_web_surfaces_where_practical
  - artifact_names_must_be_deterministic_and_repo_aligned
registries:
  ghcr:
    type: github_container_registry
    purpose:
      - deployable_container_images
      - runtime_images
      - worker_images
      - preview_images_if_needed
    naming_pattern: ghcr.io/insightpulse-ai/<artifact-name>
  npm:
    type: github_packages_npm_registry
    purpose:
      - shared_ui_packages
      - design_tokens
      - typed_api_clients
      - auth_helpers
      - internal_frontend_libraries
    naming_pattern: "@insightpulse-ai/<package-name>"
artifact_policies:
  visibility:
    default_packages: private
    default_images: private
    public_allowed_only_if:
      - intentionally_open_source
      - no_internal_contract_or_secret_exposure
  retention:
    preview_images: short_lived
    release_images: retained
  immutability:
    release_tags_should_be_immutable: true
  provenance:
    ci_published_only: true
domains:
  - domain: www.insightpulseai.com
    app_id: insightpulseai_main
    repo_owner: web
    surface_type: flagship_public_site
    deployable_artifacts:
      containers:
        - ghcr.io/insightpulse-ai/insightpulseai-main
      packages_consumed:
        - "@insightpulse-ai/design-tokens"
        - "@insightpulse-ai/ui"
        - "@insightpulse-ai/platform-api-client"
    runtime_target:
      preferred: azure_container_apps
    notes:
      - public_site_domain
      - may_share_frontend_packages_with_w9studio_and_prismalab
  - domain: www.w9studio.net
    app_id: w9studio
    repo_owner: web
    surface_type: business_unit_public_site
    deployable_artifacts:
      containers:
        - ghcr.io/insightpulse-ai/w9studio-web
      packages_consumed:
        - "@insightpulse-ai/design-tokens"
        - "@insightpulse-ai/ui"
    runtime_target:
      preferred: azure_container_apps
    notes:
      - public_site_domain
      - should_reuse_shared_ui_where_possible
  - domain: prismalab.insightpulseai.com
    app_id: prismalab
    repo_owner: web
    surface_type: domain_application
    deployable_artifacts:
      containers:
        - ghcr.io/insightpulse-ai/prismalab-web
      packages_consumed:
        - "@insightpulse-ai/design-tokens"
        - "@insightpulse-ai/ui"
        - "@insightpulse-ai/platform-api-client"
        - "@insightpulse-ai/prismalab-domain-client"
    runtime_target:
      preferred: azure_container_apps
    notes:
      - domain_specific_surface
      - private_internal_packages_expected
shared_packages:
  - name: "@insightpulse-ai/design-tokens"
    owner_repo: design
    purpose:
      - shared_design_tokens
      - theme_contract
      - spacing_typography_color_semantics
  - name: "@insightpulse-ai/ui"
    owner_repo: web
    purpose:
      - shared_react_ui_components
      - app_shell_primitives
      - status_badges_tables_panels
  - name: "@insightpulse-ai/platform-api-client"
    owner_repo: platform
    purpose:
      - typed_api_contract_client
      - shared_platform_backend_access
  - name: "@insightpulse-ai/auth-entra"
    owner_repo: platform
    purpose:
      - entra_auth_helpers
      - session_and_token_utilities
  - name: "@insightpulse-ai/prismalab-domain-client"
    owner_repo: web
    purpose:
      - prismalab_specific_client_contracts
    optional: true
container_images:
  - image: ghcr.io/insightpulse-ai/insightpulseai-main
    owner_repo: web
    app_id: insightpulseai_main
    deployment_model: aca
    environments:
      - dev
      - staging
      - production
  - image: ghcr.io/insightpulse-ai/w9studio-web
    owner_repo: web
    app_id: w9studio
    deployment_model: aca
    environments:
      - dev
      - staging
      - production
  - image: ghcr.io/insightpulse-ai/prismalab-web
    owner_repo: web
    app_id: prismalab
    deployment_model: aca
    environments:
      - dev
      - staging
      - production
  - image: ghcr.io/insightpulse-ai/ops-console
    owner_repo: web
    app_id: ops_console
    deployment_model: aca
    environments:
      - dev
      - staging
      - production
    optional: true
repo_to_registry_mapping:
  design:
    publishes:
      - "@insightpulse-ai/design-tokens"
  web:
    publishes:
      - "@insightpulse-ai/ui"
      - ghcr.io/insightpulse-ai/insightpulseai-main
      - ghcr.io/insightpulse-ai/w9studio-web
      - ghcr.io/insightpulse-ai/prismalab-web
      - ghcr.io/insightpulse-ai/ops-console
  platform:
    publishes:
      - "@insightpulse-ai/platform-api-client"
      - "@insightpulse-ai/auth-entra"
  agent-platform:
    publishes: []
  odoo:
    publishes: []
  data-intelligence:
    publishes: []
ci_cd_contract:
  publish_from:
    - github_actions
    - azure_pipelines_if_explicitly_needed
  requirements:
    - build_must_be_repo_owned
    - package_version_must_be_traceable_to_commit
    - image_tag_must_include_release_or_sha
    - no_manual_pushes_for_release_artifacts
assertions:
  - github_packages_is_not_a_hosting_layer
  - ghcr_is_the_default_container_image_registry
  - public_domains_consume_artifacts_but_are_not_artifact_endpoints
  - shared_packages_should_reduce_cross_app_duplication
  - deployment_target_for_web_surfaces_is_azure_not_github_pages

# -----------------------------------------------------------------------------
# Migration note vs prior ACR-canonical posture
# -----------------------------------------------------------------------------
migration_note:
  prior_posture: acr_acripaiodoo_was_canonical_container_registry (per earlier platform/ssot/architecture/github-azure-chain.yaml#runtime)
  new_posture: ghcr_is_default_container_registry_for_web_surfaces
  reconciliation_required:
    - update_platform_ssot_architecture_github_azure_chain_yaml_runtime_block
    - reconfigure_aca_pull_credentials_to_authenticate_to_ghcr (github app installation token or managed identity federation)
    - evaluate_whether_acripaiodoo_stays_for_odoo_runtime_image_only_or_deprecates
    - update_odoo_cloud_platform_bom_if_odoo_image_also_moves_to_ghcr
  affects_existing_images:
    - ipai-odoo-dev (currently in acripaiodoo; decide stay or migrate)
    - ipai-odoo-staging / ipai-odoo-prod (currently in acripaiodoo)
  infra_change_required: yes (ACA pull secret / federated identity must be rewired for GHCR)
