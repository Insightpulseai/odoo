name: kb_tax_evidence
description: BIR filing evidence, reconciliation results, and compliance scoring
domain: tax_evidence
sources:
  - type: odoo
    model: ipai.bir.filing
    domain: "[('state', 'in', ['filed', 'verified', 'failed'])]"
  - type: databricks_mart
    catalog: ipai_gold
    schema: finance
    tables: [bir_filing_summary, tax_reconciliation, compliance_score]
  - type: evidence_packs
    path: docs/evidence/
    glob: "**/bir-*.md"
  - type: pipeline_runs
    project: ipai-platform
    definition_name: "bir-*"
index_name: diva_tax_evidence
refresh_schedule: "0 */6 * * *"  # Every 6 hours
access_policy:
  read: [diva_orchestrator, diva_judge, tax_reviewer, finance_team, auditor]
  write: [diva_collector]
