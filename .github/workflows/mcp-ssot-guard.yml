# =============================================================================
# MCP SSOT Guard — Ensures .claude/mcp-servers.json matches ssot/mcp/servers.yaml
# =============================================================================
# Blocks PRs that:
#   1. Add MCP servers without SSOT registration
#   2. Use blocked domains (e.g., insightpulseai.net)
#   3. Have auth/transport type mismatches
#   4. Drift status fields between config and SSOT
# =============================================================================

name: MCP SSOT Guard

on:
  pull_request:
    paths:
      - '.claude/mcp-servers.json'
      - 'ssot/mcp/**'
      - 'scripts/ci/validate_mcp_ssot.py'
  push:
    branches: [main]
    paths:
      - '.claude/mcp-servers.json'
      - 'ssot/mcp/**'

jobs:
  validate-mcp-ssot:
    name: Validate MCP ↔ SSOT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run MCP SSOT validator
        run: python scripts/ci/validate_mcp_ssot.py

      - name: Check for blocked domains in MCP config
        run: |
          echo "Scanning .claude/mcp-servers.json for blocked domains..."
          BLOCKED=0

          # .net domain check
          if grep -qi 'insightpulseai\.net' .claude/mcp-servers.json 2>/dev/null; then
            echo "ERROR: Found deprecated insightpulseai.net domain in MCP config"
            BLOCKED=1
          fi

          # Mattermost check
          if grep -qi 'mattermost' .claude/mcp-servers.json 2>/dev/null; then
            echo "ERROR: Found deprecated Mattermost reference in MCP config"
            BLOCKED=1
          fi

          if [ "$BLOCKED" -gt 0 ]; then
            exit 1
          fi

          echo "No blocked domains found."

      - name: Summary
        if: always()
        run: |
          echo "## MCP SSOT Guard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          MCP_COUNT=$(python3 -c "import json; d=json.load(open('.claude/mcp-servers.json')); print(len(d.get('mcpServers',{})))" 2>/dev/null || echo "?")
          SSOT_COUNT=$(python3 -c "import yaml; d=yaml.safe_load(open('ssot/mcp/servers.yaml')); print(len(d.get('servers',[])))" 2>/dev/null || echo "?")
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| MCP servers | ${MCP_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| SSOT entries | ${SSOT_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
