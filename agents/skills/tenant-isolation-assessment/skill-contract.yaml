id: tenant-isolation-assessment
name: Tenant Isolation Assessment
version: 0.1.0
type: benchmark_skill
classification: encoded_preference
family: azure-saas-mt
persona: saas-security-judge
updated_at: "2026-03-17"

purpose: >
  Judge skill — assess whether tenant isolation meets security and compliance
  bar. Returns ISOLATED / PARTIAL / NOT_ISOLATED with evidence for identity
  boundary, data access path, network segmentation, and encryption.

triggers:
  - "Pre-launch security review of multi-tenant platform"
  - "Post-incident isolation audit"
  - "Compliance audit preparation"
  - "New tenant tier introduction requiring isolation validation"

inputs:
  - architecture_documentation: "Current architecture diagrams and design docs"
  - identity_configuration: "Entra ID app registrations, token claims, RBAC"
  - data_isolation_implementation: "Database topology, RLS policies, encryption"
  - network_configuration: "VNET topology, NSGs, private endpoints, Front Door"
  - test_results: "Penetration test results, cross-tenant access test results"

steps:
  - "Review identity boundary configuration and token validation"
  - "Audit data access paths for cross-tenant exposure"
  - "Verify network segmentation between tenants"
  - "Check encryption implementation per tenant"
  - "Assess overall isolation posture and assign verdict"
  - "Document findings with evidence and remediation recommendations"

outputs:
  - verdict: "ISOLATED | PARTIAL | NOT_ISOLATED"
  - identity_assessment: "Identity boundary findings with evidence"
  - data_assessment: "Data isolation findings with evidence"
  - network_assessment: "Network segmentation findings with evidence"
  - encryption_assessment: "Encryption per-tenant findings with evidence"
  - remediation_plan: "Prioritized list of remediation actions for gaps"

guardrails:
  - "Verdict must be evidence-based — no assumptions"
  - "PARTIAL requires specific gaps documented with severity"
  - "NOT_ISOLATED requires immediate remediation plan"
  - "Assessment must cover all four domains (identity, data, network, encryption)"

evidence:
  - "Each finding backed by specific test result or configuration review"
  - "Cross-tenant access attempt results documented"
  - "Network scan results showing isolation status"

dependencies:
  - tenant-identity-isolation
  - data-isolation-pattern-design
  - saas-networking-design

evals:
  - scenario: "Well-isolated platform"
    pass: "Verdict: ISOLATED with evidence for all four domains"
  - scenario: "Platform with RLS but no network isolation"
    pass: "Verdict: PARTIAL with network gap documented"
  - scenario: "Platform with shared database, no RLS"
    pass: "Verdict: NOT_ISOLATED with critical remediation plan"

benchmark_source: "Azure Multitenancy Checklist - Security Pillar"
