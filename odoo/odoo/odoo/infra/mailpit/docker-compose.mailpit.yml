# ============================================================================
# Mailpit — Non-Prod Mail Catcher (OdooSH Equivalent)
# ============================================================================
# Catches all outbound email in dev/staging environments.
# Web UI: http://localhost:8025
# SMTP:   localhost:1025
#
# Usage (local dev overlay):
#   docker compose -f docker-compose.yml -f infra/mailpit/docker-compose.mailpit.yml up
#
# For ACA deployment:
#   az containerapp create --name ipai-mailpit-dev \
#     --resource-group rg-ipai-dev \
#     --environment ipai-odoo-dev-env \
#     --image axllent/mailpit:latest \
#     --target-port 8025 --ingress external \
#     --min-replicas 0 --max-replicas 1
#
# Then configure Odoo ir.mail_server:
#   smtp_host = ipai-mailpit-dev (ACA internal hostname)
#   smtp_port = 1025
#   smtp_encryption = none
# ============================================================================

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: ipai-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — point Odoo ir.mail_server here
      - "8025:8025"   # Web UI — view caught emails
    environment:
      # Max messages to store (prevent disk bloat)
      MP_MAX_MESSAGES: 500
      # Database for persistence (optional)
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit-data:/data

volumes:
  mailpit-data:
