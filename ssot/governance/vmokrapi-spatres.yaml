# ============================================================================
# SPATRES — Implementation Plan
# ============================================================================

strategies:
  S1:
    name: "Marketplace-First GTM"
    description: >
      Publish transactable SaaS on Azure Marketplace as the primary sales channel.
      Lead with BIR compliance + month-end close as the wedge. Philippines first.
    horizon: "12 months"
    objectives: [O1, O2, O3]

  S2:
    name: "TBWA Pilot → Reference Customer"
    description: >
      Convert TBWA\SMP from internal pilot to first paying marketplace customer.
      Use their success story for marketplace testimonial and co-sell pipeline.
    horizon: "6 months"
    objectives: [O2, O3]

  S3:
    name: "Certification-Driven Partner Maturity"
    description: >
      Use free ISV Success certifications to build team competency AND
      accumulate Solutions Partner Skilling points simultaneously.
    horizon: "12 months"
    objectives: [O4]

  S4:
    name: "Open-Source ERP Cost Advantage"
    description: >
      Position against D365 Finance ($210-300/user/month) with Odoo CE (free) +
      Pulser ($49/user/month). Target the 80% of PH SMEs who can't afford D365.
    horizon: "12 months"
    objectives: [O2, O3, O5]

programs:
  P1:
    name: "Marketplace Publication"
    strategy: S1
    sprints: [R2-S03, R2-S04, R2-S05, R2-S06, R3-S07, R3-S08, R3-S09]
    deliverables:
      - "Draft offer in Partner Center"
      - "SaaS Fulfillment API v2 integration"
      - "Metered billing API integration"
      - "Listing assets (logo, screenshots, video, PDFs)"
      - "Listing optimization consultation"
      - "Transactable offer published"

  P2:
    name: "TBWA Pilot Conversion"
    strategy: S2
    sprints: [R2-S03, R2-S04, R2-S05, R2-S06]
    deliverables:
      - "Odoo seed data imported (TBWA finance team)"
      - "Finance Control Tower demo delivered"
      - "TBWA subscription activated on marketplace"
      - "Marketplace Rewards testimonial submitted"

  P3:
    name: "Team Certification Sprint"
    strategy: S3
    sprints: [R2-S03, R2-S04, R2-S05]
    deliverables:
      - "AI-900 passed (Jake)"
      - "AI-102 passed (Jake)"
      - "DP-100 passed (Jake)"

  P4:
    name: "Product Build (v1 Finance Control Tower)"
    strategy: S4
    sprints: [R1-S01, R1-S02, R2-S03, R2-S04, R2-S05, R2-S06]
    deliverables:
      - "23 must-have capabilities shipped"
      - "ipai_doc_intel deployed"
      - "Close cockpit operational"
      - "BIR 2307 module functional"
      - "Genie spaces certified"

activities:
  # Sprint-level activities are tracked in ADO Boards (ipai-platform project)
  # and spec-kit task bundles (spec/*/tasks.md)
  reference: "dev.azure.com/insightpulseai/ipai-platform/_sprints"

# ============================================================================
# Financial Model
# ============================================================================

financial_model:
  pricing:
    base_subscription:
      price: 49
      unit: "USD/user/month"
      note: "Placeholder — validate against TBWA pilot willingness-to-pay"
    metered_dimensions:
      ai_queries:
        included: 500
        overage: 0.02
        unit: "USD/call"
      docai_pages:
        included: 100
        overage: 0.10
        unit: "USD/page"
      genie_minutes:
        included: 60
        overage: 0.05
        unit: "USD/minute"

  costs:
    azure_monthly:
      aca_runtime: 150        # 6 container apps, Basic tier
      postgresql: 125         # D2s_v3 General Purpose
      databricks: 200         # On-demand clusters (consumption)
      ai_services: 50         # gpt-4.1-mini (low volume during build)
      redis: 15               # Basic C0
      signalr: 0              # Free tier
      key_vault: 5            # Standard, low ops
      storage: 10             # ADLS + blob
      dns: 2                  # 2 zones
      monitoring: 20          # Log Analytics + App Insights
      total: 577
      note: "Dev environment costs — production will be higher per customer"

    isv_credits_offset:
      azure_sponsorship: 5000  # $5K over 12 months = ~$417/month
      net_azure_cost: 160      # $577 - $417 = ~$160/month out-of-pocket

    team_monthly:
      salaries: 0              # Founder-led, no payroll yet
      contractors: 500         # Occasional dev support
      tools: 100               # GitHub, domains, SaaS tools
      total: 600

    total_monthly_burn: 760    # $160 Azure + $600 team
    total_annual_burn: 9120

  revenue_targets:
    # Locked targets (base scenario)
    R3_monthly: 1470           # 3 customers × 5 users × $49 + metered
    R4_monthly: 3920           # 10 customers × 8 users × $49 + metered
    Y1_arr: 47040

  unit_economics:
    arpu_monthly: 392          # $49 × 8 users/customer
    arpu_annual: 4704
    cac_target: 500            # < 1 month ARPU
    ltv_target: 14112          # ARPU × 36 months × 80% retention
    ltv_cac_ratio: 28          # Target > 3x
    payback_months: 1.3        # CAC / ARPU monthly

  break_even:
    monthly_burn: 760
    arpu_monthly: 392
    customers_to_break_even: 2 # $760 / $392 = 1.94 → 2 customers
    target_date: "2026-10-01"  # R4-S13
    note: "Break-even at 2 paying customers. TBWA + 1 more."

  marketplace_economics:
    store_fee: "3%"
    publisher_payout: "97%"
    net_per_user: 47.53        # $49 × 97%
    renewal_discount: "50% agency fee on private offer renewals"

  isv_success_roi:
    benefits_value: 126000     # Core package
    renewal_fee: 1550
    roi_if_base: 3033          # ($47,040 ARR + $126K benefits) / $1,550 = 111x
    note: "Even with 0 revenue, the Azure credits + tools alone are worth 81x the renewal fee"

# ============================================================================
# Quarterly Review Cadence
# ============================================================================

review_cadence:
  monthly:
    - "MRR and customer count review"
    - "Azure consumption vs budget"
    - "Sprint velocity and capability delivery"
  quarterly:
    - "VMOKRAPI scorecard review (all PIs)"
    - "Solutions Partner score check"
    - "Pricing validation (willingness-to-pay from active customers)"
    - "Capability parity % update"
  annual:
    - "ISV Success renewal decision (Mar 2027)"
    - "Solutions Partner designation application"
    - "Financial model rebase for Year 2"
