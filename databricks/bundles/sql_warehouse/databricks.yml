targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: dev_ppm
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/sql-warehouse-dev

  staging:
    mode: development
    variables:
      catalog: staging_ppm
    workspace:
      root_path: /Workspace/Shared/sql-warehouse-staging

  prod:
    mode: production
    variables:
      catalog: ppm
    workspace:
      root_path: /Workspace/Shared/sql-warehouse
    run_as:
      service_principal_name: finance-ppm-service-principal
    permissions:
      - level: CAN_VIEW
        group_name: data-engineers
      - level: CAN_VIEW
        group_name: data-analysts
      - level: CAN_MANAGE
        group_name: platform-admins
