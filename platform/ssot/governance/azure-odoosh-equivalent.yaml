# Azure-Native Odoo.sh Equivalent — Machine-Readable Target State
# Human doc: docs/architecture/azure/AZURE_ODOOSH_EQUIVALENT.md

version: "1.0"
schema: ssot.governance.azure-odoosh-equivalent.v1
updated_at: "2026-03-15"

platform_goal: azure_native_odoosh_equivalent
doctrine: >
  Odoo.sh is the capability benchmark, not the implementation target.
  Azure is the deployment surface. Codify behavior on top of primitives.

# ---------------------------------------------------------------------------
# Canonical Naming
# ---------------------------------------------------------------------------
canonical_naming:
  databases:
    dev: odoo_dev
    dev_demo: odoo_dev_demo
    staging: odoo_staging
    production: odoo
  environments:
    dev: odoo-dev
    staging: odoo-staging
    production: odoo-production
  rule: >
    Database names use underscores (canonical, never renamed).
    Environment/infra labels use hyphens (Azure resource naming only).
    Never use: odoo_prod, odoo_core, odoo_stage, odoo_dev_clean.

# ---------------------------------------------------------------------------
# Control Plane
# ---------------------------------------------------------------------------
control_plane:
  source_control: github
  ci_cd:
    primary: github_actions
    selective: azure_devops_pipelines
  identity:
    provider: microsoft_entra_id
    managed_identity: true
  secrets:
    provider: azure_key_vault
    vault: kv-ipai-dev
    rotation_enforced: true

# ---------------------------------------------------------------------------
# Runtime Plane
# ---------------------------------------------------------------------------
runtime:
  compute: azure_container_apps
  fallback_compute: azure_vm
  database:
    service: azure_postgresql_flexible_server
    version: "16"
  filestore: azure_blob_storage
  registry: azure_container_registry
  preview_environments: true

  environments:
    dev:
      database: odoo_dev
      workers: 1
      mail: mailhog_sink
      cron: disabled
      integrations: sandbox
      url: erp-dev.insightpulseai.com
      backup_cadence: none
      access: developers

    staging:
      database: odoo_staging
      workers: 2
      mail: mailhog_sink
      cron: gated
      integrations: sandbox
      url: erp-staging.insightpulseai.com
      backup_cadence: daily
      backup_retention_days: 7
      data_source: sanitized_prod_snapshot
      access: dev_qa_pm

    production:
      database: odoo
      workers: 4
      mail: zoho_smtp
      cron: live
      integrations: live
      url: erp.insightpulseai.com
      backup_cadence: daily
      backup_retention_days: 30
      pitr: true
      access: all_authorized

# ---------------------------------------------------------------------------
# Edge / Routing
# ---------------------------------------------------------------------------
network_edge:
  dns: cloudflare
  public_edge: azure_front_door
  tls: managed_certificates
  waf: true

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
observability:
  logging: azure_log_analytics
  metrics: azure_monitor
  tracing: application_insights
  alerts:
    - name: odoo_health_down
      condition: "/web/health != 200 for 3min"
      severity: critical
      target: slack_ops_alerts
    - name: pg_cpu_high
      condition: "cpu > 80% for 5min"
      severity: warning
      target: slack_ops_alerts
    - name: container_restart_loop
      condition: "> 3 restarts in 10min"
      severity: critical
      target: slack_and_pagerduty
    - name: backup_failure
      condition: "daily backup job fails"
      severity: critical
      target: slack_and_email
  dashboards:
    - name: odoops_kpis
      kpis:
        - metric: uptime_prod
          target: ">99.5%"
        - metric: deploy_frequency
          target: ">1/week"
        - metric: deploy_lead_time
          target: "<4h"
        - metric: mttr
          target: "<1h"
        - metric: test_pass_rate
          target: ">95%"
        - metric: backup_success
          target: "100%"

# ---------------------------------------------------------------------------
# Non-prod Safety Controls
# ---------------------------------------------------------------------------
non_prod_safety:
  mail_catcher: true
  cron_controls: true
  sandbox_integrations: true
  staging_refresh_from_prod: true
  pii_masking: true
  payment_providers_test_mode: true

# ---------------------------------------------------------------------------
# Release Model
# ---------------------------------------------------------------------------
release_model:
  promotion_path: [dev, staging, production]
  dev_deploy: automatic_on_merge
  staging_deploy: manual_approval
  production_deploy: manual_approval_with_evidence
  rollback: supported
  evidence_required: true
  evidence_path: "docs/evidence/{YYYYMMDD-HHMM}/{scope}/"

# ---------------------------------------------------------------------------
# AI / Copilot Plane
# ---------------------------------------------------------------------------
ai_plane:
  copilot_runtime: microsoft_foundry
  gateway: true
  evaluations_required: true
  publish_gate: true
  bridge_module: ipai_enterprise_bridge

# ---------------------------------------------------------------------------
# Odoo.sh Parity Checklist
# ---------------------------------------------------------------------------
parity_status:
  - capability: every_commit_builds
    status: partial
    note: "CI exists, deploy gate missing"

  - capability: branch_test_environments
    status: planned

  - capability: staging_from_prod_data
    status: planned

  - capability: shell_access
    status: available
    method: "az ssh / ACA exec"

  - capability: logs_in_browser
    status: planned

  - capability: automated_test_builds
    status: partial

  - capability: shareable_branch_envs
    status: planned

  - capability: mail_catcher_non_prod
    status: planned

  - capability: backup_restore
    status: partial

  - capability: custom_domain_tls
    status: active

  - capability: monitoring_kpis
    status: planned

  - capability: promote_dev_staging_prod
    status: planned

  - capability: rollback
    status: planned

  - capability: addons_dependency_discovery
    status: active

  - capability: cron_controls_per_env
    status: planned

# ---------------------------------------------------------------------------
# Repo Ownership
# ---------------------------------------------------------------------------
repo_ownership:
  odoo:
    - "config/environments/"
    - "addons/ipai/"
    - "docker/Dockerfile.*"
    - ".github/workflows/ci-*"
  infra:
    - "infra/terraform/"
    - "infra/dns/"
    - "infra/keyvault/"
    - "infra/monitoring/"
    - "infra/frontdoor/"
  ops-platform:
    - "ops-platform/backup/"
    - "ops-platform/staging/"
    - "ops-platform/supabase/"
  agents:
    - "agents/foundry/"

# ---------------------------------------------------------------------------
# Implementation Phases
# ---------------------------------------------------------------------------
phases:
  - id: 1
    name: foundation
    status: mostly_complete
    items:
      - "ACA runtime deployed ✓"
      - "PostgreSQL connectivity ✓"
      - "Key Vault secrets ✓"
      - "Cloudflare → Front Door ✓"
      - "CI workflows (partial) ✓"
      - "ACR with automated builds — pending"
      - "Per-env config files — pending"

  - id: 2
    name: ci_cd_pipeline
    status: planned
    items:
      - "Build pipeline: commit → image → test → push"
      - "Deploy pipeline: dev (auto) → staging (gated) → prod (gated)"
      - "Odoo test matrix (--test-enable per changed module)"
      - "Spec validation gate"
      - "Deployment evidence capture"

  - id: 3
    name: environment_parity
    status: planned
    items:
      - "Dev env with mail sink + disabled crons"
      - "Staging env with refresh-from-prod"
      - "Production env with full observability"
      - "Preview environments per feature branch (stretch)"

  - id: 4
    name: observability
    status: planned
    items:
      - "Log Analytics workspace"
      - "Application Insights availability"
      - "PostgreSQL monitoring"
      - "Alert rules → Slack"
      - "OdooOps KPI dashboard"

  - id: 5
    name: backup_restore
    status: planned
    items:
      - "Daily automated backup (DB + filestore)"
      - "Staging refresh from sanitized prod"
      - "Point-in-time restore"
      - "Backup verification (restore test)"

  - id: 6
    name: non_prod_safety
    status: planned
    items:
      - "Mail catcher on dev/staging"
      - "Cron gating per environment"
      - "Integration sandbox mode"
      - "PII masking in staging refresh"
