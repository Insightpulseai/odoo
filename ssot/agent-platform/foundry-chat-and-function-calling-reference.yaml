# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not replacing agent_framework_adoption.yaml (that's the runtime substrate decision)
  - not a deployment manifest (infra/ owns that)
  - not a permissions matrix (ssot/identity/ owns that)
  - not a persona or task definition (agents/ owns those)

