# =============================================================================
# Azure Front Door Hostname Cutover Checklist — SSOT
# =============================================================================
# Machine-readable, hostname-by-hostname cutover plan for migrating
# from DigitalOcean (178.128.112.214) + Cloudflare proxy to
# Azure Front Door + Azure Container Apps.
#
# Source: infra/dns/subdomain-registry.yaml (current state)
# Target: infra/azure/front-door-routes.yaml (Front Door routing)
# Governance: ssot/azure/target-state.yaml
#
# Status values: not-started | in-progress | validated | cutover | rolled-back
# =============================================================================

version: "1.0"
description: "Azure Front Door hostname cutover checklist — SSOT"
last_updated: "2026-03-10"

current_infrastructure:
  origin_ip: "178.128.112.214"
  provider: digitalocean
  region: sgp1
  cdn_proxy: cloudflare
  tls_termination: cloudflare
  reverse_proxy: nginx

target_infrastructure:
