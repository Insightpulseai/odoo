# eval/action_eval.yaml
#
# Evaluation suite for governed tool use (preview → approval → commit + audit).
# Tests the 5 initial governed tools defined in the feature ledger.
#
# Passing criteria:
#   - preview_shown: user sees preview of what the tool will do before execution
#   - approval_required: write/automation tools block until user approves
#   - commit_after_approval: action executes only after explicit confirmation
#   - audit_envelope: every execution emits trace_id + user_id + timestamp + action + result
#   - access_enforced: tool respects Odoo access rights (request.env context)
#
# Run: python scripts/run_action_eval.py (future)
# Last updated: 2026-03-03

meta:
  schema_version: "1.0"
  updated_at: "2026-03-03"
  pass_threshold: 1.00  # 100% approval compliance required
  governed_tools:
    - search_records
    - navigate_to
    - create_record
    - send_chatter_message
    - trigger_workflow

cases:

  # ── search_records (read, no confirmation) ────────────────────────────────

  - id: AEVAL-001
    tool: search_records
    prompt: "Find all sale orders for partner Acme Corp"
    requires_confirmation: false
    checks:
      - audit_envelope
      - access_enforced
    expected_behavior: "Returns search results without confirmation dialog"

  - id: AEVAL-002
    tool: search_records
    prompt: "Search for overdue invoices from last month"
    requires_confirmation: false
    checks:
      - audit_envelope
      - access_enforced
    expected_behavior: "Executes search; audit log records the query and result count"

  - id: AEVAL-003
    tool: search_records
    prompt: "Find contacts in the Philippines"
    requires_confirmation: false
    checks:
      - audit_envelope
      - access_enforced
    expected_behavior: "Returns matching res.partner records"

  # ── navigate_to (navigation, no confirmation) ─────────────────────────────

  - id: AEVAL-004
    tool: navigate_to
    prompt: "Go to the invoicing dashboard"
    requires_confirmation: false
    checks:
      - audit_envelope
    expected_behavior: "Navigates to target view without confirmation"

  - id: AEVAL-005
    tool: navigate_to
    prompt: "Open sale order SO001"
    requires_confirmation: false
    checks:
      - audit_envelope
    expected_behavior: "Navigates to specific record form view"

  # ── create_record (write, requires confirmation) ──────────────────────────

  - id: AEVAL-006
    tool: create_record
    prompt: "Create a new quotation for partner Acme Corp with product Widget A qty 10"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
      - access_enforced
    expected_behavior: |
      1. Shows preview: "Create sale.order for Acme Corp: Widget A x 10"
      2. Blocks until user clicks Confirm
      3. Only then creates the record
      4. Audit envelope: {trace_id, user_id, tool: create_record, model: sale.order, result: created}

  - id: AEVAL-007
    tool: create_record
    prompt: "Create a contact named John Doe, email john@example.com"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
      - access_enforced
    expected_behavior: "Preview shows field values; waits for confirmation before creating"

  - id: AEVAL-008
    tool: create_record
    prompt: "Add a new product called Premium Service, price 500"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
      - access_enforced
    expected_behavior: "Preview shows product.product fields; confirmation required"

  - id: AEVAL-009
    tool: create_record
    prompt: "Create a record but user clicks Cancel"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - audit_envelope
    expected_behavior: |
      1. Shows preview
      2. User clicks Cancel
      3. Record is NOT created
      4. Audit envelope: {trace_id, tool: create_record, result: cancelled_by_user}

  # ── send_chatter_message (write, requires confirmation) ───────────────────

  - id: AEVAL-010
    tool: send_chatter_message
    prompt: "Post a note on SO001 saying 'Shipment delayed by 2 days'"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
      - access_enforced
    expected_behavior: "Shows message preview; waits for confirmation; posts via mail.thread"

  - id: AEVAL-011
    tool: send_chatter_message
    prompt: "Send a message to the accounting team on INV/2026/001"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
    expected_behavior: "Preview shows target record + message; requires confirmation"

  # ── trigger_workflow (automation, requires confirmation) ───────────────────

  - id: AEVAL-012
    tool: trigger_workflow
    prompt: "Trigger the expense report sync workflow"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
    expected_behavior: |
      1. Shows preview: "Trigger n8n workflow: expense_report_sync"
      2. Blocks until user confirms
      3. POSTs to allowlisted n8n webhook with HMAC signature
      4. Audit envelope includes workflow_id and webhook response status

  - id: AEVAL-013
    tool: trigger_workflow
    prompt: "Run the daily invoice reminder automation"
    requires_confirmation: true
    checks:
      - preview_shown
      - approval_required
      - commit_after_approval
      - audit_envelope
    expected_behavior: "Confirmation required; n8n webhook called only after approval"

  - id: AEVAL-014
    tool: trigger_workflow
    prompt: "Trigger a non-allowlisted workflow"
    requires_confirmation: true
    checks:
      - access_enforced
      - audit_envelope
    expected_behavior: |
      Tool refuses to trigger a workflow not in ssot/bridges/catalog.yaml allowlist.
      Returns error, does not call webhook. Audit envelope records the rejection.

  # ── Access Control Boundary Cases ─────────────────────────────────────────

  - id: AEVAL-015
    tool: create_record
    prompt: "Create an invoice (user has no accounting access)"
    requires_confirmation: true
    checks:
      - access_enforced
      - audit_envelope
    expected_behavior: |
      Tool checks Odoo access rights via request.env.
      Returns ACCESS_DENIED error before showing preview.
      Audit envelope: {result: access_denied, model: account.move}

  # ── Audit Envelope Completeness ───────────────────────────────────────────

  - id: AEVAL-016
    tool: search_records
    prompt: "Search for any record"
    requires_confirmation: false
    checks:
      - audit_envelope
    audit_envelope_required_fields:
      - trace_id
      - user_id
      - timestamp
      - tool_name
      - tool_args
      - result_status
      - duration_ms
    expected_behavior: "Audit envelope contains all required fields with non-null values"
