# schema: ssot.parity.ee_to_oca_proof.v2
# Evidence-based EE→OCA parity proof matrix with execution fields.
# Each entry must have at least one evidence_link (URL) proving the parity path.
# Universal EE→OCA replacement is NOT claimed. Coverage is proven per-feature.
#
# Companion doc: docs/parity/EE_TO_OCA_PROOF.md
# Derived map: ssot/parity/ee_to_oca_execution_map.yaml
# Related SSOTs: ssot/parity/ee_to_oca_matrix.yaml (operational), ssot/parity/odoo_enterprise.yaml (status)
#
# parity_path values:
#   oca_direct    — OCA module provides direct replacement for EE feature
#   oca_partial   — OCA module covers the outcome but not the full EE UX/feature set
#   bridge        — External service + ipai_* connector fills the gap
#   gap           — No known open replacement; gap accepted or build/bridge needed
#
# route values (execution action):
#   adopt_oca         — OCA module is 18.0-ready, pin and install
#   port_then_adopt   — OCA module exists but needs 18.0 port first
#   bridge            — Already bridged via ipai_* connector to external service
#   build_ipai        — No OCA path; build custom ipai_* addon
#   accept_gap        — Gap accepted; not in scope or waived
#
# odoo18_support values:
#   yes           — Module confirmed working on Odoo 18.0
#   needs_port    — Module exists for older versions, 18.0 port required
#   unknown       — Not yet evaluated for 18.0 compatibility

version: 2
meta:
  owner: platform
  purpose: "Evidence-based proof matrix mapping EE-only features to OCA/bridge alternatives with execution routing"
  created: "2026-03-03"
  last_reviewed: "2026-03-03"
  source_of_truth_for_ee_features: "https://www.odoo.com/page/editions"
  disclaimer: >
    Universal EE→OCA replacement is NOT provable — some EE features are platform services
    (IAP/Extract, Odoo.sh, Studio UX) with no 1:1 open alternative.
    This matrix proves coverage per-feature with traceable citations.

schema_rules:
  required_fields:
    - ee_feature_id
    - parity_path
    - route
    - odoo18_support
  parity_path_values: [oca_direct, oca_partial, bridge, gap]
  route_values: [adopt_oca, port_then_adopt, bridge, build_ipai, accept_gap]
  odoo18_support_values: [yes, needs_port, unknown, "n/a"]

# ── Proven entries (with evidence links + execution fields) ───────────────────

entries:

  # --- Productivity ---

  - ee_feature_id: PRODUCTIVITY.SPREADSHEET
    ee_module_name: spreadsheet_edition
    description: "Collaborative spreadsheets inside Odoo (EE-only)"
    parity_path: oca_direct
    route: port_then_adopt
    owner: platform
    milestone: M2_next
    ledger_feature_id: "F-PARITY-001"
    gates_required: [ci_pass]
    oca_repo: OCA/spreadsheet
    oca_modules:
      - spreadsheet_oca
    evidence_links:
      - url: "https://apps.odoo.com/apps/modules/16.0/spreadsheet_oca"
        description: "OCA app store listing — explicitly states alternative to spreadsheet_edition (EE)"
    odoo18_support: needs_port
    notes: >
      spreadsheet_oca is listed as a direct alternative to the proprietary spreadsheet_edition.
      Available for 16.0; 18.0 port status needs verification.

  - ee_feature_id: PRODUCTIVITY.DOCUMENTS
    ee_module_name: documents
    description: "Document management with workspaces, tags, and workflows (EE-only)"
    parity_path: oca_direct
    route: port_then_adopt
    owner: platform
    milestone: M2_next
    ledger_feature_id: "F-PARITY-002"
    gates_required: [ci_pass]
    oca_repo: OCA/dms
    oca_modules:
      - dms
    evidence_links:
      - url: "https://github.com/OCA/dms"
        description: "OCA/dms GitHub repo — document management ecosystem"
      - url: "https://www.odoo.com/forum/help-1/cant-find-documents-modul-in-oddo-17-community-edition-270485"
        description: "Odoo forum — community recommends OCA DMS as CE alternative to Documents"
    odoo18_support: needs_port
    notes: >
      OCA/dms provides open-source document management. Forum users recommend it as the CE
      alternative. UX is simpler than EE Documents but covers core DMS outcome.

  - ee_feature_id: PRODUCTIVITY.SIGN
    ee_module_name: sign
    description: "Electronic signature requests and tracking (EE-only)"
    parity_path: oca_partial
    route: port_then_adopt
    owner: platform
    milestone: backlog
    ledger_feature_id: "F-PARITY-003"
    gates_required: [ci_pass]
    oca_repo: OCA/sign
    oca_modules:
      - sign
    evidence_links:
      - url: "https://github.com/OCA/sign"
        description: "OCA/sign GitHub repo — signature-related addons"
      - url: "https://odoo-community.org/shop/purchase-sign-715953"
        description: "OCA shop — Purchase Sign module (sign flows on business docs)"
      - url: "https://www.odoo.com/app/sign"
        description: "Odoo Sign marketing page — reference for full EE feature set"
    odoo18_support: unknown
    notes: >
      OCA/sign provides signature flows on business documents. Classified as oca_partial
      because Odoo's EE Sign is a polished standalone product with templates, roles, and
      PDF annotation. OCA covers the outcome (get a signature) but not the full UX.

  # --- Finance ---

  - ee_feature_id: FINANCE.ACCOUNTING_ADVANCED
    ee_module_name: account_accountant
    description: "Advanced accounting with reconciliation widget, lock dates, reports"
    parity_path: oca_partial
    route: port_then_adopt
    owner: finance
    milestone: M1_launch
    ledger_feature_id: "F-PARITY-004"
    gates_required: [ci_pass]
    oca_repo: OCA/account-financial-tools
    oca_modules:
      - account_move_line_search_all
      - account_lock_date_update
    evidence_links:
      - url: "https://github.com/OCA/account-financial-tools"
        description: "OCA account-financial-tools — supplementary accounting modules"
    odoo18_support: needs_port
    notes: >
      CE account module covers core accounting. OCA supplements advanced features.
      account_accountant's reconciliation widget has no full OCA equivalent — partial parity.
      Classified oca_partial rather than gap because core accounting functions are met.

  - ee_feature_id: FINANCE.VENDOR_BILL_OCR
    ee_module_name: documents_ocr
    description: "Automatic vendor bill digitization via OCR (IAP-based in EE)"
    parity_path: bridge
    route: bridge
    owner: finance
    milestone: M1_launch
    ledger_feature_id: "F-PARITY-005"
    gates_required: [ci_pass, spec_bundle_exists, tool_contract_exists]
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://github.com/Insightpulseai/odoo/tree/main/addons/ipai/ipai_expense_ocr"
        description: "ipai_expense_ocr module — PaddleOCR-VL bridge for receipt OCR"
    odoo18_support: "yes"
    notes: >
      EE uses IAP credits for OCR. We use self-hosted PaddleOCR-VL on DO droplet.
      ipai_expense_ocr bridges Odoo to the OCR service. No OCA equivalent exists.

  - ee_feature_id: FINANCE.EXPENSE_ADVANCE
    ee_module_name: hr_expense (EE extensions)
    description: "Cash advance request, approval, release, liquidation"
    parity_path: oca_partial
    route: port_then_adopt
    owner: finance
    milestone: M1_launch
    ledger_feature_id: "F-PARITY-006"
    gates_required: [ci_pass, spec_bundle_exists]
    oca_repo: OCA/hr-expense
    oca_modules:
      - hr_expense_advance_clearing
    evidence_links:
      - url: "https://github.com/OCA/hr-expense"
        description: "OCA/hr-expense repo — submodule present but empty for 18.0"
    odoo18_support: unknown
    notes: >
      OCA has hr_expense_advance_clearing for older versions. 18.0 port status unknown.
      Submodule is checked out but empty. Using ipai_hr_expense_liquidation as interim.
      Marked [NEEDS CLARIFICATION] — adopt OCA when 18.0 port is available.

  # --- AI / Platform ---

  - ee_feature_id: PLATFORM.AI_TOOLS
    ee_module_name: enterprise_ai
    description: "Odoo AI app — BYOM with OpenAI/Gemini API key, AI fields, agents"
    parity_path: bridge
    route: bridge
    owner: ai
    milestone: M1_launch
    ledger_feature_id: "F-PARITY-007"
    gates_required: [ci_pass, spec_bundle_exists, tool_contract_exists]
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://github.com/Insightpulseai/odoo/tree/main/addons/ipai/ipai_ai_copilot"
        description: "ipai_ai_copilot — 14-tool copilot sidebar with Gemini provider"
      - url: "https://github.com/Insightpulseai/odoo/blob/main/ssot/ai/provider_policy.yaml"
        description: "Provider policy SSOT — Gemini-first routing with capability-specific models"
    odoo18_support: "yes"
    notes: >
      EE v19 BYOM: AI app with bring-your-own API key. IAP NOT used for v19 AI.
      CE replacement: IPAI AI Provider Bridge + ipai_ai_copilot (14 tools).
      OCA has ai_oca_native_generate_ollama (vendored, Ollama html_editor only).

  - ee_feature_id: PLATFORM.ASK_AI
    ee_module_name: enterprise_ai
    description: "Ask AI button in html editor, Knowledge, Discuss, email, notes"
    parity_path: bridge
    route: bridge
    owner: ai
    milestone: M1_launch
    ledger_feature_id: "F-PARITY-008"
    gates_required: [ci_pass, spec_bundle_exists, tool_contract_exists]
    oca_repo: null
    oca_modules:
      - ai_oca_native_generate_ollama  # vendored, Ollama only
    evidence_links:
      - url: "https://github.com/Insightpulseai/odoo/tree/main/addons/ipai/ipai_ai_copilot"
        description: "ipai_ai_copilot covers chatter surface; OCA ai module covers html_editor"
      - url: "https://github.com/Insightpulseai/odoo/blob/main/ssot/ai/oca_ai_integration.yaml"
        description: "OCA/ai integration model — Topics, Tools, Sources mapping"
    odoo18_support: "yes"
    notes: >
      OCA fallback: ai_oca_native_generate_ollama (html_editor surface only, Ollama).
      Full surface parity requires: copilot sidebar (ipai_ai_copilot) + html_editor
      (OCA ai module) + Gemini adapter (ipai_ai_oca_bridge_gemini, planned).

  # --- Services ---

  - ee_feature_id: SERVICES.HELPDESK
    ee_module_name: helpdesk
    description: "Customer support ticketing with SLA, ratings, and Knowledge base"
    parity_path: oca_partial
    route: port_then_adopt
    owner: platform
    milestone: M2_next
    ledger_feature_id: "F-PARITY-009"
    gates_required: [ci_pass]
    oca_repo: OCA/helpdesk
    oca_modules:
      - helpdesk
    evidence_links:
      - url: "https://github.com/OCA/helpdesk"
        description: "OCA/helpdesk repo — basic helpdesk ticketing"
    odoo18_support: needs_port
    notes: >
      OCA helpdesk covers basic ticketing. EE helpdesk adds SLA tracking, ratings,
      Knowledge base integration, and self-service portal. Classified oca_partial.

  # --- Platform services (no open equivalent) ---

  - ee_feature_id: PLATFORM.STUDIO
    ee_module_name: web_studio
    description: "No-code form/view builder with drag-and-drop customization"
    parity_path: gap
    route: accept_gap
    owner: null
    milestone: n_a
    ledger_feature_id: null
    gates_required: []
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://www.odoo.com/page/editions"
        description: "Odoo Editions page — Studio listed as EE-only"
      - url: "https://oec.sh/blog/odoo-community-vs-enterprise"
        description: "OEC analysis — acknowledges EE-only features without open alternatives"
    odoo18_support: "n/a"
    notes: >
      Studio is a proprietary no-code builder deeply integrated into EE.
      No OCA equivalent exists. Gap accepted — custom ipai_* override modules cover
      specific customization needs; drag-drop builder waived.

  - ee_feature_id: PLATFORM.ODOO_SH
    ee_module_name: null  # platform service, not a module
    description: "Managed hosting with CI/staging/dev branches and automated upgrades"
    parity_path: gap
    route: accept_gap
    owner: null
    milestone: n_a
    ledger_feature_id: null
    gates_required: []
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://www.odoo.com/page/editions"
        description: "Odoo Editions page — Odoo.sh listed as EE-only platform service"
    odoo18_support: "n/a"
    notes: >
      Odoo.sh is a platform service, not a module. No open equivalent exists.
      IPAI uses DigitalOcean self-hosted with ops-convergence-scan for drift detection.
      Partial parity via CI/CD pipelines and DevContainer setup.

  - ee_feature_id: PLATFORM.IAP
    ee_module_name: iap
    description: "In-App Purchases for Odoo-hosted AI, SMS, lead generation services"
    parity_path: gap
    route: accept_gap
    owner: null
    milestone: n_a
    ledger_feature_id: null
    gates_required: []
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://www.odoo.com/page/editions"
        description: "Odoo Editions page — IAP is EE-only service infrastructure"
    odoo18_support: "n/a"
    notes: >
      IAP is a payment/credits infrastructure for Odoo-hosted services.
      Not applicable to self-hosted CE. OCR uses PaddleOCR, AI uses Gemini — no IAP needed.
      Gap accepted as architectural choice (self-hosted services over IAP credits).

  - ee_feature_id: SERVICES.SOCIAL_MARKETING
    ee_module_name: social
    description: "Social media marketing management"
    parity_path: gap
    route: accept_gap
    owner: null
    milestone: n_a
    ledger_feature_id: null
    gates_required: []
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://www.odoo.com/page/editions"
        description: "Odoo Editions page — Social Marketing listed as EE-only"
    odoo18_support: "n/a"
    notes: "Not a priority for InsightPulse AI use case. Gap accepted."

  - ee_feature_id: SERVICES.LOYALTY
    ee_module_name: loyalty
    description: "Loyalty programs, gift cards, and promotions"
    parity_path: gap
    route: accept_gap
    owner: null
    milestone: n_a
    ledger_feature_id: null
    gates_required: []
    oca_repo: null
    oca_modules: []
    evidence_links:
      - url: "https://www.odoo.com/page/editions"
        description: "Odoo Editions page — Loyalty listed as EE-only"
    odoo18_support: "n/a"
    notes: "Not applicable to current business model. Gap accepted."

# ── Summary statistics ────────────────────────────────────────────────────────

summary:
  total_entries: 14
  by_parity_path:
    oca_direct: 2       # Spreadsheet, Documents
    oca_partial: 4      # Sign, Accounting Advanced, Expense Advance, Helpdesk
    bridge: 3           # Vendor Bill OCR, AI Tools, Ask AI
    gap: 5              # Studio, Odoo.sh, IAP, Social, Loyalty
  by_route:
    port_then_adopt: 6  # Spreadsheet, Documents, Sign, Accounting, Expense, Helpdesk
    bridge: 3           # Vendor Bill OCR, AI Tools, Ask AI
    accept_gap: 5       # Studio, Odoo.sh, IAP, Social, Loyalty
  by_milestone:
    M1_launch: 5        # Accounting, Vendor Bill OCR, Expense, AI Tools, Ask AI
    M2_next: 3          # Spreadsheet, Documents, Helpdesk
    backlog: 1          # Sign
    n_a: 5              # All gaps
  coverage_note: >
    9 of 14 EE features have an OCA or bridge alternative (64%).
    5 gaps are either platform services (Studio, Odoo.sh, IAP) or non-applicable
    features (Social, Loyalty). No universal replacement claim is made.
