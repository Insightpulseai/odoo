name: AI-Powered Test Generation

# AI-driven test generation using Claude API for comprehensive test coverage
# Reference: docs/integrations/ODOO_AI_TESTING_AUTOMATION.md

on:
  pull_request:
    paths:
      - 'addons/ipai/**/models/*.py'
      - 'addons/ipai/**/controllers/*.py'
  workflow_dispatch:
    inputs:
      module_name:
        description: 'Module to generate tests for (e.g., ipai_finance_ppm)'
        required: true
      regenerate:
        description: 'Regenerate existing tests'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze-code:
    name: "🤖 AI Code Analysis"
    runs-on: ubuntu-latest
    outputs:
      test_spec: ${{ steps.ai-analyze.outputs.spec }}
      module_name: ${{ steps.module-info.outputs.module }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine module name
        id: module-info
        run: |
          if [ -n "${{ github.event.inputs.module_name }}" ]; then
            echo "module=${{ github.event.inputs.module_name }}" >> $GITHUB_OUTPUT
          else
            # Extract from PR files
            changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'addons/ipai/.*/models/*.py' | head -1)
            if [ -n "$changed_files" ]; then
              module=$(echo "$changed_files" | cut -d'/' -f3)
              echo "module=$module" >> $GITHUB_OUTPUT
            else
              echo "module=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install AI dependencies
        run: |
          pip install anthropic

      - name: AI Code Analysis
        id: ai-analyze
        if: steps.module-info.outputs.module != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODULE_NAME: ${{ steps.module-info.outputs.module }}
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import json
          from anthropic import Anthropic
          from pathlib import Path

          # Validate API key
          api_key = os.environ.get('ANTHROPIC_API_KEY')
          if not api_key:
              print("ERROR: ANTHROPIC_API_KEY not set")
              exit(1)

          client = Anthropic(api_key=api_key)
          module_name = os.environ['MODULE_NAME']
          module_path = Path(f'addons/ipai/{module_name}')

          if not module_path.exists():
              print(f"ERROR: Module path {module_path} does not exist")
              exit(1)

          # Read module code
          code_files = {}
          for pattern in ['**/*.py']:
              for file_path in module_path.glob(pattern):
                  if '__pycache__' not in str(file_path):
                      try:
                          with open(file_path, 'r') as f:
                              code_files[str(file_path.relative_to('addons/ipai'))] = f.read()
                      except Exception as e:
                          print(f"Warning: Could not read {file_path}: {e}")

          if not code_files:
              print(f"ERROR: No Python files found in {module_path}")
              exit(1)

          print(f"Analyzing {len(code_files)} files in {module_name}")

          # Generate test specification using Claude
          prompt = f"""
          Analyze this Odoo 19 module code and generate a comprehensive test specification.

          Module: {module_name}

          Code Files:
          {json.dumps({k: v[:500] + '...' if len(v) > 500 else v for k, v in code_files.items()}, indent=2)}

          Generate a JSON test specification with:
          - Unit tests for each model method
          - Integration tests for controller endpoints
          - Functional tests for user workflows
          - Edge cases and error scenarios
          - Performance test scenarios
          - Security test cases

          Output ONLY valid JSON in this format:
          {{
            "module": "{module_name}",
            "unit_tests": [
              {{
                "test_name": "test_method_name",
                "target_class": "ModelName",
                "target_method": "method_name",
                "test_cases": [
                  {{
                    "description": "Test case description",
                    "setup": "Setup code",
                    "input": "Input parameters",
                    "expected_output": "Expected result",
                    "assertions": ["self.assertEqual(...)"]
                  }}
                ],
                "edge_cases": []
              }}
            ],
            "integration_tests": [],
            "functional_tests": [],
            "performance_tests": [],
            "security_tests": []
          }}
          """

          try:
              message = client.messages.create(
                  model="claude-sonnet-4-20250514",
                  max_tokens=4096,
                  messages=[{"role": "user", "content": prompt}]
              )

              test_spec = message.content[0].text

              # Extract JSON from response
              import re
              json_match = re.search(r'\{[\s\S]*\}', test_spec)
              if json_match:
                  test_spec_json = json_match.group()
                  # Validate JSON
                  spec = json.loads(test_spec_json)

                  # Save to file
                  spec_path = Path('/tmp/test_spec.json')
                  with open(spec_path, 'w') as f:
                      json.dump(spec, f, indent=2)

                  print(f"Generated test specification with:")
                  print(f"  - {len(spec.get('unit_tests', []))} unit tests")
                  print(f"  - {len(spec.get('integration_tests', []))} integration tests")
                  print(f"  - {len(spec.get('functional_tests', []))} functional tests")
                  print(f"  - {len(spec.get('performance_tests', []))} performance tests")
                  print(f"  - {len(spec.get('security_tests', []))} security tests")

                  # Set output (using environment file for multiline)
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"spec={test_spec_json}\n")
              else:
                  print("ERROR: Could not extract JSON from Claude response")
                  print(f"Response: {test_spec[:500]}")
                  exit(1)

          except Exception as e:
              print(f"ERROR: Failed to generate test specification: {e}")
              exit(1)
          PYTHON_EOF

      - name: Upload test specification
        if: steps.ai-analyze.outputs.spec != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-spec
          path: /tmp/test_spec.json

  generate-tests:
    name: "🧪 Generate Test Files"
    runs-on: ubuntu-latest
    needs: analyze-code
    if: needs.analyze-code.outputs.module_name != ''
    steps:
      - uses: actions/checkout@v4

      - name: Download test specification
        uses: actions/download-artifact@v4
        with:
          name: test-spec
          path: /tmp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate test files
        env:
          MODULE_NAME: ${{ needs.analyze-code.outputs.module_name }}
          REGENERATE: ${{ github.event.inputs.regenerate }}
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import os
          from pathlib import Path

          module_name = os.environ['MODULE_NAME']
          regenerate = os.environ.get('REGENERATE', 'false').lower() == 'true'

          with open('/tmp/test_spec.json') as f:
              spec = json.load(f)

          test_dir = Path(f'addons/ipai/{module_name}/tests')

          # Check if tests already exist
          if test_dir.exists() and not regenerate:
              print(f"Tests directory already exists for {module_name}")
              print("Use regenerate=true to overwrite existing tests")
              exit(0)

          # Create tests directory
          test_dir.mkdir(parents=True, exist_ok=True)

          # Generate __init__.py
          init_file = test_dir / '__init__.py'
          with open(init_file, 'w') as f:
              f.write('# AI-Generated Tests\n')
              f.write(f'# Module: {module_name}\n')
              f.write(f'# Generated: {os.environ.get("GITHUB_RUN_ID", "local")}\n')

          # Generate unit tests
          for unit_test in spec.get('unit_tests', []):
              test_file = test_dir / f"test_{unit_test['test_name']}.py"

              with open(test_file, 'w') as f:
                  f.write("# AI-Generated Unit Test\n")
                  f.write(f"# Target: {unit_test.get('target_class', 'Unknown')}.{unit_test.get('target_method', 'Unknown')}\n\n")
                  f.write("from odoo.tests.common import TransactionCase\n")
                  f.write("from odoo.exceptions import ValidationError\n\n\n")
                  f.write(f"class Test{unit_test['test_name'].title().replace('_', '')}(TransactionCase):\n")
                  f.write(f'    """\n    AI-Generated Unit Tests for {unit_test.get("target_class", "Unknown")}.{unit_test.get("target_method", "Unknown")}\n    """\n\n')
                  f.write("    def setUp(self):\n")
                  f.write("        super().setUp()\n")
                  f.write("        # Setup test data\n")
                  f.write(f"        self.model = self.env['{unit_test.get('target_class', 'unknown.model')}']\n\n")

                  for i, test_case in enumerate(unit_test.get('test_cases', [])[:5]):  # Limit to 5 tests
                      method_name = test_case.get('description', f'case_{i}').lower().replace(' ', '_')[:50]
                      f.write(f"\n    def test_{method_name}(self):\n")
                      f.write(f'        """\n        {test_case.get("description", "Test case")}\n\n')
                      f.write(f'        Expected: {test_case.get("expected_output", "Success")}\n        """\n')
                      f.write(f"        # TODO: Implement test logic based on specification\n")
                      f.write(f"        # {test_case.get('setup', 'Setup')}\n")
                      f.write(f"        # Input: {test_case.get('input', 'None')}\n")
                      f.write('        self.assertTrue(True, "Test implementation required")\n')

          print(f"✅ Generated {len(spec.get('unit_tests', []))} unit test files")

          # Generate integration test skeleton
          if spec.get('integration_tests'):
              integration_file = test_dir / "test_integration.py"
              with open(integration_file, 'w') as f:
                  f.write("# AI-Generated Integration Tests\n")
                  f.write(f"# Module: {module_name}\n\n")
                  f.write("from odoo.tests.common import HttpCase\n")
                  f.write("import json\n\n\n")
                  f.write("class TestIntegration(HttpCase):\n")
                  f.write(f'    """\n    AI-Generated Integration Tests for {module_name}\n    """\n\n')
                  f.write("    def test_api_endpoints(self):\n")
                  f.write('        """Test API endpoints are accessible"""\n')
                  f.write("        # TODO: Implement based on specification\n")
                  f.write('        self.assertTrue(True, "Integration test implementation required")\n')
              print(f"✅ Generated integration test skeleton")

          PYTHON_EOF

      - name: Commit generated tests
        run: |
          git config user.name "AI Test Bot"
          git config user.email "ai-tests@insightpulseai.com"

          MODULE_NAME="${{ needs.analyze-code.outputs.module_name }}"

          git add "addons/ipai/${MODULE_NAME}/tests/" || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "test(ai): generate test suite for ${MODULE_NAME}

          AI-generated test suite includes:
          - Unit tests for model methods
          - Integration test skeleton
          - Test specifications

          Generated by: Claude Sonnet 4.5
          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Co-Authored-By: AI Test Bot <ai-tests@insightpulseai.com>"

      - name: Push tests
        run: |
          BRANCH_NAME="ai-tests/${{ needs.analyze-code.outputs.module_name }}-${{ github.run_id }}"
          git checkout -b "${BRANCH_NAME}"
          git push origin "${BRANCH_NAME}"

      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const moduleName = '${{ needs.analyze-code.outputs.module_name }}';
            const branchName = `ai-tests/${moduleName}-${{ github.run_id }}`;

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI Tests] ${moduleName}`,
              head: branchName,
              base: context.ref.replace('refs/heads/', ''),
              body: `
              ## 🤖 AI-Generated Test Suite

              **Module**: \`${moduleName}\`
              **Generated by**: Claude Sonnet 4.5

              ### Test Coverage
              - ✅ Unit tests (model methods)
              - ✅ Integration test skeleton
              - ⏳ Functional tests (manual implementation required)

              ### Next Steps
              - [ ] Review generated tests for accuracy
              - [ ] Implement functional test scenarios
              - [ ] Add edge cases if needed
              - [ ] Run test suite locally
              - [ ] Merge when tests pass

              ---
              **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              *Generated by AI Test Automation*
              `
            });
