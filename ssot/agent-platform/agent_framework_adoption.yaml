          - ingestion_worker.py
          - eval_worker.py
          - artifact_worker.py
    tests:
      - unit/
      - integration/
      - contract/
      - eval/
      - fixtures/
    apps:
      dev-console:
        - package.json
        - src/
        - README.md
    scripts:
      dev: [bootstrap.sh, run_api.sh, run_worker.sh, smoke.sh]
      ci: [contract_check.py, eval_gate.py]
      release: [package.sh, promote.sh]
    infra: [aca/, identities/, monitor/, env/]
    docker: [Dockerfile, Dockerfile.dev, compose.yaml]

# -----------------------------------------------------------------------------
