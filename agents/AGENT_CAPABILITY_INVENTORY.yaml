  - id: odoo-cli-safe
    domain: odoo_ce
    has_scripts: false
    has_bin: true
    has_policies: true
    path: skills/odoo-cli-safe/
    reason: "bin/odoo-safe wrapper with policy-constrained operations"

  - id: github-cli-safe
    domain: orchestration
    has_scripts: false
    has_bin: true
    has_policies: true
    path: skills/github-cli-safe/
    reason: "bin/gh-safe wrapper with policy-constrained GitHub operations"

  # --- OdooOps (have deploy/test scripts) ---
  - id: odooops-deploy
    domain: deployment
    has_scripts: true
    path: skills/odooops/odooops-deploy/
    reason: "scripts/deploy.sh — deploys Odoo apps to OdooOps platform"

  - id: odooops-test
    domain: deployment
    has_scripts: true
    path: skills/odooops/odooops-test/
    reason: "scripts/test.sh — runs Playwright E2E tests against environment"

  # --- Superset (Python executables) ---
