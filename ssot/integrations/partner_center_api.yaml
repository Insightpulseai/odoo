# Commercial Marketplace / Partner Center Ingestion Contract
# Maps Odoo Entra ID hooks to the Partner Center Billing endpoints

vendor: microsoft_partner_center
tier: marketplace_transactable
auth_method: entra_id_service_principal
target_publication_date: "2026-08-01"

interfaces:
  - name: saas_fulfillment_api
    version: "v2"
    endpoint: "https://marketplaceapi.microsoft.com/api/saas/subscriptions"
    purpose: "Handles provisioning, suspension, and reinstatement of Odoo tenants purchased via Azure Marketplace."
    required_odoo_handlers:
      - endpoint: "/api/marketplace/webhook"
        action: "ipai_marketplace_fulfillment.marketplace_webhook"
        description: "Receives resource updates (e.g. customer cancels subscription)."

  - name: commercial_marketplace_ingestion_api
    version: "v1"
    endpoint: "https://graph.microsoft.com/rp/product-ingestion"
    purpose: "Automated updates to pricing, plans, and technical configuration."

dependencies:
  entra_app_registration:
    name: "ipai-marketplace-fulfillment-bot"
    app_id_env: "MICROSOFT_MARKETPLACE_APP_ID"
    client_secret_env: "MICROSOFT_MARKETPLACE_SECRET"
    permissions:
      - "Publisher.ReadWrite.All"
      - "Application.Read.All"
