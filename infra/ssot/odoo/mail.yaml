# schema: ssot.odoo.mail.v1
# Odoo Outbound Mail — SSOT
# Defines the canonical SMTP transport per environment and the mail catcher policy.
#
# DECISION (2026-03-25):
#   Prod SMTP  → Zoho SMTP (smtppro.zoho.com:587) via ipai_zoho_mail module
#   Non-prod   → MailHog/Mailpit (localhost:1025) — email never delivered externally
#
# History:
#   2026-03-02: Mailgun SMTP (smtp.mailgun.org:2525) — initial decision
#   2026-03-11: Mailgun DEPRECATED — replaced by Zoho SMTP
#   2026-03-25: mail.yaml rewritten to match actual config (prod/staging/azure .conf files)
#
# Rationale:
#   - Mailgun (mg.insightpulseai.com) is on the deprecated list since 2026-03-11
#   - All Odoo .conf files (prod, staging, azure) already specify Zoho SMTP
#   - Zoho Mail handles both INBOUND (MX) and OUTBOUND (SMTP) for insightpulseai.com
#   - Credentials injected via Azure Key Vault managed identity → env vars
#
# Odoo module: addons/ipai/ipai_zoho_mail/
# Credential source: Azure Key Vault (kv-ipai-dev)
#   - zoho-smtp-user → ZOHO_SMTP_USER
#   - zoho-smtp-password → ZOHO_SMTP_PASSWORD
#
# See: config/prod/odoo.conf, config/azure/odoo.conf

version: "3.0.0"
schema: ssot.odoo.mail.v1
last_reviewed: "2026-03-25"

# ── Production transport ──────────────────────────────────────────────────────
production:
  provider: zoho_smtp
  smtp_server: smtppro.zoho.com
  smtp_port: 587
  smtp_ssl: starttls
  smtp_user_secret: zoho-smtp-user          # Azure Key Vault secret name
  email_from_domain: insightpulseai.com
  smtp_password_secret: zoho-smtp-password   # Azure Key Vault secret name
  odoo_module: ipai_zoho_mail
  credential_injection: azure_key_vault      # managed identity → Key Vault → env var

  odoo_params:
    - key: mail.catchall.domain
      value: insightpulseai.com
    - key: mail.default.from
      value: notifications

  policy:
    block_port_25: true
    require_auth: true
    require_starttls: true
    max_retry: 3
    sender_must_be_authorized_zoho_mailbox: true

# ── Inbound mail (Zoho — MX records) ─────────────────────────────────────────
inbound:
  provider: zoho
  mx_domain: insightpulseai.com
  dns_records:
    - type: MX
      host: "@"
      targets:
        - mx.zoho.com (priority 10)
        - mx2.zoho.com (priority 20)
        - mx3.zoho.com (priority 50)
    - type: TXT
      host: "@"
      value: "v=spf1 include:zoho.com ~all"
    - type: TXT
      host: "zoho._domainkey"
      value: "(DKIM key — managed in Zoho admin)"
    - type: TXT
      host: "_dmarc"
      value: "v=DMARC1; p=quarantine; rua=mailto:dmarc@insightpulseai.com"

# ── Non-production transport (mail catcher) ──────────────────────────────────
non_production:
  dev:
    provider: mailpit
    smtp_server: localhost
    smtp_port: 1025
    smtp_ssl: none
    notes: "Dev config (config/dev/odoo.conf) — email captured locally, never sent"

  staging:
    provider: mailhog
    smtp_server: mailhog
    smtp_port: 1025
    smtp_ssl: none
    notes: "Staging config (config/staging/odoo.conf) — email captured at http://mailhog:8025"

  ci:
    provider: none
    notes: "CI tests do not send email. SMTP disabled."

  policy:
    never_use_prod_credentials: true
    enforce_catcher_routing: true
    block_external_delivery: true

# ── CI gate rules ─────────────────────────────────────────────────────────────
ci_gates:
  - id: no_port_25
    check: "SMTP_PORT != 25 in all environments"
    severity: error

  - id: no_prod_creds_in_non_prod
    check: "SMTP credentials must not be Zoho prod credentials in dev/staging"
    severity: error

  - id: no_mailgun_references
    check: "No references to smtp.mailgun.org or mg.insightpulseai.com in active config"
    severity: error

# ── Convergence checks ───────────────────────────────────────────────────────
convergence_checks:
  - id: zoho_server_exists
    check: >
      SELECT count(*) FROM ir_mail_server
      WHERE smtp_host ILIKE '%zoho%' AND active = true
    expected: ">= 1"
    severity: high
    remediation: "Install/update ipai_zoho_mail module"

  - id: zoho_server_is_primary
    check: >
      SELECT smtp_host FROM ir_mail_server
      WHERE active = true ORDER BY sequence ASC LIMIT 1
    expected_contains: "zoho"
    severity: high
    remediation: "Ensure Zoho mail server has lowest sequence among active ir.mail_server records"

  - id: no_mailgun_servers_active
    check: >
      SELECT count(*) FROM ir_mail_server
      WHERE active = true
        AND (smtp_host ILIKE '%mailgun%' OR smtp_host ILIKE '%mg.insightpulseai%')
    expected: "0"
    severity: high
    remediation: "Deactivate all Mailgun mail servers — Mailgun is deprecated"

  - id: zoho_password_present
    check: >
      SELECT count(*) FROM ir_mail_server
      WHERE smtp_host ILIKE '%zoho%' AND (smtp_pass IS NOT NULL AND smtp_pass != '')
    expected: ">= 1"
    severity: high
    remediation: "Set ZOHO_SMTP_PASSWORD env var via Azure Key Vault injection"

# ── Boundary rules ────────────────────────────────────────────────────────────
boundary_rules:
  - rule: "Prod Odoo MUST use Zoho SMTP via Azure Key Vault credential injection"
    rationale: "Secrets never hardcoded; managed identity → Key Vault → env var"
  - rule: "Zoho SMTP must have the lowest sequence among active ir.mail_server records"
    rationale: "Odoo selects server with lowest sequence; determinism requires no lower-sequence competitor"
  - rule: "smtp_pass values are never committed to git or XML data files"
    rationale: "Secrets in env vars / Key Vault only"
  - rule: "Sender addresses must be authorized Zoho mailboxes on insightpulseai.com"
    rationale: "Zoho rejects unauthorized sender addresses"

# ── Deprecated (never reintroduce) ───────────────────────────────────────────
deprecated:
  - provider: mailgun
    domain: mg.insightpulseai.com
    smtp_server: smtp.mailgun.org
    retired_date: "2026-03-11"
    reason: "Replaced by Zoho SMTP per CLAUDE.md deprecated items list"
    module: ipai_mailgun_smtp
    action: "Deactivate ir.mail_server records; do not uninstall module (may leave orphan data)"
