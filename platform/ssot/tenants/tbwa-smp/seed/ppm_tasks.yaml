# ---------------------------------------------------------------------------
# Seed: TBWA\SMP PPM task structure (agency workflow)
# ---------------------------------------------------------------------------
# Authority: ssot/tenants/tbwa-smp/seed/ppm_tasks.yaml
# Tenant:    TBWA\SMP (company_id=4)
# Program:   docs/programs/tbwa-smp-finance-program.md
# Doctrine:  Odoo CE 18 project.project + project.task; OCA/project extensions.
#            CDM target: msdyn_project + msdyn_projecttask.
# Locked:    2026-04-15
# ---------------------------------------------------------------------------

metadata:
  contract: tbwa-smp-ppm-seed
  locked_at: 2026-04-15
  status: specification    # populated with real data on A.M4
  notes: >
    Agency PPM template. One project per (client × campaign) pair.
    Sub-tasks follow canonical agency workflow: brief → concept →
    production → delivery → wrap. Time tracked against each stage.

# ---------------------------------------------------------------------------
# Project stages (project.task.type / project.project.stage)
# ---------------------------------------------------------------------------
project_stages:
  - name: Briefing
    sequence: 10
    fold: false
  - name: Concept
    sequence: 20
    fold: false
  - name: Client Review
    sequence: 30
    fold: false
  - name: Production
    sequence: 40
    fold: false
  - name: Delivery
    sequence: 50
    fold: false
  - name: Wrap
    sequence: 60
    fold: false
  - name: Closed
    sequence: 70
    fold: true           # folded = closed

# ---------------------------------------------------------------------------
# Task template per project stage (project.task with parent)
# ---------------------------------------------------------------------------
task_template:
  Briefing:
    - name: Client kickoff meeting
      planned_hours: 2
      priority: "1"
    - name: Brief document (approved)
      planned_hours: 4
      priority: "1"
    - name: Success criteria + KPIs locked
      planned_hours: 2
  Concept:
    - name: Creative territories (3)
      planned_hours: 16
    - name: Internal creative review
      planned_hours: 2
    - name: Concept deck prep
      planned_hours: 8
  "Client Review":
    - name: Client presentation
      planned_hours: 2
    - name: Client feedback consolidated
      planned_hours: 2
    - name: Revision round 1
      planned_hours: 8
    - name: Revision round 2 (if needed)
      planned_hours: 4
  Production:
    - name: Production brief to vendors
      planned_hours: 4
    - name: Shoot / recording / build
      planned_hours: 24     # variable; placeholder
    - name: Post-production
      planned_hours: 16
    - name: Version control / asset library
      planned_hours: 2
  Delivery:
    - name: Client delivery pack
      planned_hours: 4
    - name: Approval before go-live
      planned_hours: 2
    - name: Go-live / launch
      planned_hours: 4
  Wrap:
    - name: Post-campaign analytics
      planned_hours: 8
    - name: Learnings write-up
      planned_hours: 4
    - name: Billable hours reconciled to timesheet
      planned_hours: 2
    - name: Vendor invoices closed
      planned_hours: 2
    - name: Client final invoice issued
      planned_hours: 2

