# Databricks Asset Bundle: SQL Warehouse
# Pattern: default_sql (from databricks/bundle-examples)
# Purpose: SQL-based transforms, Gold marts, Platinum serving views, dashboards
# Spec: spec/databricks-bundles-foundation/

bundle:
  name: sql-warehouse

variables:
  catalog:
    description: Unity Catalog name (resolved per target)
    default: dev_ppm
  schema_bronze:
    description: Bronze schema name
    default: bronze
  schema_silver:
    description: Silver schema name
    default: silver
  schema_gold:
    description: Gold schema name
    default: gold
  schema_platinum:
    description: Platinum schema name (serving layer)
    default: platinum
  warehouse_id:
    description: SQL warehouse ID for queries
  databricks_host:
    description: Databricks workspace host URL

workspace:
  host: ${var.databricks_host}

include:
  - resources/jobs/*.yml
  - resources/dashboards/*.yml

