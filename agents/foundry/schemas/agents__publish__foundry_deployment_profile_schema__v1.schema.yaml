version: 1
namespace: ipai.agents.publish.foundry_deployment_profile_schema.v1
artifact_type: schema
repo_key: agents
domain: publish
subject: foundry_deployment_profile_schema

# ============================================================================
# FOUNDRY DEPLOYMENT PROFILE SCHEMA
# ============================================================================
# Every Foundry-targeted artifact MUST declare these 5 dimensions.
# Foundry distinguishes model hosting from workload execution.
# Agents/evals/batch run on Microsoft-managed container compute.
# ============================================================================

fields:
  model_hosting_mode:
    description: "How the model is deployed and served"
    required: true
    allowed:
      - foundry_standard_deployment       # Standard deployment in Foundry resource
      - azure_ai_hub_serverless_endpoint  # Serverless API endpoint in AI Hub
      - azure_ai_hub_managed_compute      # Managed compute in AI Hub

  workload_execution_mode:
    description: "How agents/evals/batch jobs execute"
    required: true
    allowed:
      - foundry_managed_container_compute # Microsoft-managed (default and only option)
    note: "Do NOT model agent runtime as your own app/container runtime"

  networking_mode:
    description: "Network integration and isolation level"
    required: true
    allowed:
      - platform_default                  # Standard Microsoft-managed networking
      - container_injection               # Container injected into your VNet
      - private_link_constrained          # Private Link with known limitations
    limitation_notes_required_for:
      - container_injection
      - private_link_constrained

  storage_mode:
    description: "Where agent state and artifacts are stored"
    required: true
    allowed:
      - microsoft_managed                 # Foundry-managed storage
      - customer_managed_storage          # BYO storage account

  secret_management_mode:
    description: "How secrets and keys are managed"
    required: true
    allowed:
      - foundry_managed_key_vault         # Microsoft-managed Key Vault
      - customer_connected_key_vault      # BYO Key Vault (kv-ipai-dev)

# ============================================================================
# VALIDATION RULES
# ============================================================================

validation:
  fail_if:
    - model_hosting_mode_missing
    - workload_execution_mode_missing
    - networking_mode_missing
    - storage_mode_missing
    - secret_management_mode_missing
    - private_networking_requested_without_limitation_notes
    - workload_execution_mode_not_foundry_managed
