version: 1
namespace: ipai.templates.packaging.channel_matrix.v1
artifact_type: registry
repo_key: templates
domain: packaging
subject: channel_matrix

# ============================================================================
# 5 PRODUCTIZATION CHANNELS
# ============================================================================

channels:
  - channel_key: internal_one_click
    class: internal_productization
    description: >
      One-click internal deployment for approved users and teams.
      Best for operator consoles, internal copilots, review workbenches, controlled pilots.
    deploy_model: self_hosted_or_org_managed
    distribution_surface:
      type: internal_catalog_or_repo_release
    preferred_template_sources:
      - foundry_solution_templates
      - azd_full_stack_templates
      - native_ipai_templates
    target_repos: [agents, web, odoo, automations, ops-platform]
    requirements:
      - spec_bundle_required
      - eval_pack_required
      - catalog_registration_required
      - owner_metadata_required
      - ipai_naming_rewrite_required

  - channel_key: azure_managed_application
    class: customer_installed_product
    description: >
      Customer- or IT-installed solution landing in target Azure subscription.
      Use for one-click deployable products and internal approved service-catalog offerings.
    deploy_model: customer_subscription
    distribution_surface:
      type: azure_managed_application
      modes: [internal_service_catalog, azure_marketplace]
    preferred_template_sources:
      - azd_full_stack_templates
      - foundry_solution_templates
      - native_ipai_templates
    target_repos: [infra, web, agents, ops-platform]
    requirements:
      - arm_package_required
      - ui_definition_required
      - managed_app_metadata_required
      - support_model_declared
      - policy_pack_required
      - evidence_bundle_required

  - channel_key: commercial_saas_offer
    class: hosted_saas_product
    description: >
      Centrally hosted InsightPulseAI product sold as a service.
      Customer subscribes rather than deploying resources into their own Azure estate.
    deploy_model: vendor_hosted_multitenant
    distribution_surface:
      type: commercial_marketplace_saas
    preferred_template_sources:
      - azd_full_stack_templates
      - foundry_solution_templates
      - native_ipai_templates
    target_repos: [web, ops-platform, agents, lakehouse]
    requirements:
      - tenant_model_declared
      - billing_and_entitlement_model_declared
      - control_plane_catalog_entry_required
      - sso_strategy_declared
      - support_and_sla_declared

  - channel_key: connector_plugin_extension
    class: embedded_ecosystem_extension
    description: >
      Product packaged to live inside an existing ecosystem: M365, Teams, Copilot, Tableau, etc.
    deploy_model: ecosystem_embedded
    distribution_surface:
      type: plugin_connector_app
      subtypes:
        - microsoft_365_agent_or_connector
        - teams_app
        - external_bi_connector
        - internal_platform_connector
    preferred_template_sources:
      - foundry_solution_templates
      - native_ipai_templates
    target_repos: [agents, web, odoo, ops-platform]
    requirements:
      - host_ecosystem_manifest_required
      - connector_contract_required
      - permission_model_declared
      - external_surface_binding_required
      - catalog_registration_required

  - channel_key: databricks_internal_app
    class: internal_data_product_surface
    description: >
      Internal authenticated Databricks app for analysts, operators, governed data workflows.
      NOT for public/customer-facing products.
    deploy_model: databricks_workspace_internal
    distribution_surface:
      type: databricks_apps
    preferred_template_sources:
      - native_ipai_templates
      - foundry_solution_templates
    target_repos: [lakehouse, agents, ops-platform]
    requirements:
      - authenticated_databricks_user_surface_only
      - no_public_anonymous_access
      - unity_catalog_binding_declared
      - internal_owner_declared
      - eval_pack_required

# ============================================================================
# TEMPLATE → CHANNEL DEFAULTS
# ============================================================================

template_to_channel_defaults:
  foundry_solution_templates:
    default_channels: [internal_one_click, connector_plugin_extension, commercial_saas_offer]
  azd_full_stack_templates:
    default_channels: [internal_one_click, azure_managed_application, commercial_saas_offer]
  aks_platform_engineering_sample:
    default_channels: [internal_one_click]
    restriction: pattern_extract_only
  native_ipai_templates:
    default_channels: [internal_one_click, databricks_internal_app, connector_plugin_extension, commercial_saas_offer]

# ============================================================================
# RULES
# ============================================================================

resolution_rules:
  - upstream_templates_are_accelerators_only: true
  - direct_prod_publish_from_unmodified_sample_forbidden: true
  - all_artifacts_must_be_rewritten_to_ipai_naming: true
  - all_artifacts_must_record_source_origin: true
  - all_publishable_artifacts_require_eval_and_catalog_entry: true
  - do_not_hardwire_template_source_to_product_channel: true
