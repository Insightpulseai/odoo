# IPAI Identity Copilot — Agent Skill Definition
#
# Our own equivalent of Microsoft Security Copilot for Entra.
# Runs on IPAI Foundry agent platform, powered by Azure OpenAI + Graph API.
# Does NOT require Security Copilot SCU licensing.
#
# Architecture:
#   User (natural language) → Foundry Agent Service → Tool Router
#     ├── KB RAG tools (grounded doc retrieval from entra-identity-docs index)
#     ├── Graph API tools (live tenant data via managed identity)
#     └── Reasoning tools (risk analysis, policy evaluation, recommendations)
#
# Data sources:
#   - Azure AI Search index: entra-identity-docs (KB for guidance)
#   - Microsoft Graph API v1.0/beta (live tenant data)
#   - Entra audit/sign-in logs via Graph API
#   - IPAI governance SSOT (local repo context)

name: ipai_identity_copilot
description: >
  IPAI's own Entra Identity Copilot — natural language investigation and management
  of Microsoft Entra ID. Mirrors Security Copilot capabilities using Foundry Agent Service
  + Graph API + KB RAG. Covers: user management, risk investigation, sign-in troubleshooting,
  Conditional Access analysis, app governance, PIM, access reviews, lifecycle workflows,
  device management, and audit log analysis.
version: "1.0"

service:
  app: apps/identity-copilot
  entrypoint: service.py
  runtime: azure-container-apps
  health_check: /health

identity:
  type: managed-identity
  graph_permissions:
    # Read-only permissions (V1 — investigation only)
    - User.Read.All
    - Group.Read.All
    - Directory.Read.All
    - AuditLog.Read.All
    - SignIn.Read.All
    - IdentityRiskEvent.Read.All
    - IdentityRiskyUser.Read.All
    - IdentityRiskyServicePrincipal.Read.All
    - Application.Read.All
    - Policy.Read.All
    - RoleManagement.Read.Directory
    - AccessReview.Read.All
    - EntitlementManagement.Read.All
    - PrivilegedAccess.Read.AzureAD
    - DeviceManagementManagedDevices.Read.All
    - IdentityProvider.Read.All
    - UserAuthenticationMethod.Read.All
    # Write permissions (V2 — gated by approval queue)
    # - User.ReadWrite.All
    # - PrivilegedAccess.ReadWrite.AzureAD
    # - Policy.ReadWrite.ConditionalAccess

tools:
  # =========================================================================
  # SECTION 1: Knowledge Base RAG Tools (grounded documentation retrieval)
  # =========================================================================

  - name: search_entra_docs
    description: >
      Search Entra ID documentation across all domains.
      Returns ranked chunks with citations.
    parameters:
      query:
        type: string
        required: true
      domain:
        type: string
        required: false
        description: >
          Filter: "enterprise-apps", "conditional-access", "id-protection",
          "authentication", "id-governance", "roles", "monitoring-health",
          "workload-identities", "devices", "graph-api"
      top_k:
        type: integer
        default: 8
    returns:
      type: array
      items:
        chunk_id: string
        content: string
        path: string
        heading_chain: string
        domain: string
        score: float
        citation: string

  - name: answer_entra_question
    description: >
      Answer a question about Entra ID using grounded retrieval.
      Returns answer with source citations.
    parameters:
      query:
        type: string
        required: true
      domain:
        type: string
        required: false
    returns:
      answer: string
      citations:
        type: array

  # =========================================================================
  # SECTION 2: Enterprise User Management (mirrors Security Copilot scenarios)
  # =========================================================================

  - name: get_user_details
    description: >
      Get user details — profile, roles, group memberships, licenses,
      authentication methods, registered devices, manager chain.
      Graph: GET /users/{id}?$select=...&$expand=memberOf,registeredDevices
    parameters:
      user:
        type: string
        required: true
        description: UPN, email, or object ID
    returns:
      user_profile: object
      roles: array
      groups: array
      devices: array
      auth_methods: array

  - name: get_group_details
    description: >
      Get group info — members, owners, type (security/M365), dynamic rules,
      nested groups, ownerless status.
      Graph: GET /groups/{id}?$expand=members,owners
    parameters:
      group:
        type: string
        required: true
        description: Group name, ID, or mail
    returns:
      group_info: object
      members: array
      owners: array

  - name: get_tenant_info
    description: >
      Get tenant details — ID, display name, verified domains, active licenses,
      technical/security contacts, tenant creation policy.
      Graph: GET /organization
    parameters: {}
    returns:
      tenant: object
      domains: array
      licenses: array

  - name: list_users
    description: >
      List/filter users by department, job title, location, creation date,
      account status, license assignment.
      Graph: GET /users?$filter=...&$orderby=...
    parameters:
      filter:
        type: string
        required: false
        description: "Natural language filter, e.g. 'users in Sales department'"
      top:
        type: integer
        default: 25
    returns:
      users: array
      count: integer

  # =========================================================================
  # SECTION 3: Sign-in & Audit Log Investigation
  # =========================================================================

  - name: get_signin_logs
    description: >
      Get sign-in logs for a user or across the tenant.
      Supports time range, status, app, location, device filters.
      Graph: GET /auditLogs/signIns?$filter=...
    parameters:
      user:
        type: string
        required: false
        description: UPN or object ID (omit for tenant-wide)
      hours:
        type: integer
        default: 48
        description: Look-back window in hours
      status:
        type: string
        required: false
        description: "Filter: 'success', 'failure', 'interrupted'"
      app:
        type: string
        required: false
        description: Application display name filter
    returns:
      signins: array
      summary:
        total: integer
        success: integer
        failure: integer
        mfa_required: integer

  - name: get_audit_logs
    description: >
      Get audit logs — directory changes, role assignments, policy changes,
      app consent, group modifications.
      Graph: GET /auditLogs/directoryAudits?$filter=...
    parameters:
      user:
        type: string
        required: false
      hours:
        type: integer
        default: 72
      category:
        type: string
        required: false
        description: "Category: 'UserManagement', 'GroupManagement', 'ApplicationManagement', 'RoleManagement', 'Policy', 'DeviceManagement'"
    returns:
      audits: array
      summary: object

  - name: troubleshoot_signin
    description: >
      Analyze a failed sign-in — identify root cause (CA block, MFA failure,
      password expired, account locked, IP block, device compliance).
      Combines sign-in log detail + CA policy evaluation + risk detection.
    parameters:
      user:
        type: string
        required: true
      hours:
        type: integer
        default: 24
    returns:
      failures: array
      root_causes: array
      recommendations: array

  # =========================================================================
  # SECTION 4: Risk Investigation (mirrors ID Protection scenarios)
  # =========================================================================

  - name: get_risky_users
    description: >
      List users flagged as risky by Entra ID Protection.
      Graph: GET /identityProtection/riskyUsers?$filter=riskLevel eq '...'
    parameters:
      risk_level:
        type: string
        required: false
        description: "'high', 'medium', 'low', or omit for all"
      top:
        type: integer
        default: 20
    returns:
      risky_users: array
      count: integer

  - name: summarize_user_risk
    description: >
      Deep risk summary for a specific user — risk level, risk state,
      risk detections, last risky sign-in, risk history, recommended actions.
      Mirrors Security Copilot's risky user summarization.
    parameters:
      user:
        type: string
        required: true
    returns:
      risk_level: string
      risk_state: string
      risk_detections: array
      risk_history: array
      recommendations: array

  - name: get_risky_apps
    description: >
      List risky service principals / workload identities.
      Graph: GET /identityProtection/riskyServicePrincipals
    parameters:
      risk_level:
        type: string
        required: false
      top:
        type: integer
        default: 20
    returns:
      risky_apps: array

  - name: assess_app_risk
    description: >
      Deep app risk assessment — permissions granted (delegated + application),
      consent type, credential expiry, unused status, owner info.
      Mirrors Security Copilot's application risk scenarios.
    parameters:
      app:
        type: string
        required: true
        description: App display name, app ID, or service principal ID
    returns:
      app_info: object
      permissions: array
      risk_indicators: array
      recommendations: array

  # =========================================================================
  # SECTION 5: Conditional Access Analysis
  # =========================================================================

  - name: list_ca_policies
    description: >
      List Conditional Access policies — state, conditions, grant/session controls.
      Graph: GET /identity/conditionalAccess/policies
    parameters:
      state:
        type: string
        required: false
        description: "'enabled', 'disabled', 'enabledForReportingButNotEnforced'"
    returns:
      policies: array
      count: integer

  - name: evaluate_ca_for_user
    description: >
      Evaluate which CA policies apply to a specific user + app combination.
      Simulates policy evaluation using user attributes, group memberships,
      app assignments, named locations, device state.
    parameters:
      user:
        type: string
        required: true
      app:
        type: string
        required: false
        description: Target application (omit for all apps)
    returns:
      applicable_policies: array
      grants_required: array
      blocks: array
      gaps: array

  - name: analyze_ca_coverage
    description: >
      Analyze CA policy coverage gaps — users/apps without MFA,
      legacy auth allowed, no device compliance required, admin accounts unprotected.
    parameters:
      focus:
        type: string
        required: false
        description: "'mfa', 'device-compliance', 'legacy-auth', 'admin-protection', 'all'"
    returns:
      coverage_score: float
      gaps: array
      recommendations: array

  # =========================================================================
  # SECTION 6: Authentication Methods
  # =========================================================================

  - name: get_auth_methods
    description: >
      Get authentication methods for a user or tenant-wide registration status.
      Graph: GET /users/{id}/authentication/methods
    parameters:
      user:
        type: string
        required: false
        description: UPN (omit for tenant-wide summary)
    returns:
      methods: array
      registration_summary: object

  # =========================================================================
  # SECTION 7: Roles & RBAC
  # =========================================================================

  - name: get_role_assignments
    description: >
      Get role assignments — who has what role, active vs eligible (PIM).
      Graph: GET /roleManagement/directory/roleAssignments
    parameters:
      user:
        type: string
        required: false
        description: Filter to a specific user
      role:
        type: string
        required: false
        description: Filter to a specific role name
    returns:
      assignments: array

  - name: get_pim_assignments
    description: >
      Get PIM eligible and active role assignments.
      Graph: GET /roleManagement/directory/roleEligibilityScheduleInstances
    parameters:
      user:
        type: string
        required: false
      role:
        type: string
        required: false
    returns:
      eligible: array
      active: array

  # =========================================================================
  # SECTION 8: ID Governance (access reviews, entitlement mgmt, lifecycle)
  # =========================================================================

  - name: get_access_reviews
    description: >
      List access reviews — status, reviewers, decisions, overrides.
      Graph: GET /identityGovernance/accessReviews/definitions
    parameters:
      status:
        type: string
        required: false
        description: "'InProgress', 'Completed', 'NotStarted'"
    returns:
      reviews: array

  - name: get_entitlement_packages
    description: >
      List access packages — catalogs, policies, assignments.
      Graph: GET /identityGovernance/entitlementManagement/accessPackages
    parameters:
      catalog:
        type: string
        required: false
    returns:
      packages: array

  - name: get_lifecycle_workflows
    description: >
      List lifecycle workflows — joiner, mover, leaver configurations,
      run history, task status.
      Graph: GET /identityGovernance/lifecycleWorkflows/workflows
    parameters:
      category:
        type: string
        required: false
        description: "'joiner', 'mover', 'leaver'"
    returns:
      workflows: array

  # =========================================================================
  # SECTION 9: Device Management
  # =========================================================================

  - name: get_devices
    description: >
      List/search devices — join type, compliance, OS, last activity.
      Graph: GET /devices?$filter=...
    parameters:
      user:
        type: string
        required: false
      join_type:
        type: string
        required: false
        description: "'azureADJoined', 'azureADRegistered', 'hybridAzureADJoined'"
      compliant:
        type: boolean
        required: false
    returns:
      devices: array

  # =========================================================================
  # SECTION 10: Enterprise App Governance
  # =========================================================================

  - name: get_enterprise_apps
    description: >
      List enterprise applications — SSO type, provisioning status,
      user assignment required, sign-in activity.
      Graph: GET /servicePrincipals?$filter=...
    parameters:
      sso_type:
        type: string
        required: false
        description: "'saml', 'oidc', 'password', 'linked'"
      unused_days:
        type: integer
        required: false
        description: Flag apps not signed into for N days
    returns:
      apps: array

  - name: audit_app_permissions
    description: >
      Audit permissions granted to enterprise apps — over-privileged apps,
      admin-consented vs user-consented, high-risk permissions.
    parameters:
      app:
        type: string
        required: false
        description: Filter to specific app (omit for tenant-wide audit)
    returns:
      apps: array
      high_risk: array
      recommendations: array

  # =========================================================================
  # SECTION 11: Health & Recommendations
  # =========================================================================

  - name: get_health_alerts
    description: >
      Get Entra health monitoring alerts — sign-in success rate anomalies,
      MFA failure spikes, service degradation.
      Graph: GET /reports/serviceActivity/getMetricsForConditionalAccessCompliantDevicesSignInSuccess
    parameters:
      hours:
        type: integer
        default: 24
    returns:
      alerts: array
      metrics: object

  - name: get_recommendations
    description: >
      Get Entra recommendations — security posture improvements,
      Identity Secure Score, actionable guidance.
      Graph: GET /directory/recommendations
    parameters:
      category:
        type: string
        required: false
        description: "'identityBestPractice', 'identitySecureScore', 'all'"
    returns:
      recommendations: array
      secure_score: object

  - name: get_sla_report
    description: >
      Get SLA attainment report — monthly authentication availability.
      Graph: GET /reports/sla/azureADAuthentication
    parameters:
      months:
        type: integer
        default: 3
    returns:
      monthly_reports: array

  # =========================================================================
  # SECTION 12: Provisioning
  # =========================================================================

  - name: get_provisioning_logs
    description: >
      Get provisioning logs — user provisioning status, failures, sync cycles.
      Graph: GET /auditLogs/provisioning?$filter=...
    parameters:
      app:
        type: string
        required: false
      status:
        type: string
        required: false
        description: "'success', 'failure', 'skipped'"
      hours:
        type: integer
        default: 24
    returns:
      logs: array
      summary: object

knowledge_source: agents/knowledge/entra_identity/source.yaml
chunking_config: agents/knowledge/entra_identity/chunking.yaml
indexing_config: agents/knowledge/entra_identity/indexing.yaml

# Architecture notes:
#
# This skill is our own equivalent of Microsoft Security Copilot for Entra.
# Key differences:
#   1. No Security Copilot SCU licensing required
#   2. Runs on IPAI Foundry Agent Service (azure-ai-projects 2.x)
#   3. Uses managed identity + Graph API for live data (not Security Copilot plugins)
#   4. KB RAG for grounded documentation guidance
#   5. V1 is read-only (investigation). V2 adds gated write actions via approval queue.
#
# Security Copilot parity:
#   - Entra ID scenarios:        15/15 (tenants, users, groups, domains, licenses,
#                                         sign-in logs, audit logs, provisioning logs,
#                                         recommendations, health alerts, SLA,
#                                         roles, devices, CA, authentication)
#   - ID Protection scenarios:    2/2  (risky users, app risk)
#   - ID Governance scenarios:    5/5  (access reviews, entitlement mgmt, PIM,
#                                        PIM write actions [V2], lifecycle workflows)
#   - Global Secure Access:       0/1  (not in scope — requires separate network KB)
#
# Total: 22/23 Security Copilot scenarios covered (96% parity)
