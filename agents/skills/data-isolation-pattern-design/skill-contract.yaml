id: data-isolation-pattern-design
name: Data Isolation Pattern Design
version: 0.1.0
type: benchmark_skill
classification: capability_uplift
family: azure-saas-mt
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Select and implement data isolation patterns for multi-tenant SaaS,
  covering database-per-tenant, schema-per-tenant, row-level isolation,
  hybrid patterns, and per-tenant encryption.

triggers:
  - "Choosing data isolation strategy for new multi-tenant platform"
  - "Current data isolation insufficient for compliance"
  - "Tenant data breach risk assessment"
  - "Scaling beyond current isolation model limits"

inputs:
  - tenant_count: "Current and projected tenant count"
  - data_sensitivity: "Classification level (public, internal, confidential, restricted)"
  - compliance_requirements: "GDPR, SOC2, PCI-DSS, data residency"
  - performance_requirements: "Latency SLA, throughput per tenant"
  - cost_constraints: "Budget per tenant for data infrastructure"

steps:
  - "Assess data sensitivity and compliance requirements per tenant tier"
  - "Evaluate isolation patterns against requirements matrix"
  - "Select primary pattern with justification"
  - "Design per-tenant encryption strategy (keys, rotation)"
  - "Implement row-level security or schema boundaries"
  - "Validate isolation via cross-tenant access testing"

outputs:
  - isolation_pattern: "Selected pattern with decision rationale"
  - database_topology: "Database/schema layout per tenant tier"
  - encryption_design: "Per-tenant encryption keys and rotation policy"
  - rls_policies: "Row-level security policies if using shared tables"
  - migration_path: "Strategy to move tenants between isolation levels"

guardrails:
  - "No tenant query may access another tenant's data without explicit cross-tenant grant"
  - "Encryption keys must be per-tenant for confidential/restricted data"
  - "RLS policies must be enforced at database level, not just application level"
  - "Backup and restore must be scoped to individual tenants"

evidence:
  - "Cross-tenant query returns zero rows for non-owned data"
  - "Per-tenant backup and restore tested successfully"
  - "Encryption key rotation does not cause downtime"

dependencies:
  - saas-resource-organization
  - tenant-identity-isolation

evals:
  - scenario: "Shared table query without tenant filter"
    pass: "RLS policy returns only authenticated tenant's data"
  - scenario: "Tenant data export for GDPR request"
    pass: "Export contains only requesting tenant's data, verified complete"
  - scenario: "Tenant deletion"
    pass: "All tenant data removed, no residual data in shared tables"

benchmark_source: "Azure SQL Elastic Pools, Cosmos DB Partitioning, PostgreSQL RLS"
