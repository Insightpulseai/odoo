  target: "self-hosted on Azure VM"
  steps:
    - phase: 1
      name: "Deploy empty stack"
      status: complete
      completed: "2026-03-10"
      actions:
        - "Provision Azure VM (Standard_D4s_v5, 4.193.100.31) ✓"
        - "Deploy Docker Compose stack (official supabase/docker) ✓"
        - "14 containers healthy ✓"
        - "n8n deployed with persistent encryption key ✓"
        - "All services bound to localhost, nginx reverse proxy ✓"
        - "NSG locked to SSH + HTTP/HTTPS only ✓"
        - "28 secrets in Azure Key Vault ✓"
        - "DNS records: pending manual creation in Cloudflare"
    - phase: 2
      name: "Migrate database schema"
      status: pending
      actions:
        - "Export schema from managed Supabase"
        - "Apply migrations to self-hosted PostgreSQL"
        - "Verify extensions (pgvector, pgjwt, pg_graphql)"
    - phase: 3
      name: "Migrate data"
      status: pending
      actions:
        - "pg_dump from managed instance"
        - "pg_restore to self-hosted"
        - "Verify row counts and RLS policies"
    - phase: 4
      name: "Migrate edge functions"
      status: pending
      actions:
        - "Copy supabase/functions/ to volumes/functions/"
        - "Test all function endpoints"
    - phase: 5
      name: "Cutover"
      status: pending
      actions:
        - "Update SUPABASE_URL in all consumers (n8n, Odoo, apps)"
        - "Update DNS records"
        - "Decommission managed project after 30-day validation"
