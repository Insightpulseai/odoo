id: multitenancy-readiness-judge
version: 1
status: active
classification: encoded_preference
persona: saas-operations-judge
updated_at: "2026-03-17"

purpose: >
  Judge whether a SaaS platform is operationally ready for multi-tenant
  production use.

inputs:
  - architecture_docs: "SaaS architecture design documents"
  - isolation_test_results: "Cross-tenant isolation test evidence"
  - scale_test_results: "Multi-tenant load test evidence"
  - chaos_test_results: "Failure injection test evidence"
  - slo_definitions: "SLO targets per tier"
  - deployment_strategy: "Deployment and rollback procedures"

outputs:
  - readiness_verdict: "GO or NO-GO with rationale"
  - readiness_scorecard: "Scored assessment across all dimensions"
  - blockers: "Critical issues that must be resolved before GO"
  - recommendations: "Non-blocking improvements for future iterations"
  - evidence_gaps: "Missing test evidence or documentation"

guardrails:
  - "NO-GO if cross-tenant isolation tests are missing or failing"
  - "NO-GO if SLOs are undefined for any tier"
  - "NO-GO if rollback procedure is untested"
  - "Readiness assessment must be evidence-based, not opinion-based"

benchmark_source: "Azure SaaS Well-Architected + Azure Multitenancy Checklist"
