# platform/ssot/repo_ownership.yaml
# Canonical repo boundary map — what lives where and what must not
# Last updated: 2026-03-25

schema_version: "1.0"
updated: "2026-03-25"

repos:

  - name: odoo
    purpose: Odoo CE 19 ERP — system of record for finance, HR, inventory, CRM
    must_live_here:
      - addons/ipai/* (custom Odoo modules)
      - addons/oca/* (OCA community modules)
      - Odoo Docker/compose configs
      - Odoo server configuration
      - Odoo test fixtures and seed data
      - Copilot gateway controller code
    must_not_live_here:
      - Azure IaC (Bicep, Terraform)
      - Agent persona definitions
      - Databricks notebooks or jobs
      - Design tokens or brand assets
      - CI/CD pipeline definitions (use Azure DevOps)

  - name: web
    purpose: Public-facing web properties and frontend applications
    must_live_here:
      - Landing pages and marketing sites
      - Ops console frontend
      - Mobile app source (iOS/Android)
      - Frontend component libraries
    must_not_live_here:
      - Odoo addon code
      - Infrastructure templates
      - Agent skills or personas
      - Backend API implementations

  - name: agents
    purpose: AI agent definitions, skills, personas, evals, and knowledge bases
    must_live_here:
      - Agent persona markdown files
      - Skill definitions (*.skill.json, SKILL.md)
      - Knowledge base YAML and markdown
      - Eval suites and thresholds
      - Agent passport definitions
      - Workflow orchestration YAML
    must_not_live_here:
      - Odoo Python module code
      - Azure IaC templates
      - Databricks notebooks
      - Frontend code

  - name: platform
    purpose: Platform control plane, contracts, SSOT maps, and runtime orchestration
    must_live_here:
      - platform/ssot/* (services, ownership, dependencies)
      - Platform contracts and SLAs
      - Runtime configuration schemas
      - Service registry and BOM
    must_not_live_here:
      - Odoo addon code
      - Azure Bicep/Terraform (belongs in infra)
      - Agent skills or personas
      - Application source code

  - name: infra
    purpose: Azure-native infrastructure as code and edge configuration
    must_live_here:
      - Azure Bicep and Terraform templates
      - Front Door routing rules and WAF policies
      - Entra ID app registration configs
      - Key Vault references
      - DNS subdomain registry
      - Monitoring and alerting rules
      - Network and NSG definitions
    must_not_live_here:
      - Odoo addon code
      - Agent definitions
      - Application business logic
      - Databricks job definitions

  - name: data-intelligence
    purpose: Lakehouse, Databricks, and governed data engineering
    must_live_here:
      - Databricks notebooks and bundles
      - DLT pipeline definitions
      - Unity Catalog schemas
      - Medallion layer transformations (bronze/silver/gold/platinum)
      - Data quality checks
    must_not_live_here:
      - Odoo addon code
      - Azure IaC (except Databricks workspace config)
      - Frontend code
      - Agent personas

  - name: design
    purpose: Shared design tokens, brand assets, and component guidance
    must_live_here:
      - Design tokens (JSON, YAML)
      - Brand assets (logos, icons, favicons)
      - Component mapping files
      - Figma export artifacts
    must_not_live_here:
      - Application source code
      - Infrastructure templates
      - Agent definitions
      - Database schemas

  - name: docs
    purpose: Cross-cutting documentation, architecture decisions, and evidence
    must_live_here:
      - Architecture decision records
      - Evidence packs (docs/evidence/*)
      - Runbooks and operational guides
      - Platform-wide documentation
    must_not_live_here:
      - Application source code
      - Infrastructure templates
      - Module-specific docs (those live with the module)
      - Generated API docs (those live with the service)
