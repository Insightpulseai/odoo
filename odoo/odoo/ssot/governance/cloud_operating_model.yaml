schema_version: "1.0"
last_updated: "2026-03-17"
status: active

operating_model:
  type: shared_management_with_centralized_human_accountability
  statement: >
    The platform uses a shared-management cloud operating model with centralized
    human accountability. Platform products establish landing zones, shared services,
    governance guardrails, and delivery controls. Workload products operate
    autonomously within those controls. Stakeholder review functions are represented
    by judge agents, while final approval, risk acceptance, and exception handling
    remain human responsibilities.

human_authority:
  accountable_owner: Jake
  roles:
    - executive_sponsor
    - business_decision_maker
    - it_decision_maker
    - lead_architect
    - governance_owner
    - compliance_owner
    - finance_owner
    - final_approver

journey_classification:
  odoo: migrate_and_modernize
  platform: foundational_shared_services
  agent_platform: cloud_native
  data_intelligence: modernize_and_build_new
  web: cloud_native
  automations: rationalize_and_migrate
  infra: foundational_shared_services

product_planes:
  platform_products:
    - infra
    - platform
  workload_products:
    - odoo
    - agent-platform
    - data-intelligence
    - web
    - automations
  enablement_products:
    - .github
    - agents
    - design
    - docs
    - templates

responsibilities:
  governance:
    accountable: Jake
    responsible:
      - azure-platform
      - release-ops
    consulted:
      - governance-judge
      - architecture-judge

  security:
    accountable: Jake
    responsible:
      - azure-platform
    consulted:
      - security-judge
    workload_conformance:
      - odoo-runtime
      - foundry-agent
      - data-intelligence

  management:
    accountable: Jake
    responsible:
      - release-ops
    supporting:
      - platform

  ai_adoption:
    accountable: Jake
    responsible:
      - foundry-agent
      - data-intelligence
    consulted:
      - security-judge
      - governance-judge
    public_boundary:
      - web
      - foundry-agent

partners:
  - name: Microsoft Azure
    role: Cloud platform, AI Foundry, DevOps, monitoring
  - name: Databricks
    role: Unity Catalog, lakehouse, medallion pipelines
  - name: OCA / Odoo
    role: CE modules, community addons, ERP parity
  - name: Cloudflare
    role: Edge DNS (authoritative, DNS-only mode)
  - name: GitHub
    role: Source control, CI/CD, org governance
  - name: TBWA/SMP
    role: Client context, packaging requirements

review_triggers:
  - new_product_plane
  - production_cutover
  - new_partner
  - new_agent_or_tool_boundary
  - security_posture_change
  - new_environment_tier
  - monthly_health_check
