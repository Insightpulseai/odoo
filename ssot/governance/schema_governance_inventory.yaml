# =============================================================================
# GOVERNANCE STATUS
# =============================================================================

governance:

  schema_ssot_declared: false
  schema_changes_gated_in_ci: false
  dbml_erd_sync_with_orm: false
  supabase_migrations_deduplicated: false
  odoo_supabase_boundary_documented: partial
  live_db_drift_detection: false
  schema_change_review_required: partial
  documented_paths_match_actual: false

  existing_controls:
    - name: SSOT platform rule 4 (migrations only for Supabase)
      location: .claude/rules/ssot-platform.md
      enforced_by: agent_convention_only

    - name: SSOT boundaries document
      location: docs/architecture/SSOT_BOUNDARIES.md
      scope: Declares Odoo as SoR, Supabase for external integrations
      enforcement: none

    - name: Prod DB truth check script
      location: scripts/odoo/check_prod_db_truth.sql
      scope: Manual row-count comparison
      enforcement: manual_only

  missing_controls:
    - Schema drift CI gate (Odoo ORM vs live DB)
    - Schema drift CI gate (Supabase migrations vs live DB)
    - CODEOWNERS for schema-critical paths
    - DBML/ERD regeneration pipeline
    - Schema change PR label requirement
    - Supabase migration deduplication policy

# =============================================================================
# REMEDIATION PRIORITIES
# =============================================================================

remediation:

  p0_critical:
    - id: declare_odoo_orm_ssot
      action: Add Odoo ORM as declared schema SSOT to SSOT_BOUNDARIES.md
      effort: small

    - id: deduplicate_supabase_migrations
      action: >
        Choose canonical location for Supabase migrations
        (ops-platform/supabase/migrations/ OR odoo/supabase/migrations/),
        remove or symlink the other.
      effort: medium

    - id: fix_phantom_paths
      action: >
        Remove references to db/schema/, db/migrations/, db/seeds/, db/rls/,
        docs/data-model/, scripts/generate_odoo_dbml.py from documentation
        files, or create the directories and populate them.
      effort: small

  p1_high:
    - id: restore_dbml_generator
      action: >
        Move archive/root/scripts/generate_odoo_dbml.py to
        scripts/odoo/generate_odoo_dbml.py. Create CI workflow that
        regenerates on model file changes.
      effort: medium

    - id: schema_drift_ci_gate
      action: >
        Create scripts/ci/check_odoo_schema_drift.py that parses _name
        declarations and optionally compares against live DB ir_model table.
      effort: medium

    - id: codeowners_schema_paths
      action: >
        Add CODEOWNERS entries for addons/ipai/*/models/,
        ops-platform/supabase/migrations/, supabase/db/schema/.
      effort: small

  p2_medium:
    - id: create_docs_data_model
      action: >
        Create docs/data-model/ with generated DBML, Mermaid ERD,
        Supabase schema map, and boundary contract.
      effort: medium

    - id: schema_governance_yaml
      action: >
        Formalize this inventory as a living SSOT document with
        CI validation.
      effort: small

  p3_low:
    - id: fix_nested_dir_duplication
      action: >
        Resolve the odoo/odoo/odoo/ recursive nesting that creates
        3-5 copies of every archived artifact.
      effort: large

    - id: prisma_schema_decision
      action: >
        Either connect Prisma schema to a migration pipeline or
        archive it. Document the decision.
      effort: small

