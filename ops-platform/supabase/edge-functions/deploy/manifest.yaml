# ── Deployment gates ──────────────────────────────────────────────────────
# All 12 critical functions must be healthy before cutover gate opens.
# Standard functions: 80% (18/22) must be healthy.
# Optional functions: no gate.
gates:
  critical:
    total: 12
    required_healthy: 12
    gate_name: "critical-functions-healthy"
  standard:
    total: 23
    required_healthy: 18
    gate_name: "standard-functions-majority"
  optional:
    total: 4
    required_healthy: 0
    gate_name: "optional-functions-nogate"

# ── Deploy method ─────────────────────────────────────────────────────────
# The deploy script copies function source directories to the deploy target,
# then restarts the supabase-edge container on the VM.
# supabase_edge_functions_sync.sh handles this via rsync + docker compose restart.
deploy_method:
  rsync_flags: "-avz --delete"
  post_sync_command: "ssh azureuser@4.193.100.31 'cd /opt/supabase-deploy && sudo docker compose restart supabase-edge'"
  smoke_test_delay_seconds: 10
