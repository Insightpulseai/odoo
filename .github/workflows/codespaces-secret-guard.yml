# =============================================================================
# Codespaces Secret Guard — Blocks prod secrets from prebuild configs
# =============================================================================
# Ensures .devcontainer/** and prebuild workflows never reference:
#   - Production secret names (*_PROD*, SERVICE_ROLE*, DO_SSH*)
#   - Service role keys (SUPABASE_SERVICE_ROLE_KEY, etc.)
#   - SSH private keys for deployment
# =============================================================================

name: Codespaces Secret Guard

on:
  pull_request:
    paths:
      - '.devcontainer/**'
      - '.github/workflows/*codespace*'
      - '.github/workflows/*prebuild*'
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'

jobs:
  check-secrets:
    name: Block Prod Secrets in Prebuilds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for prod secret references
        run: |
          echo "Scanning .devcontainer/ for production secret references..."
          VIOLATIONS=0

          # Patterns that must never appear in devcontainer/prebuild configs
          BLOCKED_PATTERNS=(
            'DO_SSH_PRIVATE_KEY'
            'DO_SSH_KEY'
            'DO_DROPLET_HOST'
            'SUPABASE_SERVICE_ROLE_KEY'
            'SUPABASE_SERVICE_KEY'
            'SERVICE_ROLE'
            'DIGITALOCEAN_TOKEN'
            '_PROD_'
            'PROD_DB_'
            'PRODUCTION_'
          )

          for pattern in "${BLOCKED_PATTERNS[@]}"; do
            if grep -rn "$pattern" .devcontainer/ 2>/dev/null; then
              echo "ERROR: Found blocked pattern '$pattern' in .devcontainer/"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          # Also check any prebuild workflow files
          for f in .github/workflows/*codespace* .github/workflows/*prebuild* 2>/dev/null; do
            if [ -f "$f" ]; then
              for pattern in "${BLOCKED_PATTERNS[@]}"; do
                if grep -n "$pattern" "$f" 2>/dev/null; then
                  echo "ERROR: Found blocked pattern '$pattern' in $f"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              done
            fi
          done

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "FAIL: $VIOLATIONS production secret reference(s) found in prebuild configs."
            echo "Prebuilds must only use dev-only, read-only tokens."
            exit 1
          fi

          echo "PASS: No production secrets referenced in prebuild configs."

      - name: Verify containerEnv is dev-only
        run: |
          echo "Checking .devcontainer/devcontainer.json containerEnv..."

          if [ -f ".devcontainer/devcontainer.json" ]; then
            # Extract env var names from containerEnv (handles JSON with comments via grep)
            ENV_NAMES=$(grep -oP '"[A-Z_]+"' .devcontainer/devcontainer.json | tr -d '"' | sort -u)

            BLOCKED_ENV_NAMES=(
              'DIGITALOCEAN_TOKEN'
              'DO_SSH_PRIVATE_KEY'
              'SUPABASE_SERVICE_ROLE_KEY'
              'CF_API_TOKEN'
            )

            FOUND=0
            for name in "${BLOCKED_ENV_NAMES[@]}"; do
              if echo "$ENV_NAMES" | grep -q "^${name}$"; then
                echo "ERROR: containerEnv references production secret: $name"
                FOUND=$((FOUND + 1))
              fi
            done

            if [ "$FOUND" -gt 0 ]; then
              exit 1
            fi
          fi

          echo "PASS: containerEnv contains only dev-safe variables."

      - name: Summary
        if: always()
        run: |
          echo "## Codespaces Secret Guard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prod secret scan | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| containerEnv audit | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
