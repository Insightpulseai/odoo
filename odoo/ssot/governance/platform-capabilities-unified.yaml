  modes:
    - id: ask
      description: "Read-only Q&A + RAG"
      status: active
      priority: P0

    - id: authoring
      description: "Draft documents, reports, emails"
      status: active
      priority: P0

    - id: livechat
      description: "Website visitor Q&A"
      status: active
      priority: P1

    - id: transaction
      description: "Bounded CRUD with approval gates"
      status: planned
      priority: P1
      gap: "Model/action whitelisting not implemented"

    - id: creative
      description: "Content generation, campaign copy, image gen"
      status: planned
      priority: P2
      gap: "DALL-E 3 integration, campaign brief templates"
