model_to_azure:
  account.move:
    extract_to: "Databricks (bronze.account_move)"
    visualize_in: "Power BI"
    ai_surface: "Document Intelligence (invoice extraction)"
  res.partner:
    extract_to: "Databricks (bronze.res_partner)"
    identity_link: "Entra ID (user provisioning)"
  res.users:
    identity_provider: "Entra ID (OIDC via auth_oidc)"
    governance: "Entra ID Conditional Access"
  stock.picking:
    extract_to: "Databricks (bronze.stock_picking)"
  sale.order:
    extract_to: "Databricks (bronze.sale_order)"
    visualize_in: "Power BI (sales dashboard)"
  purchase.order:
    extract_to: "Databricks (bronze.purchase_order)"
    visualize_in: "Power BI (procurement dashboard)"

azure_service_map:
  container_apps:
    purpose: "Odoo runtime (web/worker/cron)"
    odoo_dependency: "Docker image with odoo-bin"
  front_door:
    purpose: "Edge routing, WAF, SSL termination"
    odoo_dependency: "HTTP traffic to ACA"
  key_vault:
    purpose: "Secrets management (DB password, SMTP, API keys)"
    odoo_dependency: "Environment variables at container startup"
  entra_id:
    purpose: "Identity provider, SSO, MFA, conditional access"
    odoo_dependency: "auth_oidc module + oauth provider record"
  document_intelligence:
    purpose: "OCR and document extraction"
    odoo_dependency: "queue_job + bridge controller for bill creation"
  databricks:
    purpose: "Data warehouse, analytics, ML"
    odoo_dependency: "JDBC extract from PostgreSQL"
  power_bi:
    purpose: "Enterprise BI dashboards"
    odoo_dependency: "Semantic model on Databricks gold layer"
  ai_foundry:
    purpose: "Custom AI models, copilot experiences"
    odoo_dependency: "MCP tools + bridge controllers"
  monitor:
    purpose: "Application monitoring, alerting"
    odoo_dependency: "Log export, custom metrics"
