# =============================================================================
# Odoo CI/CD Pipeline — Azure DevOps
# =============================================================================
# Builds, tests, and deploys the Odoo CE 19 container to Azure Container Apps.
#
# Template source: Insightpulseai/infra (pipelines/templates/)
# Service connection: sc-azure-dev-platform (ARM, workload identity federation)
# Variable group: vg-ipai-platform-secrets (Key Vault-backed)
# Agent pool: ubuntu-latest (hosted) for lint/build stages
#              ipai-build-pool (self-hosted) for deploy stages requiring VNet access
#              Per ssot/azure/azure_devops.yaml: default=hosted, fallback=self-hosted-if-vnet-required
#
# Stages:
#   1. Lint       — Python lint (black, flake8, isort) on ipai addons      [hosted]
#   2. Build      — Docker build + ACR push (main branch only)             [hosted]
#   3. Infra_Dev  — Bicep deploy to rg-ipai-dev                            [hosted]
#   4. Deploy_Dev — ACA revision update to ipai-odoo-dev-web               [self-hosted — VNet]
#   5. Deploy_Staging — ACA revision update (manual approval gate)         [self-hosted — VNet]
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - docker/**
      - config/**
      - scripts/odoo/**
      - infra/azure/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - docker/**
      - config/**
      - infra/azure/**

resources:
  repositories:
    - repository: templates
      type: github
      name: Insightpulseai/infra
      endpoint: github-insightpulseai
      ref: refs/heads/main

variables:
  - group: vg-ipai-platform-secrets
  - name: imageName
    value: ipai-odoo-web
  - name: acrName
    value: cripaidev
  # Pool strategy: hosted for lint/build, self-hosted (named pool) for deploy
  # stages that may need VNet/private-network access.
  # NOTE: hosted uses { vmImage: X }, self-hosted uses { name: X } — different
  # YAML shapes, so pool selection is inline per stage, not a single variable.

stages:
  # -------------------------------------------------------------------------
  # Stage 1: Lint (runs on all branches and PRs)
  # -------------------------------------------------------------------------
  - stage: Lint
    displayName: Python Lint
    jobs:
      - job: PythonLint
        displayName: black + isort + flake8
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: pipelines/templates/lint-python.yml@templates
            parameters:
              pythonVersion: '3.12'
              paths: 'addons/ipai/'

  # -------------------------------------------------------------------------
  # Stage 2: Build (main branch only, after lint passes)
  # -------------------------------------------------------------------------
  - stage: Build
    displayName: Container Build + ACR Push
    dependsOn: Lint
    condition: |
      and(
        succeeded('Lint'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: ContainerBuild
        displayName: Docker build → $(acrName)
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - template: pipelines/templates/build-container.yml@templates
            parameters:
              serviceConnection: sc-azure-dev-platform
              imageName: $(imageName)
              dockerfilePath: docker/Dockerfile.prod
              acrName: $(acrName)
              runTrivy: true

  # -------------------------------------------------------------------------
  # Stage 2b: Infrastructure (Bicep) — deploys VNet, Log Analytics, Azure Files
  # -------------------------------------------------------------------------
  - stage: Infra_Dev
    displayName: Bicep → Dev Infrastructure
    dependsOn: Lint
    condition: |
      and(
        succeeded('Lint'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - deployment: BicepDev
        displayName: Bicep → rg-ipai-dev
        environment: insightpulseai-dev
        pool:
          name: ipai-build-pool
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: Deploy Bicep (dev)
                  inputs:
                    azureSubscription: sc-azure-dev-platform
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group rg-ipai-dev \
                        --template-file infra/azure/main.bicep \
                        --parameters @infra/azure/parameters/dev.parameters.json \
                        --name "bicep-dev-$(Build.BuildId)" \
                        --verbose

  # -------------------------------------------------------------------------
  # Stage 3: Deploy Dev (auto after build)
  # -------------------------------------------------------------------------
  - stage: Deploy_Dev
    displayName: Deploy to Dev
    dependsOn: Build
    condition: succeeded('Build')
    jobs:
      - deployment: OdooDev
        displayName: ACA → ipai-odoo-dev-web
        environment: insightpulseai-dev
        pool:
          name: ipai-build-pool
        strategy:
          runOnce:
            deploy:
              steps:
                - template: pipelines/templates/deploy-aca.yml@templates
                  parameters:
                    serviceConnection: sc-azure-dev-platform
                    containerAppName: ipai-odoo-dev-web
                    imageName: $(imageName)
                    imageTag: $(Build.SourceVersion)
                    acrName: $(acrName)
                    resourceGroup: rg-ipai-dev
                    environmentLabel: dev
                    healthPath: /web/health

  # -------------------------------------------------------------------------
  # Stage 4: Deploy Staging (manual approval gate in AzDo environment)
  # -------------------------------------------------------------------------
  - stage: Deploy_Staging
    displayName: Deploy to Staging
    dependsOn: Deploy_Dev
    condition: succeeded('Deploy_Dev')
    jobs:
      - deployment: OdooStaging
        displayName: ACA → ipai-odoo-staging-web
        environment: insightpulseai-staging
        pool:
          name: ipai-build-pool
        strategy:
          runOnce:
            deploy:
              steps:
                - template: pipelines/templates/deploy-aca.yml@templates
                  parameters:
                    serviceConnection: sc-azure-dev-platform
                    containerAppName: ipai-odoo-staging-web
                    imageName: $(imageName)
                    imageTag: $(Build.SourceVersion)
                    acrName: $(acrName)
                    resourceGroup: rg-ipai-dev
                    environmentLabel: staging
                    healthPath: /web/health
