# Custom Web Design Skill
# Bespoke web design with brand identity and design systems

name: custom_web_design
version: 1.0.0
key: web.custom.design
description: |
  Create custom web designs: brand identity, design systems,
  responsive layouts, animations, and accessibility compliance.

intents:
  - custom web design
  - design website
  - brand identity web
  - responsive design
  - design system creation

guardrails:
  - Accessibility first (WCAG 2.1 AA minimum)
  - Performance-conscious (no heavy JS for decoration)
  - Design tokens must be extractable to JSON
  - Figma-to-code workflow when Figma files exist
  - No template/theme purchases (custom only)

tools:
  - key: design.brand
    name: Brand Analysis
    target_model: ipai.design.runner
    target_method: analyze_brand
    description: Analyze brand guidelines and extract design constraints

  - key: design.tokens
    name: Design Tokens
    target_model: ipai.design.runner
    target_method: create_tokens
    description: Generate design tokens (colors, typography, spacing)

  - key: design.layout
    name: Layout Design
    target_model: ipai.design.runner
    target_method: design_layouts
    description: Create responsive page layouts and grid systems

  - key: design.components
    name: Component Design
    target_model: ipai.design.runner
    target_method: design_components
    description: Design reusable UI components with variants

  - key: design.implement
    name: Implement Design
    target_model: ipai.design.runner
    target_method: implement_design
    description: Convert design specs to production CSS/HTML/JS

workflow:
  - design.brand
  - design.tokens
  - design.layout
  - design.components
  - design.implement

input_schema:
  type: object
  required:
    - project_name
  properties:
    project_name: { type: string }
    brand_colors: { type: array, items: { type: string } }
    typography: { type: object }
    style:
      type: string
      enum: [minimalist, bold, corporate, playful, editorial, glassmorphism, brutalist]
    figma_url: { type: string }

output_schema:
  type: object
  properties:
    tokens_json: { type: string }
    component_library: { type: object }
    pages: { type: array, items: { type: string } }

agentInstructions: |
  When creating custom web designs:

  1. **Brand**: Extract colors, fonts, voice from brand guidelines
  2. **Tokens**: Generate CSS custom properties and JSON tokens
  3. **Layout**: Mobile-first grid, responsive breakpoints
  4. **Components**: Button, card, nav, form variants with states
  5. **Implement**: Tailwind CSS classes mapped to design tokens
