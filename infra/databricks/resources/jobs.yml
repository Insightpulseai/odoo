# Databricks Jobs Configuration

resources:
  jobs:
    # ============================================
    # Bronze Layer: Data Ingestion
    # ============================================
    # Notion sync jobs removed — Notion is not a canonical data source.
    # Bronze ingest is via ADLS Gen2 Auto Loader or DLT pipelines.

    azure_rg_ingest:
      name: "Azure Resource Graph Ingest"
      description: "Ingest Azure Advisor and Resource Graph data"
      tags:
        layer: bronze
        source: azure
        team: platform

      tasks:
        - task_key: ingest_advisor
          description: "Query Azure Advisor recommendations"
          notebook_task:
            notebook_path: ../notebooks/bronze/ingest_azure_rg.py
            source: WORKSPACE
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
            spark_env_vars:
              AZURE_SUBSCRIPTION_ID: "{{secrets/finance-ppm/azure_subscription_id}}"
              AZURE_CLIENT_ID: "{{secrets/finance-ppm/azure_client_id}}"
              AZURE_CLIENT_SECRET: "{{secrets/finance-ppm/azure_client_secret}}"
              AZURE_TENANT_ID: "{{secrets/finance-ppm/azure_tenant_id}}"
              DATABRICKS_CATALOG: "${var.catalog}"
          timeout_seconds: 1800
          max_retries: 2

      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

    # ============================================
    # Silver Layer: Transformation
    # ============================================
    # Notion transform jobs removed — silver transforms handled by DLT pipelines.

    # ============================================
    # Gold Layer: Business Marts
    # ============================================

    ppm_marts_gold:
      name: "PPM Marts Gold"
      description: "Build PPM business marts in gold layer"
      tags:
        layer: gold
        domain: ppm
        team: platform

      tasks:
        - task_key: budget_vs_actual
          description: "Compute budget vs actual metrics"
          notebook_task:
            notebook_path: ../notebooks/gold/budget_vs_actual.py
            source: WORKSPACE
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
          timeout_seconds: 1800

        - task_key: forecast
          description: "Compute forecast metrics"
          notebook_task:
            notebook_path: ../notebooks/gold/forecast.py
            source: WORKSPACE
          depends_on:
            - task_key: budget_vs_actual
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
          timeout_seconds: 1800

        - task_key: risk_summary
          description: "Compute risk rollups"
          notebook_task:
            notebook_path: ../notebooks/gold/risk_summary.py
            source: WORKSPACE
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
          timeout_seconds: 900

        - task_key: projects_summary
          description: "Build projects summary table"
          notebook_task:
            notebook_path: ../notebooks/gold/projects_summary.py
            source: WORKSPACE
          depends_on:
            - task_key: budget_vs_actual
            - task_key: risk_summary
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
          timeout_seconds: 900

      schedule:
        quartz_cron_expression: "0 30 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

    # ============================================
    # Data Quality & Monitoring
    # ============================================

    dq_checks:
      name: "Data Quality Checks"
      description: "Run data quality checks across all layers"
      tags:
        layer: gold
        domain: quality
        team: platform

      tasks:
        - task_key: run_checks
          description: "Execute DQ checks"
          notebook_task:
            notebook_path: ../notebooks/gold/dq_checks.py
            source: WORKSPACE
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
          timeout_seconds: 1800

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

    control_room_refresh:
      name: "Control Room Status Refresh"
      description: "Update control room status table with job metadata"
      tags:
        layer: gold
        domain: monitoring
        team: platform

      tasks:
        - task_key: refresh_status
          description: "Collect job run metadata"
          notebook_task:
            notebook_path: ../notebooks/gold/control_room_status.py
            source: WORKSPACE
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
          timeout_seconds: 600

      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
