version: 1
owner_repo: platform
owner_team: ai-platform
status: active

projects:
  - key: ipai-copilot
    name: ipai-copilot
    environment: dev
    region: southeastasia
    foundry_resource_name: ipai-foundry-sea
    project_endpoint: https://ipai-foundry-sea.services.ai.azure.com/api/projects/ipai-copilot
    azure_openai_base_url: https://ipai-foundry-sea.openai.azure.com/openai/v1
    portal_available: true
    api_key_available: true
    notes: Canonical Foundry project baseline for the golden path.

rules:
  - id: foundry-single-project-endpoint
    description: All clients must reference the same project endpoint for a given environment.
  - id: foundry-single-openai-base-url
    description: All Azure OpenAI-compatible clients must use the same approved base URL.
  - id: foundry-no-legacy-endpoints
    description: Deprecated resource or project endpoints must not remain in active config.
