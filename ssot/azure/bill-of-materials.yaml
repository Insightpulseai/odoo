# ---------------------------------------------------------------------------
# Subscription topology (revised: 3 subs, not 1)
# ---------------------------------------------------------------------------
subscriptions:
  target_count: 3
  canonical:
    - name: ipai-shared-management
      role: cross-env shared services (Entra-bound mgmt, billing, governance)
      offer: pay-as-you-go (target)
      status: pending_creation
    - name: ipai-nonprod
      role: dev + staging workloads
      offer: Azure Sponsorship (current)
      id_today: eba824fb-332d-4623-9dfb-2c9f7ee83f4e
    - name: ipai-prod
      role: production workloads
      offer: pay-as-you-go (target)
      status: pending_creation
  current_state:
    - id: 536d8cf6-89e1-4815-aef3-d5f2c5f4d070
      name: Azure subscription 1
      status: deprecated_migration_in_progress
      target: consolidate_into_nonprod_or_prod
    - id: eba824fb-332d-4623-9dfb-2c9f7ee83f4e
