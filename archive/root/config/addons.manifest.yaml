# =============================================================================
# IPAI Custom Modules
# =============================================================================
# All modules under addons/ipai/ are included automatically.
# This section documents the canonical module list for reference.
# The Dockerfile copies the entire addons/ipai/ directory.
ipai:
  root: addons/ipai
  discovery: auto  # all dirs with __manifest__.py under addons/ipai/
  # Module count: ~70 (see addons/ipai/ for current list)

# =============================================================================
# Deprecated / Superseded
# =============================================================================
# These were in config/addons_manifest.oca_ipai.json (Odoo 18) but are NOT
# in oca-aggregate.yml (Odoo 18). They should NOT be re-added without review.
deprecated_repos:
  - repo: server-env
    reason: Not in oca-aggregate.yml; env management handled by Azure Key Vault
  - repo: bank-statement-import
    reason: Merged into account-reconcile in Odoo 18.0
# =============================================================================
# Installation Profiles — OCA Must-Have Baseline
# =============================================================================
# Profiles group modules by deployment purpose. Each module references its
# source repo above. Provenance classification separates official OCA
# must-have lists from InsightPulseAI-curated selections.
#
# Provenance:
#   official_oca_must_have — Published on odoo-community.org as a must-have list
#   curated_ipai           — Selected by InsightPulseAI from OCA repos
#
# Sources:
#   Base:       https://odoo-community.org/list-of-must-have-oca-modules
#   Accounting: https://odoo-community.org/list-of-must-have-oca-accounting-modules
#   Sales:      https://odoo-community.org/list-of-must-have-sales-modules
#   Purchases:  No official published list page (webinar-only reference)
# =============================================================================

profiles:

  baseline_core:
    provenance: official_oca_must_have
    evidence: https://odoo-community.org/list-of-must-have-oca-modules
    description: >
      Core CE hardening, operator productivity, async jobs, and UX.
      Every serious CE deployment should install these.
    addons:
      - queue_job              # server: queue
      - report_xlsx            # server: reporting-engine
      - auditlog               # server: server-tools
      - password_security      # server: server-auth
      - base_name_search_improved  # server: server-tools (if available on 19.0)
      - date_range             # server: server-ux
      - web_responsive         # server: web
      - web_m2x_options        # server: web
      - web_environment_ribbon # server: web
      - mail_tracking          # server: social
      - mail_activity_plan     # server: social

  baseline_accounting:
    provenance: official_oca_must_have
    evidence: https://odoo-community.org/list-of-must-have-oca-accounting-modules
    description: >
      Accounting controls, reconciliation, reporting, and finance ops.
      Required for accounting-heavy deployments.
    addons:
      - account_asset_management     # server: account-financial-tools
      - account_reconcile_oca        # server: account-reconcile
      - account_reconcile_model_oca  # server: account-reconcile
      - account_financial_report     # server: account-financial-reporting
      - mis_builder                  # server: mis-builder
      - mis_builder_budget           # server: mis-builder
      - partner_statement            # server: account-financial-reporting (if available)
      - currency_rate_update         # server: account-financial-tools
      - account_journal_lock_date    # server: account-financial-tools
      - account_lock_date_update     # server: account-financial-tools

  baseline_sales:
    provenance: official_oca_must_have
    evidence: https://odoo-community.org/list-of-must-have-sales-modules
    description: >
      Practical sales controls and order lifecycle usability.
      Required for sales-driven deployments.
    addons:
      - sale_cancel_reason           # server: sale-workflow
      - sale_delivery_state          # server: sale-workflow
      - sale_fixed_discount          # server: sale-workflow
      - sale_order_line_price_history  # server: sale-workflow
      - sale_order_line_input        # server: sale-workflow
      - sale_order_archive           # server: sale-workflow

  baseline_purchase_controls:
    provenance: curated_ipai
    evidence: OCA/purchase-workflow repo + internal approval-control baseline
    description: >
      InsightPulseAI-curated purchase approval and requisition controls.
      Not an official published OCA must-have category. Selected from
      OCA/purchase-workflow for controlled purchasing workflows.
    addons:
      - purchase_request             # server: purchase-workflow
      - purchase_order_approved      # server: purchase-workflow
      - purchase_order_approval_block  # server: purchase-workflow
      - purchase_request_order_approved  # server: purchase-workflow

  baseline_optional_ux:
    provenance: official_oca_must_have
    evidence: https://odoo-community.org/list-of-must-have-oca-modules
    description: >
      Nice-to-have UX/admin enhancements from the OCA base must-have list.
      Not required for production but improve operator experience.
    addons:
      - partner_contact_access_link  # server: partner-contact
      - partner_firstname            # server: partner-contact
      - disable_odoo_online          # server: server-brand (19.0 ready)
      - remove_odoo_enterprise       # server: server-brand (19.0 ready)
      - server_action_mass_edit      # server: server-tools (mass_editing)
      - web_advanced_search          # server: web
      - web_dialog_size              # server: web
      - web_favicon                  # server: web
      - web_listview_range_select    # server: web
      - web_no_bubble                # server: web
      - web_pivot_computed_measure   # server: web
      - web_refresher                # server: web
      - web_search_with_and          # server: web
      - web_tree_many2one_clickable  # server: web
      - mail_debranding               # server: server-brand (19.0 ready; replaces mail_debrand)
      - document_url                 # server: knowledge
      - base_search_mail_content     # server: social

# =============================================================================
# Bundles — Named installation sets
# =============================================================================
# Each bundle includes one or more profiles. Use bundles to define what gets
# installed per deployment type.

bundles:

  ce_default:
    description: Default CE baseline for most production environments
    include_profiles:
      - baseline_core
      - baseline_accounting
      - baseline_sales

  ce_finance_heavy:
    description: Finance-first baseline for accounting-led deployments
    include_profiles:
      - baseline_core
      - baseline_accounting
      - baseline_purchase_controls

  ce_full_curated:
    description: Full curated baseline including optional UX/admin modules
    include_profiles:
      - baseline_core
      - baseline_accounting
      - baseline_sales
      - baseline_purchase_controls
      - baseline_optional_ux

# =============================================================================
# Provenance Policy
# =============================================================================
# Rules for documentation and CI wording about OCA must-have status.

provenance_policy:
  official_oca_must_have_categories:
    - base        # https://odoo-community.org/list-of-must-have-oca-modules
    - accounting  # https://odoo-community.org/list-of-must-have-oca-accounting-modules
    - sales       # https://odoo-community.org/list-of-must-have-sales-modules
  curated_categories:
    - purchase_controls
    - optional_ux
  rules:
    - "Docs may call Base, Accounting, and Sales 'official OCA must-have' categories."
    - "Purchases must be labeled 'curated/recommended' unless OCA publishes a must-have list page."
    - "Optional UX modules must not be treated as required production baseline."
