  total_active: 12
  makers: 6
  judges: 6
  legacy_retained: 3
  legacy_superseded: 3

  maturity_distribution:
    L0: 4
    L1: 4
    L2: 2
    L3: 1
    L4: 0
    L5: 0

  stage_distribution:
    S01: 2   # customer-value-judge, platform-fit-judge
    S02: 2   # governance-judge, finops-judge
    S03: 2   # architecture-judge, security-judge
    S04: 1   # data-intelligence
    S05: 2   # azure-platform, foundry-agent
    S07: 2   # chief-architect, release-ops
