# SSOT: Domain-by-domain parity matrix
# IPAI (Odoo 18 CE + OCA + ipai_* + Pulser) vs Microsoft (D365 Finance + D365 PO + Copilot Finance agents)
#
# Grounds:
# - feedback_d365_two_plane_doctrine.md               (Plane A=ERP / Plane B=Copilot)
# - feedback_d365_project_operations_services_erp.md  (PO=services ERP, three shapes)
# - feedback_odoo_module_selection_doctrine.md        (CE→OCA→adjacent→compose→ipai_*)
# - feedback_d365_displacement_not_development.md     (displace, don't develop X++)
# - feedback_ipai_custom_module_doctrine.md           (introspection + technical guide required)
#
# Schema per row:
#   domain            dotted path (Area.Subdomain)
#   plane             A (ERP system-of-record) | B (Copilot assistive layer)
#   ms_surface        which Microsoft product surface
#   ms_shape          for PO only: core | integrated_erp | manufacturing
#   parity_type       ce_only | ce_oca | ce_oca_bridge | bridge_only
#   primary_benchmark the specific MS tier we're matching
#   ce                list of CE 18 modules
#   oca_primary       OCA repos in the same functional domain
#   oca_adjacent      OCA repos in neighboring domains worth composing
#   ipai_bridge       last-resort ipai_* thin bridges
#   pulser_agent      Plane B sub-agent name (or null)
#   status            full | partial | gap
#   gap               1-line description of what's missing
#   priority          P0 | P1 | P2 | null
#   notes             optional
#
# Last updated: 2026-04-14
version: 1
