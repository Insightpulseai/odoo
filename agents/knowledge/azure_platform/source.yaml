# Azure Platform — Knowledge Source Contract
# Covers: Azure services, CLI, Container Apps, Front Door, AI Search, OpenAI, DevOps

name: azure-platform-kb
description: Azure platform documentation knowledge base for IPAI infrastructure

sources:
  # Primary: Azure documentation (Microsoft Learn)
  - name: azure-docs
    type: web-crawl
    base_urls:
      - https://learn.microsoft.com/en-us/azure/container-apps/
      - https://learn.microsoft.com/en-us/azure/frontdoor/
      - https://learn.microsoft.com/en-us/azure/search/
      - https://learn.microsoft.com/en-us/azure/ai-services/openai/
      - https://learn.microsoft.com/en-us/azure/postgresql/flexible-server/
      - https://learn.microsoft.com/en-us/azure/key-vault/
      - https://learn.microsoft.com/en-us/azure/container-registry/
      - https://learn.microsoft.com/en-us/azure/cost-management-billing/
      - https://learn.microsoft.com/en-us/entra/identity/
      - https://learn.microsoft.com/en-us/azure/ai-foundry/get-started/
      - https://learn.microsoft.com/en-us/azure/ai-foundry/agents/
      - https://learn.microsoft.com/en-us/azure/ai-foundry/model-inference/
      - https://learn.microsoft.com/en-us/azure/ai-foundry/evaluation/
      - https://learn.microsoft.com/en-us/azure/ai-foundry/responsible-use-of-ai-overview
      - https://learn.microsoft.com/en-us/azure/ai-foundry/security/
      - https://learn.microsoft.com/en-us/azure/ai-foundry/how-to/
    crawl_depth: 2
    content_selector: "main article"  # MS Learn article body

  # Azure CLI reference — highest operational value (CLI/CI only contract)
  - name: azure-cli
    type: web-crawl
    base_urls:
      - https://learn.microsoft.com/en-us/cli/azure/containerapp        # az containerapp (Odoo hosting)
      - https://learn.microsoft.com/en-us/cli/azure/network/front-door  # az network front-door (edge)
      - https://learn.microsoft.com/en-us/cli/azure/search/             # az search (AI Search)
      - https://learn.microsoft.com/en-us/cli/azure/cognitiveservices/  # az cognitiveservices (OpenAI)
      - https://learn.microsoft.com/en-us/cli/azure/keyvault/           # az keyvault (secrets)
      - https://learn.microsoft.com/en-us/cli/azure/postgres/flexible-server/  # az postgres (DB)
      - https://learn.microsoft.com/en-us/cli/azure/acr/                # az acr (registry)
      - https://learn.microsoft.com/en-us/cli/azure/monitor/            # az monitor (observability)
    crawl_depth: 1
    content_selector: "main article"

  # Azure DevOps — has its own dedicated KB (agents/knowledge/azure_devops/)
  # Cross-ref: agents/skills/azure_devops/skill.yaml
  # Entra Identity — has its own dedicated KB (agents/knowledge/entra_identity/)
  # Cross-ref: agents/skills/entra_identity_copilot/skill.yaml

ingestion:
  # Scope to IPAI-relevant Azure services only
  include:
    - "container-apps/**"
    - "frontdoor/**"
    - "search/**"
    - "ai-services/openai/**"
    - "postgresql/**"
    - "key-vault/**"
    - "container-registry/**"
    - "entra/**"
    - "foundry/get-started/**"
    - "foundry/agent-service/**"
    - "foundry/models/**"
    - "foundry/guardrails/**"
    - "foundry/responsible-ai/**"
    - "foundry/api-sdk/**"
    - "foundry/evaluation-tracing/**"
    - "foundry/developer-experience/**"
    - "foundry/security-governance/**"
    - "foundry/operations/**"
    - "devops/repos/**"
    - "cli/**"
  exclude:
    - "**/includes/**"
    - "**/media/**"
    - "**/zone-pivot-groups/**"
    - "**/_themes/**"
  file_types:
    - "*.md"
    - "*.yml"

metadata:
  product: azure
  source_type: documentation
  lang: en

# Priority order for IPAI stack (maps to rg-ipai-dev resources)
service_priority:
  - container-apps       # Canonical compute (cae-ipai-dev)
  - frontdoor            # Edge/TLS/WAF (ipai-fd-dev)
  - search               # AI Search (vector store for RAG KBs)
  - ai-services/openai   # Embeddings + generation (via Foundry)
  - postgresql            # Managed database (ipai-odoo-dev-pg)
  - key-vault            # Secrets management (kv-ipai-dev)
  - entra                # Identity — target IdP (Keycloak transitional)
  - foundry/get-started          # Foundry onboarding, project setup, quickstarts
  - foundry/agent-service        # Agent Service deployment, tools, sharing
  - foundry/models               # Model catalog, deployment, inference
  - foundry/guardrails           # Content filters, safety, tool governance
  - foundry/responsible-ai       # RAI constraints, limited access, transparency
  - foundry/api-sdk              # azure-ai-projects SDK, REST API, client patterns
  - foundry/evaluation-tracing   # Evaluation, tracing, continuous monitoring
  - foundry/developer-experience # VS Code, playgrounds, hosted agents
  - foundry/security-governance  # RBAC, networking, identity, data protection
  - foundry/operations           # Quotas, regions, support, operate
  - container-registry   # Image registry (ACR for ACA deployments)
  - monitor              # Observability (logging, diagnostics, alerting)

# Azure CLI is highest operational value — operating contract is CLI/CI only.
# Key command groups: az containerapp, az network front-door, az keyvault,
# az cognitiveservices, az search, az acr, az postgres, az monitor
