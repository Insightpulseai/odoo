schema: ssot.plane.template.v1
type: feature
updated: "2026-03-16"

template:
  name: Feature Template
  description_structure: |
    ## Feature Statement
    One-sentence description of the capability being delivered.

    ## Acceptance Criteria
    - [ ] Criterion 1
    - [ ] Criterion 2
    - [ ] Criterion 3

    ## Dependencies
    What other features, services, or infrastructure must be ready?

    ## Linked Spec / Runbook
    Reference the spec bundle (spec/<slug>/) or runbook page.

  required_fields:
    - title
    - description
    - assignee
    - priority
    - module
    - due_date

  label_convention:
    - "Type/Feature"
    - "Module/<module>"
    - "Wave/<delivery-wave>"

  module_assignment_rule: >
    Assign to the single module this feature belongs to.

  cycle_assignment_rule: >
    Assign to the delivery wave where this feature ships.

  done_rule: >
    All acceptance criteria checked.
    All child Stories are Done.
    Linked spec bundle tasks.md shows completion.
