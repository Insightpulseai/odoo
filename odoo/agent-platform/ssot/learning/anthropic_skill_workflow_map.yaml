version: 1
id: anthropic_skill_workflow_map
status: active
source_family: anthropic_agent_patterns_and_skills
updated_at: "2026-03-17"

description: >
  Maps Anthropic's agent-pattern and skill-authoring guidance to bounded
  personas, skills, and knowledge bases. Anthropic's engineering posts
  define the workflow-pattern doctrine; skill-creator posts define the
  skill-authoring doctrine; Claude docs/cookbooks are the runtime/example layer.

canonical_fit:
  anthropic_engineering: "workflow-pattern and skill-quality doctrine"
  claude_docs: "Claude-specific runtime/API surface"
  claude_cookbooks: "implementation examples and test fixtures"
  foundry_azure: "current hosted control/runtime plane"
  repo_skills: "actual bounded contracts"

personas:
  - id: workflow-architect
    file: agents/personas/workflow-architect.md
    owns:
      - agent-pattern-selection
      - sequential-workflow-design
      - parallel-workflow-design
      - evaluator-optimizer-design
      - autonomous-agent-fit-assessment
    responsibility: "Pattern choice for all new agent/skill implementations"

  - id: skill-author
    file: agents/personas/skill-author.md
    owns:
      - skill-type-classification
      - skill-trigger-tuning
    responsibility: "Skill design, classification, description quality, trigger precision"

  - id: skill-eval-judge
    file: agents/personas/skill-eval-judge.md
    owns:
      - skill-eval-authoring
      - skill-benchmarking
    responsibility: "Eval design, execution, lifecycle management, quality gates"

  - id: claude-runtime-integrator
    file: agents/personas/claude-runtime-integrator.md
    owns:
      - claude-mcp-integration
      - claude-foundry-runtime-integration
    responsibility: "Claude API, MCP, Foundry integration"

knowledge_bases:
  - id: anthropic-agent-patterns
    file: agents/knowledge/benchmarks/anthropic-agent-patterns.md
    covers:
      - "Five workflow patterns: sequential, routing, parallel, orchestrator-workers, evaluator-optimizer"
      - "Autonomous agent criteria and guardrails"
      - "Context engineering: compaction, structured notes, sub-agents"
      - "Multi-agent production patterns"

  - id: anthropic-skill-authoring
    file: agents/knowledge/benchmarks/anthropic-skill-authoring.md
    covers:
      - "Skill classification: capability_uplift vs encoded_preference"
      - "Trigger quality: precision and recall"
      - "Eval design: types, graders, lifecycle"
      - "Tool design for skills"

  - id: claude-runtime-surfaces
    file: agents/knowledge/benchmarks/claude-runtime-surfaces.md
    covers:
      - "Claude API surfaces"
      - "MCP integration"
      - "Foundry-hosted Claude"
      - "Cookbook organization as reference pattern"

skills:
  # Workflow architect skills
  - id: agent-pattern-selection
    file: agents/skills/agent-pattern-selection/
    persona: workflow-architect
    classification: encoded_preference
    purpose: "Choose the simplest agentic pattern that fits"

  - id: sequential-workflow-design
    file: agents/skills/sequential-workflow-design/
    persona: workflow-architect
    classification: encoded_preference
    purpose: "Design sequential prompt-chaining workflows"

  - id: parallel-workflow-design
    file: agents/skills/parallel-workflow-design/
    persona: workflow-architect
    classification: encoded_preference
    purpose: "Design parallel fan-out/fan-in workflows"

  - id: evaluator-optimizer-design
    file: agents/skills/evaluator-optimizer-design/
    persona: workflow-architect
    classification: encoded_preference
    purpose: "Design evaluator-optimizer iterative loops"

  - id: autonomous-agent-fit-assessment
    file: agents/skills/autonomous-agent-fit-assessment/
    persona: workflow-architect
    classification: encoded_preference
    purpose: "Assess if autonomous agent is truly needed"

  # Skill author skills
  - id: skill-type-classification
    file: agents/skills/skill-type-classification/
    persona: skill-author
    classification: encoded_preference
    purpose: "Classify skills as capability_uplift or encoded_preference"

  - id: skill-trigger-tuning
    file: agents/skills/skill-trigger-tuning/
    persona: skill-author
    classification: capability_uplift
    purpose: "Optimize skill trigger precision and recall"

  # Skill eval judge skills
  - id: skill-eval-authoring
    file: agents/skills/skill-eval-authoring/
    persona: skill-eval-judge
    classification: encoded_preference
    purpose: "Design evaluation suites for agent skills"

  - id: skill-benchmarking
    file: agents/skills/skill-benchmarking/
    persona: skill-eval-judge
    classification: capability_uplift
    purpose: "Benchmark skill versions and manage eval lifecycle"

  # Claude runtime integrator skills
  - id: claude-mcp-integration
    file: agents/skills/claude-mcp-integration/
    persona: claude-runtime-integrator
    classification: capability_uplift
    purpose: "Integrate Claude with tools via MCP"

  - id: claude-foundry-runtime-integration
    file: agents/skills/claude-foundry-runtime-integration/
    persona: claude-runtime-integrator
    classification: capability_uplift
    purpose: "Integrate Claude as Foundry model provider"

rules:
  - id: single_call_first
    text: "Always try a single optimized LLM call before adding workflow complexity"
    source: "anthropic-agent-patterns"

  - id: simplest_pattern
    text: "Use the simplest pattern that works — do not overengineer"
    source: "anthropic-agent-patterns"

  - id: classify_skills
    text: "Every skill must be tagged as capability_uplift or encoded_preference"
    source: "anthropic-skill-authoring"

  - id: trigger_quality
    text: "Test trigger quality (precision + recall), not just output quality"
    source: "anthropic-skill-authoring"

  - id: evals_mandatory
    text: "No skill ships without eval evidence"
    source: "anthropic-skill-authoring"

  - id: grade_outputs_not_paths
    text: "Grade outputs, not paths — do not penalize creative valid solutions"
    source: "anthropic-skill-authoring"

  - id: tool_descriptions_are_prompts
    text: "Tool descriptions are prompt engineering — invest in quality"
    source: "claude-runtime-surfaces"

  - id: mcp_auth_hierarchy
    text: "Auth hierarchy: managed identity > Entra OAuth2 > API key"
    source: "claude-runtime-surfaces"

build_order:
  - phase: 1
    skills: [agent-pattern-selection, skill-type-classification]
    reason: "Foundation: pattern choice and skill classification come first"

  - phase: 2
    skills: [sequential-workflow-design, parallel-workflow-design, evaluator-optimizer-design]
    reason: "Workflow patterns — the most common patterns after single call"

  - phase: 3
    skills: [autonomous-agent-fit-assessment, skill-trigger-tuning, skill-eval-authoring]
    reason: "Advanced: agent assessment, trigger optimization, eval design"

  - phase: 4
    skills: [skill-benchmarking, claude-mcp-integration, claude-foundry-runtime-integration]
    reason: "Runtime: benchmarking and platform integration"
