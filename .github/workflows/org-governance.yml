name: Org Governance Check

on:
  push:
    branches: [main]
    paths:
      - 'ssot/governance/**'
  pull_request:
    branches: [main]
    paths:
      - 'ssot/governance/**'

permissions:
  contents: read

jobs:
  validate-org-manifest:
    name: Validate org-repo-target-state manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate YAML parses cleanly
        run: |
          python3 -c "
          import yaml, sys
          path = 'ssot/governance/org-repo-target-state.yaml'
          try:
              with open(path) as f:
                  data = yaml.safe_load(f)
              if not isinstance(data, dict):
                  print(f'FAIL: {path} did not parse as a YAML mapping')
                  sys.exit(1)
              print(f'PASS: {path} is valid YAML')
          except Exception as e:
              print(f'FAIL: {path} — {e}')
              sys.exit(1)
          "

      - name: Validate all 12 repos listed in manifest
        run: |
          python3 -c "
          import yaml, sys

          with open('ssot/governance/org-repo-target-state.yaml') as f:
              data = yaml.safe_load(f)

          repos = data.get('repos', [])
          repo_names = [r['name'] for r in repos]

          expected = [
              '.github', 'odoo', 'platform', 'data-intelligence',
              'agent-platform', 'web', 'infra', 'automations',
              'agents', 'design', 'docs', 'templates',
          ]

          missing = [r for r in expected if r not in repo_names]
          if missing:
              print(f'FAIL: repos missing from manifest: {missing}')
              sys.exit(1)

          print(f'PASS: all {len(expected)} expected repos present in manifest')
          print(f'  Listed: {repo_names}')
          "

      - name: Check each repo plane has README and ssot/ dir
        run: |
          set -euo pipefail
          fail=0

          # Map repo names to monorepo directories (where applicable)
          # .github, odoo, infra, docs, templates map directly
          # Some repos are top-level dirs in this monorepo
          planes=(
            platform
            agent-platform
            agents
            automations
            data-intelligence
            web
            design
            templates
          )

          for plane in "${planes[@]}"; do
            if [ ! -f "${plane}/README.md" ]; then
              echo "WARN: ${plane}/README.md missing"
            fi
            if [ ! -d "${plane}/ssot" ] && [ ! -d "ssot" ]; then
              echo "WARN: no ssot/ directory found for ${plane}"
            fi
          done

          # Verify top-level ssot/ exists (shared across all planes)
          if [ ! -d "ssot" ]; then
            echo "FAIL: top-level ssot/ directory missing"
            exit 1
          fi
          echo "PASS: top-level ssot/ directory exists"

          # Verify governance SSOT files are present
          required=(
            ssot/governance/org-repo-target-state.yaml
            ssot/governance/platform-authority-split.yaml
            ssot/governance/ci-cd-authority-matrix.yaml
            ssot/governance/repo-delivery-disposition.yaml
          )
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FAIL: required governance file missing: $f"
              fail=1
            else
              echo "PASS: $f exists"
            fi
          done

          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "All governance checks passed."
