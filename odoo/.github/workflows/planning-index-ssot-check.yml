# DISABLED: GHA runners non-functional (billing). CI migrating to Azure DevOps Pipelines.
# To re-enable: remove `if: false` from jobs.
name: Planning Index SSOT Check

on:
  push:
    paths:
      - 'ssot/governance/*.yaml'
      - 'platform/data/contracts/control_room_kpis.yaml'
      - 'scripts/ci/validate_planning_index.py'
      - 'scripts/ci/validate_goals_crosslayer.py'
      - '.github/workflows/planning-index-ssot-check.yml'
  pull_request:
    paths:
      - 'ssot/governance/*.yaml'
      - 'platform/data/contracts/control_room_kpis.yaml'
      - 'scripts/ci/validate_planning_index.py'
      - 'scripts/ci/validate_goals_crosslayer.py'
      - '.github/workflows/planning-index-ssot-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-index:
    name: Validate planning system index
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate planning index
        run: python scripts/ci/validate_planning_index.py

  validate-crosslayer:
    name: Validate cross-layer consistency
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate cross-layer references
        run: python scripts/ci/validate_goals_crosslayer.py
