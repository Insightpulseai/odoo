name: odoo-runtime-contract

on:
  pull_request:
    paths:
      - "addons/**"
      - "config/**"
      - "docs/architecture/**"
      - "requirements*.txt"
      - "**/requirements.txt"
      - ".gitmodules"
      - ".github/workflows/odoo-runtime-contract.yml"
  push:
    branches:
      - main
    paths:
      - "addons/**"
      - "config/**"
      - "docs/architecture/**"
      - "requirements*.txt"
      - "**/requirements.txt"
      - ".gitmodules"
      - ".github/workflows/odoo-runtime-contract.yml"

jobs:
  runtime-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate runtime contract doc exists
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/architecture/RUNTIME_CONTRACT_AZURE_ODOO.md

      - name: Validate requirements files parse
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          bad = []
          seen = set()
          final = []
          for p in Path(".").rglob("requirements.txt"):
              r = p.resolve()
              if r not in seen:
                  seen.add(r)
                  final.append(p)
          for rf in final:
              for i, line in enumerate(rf.read_text(encoding="utf-8").splitlines(), start=1):
                  s = line.strip()
                  if not s or s.startswith("#"):
                      continue
                  if s.startswith(("-r ", "--requirement ", "-c ", "--constraint ", "-e ", "--editable ")):
                      continue
                  if "://" in s:
                      continue
                  if ";" in s:
                      s = s.split(";", 1)[0].strip()
                  allowed = any(ch in s for ch in "<>!=~@")
                  if not allowed and " " in s:
                      bad.append(f"{rf}:{i}: invalid requirement line '{line}'")
          if bad:
              print("\n".join(bad))
              raise SystemExit(1)
          print(f"Validated {len(final)} requirements file(s)")
          PY

      - name: Validate git submodules when declared
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .gitmodules ]; then
            git submodule status --recursive
          else
            echo "No .gitmodules present"
          fi

      - name: Validate addon manifest discovery
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          manifests = list(Path("addons").rglob("__manifest__.py")) if Path("addons").exists() else []
          if not manifests:
              print("No addon manifests found under addons/")
              raise SystemExit(1)
          print(f"Discovered {len(manifests)} addon manifest(s)")
          for m in sorted(manifests)[:20]:
              print(f"  {m}")
          PY

      - name: Validate canonical database names in runtime contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q "odoo_dev" docs/architecture/RUNTIME_CONTRACT_AZURE_ODOO.md
          grep -q "odoo_staging" docs/architecture/RUNTIME_CONTRACT_AZURE_ODOO.md
          grep -q "odoo" docs/architecture/RUNTIME_CONTRACT_AZURE_ODOO.md

      - name: Build runtime contract evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "runtime_contract_check: pass"
            echo "commit_sha: ${GITHUB_SHA}"
            echo "ref_name: ${GITHUB_REF_NAME}"
            echo "generated_at_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/odoo-runtime-contract-evidence.txt

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: odoo-runtime-contract-evidence
          path: artifacts/odoo-runtime-contract-evidence.txt
