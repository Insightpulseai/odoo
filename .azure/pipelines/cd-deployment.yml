trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Deploy_Dev
    displayName: 'Deploy to Dev'
    jobs:
      - deployment: DevDeployment
        environment: 'insightpulseai-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    echo "==> Deploying to insightpulseai-dev"
                    make tf-plan
                    make tf-apply
                  displayName: 'Execute Infrastructure Deployment'

  - stage: Deploy_Staging
    displayName: 'Deploy to Staging'
    dependsOn: Deploy_Dev
    condition: succeeded()
    jobs:
      - deployment: StagingDeployment
        environment: 'insightpulseai-staging' # Manual approval gate required in ADO
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    echo "==> Deploying to insightpulseai-staging"
                    make tf-plan
                    make tf-apply
                  displayName: 'Execute Infrastructure Deployment'

  - stage: Deploy_Prod
    displayName: 'Deploy to Prod'
    dependsOn: Deploy_Staging
    condition: succeeded()
    jobs:
      - deployment: ProdDeployment
        environment: 'insightpulseai-prod' # Manual approval gate required in ADO
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    echo "==> Deploying to insightpulseai-prod"
                    make tf-plan
                    make tf-apply
                  displayName: 'Execute Infrastructure Deployment'
