# foundry_coverage_matrix.yaml
# SSOT: Microsoft Foundry documentation coverage contract
# Tracks whether the Azure Platform KB covers the full Foundry doc surface.
# Source: Azure AI Foundry left-nav taxonomy on MS Learn
# Last updated: 2026-03-15

meta:
  title: "Microsoft Foundry Coverage Matrix"
  description: >
    Enumerates all 12 Foundry documentation areas and tracks KB coverage status.
    Each bucket maps to a doc area from the Foundry portal left-nav on MS Learn.
  base_url: "https://learn.microsoft.com/en-us/azure/ai-foundry/"
  review_cadence: "monthly"
  owner: "platform-knowledge"

# Priority definitions:
#   P0 — Must be covered before KB is production-ready
#   P1 — Should be covered within one sprint of P0 completion
#   P2 — Nice to have; cover when bandwidth allows

# Status definitions:
#   covered       — KB answers 80%+ of acceptance queries correctly
#   partial       — KB answers some queries but has known gaps
#   missing       — No KB content exists for this area
#   not_in_scope  — Intentionally excluded (document reason)

buckets:

  # ──────────────────────────────────────────────
  # 1. Get Started
  # ──────────────────────────────────────────────
  - name: get-started
    priority: P0
    status: partial
    owner: platform-knowledge
    description: >
      Foundry portal overview, quickstarts, first project creation,
      and playground walkthroughs.
    source_urls:
      - https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry
      - https://learn.microsoft.com/en-us/azure/ai-foundry/quickstarts/get-started-playground
      - https://learn.microsoft.com/en-us/azure/ai-foundry/quickstarts/get-started-code
      - https://learn.microsoft.com/en-us/azure/ai-foundry/how-to/create-projects
      - https://learn.microsoft.com/en-us/azure/ai-foundry/how-to/create-hub-project
    expected_tools:
      - get_foundry_quickstart_guidance
      - get_foundry_project_setup
      - get_foundry_playground_walkthrough
    acceptance_queries:
      - "How do I create my first Azure AI Foundry project?"
      - "What is the difference between a hub and a project in Foundry?"
      - "How do I use the Foundry playground to test a model?"
      - "What prerequisites do I need before starting with Azure AI Foundry?"

