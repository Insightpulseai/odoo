  request_destination: listed in Partner Center UI as admin@insightpulseai.com + 5 break-glass (all are valid request targets per Partner Center)
  action: submit access request via Partner Center My Access page
  rationale_for_access: >
    Security Workspace is a centralized security posture + incident
    triage surface. Relevant to IPAI's agentic workflow security
    doctrine + go-live readiness. Access should be granted to
    admin@insightpulseai.com (Jake) as platform-architecture.

# -----------------------------------------------------------------------------
# Success criteria
# -----------------------------------------------------------------------------
success_criteria:
  - id: BG-1
    description: Total Global Administrators reduced from 6 to 3
    target: 3 (2 BG + 1 PIM-eligible Jake)
    measurement: az rest /directoryRoles/GA/members count
  - id: BG-2
    description: CA policy exempts only the 2 break-glass accounts from MFA
    target: 2 exempted, all others covered
    measurement: ca_policy_audit
  - id: BG-3
    description: Monitoring alert fires on any break-glass sign-in
    target: true
    measurement: alert_rule_presence + test_event
  - id: BG-4
    description: Break-glass procedure runbook exists
    target: docs/runbooks/break-glass-admin-procedure.md
    measurement: file_presence
  - id: BG-5
    description: Jake moved from standing GA to PIM-eligible
    target: admin@ has no permanent GA; has eligible assignment via PIM
    measurement: pim_eligibility_report

# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not enforcing MFA on break-glass accounts (anti-pattern — breaks recovery)
  - not reducing below 2 break-glass accounts (single-point-of-failure)
  - not deleting break-glass accounts without password verification first
  - not executing PIM migration during go-live cutover window
  - not exposing break-glass passwords in any digital system beyond encrypted secure storage

