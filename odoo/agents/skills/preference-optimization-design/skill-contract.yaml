version: 1
name: preference-optimization-design
description: "Design DPO/GRPO preference optimization stages for post-SFT alignment refinement"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: post-training-engineer
source_family: hf_smol_training_playbook
status: active

triggers:
  - "preference optimization"
  - "DPO training"
  - "GRPO training"
  - "post-SFT alignment"

inputs:
  - sft_model: "SFT-aligned model checkpoint"
  - preference_data: "Chosen/rejected pairs (DPO) or generation config (GRPO)"
  - optimization_method: "DPO or GRPO"

steps:
  - id: select_method
    action: "Choose DPO (offline, preference pairs) vs GRPO (online, generated data)"
  - id: prepare_data
    action: "Format preference data per method requirements"
  - id: configure_trainer
    action: "Set DPOTrainer or GRPO config with appropriate beta/loss"
  - id: train
    action: "Run preference optimization"
  - id: evaluate
    action: "Compare to SFT baseline on preference benchmarks"

outputs:
  - method: "DPO or GRPO"
  - config: "Trainer configuration"
  - aligned_checkpoint: "Preference-optimized model"
  - comparison: "Quality vs SFT baseline"

guardrails:
  - "DPO requires high-quality preference data (chosen/rejected pairs)"
  - "GRPO iteratively improves from generated data — monitor for reward hacking"
  - "Always compare to SFT baseline to verify improvement"
  - "Beta parameter controls preference strength — too high = over-optimization"

benchmark_source: "https://huggingface.co/docs/trl/dpo_trainer"
