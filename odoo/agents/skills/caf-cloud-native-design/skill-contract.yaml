version: 1
type: benchmark_skill
classification: capability_uplift
family: microsoft-caf
skill:
  name: caf-cloud-native-design
  id: caf-cloud-native-design
  version: "0.1.0"
  status: draft
  owner_persona: cloud-native-architect
  source_family: microsoft-caf
  benchmark_source: "Microsoft Cloud Adoption Framework"
  purpose: >
    Design new cloud-native workloads and features using CAF Cloud-native
    phase methodology. Covers microservices architecture, container orchestration,
    serverless patterns, event-driven design, cloud-native data services,
    and DevOps practices.

  triggers:
    - new greenfield workload design
    - serverless or event-driven architecture evaluation
    - microservices decomposition assessment
    - container orchestration platform selection
    - cloud-native data service selection

  inputs:
    - workload requirements (functional, non-functional)
    - scalability and availability targets
    - integration points with existing services
    - team skills and operational capacity
    - budget constraints

  steps:
    - define workload requirements and constraints
    - evaluate architecture patterns (microservices, serverless, event-driven)
    - select compute platform (ACA, AKS, Functions, Logic Apps)
    - design data architecture (managed databases, event stores, caches)
    - design event-driven flows (Service Bus, Event Grid, Event Hubs)
    - define API design and service communication patterns
    - establish DevOps pipeline (CI/CD, GitOps, progressive delivery)
    - design observability (distributed tracing, metrics, logs)
    - validate design against Well-Architected Framework pillars
    - document architecture with decision records

  outputs:
    - architecture_design
    - compute_selection_rationale
    - data_architecture
    - event_flow_design
    - devops_pipeline_design
    - architecture_decision_records

  guardrails:
    - "CAF is a benchmark reference, not a runtime dependency"
    - "Canonical stack remains Odoo CE + Azure Container Apps"
    - "A benchmark becomes integration only with explicit contract in docs/contracts/"
    - "ACA is the default compute — AKS requires explicit justification"
    - "Serverless must account for cold start impact"
    - "Microservices decomposition must be justified by team and scale needs"

  evidence:
    required: true
    format: "docs/evidence/{stamp}/caf/cloud-native/"

  evals:
    dimensions: [accuracy, completeness, scalability, operability, evidence_quality]
    thresholds:
      accuracy: 0.90
      operability: 0.90

cross_references:
  - agents/knowledge/benchmarks/microsoft-cloud-adoption-framework.md
  - agents/personas/cloud-native-architect.md
  - agents/skills/azure-deployment-ops/
  - agents/skills/caf-workload-modernization/
  - agent-platform/ssot/learning/microsoft_caf_skill_map.yaml
