# Website Maintenance & Support Skill
# Ongoing website health, updates, and performance optimization

name: website_maintenance
version: 1.0.0
key: web.maintenance
description: |
  Maintain websites: performance optimization, security updates,
  content management, uptime monitoring, and SEO maintenance.

intents:
  - maintain website
  - website performance
  - website security
  - uptime monitoring
  - seo optimization
  - website updates

guardrails:
  - Never modify production without backup
  - Security patches within 24h of CVE disclosure
  - Performance changes must show before/after metrics
  - SEO changes must not break existing rankings

tools:
  - key: webmaint.performance
    name: Performance Audit
    target_model: ipai.webmaint.runner
    target_method: audit_performance
    description: Run Lighthouse, Core Web Vitals analysis

  - key: webmaint.security
    name: Security Scan
    target_model: ipai.webmaint.runner
    target_method: scan_security
    description: Run security scans (headers, SSL, dependencies)

  - key: webmaint.seo
    name: SEO Audit
    target_model: ipai.webmaint.runner
    target_method: audit_seo
    description: Check meta tags, structured data, sitemap, robots.txt

  - key: webmaint.update
    name: Apply Updates
    target_model: ipai.webmaint.runner
    target_method: apply_updates
    description: Update dependencies, content, and configurations

workflow:
  - webmaint.performance
  - webmaint.security
  - webmaint.seo
  - webmaint.update

input_schema:
  type: object
  required:
    - site_url
  properties:
    site_url: { type: string }
    maintenance_type:
      type: string
      enum: [performance, security, seo, content, dependency_update, full_audit]
    priority: { type: string, enum: [critical, high, medium, low] }

output_schema:
  type: object
  properties:
    performance_score: { type: number }
    security_issues: { type: array, items: { type: string } }
    seo_score: { type: number }
    updates_applied: { type: array, items: { type: string } }

agentInstructions: |
  When maintaining websites:

  1. **Performance**: Lighthouse CI, bundle analysis, image optimization
  2. **Security**: SSL check, header audit, dependency CVE scan
  3. **SEO**: Meta tags, Open Graph, structured data, sitemap
  4. **Updates**: Dependency bumps, content refreshes, config tuning
