version: "1.0"
schema: supabase.cutover.dns.v1
updated_at: "2026-03-14"

zone: insightpulseai.com
# Cloudflare Zone ID — retrieve via: cf api /zones?name=insightpulseai.com
zone_id: "73f587aee652fc24fd643aec00dcca81"
provider: cloudflare
# DNS is in proxy mode (orange cloud) — Cloudflare terminates TLS,
# forwards to VM IP over HTTP unless Full (strict) SSL mode is enabled in CF.
# Ensure CF SSL mode = Full or Full(strict) before enabling proxy on these records.

target_vm_ip: "4.193.100.31"

records:
  # ── Primary: Supabase API gateway ────────────────────────────────────────
  - subdomain: supabase
    fqdn: supabase.insightpulseai.com
    type: A
    current: null   # Record does not yet exist — create it
    target: "4.193.100.31"
    proxied: true   # Cloudflare proxy (orange cloud) — hides origin IP, adds TLS
    ttl: 300        # 5 min; lower to 60 during active cutover window
    purpose: "Supabase API gateway (Kong) + Auth + Storage + Realtime"
    # Kong listens on :8000 (HTTP) behind nginx on :80/:443 on the VM.
    # nginx reverse-proxies supabase.insightpulseai.com → localhost:8000
    verification_commands:
      - "dig +short supabase.insightpulseai.com"
      - "curl -sf https://supabase.insightpulseai.com/rest/v1/ -H 'apikey: ${SUPABASE_ANON_KEY}'"
      - "curl -sf https://supabase.insightpulseai.com/auth/v1/health"
    verification_expected:
      rest: "HTTP 200 with JSON body"
      auth: "HTTP 200 with {\"status\":\"ok\"}"
    cutover_gate: true  # Pipeline will not proceed past DNS phase until this resolves

  # ── Secondary: n8n workflow automation ───────────────────────────────────
  - subdomain: n8n
    fqdn: n8n.insightpulseai.com
    type: A
    current: null   # Record does not yet exist — create it
    target: "4.193.100.31"
    proxied: true
    ttl: 300
    purpose: "n8n workflow automation, co-deployed on Supabase VM port 5678"
    # nginx reverse-proxies n8n.insightpulseai.com → localhost:5678
    verification_commands:
      - "dig +short n8n.insightpulseai.com"
      - "curl -sf https://n8n.insightpulseai.com/healthz"
    verification_expected:
      healthz: "HTTP 200"
    cutover_gate: false  # n8n is secondary; pipeline may proceed if n8n is degraded

# ── Pre-cutover checklist ──────────────────────────────────────────────────
# These checks MUST pass before DNS records are created.
# Run via: ops-platform/supabase/scripts/supabase_cutover_verify.sh --phase dns-pre
pre_cutover_checks:
  - id: nginx_running
    description: "Verify VM nginx is running and listening on :80 and :443"
    command: "ssh azureuser@4.193.100.31 'sudo systemctl is-active nginx'"
    expected: "active"

  - id: nginx_supabase_vhost
    description: "Verify nginx has a server block for supabase.insightpulseai.com"
    command: "ssh azureuser@4.193.100.31 'sudo nginx -T 2>&1 | grep supabase.insightpulseai.com'"
    expected: "at least one match"

  - id: kong_localhost
    description: "Verify Kong REST API responds on localhost:8000"
    command: "ssh azureuser@4.193.100.31 'curl -sf http://localhost:8000/rest/v1/ -H \"apikey: ${SUPABASE_ANON_KEY}\"'"
    expected: "HTTP 200"

  - id: n8n_localhost
    description: "Verify n8n healthz responds on localhost:5678"
    command: "ssh azureuser@4.193.100.31 'curl -sf http://localhost:5678/healthz'"
    expected: "HTTP 200"

  - id: cloudflare_ssl_mode
    description: "Verify Cloudflare SSL mode is Full or Full(strict) for zone"
    command: "cf api GET /zones/${CF_ZONE_ID}/settings/ssl | jq .result.value"
    expected: "full or strict"

  - id: tls_cert_ready
    description: "Cloudflare will issue TLS automatically when proxied=true — no action needed"
    command: "echo 'Cloudflare managed cert — auto-issued on first request'"
    expected: "informational"

# ── Post-cutover checklist ─────────────────────────────────────────────────
# Run via: ops-platform/supabase/scripts/supabase_cutover_verify.sh --phase dns-post
post_cutover_checks:
  - id: dns_propagation_supabase
    description: "DNS propagation check for supabase subdomain"
    command: "dig +short supabase.insightpulseai.com @1.1.1.1"
    expected: "Returns Cloudflare proxy IP (not 4.193.100.31 directly)"

  - id: https_root
    description: "HTTPS root endpoint responds"
    command: "curl -sf -o /dev/null -w '%{http_code}' https://supabase.insightpulseai.com/"
    expected: "200 or 404 (Kong default route)"

  - id: https_auth_health
    description: "Auth service health endpoint"
    command: "curl -sf https://supabase.insightpulseai.com/auth/v1/health"
    expected: "HTTP 200, body contains status:ok"

  - id: https_rest
    description: "REST API endpoint responds with schema header"
    command: "curl -sf https://supabase.insightpulseai.com/rest/v1/ -H 'apikey: ${SUPABASE_ANON_KEY}'"
    expected: "HTTP 200"

  - id: https_storage
    description: "Storage API health endpoint"
    command: "curl -sf https://supabase.insightpulseai.com/storage/v1/health"
    expected: "HTTP 200, body contains {\"healthy\":true}"

  - id: https_realtime
    description: "Realtime endpoint upgrade header present"
    command: "curl -sf -I https://supabase.insightpulseai.com/realtime/v1/"
    expected: "HTTP 101 or 400 (upgrade required) — not 502/503"

  - id: https_n8n
    description: "n8n healthz via public hostname"
    command: "curl -sf https://n8n.insightpulseai.com/healthz"
    expected: "HTTP 200"

# ── Rollback ──────────────────────────────────────────────────────────────
# DNS rollback: delete or update A records to remove self-hosted routing.
# Consumers pointing to supabase.insightpulseai.com will need SUPABASE_URL
# reverted to https://spdtwktxdalcfigzeqrz.supabase.co.
rollback:
  method: "Delete or disable A records in Cloudflare; revert consumer SUPABASE_URL"
  cloudflare_api: "DELETE /zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}"
  ttl_note: "Low TTL (300s) means rollback propagates within 5 minutes"
