# Nginx Configuration - auth.insightpulseai.com
# Status: PRODUCTION
# Last Updated: 2026-03-05
#
# Purpose: Reverse proxy to auth-prod container (Express)
# Container: auth-prod binds 0.0.0.0:8080 → 8080/tcp

upstream auth {
    server 127.0.0.1:8080;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name auth.insightpulseai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to auth service
server {
    listen 443 ssl http2;
    server_name auth.insightpulseai.com;

    ssl_certificate /etc/letsencrypt/live/insightpulseai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insightpulseai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://auth;
        proxy_redirect off;
    }

    access_log /var/log/nginx/auth.insightpulseai.com.access.log combined;
    error_log /var/log/nginx/auth.insightpulseai.com.error.log warn;
}
