stack_classification:
  mandatory:
    description: "Required for ERP SaaS runtime"
    services: [svc_030, svc_031, svc_032, svc_033, svc_034, svc_035, svc_036, svc_037, svc_038]
  optional_strong:
    description: "Recommended for production hardening"
    services: []
    candidates: ["Service Bus", "Event Grid", "Function App", "API Management", "NAT Gateway", "Azure Policy"]
  optional_data_ai:
    description: "Data/AI plane — separate from delivery"
    services: [svc_040]

erp_positioning:
  canonical_statement: "Odoo CE 19 is the system of record for all financial transactions, HR, CRM, approvals, and compliance data. It is self-hosted on DigitalOcean, NOT SaaS."
  prohibited_terms:
    - "Odoo SaaS"
    - "Odoo.sh"
    - "Odoo Enterprise"
    - "Odoo Online"
  required_qualifier: "self-hosted CE 19"
