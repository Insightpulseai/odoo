# Knowledge Base Registry — All KBs in the IPAI Agent Platform
# Single source of truth for what knowledge is indexed and where.

name: ipai-knowledge-registry
description: Central registry of all knowledge bases powering IPAI agent skills

knowledge_bases:
  # 1. Odoo 19 Documentation
  - name: odoo19-docs
    description: Odoo 19 official documentation (RST)
    status: active
    index_name: odoo19-docs
    source_contract: agents/knowledge/odoo19_docs/source.yaml
    chunking_contract: agents/knowledge/odoo19_docs/chunking.yaml
    indexing_contract: agents/knowledge/odoo19_docs/indexing.yaml
    skill: agents/skills/odoo_docs_rag/skill.yaml
    service: apps/odoo-docs-kb/service.py
    loader: packages/odoo-docs-kb/loader.py
    chunker: packages/odoo-docs-kb/chunker.py  # RST heading-aware
    refresh_workflow: .github/workflows/odoo-docs-kb-refresh.yml
    source_type: git-repo
    source_repo: odoo/documentation
    source_branch: "19.0"
    stats:
      files: 1106
      chunks: 7224
      avg_chunks_per_file: 6.5
    embedding:
      model: text-embedding-ada-002
      dimensions: 1536

  # 2. Azure Platform Documentation
  - name: azure-platform
    description: Azure platform docs (Container Apps, Front Door, AI Search, OpenAI, PostgreSQL, Key Vault, Entra ID, Foundry, DevOps)
    status: scaffold
    index_name: azure-platform-docs
    source_contract: agents/knowledge/azure_platform/source.yaml
    chunking_contract: agents/knowledge/azure_platform/chunking.yaml
    indexing_contract: agents/knowledge/azure_platform/indexing.yaml
    skill: agents/skills/azure_platform/skill.yaml
    loader: packages/odoo-docs-kb/web_loader.py
    chunker: packages/odoo-docs-kb/md_chunker.py  # Markdown heading-aware
    source_type: web-crawl
    source_domains:
      - learn.microsoft.com
      - azure.microsoft.com
    service_scope:
      - container-apps
      - frontdoor
      - search
      - ai-services/openai
      - postgresql/flexible-server
      - key-vault
      - entra
      - foundry
      - devops/repos
    foundry:
      description: >
        Microsoft Foundry coverage — explicit subdomain tracking for the unified AI platform.
        Coverage contract defined in foundry_coverage_matrix.yaml.
      coverage_contract: agents/knowledge/azure_platform/foundry_coverage_matrix.yaml
      coverage_buckets:
        - get-started           # Project creation, portal, quickstarts
        - agent-service         # Agent deployment, tools, sharing, multi-agent
        - models                # Model catalog, deployment, inference
        - guardrails            # Content filters, safety, tool governance
        - responsible-ai        # RAI constraints, limited access, transparency
        - api-sdk               # azure-ai-projects SDK, REST API, client patterns
        - evaluation-tracing    # Evaluation, tracing, continuous monitoring
        - developer-experience  # VS Code, playgrounds, hosted agents
        - security-governance   # RBAC, networking, identity, data protection
        - operations            # Quotas, regions, support, operate
        - architecture          # Hub/project topology, resource providers
        - migration             # Azure AI Studio to Foundry migration
    embedding:
      model: text-embedding-ada-002
      dimensions: 1536

  # 3. Databricks Documentation & Solutions
  - name: databricks
    description: Databricks docs — CLI, data engineering, apps, Azure integration, industry solutions (financial services, marketing, retail, media)
    status: scaffold
    index_name: databricks-docs
    source_contract: agents/knowledge/databricks/source.yaml
    chunking_contract: agents/knowledge/databricks/chunking.yaml
    indexing_contract: agents/knowledge/databricks/indexing.yaml
    skill: agents/skills/databricks/skill.yaml
    loader: packages/odoo-docs-kb/web_loader.py
    chunker: packages/odoo-docs-kb/md_chunker.py
    source_type: web-crawl
    source_domains:
      - docs.databricks.com
      - www.databricks.com
    domain_scope:
      - developer
      - data-engineering
      - apps
      - azure-integration
      - industry-solutions
    industry_verticals:
      - financial-services
      - marketing
      - retail
      - media-entertainment
    embedding:
      model: text-embedding-ada-002
      dimensions: 1536

  # 4. Organization-Wide Documentation
  - name: org-docs
    description: Organization-wide internal documentation (architecture, contracts, specs, runbooks, policies)
    status: scaffolded
    index_name: org-docs
    sources:
      - repo-docs
      - spec-bundles
      - architecture-docs
      - runbooks
      - policy-docs
    skill: agents/skills/org_docs/skill.yaml
    service: apps/org-docs-kb/service.py
    refresh_workflow: .github/workflows/org-docs-refresh.yml
    source_type: repo-local
    doc_types:
      - architecture
      - contract
      - spec
      - runbook
      - config
      - reference
      - guide
      - policy
    embedding:
      model: text-embedding-ada-002
      dimensions: 1536

# Shared infrastructure
shared:
  embedding_service: Azure OpenAI (text-embedding-ada-002)
  vector_store: Azure AI Search
  generation_service: Azure OpenAI (gpt-4o via Microsoft Foundry)
  runtime: Azure Container Apps
  secrets: Azure Key Vault (kv-ipai-dev)
  orchestration: Microsoft Foundry (azure-ai-projects 2.x SDK)

# Foundry integration
foundry:
  description: >
    All KBs use Microsoft Foundry as the unified AI platform.
    Foundry consolidates Azure OpenAI + AI Search + agent orchestration
    under a single project client (azure-ai-projects 2.x).
  key_capabilities:
    - Multi-agent orchestration and workflows
    - Tool catalog (1400+ tools)
    - Memory (contextual information across interactions)
    - Foundry IQ knowledge integration (grounded, citation-backed answers)
    - Real-time observability (tracing, monitoring, evaluations)
    - Enterprise controls (RBAC, networking, policies)
  sdk: azure-ai-projects>=2.0
  portal: https://ai.azure.com
  agent_api: Responses API (Agents v2)
