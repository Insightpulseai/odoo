version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-report-customization
  status: active
  owner: agents
  build_order: 7
  lane: reporting
  purpose: >
    Customize PDF reports, QWeb report templates, and operational print surfaces
    in Odoo CE 18. Uses inherited QWeb templates to extend existing reports and
    creates new report actions following Odoo conventions.

  triggers:
    - custom report layout or content required
    - existing report needs additional fields or sections
    - new printable document (invoice, picking, etc.) needed
    - report rendering issue or formatting fix

  inputs:
    - target_report (XML ID of existing report to extend, or null for new)
    - modifications (fields, layout changes, branding)
    - paper_format (optional)
    - report_type (qweb-pdf or qweb-html)

  steps:
    - identify base report template by XML ID
    - create inherited QWeb template in report/ or views/ directory
    - use t-call, t-foreach, t-if for template logic
    - add report action (ir.actions.report) with correct model binding
    - configure paper format if custom sizing needed
    - register template in __manifest__.py data section
    - test rendering with actual data on disposable DB
    - verify PDF generation completes without error

  outputs:
    - template_file_path
    - report_action_xmlid
    - paper_format (if customized)
    - render_test_result
    - evidence

  guardrails:
    - prefer inherited templates over replacement
    - never directly modify core report templates
    - use t-esc for escaped output, t-raw only when HTML is intentional and safe
    - report templates must handle empty/null data gracefully
    - test with actual records, not just empty renders
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-report-customization/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo18-coding.md
