version: 1
namespace: ipai.ops_platform.foundry.model_registry.v1
artifact_type: registry
repo_key: ops_platform
domain: foundry
subject: model_registry

models:
  - alias: chat_default
    owner_repo: agents
    deployment_name: ipai-chat-default
    source_class: azure_direct
    endpoint_class: openai_v1
    sdk_mode: openai_sdk
    deployment_mode: managed_compute
    environment_bindings:
      dev: ipai-chat-default-dev
      staging: ipai-chat-default-staging
      prod: ipai-chat-default-prod
    approved_for:
      - ops_console
      - internal_agents
      - docs_assistant

  - alias: router_balanced
    owner_repo: agents
    deployment_name: ipai-router-balanced
    source_class: azure_direct_or_router
    endpoint_class: openai_v1
    sdk_mode: openai_sdk
    deployment_mode: managed_compute
    routing_mode: balanced
    approved_for:
      - mixed_complexity_chat
      - knowledge_assistants

  - alias: coding_default
    owner_repo: agents
    deployment_name: ipai-coding-default
    source_class: azure_direct
    endpoint_class: foundry_project
    sdk_mode: foundry_sdk
    deployment_mode: managed_compute
    approved_for:
      - coding_agents
      - remediation_agents

  - alias: embedding_default
    owner_repo: lakehouse
    deployment_name: ipai-embedding-default
    source_class: azure_direct
    endpoint_class: inference
    sdk_mode: openai_sdk
    deployment_mode: managed_compute
    approved_for:
      - retrieval
      - semantic_search

  - alias: vision_extract_default
    owner_repo: agents
    deployment_name: ipai-vision-extract-default
    source_class: foundry_tools_or_model
    endpoint_class: tool_specific
    sdk_mode: foundry_tools_sdk
    deployment_mode: managed_compute
    approved_for:
      - invoices
      - receipts
      - contracts

  - alias: reasoning_default
    owner_repo: agents
    deployment_name: ipai-reasoning-default
    source_class: azure_direct
    endpoint_class: openai_v1
    sdk_mode: openai_sdk
    deployment_mode: managed_compute
    approved_for:
      - close_assistant
      - compliance_review
      - complex_analysis
