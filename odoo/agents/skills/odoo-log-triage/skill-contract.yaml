version: 1
type: delivery_skill
family: odoo_sh_delivery
skill:
  name: odoo-log-triage
  status: draft
  owner: odoo-developer
  purpose: >
    Filter, classify, and triage Odoo server logs from Azure Container Apps.
    Identify errors, warnings, and performance anomalies. Produce structured
    triage reports with root cause classification.

  triggers:
    - error rate spike in Azure Monitor alerts
    - manual log review request
    - post-deployment health check
    - user-reported issue requiring log analysis

  inputs:
    - container app name and revision
    - time range for log query
    - error pattern or keyword filter
    - Azure Log Analytics workspace ID
    - Odoo log level configuration

  steps:
    - query Azure Log Analytics for container app logs in time range
    - filter by severity (ERROR, WARNING, CRITICAL)
    - classify errors by category (ORM, HTTP, module, database, timeout, memory)
    - identify recurring patterns and frequency
    - correlate with deployment events (revision changes)
    - produce structured triage report with root cause assessment
    - capture evidence in standard format

  outputs:
    - triage_report
    - error_classification
    - pattern_analysis
    - root_cause_assessment
    - findings
    - evidence

  guardrails:
    - never expose secrets found in logs — redact before reporting
    - read-only log access — never modify log configuration without explicit request
    - never dismiss recurring errors as noise without classification
    - bind to Azure Log Analytics, not Odoo.sh log viewer
    - never access production logs without documenting the reason

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-delivery/odoo-log-triage/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-sh-persona-model.md
  - agents/personas/odoo-developer.md
  - .claude/rules/infrastructure.md
