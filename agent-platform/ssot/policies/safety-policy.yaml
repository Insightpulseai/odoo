# safety-policy.yaml — agent execution safety boundaries
# Enforced by the executor at runtime.

version: "1.0.0"
last_updated: "2026-03-30"

execution_limits:
  max_tokens_per_call: 4096
  max_tool_calls_per_session: 50
  session_timeout_ms: 600000  # 10 minutes
  tool_call_timeout_ms: 30000  # 30 seconds

tool_policy:
  # Default: deny all tools not explicitly listed in agent manifest
  default_action: deny
  # Global blocklist — these tools are never available to any agent
  global_blocklist:
    - shell_exec_unrestricted
    - database_drop
    - secret_read_raw

content_policy:
  # Agents must not generate or relay secrets
  block_secret_patterns: true
  # Agents must not produce PII in logs
  redact_pii_in_telemetry: true

# TODO: Add per-agent override policies when agent manifests define custom boundaries
