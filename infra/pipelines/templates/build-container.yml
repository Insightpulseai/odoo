# =============================================================================
# pipelines/templates/build-container.yml
# =============================================================================
# Reusable step template: Docker build + ACR push with metadata labels.
#
# Usage:
#   - template: pipelines/templates/build-container.yml@templates
#     parameters:
#       serviceConnection: sc-azure-dev-platform
#       imageName: ipai-odoo-web
#       dockerfilePath: docker/Dockerfile.prod
#       context: .
#
# Design decisions:
#   - AzureCLI@2 for ACR login (workload identity federation compatible).
#   - Build metadata labels (git commit, build ID, branch) injected per
#     platform_delivery_contract.md §4.
#   - Image digest emitted as output variable for downstream deploy stages.
#   - Trivy scan is optional (default: on) — set runTrivy: false to skip.
# =============================================================================

parameters:
  - name: serviceConnection
    type: string

  - name: imageName
    type: string

  - name: dockerfilePath
    type: string
    default: Dockerfile

  - name: context
    type: string
    default: '.'

  - name: acrName
    type: string
    default: cripaidev

  - name: tagStrategy
    type: string
    default: commit-sha
    values:
      - commit-sha
      - build-number

  - name: runTrivy
    type: boolean
    default: true

steps:
  # ---------------------------------------------------------------------------
  # ACR login via service connection (workload identity federation)
  # ---------------------------------------------------------------------------
  - task: AzureCLI@2
    displayName: ACR login (${{ parameters.acrName }})
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        az acr login --name "${{ parameters.acrName }}"

  # ---------------------------------------------------------------------------
  # Compute image tag
  # ---------------------------------------------------------------------------
  - script: |
      set -euo pipefail
      if [[ "${{ parameters.tagStrategy }}" == "commit-sha" ]]; then
        TAG="$(Build.SourceVersion)"
      else
        TAG="$(Build.BuildNumber)"
      fi
      IMAGE="${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:${TAG}"
      IMAGE_LATEST="${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:latest"

      echo "##vso[task.setvariable variable=imageTag;isOutput=true]${TAG}"
      echo "##vso[task.setvariable variable=imageFqdn;isOutput=true]${IMAGE}"

      echo "Image tag   : ${TAG}"
      echo "Image FQDN  : ${IMAGE}"
    displayName: Compute image tag
    name: ImageMeta

  # ---------------------------------------------------------------------------
  # Docker build with metadata labels
  # ---------------------------------------------------------------------------
  - script: |
      set -euo pipefail
      TAG="$(ImageMeta.imageTag)"
      ACR="${{ parameters.acrName }}.azurecr.io"
      IMAGE="${ACR}/${{ parameters.imageName }}"

      echo "Building ${IMAGE}:${TAG}"
      docker build \
        --file "${{ parameters.dockerfilePath }}" \
        --tag "${IMAGE}:${TAG}" \
        --tag "${IMAGE}:latest" \
        --label "git.commit=$(Build.SourceVersion)" \
        --label "git.branch=$(Build.SourceBranchName)" \
        --label "build.id=$(Build.BuildId)" \
        --label "build.number=$(Build.BuildNumber)" \
        --label "build.pipeline=$(Build.DefinitionName)" \
        "${{ parameters.context }}"

      echo "Build complete."
      docker images "${IMAGE}" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
    displayName: Docker build (${{ parameters.imageName }})

  # ---------------------------------------------------------------------------
  # Push to ACR
  # ---------------------------------------------------------------------------
  - script: |
      set -euo pipefail
      TAG="$(ImageMeta.imageTag)"
      ACR="${{ parameters.acrName }}.azurecr.io"
      IMAGE="${ACR}/${{ parameters.imageName }}"

      echo "Pushing ${IMAGE}:${TAG}"
      docker push "${IMAGE}:${TAG}"
      docker push "${IMAGE}:latest"

      # Capture digest for deployment pinning
      DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${TAG}" 2>/dev/null || echo "unknown")
      echo "##vso[task.setvariable variable=imageDigest;isOutput=true]${DIGEST}"
      echo "Pushed. Digest: ${DIGEST}"
    displayName: Push to ACR (${{ parameters.acrName }})
    name: Push

  # ---------------------------------------------------------------------------
  # Trivy security scan (optional)
  # ---------------------------------------------------------------------------
  - ${{ if eq(parameters.runTrivy, true) }}:
    - script: |
        set -euo pipefail
        TAG="$(ImageMeta.imageTag)"
        ACR="${{ parameters.acrName }}.azurecr.io"
        IMAGE="${ACR}/${{ parameters.imageName }}:${TAG}"

        echo "Scanning ${IMAGE} with Trivy..."
        # Install Trivy if not present
        which trivy >/dev/null 2>&1 || {
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        }

        trivy image \
          --severity CRITICAL,HIGH \
          --exit-code 0 \
          --format table \
          "${IMAGE}" 2>&1 | tee /tmp/trivy-scan.txt

        echo "Scan complete."
      displayName: Trivy security scan (${{ parameters.imageName }})

    - publish: /tmp/trivy-scan.txt
      artifact: trivy-scan-${{ parameters.imageName }}
      displayName: Publish Trivy scan results
      condition: always()
