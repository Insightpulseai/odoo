# Shared infrastructure
shared:
  embedding_service:
    preferred: Azure OpenAI (text-embedding-3-small)   # New KBs
    high_quality: Azure OpenAI (text-embedding-3-large) # High-precision KBs
    legacy: Azure OpenAI (text-embedding-ada-002)       # Existing indexes only
  vector_store:
    backend: Azure AI Search
    api_version_current: "2024-07-01"
    api_version_target: "2025-09-01"
  generation_service: Azure OpenAI (gpt-4o via Microsoft Foundry)
  runtime: Azure Container Apps
  secrets: Azure Key Vault (kv-ipai-dev)
  orchestration: Microsoft Foundry (azure-ai-projects 2.x SDK)

# Foundry integration
foundry:
  description: >
    All KBs use Microsoft Foundry as the unified AI platform.
    Foundry consolidates Azure OpenAI + AI Search + agent orchestration
    under a single project client (azure-ai-projects 2.x).
  key_capabilities:
    - Multi-agent orchestration and workflows
    - Tool catalog (1400+ tools)
    - Memory (contextual information across interactions)
    - Foundry IQ knowledge integration (grounded, citation-backed answers)
    - Real-time observability (tracing, monitoring, evaluations)
    - Enterprise controls (RBAC, networking, policies)
  sdk: azure-ai-projects>=2.0
  portal: https://ai.azure.com
  agent_api: Responses API (Agents v2)
