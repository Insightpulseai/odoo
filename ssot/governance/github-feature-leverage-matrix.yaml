  - feature: security_campaigns
    state: evaluate
    leverage: medium
    why: useful_for_backlog_cve_remediation_at_scale
    action: evaluate_post_ghas_trial_scope_to_tier_0
  - feature: secret_scanning
    state: adopted
    leverage: high
    why: push_block_on_144_commits_proves_it_works_rotation_is_blocker
