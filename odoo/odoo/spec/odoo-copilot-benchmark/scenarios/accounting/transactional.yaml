# Accounting — Transactional Benchmark Scenarios

scenarios:
  - id: "BM-ACC-T-001"
    domain: accounting
    capability_class: transactional
    persona: accountant
    prompt: "Create a vendor bill for Supplier X for $1,200 dated today"
    setup:
      seed_records:
        - model: res.partner
          values: { name: "Supplier X", is_company: true, supplier_rank: 1 }
    expected_behavior:
      type: create
      model: account.move
      fields:
        partner_id: "Supplier X"
        move_type: "in_invoice"
        amount_total: 1200
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [accounting, vendor-bill, create]

  - id: "BM-ACC-T-002"
    domain: accounting
    capability_class: transactional
    persona: accountant
    prompt: "Post journal entry BILL/2026/0015"
    setup:
      seed_records:
        - model: account.move
          values: { name: "BILL/2026/0015", state: "draft", move_type: "in_invoice" }
    expected_behavior:
      type: action
      model: account.move
      method: action_post
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [accounting, post, journal-entry]

  - id: "BM-ACC-T-003"
    domain: accounting
    capability_class: transactional
    persona: accountant
    prompt: "Create a credit note for invoice INV/2026/0012 with reason 'Pricing error'"
    setup:
      seed_records:
        - model: account.move
          values: { name: "INV/2026/0012", state: "posted", move_type: "out_invoice" }
    expected_behavior:
      type: action
      model: account.move
      method: _reverse_moves
      fields:
        move_type: "out_refund"
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [accounting, credit-note, reversal]
