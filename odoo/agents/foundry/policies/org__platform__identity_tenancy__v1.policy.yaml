version: 1
namespace: ipai.org.platform.identity_tenancy.v1
artifact_type: policy
repo_key: org
domain: platform
subject: identity_tenancy

terminology:
  tenant_id: "Application tenant boundary (customer/business-unit isolation)"
  entra_tenant_id: "Microsoft Entra directory tenant identifier"
  user_id: "Human principal operating inside an application tenant"
  service_principal_id: "Non-human principal used by an application or workload"
  workspace_id: "Operational workspace boundary — NOT a synonym for tenant"
  environment: "dev | staging | prod — NOT a tenant identifier"

interpretation_rules:
  - "'tenant' MUST refer to application/customer/business-unit isolation unless explicitly qualified"
  - "'entra tenant' or 'entra_tenant_id' MUST be used for Microsoft Entra directory boundaries"
  - "Repo names, schema names, DNS names, and runtime names MUST NOT overload 'tenant' to mean directory, customer, database, workspace, and environment simultaneously"
  - "Database names MUST reflect environment or runtime purpose, not customer tenancy, unless DB-per-tenant is explicitly approved"

identity_authority:
  provider: microsoft_entra_id
  authoritative_for:
    - workforce_authentication
    - application_registrations
    - role_based_access_control
    - conditional_access_policy_enforcement
    - managed_identities_for_azure_workloads

required_declarations_per_service:
  - human_auth_mode
  - workload_auth_mode
  - tenant_resolution_method
  - authorization_boundary
  - data_isolation_boundary
  - control_plane_interaction
  - data_plane_interaction

security_rules:
  service_to_service_auth_must_prefer_managed_identity: true
  every_inbound_request_must_resolve:
    - actor_identity
    - application_tenant
    - environment
    - authorization_scope
  every_shared_service_must_document_noisy_neighbor_mitigation: true
  every_multitenant_service_must_document_tenant_mapping: true
  every_multitenant_service_must_prevent_cross_tenant_access: true

identity_preference_order:
  aks_workloads:
    preferred: workload_identity
    allowed_fallbacks: []
  azure_vms:
    preferred: system_assigned_managed_identity
    allowed_fallbacks: [key_vault_secret]
  container_apps:
    preferred: managed_identity
    allowed_fallbacks: [key_vault_secret]
  local_dev:
    preferred: developer_entra_login
    allowed_fallbacks: [ephemeral_secret]

multitenancy_decision_required:
  triggers:
    - changes_auth_behavior
    - changes_customer_isolation
    - changes_workspace_isolation
    - changes_shared_data_access
  must_answer:
    - "What is a tenant in this system?"
    - "Is the system B2B SaaS, B2C SaaS, internal business-unit multitenancy, or single-tenant?"
    - "Which components are shared?"
    - "Which components are isolated?"
    - "Where is tenant context resolved?"
    - "What is the tenant isolation model?"
    - "How is per-tenant usage measured?"
    - "What is the onboarding/provisioning/offboarding lifecycle?"
    - "What is the noisy-neighbor mitigation strategy?"
    - "What are the control-plane and data-plane boundaries?"

review_gates:
  no_pr_architecture_complete_without:
    - multitenancy_decision_record_updated
    - service_auth_declaration_updated
    - benchmark_registry_updated
