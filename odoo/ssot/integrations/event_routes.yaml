# Event Routes — Integration Backbone SSOT
# This file is the source of truth for event routing configuration.
# CI validates that seed data in the migration matches these routes.
#
# Pattern syntax:
#   - 'expense.*'           → matches any event starting with 'expense.'
#   - '*.approval_required' → matches any event ending with '.approval_required'
#   - 'deployment.failed'   → exact match
#
# Handlers:
#   - slack-notify:    Post Block Kit message to Slack channel
#   - slack-approval:  Post approval buttons to Slack (approve/reject)
#   - n8n-event-router: Forward to n8n webhook with HMAC signature

version: "1.0.0"
description: "Integration backbone event routing rules"
schema_table: "ops.integration_routes"
resolver_rpc: "ops.resolve_routes"

routes:
  - pattern: "expense.*"
    handler: slack-notify
    priority: 100
    enabled: true

  - pattern: "finance_task.*"
    handler: slack-notify
    priority: 100
    enabled: true

  - pattern: "*.approval_required"
    handler: slack-approval
    priority: 50
    enabled: true

  - pattern: "expense.submitted"
    handler: slack-approval
    priority: 50
    enabled: true

  - pattern: "deployment.*"
    handler: slack-notify
    priority: 100
    enabled: true

  - pattern: "deployment.failed"
    handler: slack-notify
    priority: 10
    enabled: true
    description: "High-priority notification for failed deployments"

env_vars:
  slack-notify:
    - SLACK_BOT_TOKEN
    - SLACK_EVENTS_CHANNEL
  slack-approval:
    - SLACK_BOT_TOKEN
  n8n-event-router:
    - N8N_WEBHOOK_EVENT_URL
    - N8N_WEBHOOK_SECRET
