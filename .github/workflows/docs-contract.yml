name: Docs Contract

on:
  pull_request:
    paths:
      - 'web/docs/**'
  push:
    branches: [main]
    paths:
      - 'web/docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build docs
        run: npm run build

      - name: Check for broken internal links
        run: |
          echo "Checking MDX files for broken internal links..."
          find pages -name "*.mdx" -exec grep -l '\](/[^)]*\)' {} \; | while read f; do
            grep -oP '\]\(/[^)]+\)' "$f" | while read link; do
              target=$(echo "$link" | sed 's/\](//;s/)//' | sed 's/#.*//')
              mdx_path="pages${target}.mdx"
              dir_path="pages${target}"
              if [ ! -f "$mdx_path" ] && [ ! -d "$dir_path" ] && [ "$target" != "/" ]; then
                echo "WARNING: Potentially broken link in $f: $target"
              fi
            done
          done

  frontmatter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/docs
    steps:
      - uses: actions/checkout@v4

      - name: Validate frontmatter
        run: |
          echo "Checking all MDX files have required frontmatter..."
          errors=0
          find pages -name "*.mdx" | while read f; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "MISSING frontmatter: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors files missing frontmatter"
            exit 1
          fi
          echo "All MDX files have frontmatter."
