# Unified Finance System — SSOT Ownership Artifact
# Spec: spec/finance-unified/
# Doc:  docs/modules/FINANCE_UNIFIED_SYSTEM.md

version: "1.0.0"
schema: ssot.finance.v1
last_reviewed: "2026-03-13"

system:
  name: Unified Finance System
  scope:
    - BIR tax compliance (Philippine regulatory)
    - Month-end close (5-phase checklist)
    - Finance PPM / Clarity parity (portfolio management)
  team: TBWA\SMP Finance SSC
  team_size: 9

modules:
  active:
    - id: ipai_finance_ppm
      version: "19.0.1.0.0"
      layer: foundation
      installable: true
      role: Clarity PPM parity, OKR dashboard, analytic controls
      tests: false

    - id: ipai_bir_tax_compliance
      version: "18.0.1.0.0"  # pending bump to 19.0.1.0.0
      layer: foundation
      installable: true
      role: 36 eBIRForms, filing deadlines, compliance dashboard
      tests: false

    - id: ipai_bir_notifications
      version: "19.0.1.0.0"
      layer: satellite
      installable: false  # planned, not yet validated
      depends_on: ipai_bir_tax_compliance
      role: Email digest + urgent alerts for BIR deadlines
      tests: false

    - id: ipai_bir_plane_sync
      version: "19.0.1.0.0"
      layer: satellite
      installable: false  # planned, not yet validated
      depends_on: ipai_bir_tax_compliance
      role: Bidirectional sync with Plane.so
      tests: false

    - id: ipai_finance_close_seed
      version: "19.0.1.0.0"
      layer: data
      installable: true
      role: Seed data — 39 close tasks + 50 BIR tasks + team + milestones
      tests: false

  deprecated:
    - id: ipai_finance_workflow
      reason: Superseded by ipai_finance_close_seed
      installable: false

    - id: ipai_finance_tax_return
      reason: Migrated to ipai_enterprise_bridge
      installable: false

seed_authority:
  canonical:
    format: "Odoo XML/CSV"
    location: "addons/ipai/ipai_finance_close_seed/data/"
    files:
      - "01_stages.xml"
      - "02_tags.xml"
      - "03_partners_employees.xml"
      - "04_projects.xml"
      - "05_milestones.xml"
      - "06_tasks_month_end.xml"
      - "07_tasks_bir_tax.xml"

  derived:
    - format: JSON
      location: "ipai_finance_closing_seed.json"
      authority: reference_export
      note: "BIR form schedules for external tooling. Not authoritative."

    - format: SQL
      location: "supabase/seeds/002_finance_seed.sql"
      authority: deprecated
      deprecated_date: "2026-03-09"
      note: "Expense categories. Supabase-only backward compat."

documentation:
  canonical: "docs/modules/FINANCE_UNIFIED_SYSTEM.md"
  spec_bundle: "spec/finance-unified/"
  subordinate:
    - "docs/modules/finance_ppm_technical_guide.md"
    - "docs/modules/FINANCE_PPM_IMPLEMENTATION.md"
    - "docs/modules/PRD_ipai_ppm_portfolio.md"
    - "docs/modules/ipai_clarity_ppm_parity.md"
