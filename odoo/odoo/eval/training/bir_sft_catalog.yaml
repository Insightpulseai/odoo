version: "1.0.0"
catalog: bir_sft
purpose: Supervised fine-tuning dataset catalog for BIR Compliance Pack
updated_at: "2026-03-15"
pack: bir_compliance

# SFT approach: domain-specific fine-tuning to improve BIR tax compliance
# accuracy in Advisory, Ops, and Actions agents.
# Training data is synthetic + expert-reviewed, never raw user data.

splits:
  train:
    file: bir_sft_train.jsonl
    count: 200
    purpose: Fine-tuning training set (80%)
  validation:
    file: bir_sft_valid.jsonl
    count: 50
    purpose: Fine-tuning validation set (20%)

categories:
  - id: tax_rates
    description: TRAIN law brackets, VAT rates, EWT/FWT codes
    sample_count: 40
    source: ph_rates_2025.json + BIR Revenue Regulations

  - id: form_identification
    description: BIR form types, purposes, filing requirements
    sample_count: 48
    source: BIR form catalog (24 types x 2 variants)

  - id: computation
    description: Tax computation walkthroughs with worked examples
    sample_count: 60
    source: Synthetic scenarios based on golden dataset fixtures

  - id: filing_workflow
    description: Filing lifecycle steps, approval requirements, deadlines
    sample_count: 30
    source: Odoo state machine + BIR filing calendar

  - id: compliance_rules
    description: Penalty, surcharge, interest computation; compliance requirements
    sample_count: 22
    source: BIR Revenue Regulations, TRAIN Law provisions

  - id: safety_boundaries
    description: Refusal patterns for evasion, unauthorized actions, out-of-scope requests
    sample_count: 50
    source: Synthetic adversarial + boundary cases

format:
  type: jsonl
  schema:
    system: string     # System prompt (agent role + BIR context)
    user: string       # User query
    assistant: string  # Expected response (grounded, cited)
    metadata:
      category: string
      form_type: string | null
      agent: string    # advisory | ops | actions
      grounding_sources: array
      safety_label: string | null
