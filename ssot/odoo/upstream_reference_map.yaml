schema_version: "1.0"
target_state: upstream_reference_map
description: Machine-readable map of official Odoo upstream repos and their engineering relevance.
updated_at: "2026-03-18"

policy:
  adopt_mode: reference_only
  ci_authority: azure_devops
  github_actions_in_repo: decommissioned
  translation_target: azure_devops_pipelines

repos:
  # ---------------------------------------------------------------------------
  # Tier 1 — Active Engineering Reference
  # ---------------------------------------------------------------------------
  - id: odoo-core
    repo: odoo/odoo
    url: https://github.com/odoo/odoo
    tier: 1
    relevance: CE runtime source, ORM API, core addon reference, upgrade migration scripts
    category_tags:
      - runtime_contract
      - packaging_runtime
      - migration_upgrade
      - test_topology
      - frontend_pattern
    recommended_use:
      - ORM API patterns for ipai_* module development
      - Core addon _inherit reference
      - Test class patterns (TransactionCase, HttpCase, tagged)
      - Upgrade migration script patterns (pre/post-migrate)
      - OWL component patterns for frontend widgets
    adopt_as_reference_only: true
    translate_into_plane:
      - ci-validation  # test patterns → lint/test stages
      - runtime-delivery  # packaging patterns → image build
    github_actions: none  # verified 2026-03-18: .github/ has only ISSUE_TEMPLATE + PR template
    upstream_ci_system: runbot
    key_paths:
      - odoo/tests/common.py  # test base classes (TransactionCase, HttpCase, etc.)
      - odoo/tests/tag_selector.py  # TagsSelector for test filtering
      - setup/requirements-check.py  # dependency version validation
    notes: >
      Mirrored locally at vendor/odoo/. Do not fork or vendor separately.
      No GitHub Actions in this repo — Odoo uses runbot for CI.

  - id: odoo-docker
    repo: odoo/docker
    url: https://github.com/odoo/docker
    tier: 1
    relevance: Official Dockerfile patterns, entrypoint script, wait-for-psql logic
    category_tags:
      - packaging_runtime
      - runtime_contract
    recommended_use:
      - Dockerfile multi-stage patterns
      - Entrypoint script structure (wait-for-psql, config generation)
      - wkhtmltopdf installation pattern
      - Runtime dependency list (requirements.txt baseline)
    adopt_as_reference_only: true
    translate_into_plane:
      - runtime-delivery  # image build stage
    github_actions: none  # verified 2026-03-18
    key_paths:
      - 19.0/Dockerfile  # Ubuntu Noble, wkhtmltopdf multi-arch, pip install odoo
      - 19.0/entrypoint.sh  # DB config from env, wait-for-psql, Docker secrets support
      - 19.0/wait-for-psql.py  # PostgreSQL readiness polling with timeout
      - 19.0/odoo.conf  # minimal default config
    notes: >
      Adapt patterns to our Dockerfile at odoo/Dockerfile.
      Do not use upstream Dockerfile verbatim — we have ACA-specific runtime needs.
      Version-branched structure (17.0/, 18.0/, 19.0/) — always reference 19.0/.

  - id: odoo-upgrade-util
    repo: odoo/upgrade-util
    url: https://github.com/odoo/upgrade-util
    tier: 1
    relevance: Upgrade helper library for migration scripts
    category_tags:
      - migration_upgrade
    recommended_use:
      - Migration script helpers (rename_field, rename_model, merge_module)
      - Pre/post-migrate patterns
      - Version transition utilities
    adopt_as_reference_only: true
    translate_into_plane:
      - runtime-delivery  # migration job stage
      - ci-validation  # upgrade validation checks
    github_actions: none  # verified 2026-03-18
    pre_commit_tools:
      - ruff  # linter + formatter
      - typos  # spell check
      - check-xml
      - check-yaml
      - end-of-file-fixer
      - trailing-whitespace
      - debug-statements
    key_paths:
      - src/util/fields.py  # rename_field, remove_field, transform helpers
      - src/util/helpers.py  # table_of_model, version_between, version_gte
      - src/util/models.py  # model-level migration operations
      - src/util/modules.py  # module merge/rename/remove
      - src/util/domains.py  # domain expression adaptation
      - src/util/accounting.py  # accounting-specific migration helpers
      - src/util/pg.py  # PostgreSQL-level utilities
      - tools/generate-inherit.py  # inheritance graph generator
    notes: >
      Primary reference for writing pre-migrate.py / post-migrate.py in ipai_* modules.
      Installable as pip package for migration script development.
      29 utility modules covering fields, models, ORM, domains, accounting, HR payroll.

  - id: odoo-documentation
    repo: odoo/documentation
    url: https://github.com/odoo/documentation
    tier: 1
    relevance: Official API docs, OWL reference, RPC protocol spec, developer guides
    category_tags:
      - documentation_authority
      - developer_experience
    recommended_use:
      - ORM API reference (fields, methods, decorators)
      - OWL component documentation
      - JSON-RPC / JSON-2 API protocol spec
      - Module manifest specification
      - Security model (ACL, record rules, groups)
    adopt_as_reference_only: true
    translate_into_plane: []
    github_actions: none  # verified 2026-03-18
    build_system: sphinx_rst
    key_paths:
      - content/developer/  # tutorials, howtos, API reference
      - content/administration/  # install, upgrade, maintenance
      - content/contributing/  # development standards, install from git
      - tests/  # documentation validation (link check, RST syntax)
    notes: >
      Authoritative developer documentation. Consult when implementing
      ORM patterns, frontend widgets, or API integrations.
      Has its own test suite for doc validation — translate concept to our docs lint.

  - id: odoo-runbot
    repo: odoo/runbot
    url: https://github.com/odoo/runbot
    tier: 1
    relevance: Odoo's CI system — reveals test topology, environment separation, matrix logic
    category_tags:
      - test_topology
      - developer_experience
    recommended_use:
      - Test environment separation patterns (base vs full install)
      - Test tagging and selection logic
      - Multi-database test isolation
      - Performance/regression test scheduling concepts
    adopt_as_reference_only: true
    translate_into_plane:
      - ci-validation  # test matrix and tagging strategy
      - quality-governance  # regression/performance concepts
    github_actions: none  # verified 2026-03-18
    key_paths:
      - runbot_builder/builder.py  # CI agent: Docker image mgmt, build scheduling, DB isolation
      - runbot_builder/tester.py  # test execution orchestration
      - runbot/tests/  # 15+ test files organized by concern
    notes: >
      Runbot is Odoo's custom CI. We do not use runbot.
      Extract test topology concepts: per-build DB isolation, tagged test selection,
      Docker-based test environments. Do NOT adopt runbot itself.

  - id: odoo-tutorials
    repo: odoo/tutorials
    url: https://github.com/odoo/tutorials
    tier: 1
    relevance: Canonical module development patterns, progressive examples
    category_tags:
      - documentation_authority
      - developer_experience
    recommended_use:
      - Module scaffold patterns
      - View/action/menu patterns
      - Security configuration patterns
      - Mixin usage examples
    adopt_as_reference_only: true
    translate_into_plane: []
    notes: >
      Reference for onboarding and module development standards.
      Not CI/CD relevant.

  # ---------------------------------------------------------------------------
  # Tier 2 — Selective Reference
  # ---------------------------------------------------------------------------
  - id: odoo-owl
    repo: odoo/owl
    url: https://github.com/odoo/owl
    tier: 2
    relevance: OWL framework source — Odoo's frontend component system
    category_tags:
      - frontend_pattern
      - test_topology
    recommended_use:
      - Component lifecycle patterns
      - Reactivity system understanding
      - Test utility patterns (mount, click, triggerEvent)
    adopt_as_reference_only: true
    github_actions:
      - deploy.yml  # Node.js CI: npm test + lint + format-check + build (Node 20.x, 22.x matrix)
    key_paths:
      - src/  # TypeScript OWL framework source
      - tests/  # OWL component test suite
      - doc/  # framework documentation
    translate_into_plane:
      - ci-validation  # frontend test patterns
    notes: >
      Single GHA workflow: npm ci → test → check-formatting → lint → build.
      Translate intent to ci-validation frontend test/lint stages.
      Only upstream Odoo repo (besides odoo/owl) with GitHub Actions.

  - id: odoo-locust
    repo: odoo/OdooLocust
    url: https://github.com/odoo/OdooLocust
    tier: 2
    relevance: Load testing patterns for Odoo via Locust framework
    category_tags:
      - test_topology
    recommended_use:
      - Odoo-specific Locust task patterns
      - JSON-RPC load simulation
      - User session simulation patterns
      - Performance baseline methodology
    adopt_as_reference_only: true
    translate_into_plane:
      - quality-governance  # performance/load validation
    github_actions: none  # verified 2026-03-18
    key_paths:
      - src/OdooLocust/OdooLocustUser.py  # Odoo-specific Locust user with XML-RPC/JSON-RPC
      - src/OdooLocust/OdooTaskSet.py  # base task set with model_name, form/list/kanban fields
      - src/OdooLocust/crm/  # CRM-specific load test tasks
      - test_sale.py  # sale order load test example
    notes: >
      Useful reference for building load tests.
      Key patterns: Locust @task decorators, model-specific task sets, user session simulation.
      Translate into quality-governance pipeline scheduled runs.

  - id: odoo-design-themes
    repo: odoo/design-themes
    url: https://github.com/odoo/design-themes
    tier: 2
    relevance: Website theme structure, asset bundle patterns
    category_tags:
      - frontend_pattern
    recommended_use:
      - Theme asset bundle structure
      - SCSS/CSS organization patterns
      - Template inheritance patterns for website
    adopt_as_reference_only: true
    translate_into_plane: []
    github_actions: none  # verified 2026-03-18
    key_paths:
      - theme_common/  # shared theme assets
      - test_themes/  # theme test module
    notes: >
      30 website themes. Each is standalone Odoo module with __manifest__.py, SCSS, templates.
      Consult only when working on ipai_web_branding or website templates.

  # ---------------------------------------------------------------------------
  # Ignored — No current engineering value
  # ---------------------------------------------------------------------------
  - id: odoo-o-spreadsheet
    repo: odoo/o-spreadsheet
    url: https://github.com/odoo/o-spreadsheet
    tier: ignore
    relevance: Spreadsheet component — not in scope
    category_tags:
      - ignore_for_now
    recommended_use: []
    adopt_as_reference_only: true
    translate_into_plane: []
    notes: Re-evaluate if spreadsheet features enter scope.

  - id: odoo-odoosh
    repo: odoo/odoosh
    url: https://github.com/odoo/odoosh
    tier: ignore
    relevance: Odoo.sh-specific tooling — we use Azure
    category_tags:
      - ignore_for_now
    recommended_use: []
    adopt_as_reference_only: true
    translate_into_plane: []
    notes: Odoo.sh patterns are not applicable to Azure-native deployment.

  - id: odoo-industry
    repo: odoo/industry
    url: https://github.com/odoo/industry
    tier: ignore
    relevance: Vertical industry modules — not in current scope
    category_tags:
      - ignore_for_now
    recommended_use: []
    adopt_as_reference_only: true
    translate_into_plane: []
    notes: Evaluate only if entering a specific vertical.
