# Azure Platform RAG — Agent Skill Definition

name: azure_platform_rag
description: Retrieval-augmented generation over Azure platform documentation (Container Apps, Front Door, AI Search, OpenAI, PostgreSQL, Key Vault, Entra ID, Foundry, DevOps)
version: "1.0"

service:
  app: apps/azure-platform-kb
  entrypoint: service.py
  runtime: azure-container-apps
  health_check: /health

tools:
  - name: search_azure_docs
    description: >
      Search Azure platform documentation.
      Returns ranked chunks with citation metadata.
    parameters:
      query:
        type: string
        required: true
        description: Natural language search query
      service:
        type: string
        required: false
        description: >
          Filter to specific Azure service
          (e.g., "container-apps", "frontdoor", "search", "openai", "postgresql", "key-vault", "entra", "foundry")
      top_k:
        type: integer
        default: 8
        description: Number of results (max 20)
    returns:
      type: array
      items:
        chunk_id: string
        content: string
        path: string
        heading_chain: string
        service: string
        score: float
        citation: string

  - name: answer_azure_question
    description: >
      Answer a question about Azure services using grounded retrieval.
      Returns an answer with source citations.
    parameters:
      query:
        type: string
        required: true
        description: Question about Azure services
      service:
        type: string
        required: false
        description: Scope to a specific Azure service
    returns:
      answer: string
      citations:
        type: array
        items:
          chunk_id: string
          path: string
          heading_chain: string
          service: string
          relevance: float

  - name: search_azure_cli
    description: >
      Search Azure CLI command reference.
      Returns relevant CLI commands, syntax, and examples.
    parameters:
      query:
        type: string
        required: true
        description: CLI command or action to search for
      service:
        type: string
        required: false
        description: Azure service scope (e.g., "containerapp", "search", "keyvault")
      top_k:
        type: integer
        default: 5
    returns:
      type: array
      items:
        chunk_id: string
        content: string
        path: string
        heading_chain: string
        score: float

  - name: get_azure_architecture_guidance
    description: >
      Get architecture guidance for Azure services relevant to IPAI stack.
      Covers Container Apps, Front Door, AI Search, PostgreSQL Flexible Server.
    parameters:
      topic:
        type: string
        required: true
        description: Architecture topic (e.g., "scaling", "networking", "security", "monitoring")
      service:
        type: string
        required: false
    returns:
      answer: string
      citations:
        type: array

  # --- Foundry-specific tools (route to azure-platform-docs index with service filter) ---

  - name: get_foundry_quickstart_guidance
    description: >
      Get started with Microsoft Foundry — project creation, portal navigation,
      first agent deployment, and quickstart walkthroughs.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry onboarding or quickstart
    note: Routes to azure-platform-docs index with service filter foundry/get-started

  - name: get_foundry_agent_service_guidance
    description: >
      Agent Service deployment, tool registration, multi-agent orchestration,
      agent sharing, and hosted compute configuration.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry Agent Service
    note: Routes to azure-platform-docs index with service filter foundry/agent-service

  - name: get_foundry_model_deployment_guidance
    description: >
      Model catalog browsing, model deployment (managed compute, serverless, global),
      inference endpoints, and model benchmarks.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry model deployment or inference
    note: Routes to azure-platform-docs index with service filter foundry/models

  - name: get_foundry_guardrails_guidance
    description: >
      Content filters, safety system messages, jailbreak protection,
      tool governance policies, and prompt shields.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry guardrails or content safety
    note: Routes to azure-platform-docs index with service filter foundry/guardrails

  - name: get_foundry_responsible_ai_guidance
    description: >
      Responsible AI constraints, limited access features, transparency notes,
      impact assessments, and compliance with RAI principles.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry responsible AI practices
    note: Routes to azure-platform-docs index with service filter foundry/responsible-ai

  - name: get_foundry_sdk_guidance
    description: >
      azure-ai-projects SDK usage, REST API patterns, client instantiation,
      authentication, and code samples for Python/JS/.NET.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry SDK or API usage
    note: Routes to azure-platform-docs index with service filter foundry/api-sdk

  - name: get_foundry_eval_tracing_guidance
    description: >
      Evaluation pipelines, tracing spans, continuous monitoring,
      metrics collection, and quality assessment of agent outputs.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry evaluation or tracing
    note: Routes to azure-platform-docs index with service filter foundry/evaluation-tracing

  - name: get_foundry_developer_workflow_guidance
    description: >
      VS Code integration, AI Toolkit, playgrounds, prompt flow,
      hosted compute for development, and local debugging.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry developer tools or workflows
    note: Routes to azure-platform-docs index with service filter foundry/developer-experience

  - name: get_foundry_security_governance_guidance
    description: >
      RBAC roles, network isolation, private endpoints, managed identity,
      data protection, and governance policies for Foundry projects.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry security or governance
    note: Routes to azure-platform-docs index with service filter foundry/security-governance

  - name: get_foundry_operations_guidance
    description: >
      Quotas and limits, region availability, support plans,
      operational best practices, and production readiness checklists.
    parameters:
      query:
        type: string
        required: true
        description: Question about Foundry operations or quotas
    note: Routes to azure-platform-docs index with service filter foundry/operations

knowledge_source: agents/knowledge/azure_platform/source.yaml
chunking_config: agents/knowledge/azure_platform/chunking.yaml
indexing_config: agents/knowledge/azure_platform/indexing.yaml
