  # Canonical (routed through Microsoft Foundry)
  # ---------------------------------------------------------------------------
  - id: gpt-4.1-azure
    name: "GPT-4.1 (Azure OpenAI)"
    provider: azure_openai
    hosting: cloud_managed
    ownership: microsoft_owned
    control_level: config_only
    criticality: core_runtime
    auth_mode: managed_identity
    lock_in_risk: high_accepted
    deployment_name: gpt-4.1
