# Canonical Ownership Boundaries — Frozen 2026-03-20
# Authority: CLAUDE.md + Canonical Unified Baseline
# This file is the SSOT for repo authority, naming, and local runtime doctrine.

canonical_project:
  azure_devops_project: ipai-platform

authority_model:
  azure: cloud_runtime_control_access
  azure_devops: planning_governance_spine
  github: current_engineering_truth_transitional
  repo_ssot: intended_state_truth
  executable_contracts: iac_migrations_pipelines_tests

canonical_repos:
  - odoo             # ERP runtime only
  - infra            # cloud/network/edge/IaC
  - platform         # control-plane/admin/supabase-shared
  - agents           # shared skills/prompts/registries
  - automations      # schedulers/jobs/runbooks
  - web              # public/product web surfaces outside ERP
  - design           # tokens/components/brand assets
  - data-intelligence  # Databricks/lakehouse/BI
  - agent-platform   # Foundry/hosted agent runtime/evals
  - docs             # cross-platform docs only
  - templates        # starter/scaffold assets only

naming_normalization:
  deprecated_name: canonical_name
  ops-platform: platform
  design-system: design
  lakehouse: data-intelligence
  odoo_core: odoo_dev
  odoo_stage: odoo_staging
  odoo_prod: odoo

local_runtime:
  docker_context: colima-odoo
  compose_contract: docker-compose.yml  # repo-root
  compose_project_name: odoo
  devcontainer_role: tooling_only
  canonical_databases:
    - odoo_dev        # local development
    - odoo_staging    # staging rehearsal
    - odoo            # production
  canonical_services:
    - odoo
    - db
    - redis
  canonical_containers:
    - odoo-odoo-1
    - odoo-db-1
    - odoo-redis-1
  canonical_volumes:
    - odoo-db-data
    - odoo-web-data
    - odoo-redis-data
  canonical_network: odoo-net

tooling_doctrine:
  ai_toolkit: canonical_foundry_editor
  foundry_sidebar: deprecated_transitional
  databricks: canonical_only_for_data_intelligence
  postgresql_editor: optional_convenience
  azure_devops_integration: one_primary_path

deprecated_items:
  - name: supabase_managed_subscription
    replacement: self-hosted Supabase on Azure VM (vm-ipai-supabase-dev)
    date: 2026-03-20
  - name: ops-platform
    replacement: platform
    date: 2026-03-20
  - name: design-system
    replacement: design
    date: 2026-03-20
  - name: lakehouse
    replacement: data-intelligence
    date: 2026-03-20
  - name: devcontainer_as_runtime
    replacement: repo-root docker-compose.yml
    date: 2026-03-20
  - name: docker-desktop_context
    replacement: colima-odoo
    date: 2026-03-20
  - name: "~/docker-compose.yml (home-dir compose)"
    replacement: odoo/docker-compose.yml (repo-root)
    date: 2026-03-20
