# =============================================================================
# Odoo Module Test Pipeline — Azure PostgreSQL (Disposable DB)
# =============================================================================
# Creates a disposable PostgreSQL database on pg-ipai-odoo, runs Odoo module
# tests with --test-tags and --stop-after-init, publishes logs, and drops the DB.
#
# Requires:
#   - Self-hosted agent pool with VNet access to pg-ipai-odoo
#   - Service connection with Key Vault and PostgreSQL access
#   - Key Vault secret: pg-admin-password
#
# Usage:
#   Trigger manually or from odoo-module.yml Lint_And_Test stage.
#   Override INSTALL_MODULES and TEST_TAGS for narrower scope.
# =============================================================================

trigger: none
pr: none

parameters:
  - name: installModules
    type: string
    default: 'ipai_auth_oidc,ipai_document_intelligence,ipai_ops_api'
    displayName: Comma-separated modules to install and test
  - name: testTags
    type: string
    default: '/ipai_auth_oidc,/ipai_document_intelligence,/ipai_ops_api'
    displayName: Odoo --test-tags filter
  - name: runProdVerify
    type: boolean
    default: false
    displayName: Run production verification (Playwright smoke) after tests
  - name: prodVerifyUrl
    type: string
    default: 'https://erp.insightpulseai.com'
    displayName: Target URL for production verification

pool:
  name: ipai-private-linux   # self-hosted agent on VNet that can reach pg-ipai-odoo

variables:
  # Service connection — replace if your connection has a different name
  AZURE_SERVICE_CONNECTION: 'ipai-dev-wif'
  KEY_VAULT_NAME: 'kv-ipai-dev'

  # PostgreSQL
  PG_SERVER: 'pg-ipai-odoo'
  PG_HOST: 'pg-ipai-odoo.postgres.database.azure.com'
  PG_PORT: '5432'
  PG_ADMIN_USER: 'odoo_admin'

  # Odoo runtime
  ODOO_BIN: './vendor/odoo/odoo-bin'
  ODOO_HTTP_PORT: '18069'
  ODOO_DB_SSLMODE: 'require'

  # Test scope (from parameters)
  INSTALL_MODULES: ${{ parameters.installModules }}
  TEST_TAGS: ${{ parameters.testTags }}

stages:
  - stage: odoo_module_tests
    displayName: Odoo module tests on Azure PostgreSQL
    jobs:
      - job: run_odoo_tests
        displayName: Create disposable DB → run tests → cleanup
        timeoutInMinutes: 90

        steps:
          - checkout: self
            clean: true

          # -----------------------------------------------------------------
          # Step 1: Load PostgreSQL admin password from Key Vault
          # -----------------------------------------------------------------
          - task: AzureKeyVault@2
            displayName: Load Key Vault secrets
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              KeyVaultName: '$(KEY_VAULT_NAME)'
              SecretsFilter: 'pg-admin-password'
              RunAsPreJob: false

          # -----------------------------------------------------------------
          # Step 2: Create disposable test database
          # -----------------------------------------------------------------
          - task: AzureCLI@2
            name: prepare_db
            displayName: Create disposable PostgreSQL test database
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                PG_RG="$(az resource list \
                  --name "$(PG_SERVER)" \
                  --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" \
                  --query '[0].resourceGroup' -o tsv)"

                TEST_DB="odoo_test_$(Build.BuildId)_$(System.JobAttempt)"

                echo "Resource group: ${PG_RG}"
                echo "Test database:  ${TEST_DB}"

                az postgres flexible-server db create \
                  --resource-group "${PG_RG}" \
                  --server-name "$(PG_SERVER)" \
                  --database-name "${TEST_DB}"

                echo "##vso[task.setvariable variable=PG_RG;isReadOnly=true]${PG_RG}"
                echo "##vso[task.setvariable variable=TEST_DB;isReadOnly=true]${TEST_DB}"

          # -----------------------------------------------------------------
          # Step 2b: Resilience config check
          # -----------------------------------------------------------------
          - bash: |
              set -euo pipefail
              chmod +x scripts/ci/check_pg_resilience.sh
              scripts/ci/check_pg_resilience.sh
            displayName: Check PG resilience config
            env:
              ODOO_CONF: config/azure/odoo.conf
              PGHOST: $(PG_HOST)
              PGPORT: $(PG_PORT)
              PGDATABASE: $(TEST_DB)
              PGUSER: $(PG_ADMIN_USER)
              PGPASSWORD: $(pg-admin-password)

          # -----------------------------------------------------------------
          # Step 3: Run Odoo module tests
          # -----------------------------------------------------------------
          - bash: |
              set -euo pipefail
              chmod +x scripts/ci/run_odoo_tests.sh
              scripts/ci/run_odoo_tests.sh
            displayName: Run Odoo module tests
            env:
              PGHOST: $(PG_HOST)
              PGPORT: $(PG_PORT)
              PGDATABASE: $(TEST_DB)
              PGUSER: $(PG_ADMIN_USER)
              PGPASSWORD: $(pg-admin-password)
              ODOO_BIN: $(ODOO_BIN)
              ODOO_HTTP_PORT: $(ODOO_HTTP_PORT)
              ODOO_DB_SSLMODE: $(ODOO_DB_SSLMODE)
              INSTALL_MODULES: $(INSTALL_MODULES)
              TEST_TAGS: $(TEST_TAGS)

          # -----------------------------------------------------------------
          # Step 4: Publish test logs (always, even on failure)
          # -----------------------------------------------------------------
          - publish: .artifacts/test-logs
            artifact: odoo-test-logs-$(Build.BuildId)
            displayName: Publish Odoo test logs
            condition: always()

          # Uncomment when Odoo emits JUnit XML (e.g. via odoo-test-helper)
          # - task: PublishTestResults@2
          #   displayName: Publish JUnit results
          #   condition: always()
          #   inputs:
          #     testResultsFormat: JUnit
          #     testResultsFiles: '.artifacts/test-results/**/*.xml'
          #     failTaskOnFailedTests: true
          #     testRunTitle: 'Odoo module tests ($(TEST_DB))'

          # -----------------------------------------------------------------
          # Step 5: Drop disposable test database (always, even on failure)
          # -----------------------------------------------------------------
          - task: AzureCLI@2
            displayName: Drop disposable PostgreSQL test database
            condition: always()
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                if [ -n "${PG_RG:-}" ] && [ -n "${TEST_DB:-}" ]; then
                  echo "Dropping test database: ${TEST_DB}"
                  az postgres flexible-server db delete \
                    --resource-group "${PG_RG}" \
                    --server-name "$(PG_SERVER)" \
                    --database-name "${TEST_DB}" \
                    --yes
                else
                  echo "No test database to drop (PG_RG or TEST_DB not set)"
                fi

  # =========================================================================
  # Stage 2: Production Verification (Playwright smoke tests)
  # =========================================================================
  - stage: prod_verification
    displayName: Production verification (Playwright)
    dependsOn: odoo_module_tests
    condition: and(succeeded(), eq('${{ parameters.runProdVerify }}', 'true'))
    jobs:
      - job: playwright_smoke
        displayName: Playwright prod-verify smoke tests
        timeoutInMinutes: 15

        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js 20.x
            inputs:
              versionSpec: '20.x'

          - bash: |
              set -euo pipefail
              cd infra/tests/e2e
              npm install --no-audit --no-fund
              npx playwright install chromium --with-deps
            displayName: Install Playwright and browsers

          - bash: |
              set -euo pipefail
              chmod +x automations/scripts/prod_verify_playwright.sh
              automations/scripts/prod_verify_playwright.sh
            displayName: Run production verification
            env:
              BASE_URL: ${{ parameters.prodVerifyUrl }}
              SKIP_INSTALL: '1'

          - publish: docs/evidence
            artifact: prod-verify-evidence-$(Build.BuildId)
            displayName: Publish verification evidence
            condition: always()
