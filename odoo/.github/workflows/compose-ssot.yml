name: compose-ssot

on:
  pull_request:
    paths:
      - 'docker-compose*.yml'
      - '**/docker-compose*.yml'
      - '**/compose.yaml'
      - '**/compose.yml'
      - '.devcontainer/**'
      - 'scripts/ci/compose_ssot_check.sh'
      - 'scripts/ci/devcontainer_ssot_check.sh'
      - '.github/workflows/compose-ssot.yml'
  push:
    branches: [main]
    paths:
      - 'docker-compose*.yml'
      - '**/docker-compose*.yml'
      - '**/compose.yaml'
      - '.devcontainer/**'

permissions:
  contents: read

jobs:
  compose-ssot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker version
        run: |
          docker version
          docker compose version

      - name: SSOT check + render
        run: |
          bash scripts/ci/compose_ssot_check.sh
          bash scripts/ci/devcontainer_ssot_check.sh
