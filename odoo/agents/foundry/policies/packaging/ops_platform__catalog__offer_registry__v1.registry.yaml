version: 1
namespace: ipai.ops_platform.catalog.offer_registry.v1
artifact_type: registry
repo_key: ops_platform
domain: catalog
subject: offer_registry

# ============================================================================
# OFFER REGISTRY — All productized services and their packaging state
# ============================================================================

offers:
  - offer_key: ipai_odoo_copilot_internal
    title: IPAI Odoo Copilot
    channel_key: internal_one_click
    status: draft
    owner_repo: agents
    owner_team: "@Insightpulseai/platform"
    product_type: agent_backed_internal_service
    primary_template_source: foundry_solution_templates
    target_surface:
      type: foundry_agent_service
    related_artifacts:
      - agents__runtime__odoo_copilot__v1.manifest.yaml
      - agents__policy__agent_publish_rules__v1.policy.yaml
    environments: [dev, staging, prod]
    packaging_notes:
      - "Internal one-click deployment first."
      - "May later be repackaged as ecosystem extension."

  - offer_key: ipai_finance_docflow_managed_app
    title: IPAI Finance DocFlow
    channel_key: azure_managed_application
    status: proposed
    owner_repo: odoo
    owner_team: "@Insightpulseai/platform"
    product_type: customer_installed_solution
    primary_template_source: foundry_solution_templates
    target_surface:
      type: azure_managed_application
      mode: internal_service_catalog_first
    related_capabilities:
      - document_processing
      - compliance_review
      - invoice_receipt_extraction
      - bir_workflows
    packaging_notes:
      - "Use Foundry multi-modal/document-processing patterns as bootstrap."
      - "Package with managed app metadata and ARM-based publish payload."
      - "SAP remains benchmark only, not an integration dependency."

  - offer_key: ipai_agent_builder_factory
    title: IPAI Agent Builder / Factory
    channel_key: internal_one_click
    status: proposed
    owner_repo: ops_platform
    owner_team: "@Insightpulseai/platform"
    product_type: internal_control_plane_service
    primary_template_source: native_ipai_templates
    target_surface:
      type: internal_control_plane
    related_capabilities:
      - spec_to_artifact
      - template_resolution
      - eval_gate
      - catalog_registration
      - promotion_and_rollback
    packaging_notes:
      - "Primary internal service, not marketplace-first."

  - offer_key: ipai_release_manager_assistant
    title: IPAI Release Manager Assistant
    channel_key: internal_one_click
    status: proposed
    owner_repo: automations
    owner_team: "@Insightpulseai/platform"
    product_type: internal_release_automation
    primary_template_source: foundry_solution_templates
    packaging_notes:
      - "Use Foundry release-manager patterns as bootstrap."
      - "Integrate with GitHub and Azure DevOps under allowlist policy."

  - offer_key: ipai_ops_console_saas
    title: IPAI Ops Console
    channel_key: commercial_saas_offer
    status: exploratory
    owner_repo: web
    owner_team: "@Insightpulseai/platform"
    product_type: hosted_saas_product
    primary_template_source: azd_full_stack_templates
    target_surface:
      type: vendor_hosted_web_app
    related_capabilities:
      - operator_dashboard
      - trace_review
      - evaluation_registry
      - environment_overview
    packaging_notes:
      - "Use azd full-stack template shape for app shell."
      - "SaaS path only after tenant and entitlement model finalized."

  - offer_key: ipai_m365_copilot_extension
    title: IPAI Copilot Extension Pack
    channel_key: connector_plugin_extension
    status: exploratory
    owner_repo: agents
    owner_team: "@Insightpulseai/platform"
    product_type: ecosystem_extension
    primary_template_source: foundry_solution_templates
    target_surface:
      type: microsoft_365_agent_or_connector
    packaging_notes:
      - "Package as M365/Teams/Copilot extension if ecosystem distribution needed."

  - offer_key: ipai_tableau_analytics_connector
    title: IPAI Tableau Analytics Connector
    channel_key: connector_plugin_extension
    status: exploratory
    owner_repo: lakehouse
    owner_team: "@Insightpulseai/platform"
    product_type: external_bi_connector
    primary_template_source: native_ipai_templates
    target_surface:
      type: external_bi_connector
      platform: tableau_cloud
      endpoint: "https://10ax.online.tableau.com/#/site/insightpulseai/home"
    related_capabilities:
      - governed_metrics_access
      - semantic_exports
      - analyst_enablement
    packaging_notes:
      - "Tableau Cloud = external BI consumption surface, NOT system-of-record."
      - "Connector must bind to cataloged data products and approved auth model only."

# ============================================================================
# RULES
# ============================================================================

registry_rules:
  every_offer_requires_channel_key: true
  every_offer_requires_owner_repo: true
  every_offer_requires_owner_team: true
  every_offer_requires_product_type: true
  every_offer_requires_primary_template_source: true
  every_offer_requires_target_surface: true
  every_offer_requires_packaging_notes: true
  sap_is_benchmark_only_not_dependency: true
  tableau_is_external_bi_surface_not_ssot: true
  direct_marketplace_publish_from_sample_code_forbidden: true
