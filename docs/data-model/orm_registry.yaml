    owning_module: base
    inherits_from:
      - mail.thread
      - mail.activity.mixin
      - format.address.mixin
    delegates_via: {}
    company_scoped: false
    chatter_enabled: true
    activity_enabled: true
    record_rules: multi-company (optional company_id); user-own for portal contacts
    source_domain: spine
    extension_policy: core_ce

  - model: res.users
