---
# SSOT Template: Finance PPM — Month-end Close
# Plane API template configuration for Finance PPM execution tracking
# Seeded from: addons/ipai/ipai_finance_close_seed/data/06_tasks_month_end.xml
# Owned in: Odoo (master), tracked in: Plane (sync target)
# Synced via: automations/n8n/workflows/ppm-clarity-*.json

version: 1
workspace_slug: fin-ops
project:
  name: Finance PPM — Month-end Close
  key: FINOPS
  description: |
    Month-end close + BIR tax filing execution, owned in Odoo, tracked in Plane.
    39 closing tasks across 5 phases | 9 employees | Field ownership via PPM Clarity sync.
  network: 2  # Secret (only invited team members)

# Workflow states (Plane default groups)
workflow_states:
  - name: Backlog
    group: backlog
    color: "#a0aec0"
  - name: Planned
    group: unstarted
    color: "#718096"
  - name: Committed
    group: unstarted
    color: "#4a5568"
  - name: In Progress
    group: started
    color: "#3182ce"
  - name: Blocked
    group: started
    color: "#e53e3e"
  - name: Done
    group: completed
    color: "#38a169"

# Labels (extracted from canonical task categories)
# Source: description field "Category: <label>" from seed XML
labels_from_seed:
  - source_column: Task Category  # Excel column name
    labels:
      # Phase I
      - name: Payroll & Personnel
        color: "#f56565"
      - name: Tax & Provisions
        color: "#ed8936"
      - name: Rent & Leases
        color: "#ecc94b"
      - name: Accruals & Expenses
        color: "#48bb78"
      - name: Prior Period Review
        color: "#38b2ac"

      # Phase II
      - name: Amortization & Corporate
        color: "#4299e1"
      - name: Corporate Accruals
        color: "#0bc5ea"
      - name: Insurance
        color: "#9f7aea"
      - name: Treasury & Other
        color: "#ed64a6"
      - name: Regional Reporting
        color: "#f687b3"

      # Phase III
      - name: Client Billings
        color: "#fc8181"
      - name: WIP/OOP Management
        color: "#f6ad55"
      - name: AR Aging - WC
        color: "#f6e05e"
      - name: CA Liquidations
        color: "#68d391"
      - name: AP Aging - WC
        color: "#4fd1c5"
      - name: OOP
        color: "#63b3ed"
      - name: Asset & Lease Entries
        color: "#7f9cf5"
      - name: Reclassifications
        color: "#b794f4"

      # Phase IV
      - name: VAT & Taxes
        color: "#f687b3"
      - name: Accruals & Assets
        color: "#fc8181"
      - name: AP Aging
        color: "#f6ad55"
      - name: Expense Reclassification
        color: "#f6e05e"
      - name: VAT Reporting
        color: "#68d391"
      - name: Job Transfers
        color: "#4fd1c5"
      - name: Accruals
        color: "#63b3ed"
      - name: WIP
        color: "#7f9cf5"

      # Phase V
      - name: Sign-off
        color: "#b794f4"

      # Phase labels
      - name: Phase I
        color: "#f56565"
      - name: Phase II
        color: "#ed8936"
      - name: Phase III
        color: "#ecc94b"
      - name: Phase IV
        color: "#48bb78"
      - name: Phase V
        color: "#38b2ac"

# Cycles (monthly execution cadence)
# Note: Cycles are created manually via Plane UI or API as needed
cycles:
  enabled: true
  default_duration_days: 5  # 5 business days target
  naming_convention: "YYYY-MM Month-End Close"

# Modules (phase grouping)
modules:
  - name: Phase I - Initial & Compliance
    description: "6 tasks | Prep: RIM | Review: CKVC"
    lead_id: null  # Will be assigned via sync from Odoo user_ids
  - name: Phase II - Accruals & Amortization
    description: "6 tasks | Prep: BOM | Review: RIM, CKVC"
    lead_id: null
  - name: Phase III - WIP & Client Billings
    description: "12 tasks | Prep: JPAL + LAS | Review: BOM, RIM, CKVC"
    lead_id: null
  - name: Phase IV - Final Adjustments
    description: "12 tasks | Prep: JLI, RMQB, JAP, JRMO | Review: JPAL, LAS, RIM, CKVC"
    lead_id: null
  - name: Phase V - Sign-off
    description: "3 tasks | Review: RIM | Sign-off: CKVC | Submit: BOM"
    lead_id: null

# Custom fields (optional - can be added via API)
custom_fields:
  - name: Prep By
    type: text
    description: "Employee code who prepares the task (e.g., RIM, BOM, JPAL)"
  - name: Review By
    type: text
    description: "Employee code who reviews the task"
  - name: Approve By
    type: text
    description: "Employee code who approves the task"
  - name: Planned Hours
    type: number
    description: "Estimated effort in hours (default: 16.0)"
  - name: Odoo Task ID
    type: text
    description: "External ID from Odoo project.task (for sync tracking)"

# Field ownership contract (PPM Clarity sync)
# Reference: spec/ppm-clarity-plane-odoo/plan.md
field_ownership:
  plane_owned:
    - name
    - description
    - labels
    - estimate_point
    - priority
    - start_date
    - target_date
  odoo_owned:
    - stage_id  # Maps to Plane state_id via workflow state mapping
    - user_ids  # Maps to Plane assignee_ids
    - date_deadline  # Maps to Plane target_date (Odoo wins on conflict)
    - planned_hours  # Maps to Plane estimate (custom field)
    - effective_hours  # No Plane equivalent (Odoo-only)
    - progress  # No Plane equivalent (Odoo-only)
  shared:
    - state  # Conflict resolution via reconciliation workflow

# Sync configuration
sync:
  enabled: true
  direction: bidirectional
  idempotency_key_format: "plane:sync:{workflow_id}:{plane_issue_id}:{odoo_task_id}:{timestamp}"
  conflict_resolution:
    strategy: field_ownership  # Use field_ownership contract above
    reconciliation_workflow: "automations/n8n/workflows/ppm-clarity-reconciliation.json"
  slack_notifications:
    success_channel: "#ppm-clarity-logs"
    failure_channel: "#ppm-clarity-alerts"
    conflict_channel: "#ppm-clarity-conflicts"

# Rate limiting (Plane API)
rate_limit:
  requests_per_minute: 60
  throttle_sleep_seconds: 1.1  # 1.1s sleep between requests = 54.5 req/min (safe margin)

# Verification checklist (post-seeding)
verification:
  - check: Workspace exists
    command: "curl -H 'X-API-Key: $PLANE_API_KEY' https://api.plane.so/api/v1/workspaces/$WORKSPACE_SLUG/"
  - check: Project created
    command: "curl -H 'X-API-Key: $PLANE_API_KEY' https://api.plane.so/api/v1/workspaces/$WORKSPACE_SLUG/projects/ | jq '.[] | select(.name==\"Finance PPM — Month-end Close\")'"
  - check: Labels seeded
    command: "curl -H 'X-API-Key: $PLANE_API_KEY' https://api.plane.so/api/v1/workspaces/$WORKSPACE_SLUG/projects/$PROJECT_ID/labels/ | jq 'length'"
    expected: "30 labels (25 categories + 5 phases)"
  - check: Work items seeded
    command: "curl -H 'X-API-Key: $PLANE_API_KEY' https://api.plane.so/api/v1/workspaces/$WORKSPACE_SLUG/work-items/ | jq 'length'"
    expected: "39 work items (48 if including BIR tasks)"
  - check: Rate limit compliance
    command: "Verify throttle_sleep_seconds >= 1.0s in seeder script logs"
