  # ---------------------------------------------------------------------------
  # Workload Identity Groups
  # ---------------------------------------------------------------------------

  - name: sg-ipai-workload-agents
    display_name: "IPAI Workload — Agent Identities"
    description: "Managed identities for AI agent workloads"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members:
      - object: id-ipai-agents-dev
        type: managed_identity
    azure_rbac_assignments:
      - scope: kv-ipai-dev
        role: Key Vault Secrets User
      - scope: stipaidevlake
        role: Storage Blob Data Reader
      - scope: oai-ipai-dev
        role: Cognitive Services OpenAI User

  - name: sg-ipai-workload-aca
    display_name: "IPAI Workload — Container Apps"
    description: "Managed identities for Odoo and platform Container Apps"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members:
      - object: id-ipai-aca-dev
        type: managed_identity
    azure_rbac_assignments:
      - scope: kv-ipai-dev
        role: Key Vault Secrets User
      - scope: ipai-odoo-dev-kv
        role: Key Vault Secrets User
      - scope: cripaidev
        role: AcrPull

  - name: sg-ipai-workload-databricks
    display_name: "IPAI Workload — Databricks Identities"
    description: "Managed identities for Databricks workspace and Unity Catalog"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members:
      - object: id-ipai-databricks-dev
        type: managed_identity
      - object: dbmanagedidentity
        type: managed_identity
    azure_rbac_assignments:
      - scope: stipaidevlake
        role: Storage Blob Data Contributor
      - scope: kv-ipai-dev
        role: Key Vault Secrets User

  - name: sg-ipai-workload-cicd
    display_name: "IPAI Workload — CI/CD Pipelines"
    description: "Service principals for Azure DevOps and GitHub Actions pipelines"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members:
      - object: sc-azure-dev-platform
        type: service_principal
      - object: sc-azure-dev-lakehouse
        type: service_principal
    azure_rbac_assignments:
      - scope: subscription
        role: Reader
      - scope: cripaidev
        role: AcrPush

  # ---------------------------------------------------------------------------
  # App Role Groups (for Entra app role assignment)
  # ---------------------------------------------------------------------------

  - name: sg-ipai-app-copilot-advisory
    display_name: "IPAI App Role — Copilot Advisory"
    description: "Users with copilot.advisory app role — read-only copilot access"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # dynamically populated via app role assignment
    app_role_assignments:
      - app: "InsightPulse AI - Odoo ERP"
        role: copilot.advisory

  - name: sg-ipai-app-copilot-action
    display_name: "IPAI App Role — Copilot Action"
    description: "Users with copilot.action app role — action-capable copilot access"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # dynamically populated via app role assignment
    app_role_assignments:
      - app: "InsightPulse AI - Odoo ERP"
        role: copilot.action

  - name: sg-ipai-app-ops-admin
    display_name: "IPAI App Role — Operations Admin"
    description: "Users with ops.admin app role — platform operations"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # populated via nested group: sg-ipai-platform-owners
    nested_groups:
      - sg-ipai-platform-owners
    app_role_assignments:
      - app: "InsightPulse AI - Odoo ERP"
        role: ops.admin
