version: 1
name: agent-pattern-selection
description: "Decide which agentic pattern fits a task: single call, sequential, parallel, evaluator-optimizer, or autonomous agent"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: workflow-architect
source_family: anthropic_agent_patterns
status: active

triggers:
  - "new skill or agent design"
  - "architecture review of agent"
  - "task decomposition"
  - "should this be an agent?"

inputs:
  - task_description: "What the agent/skill needs to accomplish"
  - complexity_indicators: "Dependencies, parallelism, iteration needs, open-endedness"
  - latency_budget: "Acceptable response time"
  - cost_sensitivity: "Token budget constraints"

steps:
  - id: single_call_check
    action: "Assess if a single optimized LLM call with good retrieval solves the task"
    gate: "If yes → recommend single call, stop"
  - id: dependency_check
    action: "Identify if subtasks have sequential dependencies"
    gate: "If fixed sequential → recommend sequential workflow"
  - id: independence_check
    action: "Identify if subtasks are independent and benefit from concurrency"
    gate: "If independent → recommend parallel workflow"
  - id: iteration_check
    action: "Assess if iterative refinement with measurable criteria improves quality"
    gate: "If measurable gains → recommend evaluator-optimizer"
  - id: autonomy_check
    action: "Confirm problem is truly open-ended with unpredictable steps"
    gate: "If open-ended → recommend autonomous agent with guardrails"

outputs:
  - recommended_pattern: "single_call | sequential | parallel | evaluator_optimizer | autonomous_agent"
  - justification: "Why this pattern and not a simpler one"
  - guardrails: "Required safety measures if agent pattern selected"

guardrails:
  - "Never recommend autonomous agent when a workflow suffices"
  - "Never skip the single-call assessment"
  - "Document why simpler patterns were rejected"

evidence:
  format: "Pattern decision record in docs/evidence/"
  required: true

benchmark_source: "https://www.anthropic.com/engineering/building-effective-agents"
