version: 1
type: foundry_skill
family: foundry_model_tool_runtime
skill:
  name: foundry-mcp-auth-design
  status: draft
  owner: agents
  purpose: >
    Choose auth mode per MCP server. Prefer managed identity and Entra for
    Azure-native tools, fall back to OAuth2 for external providers, and use
    key-based auth only as a last resort with Key Vault storage.

  triggers:
    - new MCP server setup requiring auth configuration
    - auth review for existing MCP server
    - security audit of MCP auth posture

  inputs:
    - MCP server type (Azure-native vs external)
    - hosting pattern (Azure Functions, ACA, external SaaS)
    - available identity providers (managed identity, Entra, external OAuth2)
    - current auth configuration (if reviewing existing)

  steps:
    - identify MCP server type (Azure-native internal vs external provider)
    - check if managed identity is possible for this hosting pattern
    - check if Entra app registration exists or can be created
    - determine auth mode using preference order — managed identity > Entra OAuth2 > OAuth2 > API key
    - document auth decision with rationale
    - specify Key Vault requirements if key-based auth is selected
    - document Entra app registration requirements if Entra OAuth2 is selected

  outputs:
    - auth_mode_recommendation
    - entra_app_registration_requirements
    - key_vault_requirements
    - security_assessment
    - rationale

  guardrails:
    - managed identity and Entra are preferred for Azure-native tools
    - key-based auth only when no better option exists
    - never hardcode credentials — require Key Vault for any key-based auth
    - always document why a lower-preference auth mode was chosen
    - never skip auth configuration for any MCP server

  evidence:
    required: true
    format: "docs/evidence/{stamp}/foundry/mcp-auth/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - agents/knowledge/benchmarks/microsoft-foundry-models-and-tools.md
  - agents/personas/foundry-tool-governor.md
  - docs/contracts/foundry-vscode-auth-contract.md
