# Staging environment configuration

environment: staging
catalog: staging_ppm

schemas:
  bronze: bronze
  silver: silver
  gold: gold

# Alerting (enabled in staging)
alerting:
  enabled: true
  webhook_url: "${SLACK_WEBHOOK_URL}"

# Data quality thresholds (stricter in staging)
quality:
  null_threshold_pct: 2.0
  unique_threshold_pct: 0.0
  referential_threshold_pct: 0.5
