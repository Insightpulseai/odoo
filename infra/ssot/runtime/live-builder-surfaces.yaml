    action: "Register Entra app with redirect URIs for VS Code"
    blocker: "Requires Entra admin access"
    contract: "docs/contracts/foundry-vscode-auth-contract.md"

  - priority: 2
    action: "Configure MCP baseline servers with auth"
    blocker: "Depends on Entra app registration"
