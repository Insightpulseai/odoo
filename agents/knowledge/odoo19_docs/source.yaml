# Odoo 18 Documentation — Knowledge Source Contract
# SSOT for the docs-first retrieval corpus

name: odoo18-docs
description: Odoo 18 official documentation corpus for RAG retrieval
version: "1.0"

source:
  repo: https://github.com/odoo/documentation.git
  branch: "19.0"
  type: git
  depth: 1  # shallow clone for ingestion

ingestion:
  include:
    - "content/**"
    - "README.md"
  exclude:
    - "_build/**"
    - "locale/**"
    - "tests/**"
    - "static/**/*.png"
    - "static/**/*.jpg"
    - "static/**/*.gif"
    - "static/**/*.svg"
    - "static/**/*.ico"
    - "static/**/*.mp4"
    - "static/**/*.zip"
    - "extensions/**"
    - ".github/**"
    - ".tx/**"
  file_types:
    - "*.rst"
    - "*.md"
    - "*.txt"

metadata:
  product: odoo
  version: "19.0"
  source_type: documentation
  lang: en
  license: CC-BY-SA-3.0

