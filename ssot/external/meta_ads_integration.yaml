meta_ads_integration:
  version: "2.0.0"
  updated: "2026-03-31"

  # ─────────────────────────────────────────────────────────────────────────
  # PRIMARY APP — Marketing-API-Test (has valid access token, vaulted)
  # ─────────────────────────────────────────────────────────────────────────
  primary_app:
    name: "Marketing-API-Test"
    app_id: "971674085514908"
    purpose: "Meta CAPI + Marketing API bridge"
    products: ["Marketing API"]
    app_type: "business"
    app_mode: "development"
    token_vaulted: true
    token_vault_key: "meta-marketing-api-token"
    token_vault_date: "2026-03-31"

  # ─────────────────────────────────────────────────────────────────────────
  # SECONDARY APP — Insightpulseai Ads (legacy, no valid token yet)
  # Consolidation: migrate to primary app or deprecate after validation
  # ─────────────────────────────────────────────────────────────────────────
  secondary_app:
    name: "Insightpulseai Ads"
    app_id: "951394464039117"
    purpose: "Internal Dataverse ad automation"
    product: "Marketing API"
    site_url: "https://insightpulseai.com"
    status: "development"
    token_generated: false
    notes: "No valid access token. Pending consolidation decision."

  business:
    portfolio_name: "Dataverse"
    portfolio_id: "1419103389914952"
    verification_status: "verified"
    legal_entity: "Dataverse IT Consultancy"

  ad_account:
    name: "Insightpulseai Ads"
    id: "1491166555865337"
    status: "attached_to_business_portfolio"

  system_user:
    name: "claude-automation"
    id: "61575473609842"
    role: "Admin"
    portfolio: "Dataverse"
    assigned_assets:
      - type: facebook_page
        name: Insightpulseai
        access: full_control
      - type: ad_account
        name: Insightpulseai Ads
        id: "1491166555865337"
        access: full_control
      - type: app
        name: Insightpulseai Ads
        access: full_control
  permissions:
    required:
      - "ads_read"             # CAPI (Server-Side API) — zero dependencies, Phase 2
      - "ads_management"       # Marketing API — audience sync, campaign management, Phase 3
    required_dependencies:     # auto-granted when ads_management is approved
      - "pages_read_engagement"  # dependency of ads_management
      - "pages_show_list"        # dependency of ads_management
    optional:
      - "business_management"  # only if asset/business orchestration needed
    not_needed:
      - "instagram_basic"          # unless app touches Instagram
      - "catalog_management"       # unless commerce/dynamic ads needed
      - "leads_retrieval"          # unless lead ads forms needed
      - "whatsapp_business_management"  # only if Phase 4 gap analysis warrants it
      - "whatsapp_business_messaging"   # only if Phase 4 gap analysis warrants it

  security:
    app_secret_proof: "required"  # Meta recommends for server API calls
    token_type: "system_user_access_token"
    token_storage: "Azure Key Vault (kv-ipai-dev)"
    secret_name: "meta-ads-api-token"

  setup_checklist:
    - step: "Assign ad account 1491166555865337 to claude-automation system user"
      status: "done"  # confirmed 2026-03-31
    - step: "Generate access token for primary app (971674085514908)"
      status: "done"  # vaulted 2026-03-31 as meta-marketing-api-token
    - step: "Store token in Key Vault"
      status: "done"  # kv-ipai-dev/meta-marketing-api-token + meta-marketing-api-app-id
    - step: "Enable App Secret Proof in app settings"
      status: "pending"
    - step: "Update site URL from prismalab.insightpulseai.com to insightpulseai.com"
      status: "pending"
    - step: "Complete business verification for primary app"
      status: "pending"
    - step: "Switch primary app from development to live mode"
      status: "pending"

  blockers:
    - "App Secret Proof not enabled on primary app (971674085514908)"
    - "App business verification pending for primary app"
    - "Site URL still shows prismalab.insightpulseai.com on secondary app"
    - "Primary app still in development mode"

# ---------------------------------------------------------------------------
# Bridge Architecture (added 2026-03-31, updated with repo audit)
# ---------------------------------------------------------------------------
integration: meta
mode: bridge

current_state:
  meta_ads_api: development_not_live
  whatsapp_conversational_messaging: active_via_oca
  facebook_instagram_embeds: active_via_upstream_odoo
  legacy_ipai_whatsapp_connector: deprecated

priority_order:
  - conversions_api
  - marketing_api
  - optional_whatsapp_cloud_overlay

authorities:
  whatsapp_module_path: addons/oca/social/mail_gateway_whatsapp/
  legacy_deprecated_path: archive/root/addons/ipai/ipai_whatsapp_connector/
  ads_contract_path: ssot/external/meta_ads_integration.yaml

runtime:
  outbound_path: "odoo -> queue/webhook -> azure_function -> meta"
  inbound_path: "meta_webhook -> azure_function -> odoo_ingress"
  analytics_path: "meta_insights -> databricks_bronze -> silver_gold"

security:
  secrets_source: key_vault
  direct_odoo_to_meta_calls_allowed: false
  webhook_signature_verification: required
  pii_hashing_required_for_audience_sync: true

reliability:
  idempotency: required
  retries: required
  dead_letter_queue: required
  replay_support: required

spec_bundle: spec/meta-integration-bridge
