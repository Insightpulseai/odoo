version: 1
namespace: ipai.org.azure.service_selection_policy.v1
artifact_type: policy
repo_key: org
domain: azure
subject: service_selection_policy

# ============================================================================
# AZURE SERVICE SELECTION POLICY
# ============================================================================
# Defines which Azure services are approved, conditional, or not-baseline.
# Repos consume from the approved catalog only.
# Anything outside requires an exception via ops-platform.
# ============================================================================

selection_model:
  classes:
    - approved_core       # Intentionally built around
    - conditional         # Allowed only for specific repos/use cases
    - not_baseline        # Visible in Azure, not part of canonical stack

rules:
  approved_core_services_are_preferred: true
  conditional_services_require_explicit_justification: true
  not_baseline_services_cannot_be_used_without_exception: true
  every_repo_must_declare_consumed_services: true
  every_service_must_have_an_owner_repo_or_owner_domain: true

# ============================================================================
# SERVICE CLASSIFICATION
# ============================================================================

ai_machine_learning:
  approved_core:
    - microsoft_foundry
    - azure_openai
    - ai_search
    - document_intelligence
    - language
  conditional:
    - azure_machine_learning
    - computer_vision
    - content_safety
    - speech  # only if voice workflows exist

analytics:
  approved_core:
    - azure_databricks
    - event_hubs
    - log_analytics_workspaces
    - managed_prometheus
  conditional:
    - power_bi_embedded
    - azure_data_explorer
    - data_factories

compute:
  approved_core:
    - kubernetes_services
    - container_registries
    - container_apps       # only where AKS is unnecessary
    - virtual_machines     # special runtimes only (Supabase VM)
  conditional:
    - function_app
    - app_services

databases:
  approved_core:
    - azure_database_for_postgresql_flexible_servers
    - azure_sql            # only where needed
    - azure_cosmos_db      # only for specific app patterns
    - azure_managed_redis
  conditional:
    - azure_database_for_mysql_flexible_servers

devops:
  approved_core:
    - azure_devops_organizations
    - github
    - application_insights
    - api_management_services  # if API gateway is part of target state
  conditional:
    - azure_deployment_environments
    - managed_devops_pools

identity:
  approved_core:
    - microsoft_entra_id
    - managed_identities
    - app_registrations
    - access_connector_for_azure_databricks
  conditional:
    - external_identities
    - identity_governance
    - entra_privileged_identity_management

integration:
  approved_core:
    - service_bus
    - event_grid
    - logic_apps           # only if specific integration flow needs it
  conditional:
    - api_connections
    - integration_accounts

management_governance:
  approved_core:
    - policy
    - advisor
    - cost_management
    - diagnostic_settings
    - subscriptions
    - template_specs
    - microsoft_purview_accounts
  conditional:
    - azure_lighthouse
    - automation_accounts
    - azure_update_manager

monitor:
  approved_core:
    - application_insights
    - log_analytics_workspaces
    - managed_prometheus
    - azure_managed_grafana
    - alerts
    - data_collection_rules
    - service_health

networking:
  approved_core:
    - virtual_networks
    - private_link
    - private_dns_zones
    - network_security_groups
    - firewalls
    - application_gateways
    - front_doors
    - bastions
  conditional:
    - expressroute_circuits
    - virtual_wans
    - waf_policies
    - nat_gateways
  note: "Prefer front_doors for public edge, application_gateways for regional ingress"

security:
  approved_core:
    - key_vaults
    - microsoft_defender_for_cloud
    - microsoft_sentinel
    - microsoft_entra_id_security
    - microsoft_entra_privileged_identity_management
  conditional:
    - azure_cloud_hsms
    - confidential_ledgers

storage:
  approved_core:
    - storage_accounts
    - disks
    - disk_encryption_sets
  conditional:
    - azure_netapp_files
    - snapshots

# ============================================================================
# REPO-TO-SERVICE BINDINGS
# ============================================================================

repo_defaults:
  infra:
    role: provisions_and_secures
    approved_domains:
      - ai_machine_learning
      - analytics
      - compute
      - databases
      - devops
      - identity
      - integration
      - management_governance
      - monitor
      - networking
      - security
      - storage

  ops_platform:
    role: metadata_and_catalog
    approved_domains:
      - management_governance
      - monitor

  agents:
    role: consumes_ai_and_devops
    approved_domains:
      - ai_machine_learning
      - devops
      - identity
      - monitor

  lakehouse:
    role: consumes_analytics_and_data
    approved_domains:
      - analytics
      - databases
      - monitor
      - storage
      - identity

  web:
    role: consumes_compute_and_networking
    approved_domains:
      - compute
      - devops
      - identity
      - monitor
      - networking

  odoo:
    role: consumes_runtime_and_data
    approved_domains:
      - compute
      - databases
      - identity
      - monitor
      - storage
    notes:
      - "Document Intelligence / Foundry only through approved adapters (ipai_* modules)"
      - "No direct Azure AI SDK calls from Odoo Python code"

  automations:
    role: consumes_integration
    approved_domains:
      - integration
      - monitor
