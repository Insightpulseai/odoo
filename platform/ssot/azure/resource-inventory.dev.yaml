      - name: pv-ipai-dev-sea
        type: Microsoft Purview account
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: data_governance
      - name: Atlas-e613d16b-0a3b-4715-bba1-3ecdb0857796
        type: Event Hubs Namespace
        resource_group: managed-rg-pv-ipai-dev-sea
        region: southeastasia
        role: purview_managed_event_hubs
      - name: scansoutheastasiadckrnut
        type: Storage account
        resource_group: managed-rg-pv-ipai-dev-sea
        region: southeastasia
        role: purview_managed_storage
  control_plane:
    repo_owner: platform
    resources:
      - name: kv-ipai-dev-sea
        type: Key vault
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: secrets_reference_authority
      - name: id-ipai-dev
        type: Managed Identity
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: shared_platform_identity
      - name: id-ipai-dev-agent
        type: Managed Identity
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: referenced_agent_identity
      - name: id-ipai-dev-data
        type: Managed Identity
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: referenced_data_identity
      - name: id-ipai-dev-pipeline
        type: Managed Identity
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: referenced_pipeline_identity
      - name: id-ipai-dev-runtime
        type: Managed Identity
        resource_group: rg-ipai-dev-security-sea
        region: southeastasia
        role: referenced_runtime_identity
  infrastructure:
    repo_owner: infra
    resources:
      - name: acae-ipai-dev-sea
        type: Container Apps Environment
        resource_group: rg-ipai-dev-odoo-sea
        region: southeastasia
        role: shared_container_runtime
      - name: acripaiodoo
        type: Container registry
        resource_group: rg-ipai-shared
        region: southeastasia
        role: image_registry
      - name: vnet-ipai-dev-sea
        type: Virtual network
        resource_group: rg-ipai-dev-net-sea
        region: southeastasia
        role: primary_vnet
      - name: pe-ipai-dev-kv
        type: Private endpoint
        resource_group: rg-ipai-dev-net-sea
        region: southeastasia
        role: key_vault_private_connectivity
      - name: pe-ipai-dev-search
        type: Private endpoint
        resource_group: rg-ipai-dev-net-sea
        region: southeastasia
        role: search_private_connectivity
      - name: pe-ipai-dev-pg
        type: Private endpoint
        resource_group: rg-ipai-dev-net-sea
        region: southeastasia
        role: postgres_private_connectivity
      - name: privatelink.applicationinsights.azure.com
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: appinsights_private_dns
      - name: privatelink.azurecr.io
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: acr_private_dns
      - name: privatelink.blob.core.windows.net
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: blob_private_dns
      - name: privatelink.cognitiveservices.azure.com
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: cognitive_private_dns
      - name: privatelink.postgres.database.azure.com
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: postgres_private_dns
      - name: privatelink.search.windows.net
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: search_private_dns
      - name: privatelink.servicebus.windows.net
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
