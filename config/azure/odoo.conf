[options]
; =============================================================================
; Odoo Azure Container App Configuration
; =============================================================================
; This config is used by ACA deployments (staging + prod).
; DB connection params are NOT set here — they come from ACA env vars
; (HOST, PORT, USER, PASSWORD) injected via Key Vault references.
; The Odoo entrypoint's check_config prefers config file values over env vars,
; so DB params must stay out of this file.
;
; Database name is set via ODOO_DB env var per ACA environment:
;   staging ACA → ODOO_DB=odoo_staging
;   prod ACA    → ODOO_DB=odoo_prod
; =============================================================================

; Addons Path — CE core + OCA (flattened) + IPAI custom
; These paths match the image layout from Dockerfile.unified / Dockerfile
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/opt/odoo/addons/oca,/opt/odoo/addons/ipai

; Server
http_port = 8069
proxy_mode = True
; Explicit base URL — prevents auto-detection from ACA internal FQDN
; when Azure Front Door forwards originHostHeader as ACA hostname
web.base.url = https://erp.insightpulseai.com
workers = 4
max_cron_threads = 2

; Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1

; Logging
log_level = info
log_handler = :INFO

; Security
list_db = False
admin_passwd = False

; Data
data_dir = /var/lib/odoo
without_demo = True

; Outgoing Mail — Zoho SMTP over 587/TLS
; Credentials resolved at runtime via Azure Key Vault + managed identity.
; No username/password in this file.
smtp_server = smtppro.zoho.com
smtp_port = 587
smtp_ssl = False
smtp_starttls = True
email_from = no-reply@insightpulseai.com

; Queue Job Configuration (Agent Runtime)
[queue_job]
channels = root:4,high:2,medium:2,low:1
scheme = http
host = localhost
port = 8069
