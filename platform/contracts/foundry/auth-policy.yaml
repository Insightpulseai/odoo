version: 1
owner_repo: platform
owner_team: ai-platform
status: draft

defaults:
  prefer_keyless_for_runtime: true
  api_key_allowed_for_bootstrap_only: true
  require_documented_client_auth_mode: true

clients:
  portal:
    allowed_auth_modes:
      - api_key
    preferred_auth_mode: api_key
    fallback_auth_modes: []
  ai_toolkit:
    allowed_auth_modes:
      - entra_rbac
      - api_key
    preferred_auth_mode: entra_rbac
    fallback_auth_modes:
      - api_key
  runtime_apps:
    allowed_auth_modes:
      - managed_identity
      - api_key
    preferred_auth_mode: managed_identity
    fallback_auth_modes:
      - api_key
  ci_cd:
    allowed_auth_modes:
      - federated_identity
      - secret
    preferred_auth_mode: federated_identity
    fallback_auth_modes:
      - secret

rules:
  - id: foundry-runtime-no-manual-copy-paste-key
    description: Runtime apps must not depend on manually copied API keys.
  - id: foundry-ai-toolkit-rbac-first
    description: AI Toolkit should use Entra RBAC first when supported.
  - id: foundry-cicd-noninteractive-auth
    description: CI/CD must use noninteractive auth only.
