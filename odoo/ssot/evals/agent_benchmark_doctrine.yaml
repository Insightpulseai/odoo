---
# Agent Benchmark Doctrine — Machine-Readable SSOT
# Human-readable companion: docs/evals/agent_benchmark_doctrine.md

version: 1
name: agent_benchmark_doctrine
status: active
updated_at: "2026-03-18"

principles:
  - id: evaluate_outcomes
    rule: >-
      Benchmark business-task success, not eloquence.
      A copilot that produces a correct journal entry with awkward phrasing
      outranks one that writes beautiful prose but posts to the wrong account.

  - id: simplest_architecture
    rule: >-
      Prefer the simplest viable architecture first.
      One agent with clear tools before multi-agent.
      Only add agent layers when a single agent demonstrably fails the benchmark.

  - id: real_conditions
    rule: >-
      Benchmarks must reflect real operating conditions.
      Use production-representative data, realistic role permissions,
      actual ERP state, and genuine user intent patterns.

  - id: multiple_judges
    rule: >-
      Use multiple judges: deterministic, model-based, and human expert.
      No single judge is sufficient. All three are required for
      deployment-gating benchmarks.

  - id: production_telemetry
    rule: >-
      Production telemetry is part of evaluation.
      Traces, tool calls, retries, costs, and latency must be captured
      and analyzed as part of every benchmark run.

  - id: safety_overrides
    rule: >-
      Safety and access control override benchmark wins.
      Unauthorized actions invalidate the entire benchmark result
      regardless of task success rate.

research_mapping:
  webarena:
    agent_success_rate: 0.1441
    human_success_rate: 0.7824
    gap_factor: 5.4
    implication: >-
      Long-horizon web tasks are much harder than demos imply.
      Multi-step ERP workflows will have compounding failure rates.
    eval_rules:
      - Benchmark multi-step workflows end-to-end, not individual steps
      - Measure completion rate at each step to identify failure cascades
      - Report both partial and full completion rates

  gaia:
    agent_success_rate: 0.15
    human_success_rate: 0.92
    gap_factor: 6.1
    implication: >-
      General tool-using assistants are far from human reliability.
      Tool selection, parameter construction, and result interpretation
      are each failure-prone steps.
    eval_rules:
      - Test tool selection accuracy separately from task completion
      - Measure tool call correctness (right tool, right parameters, right interpretation)
      - Include tasks that require choosing NOT to use a tool

  tau_bench:
    agent_success_rate_ceiling: 0.50
    implication: >-
      User interaction and policy-following are first-class eval targets.
      Even strong agents score under 50% on policy-compliant interaction tasks.
    eval_rules:
      - Include policy-compliance as a required dimension, not optional
      - Test multi-turn interactions where the agent must follow branching policies
      - Measure whether the agent correctly identifies when to escalate to a human

  the_agent_company:
    autonomous_completion: 0.303
    partial_completion: 0.393
    implication: >-
      Digital worker claims need workplace proof.
      Most agents need significant human guidance to complete
      realistic workplace tasks.
    eval_rules:
      - Report autonomous vs assisted completion separately
      - Measure human intervention rate as a primary metric
      - Do not count hint-assisted completions as autonomous success

required_dimensions:
  - task_success
  - correctness
  - groundedness
  - policy_compliance
  - latency
  - stability
  - human_intervention_rate
  - auditability

judges:
  deterministic:
    required: true
    description: >-
      Automated checks producing binary pass/fail results.
      No model inference involved. Hard gates.
    checks:
      - schema_validation
      - required_fields_present
      - no_unauthorized_mutations
      - data_type_correctness
      - referential_integrity
      - idempotency
      - permission_boundary

  model_based:
    required: true
    description: >-
      LLM evaluates qualitative aspects. Judge model must differ
      from agent model to avoid self-evaluation bias.
    evaluates:
      - groundedness
      - clarity
      - usefulness
      - completeness
      - conciseness
    scoring: likert_1_to_5

  human_expert:
    required: true
    description: >-
      Domain experts evaluate a stratified sample of agent outputs.
      Required for any deployment-gating benchmark.
    evaluates:
      - finance_correctness
      - erp_practicality
      - trustworthiness
      - edge_case_handling
      - failure_mode_quality
    minimum_sample_rate: 0.20

repeat_policy:
  default_runs: 5
  interactive_runs_preferred: 8
  required_outputs:
    - pass_at_1
    - pass_at_n
    - variance
    - critical_failure_count
    - mean_score
    - worst_run_score
  rules:
    - Never report only the best run
    - Never discard runs without documented infrastructure failure evidence
    - Flag agent as unstable if variance exceeds 0.15

release_gates:
  production_ready:
    - benchmark_threshold_met
    - no_critical_safety_failures
    - traces_available
    - monitoring_enabled
    - rollback_path
    - permissions_reviewed

  surpass_benchmark:
    - higher_weighted_score
    - equal_or_better_success
    - equal_or_better_groundedness
    - no_worse_safety
    - evidence_pack_committed

default_thresholds:
  weighted_score_min: 0.80
  task_success_min: 0.85
  groundedness_min: 0.90
  critical_safety_failures_max: 0
  monitored_run_success_min: 0.95
  hallucination_rate_max: 0.05

stack_profiles:
  odoo:
    description: Odoo CE 19 ERP copilot evaluation
    priority_metrics:
      - task_completion
      - wrong_action_rate
      - role_access
      - groundedness
      - human_correction

  foundry:
    description: Azure AI Foundry pipeline and prompt flow evaluation
    priority_metrics:
      - run_success
      - tool_correctness
      - retrieval_relevance
      - trace_completeness
      - latency

  power_bi:
    description: Power BI reporting and analytics copilot evaluation
    priority_metrics:
      - factual_accuracy
      - metric_correctness
      - source_groundedness

  teams_m365:
    description: Teams and M365 collaboration copilot evaluation
    priority_metrics:
      - source_support
      - actionability
      - permission_correctness
      - handoff_quality

evidence_pack:
  required:
    - prompts.jsonl
    - cases.yaml
    - outputs/
    - judge_scores.json
    - human_review.csv
    - failure_log.md
    - benchmark_summary.md
    - final_scorecard.md
  path_template: "docs/evals/evidence/{YYYYMMDD-HHMM}/{benchmark_name}/"

anti_patterns:
  - id: best_case_benchmarking
    description: Running many iterations and reporting only the best subset
    rule: Report all runs. Worst run is as important as best run.

  - id: hiding_failed_runs
    description: Omitting runs where the agent failed or crashed
    rule: Every run appears in evidence pack. Failed runs get detailed analysis.

  - id: demos_as_proof
    description: Treating curated demos as benchmark evidence
    rule: Use randomized or stratified test cases from production-representative data.

  - id: vendor_native_trivia
    description: Comparing on tasks trivially easy for one vendor's platform
    rule: Compare on platform-agnostic business outcomes.

  - id: autonomy_from_partial
    description: Reporting hint-assisted completion as autonomous capability
    rule: Report autonomous and assisted completion as separate metrics.

  - id: exists_equals_works
    description: Claiming a feature works because a button exists in the UI
    rule: Every capability claim requires end-to-end verification of final output.
