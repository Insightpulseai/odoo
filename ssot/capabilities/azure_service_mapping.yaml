# =============================================================================
# Azure Service Mapping — InsightPulse AI
# =============================================================================
#
# Canonical mapping of Azure/Microsoft services to target capability lanes.
# Distinguishes keep/adapt/defer decisions and prevents portal templates
# or admin surfaces from accidentally becoming architecture authorities.
#
# Last updated: 2026-03-18
# =============================================================================

version: 1

metadata:
  name: azure_service_mapping
  owner: platform-architecture
  status: canonical_target_state
  architecture_model: six_plane_azure_first
  last_updated: "2026-03-18"

# -----------------------------------------------------------------------------
# Architecture Authorities
# -----------------------------------------------------------------------------

architecture_authorities:
  planned_truth: azure_boards
  code_truth: github
  release_truth: azure_pipelines
  runtime_observability_truth: azure_monitor_application_insights
  agent_runtime_truth: microsoft_foundry
  intended_state_truth: repo_ssot

# -----------------------------------------------------------------------------
# Service Role Rules
# -----------------------------------------------------------------------------

service_role_rules:
  - name: odoo_sor_boundary
    rule: odoo_is_system_of_record_for_transactional_business_data
  - name: databricks_soi_boundary
    rule: databricks_is_system_of_intelligence_not_transaction_authority
  - name: foundry_runtime_boundary
    rule: foundry_is_agent_runtime_eval_and_tracing_plane_not_system_of_record
  - name: apim_boundary
    rule: api_management_is_governed_ingress_egress_and_tool_policy_boundary_only
  - name: supabase_boundary
    rule: supabase_is_platform_control_plane_and_app_backend_not_sor_or_lakehouse
  - name: power_bi_boundary
    rule: power_bi_is_semantic_consumption_layer_not_data_intelligence_core
  - name: portal_template_boundary
    rule: guided_deployment_and_portal_templates_are_reference_only_not_canonical_runtime
  - name: managed_identity_first
    rule: prefer_managed_identity_over_static_secrets_where_possible

# -----------------------------------------------------------------------------
# Template Policy
# -----------------------------------------------------------------------------

template_policy:
  preferred_starters:
    - repo_backed_azd_template
    - repo_backed_foundry_app_template
    - repo_backed_app_starter
  allowed_bootstrap_only:
    - portal_guided_deployment
  disallowed_as_canonical_foundation:
    - portal_only_solution_without_repo
    - service_catalog_entry_mistaken_for_template
    - admin_surface_mistaken_for_runtime

# -----------------------------------------------------------------------------
# Service Catalog — Keep
# -----------------------------------------------------------------------------

service_catalog:

  # -- Governance / Control --

  github:
    provider: microsoft_github
    plane: governance_control
    classification: keep
    role: code_truth

  azure_devops:
    provider: microsoft
    plane: governance_control
    classification: keep
    role: planned_truth_and_release_governance

  application_insights:
    provider: microsoft
    plane: governance_control
    classification: keep
    role: app_observability_and_runtime_feedback

  azure_monitor:
    provider: microsoft
    plane: governance_control
    classification: keep
    role: infrastructure_and_runtime_observability

  # -- Identity / Network / Security --

  microsoft_entra_id:
    provider: microsoft
    plane: identity_network_security
    classification: keep
    role: identity_rbac_and_sso

  managed_identities:
    provider: microsoft
    plane: identity_network_security
    classification: keep
    role: workload_authentication
    notes:
      - preferred_over_static_credentials

  azure_key_vault:
    provider: microsoft
    plane: identity_network_security
    classification: keep
    role: secrets_and_key_management

  azure_front_door:
    provider: microsoft
    plane: identity_network_security
    classification: keep
    role: public_edge_routing_and_protection

  web_application_firewall:
    provider: microsoft
    plane: identity_network_security
    classification: keep
    role: edge_protection

  azure_api_management:
    provider: microsoft
    plane: identity_network_security
    classification: keep
    role: governed_api_and_tool_boundary
    notes:
      - api_policy
      - partner_and_agent_tool_boundary
      - vertical_scoped_access_surface

  # -- Business Systems --

  odoo:
    provider: insightpulseai_odoo
    plane: business_systems
    classification: keep
    role: transactional_system_of_record

  azure_database_for_postgresql_flexible_server:
    provider: microsoft
    plane: business_systems
    classification: keep
    role: odoo_transactional_database_layer

  # -- Data Intelligence --

  azure_databricks:
    provider: microsoft_databricks
    plane: data_intelligence
    classification: keep
    role: governed_data_intelligence_and_context_products
    notes:
      - medallion_or_equivalent_patterns
      - feature_engineering
      - analytics_products

  unity_catalog:
    provider: databricks
    plane: data_intelligence
    classification: keep
    role: data_governance_access_lineage_and_audit

  storage_accounts_adls:
    provider: microsoft
    plane: data_intelligence
    classification: keep
    role: analytical_storage_and_lake_substrate

  # -- Agent / AI Runtime --

  microsoft_foundry:
    provider: microsoft
    plane: agent_ai_runtime
    classification: keep
    role: hosted_agents_eval_tracing_and_ai_solution_runtime

  # -- Experience / Domain Apps --

  supabase:
    provider: supabase
    plane: experience_domain_apps
    classification: keep
    role: platform_control_plane_and_app_backend
    notes:
      - suitable_for_b2b_saas_backend_patterns
      - strong_for_auth_rls_realtime_edge_functions_vector
      - may_emit_data_outward_via_replication_or_etl
      - not_the_transactional_system_of_record
      - not_the_canonical_lakehouse

  power_bi:
    provider: microsoft
    plane: experience_domain_apps
    classification: keep
    role: semantic_and_business_consumption_layer
    notes:
      - default_bi_surface_for_dashboards_and_reports
      - consumes_databricks_gold_and_adls
      - not_the_data_intelligence_core
      - fabric_is_optional_expansion

  azure_static_web_apps:
    provider: microsoft
    plane: experience_domain_apps
    classification: keep
    role: frontend_preview_and_web_app_surface

  azure_container_apps:
    provider: microsoft
    plane: experience_domain_apps
    classification: keep
    role: runtime_for_custom_services_and_preview_backends

  azure_functions:
    provider: microsoft
    plane: experience_domain_apps
    classification: keep
    role: event_driven_compute_and_bounded_orchestration

  visual_studio_code:
    provider: microsoft
    plane: experience_domain_apps
    classification: keep
    role: engineering_cockpit

# -----------------------------------------------------------------------------
# Service Catalog — Adapt
# -----------------------------------------------------------------------------

  logic_apps:
    provider: microsoft
    plane: experience_domain_apps
    classification: adapt
    role: bounded_integration_orchestration

  service_bus:
    provider: microsoft
    plane: experience_domain_apps
    classification: adapt
    role: durable_messaging

  event_grid:
    provider: microsoft
    plane: experience_domain_apps
    classification: adapt
    role: event_fanout

  copilot_studio:
    provider: microsoft
    plane: experience_domain_apps
    classification: adapt
    role: business_facing_copilot_surface
    notes:
      - experience_layer_only
      - not_canonical_platform_runtime

  microsoft_fabric:
    provider: microsoft
    plane: data_intelligence
    classification: adapt
    role: optional_semantic_or_consumption_surface
    notes:
      - secondary_to_databricks_first_target
      - not_primary_data_engineering_core
      - power_bi_inside_fabric_is_the_useful_part

  power_platform:
    provider: microsoft
    plane: experience_domain_apps
    classification: adapt
    role: bounded_low_code_accelerator

  app_service:
    provider: microsoft
    plane: experience_domain_apps
    classification: adapt
    role: traditional_web_app_host

# -----------------------------------------------------------------------------
# Service Catalog — Defer
# -----------------------------------------------------------------------------

  m365_admin:
    provider: microsoft
    plane: identity_network_security
    classification: defer
    role: administrative_surface_only

  intune:
    provider: microsoft
    plane: identity_network_security
    classification: defer
    role: endpoint_management

  defender:
    provider: microsoft
    plane: identity_network_security
    classification: defer
    role: security_operations_surface

  portal_guided_deployment:
    provider: microsoft
    plane: governance_control
    classification: defer
    role: assisted_provisioning_reference

# -----------------------------------------------------------------------------
# Capability Lanes
# -----------------------------------------------------------------------------

capability_lanes:

  app_development:
    objective: fast_repo_to_preview_build_test_deploy_loop
    preview_shell_relevance: true
    canonical_services:
      - github
      - azure_devops
      - visual_studio_code
      - azure_static_web_apps
      - azure_container_apps
      - azure_functions
      - application_insights
      - azure_monitor
    adapted_services:
      - supabase
      - app_service

  agent_sdlc:
    objective: spec_to_code_to_review_to_deploy_to_observe
    canonical_services:
      - github
      - azure_devops
      - visual_studio_code
      - microsoft_foundry
      - azure_container_apps
      - azure_functions
      - application_insights
      - azure_monitor
    adapted_services:
      - azure_api_management
      - supabase
      - copilot_studio

  data_engineering:
    objective: governed_datasets_transformations_and_context_products
    canonical_services:
      - azure_databricks
      - unity_catalog
      - storage_accounts_adls
      - application_insights
      - azure_monitor
    adapted_services:
      - service_bus
      - event_grid
      - microsoft_fabric

  finance_ppm:
    objective: transactional_finance_ppm_close_budget_compliance_and_reporting
    canonical_services:
      - odoo
      - azure_database_for_postgresql_flexible_server
      - microsoft_entra_id
      - managed_identities
      - azure_key_vault
      - azure_api_management
    adapted_services:
      - azure_functions
      - logic_apps
      - azure_databricks
      - power_bi
      - supabase
    prohibited_patterns:
      - databricks_as_finance_system_of_record
      - foundry_or_copilot_direct_posting_authority
      - low_code_tool_as_transaction_engine

  marketing:
    objective: campaign_planning_measurement_optimization_and_insight_delivery
    canonical_services:
      - azure_databricks
      - unity_catalog
      - microsoft_foundry
      - azure_api_management
      - azure_static_web_apps
      - github
      - azure_devops
    adapted_services:
      - power_bi
      - microsoft_fabric
      - supabase

  retail_merchandising:
    objective: merchandising_assortment_product_sales_and_operational_intelligence
    canonical_services:
      - odoo
      - azure_database_for_postgresql_flexible_server
      - azure_databricks
      - unity_catalog
      - microsoft_foundry
      - azure_api_management
      - azure_container_apps
    adapted_services:
      - event_grid
      - service_bus
      - power_bi

  creative:
    objective: brief_to_asset_review_publish_and_performance_feedback_loop
    preview_shell_relevance: true
    canonical_services:
      - azure_static_web_apps
      - azure_container_apps
      - microsoft_foundry
      - github
      - azure_devops
      - application_insights
      - azure_monitor
    adapted_services:
      - supabase
      - copilot_studio

  people_development:
    objective: platform_learning_builder_enablement_and_guided_execution
    canonical_services:
      - visual_studio_code
      - github
      - azure_devops
      - microsoft_foundry
    adapted_services:
      - copilot_studio
      - power_platform

# -----------------------------------------------------------------------------
# Cross-Cutting Controls
# -----------------------------------------------------------------------------

cross_cutting_controls:
  identity_security:
    required_services:
      - microsoft_entra_id
      - managed_identities
      - azure_key_vault
      - azure_front_door
      - web_application_firewall
    applies_to:
      - app_development
      - agent_sdlc
      - data_engineering
      - finance_ppm
      - marketing
      - retail_merchandising
      - creative
      - people_development

  observability:
    required_services:
      - application_insights
      - azure_monitor
    applies_to:
      - app_development
      - agent_sdlc
      - data_engineering
      - finance_ppm
      - marketing
      - retail_merchandising
      - creative

  governance:
    required_services:
      - github
      - azure_devops
    applies_to:
      - app_development
      - agent_sdlc
      - data_engineering
      - finance_ppm
      - marketing
      - retail_merchandising
      - creative
      - people_development

# -----------------------------------------------------------------------------
# Implementation Priority
# -----------------------------------------------------------------------------

implementation_priority:
  p0_foundation:
    - github
    - azure_devops
    - visual_studio_code
    - microsoft_entra_id
    - managed_identities
    - azure_key_vault
    - application_insights
    - azure_monitor
    - azure_front_door
    - web_application_firewall

  p1_runtime:
    - azure_static_web_apps
    - azure_container_apps
    - azure_functions
    - azure_api_management
    - odoo
    - azure_database_for_postgresql_flexible_server

  p2_intelligence:
    - azure_databricks
    - unity_catalog
    - storage_accounts_adls
    - microsoft_foundry

  p3_selective_adapt:
    - logic_apps
    - service_bus
    - event_grid
    - copilot_studio
    - microsoft_fabric
    - power_platform
    - app_service

# -----------------------------------------------------------------------------
# Design System
# -----------------------------------------------------------------------------

design_system:
  canonical_repo: design
  foundation:
    provider: microsoft_fluent_ui
    default_web_stack: fluent_ui_react_v9
    selective_non_react_stack: fluent_ui_web_components
    deprecated_stack: fluent_ui_react_v8
  packages:
    - tokens
    - fluent-theme
    - ui
    - icons
    - platform-shell
  rules:
    - no_parallel_design_systems
    - application_repos_consume_design_not_redefine_it
    - odoo_may_use_brand_alignment_or_embedded_widgets_but_not_full_ui_replacement
  consuming_repos:
    - web
    - platform
    - agent-platform

# -----------------------------------------------------------------------------
# Benchmark References
# -----------------------------------------------------------------------------

benchmark_references:
  odoo_sh:
    role: odoo_hosting_and_operator_experience_reference
    canonical_runtime: false
  supabase_platform_kit:
    role: platform_console_ui_reference
    canonical_runtime: false
    canonical_ui_pattern_reference: true

# -----------------------------------------------------------------------------
# Prohibited Misuse
# -----------------------------------------------------------------------------

prohibited_misuse:
  - service: supabase
    misuse: transactional_finance_engine_or_lakehouse_replacement
  - service: microsoft_fabric
    misuse: primary_data_intelligence_core_replacing_databricks
  - service: copilot_studio
    misuse: canonical_platform_runtime_or_sdlc_engine
  - service: power_platform
    misuse: canonical_execution_core
  - service: portal_guided_deployment
    misuse: canonical_solution_foundation
  - service: azure_databricks
    misuse: direct_transaction_authority_for_finance_or_odoo_master_records
  - service: microsoft_foundry
    misuse: unrestricted_business_system_write_authority
  - service: azure_api_management
    misuse: system_of_record_or_agent_runtime_plane
