# =============================================================================
# Application Authorization Matrix — InsightPulse AI
# =============================================================================
#
# Per-application role and permission matrix for all canonical systems.
# Maps Entra groups and app roles to system-native permissions.
#
# Human-readable narrative: docs/security/ACCESS_MODEL.md § 7
# App roles: infra/entra/app-roles-manifest.json
# Tool mapping: infra/entra/role-tool-mapping.yaml
#
# Last updated: 2026-03-18
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-18"

# -----------------------------------------------------------------------------
# Odoo CE 19
# -----------------------------------------------------------------------------

odoo_ce_19:
  auth_method: entra_oidc  # via ipai_auth_oidc module
  auth_fallback: keycloak_oidc  # transitional
  resource: ipai-odoo-dev-web
  database: ipai-odoo-dev-pg

  group_mappings:
    - entra_group: sg-ipai-platform-owners
      odoo_groups:
        - base.group_system  # Administration / Settings
        - base.group_erp_manager  # Technical Features
      notes: Full Settings access, module install, user management

    - entra_group: sg-ipai-finance-operators
      odoo_groups:
        - account.group_account_invoice  # Accounting / Billing
      app_roles:
        - finance.close.operator
      notes: Invoice creation, payment registration, close tasks

    - entra_group: sg-ipai-vertical-finserv
      odoo_groups:
        - account.group_account_manager  # Accounting / Adviser (for approvers)
        - account.group_account_invoice  # Accounting / Billing (for operators)
        - account.group_account_readonly  # Accounting / Read-only (for viewers)
      app_roles:
        - finance.close.approver  # mapped to Adviser
        - finance.close.operator  # mapped to Billing
        - finance.viewer  # mapped to Read-only
      notes: Role assignment depends on specific app role — not all finserv users get Adviser

    - entra_group: sg-ipai-vertical-retail-media
      odoo_groups:
        - sales_team.group_sale_salesman  # Sales / User
        - stock.group_stock_user  # Inventory / User
        - website.group_website_restricted_editor  # Website / Restricted Editor
      app_roles:
        - retail.operator
        - product.operator
      notes: Sales order management, inventory, product catalog

    - entra_group: sg-ipai-vertical-marketing
      odoo_groups:
        - mass_mailing.group_mass_mailing_user  # Email Marketing / User
      app_roles:
        - marketing.manager
      notes: Campaign management

    - entra_group: sg-ipai-analysts
      odoo_groups:
        - base.group_user  # Internal User (read-only via record rules)
      app_roles:
        - analytics.viewer
        - copilot.advisory
      notes: Base internal user with read-only record rules

  separation_of_duties:
    - prohibited_combination:
        - base.group_system  # Settings
        - account.group_account_manager  # Adviser
      reason: System config and financial operations must be separated in prod
      enforcement: odoo_record_rule + audit_log
      exception: platform_owner_in_bootstrap_phase

  multi_company:
    enabled: true
    company_mapping:
      - vertical: marketing
        company_name: "InsightPulse AI - Marketing"
      - vertical: retail_media
        company_name: "InsightPulse AI - Retail Media"
      - vertical: entertainment
        company_name: "InsightPulse AI - Entertainment"
      - vertical: financial_services
        company_name: "InsightPulse AI - Financial Services"
    isolation: record_rules_on_company_id

# -----------------------------------------------------------------------------
# Azure Databricks
# -----------------------------------------------------------------------------

databricks:
  auth_method: entra_id_sso
  resource: dbw-ipai-dev
  resource_group: rg-ipai-ai-dev

  workspace_permissions:
    - entra_group: sg-ipai-platform-owners
      databricks_role: workspace_admin
      permissions:
        - manage_workspace
        - manage_clusters
        - manage_sql_warehouses
        - manage_jobs
        - manage_unity_catalog
      notes: Full workspace administration

    - entra_group: sg-ipai-data-engineers
      databricks_role: workspace_user
      permissions:
        - create_clusters
        - manage_own_clusters
        - create_notebooks
        - run_jobs
        - use_sql_warehouses
        - manage_dbt_projects
      notes: Build and operate ETL pipelines

    - entra_group: sg-ipai-analysts
      databricks_role: workspace_viewer
      permissions:
        - use_sql_warehouses  # read-only SQL
        - view_dashboards
        - run_sql_queries  # SELECT only via Unity Catalog grants
      notes: Read-only BI consumption

  unity_catalog_grants:
    catalog: ipai_dev

    - schema: bronze
      grants:
        - principal: sg-ipai-data-engineers
          privilege: ALL PRIVILEGES
        - principal: sg-ipai-platform-owners
          privilege: ALL PRIVILEGES
        - principal: sg-ipai-workload-databricks
          privilege: ALL PRIVILEGES

    - schema: silver
      grants:
        - principal: sg-ipai-data-engineers
          privilege: ALL PRIVILEGES
        - principal: sg-ipai-platform-owners
          privilege: ALL PRIVILEGES

    - schema: gold
      grants:
        - principal: sg-ipai-data-engineers
          privilege: ALL PRIVILEGES
        - principal: sg-ipai-platform-owners
          privilege: ALL PRIVILEGES
        - principal: sg-ipai-analysts
          privilege: SELECT
        - principal: sg-ipai-workload-agents
          privilege: SELECT

    - schema: ai
      grants:
        - principal: sg-ipai-data-engineers
          privilege: ALL PRIVILEGES
        - principal: sg-ipai-workload-agents
          privilege: SELECT
        - principal: sg-ipai-platform-owners
          privilege: ALL PRIVILEGES

    vertical_schemas:
      - schema_prefix: "gold.marketing_"
        grants:
          - principal: sg-ipai-vertical-marketing
            privilege: SELECT
      - schema_prefix: "gold.retail_"
        grants:
          - principal: sg-ipai-vertical-retail-media
            privilege: SELECT
      - schema_prefix: "gold.entertainment_"
        grants:
          - principal: sg-ipai-vertical-entertainment
            privilege: SELECT
      - schema_prefix: "gold.finserv_"
        grants:
          - principal: sg-ipai-vertical-finserv
            privilege: SELECT

  prohibited:
    - action: interactive_cluster_in_prod
      reason: Production workloads via Jobs/DLT only
    - action: direct_write_to_odoo_pg
      reason: Databricks must never write to ipai-odoo-dev-pg

# -----------------------------------------------------------------------------
# Microsoft Foundry
# -----------------------------------------------------------------------------

foundry:
  auth_method: entra_id_sso
  resource: data-intel-ph-resource
  resource_group: rg-data-intel-ph
  region: eastus2

  role_assignments:
    - entra_group: sg-ipai-platform-owners
      foundry_role: AI Project Owner
      permissions:
        - manage_projects
        - deploy_models
        - configure_evaluations
        - manage_agents
        - view_traces
      notes: Full Foundry project administration

    - entra_group: sg-ipai-data-engineers
      foundry_role: AI Project Contributor
      permissions:
        - train_models
        - author_prompts
        - run_evaluations
        - view_traces
      notes: Model and evaluation development

    - entra_group: sg-ipai-analysts
      foundry_role: AI Project Reader
      permissions:
        - view_traces
        - view_evaluation_results
        - view_model_metrics
      notes: Read-only observability

    - entra_group: sg-ipai-workload-agents
      foundry_role: Agent Runtime
      permissions:
        - execute_tool_calls
        - access_serving_endpoints
        - write_traces
      notes: Agent execution identity — not admin

  prohibited:
    - action: agent_self_modify_policy
      reason: Agents must not modify their own governance policies
    - action: foundry_admin_for_agents
      reason: Agent identities must not have project admin

# -----------------------------------------------------------------------------
# Azure DevOps
# -----------------------------------------------------------------------------

devops:
  auth_method: entra_id_sso
  organization: insightpulseai

  org_level:
    - entra_group: sg-ipai-platform-owners
      devops_role: Project Collection Administrators
      notes: Org-level administration

  project_level:
    - project: ipai-platform
      assignments:
        - entra_group: sg-ipai-platform-owners
          devops_role: Project Administrators
        - entra_group: sg-ipai-developers
          devops_role: Contributors
        - entra_group: sg-ipai-analysts
          devops_role: Readers

    - project: lakehouse
      assignments:
        - entra_group: sg-ipai-platform-owners
          devops_role: Project Administrators
        - entra_group: sg-ipai-data-engineers
          devops_role: Contributors
        - entra_group: sg-ipai-analysts
          devops_role: Readers

  environment_approvers:
    - environment: insightpulseai-dev
      trigger: automatic
      approvers: []  # auto-deploy on push

    - environment: insightpulseai-staging
      trigger: manual_approval
      approvers:
        - sg-ipai-platform-owners

    - environment: insightpulseai-prod
      trigger: manual_approval
      approvers:
        - sg-ipai-platform-owners

  service_connections:
    - name: sc-azure-dev-platform
      auth: workload_identity_federation
      scope:
        - rg-ipai-dev
        - rg-ipai-shared-dev
      approvers:
        - sg-ipai-platform-owners
      protected_resource: true
      cross_project_sharing: false

    - name: sc-azure-dev-lakehouse
      auth: workload_identity_federation
      scope:
        - rg-ipai-ai-dev
        - rg-ipai-data-dev
      approvers:
        - sg-ipai-platform-owners
      protected_resource: true
      cross_project_sharing: false

  variable_groups:
    - name: vg-ipai-platform-secrets
      key_vault: kv-ipai-dev
      open_to_all_pipelines: false
      authorized_pipelines:
        - ci-cd

    - name: vg-ipai-lakehouse-secrets
      key_vault: kv-ipai-dev
      open_to_all_pipelines: false
      authorized_pipelines:
        - lakehouse-ci-cd

# -----------------------------------------------------------------------------
# GitHub
# -----------------------------------------------------------------------------

github:
  auth_method: entra_id_sso  # via GitHub EMU or SAML SSO
  organization: Insightpulseai

  org_level:
    - entra_group: sg-ipai-platform-owners
      github_role: Owner
      notes: Full org administration

  repo_level:
    - repo: odoo
      assignments:
        - entra_group: sg-ipai-platform-owners
          github_role: Admin
        - entra_group: sg-ipai-developers
          github_role: Write
        - entra_group: sg-ipai-analysts
          github_role: Read

    - repo: data-intelligence
      assignments:
        - entra_group: sg-ipai-platform-owners
          github_role: Admin
        - entra_group: sg-ipai-data-engineers
          github_role: Write

    - repo: agent-platform
      assignments:
        - entra_group: sg-ipai-platform-owners
          github_role: Admin
        - entra_group: sg-ipai-developers
          github_role: Write

  branch_protection:
    - branch: main
      required_reviewers: 1
      required_status_checks:
        - lint
        - typecheck
        - test
        - security-scan
      enforce_admins: false  # allow platform owner to merge in emergency
      allow_force_push: false
      allow_deletion: false

# -----------------------------------------------------------------------------
# Azure API Management (Target State)
# -----------------------------------------------------------------------------

apim:
  auth_method: entra_oauth2
  resource: apim-ipai-dev  # planned
  status: target_state

  role_assignments:
    - entra_group: sg-ipai-platform-owners
      apim_role: Service Administrator
      permissions:
        - manage_apis
        - manage_policies
        - manage_subscriptions
        - manage_products
      notes: Full APIM administration

    - entra_group: sg-ipai-developers
      apim_role: API Developer
      permissions:
        - test_apis
        - view_api_definitions
        - access_dev_portal
      notes: API development and testing

    - entra_group: sg-ipai-workload-agents
      apim_role: API Consumer
      permissions:
        - invoke_apis  # rate-limited
      subscription_scope: agent-runtime
      notes: Agent tool calls via APIM

  vertical_subscriptions:
    - vertical: marketing
      subscription_key_source: key_vault
      allowed_apis:
        - odoo-read-api
        - odoo-marketing-api
      rate_limit: 100/minute

    - vertical: retail_media
      subscription_key_source: key_vault
      allowed_apis:
        - odoo-read-api
        - odoo-sales-api
        - odoo-inventory-api
      rate_limit: 200/minute

    - vertical: entertainment
      subscription_key_source: key_vault
      allowed_apis:
        - odoo-read-api
        - odoo-marketing-api
      rate_limit: 100/minute

    - vertical: financial_services
      subscription_key_source: key_vault
      allowed_apis:
        - odoo-read-api
        - odoo-finance-api
        - odoo-compliance-api
      rate_limit: 100/minute

  prohibited:
    - action: apim_as_system_of_record
      reason: APIM is governed boundary, not data owner
    - action: bypass_apim_for_agent_calls
      reason: All agent-to-Odoo calls must be governed and traced
