    service: do_spaces_cdn
    target: ipai-assets.sgp1.cdn.digitaloceanspaces.com
    description: "Static asset CDN via DigitalOcean Spaces (SGP1)"
    cloudflare_proxied: false
    lifecycle: planned
    status: planned
    backing_status: not_provisioned
    activation_criteria:
      - "Create DO Spaces bucket 'ipai-assets' in SGP1 region"
      - "Enable CDN on the bucket and confirm CDN endpoint FQDN"
      - "Update target if CDN endpoint differs from ipai-assets.sgp1.cdn.digitaloceanspaces.com"
      - "Flip lifecycle → active + provider_claim.status → claimed"
    provider_claim:
      provider: digitalocean
      status: unclaimed
      expires_at: "2026-09-01"

