name: Diva Goals Skills Check
on:
  push:
    paths:
      - 'agents/skills/**'
  pull_request:
    paths:
      - 'agents/skills/**'

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill JSON files have required keys
        run: |
          EXIT_CODE=0
          REQUIRED_KEYS=("id" "name" "version" "domain")
          for f in $(find agents/skills -name '*.skill.json' 2>/dev/null); do
            echo "Checking $f ..."
            for key in "${REQUIRED_KEYS[@]}"; do
              if ! python3 -c "import json,sys; d=json.load(open('$f')); assert '$key' in d, 'missing $key'" 2>/dev/null; then
                echo "  FAIL: $f missing required key: $key"
                EXIT_CODE=1
              fi
            done
            if [ $EXIT_CODE -eq 0 ]; then
              echo "  PASS: all required keys present"
            fi
          done
          if ! find agents/skills -name '*.skill.json' 2>/dev/null | grep -q .; then
            echo "WARN: No .skill.json files found under agents/skills/"
          fi
          exit $EXIT_CODE
