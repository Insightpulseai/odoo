# ssot/agent/feature_ledger.yaml
#
# Capability Ledger — tracks which platform capabilities are shipped vs. planned.
# Each entry starts as `status: failing` and turns green only when ALL required
# gates pass with evidence.
#
# Status values: failing | passing | blocked
# Append-only: do NOT remove entries; set status: blocked with a reason.
# Last updated: 2026-03-03

meta:
  schema_version: "1.0"
  updated_at: "2026-03-03"
  owner: platform

capabilities:

  # ── Sprint 1: Knowledge Copilot (Kapa-like) ──────────────────────────────

  - id: citation_first_knowledge_copilot
    title: "Citation-first knowledge copilot over SSOT + docs"
    priority: P0
    status: failing
    sprint: 1
    ssot_refs:
      - ssot/knowledge/corpus_registry.yaml
      - eval/knowledge_copilot_eval.yaml
    required_gates:
      - gate: corpus_registry_populated
        description: "corpus_registry.yaml has >= 3 corpus sources with file counts > 0"
        evidence: "ssot/knowledge/corpus_registry.yaml"
        passing: true
      - gate: knowledge_eval_threshold
        description: "eval/knowledge_copilot_eval.yaml: >= 80% of cases pass citation_present check"
        evidence: "docs/evidence/knowledge_copilot_eval/"
        passing: false
      - gate: rag_retrieval_wired
        description: "ipai_ai_rag module retrieves from corpus and returns grounded citations"
        evidence: "docs/evidence/knowledge_copilot_eval/retrieval_smoke.log"
        passing: false
    what_must_pass: |
      1. ssot/knowledge/corpus_registry.yaml lists spec/*, ssot/*, docs/* with real file counts
      2. eval/knowledge_copilot_eval.yaml has >= 20 prompt cases
      3. At least 80% of eval cases return a grounded citation (not hallucinated)
      4. ipai_ai_rag retrieval pipeline returns chunks with source paths

  # ── Sprint 2: Governed Tool Use (M365/Joule-like) ────────────────────────

  - id: governed_tool_use_contract
    title: "Preview-approval-commit + audit envelope for copilot tools"
    priority: P0
    status: failing
    sprint: 2
    ssot_refs:
      - ssot/tools/registry.yaml
      - spec/ai-copilot/constitution.md
      - eval/action_eval.yaml
    governed_tools_v1:
      - search_records       # read, no confirmation
      - navigate_to          # navigation, no confirmation
      - create_record        # write, requires confirmation
      - send_chatter_message # write, requires confirmation
      - trigger_workflow     # automation, requires confirmation
    required_gates:
      - gate: tool_spec_contracts_exist
        description: "Each governed tool has a spec in contracts/tools/<tool>.md"
        evidence: "contracts/tools/"
        passing: true
      - gate: action_eval_threshold
        description: "eval/action_eval.yaml: 100% approval compliance for write/automation tools"
        evidence: "docs/evidence/action_eval/"
        passing: false
      - gate: audit_envelope_emitted
        description: "Every tool call emits trace_id + user_id + timestamp + action + result"
        evidence: "docs/evidence/action_eval/audit_envelope_sample.json"
        passing: false
    what_must_pass: |
      1. contracts/tools/ has a .md spec for each of the 5 governed tools
      2. eval/action_eval.yaml has cases covering: preview shown, approval required,
         commit only after approval, audit envelope emitted
      3. 100% of write/automation tool calls go through confirmation dialog
      4. Every tool execution emits a structured audit envelope (trace_id, user, action, result)

  # ── Sprint 3: Cash Advance Monitoring ─────────────────────────────────────

  - id: expense_cash_advance_monitoring
    title: "Cash advance request-to-close lifecycle with monitoring"
    priority: P0
    status: failing
    sprint: 3
    ssot_refs:
      - spec/cash-advance-odoo/prd.md
      - addons/ipai/ipai_finance_cash_advance/
    required_gates:
      - gate: install_smoke
        description: "Module installs on clean Odoo 19 CE without errors"
        evidence: "docs/evidence/cash_advance/install_smoke.log"
        passing: false
      - gate: upgrade_smoke
        description: "Module upgrades from previous version without errors"
        evidence: "docs/evidence/cash_advance/upgrade_smoke.log"
        passing: false
      - gate: unit_tests
        description: ">= 95% of lifecycle scenarios pass (request/approve/release/liquidate/post/close)"
        evidence: "docs/evidence/cash_advance/unit_tests.log"
        passing: false
      - gate: monitoring_dashboard
        description: "Monitoring query returns aging/overdue/liquidation stats"
        evidence: "docs/evidence/cash_advance/monitoring_query.log"
        passing: false
    what_must_pass: |
      1. ipai_finance_cash_advance installs and upgrades cleanly
      2. Full lifecycle (request → approval → release → liquidation → posting → close) tested
      3. >= 95% scenario coverage in unit tests
      4. Monitoring query surfaces: aging buckets, overdue advances, pending liquidations
