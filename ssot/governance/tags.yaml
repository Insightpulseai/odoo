version: 1

tag_taxonomy:
  required:
    org:
      description: Top-level organization identifier
      allowed:
        - Insightpulseai

    system:
      description: Logical system or product boundary
      allowed:
        - odoo
        - web
        - platform
        - infra
        - agents
        - data-intelligence
        - design
        - docs
        - automations
        - agent-platform

    environment:
      description: Deployment environment
      allowed:
        - local
        - dev
        - staging
        - prod
        - shared

    service:
      description: Concrete workload/service type
      allowed:
        - erp
        - postgres
        - frontdoor
        - dns
        - static-site
        - web-app
        - aca-env
        - aca-app
        - keyvault
        - acr
        - storage
        - monitor
        - log-analytics
        - identity
        - private-dns
        - search
        - foundry
        - databricks

    repo:
      description: Owning repo in the GitHub org
      allowed:
        - odoo
        - web
        - infra
        - platform
        - docs
        - agents
        - agent-platform
        - automations
        - data-intelligence
        - design
        - .github
        - landing.io
        - templates

    owner_plane:
      description: Architectural plane that owns the resource purpose
      allowed:
        - runtime
        - edge
        - data
        - agent
        - public-web
        - governance
        - identity
        - observability

    criticality:
      description: Operational criticality
      allowed:
        - tier0
        - tier1
        - tier2
        - tier3

    managed_by:
      description: Lifecycle authority
      allowed:
        - iac
        - bootstrap
        - manual
        - mixed

  recommended:
    route:
      description: Canonical hostname or route served by the resource
    workload:
      description: Human-readable workload slug
    cost_center:
      description: FinOps grouping
    data_classification:
      description: Data sensitivity class
      allowed:
        - public
        - internal
        - confidential
        - restricted
    lifecycle:
      description: Expected lifespan/state
      allowed:
        - active
        - transitional
        - legacy
        - decommissioning
    pipeline_class:
      description: CI/CD workload class
      allowed:
        - ci
        - test
        - deploy
        - release
    agent_execution_mode:
      description: Expected Azure DevOps agent mode
      allowed:
        - microsoft-hosted
        - self-hosted
        - managed-devops-pool
        - vmss

policies:
  inheritance:
    subscription:
      required:
        - org
      recommended:
        - cost_center
    resource_group:
      required:
        - org
        - system
        - environment
        - owner_plane
        - criticality
        - managed_by
      recommended:
        - workload
        - lifecycle
    resource:
      required:
        - org
        - system
        - environment
        - service
        - repo
        - owner_plane
        - criticality
        - managed_by
      recommended:
        - route
        - workload
        - data_classification
        - lifecycle

  rules:
    - name: route_required_for_public_entrypoints
      when:
        service_in:
          - erp
          - frontdoor
          - static-site
          - web-app
      require:
        - route

    - name: tier0_requires_prod_or_shared
      when:
        criticality_equals: tier0
      allow_environment:
        - prod
        - shared

    - name: odoo_runtime_repo_must_be_odoo
      when:
        system_equals: odoo
        service_in:
          - erp
          - aca-app
          - postgres
          - storage
      require_repo_equals: odoo

    - name: edge_resources_default_to_infra
      when:
        service_in:
          - frontdoor
          - dns
          - private-dns
      require_repo_equals: infra

    - name: public_web_resources_default_to_web_or_infra
      when:
        owner_plane_equals: public-web
      allow_repo:
        - web
        - infra
        - landing.io

mappings:
  systems:
    erp.insightpulseai.com:
      system: odoo
      environment: prod
      service: erp
      repo: odoo
      owner_plane: runtime
      criticality: tier0

    erp-staging.insightpulseai.com:
      system: odoo
      environment: staging
      service: erp
      repo: odoo
      owner_plane: runtime
      criticality: tier1

    www.insightpulseai.com:
      system: web
      environment: prod
      service: static-site
      repo: web
      owner_plane: public-web
      criticality: tier1

    prismalab.insightpulseai.com:
      system: web
      environment: prod
      service: static-site
      repo: web
      owner_plane: public-web
      criticality: tier1

    www.w9studio.net:
      system: web
      environment: prod
      service: static-site
      repo: web
      owner_plane: public-web
      criticality: tier1

  known_resources:
    pg-ipai-odoo:
      org: Insightpulseai
      system: odoo
      environment: prod
      service: postgres
      repo: odoo
      owner_plane: data
      criticality: tier0
      managed_by: bootstrap
      route: erp.insightpulseai.com
      workload: pulser-odoo
      lifecycle: active
      data_classification: confidential

    rg-ipai-data-sea:
      org: Insightpulseai
      system: odoo
      environment: prod
      service: postgres
      repo: odoo
      owner_plane: data
      criticality: tier0
      managed_by: bootstrap
      workload: pulser-odoo
      lifecycle: active

validation:
  required_resource_tags:
    - org
    - system
    - environment
    - service
    - repo
    - owner_plane
    - criticality
    - managed_by

  required_route_projection_tags:
    - system
    - environment
    - service
    - repo
    - owner_plane
    - criticality

  policy_constraints:
    odoo_runtime_repo: odoo
    edge_repo: infra
    public_web_repos:
      - web
      - infra
      - landing.io
