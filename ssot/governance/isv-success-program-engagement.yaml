# -----------------------------------------------------------------------------
stacking_conflicts:

  conflict_1_azure_credit_vs_existing_sponsorship:
    affected_benefit: ISV Success Azure Sponsorship Credit
    conflicts_with: existing Microsoft Azure Sponsorship (eba824fb)
    resolution_options:
      - provision_new_payg_subscription_under_mca_and_redeem_credit_there (recommended)
      - defer_isv_credit_until_current_sponsorship_expires
    blocker_for: ISV credit activation

  conflict_2_github_enterprise_vs_existing_enterprise:
    affected_benefit: 20-seat GitHub Enterprise (12 months, Public Preview)
    conflicts_with: existing `ipai` GitHub Enterprise account
    resolution_options:
      - ask_em_to_confirm_ineligibility
      - ask_em_whether_seats_can_add_to_existing_enterprise
