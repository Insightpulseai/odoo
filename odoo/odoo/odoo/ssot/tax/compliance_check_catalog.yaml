# Tax Compliance Check Catalog — SSOT
# Source of truth for all compliance intelligence checks
# Referenced by: Tax Pulse agent, ipai_bir_tax_compliance module, Bridge API
checks:
  - check_id: CI-001
    name: Missing EWT on vendor bills
    domain: tax
    form_code: ["1601-EQ", "BIR-2307"]
    trigger_type: monthly
    query_source: account.move.line
    severity: high
    recommended_action: Apply EWT with correct ATC code to flagged vendor bills
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-002
    name: Output VAT vs SLSP gap
    domain: tax
    form_code: ["2550M", "2550Q"]
    trigger_type: monthly
    query_source: account.tax
    severity: high
    recommended_action: Reconcile output VAT totals with SLSP SLS export
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-003
    name: Input VAT vs SLSP gap
    domain: tax
    form_code: ["2550Q"]
    trigger_type: quarterly
    query_source: account.tax
    severity: medium
    recommended_action: Reconcile input VAT credits with SLSP SLP export
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-004
    name: Compensation WHT remittance check
    domain: payroll
    form_code: ["1601-C"]
    trigger_type: monthly
    query_source: hr.payslip
    severity: high
    recommended_action: Verify payroll WHT total matches 1601-C filing amount
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-005
    name: Ungenerated BIR 2307
    domain: tax
    form_code: ["1601-EQ", "1604-E"]
    trigger_type: quarterly
    query_source: account.move
    severity: high
    recommended_action: Generate BIR 2307 certificates for vendor bills with EWHT
    requires_human_review: false
    capability_class: transactional

  - check_id: CI-006
    name: ATC code missing on WHT lines
    domain: tax
    form_code: ["SAWT", "QAP"]
    trigger_type: continuous
    query_source: account.move.line
    severity: medium
    recommended_action: Add l10n_ph_atc code to WHT journal lines
    requires_human_review: false
    capability_class: transactional

  - check_id: CI-007
    name: Filing deadline countdown
    domain: compliance
    form_code: ["*"]
    trigger_type: daily
    query_source: tax.compliance.period
    severity: critical
    recommended_action: Alert responsible users of approaching deadlines
    requires_human_review: false
    capability_class: informational

  - check_id: CI-008
    name: Overdue compliance tasks
    domain: compliance
    form_code: ["*"]
    trigger_type: daily
    query_source: tax.compliance.task
    severity: critical
    recommended_action: Escalate overdue tasks to manager
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-009
    name: DST missing on applicable documents
    domain: tax
    form_code: ["2000"]
    trigger_type: monthly
    query_source: account.move
    severity: medium
    recommended_action: Apply DST tax line to loan/lease documents
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-010
    name: QAP completeness
    domain: tax
    form_code: ["1604-E"]
    trigger_type: quarterly
    query_source: account.move
    severity: high
    recommended_action: Verify QAP export matches vendor bill EWHT count
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-011
    name: SAWT completeness
    domain: tax
    form_code: ["1701Q", "1702Q"]
    trigger_type: quarterly
    query_source: account.move
    severity: high
    recommended_action: Verify SAWT export matches customer invoice WHT count
    requires_human_review: true
    capability_class: compliance_intelligence

  - check_id: CI-012
    name: Period completion status
    domain: compliance
    form_code: ["*"]
    trigger_type: monthly
    query_source: tax.compliance.period
    severity: medium
    recommended_action: Review and sign off all tasks for the period
    requires_human_review: true
    capability_class: informational
