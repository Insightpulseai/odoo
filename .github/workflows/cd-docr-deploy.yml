# =============================================================================
# GitHub Actions: CD via DigitalOcean Container Registry (DOCR)
# =============================================================================
# Dual-registry pipeline: Build → Push (GHCR + DOCR) → Smoke Test → Deploy → Verify → Release
#
# Triggers:
#   - Push to main branch (same paths as cd-production.yml)
#   - Manual workflow dispatch
#
# Target: erp.insightpulseai.com (DigitalOcean Droplet)
# Registries: ghcr.io/jgtolentino/odoo + registry.digitalocean.com/insightpulseai/odoo
# =============================================================================

name: CD DOCR Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'addons/**'
      - 'docker/**'
      - 'config/**'
      - 'deploy/**'
      - 'scripts/**'
      - '.github/workflows/cd-docr-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and use existing image'
        required: false
        default: false
        type: boolean
      image_tag:
        description: 'Image tag to deploy (if skip_build)'
        required: false
        default: 'latest'
        type: string
      dry_run:
        description: 'Dry run (no actual deployment)'
        required: false
        default: false
        type: boolean

concurrency:
  group: cd-docr-deploy
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: jgtolentino/odoo
  DOCR_REGISTRY: registry.digitalocean.com/insightpulseai
  DOCR_IMAGE: odoo
  DEPLOY_COMPOSE: deploy/docker-compose.prod.yml

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  # ===========================================================================
  # Stage 1: Build & Push to GHCR + DOCR
  # ===========================================================================
  build:
    name: Build & Push (GHCR + DOCR)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_build }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.build-ghcr.outputs.digest }}
      image_tag: ${{ steps.tags.outputs.deploy_tag }}
      short_sha: ${{ steps.tags.outputs.short_sha }}
      timestamp: ${{ steps.tags.outputs.timestamp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: tags
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M')
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOY_TAG="prod-${TIMESTAMP}"

          echo "deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      # --- GHCR Login ---
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- DOCR Login (short-lived credentials) ---
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 1200

      # --- Build and push to GHCR ---
      - name: Build and push to GHCR
        id: build-ghcr
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.unified
          build-args: |
            PROFILE=standard
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.tags.outputs.deploy_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:sha-${{ steps.tags.outputs.short_sha }}
          cache-from: type=gha,scope=standard
          cache-to: type=gha,mode=max,scope=standard

      # --- Tag and push to DOCR ---
      - name: Push to DOCR
        run: |
          GHCR_REF="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.tags.outputs.deploy_tag }}"
          DOCR_BASE="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_IMAGE }}"

          # Tag for DOCR
          docker tag "${GHCR_REF}" "${DOCR_BASE}:${{ steps.tags.outputs.deploy_tag }}"
          docker tag "${GHCR_REF}" "${DOCR_BASE}:latest"
          docker tag "${GHCR_REF}" "${DOCR_BASE}:sha-${{ steps.tags.outputs.short_sha }}"

          # Push all DOCR tags
          docker push "${DOCR_BASE}:${{ steps.tags.outputs.deploy_tag }}"
          docker push "${DOCR_BASE}:latest"
          docker push "${DOCR_BASE}:sha-${{ steps.tags.outputs.short_sha }}"

          echo "Pushed to DOCR: ${DOCR_BASE}:{${{ steps.tags.outputs.deploy_tag }},latest,sha-${{ steps.tags.outputs.short_sha }}}"

      - name: Build summary
        run: |
          echo "## Build Complete (Dual Registry)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR | \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.tags.outputs.deploy_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DOCR | \`${{ env.DOCR_REGISTRY }}/${{ env.DOCR_IMAGE }}:${{ steps.tags.outputs.deploy_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build-ghcr.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ steps.tags.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 2: Smoke Test
  # ===========================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.skip_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Run smoke test
        run: |
          IMAGE="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_IMAGE }}:${{ needs.build.outputs.image_tag }}"
          echo "Testing image: $IMAGE"

          docker pull "$IMAGE"

          docker run --rm \
            -e DB_HOST=localhost \
            "$IMAGE" \
            odoo --version

          echo "Smoke test passed"

      - name: Cleanup
        if: always()
        run: docker system prune -f || true

  # ===========================================================================
  # Stage 3: Deploy to Production via SSH
  # ===========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    if: |
      always() &&
      (needs.build.result == 'success' || inputs.skip_build) &&
      (needs.smoke-test.result == 'success' || inputs.skip_build) &&
      !inputs.dry_run

    environment:
      name: production
      url: https://erp.insightpulseai.com

    outputs:
      deployed_tag: ${{ steps.resolve-tag.outputs.tag }}
      deploy_status: ${{ steps.ssh-deploy.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve-tag
        run: |
          if [ "${{ inputs.skip_build }}" == "true" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${{ needs.build.outputs.image_tag }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Deploying DOCR image tag: $TAG"

      - name: Deploy via SSH
        id: ssh-deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCR_TAG: ${{ steps.resolve-tag.outputs.tag }}
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: DOCR_TAG,DO_TOKEN
          command_timeout: 10m
          script: |
            set -e
            echo "=== DOCR Deploy: starting ==="

            # Navigate to repo
            cd /opt/odoo || cd /workspace/odoo || cd ~/odoo

            # Pull latest code
            echo "Pulling latest code..."
            git fetch origin main
            git checkout main
            git pull origin main --ff-only
            git submodule update --init --recursive

            # Install doctl if missing
            if ! command -v doctl &>/dev/null; then
              echo "Installing doctl..."
              curl -sL https://github.com/digitalocean/doctl/releases/download/v1.104.0/doctl-1.104.0-linux-amd64.tar.gz | tar -xz
              mv doctl /usr/local/bin/
            fi

            # Authenticate doctl and login to DOCR
            echo "Authenticating with DOCR..."
            doctl auth init --access-token "${DO_TOKEN}"
            doctl registry login --expiry-seconds 1200

            # Pull new image from DOCR
            DOCR_IMAGE="registry.digitalocean.com/insightpulseai/odoo:${DOCR_TAG}"
            echo "Pulling image: ${DOCR_IMAGE}"
            docker pull "${DOCR_IMAGE}"
            docker tag "${DOCR_IMAGE}" "registry.digitalocean.com/insightpulseai/odoo:latest"

            # Recreate containers
            echo "Recreating containers..."
            cd deploy
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Wait for Odoo to start
            echo "Waiting for Odoo to initialize..."
            sleep 45

            # Health check (local)
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Local health check passed!"
                echo "=== DOCR Deploy: complete ==="
                exit 0
              fi
              echo "Health check attempt $i/5 failed, retrying in 10s..."
              sleep 10
            done

            echo "Health check failed after 5 attempts"
            docker logs odoo --tail 50 || true
            exit 1

      - name: Set deploy status
        if: success()
        run: echo "status=success" >> $GITHUB_OUTPUT

      - name: Deploy summary
        if: always()
        run: |
          echo "## DOCR Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | erp.insightpulseai.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | DOCR (\`${{ env.DOCR_REGISTRY }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ steps.resolve-tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Method | SSH (appleboy/ssh-action) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 4: Production Verification
  # ===========================================================================
  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'

    steps:
      - name: Wait for stability
        run: sleep 30

      - name: Health check
        id: health
        run: |
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              "https://erp.insightpulseai.com/web/health" || echo "000")

            echo "Attempt $i: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" == "200" ]; then
              echo "status=healthy" >> $GITHUB_OUTPUT
              echo "Production is healthy!"
              exit 0
            fi

            sleep 15
          done

          echo "status=unhealthy" >> $GITHUB_OUTPUT
          echo "::warning::Production health check returned HTTP $HTTP_CODE"

      - name: Login page check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            "https://erp.insightpulseai.com/web/login" || echo "000")

          echo "Login page: HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "303" ]; then
            echo "Login page accessible"
          else
            echo "::warning::Login page returned HTTP $HTTP_CODE"
          fi

      - name: Verification summary
        run: |
          echo "## Production Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| /web/health | ${{ steps.health.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 5: Create Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, deploy, verify]
    if: needs.deploy.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.deploy.outputs.deployed_tag }}"
          if [ -z "$TAG" ]; then
            echo "No tag resolved, skipping release"
            exit 0
          fi

          # Create and push tag
          git tag "$TAG" -m "DOCR production deployment $TAG"

          for i in 1 2 3 4; do
            if git push origin "$TAG"; then
              echo "Tag pushed successfully"
              break
            fi
            WAIT=$((2**i))
            echo "Push failed, retrying in ${WAIT}s..."
            sleep $WAIT
          done

          # Release notes
          DOCR_IMG="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_IMAGE }}:${TAG}"
          GHCR_IMG="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${TAG}"

          cat > /tmp/release-notes.md <<EOF
          Automated DOCR production deployment

          **DOCR Image:** \`${DOCR_IMG}\`
          **GHCR Image:** \`${GHCR_IMG}\`
          **Commit:** ${{ github.sha }}
          **Deployed by:** ${{ github.actor }}
          **Workflow:** [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh release create "$TAG" \
            --title "Production (DOCR): $TAG" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Release summary
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ needs.deploy.outputs.deployed_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.deploy.outputs.deployed_tag }})" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Notify on Failure
  # ===========================================================================
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build, smoke-test, deploy, verify]
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/issue-body.md <<EOF
          ## CD DOCR Pipeline Failure

          **Workflow Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Triggered by:** ${{ github.actor }}
          **Commit:** ${{ github.sha }}
          **Registry:** DOCR (\`${{ env.DOCR_REGISTRY }}\`)

          ### Failed Jobs
          Check the workflow run for details on which stage failed.

          ### Recovery Steps
          1. Check the workflow logs for the failing stage
          2. Verify DOCR credentials (\`DIGITALOCEAN_TOKEN\`) are valid
          3. Verify droplet SSH access (\`DO_DROPLET_HOST\`, \`DO_SSH_PRIVATE_KEY\`)
          4. Fix the issue and re-run the workflow or push a fix to main
          EOF

          gh issue create \
            --repo ${{ github.repository }} \
            --title "CD DOCR Pipeline Failed: Run #${{ github.run_id }}" \
            --body-file /tmp/issue-body.md \
            --label "bug,ci" || echo "Could not create issue"

      - name: Failure summary
        run: |
          echo "## DOCR Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the job logs above for details." >> $GITHUB_STEP_SUMMARY
