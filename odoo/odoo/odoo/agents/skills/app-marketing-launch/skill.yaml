# App Marketing & Launch Skill
# Application launch strategy, ASO, and growth planning

name: app_marketing_launch
version: 1.0.0
key: app.marketing.launch
description: |
  Plan and execute app launches: store optimization, landing pages,
  analytics setup, launch checklists, and growth strategies.

intents:
  - launch app
  - app marketing strategy
  - app store optimization
  - create landing page
  - app launch checklist

guardrails:
  - Analytics must be privacy-compliant (no PII tracking)
  - Self-hosted analytics preferred (Superset, Plausible)
  - No paid ad spend without explicit budget approval
  - Landing pages must be accessible (WCAG 2.1 AA)

tools:
  - key: launch.strategy
    name: Launch Strategy
    target_model: ipai.launch.runner
    target_method: create_strategy
    description: Define launch timeline, channels, and KPIs

  - key: launch.landing
    name: Build Landing Page
    target_model: ipai.launch.runner
    target_method: build_landing
    description: Create conversion-optimized landing page

  - key: launch.analytics
    name: Setup Analytics
    target_model: ipai.launch.runner
    target_method: setup_analytics
    description: Configure analytics tracking and dashboards

  - key: launch.execute
    name: Execute Launch
    target_model: ipai.launch.runner
    target_method: execute_launch
    description: Run launch checklist and go-to-market activities

workflow:
  - launch.strategy
  - launch.landing
  - launch.analytics
  - launch.execute

input_schema:
  type: object
  required:
    - app_name
    - launch_type
  properties:
    app_name: { type: string }
    launch_type:
      type: string
      enum: [web_app, mobile_app, saas, marketplace_listing]
    target_audience: { type: string }
    channels:
      type: array
      items: { type: string, enum: [web, app_store, play_store, product_hunt, social, email] }

output_schema:
  type: object
  properties:
    launch_plan: { type: object }
    landing_page_url: { type: string }
    analytics_config: { type: object }
    launch_checklist: { type: array, items: { type: string } }

agentInstructions: |
  When launching apps:

  1. **Strategy**: Define target audience, channels, KPIs, timeline
  2. **Landing Page**: Build with Next.js, deploy to Vercel
  3. **Analytics**: Self-hosted (Superset) + Vercel Analytics
  4. **Launch**: Execute checklist, monitor metrics, iterate
