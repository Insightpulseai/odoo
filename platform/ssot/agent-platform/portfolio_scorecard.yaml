  - id: architecture-judge
    maturity: L1
    stage: S03
    domain: governance
    pass_threshold: 75
    health: green
    activation_status: ready
    notes: Review lens is well-defined. Needs first real evaluation run.

  - id: security-judge
    maturity: L1
    stage: S03
    domain: governance
    pass_threshold: 90
    health: green
    activation_status: ready
    notes: Highest threshold. Should be first judge activated — security is non-negotiable.

  - id: governance-judge
    maturity: L0
    stage: S02
    domain: governance
    pass_threshold: 70
    health: yellow
    activation_status: needs_rubric
    notes: Needs formalized rubric before activation. Reviews factory's own compliance.

  - id: finops-judge
    maturity: L0
    stage: S02
    domain: governance
    pass_threshold: 65
    health: yellow
    activation_status: needs_rubric
    notes: Cost baselines not yet established. Needs benchmark data before scoring.

  - id: customer-value-judge
    maturity: L0
    stage: S01
    domain: governance
    pass_threshold: 60
    health: yellow
    activation_status: needs_rubric
    notes: Most subjective judge. Needs explicit value criteria per domain.

  - id: platform-fit-judge
    maturity: L0
    stage: S01
    domain: governance
    pass_threshold: 70
    health: yellow
    activation_status: needs_rubric
    notes: Can leverage existing CLAUDE.md rules and naming conventions as rubric source.

# -----------------------------------------------------------------------------
# Promotion Priority Queue
# -----------------------------------------------------------------------------
promotion_priority:
  - agent: odoo-runtime
    from: L3
    to: L4
    priority: P1
    reason: Highest maturity, closest to autonomous production
    gate: 30-day supervised production log + cost projection

  - agent: chief-architect
    from: L2
    to: L3
    priority: P1
    reason: Orchestrator must lead maturity curve
    gate: canary deployment + human-approval workflow

  - agent: release-ops
    from: L2
    to: L3
    priority: P1
    reason: CI/CD is production-grade, needs runtime evidence
    gate: canary metrics + rollback procedure test

  - agent: foundry-agent
    from: L1
    to: L2
    priority: P0-blocked
    reason: Critical path but blocked on Foundry provisioning
    gate: Foundry project provisioned + integration tests

  - agent: azure-platform
    from: L1
    to: L2
    priority: P2
    reason: Infra exists but agent execution untested
    gate: Integration tests against live Azure

  - agent: data-intelligence
    from: L1
    to: L2
    priority: P2
    reason: Pipelines scaffolded but no standalone repo — split required before promotion
    gate: Repo created + assets migrated + DLT test + credential verification

# -----------------------------------------------------------------------------
# Key Risks
# -----------------------------------------------------------------------------
risks:
  - id: RISK-01
    description: Foundry project not provisioned — blocks foundry-agent and all hosted agent capabilities
    severity: high
    mitigation: Provision Azure AI Foundry project in rg-ipai-ai-dev
    owner: platform-team

  - id: RISK-02
    description: No judge agents have run a real evaluation yet — thresholds are untested
    severity: medium
    mitigation: Run security-judge and architecture-judge against odoo-runtime as first eval
    owner: platform-team

  - id: RISK-03
    description: Task bus is design-only — no runtime messages flowing
    severity: medium
    mitigation: Implement Phase 1 (AF-010 to AF-019) of agent-factory tasks
    owner: platform-team

  - id: RISK-04
    description: Passport schema is not yet CI-enforced — passports could drift
    severity: low
    mitigation: Add passport schema validation to agent-factory-ssot-check workflow
    owner: platform-team
