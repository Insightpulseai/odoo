# =============================================================================
# Unified Strategy — InsightPulse AI Platform 2026
# =============================================================================
#
# Canonical consolidated strategy file. This is the single entry point for
# understanding the platform strategy, objective sequencing, and OKR linkage.
#
# Sources consolidated:
#   - platform-strategy-2026.yaml  (time-bound SMART objectives: OBJ-001..007)
#   - enterprise_okrs.yaml         (thematic OKRs: obj_A..E, rollups: O1..O3)
#
# Policy:
#   - Azure Boards is the portfolio system of record
#   - Plane is an optional mirror (SoW, not SoR)
#   - Viva Goals is retired (Microsoft EOL: 2025-12-31) — do not wire
#   - GitHub/spec/SSOT remain engineering truth
#
# CI validator: scripts/ci/validate_platform_strategy.py (planned)
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-17"

meta:
  id: unified_strategy_2026
  version: 1
  status: active
  source_of_truth:
    primary: ssot/governance/platform-strategy-2026.yaml
    secondary: ssot/governance/enterprise_okrs.yaml
    roadmap: ssot/roadmap/roadmap_crosswalk.yaml
  policy:
    viva_goals_target_state: false
    azure_boards_target_state: true
    plane_mirror_allowed: true

vision: >
  Build a self-hosted, governed, repo-first enterprise platform where Odoo is
  the ERP system of record, Azure AI Foundry is the agent control plane, Azure
  Databricks is the intelligence backbone, and all execution is validated through
  machine-readable SSOT, CI gates, and evidence-backed operations.

platform_doctrine:
  erp_system_of_record: odoo
  agent_control_plane: azure_ai_foundry
  data_intelligence_backbone: azure_databricks
  secrets_control_plane: azure_key_vault
  source_control: github
  infrastructure_mode: infrastructure_as_code
  governance_model: ssot_plus_ci_plus_evidence

# =============================================================================
# Canonical Objectives (time-bound, sequenced)
# Source: platform-strategy-2026.yaml OBJ-001..007
# =============================================================================
canonical_objectives:

  - id: OBJ-001
    name: Identity baseline
    target_date: 2026-04-14
    status: not_started
    primary_kra: Governance
    desired_outcome:
      - Entra ID domain verified
      - Emergency access accounts created
      - Named accounts enforced for all platform admins
      - MFA baseline at 100%
    maps_to_thematic_okrs: [obj_B, obj_E]
    maps_to_rollup: O1

  - id: OBJ-002
    name: Azure DevOps operationalization
    target_date: 2026-04-21
    status: not_started
    primary_kra: Delivery
    desired_outcome:
      - 100% of Azure deployments through YAML pipelines
      - 3 self-hosted agent pools active
      - 3 ARM WIF service connections active
    maps_to_thematic_okrs: [obj_A, obj_D]
    maps_to_rollup: O1

  - id: OBJ-003
    name: Foundry runtime hardening
    target_date: 2026-04-28
    status: not_started
    primary_kra: AI
    desired_outcome:
      - Production-readiness checklist 100% complete
      - Runtime contract documented in repo
      - Application Insights instrumented
      - Advisory vs operator mode clearly separated
    maps_to_thematic_okrs: [obj_B]
    maps_to_rollup: O3

  - id: OBJ-004
    name: Public advisory assistant
    target_date: 2026-05-05
    status: not_started
    primary_kra: AI_ERP
    desired_outcome:
      - Marketing-site copilot shell live
      - Backend adapter path implemented
      - Zero browser-side privileged secrets
      - Advisory-only policy enforced
    maps_to_thematic_okrs: [obj_A]
    maps_to_rollup: O3

  - id: OBJ-005
    name: Automation consolidation
    target_date: 2026-05-19
    status: not_started
    primary_kra: Delivery
    desired_outcome:
      - 100% of active n8n workflows inventoried
      - 100% of active cron/webhook jobs classified
      - Duplicate automation assets reduced by at least 70%
      - Single automations repo established
    maps_to_thematic_okrs: [obj_A, obj_C]
    maps_to_rollup: O1

  - id: OBJ-006
    name: OLTP/OLAP separation
    target_date: 2026-05-19
    status: not_started
    primary_kra: Data
    desired_outcome:
      - CDC architecture documented and approved
      - Bronze/silver/gold model contract defined
      - Tableau Cloud publication contract defined
    maps_to_thematic_okrs: [obj_C]
    maps_to_rollup: O3

  - id: OBJ-007
    name: Observability and security baseline
    target_date: 2026-04-21
    status: not_started
    primary_kra: Governance
    desired_outcome:
      - Application Insights enabled for all production workloads
      - Log Analytics workspace active
      - Azure Monitor alerts configured
      - Defender for Cloud enabled
    maps_to_thematic_okrs: [obj_B, obj_E]
    maps_to_rollup: O1

# =============================================================================
# Thematic OKRs (steady-state performance lenses)
# Source: enterprise_okrs.yaml obj_A..E
# =============================================================================
thematic_okrs:

  - id: obj_A
    name: Delivery Speed
    role: supporting
    key_results:
      - "Deployment frequency >= 2/week"
      - "Approval turnaround P50 < 24h"
      - "CI green rate >= 95%"

  - id: obj_B
    name: Safety and Reliability
    role: supporting
    key_results:
      - "Sync lag < 15 min"
      - "Identity resolution >= 99%"
      - "n8n workflow success rate >= 95%"

  - id: obj_C
    name: Infrastructure Efficiency
    role: supporting
    key_results:
      - "Automation coverage >= 80%"
      - "OCR accuracy >= 95%"
      - "Invoice throughput >= 50/day"

  - id: obj_D
    name: Cost and Governance
    role: supporting
    key_results:
      - "Monthly close cycle < 10 business days"
      - "Expense processing P50 < 48h"
      - "Approval backlog < 20 items"

  - id: obj_E
    name: Security and Compliance
    role: supporting
    key_results:
      - "BIR filing on-time rate = 100%"
      - "Tax reconciliation variance < 0.1%"
      - "Agent tool success rate >= 90%"

# =============================================================================
# Rollup OKRs (canonical engineering pillars)
# Source: enterprise_okrs.yaml O1..O3
# =============================================================================
rollup_okrs:

  - id: O1
    name: Governed Engineering Control Plane
    parent_objectives: [obj_A, obj_B]
    canonical_objectives: [OBJ-001, OBJ-002, OBJ-005, OBJ-007]

  - id: O2
    name: Odoo as Governed Runtime
    parent_objectives: [obj_D, obj_E]
    canonical_objectives: []  # implicit via EE parity initiative

  - id: O3
    name: Azure-Native AI/Data Maturity
    parent_objectives: [obj_C, obj_E]
    canonical_objectives: [OBJ-003, OBJ-004, OBJ-006]

# =============================================================================
# Programs (quarterly delivery waves)
# =============================================================================
programs:

  - id: Q1
    name: Foundation
    quarter: Q1-2026
    objective_refs: [OBJ-001, OBJ-002, OBJ-007]

  - id: Q2
    name: Runtime
    quarter: Q2-2026
    objective_refs: [OBJ-003, OBJ-004]

  - id: Q3
    name: Operational Consolidation
    quarter: Q3-2026
    objective_refs: [OBJ-005]

  - id: Q4
    name: Data Maturity
    quarter: Q4-2026
    objective_refs: [OBJ-006]

# =============================================================================
# Delivery Systems
# =============================================================================
delivery_systems:
  engineering_sor: github_and_repo_ssot
  portfolio_sor: azure_boards
  agent_access_layer: azure_devops_mcp  # live AI access to Boards, PRs, builds, tests
  mirror_portfolio: plane
  retired_or_disallowed:
    - viva_goals
    - notion
    - trello
