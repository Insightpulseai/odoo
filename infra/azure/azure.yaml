# Azure Developer CLI (azd) service mapping for InsightPulseAI platform.
#
# This file maps application services to Azure resources for azd-compatible
# provisioning and deployment workflows.
#
# IMPORTANT: This file is an azd manifest, NOT the canonical resource inventory.
# The SSOT for Azure resources is: ssot/azure/resources.yaml
# This file defers to that SSOT for resource names, states, and existence.
#
# Usage:
#   azd init    (already initialized — this file exists)
#   azd up      (provision + deploy)
#   azd deploy  (deploy only, resources must exist)
#
# Spec: spec/azure-target-state/
# SSOT: ssot/azure/resources.yaml
# Constitution: spec/azure-target-state/constitution.md

name: insightpulseai-platform
metadata:
  template: insightpulseai/odoo@latest
  owner: platform-engineering
  purpose: azd service-to-resource mapping for InsightPulseAI Azure workloads
  status: bootstrap-partial
  prerequisite_phase: 0
  ssot_spec: spec/azure-target-state/plan.md
  notes: >
    This manifest is not canonical inventory. Resource existence and state
    are tracked in ssot/azure/resources.yaml. Services listed here are
    gated by Phase 0 landing zone completion (RGs, Key Vault, Log Analytics).

services:
  # ── Odoo ERP (Container App) ─────────────────────────────────────────────
  odoo:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./docker/Dockerfile
      context: .
    config:
      port: 8069
      targetPort: 8069
    metadata:
      phase: 1
      depends_on:
        - rg-ipai-agents-dev
        - cae-ipai-dev
        - cripaidev

  # ── REMOVED: mcp-plane, mcp-coordinator, supabase ────────────────────────
  # Removed 2026-04-17: mcp-plane and mcp-coordinator are not separate ACA services.
  # MCP servers are configured in .mcp.json, not deployed as standalone containers.
  # Supabase is fully deprecated (2026-03-26). All services Azure-native.

# ── Infrastructure ─────────────────────────────────────────────────────────
infra:
  provider: bicep
  path: ./infra/azure
  module: ./infra/azure/platform/main.bicep

# ── CI/CD Pipeline ─────────────────────────────────────────────────────────
pipeline:
  provider: azdo
  # Azure Pipelines is the sole CI/CD authority per CLAUDE.md.
