version: 1
type: ops_skill
family: azure_copilot_ops
skill:
  name: azure-troubleshooting-ops
  status: draft
  owner: agents
  purpose: >
    Diagnose runtime issues — container restart loops, DNS resolution
    failures, Key Vault access denied errors, TLS certificate issues,
    and network security rule conflicts.

  triggers:
    - incident reported (service down or degraded)
    - health check failure detected
    - deployment failure in CI/CD pipeline
    - alert rule triggered (5xx spike, restart loop, latency)

  inputs:
    - affected service name and resource type
    - error symptoms (HTTP status, log messages, alert details)
    - recent deployment history
    - container logs (last 100 lines)

  steps:
    - check container logs for crash loops, OOM kills, or startup failures
    - verify DNS resolution for service FQDN and custom domain
    - validate Key Vault RBAC — confirm managed identity has read access
    - inspect TLS certificate chain — check expiry, binding, and intermediate certs
    - review network security rules (NSG, ACA ingress) for blocked traffic
    - check recent deployment revision for configuration drift
    - verify dependent services are healthy (PostgreSQL, Redis, Key Vault)
    - correlate Application Insights exceptions with timeline
    - if root cause unclear after 3 checks, escalate with structured evidence
    - produce diagnostic report

  outputs:
    - validation_result
    - root_cause
    - diagnostic_timeline
    - affected_services
    - remediation_steps
    - escalation_needed
    - evidence

  guardrails:
    - never expose secrets in diagnostic output (mask Key Vault values)
    - require structured evidence for every finding
    - escalate if root cause not identified after 3 diagnostic checks
    - never restart services without confirming root cause
    - never modify network rules as a diagnostic step

  evidence:
    required: true
    format: "docs/evidence/{stamp}/azure-ops/troubleshooting/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - docs/contracts/azure-resource-graph-contract.md
  - ssot/runtime/resource-graph-query-catalog.yaml
  - docs/architecture/reference-benchmarks.md
  - .claude/rules/infrastructure.md
