version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-view-customization
  status: active
  owner: agents
  build_order: 3
  lane: ui_customization
  purpose: >
    Safely extend Odoo UI through inherited views, actions, and menus.
    Uses xpath expressions to modify existing views without replacing them,
    following XML ID conventions and Odoo 18 view inheritance patterns.

  triggers:
    - new fields need to appear in existing views
    - UI layout change required on existing form/list/kanban
    - new menu item or action needed
    - PR adds or modifies views/ XML files

  inputs:
    - target_view (XML ID of the view to extend)
    - modifications (list of xpath operations)
    - new_actions (optional)
    - new_menus (optional)

  steps:
    - identify target view by XML ID
    - create inherited view XML in ipai_* module
    - write xpath expressions for field placement (inside, after, before, replace, attributes)
    - follow XML ID naming conventions for new views, actions, and menus
    - wire actions to menus with correct parent references
    - ensure inherited view has correct inherit_id reference
    - validate XML syntax
    - test view rendering on disposable DB

  outputs:
    - view_file_path
    - xpath_operations_summary
    - actions_created
    - menus_created
    - evidence

  guardrails:
    - prefer inherited views over view replacement
    - never directly patch core view XML files
    - follow XML ID conventions (<model>_view_form, <model>_view_tree, etc.)
    - use Odoo 18 terminology (list view, not tree view in user-facing strings)
    - xpath position must be explicit (inside, after, before, replace, attributes)
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-view-customization/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo18-coding.md
