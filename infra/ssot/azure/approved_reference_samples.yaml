---
# Approved Microsoft Reference Samples — SSOT Registry
# Authority: docs/architecture/SAMPLE_ADOPTION_POLICY.md
# Companion: agent-platform/ssot/learning/azure_sample_azd_skill_map.yaml (global rules)
#
# Rule: Microsoft samples are implementation accelerators, not architecture authority.
# Every entry must map to: owning repo, target runtime, control plane, secrets model.
# Samples not listed here are optional reference material only.

id: approved_reference_samples
version: 3
updated: "2026-03-28"
status: active

adoption_policy:
  principle: >
    The Microsoft sample catalog is a harvest list, not architecture authority.
    Canonical architecture decisions (Databricks, Power BI, Fabric, n8n, Entra+KV+RBAC)
    are settled and must not be re-opened by sample adoption.
  rules:
    - Microsoft samples are implementation accelerators
    - They do not override canonical platform decisions
    - Every adopted sample must be mapped to owning repo, target runtime, target control plane, secrets model, and adaptation path
    - Demo patterns (HTTP triggers, timer triggers, order processing, RAG quickstarts, generic full-stack templates) are scaffolding only
    - No sample adoption without entry in this registry

approved_samples:

  - id: github-oidc-terraform
    name: "GitHub Actions OIDC for Azure/Terraform"
    url: "https://learn.microsoft.com/en-us/samples/azure-samples/github-terraform-oidc-ci-cd/github-terraform-oidc-ci-cd/"
    use_for: "Secretless CI auth into Azure — GitHub-Azure workload identity federation with separated plan/apply identities"
    owning_repo:
      - infra
      - .github
    target_runtime: github_actions
    target_control_plane: entra_workload_identity
    secrets_model: "No static secrets — OIDC federation only"
    adaptation_notes: >
      Bootstrap pattern for all Terraform CI/CD pipelines.
      Separate plan identity (read-only) from apply identity (write).
      Must align with infra repo IaC ownership and identity-isolation alignment rule.
    status: approved
    priority: adopt_now

  - id: remote-mcp-azure-functions
    name: "Remote MCP with Azure Functions"
    url: "https://learn.microsoft.com/en-us/samples/azure-samples/remote-mcp-functions-typescript/remote-mcp-functions-typescript/"
    use_for: "Microsoft-native remote MCP surface — secure Functions hosting with Entra/APIM/VNet isolation"
    owning_repo:
      - agent-platform
      - platform
    target_runtime: azure_functions_flex_consumption
    target_control_plane: entra_apim_vnet
    secrets_model: "Managed identity + Key Vault — no static API keys"
    adaptation_notes: >
      Reference for remote MCP hosting. Runtime/platform concern, NOT agents repo.
      Reinforces agents vs agent-platform boundary: agents = metadata/skills, agent-platform = runtime/execution.
      Must integrate with existing MCP coordination surface (ipai-mcp-dev).
    status: approved
    priority: adopt_now

  - id: databricks-vnet-private-endpoint
    name: "Azure Databricks VNet/Private Endpoint Templates"
    url: "https://learn.microsoft.com/en-us/samples/azure/azure-quickstart-templates/databricks-all-in-one-template-for-vnet-injection-privateendpoint-with-nat-gateway/"
    use_for: "Hardened Databricks workspace topology — VNet injection, private endpoints, egress controls"
    owning_repo:
      - infra
    target_runtime: azure_databricks
    target_control_plane: vnet_private_endpoint_nat
    secrets_model: "Managed identity — no workspace-level static tokens"
    adaptation_notes: >
      Baseline for hardened Databricks infra in rg-ipai-ai-dev.
      Must align with existing dbw-ipai-dev workspace.
      Private networking normalization is prerequisite for production readiness.
    status: approved
    priority: adopt_now

  - id: ai-model-starter-kit
    name: "AI Model Starter Kit"
    url: "https://learn.microsoft.com/it-it/samples/azure-samples/ai-model-start/ai-model-start/"
    use_for: "Keyless Foundry/runtime adapter pattern — Entra ID auth across multiple Foundry models via GA Responses API"
    owning_repo:
      - agent-platform
      - platform
    target_runtime: azure_foundry_responses_api
    target_control_plane: entra_keyless
    secrets_model: "Entra ID keyless authentication — no API keys, no long-lived app secrets"
    adaptation_notes: >
      Enterprise-friendly starter for Foundry model access. Aligns with Entra + Key Vault + no long-lived secrets doctrine.
      Use as runtime adapter pattern in agent-platform, reference pattern for keyless model access in platform.
      Applies to Copilot/M365/web/Odoo-facing assistant backends.
      Supersedes the generic azure-openai-keyless-auth entry for Foundry-specific model access.
    status: approved
    priority: adopt_now

  - id: chatgpt-enterprise-data
    name: "ChatGPT + Enterprise Data"
    url: "https://learn.microsoft.com/en-us/samples/azure-samples/azure-search-openai-javascript/azure-search-openai-javascript/"
    use_for: "Enterprise assistant / RAG pattern — Azure OpenAI + Azure AI Search with citations, document indexing, prompt orchestration"
    owning_repo:
      - agent-platform
      - web
    target_runtime: azure_openai_ai_search
    target_control_plane: entra_rbac
    secrets_model: "Managed identity — keyless access to AOAI and AI Search"
    adaptation_notes: >
      Production-style enterprise Q&A/RAG pattern. Shows app/frontend separation, citation grounding,
      document indexing, and prompt orchestration. Use for finance/policy/support assistants backed by
      Azure AI Search (srch-ipai-dev). Channel surfaces: web, Microsoft 365 Copilot, Odoo copilot.
      Does not replace Foundry as canonical agent runtime — use as RAG application pattern only.
    status: approved
    priority: adopt_now

  - id: purview-custom-connector
    name: "Purview Custom Connector Solution Accelerator"
    url: "https://learn.microsoft.com/en-us/samples/microsoft/purview-custom-connector-solution-accelerator/purview-custom-connector-solution-accelerator/"
    use_for: "Optional governance-extension pattern — custom metadata/lineage ingestion into Purview from non-native sources"
    owning_repo:
      - data-intelligence
    target_runtime: purview_atlas_api
    target_control_plane: synapse_notebooks_adls
    secrets_model: "Managed identity for Purview/Synapse/ADLS access"
    adaptation_notes: >
      NOT baseline platform doctrine. Adopt only if Purview beyond Unity Catalog is needed.
      Unity Catalog remains mandatory Databricks-side governance authority.
      Purview becomes optional/adjacent for cross-platform cataloging and lineage beyond Databricks-native assets.
      The Synapse notebook component is an accelerator, not a reason to make Synapse a canonical data-engineering plane.
    status: approved
    priority: adopt_selectively
    governance_note: >
      Unity Catalog = mandatory Databricks governance. Purview = optional cross-platform governance extension.
      This sample does NOT change that hierarchy.

  - id: azure-openai-keyless-auth
    name: "Azure OpenAI Keyless Auth Starter"
    url: "https://learn.microsoft.com/en-us/samples/azure-samples/github-terraform-oidc-ci-cd/github-terraform-oidc-ci-cd/"
    use_for: "Entra-backed AOAI access pattern — eliminates static API keys for Azure OpenAI"
    owning_repo:
      - platform
      - agent-platform
    target_runtime: azure_openai
    target_control_plane: entra_rbac
    secrets_model: "Entra token-based auth — no OPENAI_API_KEY in env vars"
    adaptation_notes: >
      Runtime integration pattern only, not full app architecture.
      Enforces doctrine: Entra-backed auth instead of static keys for all AI services.
      Applies to oai-ipai-dev and any Foundry model endpoints.
      For Foundry-specific multi-model access, prefer ai-model-starter-kit instead.
    status: approved
    priority: adopt_selectively

  # --- Entra Identity Platform Samples (2026-03-28) ---

  - id: entra-react-spa-sign-in
    name: "React SPA Sign-in with MSAL React"
    url: "https://github.com/Azure-Samples/ms-identity-docs-code-javascript/tree/main/react-spa"
    use_for: "SPA authentication — sign in users to React apps with Entra ID using auth code + PKCE"
    owning_repo:
      - web
    target_runtime: react_spa
    target_control_plane: entra_msal_react
    secrets_model: "No backend secrets — public client with PKCE, tokens in browser memory only"
    adaptation_notes: >
      Reference for web/ipai-landing Entra sign-in. Use MSAL React with auth code + PKCE flow.
      Pulser widget auth should go through the Node.js BFF proxy instead (see entra-node-express-bff).
      This sample covers the pure SPA path for lightweight pages that don't need backend token handling.
    status: approved
    priority: adopt_now

  - id: entra-node-express-bff
    name: "Node.js Express Web App with MSAL Node (BFF Proxy)"
    url: "https://github.com/Azure-Samples/ms-identity-node"
    use_for: "Server-side auth with BFF proxy — keeps tokens server-side, proxies Graph/API calls for the SPA"
    owning_repo:
      - web
      - platform
    target_runtime: node_express
    target_control_plane: entra_msal_node
    secrets_model: "Confidential client — app secret or certificate in Key Vault, tokens never exposed to browser"
    adaptation_notes: >
      Best fit for Pulser/landing page auth. BFF proxy pattern keeps tokens server-side.
      Aligns with ipai-copilot-gateway architecture. The Express server handles auth code flow,
      stores tokens in server session, and proxies downstream API calls (Graph, Copilot GW, MCP).
      Prefer this over pure SPA token handling for any surface that calls protected APIs.
    status: approved
    priority: adopt_now

  - id: entra-python-daemon
    name: "Python Daemon — Client Credentials with Secret"
    url: "https://github.com/Azure-Samples/ms-identity-python-daemon/tree/master/1-Call-MsGraph-WithSecret"
    use_for: "Service-to-service auth — Python backends acquiring tokens via client credentials grant"
    owning_repo:
      - odoo
      - platform
    target_runtime: python_daemon
    target_control_plane: entra_client_credentials
    secrets_model: "App registration client secret or certificate — stored in Key Vault, resolved via managed identity"
    adaptation_notes: >
      Reference for Odoo backend service auth. Use client credentials flow for daemon/cron/worker processes
      that call Graph API or downstream services without a user context.
      Applies to: ipai-odoo-dev-worker, ipai-odoo-dev-cron, n8n automation backends.
      Prefer certificate over secret for production. Secret acceptable for dev.
    status: approved
    priority: adopt_now

  - id: entra-node-web-api-protect
    name: "Node.js Web API Protection with MSAL Node"
    url: "https://github.com/Azure-Samples/ms-identity-javascript-tutorial/tree/main/3-Authorization-II/1-call-api"
    use_for: "API protection — validate bearer tokens on Node.js APIs using Entra ID"
    owning_repo:
      - platform
      - agent-platform
    target_runtime: node_express_api
    target_control_plane: entra_bearer_validation
    secrets_model: "API does not hold secrets for token acquisition — validates incoming bearer tokens against Entra ID metadata"
    adaptation_notes: >
      Reference for protecting ipai-copilot-gateway, ipai-mcp-dev, and any Node.js API endpoints.
      Validates Entra-issued bearer tokens. Use audience/scope checks to enforce least-privilege.
      Combine with entra-node-express-bff for full BFF + protected API pattern.
    status: approved
    priority: adopt_now

  - id: entra-ios-msal-swift
    name: "iOS Sign-in with MSAL for iOS (Swift/ObjC)"
    url: "https://github.com/Azure-Samples/ms-identity-mobile-apple-swift-objc"
    use_for: "Native iOS authentication — sign in users on iOS with Entra ID using auth code + PKCE"
    owning_repo:
      - web
    target_runtime: ios_native
    target_control_plane: entra_msal_ios
    secrets_model: "Public client — PKCE flow, system browser/ASWebAuthenticationSession, no embedded secrets"
    adaptation_notes: >
      Reference for web/mobile/OdooWrapper.xcodeproj Entra sign-in.
      Use ASWebAuthenticationSession (AuthenticationServices) per iOS wrapper skill pack.
      The wrapper authenticates natively, then passes the Entra token to the hosted Odoo webview
      for session handoff. Aligns with ios-native-wrapper.md and ios-wrapper-code-contract.md.
    status: approved
    priority: adopt_now

  - id: entra-python-azure-functions-api
    name: "Python Azure Function Web API Secured by Entra ID"
    url: "https://github.com/Azure-Samples/ms-identity-python-webapi-azurefunctions"
    use_for: "Serverless API auth — protect Python Azure Functions with Entra ID bearer validation"
    owning_repo:
      - platform
      - agent-platform
    target_runtime: azure_functions_python
    target_control_plane: entra_bearer_validation
    secrets_model: "Managed identity for outbound calls — Entra bearer validation for inbound"
    adaptation_notes: >
      Reference for Python-based serverless APIs (OCR, Document Intelligence wrappers, agent skill endpoints).
      Applies to ipai-ocr-dev and any Python Functions adjuncts.
      Combine with managed identity for outbound calls to Azure AI services.
    status: approved
    priority: adopt_selectively

  # --- End Entra Identity Platform Samples ---

  - id: azure-functions-flex-secure-default
    name: "Azure Functions Flex Consumption Secure-by-Default"
    url: "https://learn.microsoft.com/en-us/samples/azure-samples/remote-mcp-functions-typescript/remote-mcp-functions-typescript/"
    use_for: "Control-plane hooks, webhook processors, remote MCP adjuncts — managed identity + VNet default"
    owning_repo:
      - platform
      - agent-platform
    target_runtime: azure_functions_flex_consumption
    target_control_plane: managed_identity_vnet
    secrets_model: "Managed identity + VNet integration — no static keys"
    adaptation_notes: >
      Useful for small control-plane hooks, not for primary workloads.
      Must not be used to re-open Functions-first architecture decisions.
      Lean into managed identity + VNet as default deployment posture.
    status: approved
    priority: adopt_selectively

# Explicitly excluded patterns (valid samples but not architecture authority)
excluded_patterns:
  - category: "Generic full-stack app templates"
    reason: "Scaffolding only — canonical architecture is settled"
  - category: "ADF/Logic Apps pipeline samples"
    reason: "n8n is canonical orchestration plane; Databricks is canonical transformation"
  - category: "RAG quickstarts (generic)"
    reason: "Use chatgpt-enterprise-data as canonical RAG pattern; generic quickstarts are reference only"
  - category: "HTTP/timer trigger demos"
    reason: "Scaffolding pattern only — no architecture authority"
  - category: "Order processing demos"
    reason: "Odoo is canonical transactional system — demo patterns do not apply"
  - category: "Enterprise VM/database templates (DataStax, Couchbase, Qlik, SQL Enterprise VM)"
    reason: "Azure managed services are canonical; self-hosted enterprise DB/VM templates do not apply"
  - category: "GitHub Enterprise Server on VM"
    reason: "GitHub cloud (Enterprise plan) is canonical; self-hosted GHE is not in scope"
  - category: "Generic enterprise governance ARM quickstarts"
    reason: "CAF landing zone + Bicep is canonical IaC; generic ARM governance templates are noise"
  - category: "Synapse as default engineering plane"
    reason: "Databricks + Unity Catalog is mandatory engineering/governance plane; Synapse is accelerator-only for Purview connector"
  - category: "Purview replacing Unity Catalog"
    reason: "Unity Catalog = mandatory Databricks governance; Purview = optional cross-platform extension only"
  - category: "MSAL desktop/WPF/MAUI samples"
    reason: "No desktop app surfaces in scope — Odoo is web-based, iOS is native mobile"
  - category: "Blazor/ASP.NET identity samples"
    reason: "Stack is Node.js + Python + React — .NET is not a canonical runtime"
  - category: "Java Spring/Servlet identity samples"
    reason: "Java is not a canonical runtime — Odoo is Python, web services are Node.js"
  - category: "Device code / headless auth samples"
    reason: "All user-facing surfaces have a browser — device code flow not needed"
  - category: "Keycloak/external IdP bridge samples"
    reason: "Keycloak is decommission candidate — Entra ID is target IdP, no bridge needed"
