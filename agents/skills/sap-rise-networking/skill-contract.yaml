version: 1
name: sap-rise-networking
status: draft
owner: agents
type: benchmark_skill

purpose: >
  Extract and apply Azure networking benchmark patterns from SAP RISE
  guidance without turning SAP into a mandatory implementation dependency.

triggers:
  - architecture review mentions SAP RISE networking
  - Azure networking for ERP/private app connectivity is being designed
  - user asks about peering, VPN, ingress, or shared responsibility

inputs:
  - target architecture draft
  - current network topology
  - security requirements
  - ingress/egress requirements

dependencies:
  - agents/knowledge/benchmarks/sap-on-microsoft-cloud-learning-path.md

steps:
  - identify connectivity scenario
  - classify as peering, VPN, internet, or hybrid boundary
  - extract benchmark pattern from Microsoft guidance
  - translate benchmark into Odoo-on-Azure target-state recommendation
  - produce design notes and risks

outputs:
  - benchmark_extracted
  - relevance_to_current_platform
  - recommended_translation
  - risks
  - out_of_scope
  - evidence

guardrails:
  - do not require SAP products unless explicitly contracted
  - do not assume identical runtime topology
  - do not propose public exposure without justification
  - translate connectivity patterns to ACA + Front Door model

evidence:
  - cited Microsoft source
  - translated target-state recommendation
  - identified non-goals

evals:
  - benchmark correctly identified
  - recommendation mapped to current platform
  - no forced SAP dependency introduced
  - network boundary correctly classified
