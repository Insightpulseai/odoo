id: billing-metering-design
name: Billing and Metering Design
version: 0.1.0
type: benchmark_skill
classification: capability_uplift
family: azure-saas-mt
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design consumption metering and billing integration for multi-tenant SaaS,
  covering usage event collection, meter definitions, rating/pricing models,
  Azure Marketplace integration, and invoice generation.

triggers:
  - "Monetizing a multi-tenant SaaS platform"
  - "Usage-based pricing model required"
  - "Azure Marketplace listing planned"
  - "Current billing is manual or inaccurate"

inputs:
  - pricing_model: "Flat, per-seat, usage-based, tiered, or hybrid"
  - billable_dimensions: "What gets metered (API calls, storage, users, compute hours)"
  - billing_period: "Monthly, annual, or custom"
  - marketplace_listing: "Whether Azure Marketplace integration is required"
  - invoice_requirements: "Tax handling, currency, payment methods"

steps:
  - "Define billable dimensions and meter specifications"
  - "Design usage event collection pipeline"
  - "Implement rating engine to convert raw usage to billable amounts"
  - "Integrate with Azure Marketplace metering API (if applicable)"
  - "Design invoice generation and payment processing"
  - "Build billing dashboard for tenant self-service"

outputs:
  - meter_definitions: "Billable dimensions with units, aggregation, and limits"
  - collection_pipeline: "Event ingestion and aggregation architecture"
  - rating_engine: "Pricing rules and calculation logic"
  - marketplace_integration: "Azure Marketplace metering API integration design"
  - invoice_template: "Invoice generation and delivery design"
  - billing_dashboard: "Tenant-facing usage and billing views"

guardrails:
  - "Usage events must be idempotent — duplicate events must not double-bill"
  - "Metering pipeline must have at-least-once delivery with deduplication"
  - "Billing data must be auditable — every charge traceable to source events"
  - "Free tier limits must be enforced in real-time, not just billed post-hoc"

evidence:
  - "Usage events correctly aggregated to billing amounts"
  - "Duplicate events do not result in double charges"
  - "Marketplace metering API accepts usage reports"

dependencies:
  - saas-resource-organization
  - saas-observability-design

evals:
  - scenario: "Duplicate usage event submitted"
    pass: "Event deduplicated, tenant billed once"
  - scenario: "Tenant exceeds free tier limit"
    pass: "Usage throttled or upgraded in real-time"
  - scenario: "Monthly invoice generation"
    pass: "Invoice matches aggregated usage, tax correctly applied"

benchmark_source: "Azure Marketplace Metering API, Custom Meters"
