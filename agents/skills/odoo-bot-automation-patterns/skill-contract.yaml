version: 1
type: governance_skill
family: oca_community_governance
skill:
  name: odoo-bot-automation-patterns
  status: draft
  owner: odoo-release-manager
  purpose: >
    Understand and validate OCA bot automation patterns — branch automation,
    migration issue creation, CI trigger patterns.

  triggers:
    - new series support
    - bot behavior review
    - automation pattern audit

  inputs:
    - oca-github-bot configuration
    - target Odoo series
    - custom CI/automation configuration for comparison

  steps:
    - check oca-github-bot configuration for current series
    - verify branch protection rules
    - check auto-migration issue creation
    - verify CI trigger patterns
    - assess bot health/status

  outputs:
    - automation_pattern_report
    - bot_configuration_status
    - recommendations_for_custom_alignment

  guardrails:
    - never modify oca-github-bot configuration directly
    - use as benchmark only
    - align custom CI/automation to OCA patterns where appropriate

  evidence:
    required: true
    format: "docs/evidence/{stamp}/oca-governance/odoo-bot-automation-patterns/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - agents/knowledge/benchmarks/oca-community-governance.md
  - agent-platform/ssot/learning/oca_skill_persona_map.yaml
