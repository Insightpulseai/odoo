# Databricks Asset Bundle: Lakeflow Ingestion
# Purpose: DLT/Lakeflow ingestion pipelines for Bronze layer population
# Spec: spec/databricks-bundles-foundation/

bundle:
  name: lakeflow_ingestion

include:
  - ../../shared/*.yml
  - resources/**/*.yml

sync:
  paths:
    - src

variables:
  catalog:
    default: ${var.catalog}
  bronze_schema:
    default: ${var.bronze_schema}

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-7405610347978231.11.azuredatabricks.net
    variables:
      catalog: dev_ppm

  staging:
    mode: production
    workspace:
      host: https://adb-7405610347978231.11.azuredatabricks.net
    variables:
      catalog: staging_ppm

  prod:
    mode: production
    workspace:
      host: https://adb-7405610347978231.11.azuredatabricks.net
    variables:
      catalog: ppm
