# platform/ssot/services.yaml
# Azure Bill of Materials — Machine-readable service registry
# Last updated: 2026-03-25

schema_version: "1.0"
updated: "2026-03-25"

active_services:

  - key: frontdoor
    name: afd-ipai-prod
    display_name: Azure Front Door
    status: active
    plane: edge
    repo_authority: infra
    resource_group: rg-ipai-prod-edge
    azure_type: Microsoft.Cdn/profiles
    criticality: critical
    always_on: true
    purpose: Public ingress, TLS termination, global routing
    depends_on: []

  - key: waf
    name: waf-afd-ipai-prod
    display_name: Web Application Firewall
    status: active
    plane: edge
    repo_authority: infra
    resource_group: rg-ipai-prod-edge
    azure_type: Microsoft.Cdn/profiles/securityPolicies
    criticality: critical
    always_on: true
    purpose: OWASP rule enforcement, bot mitigation
    depends_on:
      - frontdoor

  - key: entra_odoo_sso
    name: entra-odoo-sso
    display_name: Entra ID — Odoo SSO
    status: active
    plane: identity
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.EntraID/applications
    criticality: critical
    always_on: true
    purpose: OIDC identity provider for Odoo and platform apps
    depends_on: []

  - key: mi_odoo
    name: mi-ipai-odoo-prod
    display_name: Managed Identity — Odoo
    status: active
    plane: identity
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.ManagedIdentity/userAssignedIdentities
    criticality: critical
    always_on: true
    purpose: Service identity for Odoo ACA workloads
    depends_on:
      - entra_odoo_sso

  - key: mi_pulser
    name: mi-ipai-pulser-prod
    display_name: Managed Identity — Pulser
    status: active
    plane: identity
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.ManagedIdentity/userAssignedIdentities
    criticality: high
    always_on: true
    purpose: Service identity for Pulser agent workloads
    depends_on:
      - entra_odoo_sso

  - key: keyvault
    name: kv-ipai-prod
    display_name: Azure Key Vault
    status: active
    plane: shared
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.KeyVault/vaults
    criticality: critical
    always_on: true
    purpose: Secrets, certificates, and key management
    depends_on:
      - mi_odoo
      - mi_pulser

  - key: acr
    name: acripaiprod
    display_name: Azure Container Registry
    status: active
    plane: shared
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.ContainerRegistry/registries
    criticality: high
    always_on: true
    purpose: OCI container image store for all ACA workloads
    depends_on: []

  - key: aca_env
    name: cae-ipai-odoo-prod
    display_name: Container Apps Environment
    status: active
    plane: odoo
    repo_authority: odoo
    resource_group: rg-ipai-prod-odoo
    azure_type: Microsoft.App/managedEnvironments
    criticality: critical
    always_on: true
    purpose: Shared ACA environment for Odoo web, worker, and cron
    depends_on:
      - acr
      - log_analytics

  - key: odoo_web
    name: aca-ipai-odoo-web-prod
    display_name: Odoo Web
    status: active
    plane: odoo
    repo_authority: odoo
    resource_group: rg-ipai-prod-odoo
    azure_type: Microsoft.App/containerApps
    criticality: critical
    always_on: true
    purpose: Odoo CE 18 HTTP frontend (port 8069)
    depends_on:
      - aca_env
      - postgres
      - keyvault
      - frontdoor

  - key: odoo_worker
    name: aca-ipai-odoo-worker-prod
    display_name: Odoo Worker
    status: active
    plane: odoo
    repo_authority: odoo
    resource_group: rg-ipai-prod-odoo
    azure_type: Microsoft.App/containerApps
    criticality: high
    always_on: true
    purpose: Odoo background job processor and cron runner
    depends_on:
      - aca_env
      - postgres
      - keyvault

  - key: postgres
    name: pgflex-ipai-odoo-prod
    display_name: PostgreSQL Flexible Server
    status: active
    plane: data
    repo_authority: odoo
    resource_group: rg-ipai-prod-data
    azure_type: Microsoft.DBforPostgreSQL/flexibleServers
    criticality: critical
    always_on: true
    purpose: Odoo transactional database (PostgreSQL 16)
    depends_on: []

  - key: azure_files
    name: stipaiprododoo
    display_name: Azure Files (Storage Account)
    status: active
    plane: data
    repo_authority: infra
    resource_group: rg-ipai-prod-data
    azure_type: Microsoft.Storage/storageAccounts
    criticality: high
    always_on: true
    purpose: Persistent file storage for Odoo filestore and backups
    depends_on: []

  - key: foundry_hub
    name: aihub-ipai-prod
    display_name: AI Foundry Hub
    status: active
    plane: ai
    repo_authority: agents
    resource_group: rg-ipai-prod-ai
    azure_type: Microsoft.MachineLearningServices/workspaces
    criticality: high
    always_on: false
    purpose: Central AI Foundry hub for model management and endpoints
    depends_on:
      - keyvault

  - key: foundry_project
    name: aiproj-pulser-prod
    display_name: AI Foundry Project — Pulser
    status: active
    plane: ai
    repo_authority: agents
    resource_group: rg-ipai-prod-ai
    azure_type: Microsoft.MachineLearningServices/workspaces
    criticality: high
    always_on: false
    purpose: Pulser agent project within AI Foundry
    depends_on:
      - foundry_hub

  - key: pulser_agent
    name: agent-pulser-prod
    display_name: Pulser Agent Deployment
    status: active
    plane: ai
    repo_authority: agents
    resource_group: rg-ipai-prod-ai
    azure_type: Microsoft.MachineLearningServices/workspaces/onlineEndpoints
    criticality: high
    always_on: false
    purpose: Pulser AI assistant agent serving endpoint
    depends_on:
      - foundry_project
      - keyvault

  - key: doc_intelligence
    name: docint-ipai-prod
    display_name: Document Intelligence
    status: active
    plane: ai
    repo_authority: odoo
    resource_group: rg-ipai-prod-ai
    azure_type: Microsoft.CognitiveServices/accounts
    criticality: medium
    always_on: false
    purpose: OCR and document extraction for expense receipts and invoices
    depends_on: []

  - key: databricks
    name: dbw-ipai-prod
    display_name: Databricks Workspace
    status: active
    plane: data
    repo_authority: data-intelligence
    resource_group: rg-ipai-prod-data
    azure_type: Microsoft.Databricks/workspaces
    criticality: high
    always_on: false
    purpose: Governed data engineering, analytics, and ML serving
    depends_on: []

  - key: log_analytics
    name: log-ipai-prod
    display_name: Log Analytics Workspace
    status: active
    plane: shared
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.OperationalInsights/workspaces
    criticality: high
    always_on: true
    purpose: Centralized log aggregation for all Azure resources
    depends_on: []

  - key: app_insights
    name: appi-ipai-prod
    display_name: Application Insights
    status: active
    plane: shared
    repo_authority: infra
    resource_group: rg-ipai-prod-shared
    azure_type: Microsoft.Insights/components
    criticality: high
    always_on: true
    purpose: APM telemetry, distributed tracing, and alerting
    depends_on:
      - log_analytics

optional_services:

  - key: azure_dns
    name: dns-insightpulseai-com
    display_name: Azure DNS Zone
    status: optional
    plane: edge
    repo_authority: infra
    resource_group: rg-ipai-prod-edge
    azure_type: Microsoft.Network/dnsZones
    criticality: low
    always_on: false
    purpose: Azure-native DNS zone (alternative to delegated registrar DNS)

  - key: ai_search
    name: srch-ipai-prod
    display_name: Azure AI Search
    status: optional
    plane: ai
    repo_authority: agents
    resource_group: rg-ipai-prod-ai
    azure_type: Microsoft.Search/searchServices
    criticality: low
    always_on: false
    purpose: Vector and keyword search index for agent RAG pipelines

external_dependencies:

  - key: squarespace
    name: Squarespace
    role: registrar_only
    purpose: Domain registrar for insightpulseai.com (DNS delegated to Azure/Front Door)
    status: active

  - key: zoho_mail
    name: Zoho Mail
    role: production_domain_email
    purpose: Transactional and organizational email for insightpulseai.com via SMTP
    status: active

retired_services:

  - key: cloudflare
    name: Cloudflare
    retired_date: "2026-03-15"
    replacement: frontdoor
    reason: Consolidated to Azure Front Door for edge routing and WAF

  - key: supabase
    name: Supabase (managed)
    retired_date: "2026-03-15"
    replacement: postgres
    reason: Replaced by Azure PostgreSQL Flexible Server and native Azure services

  - key: n8n
    name: n8n (self-hosted)
    retired_date: "2026-03-21"
    replacement: azure_functions
    reason: Automation consolidated to Azure-native pipelines and Foundry agents

  - key: plane
    name: Plane (project management)
    retired_date: "2026-03-21"
    replacement: azure_devops
    reason: Project management moved to Azure DevOps Boards

  - key: shelf
    name: Shelf (knowledge base)
    retired_date: "2026-03-21"
    replacement: odoo_knowledge
    reason: Knowledge base consolidated into Odoo and agent knowledge layer

  - key: crm_sidecars
    name: CRM Sidecar Apps
    retired_date: "2026-03-21"
    replacement: odoo_web
    reason: CRM functionality consolidated into core Odoo modules
