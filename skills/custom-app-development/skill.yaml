# Custom App Development Skill
# Full-stack application development with Odoo integration

name: custom_app_development
version: 1.0.0
key: app.custom.development
description: |
  Build custom applications: requirements analysis, full-stack development,
  Odoo integration, testing, and deployment.

intents:
  - build custom app
  - develop application
  - create new app
  - full stack development
  - app development

guardrails:
  - Follow monorepo conventions (apps/<app-name>/)
  - Use pnpm workspaces for Node.js apps
  - Integrate with Odoo via XML-RPC/JSON-RPC (not direct DB)
  - Include TypeScript types and tests
  - Security: validate all user input, use env vars for secrets

tools:
  - key: appdev.requirements
    name: Requirements Analysis
    target_model: ipai.appdev.runner
    target_method: analyze_requirements
    description: Break down app requirements into technical specifications

  - key: appdev.scaffold
    name: Scaffold Application
    target_model: ipai.appdev.runner
    target_method: scaffold_app
    description: Generate application boilerplate and project structure

  - key: appdev.backend
    name: Build Backend
    target_model: ipai.appdev.runner
    target_method: build_backend
    description: Implement API routes, data models, and business logic

  - key: appdev.frontend
    name: Build Frontend
    target_model: ipai.appdev.runner
    target_method: build_frontend
    description: Implement UI components, state management, and routing

  - key: appdev.integrate
    name: Odoo Integration
    target_model: ipai.appdev.runner
    target_method: integrate_odoo
    description: Connect app to Odoo via API (XML-RPC/JSON-RPC)

  - key: appdev.test
    name: Test Application
    target_model: ipai.appdev.runner
    target_method: run_tests
    description: Run unit, integration, and e2e tests

workflow:
  - appdev.requirements
  - appdev.scaffold
  - appdev.backend
  - appdev.frontend
  - appdev.integrate
  - appdev.test

input_schema:
  type: object
  required:
    - app_name
    - app_type
  properties:
    app_name: { type: string }
    app_type:
      type: string
      enum: [nextjs, react, vue, svelte, api_only]
    features:
      type: array
      items: { type: string }
    odoo_models:
      type: array
      items: { type: string }
      description: Odoo models to integrate with

output_schema:
  type: object
  properties:
    app_path: { type: string }
    files_created: { type: array, items: { type: string } }
    api_endpoints: { type: array, items: { type: string } }
    test_results: { type: object }

agentInstructions: |
  When building custom apps:

  1. **Scaffold** in apps/<app-name>/ with package.json
  2. **Backend**: API routes, middleware, Odoo client setup
  3. **Frontend**: Components, routing, state management
  4. **Integration**: Use Odoo JSON-RPC for data operations
  5. **Test**: Unit tests for logic, integration tests for API
  6. **Deploy**: Vercel for frontend, self-hosted for backend
