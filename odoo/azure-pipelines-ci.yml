# =============================================================================
# azure-pipelines-ci.yml — CI Validation Pipeline
# =============================================================================
# Replaces GitHub Actions CI checks (billing-locked since 2026-03).
# Runs linting, SSOT validation, boundary checks, and secrets scanning.
#
# This pipeline covers the same gates as these GitHub Actions workflows:
#   - ci-odoo.yml (repo sanity, Python lint, module validation)
#   - repo-boundary-check.yml (top-level allowlist, blocked patterns)
#   - ssot-validate.yml (SSOT schema, syntax, classification)
#   - ssot-ai-validate.yml (AI manifest integrity tests)
#   - integrations-ssot-check.yml (integration SSOT schema)
#   - devcontainer-drift-guard.yml (devcontainer assertions)
#   - secrets-audit.yml (secret pattern scanning)
#
# Service connection: github-insightpulseai (GitHub)
# Pool: ipai-build-pool (self-hosted) or ubuntu-latest (hosted)
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      # Don't re-trigger on infra-only changes (handled by azure-pipelines.yml)
      - infra/azure/**

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - infra/azure/**

variables:
  - name: pythonVersion
    value: '3.12'

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Repo Sanity & Boundary Checks
  # ---------------------------------------------------------------------------
  - stage: RepoSanity
    displayName: Repo Sanity & Boundaries
    jobs:
      - job: BoundaryCheck
        displayName: Repo boundary + structure check
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          # ----------------------------------------------------------------
          # Top-level directory allowlist
          # Only these directories are permitted at repo root
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Top-level directory allowlist check ==="

              ALLOWED="addons|apps|automations|config|db|deploy|docker|docs|infra|mcp|n8n|odoo|odoo19|ops-platform|packages|pipelines|scripts|spec|ssot|supabase|templates|tests|web|.claude|.devcontainer|.github|.vscode|node_modules"
              FAIL=0

              for dir in $(find . -maxdepth 1 -mindepth 1 -type d | sed 's|^\./||' | sort); do
                if ! echo "$dir" | grep -qE "^(${ALLOWED})$"; then
                  echo "BLOCKED: unexpected top-level directory: $dir"
                  FAIL=1
                fi
              done

              if [[ "$FAIL" -eq 1 ]]; then
                echo "ERROR: Unapproved top-level directories found."
                exit 1
              fi
              echo "PASS: All top-level directories are in allowlist."
            displayName: Top-level directory allowlist

          # ----------------------------------------------------------------
          # Blocked file patterns (.env files, deprecated configs)
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Blocked file pattern check ==="
              FAIL=0

              # Check for committed .env files (not templates)
              ENV_FILES=$(git ls-files '*.env' '.env.*' | grep -v '.example' | grep -v '.template' | grep -v 'node_modules' || true)
              if [[ -n "$ENV_FILES" ]]; then
                echo "BLOCKED: .env files tracked in git:"
                echo "$ENV_FILES"
                FAIL=1
              fi

              if [[ "$FAIL" -eq 1 ]]; then
                echo "ERROR: Blocked file patterns detected."
                exit 1
              fi
              echo "PASS: No blocked file patterns found."
            displayName: Blocked file patterns

          # ----------------------------------------------------------------
          # Addons structure validation
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Addons structure check ==="
              FAIL=0

              if [[ -d addons/ipai ]]; then
                for mod_dir in addons/ipai/*/; do
                  if [[ ! -f "${mod_dir}__manifest__.py" ]]; then
                    echo "WARN: Missing __manifest__.py in ${mod_dir}"
                  fi
                done
              fi

              echo "PASS: Addons structure validated."
            displayName: Addons structure validation

          # ----------------------------------------------------------------
          # CLAUDE.md existence check
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Repo sanity checks ==="

              if [[ ! -f CLAUDE.md ]]; then
                echo "ERROR: CLAUDE.md not found at repo root."
                exit 1
              fi
              echo "PASS: CLAUDE.md exists."

              # Check required directories
              for dir in addons scripts docs; do
                if [[ ! -d "$dir" ]]; then
                  echo "ERROR: Required directory '$dir' missing."
                  exit 1
                fi
              done
              echo "PASS: Required directories exist."
            displayName: Repo sanity checks

  # ---------------------------------------------------------------------------
  # Stage 2: Python Linting & Module Validation
  # ---------------------------------------------------------------------------
  - stage: PythonLint
    displayName: Python Lint & Module Validation
    dependsOn: []  # Run in parallel with RepoSanity
    jobs:
      - job: LintAndValidate
        displayName: flake8 + black + isort + py_compile
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              pip install flake8 black isort pyyaml
            displayName: Install Python lint tools

          # ----------------------------------------------------------------
          # Secret pattern scanning (hardcoded keys)
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Secret pattern scan ==="
              FAIL=0

              PATTERNS='(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16}|xoxb-[0-9]|eyJ[a-zA-Z0-9_-]+\.eyJ)'

              # Search tracked Python and config files only
              MATCHES=$(git ls-files '*.py' '*.yml' '*.yaml' '*.json' '*.ts' '*.js' | \
                xargs grep -lnE "$PATTERNS" 2>/dev/null | \
                grep -v node_modules | grep -v '.example' | grep -v 'test' || true)

              if [[ -n "$MATCHES" ]]; then
                echo "WARNING: Possible hardcoded secrets found in:"
                echo "$MATCHES"
                # Warn but don't fail — reduces false positives
              fi
              echo "PASS: Secret pattern scan complete."
            displayName: Secret pattern scan

          # ----------------------------------------------------------------
          # Python syntax compilation
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Python syntax check (addons/ipai/) ==="
              FAIL=0

              if [[ -d addons/ipai ]]; then
                find addons/ipai -name '*.py' -not -path '*/node_modules/*' | while read -r pyfile; do
                  python3 -m py_compile "$pyfile" 2>&1 || { echo "FAIL: $pyfile"; FAIL=1; }
                done
              fi

              if [[ "$FAIL" -eq 1 ]]; then
                echo "ERROR: Python syntax errors found."
                exit 1
              fi
              echo "PASS: All Python files compile."
            displayName: Python syntax check

          # ----------------------------------------------------------------
          # flake8, black, isort (warnings, not blocking)
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Python lint (flake8) ==="
              if [[ -d addons/ipai ]]; then
                flake8 addons/ipai/ \
                  --max-line-length=120 \
                  --extend-ignore=E501,W503,E203 \
                  --exclude='__pycache__,*.pyc,node_modules' \
                  || echo "WARN: flake8 reported issues (non-blocking)"
              fi
              echo "Lint pass complete."
            displayName: flake8 lint
            continueOnError: true

          - script: |
              set -euo pipefail
              echo "=== Python format check (black) ==="
              if [[ -d addons/ipai ]]; then
                black --check --diff addons/ipai/ \
                  || echo "WARN: black formatting issues (non-blocking)"
              fi
            displayName: black format check
            continueOnError: true

          - script: |
              set -euo pipefail
              echo "=== Import sort check (isort) ==="
              if [[ -d addons/ipai ]]; then
                isort --check --diff addons/ipai/ \
                  || echo "WARN: isort issues (non-blocking)"
              fi
            displayName: isort check
            continueOnError: true

          # ----------------------------------------------------------------
          # Module manifest validation
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Module manifest validation ==="
              FAIL=0

              if [[ -d addons/ipai ]]; then
                for manifest in addons/ipai/*/__manifest__.py; do
                  if [[ -f "$manifest" ]]; then
                    python3 -c "
              import ast, sys
              try:
                  with open('${manifest}') as f:
                      data = ast.literal_eval(f.read())
                  assert isinstance(data, dict), 'Manifest must be a dict'
                  assert 'name' in data, 'Missing name field'
                  assert 'version' in data, 'Missing version field'
                  print(f'OK: ${manifest}')
              except Exception as e:
                  print(f'FAIL: ${manifest} — {e}', file=sys.stderr)
                  sys.exit(1)
              " 2>&1 || FAIL=1
                  fi
                done
              fi

              if [[ "$FAIL" -eq 1 ]]; then
                echo "ERROR: Module manifest validation failed."
                exit 1
              fi
              echo "PASS: All manifests valid."
            displayName: Module manifest validation

  # ---------------------------------------------------------------------------
  # Stage 3: SSOT Validation
  # ---------------------------------------------------------------------------
  - stage: SSOTValidation
    displayName: SSOT & Schema Validation
    dependsOn: []  # Run in parallel
    jobs:
      - job: ValidateSSOT
        displayName: SSOT YAML syntax + schema
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              pip install pyyaml
            displayName: Install PyYAML

          # ----------------------------------------------------------------
          # YAML syntax check on all SSOT files
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== SSOT YAML syntax check ==="
              FAIL=0

              for dir in ssot infra/dns config; do
                if [[ -d "$dir" ]]; then
                  find "$dir" -name '*.yaml' -o -name '*.yml' | while read -r f; do
                    python3 -c "
              import yaml, sys
              try:
                  with open('${f}') as fh:
                      yaml.safe_load(fh)
                  print(f'OK: ${f}')
              except Exception as e:
                  print(f'FAIL: ${f} — {e}', file=sys.stderr)
                  sys.exit(1)
              " 2>&1 || FAIL=1
                  done
                fi
              done

              if [[ "$FAIL" -eq 1 ]]; then
                echo "ERROR: SSOT YAML syntax errors found."
                exit 1
              fi
              echo "PASS: All SSOT YAML files valid."
            displayName: SSOT YAML syntax check

          # ----------------------------------------------------------------
          # SSOT AI manifest unit tests
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== SSOT AI manifest tests ==="

              if [[ -f tests/ssot/test_ai_manifests.py ]]; then
                python3 -m pytest tests/ssot/test_ai_manifests.py -v --tb=short \
                  || python3 -m unittest tests.ssot.test_ai_manifests -v
              else
                echo "SKIP: tests/ssot/test_ai_manifests.py not found."
              fi
            displayName: SSOT AI manifest tests
            continueOnError: true

          # ----------------------------------------------------------------
          # SSOT Python script syntax check
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== SSOT script syntax check ==="

              if [[ -d scripts/ssot ]]; then
                find scripts/ssot -name '*.py' | while read -r f; do
                  python3 -m py_compile "$f" && echo "OK: $f"
                done

                find scripts/ssot -name '*.sh' | while read -r f; do
                  bash -n "$f" && echo "OK: $f"
                done
              fi
              echo "PASS: SSOT scripts syntax check complete."
            displayName: SSOT script syntax check

          # ----------------------------------------------------------------
          # Integrations SSOT validation
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Integrations SSOT check ==="

              if [[ -f scripts/validate_integrations_ssot.py ]]; then
                python3 scripts/validate_integrations_ssot.py
              else
                echo "SKIP: scripts/validate_integrations_ssot.py not found."
              fi
            displayName: Integrations SSOT validation
            continueOnError: true

  # ---------------------------------------------------------------------------
  # Stage 4: Devcontainer & Workflow Validation
  # ---------------------------------------------------------------------------
  - stage: ConfigValidation
    displayName: Config & Devcontainer Validation
    dependsOn: []  # Run in parallel
    jobs:
      - job: DevcontainerDrift
        displayName: Devcontainer drift guard
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          # ----------------------------------------------------------------
          # Devcontainer assertions
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              echo "=== Devcontainer drift guard ==="
              FAIL=0

              DC_JSON=".devcontainer/devcontainer.json"
              POST_CREATE=".devcontainer/post-create.sh"

              if [[ -f "$DC_JSON" ]]; then
                if ! grep -q 'colima-odoo' "$DC_JSON"; then
                  echo "WARN: $DC_JSON missing colima-odoo context assertion"
                fi
              else
                echo "SKIP: $DC_JSON not found"
              fi

              if [[ -f "$POST_CREATE" ]]; then
                if ! grep -q 'chown' "$POST_CREATE"; then
                  echo "WARN: $POST_CREATE missing commandhistory ownership fix"
                fi
              else
                echo "SKIP: $POST_CREATE not found"
              fi

              echo "PASS: Devcontainer drift guard complete."
            displayName: Devcontainer assertions

          # ----------------------------------------------------------------
          # Workflow YAML syntax check
          # ----------------------------------------------------------------
          - script: |
              set -euo pipefail
              pip install pyyaml
              echo "=== Workflow YAML syntax check ==="

              if [[ -d .github/workflows ]]; then
                FAIL=0
                find .github/workflows -maxdepth 1 -name '*.yml' | while read -r f; do
                  python3 -c "
              import yaml
              with open('${f}') as fh:
                  yaml.safe_load(fh)
              print(f'OK: ${f}')
              " 2>&1 || { echo "FAIL: $f"; FAIL=1; }
                done

                if [[ "$FAIL" -eq 1 ]]; then
                  echo "ERROR: Workflow YAML syntax errors found."
                  exit 1
                fi
              fi
              echo "PASS: Workflow YAML syntax check complete."
            displayName: Workflow YAML syntax

  # ---------------------------------------------------------------------------
  # Stage 5: Summary Gate
  # ---------------------------------------------------------------------------
  - stage: Summary
    displayName: CI Summary
    dependsOn:
      - RepoSanity
      - PythonLint
      - SSOTValidation
      - ConfigValidation
    condition: succeededOrFailed()
    jobs:
      - job: Gate
        displayName: All gates summary
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              echo "=== CI Pipeline Summary ==="
              echo "Pipeline: $(Build.BuildNumber)"
              echo "Branch:   $(Build.SourceBranch)"
              echo "Commit:   $(Build.SourceVersion)"
              echo ""
              echo "All CI validation stages complete."
              echo "Check individual stage results above for details."
            displayName: Print summary
