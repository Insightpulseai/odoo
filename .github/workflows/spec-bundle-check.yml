name: Spec Bundle Check
on:
  pull_request:
    paths:
      - "spec/**"
  push:
    branches: [main]
    paths:
      - "spec/**"

jobs:
  check-bundles:
    name: Check spec bundle completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate spec bundles (warn-only)
        run: python scripts/ci/check_spec_bundle.py
        # Phase 2: switch to hard-fail
        # run: python scripts/ci/check_spec_bundle.py --strict
