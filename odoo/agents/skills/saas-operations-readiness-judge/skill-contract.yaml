id: saas-operations-readiness-judge
name: SaaS Operations Readiness Judge
version: 0.1.0
type: benchmark_skill
classification: encoded_preference
family: azure-saas-mt
persona: saas-operations-judge
updated_at: "2026-03-17"

purpose: >
  Judge skill — assess overall SaaS operations readiness across provisioning
  automation, monitoring coverage, incident response, scaling policy, billing
  accuracy, and compliance posture. Returns READY / NOT_READY / CONDITIONAL
  with evidence.

triggers:
  - "Pre-launch readiness review"
  - "Post-major-change operational validation"
  - "Quarterly operations health check"
  - "New tier or region launch preparation"

inputs:
  - provisioning_status: "Automation coverage, success rate, SLA compliance"
  - monitoring_coverage: "Metrics, logs, traces, alerting configuration"
  - incident_response: "Runbooks, escalation paths, on-call schedule"
  - scaling_policy: "Auto-scaling rules, capacity planning, load testing results"
  - billing_status: "Metering accuracy, invoice correctness, dispute rate"
  - compliance_status: "Audit results, certification status, gap count"

steps:
  - "Assess provisioning automation maturity and reliability"
  - "Evaluate monitoring and observability coverage"
  - "Review incident response readiness"
  - "Validate scaling and capacity planning"
  - "Audit billing and metering accuracy"
  - "Check compliance posture and certification status"
  - "Assign overall operations readiness verdict"

outputs:
  - verdict: "READY | NOT_READY | CONDITIONAL"
  - provisioning_score: "Automation maturity with evidence"
  - monitoring_score: "Coverage and effectiveness with evidence"
  - incident_score: "Response readiness with evidence"
  - scaling_score: "Capacity and elasticity with evidence"
  - billing_score: "Metering accuracy with evidence"
  - compliance_score: "Posture and certification with evidence"
  - conditions: "Required actions before launch (if CONDITIONAL)"
  - blockers: "Must-fix items (if NOT_READY)"

guardrails:
  - "Verdict must be evidence-based across all six domains"
  - "NOT_READY requires specific blockers with remediation timeline"
  - "CONDITIONAL requires specific conditions with acceptance criteria"
  - "READY requires all domains at acceptable maturity"

evidence:
  - "Each domain score backed by specific metrics or test results"
  - "Provisioning success rate over last 30 days"
  - "Mean time to detect (MTTD) and mean time to resolve (MTTR)"

dependencies:
  - tenant-provisioning-design
  - saas-observability-design
  - billing-metering-design
  - saas-compliance-design
  - tenant-isolation-assessment

evals:
  - scenario: "Mature platform with all domains strong"
    pass: "Verdict: READY with evidence for all six domains"
  - scenario: "Platform with monitoring gaps"
    pass: "Verdict: CONDITIONAL with monitoring conditions listed"
  - scenario: "Platform with no incident response"
    pass: "Verdict: NOT_READY with incident response blocker"

benchmark_source: "Azure SaaS Well-Architected - Operational Excellence"
