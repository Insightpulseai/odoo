name: kb_strategy
description: Strategic goals, OKRs, and initiative tracking for Diva Goals executive reviews
domain: strategy
sources:
  - type: azure_boards
    project: ipai-platform
    query: "SELECT [System.Id] FROM WorkItems WHERE [System.WorkItemType] IN ('Epic', 'Feature') AND [System.AreaPath] UNDER 'ipai-platform\\Strategy'"
  - type: ssot_yaml
    path: ssot/governance/enterprise_okrs.yaml
  - type: ssot_yaml
    path: ssot/governance/platform-strategy-2026.yaml
  - type: spec_bundles
    glob: spec/*/prd.md
index_name: diva_strategy
refresh_schedule: "0 6 * * 1"  # Weekly Monday 06:00 UTC
access_policy:
  read: [diva_orchestrator, diva_judge, executive_reviewer]
  write: [diva_collector]
