version: 1.0.0
system: odoo_copilot_foundry
ingress_paths:
  - name: foundry_project_client
    purpose:
      - project_config
      - connections
      - tracing
      - foundry_native_operations
    endpoint_pattern: "https://<resource>.services.ai.azure.com/api/projects/<project>"
    client: AIProjectClient
    allowed_callers:
      - internal_control_plane_services
    governance:
      - foundry_rbac
      - project_scope

  - name: openai_compatible_client
    purpose:
      - agents
      - evaluations
      - responses
      - model_calls
    endpoint_pattern: "project_endpoint + /openai"
    client: project.get_openai_client
    allowed_callers:
      - advisory_runtime
      - ops_runtime
      - actions_runtime
    governance:
      - foundry_project_scope
      - deployment_policy

  - name: direct_rest
    purpose:
      - adapters
      - webhooks
      - n8n_bridges
      - lightweight_integrations
    endpoint_pattern: "/openai/v1 or compatible REST"
    allowed_callers:
      - automation_bridges
      - service_adapters
    governance:
      - apim_preferred
      - service_auth

  - name: apim_ai_gateway
    purpose:
      - enterprise_front_door
      - auth
      - quotas
      - routing
      - observability
      - governance_for_models_agents_tools
    allowed_callers:
      - all_production_clients
    governance:
      - centralized_auth
      - throttling
      - quotas
      - telemetry

  - name: foundry_playgrounds
    purpose:
      - rapid_prototyping
      - prompt_validation
      - agent_validation
      - tracing_smoke_checks
    allowed_callers:
      - builders
      - operators
    governance:
      - non_production_only
