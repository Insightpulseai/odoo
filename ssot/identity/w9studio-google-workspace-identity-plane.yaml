    description: MFA enforced on all w9studio.net accounts
    target: 100%
    measurement: google_workspace_2sv_policy_audit
  - id: W9-2
    description: Individual named accounts exist for active operators
    target: 100% of active operators
    measurement: google_workspace_user_list
  - id: W9-3
    description: Shared role addresses converted to distribution groups with individual sign-in backing
    target: 3/3 role addresses converted
    measurement: google_workspace_configuration_audit
  - id: W9-4
    description: Cross-plane bridge decision made and implemented (lane 1/2/3/4)
    target: decision_recorded_and_executed
    measurement: this SSOT decision_lanes.current_recommendation
  - id: W9-5
    description: w9studio individuals appear in guest-invite-registry when lane 2 executes
    target: true (when executed)
