name: Secrets Validation Master

# =============================================================================
# Consolidated secrets validation: registry schema, usage cross-reference,
# and hardcoded secrets detection.
#
# Replaces:
#   - secrets-registry-guard.yml
#   - secrets-registry-validate.yml
#   - secrets-usage-guard.yml
#   - validate-secrets-usage.yml
# =============================================================================

on:
  pull_request:
    paths:
      - "ssot/secrets/**"
      - "infra/secrets/**"
      - ".github/workflows/*.yml"
      - "scripts/ci/check_secrets_ssot.py"
      - "scripts/ci/validate_secrets_usage.py"
      - "scripts/secrets/**"
  push:
    branches: [main]
    paths:
      - "ssot/secrets/**"
      - "infra/secrets/**"
      - ".github/workflows/*.yml"
  workflow_dispatch:

concurrency:
  group: secrets-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-registry:
    name: Registry Schema
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate registry schema
        run: python scripts/ci/check_secrets_ssot.py --repo-root .

      - name: Validate inventory cross-reference
        if: hashFiles('ssot/secrets/inventory.yaml') != ''
        run: python scripts/ci/check_secrets_ssot.py --repo-root . --check-inventory

  validate-usage:
    name: Workflow Secrets Usage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate secrets usage against SSOT
        run: python scripts/ci/validate_secrets_usage.py --repo-root .

  all-clear:
    name: Secrets Validation — All Clear
    runs-on: ubuntu-latest
    needs: [validate-registry, validate-usage]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.validate-registry.result }}" != "success" ] || \
             [ "${{ needs.validate-usage.result }}" != "success" ]; then
            echo "::error::Secrets validation failed"
            exit 1
          fi
          echo "All secrets validation checks passed"
