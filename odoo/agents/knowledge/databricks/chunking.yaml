# Databricks — Chunking Contract

name: databricks-chunking
description: Heading-aware chunking for Databricks documentation and product pages

strategy: heading-aware
format: md

chunking:
  split_on:
    - h1
    - h2
    - h3
  max_chunk_tokens: 512
  overlap_tokens: 64
  min_chunk_tokens: 50

  context_window:
    include_parent_headings: true
    include_breadcrumb: true
    max_parent_depth: 3

metadata_per_chunk:
  id_template: "{source}:{domain}:{path}:{heading_chain}:{ordinal}:{content_hash_8}"
  fields:
    - source        # databricks-dev, databricks-products, databricks-industries
    - domain        # developer, data-engineering, apps, azure-integration, industry
    - path          # URL path or doc path
    - heading_chain # Topic > Subtopic
    - ordinal
    - content_hash
    - product       # databricks
    - lang          # en
    - source_type   # documentation | tutorial | product-page | industry-solution

md_handling:
  strip_elements:
    - "<!-- -->"
  preserve_elements:
    - "```"
    - "> **Note**"
    - "> **Tip**"
    - "> **Warning**"
  strip_metadata_header: true
