name: Control Room Governance

on:
  push:
    paths:
      - 'spec/control-room-platform/**'
      - 'docs/governance/**'
      - 'platform/data/contracts/**'
  pull_request:
    paths:
      - 'spec/control-room-platform/**'
      - 'docs/governance/**'
      - 'platform/data/contracts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate spec bundle
        run: python scripts/ci/check_control_room_spec.py

      - name: Validate repository taxonomy
        run: python scripts/ci/check_repository_taxonomy.py

      - name: Validate KPI contracts
        run: python scripts/ci/check_kpi_contracts.py
