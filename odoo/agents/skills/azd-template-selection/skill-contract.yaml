version: 1
type: ops_skill
family: azure_sample_azd
skill:
  name: azd-template-selection
  status: draft
  owner: azure-bootstrap-engineer
  purpose: >
    Select the appropriate azd template for a given workload type.
    Covers template browsing, language/runtime variants, full-stack vs
    single-service templates, and template compatibility assessment.

  triggers:
    - new application workload to be provisioned
    - technology stack decision for new service
    - migration from manual deployment to azd-managed
    - template compatibility question

  inputs:
    - workload type (web app, API, function, full-stack)
    - language/runtime (C#, Python, TypeScript, Java)
    - target Azure services (ACA, Functions, App Service, Static Web Apps)
    - authentication requirements (Entra, anonymous, API key)
    - data tier requirements (PostgreSQL, Cosmos DB, SQL, none)

  steps:
    - identify workload category (single-service, full-stack, microservices)
    - browse azd template catalog for matching templates
    - evaluate template for secure-by-default posture (managed identity, VNet, keyless)
    - verify template language/runtime compatibility
    - assess template recency (last updated, target API versions)
    - check template for CI/CD pipeline support (GitHub Actions, Azure Pipelines)
    - recommend template with reasoning

  outputs:
    - recommended template name and URL
    - compatibility assessment (language, runtime, Azure services)
    - secure-by-default checklist (managed identity, VNet, keyless)
    - CI/CD support matrix
    - known limitations or required customizations

  guardrails:
    - templates are fixtures not architecture — extract pattern, adapt to platform
    - prefer templates with managed identity over API key auth
    - prefer templates with VNet integration over public-only
    - never adopt a template wholesale without reviewing IaC and app code
    - template must be compatible with canonical stack (ACA, Azure PG, Key Vault)
