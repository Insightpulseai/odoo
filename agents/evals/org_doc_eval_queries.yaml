# org_doc_eval_queries.yaml
# Eval queries for org-wide documentation platform retrieval testing
# Contract: docs/contracts/ORG_DOC_PLATFORM_EVAL_CONTRACT.md
# Seeded: 2026-03-15
#
# Each query has:
#   - id: unique identifier
#   - doc_type: expected document type
#   - query: natural language question
#   - expected_sources: paths/docs that should appear in top-3 results
#   - notes: context for scoring

queries:

  # ═══════════════════════════════════════
  # Engineering Docs
  # ═══════════════════════════════════════

  - id: eng_01
    doc_type: engineering
    query: "How is the Odoo Copilot tool registry structured?"
    expected_sources:
      - "addons/ipai/ipai_odoo_copilot/"
      - "docs/contracts/COPILOT_RUNTIME_CONTRACT.md"
      - "docs/contracts/AI_COPILOT_CONTRACT.md"
    notes: "Should surface copilot module code and contract docs"

  - id: eng_02
    doc_type: engineering
    query: "What are the canonical database naming conventions?"
    expected_sources:
      - "CLAUDE.md"
      - "odoo18/CANONICAL_SETUP.md"
    notes: "Should surface odoo_dev/odoo_staging/odoo naming from CLAUDE.md"

  - id: eng_03
    doc_type: engineering
    query: "How does the Azure AI Search integration work?"
    expected_sources:
      - "apps/odoo-docs-kb/"
      - "apps/org-docs-kb/"
    notes: "Should surface KB app code that uses Azure AI Search client"

  - id: eng_04
    doc_type: engineering
    query: "What is the ORM field ordering convention for Odoo 18 models?"
    expected_sources:
      - ".claude/rules/odoo18-coding.md"
    notes: "Should surface the model class attribute order from coding rules"

  # ═══════════════════════════════════════
  # Architecture Docs
  # ═══════════════════════════════════════

  - id: arch_01
    doc_type: architecture
    query: "What is the overall InsightPulse AI platform architecture?"
    expected_sources:
      - "CLAUDE.md"
      - "docs/architecture/"
    notes: "Should surface the architecture overview and stack diagram"

  - id: arch_02
    doc_type: architecture
    query: "How does Azure Front Door route to Container Apps?"
    expected_sources:
      - "ssot/azure/service-matrix.yaml"
      - ".claude/rules/infrastructure.md"
    notes: "Should surface service matrix and infrastructure rules"

  - id: arch_03
    doc_type: architecture
    query: "What is the medallion architecture pattern used?"
    expected_sources:
      - "docs/architecture/"
      - "CLAUDE.md"
    notes: "Should surface Bronze/Silver/Gold/Platinum data architecture"

  - id: arch_04
    doc_type: architecture
    query: "What services run on Azure Container Apps?"
    expected_sources:
      - "ssot/azure/service-matrix.yaml"
      - ".claude/rules/infrastructure.md"
    notes: "Should return the full ACA service list with endpoints"

  # ═══════════════════════════════════════
  # Runbooks
  # ═══════════════════════════════════════

  - id: run_01
    doc_type: runbook
    query: "How do I deploy a new Odoo module?"
    expected_sources:
      - "scripts/deploy-odoo-modules.sh"
      - "CLAUDE.md"
    notes: "Should surface deployment script and module deployment docs"

  - id: run_02
    doc_type: runbook
    query: "How do I run the CI verification checks?"
    expected_sources:
      - "scripts/repo_health.sh"
      - "scripts/spec_validate.sh"
      - "scripts/ci_local.sh"
    notes: "Should surface the three verification scripts"

  - id: run_03
    doc_type: runbook
    query: "How do I backup the production database?"
    expected_sources:
      - "odoo18/scripts/backup_db.sh"
      - "docs/operations/"
    notes: "Should surface backup script and database operations docs"

  - id: run_04
    doc_type: runbook
    query: "How do I add a new OCA module to the project?"
    expected_sources:
      - ".claude/rules/oca-governance.md"
      - "docs/oca/"
    notes: "Should surface OCA governance rules and quality gates"

  # ═══════════════════════════════════════
  # Policy/Governance Docs
  # ═══════════════════════════════════════

  - id: pol_01
    doc_type: policy
    query: "What is the secrets management policy?"
    expected_sources:
      - ".claude/rules/secrets-policy.md"
      - "CLAUDE.md"
    notes: "Should surface secrets policy rules"

  - id: pol_02
    doc_type: policy
    query: "What modules are deprecated and should not be used?"
    expected_sources:
      - "CLAUDE.md"
    notes: "Should surface the deprecated items table"

  - id: pol_03
    doc_type: policy
    query: "What is the OCA module adoption process?"
    expected_sources:
      - ".claude/rules/oca-governance.md"
    notes: "Should surface quality gates and porting workflow"

  - id: pol_04
    doc_type: policy
    query: "What is the commit message convention?"
    expected_sources:
      - "CLAUDE.md"
      - ".claude/rules/odoo18-coding.md"
    notes: "Should surface feat|fix|refactor|docs|test|chore convention"

  # ═══════════════════════════════════════
  # Spec/Product Docs
  # ═══════════════════════════════════════

  - id: spec_01
    doc_type: spec
    query: "What is the BIR tax compliance spec?"
    expected_sources:
      - "spec/bir-tax-compliance/"
    notes: "Should surface BIR tax compliance spec bundle"

  - id: spec_02
    doc_type: spec
    query: "What are the enterprise parity targets?"
    expected_sources:
      - "CLAUDE.md"
      - "docs/ai/EE_PARITY.md"
    notes: "Should surface the 80% parity target and feature mapping"

  - id: spec_03
    doc_type: spec
    query: "What is the expense automation workflow?"
    expected_sources:
      - "spec/expense-automation/"
      - "addons/ipai/ipai_hr_expense_liquidation/"
    notes: "Should surface expense automation spec and module"

  - id: spec_04
    doc_type: spec
    query: "What is the MCP server architecture for this project?"
    expected_sources:
      - "spec/odoo-mcp-server/"
      - "mcp/servers/"
      - "CLAUDE.md"
    notes: "Should surface MCP spec bundle and server implementations"
