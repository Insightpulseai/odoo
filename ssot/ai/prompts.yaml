# SSOT — AI Prompts
# Prompt template references for Foundry agent modes.
# Full instruction text is in ssot/ai/foundry_instructions.md.

prompts:
  - id: system-instructions
    label: System Instructions (All Modes)
    artifact: ssot/ai/foundry_instructions.md
    description: >
      Master instruction document covering all four logical agent modes.
      Deployed as the Foundry agent's system instructions.

  - id: ask-mode-preamble
    label: Ask Mode Preamble
    parent: system-instructions
    section: ask-agent-mode
    description: >
      Preamble activated when the agent operates in Ask mode.
      Emphasizes knowledge grounding, citations, and read-only behavior.

  - id: authoring-mode-preamble
    label: Authoring Mode Preamble
    parent: system-instructions
    section: authoring-agent-mode
    description: >
      Preamble activated when the agent operates in Authoring mode.
      Emphasizes draft generation, no direct publishing.

  - id: livechat-mode-preamble
    label: Livechat Mode Preamble
    parent: system-instructions
    section: livechat-agent-mode
    description: >
      Preamble activated when the agent operates in Livechat mode.
      Emphasizes customer-safe responses, escalation on uncertainty.

  - id: transaction-mode-preamble
    label: Transaction Mode Preamble
    parent: system-instructions
    section: transaction-agent-mode
    description: >
      Preamble activated when the agent operates in Transaction mode.
      Emphasizes read-only lookups, bounded operations, user confirmation.
