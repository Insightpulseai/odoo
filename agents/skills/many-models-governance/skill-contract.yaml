version: 1
name: many-models-governance
status: draft
owner: agents
type: benchmark_skill
family: databricks-architecture
classification: capability_uplift

purpose: >
  Design multi-model portfolio governance using the many-models architecture approach.
  Covers when to split models by domain/segment/use case/tenant, model inventory and
  cost control, specialized model routing, and model-per-domain/model-per-tenant patterns.

source: "Use the many-models architecture approach" (Microsoft Learn architecture card)

triggers:
  - multiple ML models serving different domains or segments
  - model portfolio governance review
  - multi-tenant model architecture design
  - model sprawl or cost control concerns

inputs:
  - model portfolio description (count, domains, use cases)
  - tenant/segment structure (if multi-tenant)
  - current model registry state
  - cost and compute constraints

dependencies:
  - agents/knowledge/benchmarks/azure-databricks-architecture-cards.md
  - agent-platform/ssot/learning/databricks_architecture_card_map.yaml
  - agents/skills/databricks-model-serving-production-readiness/
  - agents/skills/databricks-agent-production-readiness/

steps:
  - inventory existing models (count, domain, owner, cost, last retrained)
  - classify splitting strategy (domain, segment, use case, tenant, or hybrid)
  - define model inventory governance (registry, ownership, metadata standards)
  - design routing architecture (how requests reach the correct model)
  - establish cost attribution (compute cost per model, per tenant, per domain)
  - define retirement criteria (staleness, performance degradation, cost threshold)
  - document model-per-domain or model-per-tenant patterns and tradeoffs

outputs:
  - model_portfolio_inventory
  - splitting_strategy_recommendation
  - routing_architecture
  - cost_attribution_model
  - retirement_criteria
  - evidence

guardrails:
  - >
    Many-models governance is about portfolio discipline, not about creating more
    models. Default to fewer, well-governed models unless splitting is justified
    by measurable performance or isolation requirements.
  - never approve model proliferation without cost attribution
  - require model registry entry for every production model
  - require routing logic documentation for multi-model architectures
  - require retirement criteria for every model in the portfolio

evidence:
  format: docs/evidence/{stamp}/databricks/many-models-governance/
  required:
    - model portfolio inventory
    - splitting strategy justification
    - routing architecture documentation
    - cost attribution data

evals:
  accuracy: 0.95
  completeness: 0.95
  safety: 0.99
  policy_adherence: 0.99
