version: 1
namespace: ipai.odoo.azure.resource_observed_state.v1
artifact_type: registry
repo_key: odoo
domain: azure
subject: resource_observed_state

resources:
  - id: ipai-odoo-dev-pg
    kind: azure_postgresql_flexible_server
    resource_group: rg-ipai-dev
    region: southeastasia
    environment: dev
    observed:
      auth_mode: postgresql_only
      managed_identity: enabled
      entra_auth: disabled
      public_access: enabled
      allow_azure_services_firewall_bypass: true
      private_endpoints: []
      backup_retention_days: 7
      long_term_retention: disabled
      tls_enforced: true
      databases:
        - postgres
        - odoo
        - odoo_dev
        - odoo_staging
        - odoo_prod
    policy_findings:
      - id: db-naming-prod-drift
        severity: high
        message: "production naming policy requires canonical prod DB name 'odoo'; 'odoo_prod' is invalid for prod"
      - id: env-boundary-violation
        severity: high
        message: "prod databases reside on dev-named server; environment boundary should be at server level"
      - id: public-network-open
        severity: high
        message: "public access enabled with broad Azure-service firewall bypass and no private endpoint"
      - id: auth-posture-mixed
        severity: medium
        message: "managed identity enabled but PostgreSQL auth only; identity contract unclear"
      - id: retention-short
        severity: medium
        message: "backup retention is 7 days and no vaulted/LTR backup is configured"

  - id: pg-ipai-dev
    kind: azure_postgresql_flexible_server
    resource_group: rg-ipai-data-dev
    region: southeastasia
    environment: dev
    observed:
      purpose: platform_data
      candidate_for: supabase_dedicated_postgres
    policy_findings:
      - id: role-unclear
        severity: medium
        message: "server exists but role boundary vs ipai-odoo-dev-pg is not declared"

  - id: vm-ipai-supabase-dev
    kind: azure_vm
    resource_group: rg-ipai-agents-dev
    region: southeastasia
    environment: dev
    observed:
      supporting_resources:
        - vm-ipai-supabase-dev_OsDisk
        - vm-ipai-supabase-devNSG
        - vm-ipai-supabase-devPublicIP
        - vm-ipai-supabase-devVMNic
        - vm-ipai-supabase-devVNET
    policy_findings:
      - id: service-not-contracted
        severity: high
        message: "Supabase runtime exists as VM resources but lacks declared connection contracts"
      - id: ownership-boundary-unclear
        severity: medium
        message: "Supabase running under agents RG; platform/data ownership boundary not explicit"
      - id: observability-not-proven
        severity: high
        message: "no proven logging, alerting, backup, or secret-source integration"
      - id: ingress-not-declared
        severity: high
        message: "no declared ingress contract (Front Door, private endpoint, or VNet peering)"
