name: Diva Goals KB Check
on:
  push:
    paths:
      - 'agents/knowledge/**'
  pull_request:
    paths:
      - 'agents/knowledge/**'

jobs:
  validate-kb-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate KB segment files resolve to concrete sources
        run: |
          EXIT_CODE=0
          for f in $(find agents/knowledge -maxdepth 1 -name 'kb_*.yaml' 2>/dev/null); do
            echo "Checking $f ..."
            python3 -c "
          import yaml, sys, os
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          if not isinstance(data, dict):
              print('  FAIL: not a YAML mapping')
              sys.exit(1)
          required = ['name', 'description', 'domain', 'sources', 'index_name']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'  FAIL: missing keys: {missing}')
              sys.exit(1)
          sources = data.get('sources', [])
          if not sources:
              print('  FAIL: no sources defined')
              sys.exit(1)
          # Check file-based sources resolve
          for src in sources:
              p = src.get('path')
              if p and src.get('type') in ('ssot_yaml', 'manual', 'module_docs', 'contracts', 'evidence_packs'):
                  if not os.path.exists(p) and not any(c in p for c in ['*', '?']):
                      print(f'  WARN: source path not found: {p}')
          print(f'  PASS: {len(sources)} source(s), all required keys present')
          " || EXIT_CODE=1
          done
          if ! find agents/knowledge -maxdepth 1 -name 'kb_*.yaml' 2>/dev/null | grep -q .; then
            echo "WARN: No kb_*.yaml files found under agents/knowledge/"
          fi
          exit $EXIT_CODE
