# Repository Taxonomy -- InsightPulse AI Organization
# Validated by: docs/governance/repository_taxonomy.schema.json
# Governance: spec/control-room-platform/constitution.md
# Last Updated: 2026-03-07

version: "1.0"

repositories:
  - name: odoo
    slug: Insightpulseai/odoo
    type: monorepo
    primary_language: python
    bounded_contexts:
      - odoo-erp
      - supabase
      - n8n
      - github-ci
    description: >
      Core monorepo for Odoo CE 19 + OCA + ipai_* modules.
      Contains 43 custom modules, 153 CI workflows, 11 MCP servers,
      and 550+ scripts across 43 categories.
    spec_bundles: 70
    status: active

  - name: ipai-odoo-refactor
    slug: Insightpulseai/ipai-odoo-refactor
    type: documentation
    primary_language: markdown
    bounded_contexts:
      - odoo-erp
      - supabase
      - databricks
      - plane
      - n8n
      - azure-foundry
      - github-ci
    description: >
      Spec planning and governance repository. Houses spec bundles,
      architecture documents, governance artifacts, and contract definitions
      for the Control Room Platform.
    spec_bundles: 70
    status: active

  - name: mcp-jobs
    slug: jgtolentino/mcp-jobs
    type: service
    primary_language: typescript
    bounded_contexts:
      - supabase
      - n8n
    description: >
      Canonical job orchestration and observability backend for all
      MCP-enabled applications. Deployed on Vercel with Supabase backend.
    spec_bundles: 1
    status: active

  - name: ipai-ops-platform
    slug: Insightpulseai/ipai-ops-platform
    type: infrastructure
    primary_language: yaml
    bounded_contexts:
      - github-ci
      - n8n
    description: >
      Operations platform with runtime identifiers, CI guards,
      and deployment orchestration. Contains canonical runtime_identifiers.json.
    spec_bundles: 1
    status: active

  - name: superset-analytics
    slug: Insightpulseai/superset-analytics
    type: service
    primary_language: python
    bounded_contexts:
      - databricks
    description: >
      Apache Superset BI deployment configuration. Self-hosted on
      DigitalOcean at superset.insightpulseai.com.
    spec_bundles: 0
    status: active

  - name: pulser-hub
    slug: Insightpulseai/pulser-hub
    type: service
    primary_language: typescript
    bounded_contexts:
      - github-ci
      - n8n
    description: >
      GitHub App (pulser-hub) for webhook processing and automation.
      Routes GitHub events to n8n for task creation and deployment triggers.
    spec_bundles: 0
    status: active

  - name: ipai-docs
    slug: Insightpulseai/ipai-docs
    type: application
    primary_language: typescript
    bounded_contexts:
      - github-ci
    description: >
      Documentation site for InsightPulse AI platform.
      Kapa-style docs assistant with AI-powered search.
    spec_bundles: 0
    status: active

  - name: ipai-mobile
    slug: Insightpulseai/ipai-mobile
    type: application
    primary_language: typescript
    bounded_contexts:
      - odoo-erp
    description: >
      Mobile application for InsightPulse AI. Connects to Odoo
      for field service, expense capture, and approval workflows.
    spec_bundles: 1
    status: active

  - name: ipai-web
    slug: Insightpulseai/ipai-web
    type: application
    primary_language: typescript
    bounded_contexts:
      - github-ci
    description: >
      Public-facing Next.js web application on Vercel.
      Hybrid CMS strategy with Odoo website for internal use.
    spec_bundles: 0
    status: active

  - name: ipai-terraform
    slug: Insightpulseai/ipai-terraform
    type: infrastructure
    primary_language: hcl
    bounded_contexts:
      - github-ci
    description: >
      Infrastructure-as-code for DigitalOcean droplets, DNS,
      networking, and self-hosted service provisioning.
    spec_bundles: 0
    status: active

  - name: odoo-schema-mirror
    slug: Insightpulseai/odoo-schema-mirror
    type: library
    primary_language: sql
    bounded_contexts:
      - odoo-erp
      - supabase
    description: >
      PostgreSQL schema mirror of Odoo models for Supabase
      integration and cross-system queries.
    spec_bundles: 0
    status: active

  - name: ipai-design-tokens
    slug: Insightpulseai/ipai-design-tokens
    type: library
    primary_language: typescript
    bounded_contexts: []
    description: >
      Design system tokens for IPAI branding. Used across
      web, mobile, and Odoo theme modules.
    spec_bundles: 0
    status: active
