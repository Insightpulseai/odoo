# azure-pipelines.yml — Marketing site (ipai-landing)
# Self-contained: ACR build + ACA deploy on push to main.
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - web/ipai-landing/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - web/ipai-landing/**

pool:
  vmImage: ubuntu-latest

variables:
  - name: acrName
    value: acripaiodoo
  - name: imageName
    value: ipai-website
  - name: imageTag
    value: $(Build.BuildId)
  - name: containerApp
    value: ipai-website-dev
  - name: resourceGroup
    value: rg-ipai-dev-odoo-runtime

steps:
  - task: AzureCLI@2
    displayName: Build and push to ACR
    inputs:
      azureSubscription: azure-ipai
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr build \
          --registry $(acrName) \
          --image $(imageName):$(imageTag) \
          --image $(imageName):latest \
          --file web/ipai-landing/Dockerfile \
          web/ipai-landing

  - task: AzureCLI@2
    displayName: Deploy to Container App
    inputs:
      azureSubscription: azure-ipai
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az containerapp update \
          --name $(containerApp) \
          --resource-group $(resourceGroup) \
          --image $(acrName).azurecr.io/$(imageName):$(imageTag)
