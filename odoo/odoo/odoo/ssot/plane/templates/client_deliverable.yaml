schema: ssot.plane.template.v1
type: client_deliverable
updated: "2026-03-16"

template:
  name: Client Deliverable Template
  description_structure: |
    ## Deliverable Name
    What is being delivered to the client?

    ## Audience
    Who receives this? (client name, segment, internal stakeholder)

    ## Promise / Value
    What does this deliver for the audience?

    ## Dependencies
    What platform features or infrastructure must be ready?

    ## Demo / Evidence Link
    Link to demo environment, recording, or evidence pack.

  required_fields:
    - title
    - description
    - assignee
    - due_date
    - state

  label_convention:
    - "Type/ClientDeliverable"
    - "Module/TBWA-SMP"

  module_assignment_rule: >
    Assign to TBWA/SMP Packaging unless the deliverable
    is purely technical (then assign to the relevant module).

  cycle_assignment_rule: >
    Assign to Client Packaging cycle.

  done_rule: >
    Deliverable produced and reviewed.
    Demo/evidence link populated and accessible.
    Client acceptance received (or internal sign-off for internal deliverables).
