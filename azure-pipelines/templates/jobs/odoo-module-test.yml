# =============================================================================
# Reusable Job: Odoo Module Tests on Azure PostgreSQL
# =============================================================================
# Runs Odoo 18 module tests against a disposable database on Azure PG.
# Creates a temp database, installs modules, runs tests, drops the database.
#
# Usage:
#   jobs:
#     - template: templates/jobs/odoo-module-test.yml
#       parameters:
#         installModules: 'ipai_auth_oidc,ipai_ops_api'
#         testTags: '/ipai_auth_oidc,/ipai_ops_api'
# =============================================================================

parameters:
  - name: installModules
    type: string
    displayName: Modules to install (comma-separated)
  - name: testTags
    type: string
    displayName: Test tags (Odoo --test-tags format)
    default: ''
  - name: serviceConnection
    type: string
    default: ipai-dev-wif
  - name: keyVaultName
    type: string
    default: kv-ipai-dev
  - name: pgServer
    type: string
    default: pg-ipai-odoo
  - name: pgHost
    type: string
    default: pg-ipai-odoo.postgres.database.azure.com
  - name: pgAdminUser
    type: string
    default: odoo_admin
  - name: pythonVersion
    type: string
    default: '3.11'
  - name: timeoutMinutes
    type: number
    default: 60

jobs:
  - job: OdooModuleTest
    displayName: 'Test: ${{ parameters.installModules }}'
    timeoutInMinutes: ${{ parameters.timeoutMinutes }}
    pool: ipai-aca-agents
    steps:
      - checkout: self
        submodules: false
        clean: true
        fetchDepth: 1

      # -----------------------------------------------------------------
      # Load secrets from Key Vault
      # -----------------------------------------------------------------
      - task: AzureKeyVault@2
        displayName: Load secrets from ${{ parameters.keyVaultName }}
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          KeyVaultName: ${{ parameters.keyVaultName }}
          SecretsFilter: 'pg-ipai-odoo-admin-password'
          RunAsPreJob: false

      # -----------------------------------------------------------------
      # Clone Odoo 18 source
      # -----------------------------------------------------------------
      - script: |
          set -euo pipefail
          git clone --depth 1 --branch 18.0 https://github.com/odoo/odoo.git vendor/odoo
          echo "PASS: Odoo 18 source cloned"
        displayName: Clone Odoo 18 source

      # -----------------------------------------------------------------
      # Setup Python + Odoo 18 deps
      # -----------------------------------------------------------------
      - script: |
          set -euo pipefail
          python3 --version
          export PATH="/azp/.local/bin:$PATH"
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --only-binary :all: gevent greenlet
          grep -iv '^gevent\|^greenlet' vendor/odoo/requirements.txt > /tmp/requirements-filtered.txt
          python3 -m pip install -r /tmp/requirements-filtered.txt
          python3 -m pip install -e vendor/odoo/
          python3 -m pip install python-jose sentry-sdk || true
          echo "PASS: Odoo 18 + deps installed"
        displayName: Install Odoo 18 and dependencies

      # -----------------------------------------------------------------
      # Create disposable test database
      # -----------------------------------------------------------------
      - task: AzureCLI@2
        name: prepare_db
        displayName: Create disposable test database
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            PG_RG="$(az resource list \
              --name "${{ parameters.pgServer }}" \
              --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" \
              --query '[0].resourceGroup' -o tsv)"

            TEST_DB="odoo_test_$(Build.BuildId)_$(System.JobAttempt)"

            echo "Resource group: ${PG_RG}"
            echo "Test database:  ${TEST_DB}"

            az postgres flexible-server db create \
              --resource-group "${PG_RG}" \
              --server-name "${{ parameters.pgServer }}" \
              --database-name "${TEST_DB}"

            echo "##vso[task.setvariable variable=PG_RG;isReadOnly=true]${PG_RG}"
            echo "##vso[task.setvariable variable=TEST_DB;isReadOnly=true]${TEST_DB}"

      # -----------------------------------------------------------------
      # Run Odoo module tests
      # -----------------------------------------------------------------
      - bash: |
          set -euo pipefail

          INSTALL_MODULES="${{ parameters.installModules }}"
          TEST_TAGS="${{ parameters.testTags }}"

          echo "=== Odoo Module Tests ==="
          echo "Modules: ${INSTALL_MODULES}"
          echo "Tags: ${TEST_TAGS}"
          echo "Database: $(TEST_DB)"

          ADDONS_PATH="addons/ipai,addons/oca,vendor/odoo/addons,vendor/odoo/odoo/addons"

          TEST_ARGS=""
          if [[ -n "${TEST_TAGS}" ]]; then
            TEST_ARGS="--test-tags ${TEST_TAGS}"
          fi

          mkdir -p .artifacts/test-logs

          python3 vendor/odoo/odoo-bin \
            --database "$(TEST_DB)" \
            --db_host "${{ parameters.pgHost }}" \
            --db_port 5432 \
            --db_user "${{ parameters.pgAdminUser }}" \
            --db_password "$(pg-ipai-odoo-admin-password)" \
            --db_sslmode require \
            --addons-path "${ADDONS_PATH}" \
            --init "${INSTALL_MODULES}" \
            --test-enable \
            ${TEST_ARGS} \
            --stop-after-init \
            --http-port 18069 \
            --log-level test \
            --log-file .artifacts/test-logs/odoo-test.log \
            2>&1 | tee .artifacts/test-logs/odoo-test-console.log

          # Check for test failures in log
          if grep -q "FAIL" .artifacts/test-logs/odoo-test.log 2>/dev/null; then
            echo "##vso[task.logissue type=error]Odoo tests reported failures"
            exit 1
          fi

          echo "PASS: Odoo module tests completed"
        displayName: 'Run Odoo tests: ${{ parameters.installModules }}'
        env:
          PGPASSWORD: $(pg-ipai-odoo-admin-password)

      # -----------------------------------------------------------------
      # Publish test logs
      # -----------------------------------------------------------------
      - publish: .artifacts/test-logs
        artifact: 'odoo-test-logs-$(Build.BuildId)'
        displayName: Publish Odoo test logs
        condition: always()

      # -----------------------------------------------------------------
      # Drop disposable test database (always)
      # -----------------------------------------------------------------
      - task: AzureCLI@2
        displayName: Drop disposable test database
        condition: always()
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            if [ -n "${PG_RG:-}" ] && [ -n "${TEST_DB:-}" ]; then
              echo "Dropping ${TEST_DB} on ${{ parameters.pgServer }}..."
              az postgres flexible-server db delete \
                --resource-group "${PG_RG}" \
                --server-name "${{ parameters.pgServer }}" \
                --database-name "${TEST_DB}" \
                --yes
              echo "PASS: Test database dropped"
            else
              echo "SKIP: No test database to drop"
            fi
