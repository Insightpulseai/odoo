name: "PPM Clarity: Lint & Validate"

on:
  pull_request:
    paths:
      - "spec/ppm-clarity-plane-odoo/**"
      - "supabase/migrations/*ppm_clarity*"
      - "scripts/ppm/**"
      - "automations/n8n/workflows/ppm-clarity-*"

jobs:
  validate-spec:
    name: Validate Spec Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check spec bundle completeness
        run: |
          SPEC_DIR="spec/ppm-clarity-plane-odoo"
          REQUIRED_FILES="constitution.md prd.md plan.md tasks.md"
          for f in $REQUIRED_FILES; do
            if [ ! -f "$SPEC_DIR/$f" ]; then
              echo "FAIL: Missing $SPEC_DIR/$f"
              exit 1
            fi
          done
          echo "PASS: All spec bundle files present"

  validate-migration:
    name: Validate SQL Migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration structure
        run: |
          MIGRATION=$(ls supabase/migrations/*ppm_clarity* 2>/dev/null | head -1)
          if [ -z "$MIGRATION" ]; then
            echo "SKIP: No PPM Clarity migration found"
            exit 0
          fi
          # Verify required objects
          grep -q "CREATE TABLE.*ops.work_item_links" "$MIGRATION" || { echo "FAIL: Missing work_item_links table"; exit 1; }
          grep -q "CREATE TABLE.*ops.work_item_events" "$MIGRATION" || { echo "FAIL: Missing work_item_events table"; exit 1; }
          grep -q "ops.upsert_work_item_link" "$MIGRATION" || { echo "FAIL: Missing upsert RPC"; exit 1; }
          grep -q "ops.append_work_item_event" "$MIGRATION" || { echo "FAIL: Missing append RPC"; exit 1; }
          grep -q "ops.get_sync_conflicts" "$MIGRATION" || { echo "FAIL: Missing conflicts RPC"; exit 1; }
          grep -q "ENABLE ROW LEVEL SECURITY" "$MIGRATION" || { echo "FAIL: Missing RLS"; exit 1; }
          echo "PASS: Migration structure validated"

  validate-python:
    name: Validate Python Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check syntax
        run: |
          python -m py_compile scripts/ppm/odoo_client.py
          python -m py_compile scripts/ppm/plane_mcp_client.py
          python -m py_compile scripts/ppm/sync_engine.py
          python -m py_compile scripts/ppm/slack_notifier.py
          echo "PASS: All Python files compile"
      - name: Check no hardcoded secrets
        run: |
          if grep -rn "xoxb-\|sk-\|Bearer [a-zA-Z0-9]\{20,\}" scripts/ppm/*.py; then
            echo "FAIL: Hardcoded secrets detected"
            exit 1
          fi
          echo "PASS: No hardcoded secrets"

  validate-workflows:
    name: Validate n8n Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JSON validity
        run: |
          for f in automations/n8n/workflows/ppm-clarity-*.json; do
            python -m json.tool "$f" > /dev/null || { echo "FAIL: Invalid JSON in $f"; exit 1; }
          done
          echo "PASS: All n8n workflow JSON valid"
