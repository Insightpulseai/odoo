# Build Odoo runtime container image, publish digest + addon inventory
parameters:
  - name: appName
    type: string
    default: $(appName)

steps:
  - task: AzureCLI@2
    displayName: ACR login
    inputs:
      azureSubscription: $(azureServiceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr login --name $(acrName)

  - script: |
      set -euo pipefail
      IMAGE="$(acrName).azurecr.io/${{ parameters.appName }}:$(Build.BuildId)"
      IMAGE_LATEST="$(acrName).azurecr.io/${{ parameters.appName }}:latest"

      docker build -f docker/Dockerfile.odoo -t "$IMAGE" -t "$IMAGE_LATEST" .

      docker push "$IMAGE"
      docker push "$IMAGE_LATEST"

      # Capture digest for attestation
      DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" 2>/dev/null || echo "$IMAGE")
      echo "##vso[task.setvariable variable=imageDigest;isOutput=true]$DIGEST"
      echo "Image: $IMAGE"
      echo "Digest: $DIGEST"
    displayName: Build and push Odoo image
    name: buildStep

  - script: |
      set -euo pipefail
      # Publish addon inventory as pipeline artifact for audit trail
      if [ -f config/addons.manifest.yaml ]; then
        cp config/addons.manifest.yaml $(Build.ArtifactStagingDirectory)/addons.manifest.yaml
      fi
      if [ -f ssot/odoo/oca.lock.ce19.json ]; then
        cp ssot/odoo/oca.lock.ce19.json $(Build.ArtifactStagingDirectory)/oca.lock.ce19.json
      fi
    displayName: Collect addon inventory

  - task: PublishBuildArtifacts@1
    displayName: Publish addon metadata
    inputs:
      pathToPublish: $(Build.ArtifactStagingDirectory)
      artifactName: odoo-runtime-metadata
    condition: succeededOrFailed()
