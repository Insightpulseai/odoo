name: Governance Benchmark Validation
# SAP Benchmark CI gate — validates PIM, Policy, and WAR artifacts exist and are consistent.
# Triggered on changes to governance infra or scripts.

on:
  pull_request:
    paths:
      - 'infra/azure/modules/pim-governance.bicep'
      - 'infra/azure/modules/policy-tag-governance.bicep'
      - 'infra/azure/main.bicep'
      - 'scripts/governance/**'
      - 'spec/ipai-workload-center/**'
  push:
    branches: [main]
    paths:
      - 'infra/azure/modules/pim-governance.bicep'
      - 'infra/azure/modules/policy-tag-governance.bicep'
      - 'infra/azure/main.bicep'
      - 'scripts/governance/**'

permissions:
  contents: read

jobs:
  bicep-lint:
    name: Lint Bicep governance modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/

      - name: Lint PIM governance module
        run: bicep lint infra/azure/modules/pim-governance.bicep

      - name: Lint Policy tag governance module
        run: bicep lint infra/azure/modules/policy-tag-governance.bicep

      - name: Lint main.bicep (includes governance modules)
        run: bicep lint infra/azure/main.bicep

  governance-artifacts:
    name: Verify governance artifacts exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required governance files
        run: |
          echo "=== SAP Benchmark Governance Artifact Check ==="
          MISSING=0

          check_file() {
            if [[ -f "$1" ]]; then
              echo "[PASS] $1"
            else
              echo "[FAIL] $1 — MISSING"
              MISSING=$((MISSING + 1))
            fi
          }

          # #644 — PIM governance
          check_file "infra/azure/modules/pim-governance.bicep"
          check_file "scripts/governance/configure-pim.sh"

          # #647 — Azure Policy tag governance
          check_file "infra/azure/modules/policy-tag-governance.bicep"
          check_file "scripts/governance/check-tag-compliance.sh"

          # #649 — Well-Architected Review
          check_file "scripts/governance/well-architected-review.sh"

          # Spec bundle
          check_file "spec/ipai-workload-center/constitution.md"
          check_file "spec/ipai-workload-center/prd.md"
          check_file "spec/ipai-workload-center/plan.md"
          check_file "spec/ipai-workload-center/tasks.md"

          # SAP benchmark report
          check_file "docs/architecture/SAP_ON_AZURE_BENCHMARK_REPORT.md"

          echo ""
          echo "Missing files: $MISSING"
          [[ $MISSING -eq 0 ]] && echo "All governance artifacts present." || exit 1

      - name: Check scripts are executable
        run: |
          for script in scripts/governance/*.sh; do
            if [[ -x "$script" ]]; then
              echo "[PASS] $script is executable"
            else
              echo "[FAIL] $script is NOT executable"
              exit 1
            fi
          done

      - name: Shellcheck governance scripts
        run: |
          sudo apt-get install -y shellcheck 2>/dev/null || true
          for script in scripts/governance/*.sh; do
            echo "Checking $script..."
            shellcheck "$script" || echo "[WARN] shellcheck found issues in $script"
          done
