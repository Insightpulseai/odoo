id: rl-readiness-judge
version: 1
status: active
classification: encoded_preference
owner: rl-eval-judge
benchmark_source: "HF Deep RL Course"
implementation_source: "Custom eval framework"

purpose: >
  Judge whether a trained RL agent is ready for promotion from experiment
  to deployment, based on convergence, generalization, safety, and
  reproducibility criteria.

inputs:
  - name: trained_model
    type: neural_network
    required: true
    description: "Trained RL policy to evaluate"
  - name: training_logs
    type: dict
    required: true
    description: "Training metrics (returns, losses, diagnostics)"
  - name: environment
    type: string
    required: true
  - name: deployment_tier
    type: enum
    values: [experiment, staging, production]
    required: true
    description: "Target promotion level"

outputs:
  - name: verdict
    type: enum
    values: [promote, block, conditional]
    description: "Promotion decision"
  - name: evidence
    type: dict
    description: "Supporting metrics for each criterion"
  - name: blockers
    type: list
    description: "Issues that must be fixed before promotion"

criteria:
  convergence:
    description: "Training has stabilized"
    required_for: [staging, production]
  performance:
    description: "Meets minimum performance threshold"
    required_for: [staging, production]
  generalization:
    description: "Performs on unseen variations"
    required_for: [production]
  safety:
    description: "No constraint violations"
    required_for: [staging, production]
  reproducibility:
    description: "Results hold across seeds"
    required_for: [production]
  documentation:
    description: "Training config and results documented"
    required_for: [staging, production]

thresholds:
  convergence_window: 100
    # episodes over which return must stabilize
  convergence_tolerance: 0.05
    # max relative change between windows
  min_eval_episodes: 100
  min_seeds: 3
  safety_violation_tolerance: 0
