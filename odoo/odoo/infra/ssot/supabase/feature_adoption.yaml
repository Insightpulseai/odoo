      Branded API endpoints. Low priority for internal stack.

# ---------------------------------------------------------------------------
# EXPLICITLY AVOIDED
# ---------------------------------------------------------------------------

  - id: graphql_pg_graphql
    name: "GraphQL (pg_graphql)"
    supabase_status: ga
    adoption: avoid
    source_url: "https://supabase.com/docs/guides/graphql"
    reason: >
      PostgREST (REST API) is the standard access path. Adding GraphQL
      creates a second API surface with no clear consumer. Avoid unless
      a frontend explicitly requires it.

  - id: supabase_studio_as_ssot
    name: "Supabase Studio (Dashboard) as SSOT"
    supabase_status: ga
    adoption: avoid
    source_url: "https://supabase.com/docs/guides/getting-started"
    reason: >
      Dashboard is for inspection only. All schema, RLS, extensions,
      storage config MUST originate from committed migrations.
      Rule 10 in .claude/rules/ssot-platform.md: "No console-only infrastructure changes."

# ---------------------------------------------------------------------------
# PRIORITY LADDER (EXECUTION ORDER)
# ---------------------------------------------------------------------------
# P0 (active, no action needed): postgres_rls, auth, vault, edge_functions,
#     queues_pgmq, cron, database_webhooks
#
# P1 (highest ROI next):
#   1. stripe_sync_engine — unblock Vault secret, uncomment FDW tables.
#      Yields SQL-native stripe.* schema without writing ETL.
#   2. storage + realtime — deploy RLS policies, activate config.toml pub/sub.
#      Unblocks Phase 2.
#   3. etl_replication — deploy CDC worker to DO App Platform.
#
# P2 (evaluate, not commit):
#   4. analytics_buckets — compare managed Iceberg vs DO Spaces self-hosted.
#      Decision point: ops toil reduction vs alpha-feature risk + lock-in.
#   5. mcp_supabase_server — after Phase 2 completion.
#
# P3 (experimental / future-scale):
#   6. vector_buckets — alpha, do not depend on.
#   7. mcp_edge_functions — adopt when agent tool surfaces are needed.
#   8. terraform_provider — nice-to-have IaC for Supabase project.
#
# P4 (platform polish):
#   9. branching — requires plan upgrade.
#  10. log_drains — wire once observability backend exists.
