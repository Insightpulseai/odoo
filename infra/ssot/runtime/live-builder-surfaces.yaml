# =============================================================================
# Live Builder Surfaces — Current Runtime Inventory
# =============================================================================
# Tracks the actual live state of builder/control surfaces.
# This file is SSOT for "what is currently wired and accessible."
#
# Auth status values: active, pending, not_started, broken
# Surface status values: live, partial, planned, deprecated
# =============================================================================

version: 1
schema: live-builder-surfaces
updated_at: "2026-03-17"

# ---------------------------------------------------------------------------
# Azure subscription context
# ---------------------------------------------------------------------------
azure:
  subscription: "Azure subscription 1"
  tenant: "insightpulseai"
  region_primary: "southeastasia"
  region_ai: "eastus"

# ---------------------------------------------------------------------------
# Foundry (Agent Factory Plane)
# ---------------------------------------------------------------------------
foundry:
  status: live
  project_name: "insightpulseai-platform"
  region: "eastus2"
  auth_status: active
  auth_method: "Entra SSO (browser)"
  capabilities:
    - project management
    - workflow builder
    - model deployment
    - eval runner
    - trace viewer
  endpoints:
    project: "configured"
    azure_openai: "configured"
  notes: "Foundry web portal is live and accessible. VS Code extension auth pending."

# ---------------------------------------------------------------------------
# VS Code workspace
# ---------------------------------------------------------------------------
vscode:
  status: partial
  workspace_name: "insightpulseai-platform"
  auth_status: pending
  auth_blocker: "Entra app registration not yet created — OAuth client ID needed for redirect URIs"
  extensions_installed:
    - Azure Account
    - Azure Resources
    - Azure AI Foundry
    - Docker
    - Remote - Containers
    - AI Toolkit
    - Databricks
    - PostgreSQL
  extensions_missing:
    - Azure DevOps (Boards)
  visible_services:
    - mcp-coordinator
    - mcp-plane
    - odoo
    - supabase
  notes: "Workspace connects to Azure subscription. Extension auth popup requires OAuth client ID."

# ---------------------------------------------------------------------------
# MCP control surfaces
# ---------------------------------------------------------------------------
mcp:
  status: partial
  active_servers:
    - name: "playwright"
      status: live
      auth: "none (local)"
    - name: "azure"
      status: planned
      auth: "pending Entra app registration"
    - name: "azure-devops"
      status: planned
      auth: "pending Entra app registration"
    - name: "azure-ai-foundry"
      status: planned
      auth: "pending Entra app registration"
  inactive_or_removed:
    - name: "com.stripe/mcp"
      status: "should be removed — not part of platform scope"
  notes: "Only Playwright MCP is fully live. Azure MCPs blocked on auth completion."

# ---------------------------------------------------------------------------
# Azure DevOps
# ---------------------------------------------------------------------------
azure_devops:
  status: partial
  organization: "insightpulseai"
  project: "InsightPulseAI"
  boards_process: "Basic"
  hierarchy: "Epic → Issue → Task"
  auth_status: pending
  auth_blocker: "VS Code extension not yet connected"
  web_access: active
  notes: "Web portal accessible. VS Code integration and MCP path not yet wired."

# ---------------------------------------------------------------------------
# Repo structure alignment
# ---------------------------------------------------------------------------
repo:
  status: live
  confirmed_surfaces:
    - "foundry/"
    - "marketplace/"
    - "agents/"
    - "agent-platform/"
    - "docs/"
    - "spec/"
    - "ssot/"
    - "odoo/"
  notes: "Repo topology matches doctrine. All surfaces represented in directory structure."

# ---------------------------------------------------------------------------
# Auth completion tracker
# ---------------------------------------------------------------------------
auth_completion:
  entra_app_registration: not_started
  vscode_oauth_client_id: not_started
  service_principal_for_mcp: not_started
  github_oidc_federation: not_started
  managed_identity_for_pipelines: not_started
  foundry_browser_sso: active
  notes: "Browser-based Foundry auth works. All VS Code/MCP/pipeline auth paths pending Entra app registration."

# ---------------------------------------------------------------------------
# Next actions (ordered)
# ---------------------------------------------------------------------------
next_actions:
