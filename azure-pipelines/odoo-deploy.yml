# =============================================================================
# Odoo Deploy Pipeline
# =============================================================================
# Build -> Deploy -> Smoke -> Evidence for Odoo CE 18 ERP.
# Surface: ipai-odoo-dev-web ACA, https://erp.insightpulseai.com
# ACR image: acripaiodoo.azurecr.io/ipai-odoo:18.0-copilot
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - config/**
      - platform/runtime/docker/docker/Dockerfile.odoo-copilot

pr:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - config/**

pool:
  vmImage: ubuntu-latest

variables:
  acrName: acripaiodoo
  imageName: ipai-odoo
  imageTag: 18.0-copilot
  containerAppName: ipai-odoo-dev-web
  resourceGroup: rg-ipai-dev-odoo-runtime
  serviceConnection: azure-ipai
  smokeUrl: https://erp.insightpulseai.com/web/login

stages:
  # ── Stage 1: Build ──
  - stage: Build
    displayName: Build Odoo Image
    jobs:
      - template: templates/jobs/build-container.yml
        parameters:
          imageName: $(imageName)
          imageTag: $(imageTag)
          dockerfile: platform/runtime/docker/docker/Dockerfile.odoo-copilot
          buildContext: '.'
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)

  # ── Stage 2: Deploy ──
  - stage: Deploy
    displayName: Deploy to ACA
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - template: templates/jobs/deploy-containerapp.yml
        parameters:
          containerAppName: $(containerAppName)
          resourceGroup: $(resourceGroup)
          imageName: $(imageName)
          imageTag: $(imageTag)
          acrName: $(acrName)
          serviceConnection: $(serviceConnection)

  # ── Stage 3: Smoke ──
  - stage: Smoke
    displayName: Smoke Test
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - template: templates/jobs/smoke-http.yml
        parameters:
          url: $(smokeUrl)
          expectedStatus: '200'
          contentMatch: Odoo
          contentExclude: 'Internal Server Error'
          retries: 3
          retryDelaySeconds: 20

  # ── Stage 4: Evidence ──
  - stage: Evidence
    displayName: Publish Evidence
    dependsOn: Smoke
    condition: succeededOrFailed()
    jobs:
      - template: templates/jobs/publish-evidence.yml
        parameters:
          surface: odoo-erp
          imageRef: $(acrName).azurecr.io/$(imageName):$(imageTag)
          smokeUrl: $(smokeUrl)
