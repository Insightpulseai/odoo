# Databricks Asset Bundle Configuration
# For Finance PPM Control Room

bundle:
  name: finance-ppm

variables:
  catalog:
    description: Unity Catalog name
    default: ppm
  schema_bronze:
    description: Bronze schema name
    default: bronze
  schema_silver:
    description: Silver schema name
    default: silver
  schema_gold:
    description: Gold schema name
    default: gold
  warehouse_id:
    description: SQL warehouse ID for queries
    default: e7d89eabce4c330c

workspace:
  host: https://adb-7405610347978231.11.azuredatabricks.net

include:
  - resources/*.yml
  - resources/pipelines/*.yml
  - resources/clusters/*.yml
  - resources/schedules/*.yml
  - resources/permissions/*.yml
  - resources/endpoints/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: dev_ppm
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/finance-ppm-dev
    resources:
      jobs:
        ppm_marts_gold:
          name: "[DEV] PPM Marts Gold"
        azure_rg_ingest:
          name: "[DEV] Azure RG Ingest"
        dq_checks:
          name: "[DEV] DQ Checks"
        control_room_refresh:
          name: "[DEV] Control Room Refresh"

  staging:
    mode: development
    variables:
      catalog: staging_ppm
    workspace:
      root_path: /Workspace/Shared/finance-ppm-staging

  prod:
    mode: production
    variables:
      catalog: ppm
    workspace:
      root_path: /Workspace/Shared/finance-ppm
    run_as:
      service_principal_name: finance-ppm-service-principal
    permissions:
      - level: CAN_VIEW
        group_name: data-engineers
      - level: CAN_MANAGE
        group_name: platform-admins
