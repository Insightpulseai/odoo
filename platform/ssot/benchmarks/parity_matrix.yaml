#    - docs/MODULE_INTROSPECTION.md (why this module exists, CE/OCA coverage checked, justification)
#    - docs/TECHNICAL_GUIDE.md (extension points, tests, upgrade notes)
# 3. A row with status=gap and non-null ipai_bridge does NOT mean ipai_* is the approved solution.
