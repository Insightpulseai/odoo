# foundry_eval_queries.yaml
# Structured evaluation query set for Foundry KB coverage validation.
# Each query tests whether the KB can retrieve and answer questions
# from a specific documentation bucket.
# Last updated: 2026-03-15

meta:
  title: "Microsoft Foundry KB Evaluation Queries"
  description: >
    Seeded eval queries for validating KB retrieval accuracy across
    all 12 Foundry documentation buckets. Minimum 3 queries per bucket.
  total_queries: 42
  pass_threshold: 0.80  # 80% of queries must return correct answers

