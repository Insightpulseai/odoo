# ---------------------------------------------------------------------------
# Timesheet template (account.analytic.line)
# ---------------------------------------------------------------------------
timesheet_template:
  source: task.timesheet_ids
  required_fields:
    - employee_id
    - task_id (or project_id)
    - date
    - unit_amount (hours)
    - name (description)
  daily_reminder: true       # per-user activity/reminder
  weekly_lock_day: Monday    # per week, prior week's lines locked Mon AM
  approval_workflow: direct_manager then PM
  billability_flag:
    source: task.project.is_billable
    gl_account_if_billable: 4001 (Creative Services Revenue)
    gl_account_if_nonbillable: 7xxx (internal overhead)

# ---------------------------------------------------------------------------
# Resource roles (hr.job → skill map)
# ---------------------------------------------------------------------------
resource_roles:
  - code: CD
    name: Creative Director
    default_billing_rate_php: <TBD>
  - code: ACD
    name: Associate Creative Director
    default_billing_rate_php: <TBD>
  - code: AD
    name: Art Director
  - code: CW
    name: Copywriter
  - code: PM
    name: Project / Account Manager
  - code: STRAT
    name: Strategist / Planner
  - code: PROD
    name: Producer
  - code: DIG
    name: Digital Lead
  - code: MED
    name: Media Planner / Buyer
  - code: FIN
    name: Finance / Billing
  - code: ADM
    name: Admin / Traffic

# ---------------------------------------------------------------------------
# OCA modules to adopt for PPM depth
# ---------------------------------------------------------------------------
oca_modules:
  - repo: OCA/project
    modules:
      - project_timeline         # Gantt view
      - project_status           # custom state machine
      - project_template         # template-based project creation
      - project_task_material    # materials linked to tasks
      - project_key              # cross-module project reference
      - project_role             # role-based assignments
  - repo: OCA/project-reporting
    modules:
      - (multiple)               # KPIs, burn-down, profitability
  - repo: OCA/account-analytic
    modules:
      - (multiple)               # project actuals + budgets
  - repo: OCA/hr-timesheet
    modules:
      - (multiple)               # timesheet enhancements
  - repo: OCA/contract
    modules:
      - contract                 # recurring contracts (retainers)
  verification_required: per oca-governance skill before install

# ---------------------------------------------------------------------------
# OData exposure (per platform/contracts/odata/v1/)
# ---------------------------------------------------------------------------
odata_exposure:
  Projects:       project.project (all TBWA\SMP, company_id=4)
  ProjectTasks:   project.task (all TBWA\SMP)
  TimeEntries:    account.analytic.line (timesheet lines, company_id=4)
  read_only: true
  consumer: TBWA\SMP Power BI report (target: Q3 2026)

# ---------------------------------------------------------------------------
# Governance
# ---------------------------------------------------------------------------
governance:
  record_rules:
    - all PPM data scoped to company_id=4
    - client-of-client IP protected (attachment encryption, KV per-client secrets)
    - billable/nonbillable separation enforced at GL posting
  retention: 7_years  # per engagement_posture.audit_retention_days
  export_policy:
    - Client can export own project data on request (GDPR/PH-DPA)
    - IPAI retains aggregated metrics only after engagement ends
