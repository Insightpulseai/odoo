# =============================================================================
# Odoo CI/CD Pipeline — Azure DevOps
# =============================================================================
# Builds, tests, and deploys the Odoo CE 19 container to Azure Container Apps.
#
# Template source: Insightpulseai/infra (pipelines/templates/)
# Service connection: sc-azure-dev-platform (ARM, workload identity federation)
# Variable group: vg-ipai-platform-secrets (Key Vault-backed)
# Agent pool: ubuntu-latest (hosted) for ALL stages
#              Self-hosted pool (ipai-build-pool) is deprecated per CLAUDE.md 2026-03-15.
#              ACA deployment uses AzureCLI@2 + service connection — no VNet access needed.
#
# Stages:
#   1.  Lint            — Python lint (black, flake8, isort) on ipai addons     [hosted]
#   2.  Build           — Docker build + ACR push (main branch only)            [hosted]
#   2b. Infra_Dev       — Bicep deploy to rg-ipai-dev                           [hosted]
#   3.  Deploy_Dev      — ACA revision update to ipai-odoo-dev-web              [hosted]
#   3b. Asset_Flush_Dev — DB purge + regen + CDN invalidate (if static changed) [hosted]
#   4.  Deploy_Staging  — ACA revision update (manual approval gate)            [hosted]
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - docker/**
      - config/**
      - scripts/odoo/**
      - infra/azure/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - addons/ipai/**
      - docker/**
      - config/**
      - infra/azure/**

resources:
  repositories:
    - repository: templates
      type: github
      name: Insightpulseai/infra
      endpoint: github-insightpulseai
      ref: refs/heads/main

variables:
  - group: vg-ipai-platform-secrets
  - name: imageName
    value: ipai-odoo-web
  - name: acrName
    value: cripaidev
  # Pool strategy: hosted (ubuntu-latest) for ALL stages.
  # Self-hosted pool ipai-build-pool is deprecated (2026-03-15).
  # ACA deployment via AzureCLI@2 + service connection needs no VNet access.

stages:
  # -------------------------------------------------------------------------
  # Stage 1: Lint (runs on all branches and PRs)
  # -------------------------------------------------------------------------
  - stage: Lint
    displayName: Python Lint
    jobs:
      - job: PythonLint
        displayName: black + isort + flake8
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: pipelines/templates/lint-python.yml@templates
            parameters:
              pythonVersion: '3.12'
              paths: 'addons/ipai/'

  # -------------------------------------------------------------------------
  # Stage 2: Build (main branch only, after lint passes)
  # -------------------------------------------------------------------------
  - stage: Build
    displayName: Container Build + ACR Push
    dependsOn: Lint
    condition: |
      and(
        succeeded('Lint'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: ContainerBuild
        displayName: Docker build → $(acrName)
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - template: pipelines/templates/build-container.yml@templates
            parameters:
              serviceConnection: sc-azure-dev-platform
              imageName: $(imageName)
              dockerfilePath: docker/Dockerfile.prod
              acrName: $(acrName)
              runTrivy: true

  # -------------------------------------------------------------------------
  # Stage 2b: Infrastructure (Bicep) — deploys VNet, Log Analytics, Azure Files
  # -------------------------------------------------------------------------
  - stage: Infra_Dev
    displayName: Bicep → Dev Infrastructure
    dependsOn: Lint
    condition: |
      and(
        succeeded('Lint'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - deployment: BicepDev
        displayName: Bicep → rg-ipai-dev
        environment: insightpulseai-dev
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: Deploy Bicep (dev)
                  inputs:
                    azureSubscription: sc-azure-dev-platform
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group rg-ipai-dev \
                        --template-file infra/azure/main.bicep \
                        --parameters @infra/azure/parameters/dev.parameters.json \
                        --name "bicep-dev-$(Build.BuildId)" \
                        --verbose

  # -------------------------------------------------------------------------
  # Stage 3: Deploy Dev (auto after build)
  # -------------------------------------------------------------------------
  - stage: Deploy_Dev
    displayName: Deploy to Dev
    dependsOn: Build
    condition: succeeded('Build')
    jobs:
      - deployment: OdooDev
        displayName: ACA → ipai-odoo-dev-web
        environment: insightpulseai-dev
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - template: pipelines/templates/deploy-aca.yml@templates
                  parameters:
                    serviceConnection: sc-azure-dev-platform
                    containerAppName: ipai-odoo-dev-web
                    imageName: $(imageName)
                    imageTag: $(Build.SourceVersion)
                    acrName: $(acrName)
                    resourceGroup: rg-ipai-dev
                    environmentLabel: dev
                    healthPath: /web/health

  # -------------------------------------------------------------------------
  # Stage 3b: Post-Deploy Asset Flush (prevents WSOD from stale ir_attachment)
  # Conditionally runs only when static assets (JS/SCSS/CSS/XML templates)
  # were changed in the triggering commit. Skips for Python-only changes.
  # -------------------------------------------------------------------------
  - stage: Asset_Flush_Dev
    displayName: Flush Asset Cache (Dev)
    dependsOn: Deploy_Dev
    condition: succeeded('Deploy_Dev')
    jobs:
      - job: DetectAssetChanges
        displayName: Check if static assets changed
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 2
          - bash: |
              CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
                'addons/ipai/**/static/src/**/*.js' \
                'addons/ipai/**/static/src/**/*.scss' \
                'addons/ipai/**/static/src/**/*.css' \
                'addons/ipai/**/static/src/**/*.xml' \
                'addons/ipai/**/__manifest__.py' \
              )
              if [ -n "$CHANGED" ]; then
                echo "Static asset files changed:"
                echo "$CHANGED"
                echo "##vso[task.setvariable variable=assetsChanged;isOutput=true]true"
              else
                echo "No static asset changes detected — flush will be skipped."
                echo "##vso[task.setvariable variable=assetsChanged;isOutput=true]false"
              fi
            name: assetCheck
            displayName: Detect JS/SCSS/CSS/XML changes in addons/ipai/

      - job: FlushAssets
        displayName: DB purge + asset regen + CDN invalidate
        dependsOn: DetectAssetChanges
        condition: eq(dependencies.DetectAssetChanges.outputs['assetCheck.assetsChanged'], 'true')
        pool:
          vmImage: ubuntu-latest
        steps:
          # Step 1: Purge ir_attachment asset cache via managed Postgres
          - task: AzureCLI@2
            displayName: 'Step 1: Purge ir_attachment asset records'
            inputs:
              azureSubscription: sc-azure-dev-platform
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "--- Purging stale asset metadata from PostgreSQL ---"
                # Retrieve FQDN and password from Key Vault
                PG_HOST=$(az postgres flexible-server show \
                  --name ipai-odoo-dev-pg \
                  --resource-group rg-ipai-dev \
                  --query "fullyQualifiedDomainName" -o tsv)
                PG_PASS=$(az keyvault secret show \
                  --vault-name ipai-odoo-dev-kv \
                  --name db-password \
                  --query "value" -o tsv)

                DELETED=$(PGPASSWORD="$PG_PASS" psql \
                  -h "$PG_HOST" -U odoo -d odoo -t -A \
                  -c "DELETE FROM ir_attachment WHERE url LIKE '/web/assets/%' RETURNING 1" \
                  | wc -l)
                echo "Purged $DELETED stale asset attachment records"

          # Step 2: Regenerate asset bundles via odoo-bin inside the container
          - task: AzureCLI@2
            displayName: 'Step 2: Regenerate asset bundles offline'
            inputs:
              azureSubscription: sc-azure-dev-platform
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "--- Regenerating assets via odoo-bin -u base ---"
                # Capture output to detect AssetError / compilation failures
                # before proceeding to CDN purge (prevents blind purge of broken bundles)
                REGEN_LOG=$(mktemp)
                az containerapp exec \
                  --name ipai-odoo-dev-web \
                  --resource-group rg-ipai-dev \
                  --command -- odoo-bin -d odoo --no-http -u base --stop-after-init \
                  2>&1 | tee "$REGEN_LOG"

                if grep -qiE "AssetError|Could not compile|Traceback|CRITICAL" "$REGEN_LOG"; then
                  echo "##vso[task.logissue type=error]Asset compilation failed — aborting before CDN purge"
                  cat "$REGEN_LOG"
                  exit 1
                fi
                echo "Asset regeneration completed without compilation errors"

          # Step 3: Restart container to clear ORM in-memory cache
          - task: AzureCLI@2
            displayName: 'Step 3: Restart container + wait for stabilization'
            inputs:
              azureSubscription: sc-azure-dev-platform
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "--- Restarting container to clear ormcache ---"
                REVISION=$(az containerapp revision list \
                  --name ipai-odoo-dev-web \
                  --resource-group rg-ipai-dev \
                  --query '[0].name' -o tsv)
                az containerapp revision restart \
                  --name ipai-odoo-dev-web \
                  --resource-group rg-ipai-dev \
                  --revision "$REVISION"

                echo "--- Waiting 60s for container to stabilize before CDN purge ---"
                sleep 60

          # Step 4: Purge Azure Front Door edge cache
          - task: AzureCLI@2
            displayName: 'Step 4: Purge Front Door /web/assets/* + verify'
            inputs:
              azureSubscription: sc-azure-dev-platform
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "--- Invalidating /web/assets/* at Azure Front Door edge ---"
                # Front Door profile is in rg-ipai-shared-dev (per Azure resource export)
                # Endpoint name is a child resource — discover dynamically
                FD_ENDPOINT=$(az afd endpoint list \
                  --resource-group rg-ipai-shared-dev \
                  --profile-name ipai-fd-dev \
                  --query '[0].name' -o tsv)
                echo "Using Front Door endpoint: $FD_ENDPOINT"
                az afd endpoint purge \
                  --resource-group rg-ipai-shared-dev \
                  --profile-name ipai-fd-dev \
                  --endpoint-name "$FD_ENDPOINT" \
                  --domains erp.insightpulseai.com \
                  --content-paths '/web/assets/*'

                echo "--- Verifying production health ---"
                sleep 10
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                  https://erp.insightpulseai.com/web/health)
                if [ "$STATUS" = "200" ]; then
                  echo "##[section]PASS: /web/health returned 200"
                else
                  echo "##vso[task.logissue type=warning]WARN: /web/health returned $STATUS"
                fi

  # -------------------------------------------------------------------------
  # Stage 4: Deploy Staging (manual approval gate in AzDo environment)
  # -------------------------------------------------------------------------
  - stage: Deploy_Staging
    displayName: Deploy to Staging
    dependsOn: Asset_Flush_Dev
    condition: succeeded('Asset_Flush_Dev')
    jobs:
      - deployment: OdooStaging
        displayName: ACA → ipai-odoo-staging-web
        environment: insightpulseai-staging
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - template: pipelines/templates/deploy-aca.yml@templates
                  parameters:
                    serviceConnection: sc-azure-dev-platform
                    containerAppName: ipai-odoo-staging-web
                    imageName: $(imageName)
                    imageTag: $(Build.SourceVersion)
                    acrName: $(acrName)
                    resourceGroup: rg-ipai-dev
                    environmentLabel: staging
                    healthPath: /web/health
