name: Well-Architected Review

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  push:
    paths:
      - 'infra/**'
      - 'deploy/**'
      - 'docker-compose*.yml'
      - 'spec/well-architected/**'
      - 'scripts/wa_score.py'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  wa-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Well-Architected assessment (auto-only)
        id: score
        run: |
          python3 scripts/wa_score.py --auto-only --json > wa-report.json 2>&1 || true
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat wa-report.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Extract overall score
          SCORE=$(python3 -c "import json; print(json.load(open('wa-report.json'))['overall_score'])" 2>/dev/null || echo "0")
          echo "overall_score=$SCORE" >> $GITHUB_OUTPUT

          HIGH_RISK=$(python3 -c "import json; print(json.load(open('wa-report.json'))['high_risk_findings'])" 2>/dev/null || echo "0")
          echo "high_risk=$HIGH_RISK" >> $GITHUB_OUTPUT

      - name: Console summary
        run: python3 scripts/wa_score.py --auto-only --threshold 0 || true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: wa-report
          path: wa-report.json

      - name: Gate check
        run: |
          SCORE="${{ steps.score.outputs.overall_score }}"
          HIGH_RISK="${{ steps.score.outputs.high_risk }}"

          if [ "$(echo "$SCORE < 3.0" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "::warning::WA score $SCORE below 3.0 threshold"
          fi

          if [ "$HIGH_RISK" -gt "0" ] 2>/dev/null; then
            echo "::warning::$HIGH_RISK HIGH_RISK findings detected"
          fi
