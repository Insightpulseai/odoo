# schema: ssot.ai.oca_ai_integration.v1
# OCA/ai integration model — maps OCA/ai modules to IPAI copilot architecture.
# Architecture: OCA/ai = Odoo-side agent surface + plumbing; IPAI runtime = orchestration.
# Referenced by: ssot/ai/odoo_ai_mapping.yaml, spec/ai-copilot/prd.md
# No fork: all extensions via new ipai_* modules, never modify OCA source.

version: 1
meta:
  owner: platform
  purpose: "Define which OCA/ai modules are installed and how Topics/Tools/Sources map to IPAI primitives."
  created: "2026-03-03"
  last_reviewed: "2026-03-03"
  architecture_principle: >
    OCA/ai provides the in-Odoo agent surface (Topics, Tools, Sources, chatter/doc-page adapters).
    IPAI runtime provides the heavy lifting (RAG, tool routing, approvals, audit, eval gates).
    Connected via thin adapter module (ipai_ai_oca_bridge_gemini) — no OCA fork.

# ── Installed OCA/ai modules ─────────────────────────────────────────────────
oca_modules:
  - id: ai_oca_native_generate_ollama
    oca_repo: OCA/ai
    version: 19.0.1.0.0
    status: vendored                    # Already in addons/oca/ai/
    purpose: "Local Ollama inference for html_editor AI action"
    ipai_override: false                # No override needed; standalone

  - id: ai_oca_bridge
    oca_repo: OCA/ai
    version: null                       # Not yet ported to 19.0
    status: pending_port                # See spec/ai-bridge/tasks.md T-1
    purpose: "Core bridge between OCA AI models and provider backends"
    ipai_override: true                 # ipai_ai_widget currently fills this role
    notes: "Until ported, ipai_ai_widget depends on mail only (per constitution rule 2)"

  - id: ai_oca_bridge_chatter
    oca_repo: OCA/ai
    version: null
    status: pending_port
    purpose: "Chatter compose AI enhancement"
    ipai_override: true                 # ipai_ai_widget provides chatter button
    notes: "Will be adopted when 19.0 port is available"

  - id: ai_oca_bridge_document_page
    oca_repo: OCA/ai
    version: null
    status: pending_port
    purpose: "Document page AI generation"
    ipai_override: false
    notes: "Not referenced in current codebase; adopt when ported"

# ── Provider mapping ─────────────────────────────────────────────────────────
provider:
  default: gemini
  policy_ref: ssot/ai/provider_policy.yaml
  notes: >
    Gemini is default for chat + RAG + tool-use reasoning.
    Ollama is opt-in for html_editor (OCA native) and offline chatter fallback.
    Provider selection is policy-driven, not hardcoded.

# ── Topics → Tool Contract v1 tool IDs ───────────────────────────────────────
# Odoo AI Topics contain Tools. Each topic maps to Tool Contract v1 tool specs.
topics:
  - topic_id: general_assistant
    display_name: "General Assistant"
    description: "Default topic — read-only search, navigation, record lookup"
    read_only_default: true
    tools:
      - tool_id: search_records
        tool_spec: contracts/tools/TOOL_SPEC_TEMPLATE.md  # [NEEDS SPEC]
        category: read
        requires_confirmation: false
      - tool_id: read_record
        tool_spec: null  # [NEEDS SPEC]
        category: read
        requires_confirmation: false
      - tool_id: navigate_to
        tool_spec: null  # [NEEDS SPEC]
        category: read
        requires_confirmation: false

  - topic_id: record_management
    display_name: "Record Management"
    description: "Create, update, and manage Odoo records"
    read_only_default: false
    tools:
      - tool_id: create_record
        tool_spec: null  # [NEEDS SPEC]
        category: write
        requires_confirmation: true
        approval_gate: preview_approval_commit
      - tool_id: update_record
        tool_spec: null  # [NEEDS SPEC]
        category: write
        requires_confirmation: true
        approval_gate: preview_approval_commit
      - tool_id: send_chatter_message
        tool_spec: null  # [NEEDS SPEC]
        category: write
        requires_confirmation: true
      - tool_id: schedule_activity
        tool_spec: null  # [NEEDS SPEC]
        category: write
        requires_confirmation: true

  - topic_id: automation
    display_name: "Automation"
    description: "Trigger n8n workflows and external automations"
    read_only_default: false
    tools:
      - tool_id: trigger_workflow
        tool_spec: null  # [NEEDS SPEC]
        category: automation
        requires_confirmation: true
        approval_gate: preview_approval_commit

  - topic_id: finance
    display_name: "Finance"
    description: "Invoice, payment, and financial operations"
    read_only_default: false
    tools:
      - tool_id: confirm_invoice
        tool_spec: null  # [NEEDS SPEC]
        category: write
        requires_confirmation: true
      - tool_id: create_payment
        tool_spec: null  # [NEEDS SPEC]
        category: write
        requires_confirmation: true
      - tool_id: run_aged_receivables
        tool_spec: null  # [NEEDS SPEC]
        category: read
        requires_confirmation: false

# ── Sources → corpus registry entries ─────────────────────────────────────────
# Odoo AI Sources provide knowledge. Each source maps to corpus registry.
sources:
  - source_id: odoo_records
    description: "Odoo model records (product, partner, knowledge articles)"
    corpus_ref: null  # [NEEDS ENTRY in ssot/knowledge/corpus_registry.yaml]
    ingestion: "n8n sync workflow → Supabase pgvector embeddings"
    provider: gemini                    # Embedding + retrieval via Gemini

  - source_id: external_docs
    description: "External documentation uploaded to Supabase"
    corpus_ref: null  # [NEEDS ENTRY]
    ingestion: "Manual upload or n8n webhook → Supabase Edge Function"
    provider: gemini

  - source_id: chatter_history
    description: "Odoo chatter messages for contextual answers"
    corpus_ref: null  # [NEEDS ENTRY]
    ingestion: "Real-time via Odoo ORM (no embedding; injected as context)"
    provider: gemini
    notes: "Not RAG — direct context injection from current record's chatter"

# ── Read-only default + approval gate ─────────────────────────────────────────
safety:
  read_only_default: true
  description: >
    When no topic with write tools is enabled, agent operates in read-only mode.
    Write actions require explicit topic assignment + preview→approval→commit gate.
  approval_gate:
    mechanism: preview_approval_commit
    enforcement: "ipai_ai_copilot controller requires_confirmation flag"
    audit: "Every tool invocation emits audit envelope to ops.platform_events"
  eval_gates:
    - harness: eval/action_eval.yaml
      case_prefix: "approval-compliance"
      threshold: "confirmation_gate_rate = 1.0 (100%)"
    - harness: eval/action_eval.yaml
      case_prefix: "read-only-default"
      threshold: "permission_denial_rate = 1.0 (100%)"

# ── Adapter module (implementation stub) ──────────────────────────────────────
adapter:
  module_name: ipai_ai_oca_bridge_gemini
  location: addons/ipai/ipai_ai_oca_bridge_gemini/
  status: planned
  purpose: >
    Thin adapter that routes OCA/ai tool calls into IPAI Tool Contract v1 router.
    Enforces preview/approval/idempotency/audit envelope.
    Returns citation-grounded responses.
  depends:
    - ipai_ai_copilot
    - ipai_ai_core
    - mail                              # Until ai_oca_bridge is ported to 19.0
  no_fork_policy: >
    This module extends OCA/ai via standard Odoo _inherit.
    Never modify OCA source. OCA submodule pins managed via .gitmodules.

# ── References ────────────────────────────────────────────────────────────────
references:
  ai_bridge_constitution: spec/ai-bridge/constitution.md
  copilot_prd: spec/ai-copilot/prd.md
  tool_contract_template: contracts/tools/TOOL_SPEC_TEMPLATE.md
  corpus_registry: ssot/knowledge/corpus_registry.yaml
  eval_action: eval/action_eval.yaml
  eval_knowledge: eval/knowledge_copilot_eval.yaml
