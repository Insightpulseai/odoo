[options]
; InsightPulseAI — Odoo 19 CE Devcontainer Config
; Mounted at /etc/odoo/odoo.conf via docker-compose.devcontainer.yml
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo_dev

addons_path = /opt/odoo/addons,/workspaces/odoo/addons/oca,/workspaces/odoo/addons/ipai,/workspaces/odoo/addons/local

data_dir = /var/lib/odoo
workers = 0
log_level = info
without_demo = True
http_port = 8069
longpolling_port = 8072
list_db = False
admin_passwd = admin
dev_mode = all
