version: 1
name: skill-trigger-tuning
description: "Optimize skill trigger precision and recall — ensure skills fire at the right time"
type: benchmark_skill
skill_classification: capability_uplift
owner_persona: skill-author
source_family: anthropic_skill_authoring
status: active

triggers:
  - "skill trigger tuning"
  - "skill fires too often or too rarely"
  - "false positive or false negative trigger"

inputs:
  - skill_name: "Skill to tune"
  - current_description: "Current skill description/triggers"
  - sample_prompts_positive: "Prompts that SHOULD trigger the skill"
  - sample_prompts_negative: "Prompts that should NOT trigger the skill"

steps:
  - id: baseline
    action: "Test current triggers against positive and negative samples"
  - id: analyze_errors
    action: "Identify false positives (overfiring) and false negatives (underfiring)"
  - id: refine_description
    action: "Adjust description: implementation-focused → capability-focused"
  - id: refine_triggers
    action: "Adjust trigger conditions to improve precision/recall"
  - id: retest
    action: "Re-test against all samples"

outputs:
  - precision: "% of triggers that were correct"
  - recall: "% of valid prompts that triggered"
  - changes: "What was modified in description/triggers"

guardrails:
  - "Trigger tests are first-class — not just output tests"
  - "Must test both positive AND negative samples"
  - "Description should describe capability (what), not implementation (how)"

benchmark_source: "https://claude.com/blog/improving-skill-creator-test-measure-and-refine-agent-skills"
