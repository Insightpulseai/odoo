version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-webclient-owl-extension
  status: active
  owner: agents
  build_order: 8
  lane: frontend
  purpose: >
    Extend the Odoo CE 18 web client using OWL components, JS/TS frontend
    customizations, and SCSS styling. Follows Odoo 18 OWL patterns including
    component patching, service registration, and systray extensions.

  triggers:
    - new frontend widget or component needed
    - existing webclient component needs extension
    - systray item or command palette extension required
    - custom SCSS styling needed for module UI

  inputs:
    - component_type (widget, systray, service, action, field)
    - target_component (XML ID or component name to extend, or null for new)
    - behavior_description
    - styling_requirements (optional)

  steps:
    - identify target OWL component or create new one
    - create JS file in static/src/js/ following OWL component pattern
    - use patch() for extending existing components (never monkey-patch)
    - register component or service in web assets bundle
    - create XML template in static/src/xml/ for component markup
    - create SCSS in static/src/scss/ with o_<module>_ class prefix
    - register assets in __manifest__.py (web.assets_backend or web.assets_frontend)
    - test component rendering in browser on disposable DB
    - verify no JS console errors

  outputs:
    - js_file_path
    - xml_template_path
    - scss_file_path (if applicable)
    - asset_bundle_registration
    - browser_test_result
    - evidence

  guardrails:
    - CSS class prefix must be o_<module>_ (e.g. o_ipai_copilot_panel)
    - SCSS variables must use $o-* prefix (e.g. $o-ipai-primary)
    - no bare CSS class names
    - no ID selectors in CSS
    - no !important except when overriding Odoo core
    - use patch() for component extension (never monkey-patch globals)
    - assets must be registered in correct bundle (backend vs frontend)
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified
    - do not create global Composer/mail patches (learned from ipai_ai_widget deprecation)

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-webclient-owl-extension/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo18-coding.md
