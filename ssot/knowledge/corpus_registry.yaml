# ssot/knowledge/corpus_registry.yaml
#
# Registry of document corpora available to the knowledge copilot RAG pipeline.
# Each source maps a repo path to a retrieval strategy and chunk parameters.
#
# The copilot must cite sources from these corpora when answering questions.
# Files outside registered corpora are not eligible for citation.
#
# Last updated: 2026-03-03

meta:
  schema_version: "1.0"
  updated_at: "2026-03-03"
  owner: platform
  purpose: "Ground copilot answers in SSOT documentation with verifiable citations"

corpora:

  - id: spec_bundles
    path: "spec/**/*.md"
    description: "Feature specifications (constitution, PRD, plan, tasks, checklist)"
    retrieval_strategy: full_text
    chunk_params:
      max_chunk_tokens: 512
      overlap_tokens: 64
    file_count: 0  # populated by indexer
    priority: high
    include_patterns:
      - "spec/*/constitution.md"
      - "spec/*/prd.md"
      - "spec/*/plan.md"
      - "spec/*/tasks.md"
    exclude_patterns:
      - "spec/*/research.md"  # research notes are draft, not authoritative

  - id: ssot_yaml
    path: "ssot/**/*.yaml"
    description: "SSOT configuration and contract files"
    retrieval_strategy: full_text
    chunk_params:
      max_chunk_tokens: 256
      overlap_tokens: 32
    file_count: 0  # populated by indexer
    priority: high
    include_patterns:
      - "ssot/**/*.yaml"
    exclude_patterns: []

  - id: docs_ai
    path: "docs/ai/**/*.md"
    description: "AI-facing documentation (architecture, modules, workflows)"
    retrieval_strategy: full_text
    chunk_params:
      max_chunk_tokens: 512
      overlap_tokens: 64
    file_count: 0  # populated by indexer
    priority: medium
    include_patterns:
      - "docs/ai/*.md"
    exclude_patterns: []

  - id: docs_contracts
    path: "docs/contracts/**/*.md"
    description: "Platform contracts (cross-domain agreements, tool permissions)"
    retrieval_strategy: full_text
    chunk_params:
      max_chunk_tokens: 512
      overlap_tokens: 64
    file_count: 0  # populated by indexer
    priority: medium
    include_patterns:
      - "docs/contracts/*.md"
    exclude_patterns: []

  - id: docs_runbooks
    path: "docs/runbooks/**/*.md"
    description: "Operational runbooks (how-to procedures for common tasks)"
    retrieval_strategy: full_text
    chunk_params:
      max_chunk_tokens: 512
      overlap_tokens: 64
    file_count: 0  # populated by indexer
    priority: low
    include_patterns:
      - "docs/runbooks/**/*.md"
    exclude_patterns: []
