    - System topology: architecture/system-topology.md
    - Authority model: architecture/authority-model.md
    - Data flows: architecture/data-flows.md
    - Target end state: architecture/target-end-state.md
    - SSOT boundaries: architecture/ssot-boundaries.md
    - Module hierarchy: architecture/module-hierarchy.md

  - AI-First Development:
