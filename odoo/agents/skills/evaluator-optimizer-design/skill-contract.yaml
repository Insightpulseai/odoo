version: 1
name: evaluator-optimizer-design
description: "Design evaluator-optimizer loops with measurable criteria, stopping conditions, and iteration limits"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: workflow-architect
source_family: anthropic_agent_patterns
status: active

triggers:
  - "iterative refinement needed"
  - "evaluator-optimizer loop"
  - "quality improvement through iteration"

inputs:
  - task_description: "What to generate/optimize"
  - quality_criteria: "Measurable evaluation rubric"
  - stopping_threshold: "When is output good enough?"
  - max_iterations: "Hard limit on loop count"

steps:
  - id: validate_fit
    action: "Confirm measurable criteria exist and iteration demonstrably helps"
  - id: define_generator
    action: "Specify what the generator produces and how"
  - id: define_evaluator
    action: "Specify evaluation criteria, scoring method, feedback format"
  - id: set_stopping
    action: "Define stopping criteria: quality threshold AND max iterations"
  - id: design_feedback_loop
    action: "How does evaluator feedback reach the generator?"

outputs:
  - generator_spec: "What it produces"
  - evaluator_rubric: "Measurable criteria and scoring"
  - stopping_criteria: "Threshold + max iterations"
  - feedback_format: "How eval results feed back to generator"

guardrails:
  - "Stopping criteria MUST be defined before starting"
  - "Max iteration limit is mandatory (prevent infinite loops)"
  - "If deterministic tools can evaluate, use those instead of LLM evaluator"
  - "Do not use for tasks where first attempt is typically sufficient"

benchmark_source: "https://www.anthropic.com/engineering/building-effective-agents"
