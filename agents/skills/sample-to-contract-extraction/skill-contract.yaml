version: 1
type: ops_skill
family: azure_sample_azd
skill:
  name: sample-to-contract-extraction
  status: draft
  owner: sample-fixture-curator
  purpose: >
    Extract reusable patterns from Azure sample catalog into platform contracts.
    Treats samples as implementation fixtures — identifies the pattern, verifies
    secure-by-default posture, abstracts language/runtime specifics, and produces
    a contract document for platform standardization.

  triggers:
    - new Azure sample identified as relevant to platform
    - pattern needed for a workload type not yet covered by contracts
    - security posture review of existing sample-derived patterns
    - language/runtime variant needed for existing pattern

  inputs:
    - sample catalog URL or identifier
    - workload type the sample addresses
    - target platform services (ACA, Functions, OpenAI, etc.)
    - language/runtime of the sample

  steps:
    - retrieve and review sample structure (IaC, app code, config)
    - identify the core pattern (architecture, auth, data flow, deployment)
    - verify secure-by-default posture (managed identity, VNet, keyless)
    - abstract language-specific implementation details
    - document platform deviations (where sample differs from canonical stack)
    - draft contract document with pattern, guardrails, and examples
    - register contract in platform contracts index

  outputs:
    - contract document in docs/contracts/
    - pattern description (architecture-neutral)
    - secure-by-default assessment
    - platform alignment notes (deviations from canonical stack)
    - sample provenance record (URL, date, version)

  guardrails:
    - samples are fixtures, NOT architecture doctrine
    - never adopt a sample wholesale — extract the pattern, discard the scaffold
    - every extracted pattern must be verified for secure-by-default posture
    - language-specific details must be abstracted in the contract
    - contracts must be registered in platform contracts index
    - sample provenance (URL, date, version) must be recorded
