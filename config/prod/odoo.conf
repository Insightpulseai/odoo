[options]
; =============================================================================
; Odoo Production Environment Configuration
; =============================================================================
; Extended Platform Configuration for Odoo 19 CE + OCA
; Environment: PRODUCTION
; Database: odoo_prod

; Environment label — read by hooks via RUNNING_ENV env var (Docker / systemd).
; This setting documents intent for human operators; hooks use the env var.
running_env = prod

; Database
db_host = postgres
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo_prod
dbfilter = ^odoo_prod$

; Addons Path (OCA flattened + IPAI modules)
; Order: Odoo CE core -> OCA (flattened) -> IPAI custom
; OCA modules are flattened into a single directory at image build time
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/opt/odoo/addons/oca,/opt/odoo/addons/ipai

; Server
http_port = 8069
proxy_mode = True
workers = 4
max_cron_threads = 2

; Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1

; Logging
log_level = info
log_handler = :INFO
logfile = /var/log/odoo/odoo.log

; Security
list_db = False
admin_passwd = False

; Queue Job Configuration (Agent Runtime)
[queue_job]
channels = root:4,high:2,medium:2,low:1
scheme = http
host = localhost
port = 8069

; =============================================================================
; Extended Platform Modules Summary
; =============================================================================
; Foundation (Tier 0):
;   - base_view_inheritance_extension, auditlog, date_range
;
; Platform UX (Tier 1):
;   - web_responsive, web_dialog_size
;
; Background Processing (Tier 2):
;   - queue_job, queue_job_cron
;
; Reporting & BI (Tier 4):
;   - report_xlsx, mis_builder, account_financial_report, kpi_dashboard
;
; Spreadsheet (Tier 5):
;   - spreadsheet_oca, spreadsheet_dashboard_oca
;
; Knowledge (Tier 6):
;   - document_page, dms
;
; API Layer (Tier 7):
;   - base_rest, base_rest_pydantic
;
; Mail & Audit (Tier 8):
;   - mail_activity_board, mail_debrand
;
; IPAI Platform:
;   - ipai_design_system_apps_sdk, ipai_ask_ai, ipai_command_center
; =============================================================================
