schema: ssot.plane.template.v1
type: story
updated: "2026-03-16"

template:
  name: Story Template
  description_structure: |
    ## Value Statement
    As a <role>, I want <capability> so that <benefit>.

    ## Scope
    What is included and excluded?

    ## Acceptance Criteria
    - [ ] Criterion 1
    - [ ] Criterion 2

    ## Test / Verification Notes
    How to verify this works correctly.

  required_fields:
    - title
    - description
    - assignee
    - priority
    - state

  label_convention:
    - "Type/Story"
    - "Module/<module>"

  module_assignment_rule: >
    Inherit module from parent Feature.

  cycle_assignment_rule: >
    Inherit cycle from parent Feature.

  done_rule: >
    All acceptance criteria checked.
    Verification notes executed and passing.
    Code committed with evidence.
