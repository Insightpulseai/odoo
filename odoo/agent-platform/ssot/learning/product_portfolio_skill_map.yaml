# =============================================================================
# Product & Portfolio Skill Map — Skill Family to Capability Mapping
# =============================================================================
# Maps product/portfolio management responsibilities to bounded agent skills
# for specification lifecycle, goal hierarchy, and alignment validation.
#
# Reference: agents/knowledge/benchmarks/openai-product-use-cases.md
# =============================================================================

version: 1
schema: product-portfolio-skill-map
updated_at: "2026-03-17"

skill_type: product_skill
family: product_portfolio

description: >
  Three-skill family governing the specification lifecycle (product-manager),
  goal hierarchy and capacity allocation (portfolio-manager), and cross-validation
  of alignment between the two (product-portfolio-judge).

skills:
  - id: product-manager
    role: spec_authority
    purpose: "Own feature specification lifecycle — PRDs, acceptance criteria, spec bundles, feature prioritization"
    build_priority: 1
    status: draft
    dependencies:
      - agents/knowledge/benchmarks/openai-product-use-cases.md
      - docs/contracts/boards-to-spec-contract.md
      - docs/contracts/spec-to-pipeline-contract.md

  - id: portfolio-manager
    role: goal_authority
    purpose: "Own goal hierarchy and capacity allocation — OKRs, Azure Boards work items, milestone tracking"
    build_priority: 2
    status: draft
    dependencies:
      - agents/knowledge/benchmarks/openai-product-use-cases.md
      - docs/contracts/boards-to-spec-contract.md
      - ssot/governance/enterprise_okrs.yaml
      - ssot/governance/platform-strategy-2026.yaml

  - id: product-portfolio-judge
    role: alignment_validator
    purpose: "Validate alignment between product specs and portfolio goals — detect drift, orphans, scope mismatch"
    build_priority: 3
    status: draft
    dependencies:
      - agents/skills/product-manager/skill-contract.yaml
      - agents/skills/portfolio-manager/skill-contract.yaml
      - docs/contracts/eval-gate-contract.md
      - agents/knowledge/benchmarks/openai-product-use-cases.md

build_order:
  rationale: "product-manager first (specs are input to everything), portfolio-manager second (goals frame specs), judge third (requires both outputs)"
  sequence:
    - product-manager
    - portfolio-manager
    - product-portfolio-judge

output_shape:
  product_manager:
    - validated_spec_bundle
    - acceptance_criteria_checklist
    - dependency_map
    - risk_assessment
    - evidence
  portfolio_manager:
    - validated_goal_hierarchy
    - capacity_allocation_plan
    - orphan_work_item_report
    - milestone_risk_assessment
    - evidence
  product_portfolio_judge:
    - alignment_report
    - priority_conflict_list
    - timeline_feasibility_assessment
    - recommended_actions
    - evidence

skill_types:
  product_skill: "Manages specification and goal lifecycle for product delivery"
  note: "Judge skill depends on both product-manager and portfolio-manager outputs — never run in isolation"
