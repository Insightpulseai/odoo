          fits: reusable grounding for coding agents in repo
        - repo: microsoft/azure-skills
          role: >
            Azure and Foundry operational grounding. Packages Azure skills plus Azure MCP
            Server and Foundry MCP wiring. Supports GitHub Copilot CLI, VS Code, Claude Code.
          fits: Azure runtime/inventory/deploy/diagnostics assistance
      tier_2_channel_only:
        - repo: microsoft/Agents
          role: >
            M365/Teams/Copilot channel SDK. Only adopt if IPAI needs to ship agents into
            Microsoft 365 Copilot, Teams, webchat, or custom app channels.
          fits: channel delivery layer (not core platform dependency)
        - repo: pnp/copilot-pro-dev-samples
          role: >
            Community sample library for M365 Copilot. Pattern mining only.
          fits: reference/sample mining (not a foundation dependency)
    purpose: >
      External agent SDKs, skills, and MCP configurations that power agentic workflows
      outside the Odoo process boundary. These are runtime/tooling dependencies, not
      Odoo addons. The only justified Odoo-side code is thin connectors, action launch
      points, auth/session mapping, status/result sync, and minimal UI hooks.
    odoo_touchpoints:
      - copilot_gateway
      - agent_runtime
      - coding_agent
