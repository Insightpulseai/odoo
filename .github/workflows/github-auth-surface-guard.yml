name: GitHub Auth Surface Guard

# Enforces App-first auth policy.
#
# Fails if any workflow references a PAT-backed secret that is not on the
# explicit allow-list below.  The canonical automation auth surface is the
# ipai-integrations GitHub App (App installation tokens) or the built-in
# GITHUB_TOKEN.  Personal Access Tokens are deprecated for all workflows.
#
# Allow-list (PATs explicitly approved pending migration):
#   GH_PAT_SUPERSET            notify-superset.yml       → replace w/ GITHUB_TOKEN
#   GH_TOKEN                   vercel-integrations-diff.yml → replace w/ GITHUB_TOKEN
#
# Once those two workflows are migrated, remove their entries from
# ALLOWED_PAT_SECRETS below and the guard will enforce zero-PAT policy.
#
# SSOT:    ssot/secrets/registry.yaml §github_auth
# Runbook: docs/runbooks/GITHUB_APP_PROVISIONING.md

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "ssot/secrets/registry.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

jobs:
  pat-usage-guard:
    name: No new PAT-backed secrets in workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect PAT-backed secret references
        run: |
          set -euo pipefail

          # ── Allowed PAT secrets (tracked in registry with justification) ────────
          # GH_PAT_SUPERSET: legitimate — cross-repo dispatch to jgtolentino/superset
          #   (built-in GITHUB_TOKEN cannot cross repo boundaries)
          # GH_TOKEN: MIGRATED — vercel-integrations-diff.yml now uses GITHUB_TOKEN.
          #   Remove from this list once GH_TOKEN secret is deleted from repo settings.
          ALLOWED=(
            "GH_PAT_SUPERSET"
          )

          # ── Patterns that signal a PAT-backed secret ──────────────────────────
          # Match secrets.XYZ where XYZ looks like a PAT name (PAT, TOKEN, KEY
          # used for GitHub API auth — not infra tokens like CLOUDFLARE_API_TOKEN).
          PATTERNS=(
            'secrets\.GH_PAT'
            'secrets\.GITHUB_PAT'
            'secrets\.GH_TOKEN\b'
            'secrets\.ADMIN_PAT'
            'secrets\.ORG_TOKEN'
            'secrets\.CR_PAT'
            'secrets\.PROJECTS_TOKEN'
          )

          FAIL=0

          for pattern in "${PATTERNS[@]}"; do
            while IFS=: read -r file line content; do
              # Extract the secret name from the match
              secret_name=$(echo "$content" | grep -oE "secrets\.[A-Z_0-9]+" | head -1 | sed 's/secrets\.//')

              # Check against allow-list
              allowed=false
              for a in "${ALLOWED[@]}"; do
                if [[ "$secret_name" == "$a" ]]; then
                  allowed=true
                  break
                fi
              done

              if [[ "$allowed" == "false" ]]; then
                echo "❌ PAT-backed secret detected (not allow-listed):"
                echo "   File:   $file"
                echo "   Line:   $line"
                echo "   Match:  $content"
                echo "   Secret: $secret_name"
                echo "   Fix:    Use secrets.GITHUB_TOKEN (built-in) or"
                echo "           github_app_ipai_integrations installation token."
                echo "   SSOT:   ssot/secrets/registry.yaml §github_auth"
                echo ""
                FAIL=1
              else
                echo "⚠️  Allow-listed PAT (pending migration): $secret_name in $file:$line"
              fi
            done < <(grep -rn "$pattern" .github/workflows/ 2>/dev/null || true)
          done

          if [[ $FAIL -ne 0 ]]; then
            echo "──────────────────────────────────────────────────────────────"
            echo "FAIL  GitHub Auth Surface Guard: new PAT-backed secret detected"
            echo "Policy: App-first auth (ipai-integrations) or built-in GITHUB_TOKEN"
            echo "Runbook: docs/runbooks/GITHUB_APP_PROVISIONING.md"
            exit 1
          fi

          echo "PASS  No new PAT-backed secrets detected"

  deprecated-secret-guard:
    name: Deprecated secrets not referenced in new workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deprecated secrets are not re-introduced
        run: |
          set -euo pipefail

          # Secrets marked status: deprecated in ssot/secrets/registry.yaml.
          # These must not appear in any workflow EXCEPT the files listed below.
          # GH_TOKEN migrated: no longer used in any workflow (uses GITHUB_TOKEN).
          # GH_PAT_SUPERSET is active (cross-repo dispatch), not deprecated.
          DEPRECATED_SECRETS=(
            "GH_TOKEN:__none__"
          )

          FAIL=0

          for entry in "${DEPRECATED_SECRETS[@]}"; do
            secret="${entry%%:*}"
            allowed_file="${entry##*:}"

            while IFS=: read -r file line content; do
              basename_file=$(basename "$file")
              if [[ "$basename_file" != "$allowed_file" ]]; then
                echo "❌ Deprecated secret '$secret' used in unexpected workflow:"
                echo "   File:    $file:$line"
                echo "   Allowed: $allowed_file only"
                echo "   Action:  Remove from $file — use GITHUB_TOKEN or App token"
                FAIL=1
              fi
            done < <(grep -rn "secrets\.$secret\b" .github/workflows/ 2>/dev/null || true)
          done

          if [[ $FAIL -ne 0 ]]; then
            echo "FAIL  Deprecated secret(s) re-introduced in new workflow(s)"
            exit 1
          fi

          echo "PASS  Deprecated secrets not spread to new workflows"

  registry-sync-check:
    name: PAT secrets in registry match secrets in workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Verify registry covers all GH_PAT / GH_TOKEN workflow references
        run: |
          python3 - <<'PYEOF'
          import yaml, re, sys
          from pathlib import Path

          registry = yaml.safe_load(Path("ssot/secrets/registry.yaml").read_text()) or {}

          # Collect all PAT-like secret names referenced in workflows
          pat_pattern = re.compile(r'secrets\.(GH_PAT\w*|GITHUB_PAT\w*|GH_TOKEN\b|ADMIN_PAT\w*|ORG_TOKEN\w*|CR_PAT\w*|PROJECTS_TOKEN\w*)')
          workflow_pats: dict[str, list[str]] = {}

          for wf in Path(".github/workflows").glob("*.yml"):
              content = wf.read_text()
              matches = pat_pattern.findall(content)
              for m in matches:
                  workflow_pats.setdefault(m, []).append(wf.name)

          # Collect all secret names in registry (v2_entries + secrets)
          registered: set[str] = set()
          for section in ("secrets", "v2_entries"):
              block = registry.get(section) or {}
              for key, val in (block.items() if isinstance(block, dict) else []):
                  if isinstance(val, dict):
                      gn = val.get("github_secret_name")
                      if gn:
                          registered.add(gn)

          # Every PAT in a workflow must be in registry
          fail = False
          for secret, files in workflow_pats.items():
              if secret not in registered:
                  print(f"❌ UNREGISTERED: {secret} used in {files}")
                  print(f"   Add to ssot/secrets/registry.yaml §github_auth")
                  fail = True
              else:
                  print(f"✅ Registered: {secret} ({files})")

          if fail:
              print("\nFAIL  Unregistered PAT-backed secrets found")
              sys.exit(1)
          else:
              print("PASS  All PAT-backed workflow secrets are registered in SSOT")
          PYEOF
