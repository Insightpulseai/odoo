# =============================================================================
# AI-Led SDLC Lifecycle Contract
# =============================================================================
#
# Machine-readable lifecycle definition for the agentic development model.
# Benchmark: Microsoft Tech Community "AI-led SDLC" (2026)
# Human doc: docs/architecture/AI_LED_SDLC_DOCTRINE.md
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-17"
status: active

lifecycle:
  - step: problem_statement
    required_input: business_need_or_issue
    required_output: spec_bundle
    output_path: "spec/<slug>/constitution.md"
    gate: spec_exists

  - step: spec_decomposition
    required_input: spec_bundle
    required_output: prd_plan_tasks
    output_path: "spec/<slug>/{prd,plan,tasks}.md"
    gate: tasks_defined

  - step: maker_implementation
    required_input: spec_bundle
    required_output: code_diff
    output_path: repo branch + PR
    gate: pr_created

  - step: judge_validation
    required_input: code_diff
    required_output: quality_report
    output_path: CI check results
    gate: all_judges_pass

  - step: delivery
    required_input: merged_code
    required_output: deploy_evidence
    output_path: "docs/evidence/<date>/<scope>/"
    gate: evidence_captured

  - step: sre_feedback
    required_input: deployed_workload
    required_output: issue_or_green_status
    output_path: GitHub issue or green health check
    gate: monitor_active

agents:
  makers:
    - id: chief-architect
      scope: cross-cutting architecture
    - id: odoo-runtime
      scope: Odoo CE module development
    - id: foundry-agent
      scope: Azure AI Foundry copilot/agent work
    - id: data-intelligence
      scope: Databricks pipelines and data contracts
    - id: azure-platform
      scope: infrastructure, networking, identity
    - id: release-ops
      scope: deployment, evidence, rollback

  judges:
    - id: architecture-judge
      scope: boundary and contract compliance
    - id: security-judge
      scope: secrets, RBAC, vulnerability posture
    - id: governance-judge
      scope: SSOT consistency, CI gate coverage
    - id: finops-judge
      scope: cost and resource efficiency
    - id: customer-value-judge
      scope: business outcome alignment
    - id: tbwa-fit-judge
      scope: client packaging and offering fit

planes:
  - id: transaction
    repo: odoo
    role: ERP system of record
  - id: agent
    repo: agents
    role: Foundry agent policies, skills, MCP manifests
  - id: data
    repo: lakehouse  # target rename: data-intelligence
    role: Databricks, Unity Catalog, medallion pipelines
  - id: infrastructure
    repo: infra
    role: Azure IaC, DNS, Bicep, Terraform
  - id: delivery
    repo: .github
    role: CI/CD, pipelines, evidence fabric
  - id: web
    repo: web
    role: Public site, marketing copilot
  - id: operations
    repo: ops-platform
    role: Ops console, platform tooling
  - id: automation
    repo: automations
    role: n8n workflows, cron jobs

rules:
  - "Every code change must link to a spec bundle"
  - "Every deploy must produce evidence"
  - "Every monitor failure must create a follow-up issue"
  - "Specs are first-class versioned artifacts, not stale docs"
  - "No Viva Goals or separate PM-theater layer"
