name: kb_governance
description: Platform policies, approval rules, audit trails, and compliance posture
domain: governance
sources:
  - type: ssot_yaml
    path: ssot/governance/platform-constitution.yaml
  - type: ssot_yaml
    path: ssot/governance/platform-capabilities-unified.yaml
  - type: ssot_yaml
    path: ssot/governance/operating-model.yaml
  - type: contracts
    path: platform/contracts/diva_goals/
    glob: "*.schema.json"
  - type: audit_log
    source: azure_boards
    event_types: [approval, state_change, policy_exception]
index_name: diva_governance
refresh_schedule: "0 6 * * *"  # Daily 06:00 UTC
access_policy:
  read: [diva_orchestrator, diva_judge, compliance_reviewer]
  write: [diva_collector]
