# -----------------------------------------------------------------------------
# Best practice target state
# -----------------------------------------------------------------------------
target_state:
  total_global_administrators_permanent: 2 (break-glass only)
  total_global_administrators_pim_eligible: 1 (Jake — activates via PIM when needed)

  canonical_break_glass_pair:
    accounts:
      - breakglass01@insightpulseai.com
      - breakglass02@insightpulseai.com
    rationale: "One primary + one backup; names align with Microsoft docs examples"

  human_operator_identity:
    upn: admin@insightpulseai.com
    note: "Jake — convert from standing GA to PIM-eligible"
    pim_activation_duration: 4_hours_max
    pim_approval_required: true
    approval_note: "Self-approval acceptable at 1-operator scale; add reviewer when team grows"
    mfa_required_for_activation: fido2_or_authenticator

  to_delete: 3 excess break-glass accounts
    - emergency-admin@insightpulseai.com
    - emergency-admin-2@insightpulseai.com
    - breakglass-admin@insightpulseai.com (redundant with breakglass01/02)

# -----------------------------------------------------------------------------
# Break-glass account configuration requirements (apply to the 2 kept)
# -----------------------------------------------------------------------------
break_glass_configuration:

  password_management:
    rotation: annual_or_on_incident
    storage: physical_offline_secure (safe deposit box or password manager with split key)
    access: platform-architecture_only_via_documented_procedure

  mfa_posture:
    mfa_enforced: NO (critical — break-glass must NOT depend on MFA that could lock out)
    exemption_mechanism: exclude_from_ca_policy_requiring_mfa
    verification: separate_ca_policy_exempts_only_these_2_accounts

  conditional_access_exemption:
    required: true (break-glass must bypass CA to avoid lockout)
    exempted_accounts: [breakglass01, breakglass02]
    approval: platform-architecture
    monitoring: sign-in_alerts_to_platform-architecture_on_any_break_glass_use

  monitoring_and_alerting:
    alert_on: any_sign_in_from_break_glass_account
    alert_destination: platform-architecture + identity-ops
    incident_response: immediate_investigation_required_any_break_glass_use_outside_drill

  audit:
    usage_review: monthly
    password_test_drill: quarterly (verify passwords still work)
    rotation_drill: annual

# -----------------------------------------------------------------------------
# Resolution of go-live blocker B-03
# -----------------------------------------------------------------------------
go_live_blocker_b_03_resolution:

  prior_assumption: "7 GAs + CA baseline incomplete"
  verified_reality: "6 GAs + CA baseline incomplete"

  target_for_minimum_viable_go_live: 3 total GAs (2 BG + 1 Jake-as-PIM-eligible)

  remediation_sequence:
    step_1_verify_passwords_work:
      targets: [breakglass01, breakglass02]
      action: attempt_sign_in_with_documented_password; rotate if failed
      evidence: docs/evidence/<ts>/break-glass-verification/

    step_2_document_break_glass_procedure:
      output: docs/runbooks/break-glass-admin-procedure.md
      contents: when_to_use + how_to_access_password + recovery_steps + post_use_mandatory_rotation

    step_3_configure_ca_exemption_for_break_glass_pair:
      action: create CA policy excluding [breakglass01, breakglass02] from MFA requirement
      verify: other CA policies still apply to all other identities

    step_4_configure_monitoring_alerts:
      action: Sentinel or LA alert rule on sign-ins from break-glass UPNs
      destination: platform-architecture

    step_5_convert_jake_to_pim_eligible:
      action: remove_admin@_from_standing_ga_assignment; add_as_eligible_via_pim
      az_command: |
        az rest --method POST \
          --url https://graph.microsoft.com/v1.0/policies/roleManagementPolicyAssignments \
          --body (PIM policy assignment JSON)
      requires: Entra ID P2 (confirmed present per m365-tenant-license-inventory)

    step_6_delete_excess_break_glass_accounts:
      targets: [emergency-admin, emergency-admin-2, breakglass-admin]
      pre_delete_verification:
        - no_role_assignments_besides_global_administrator
        - no_unique_licenses_assigned
        - no_owned_groups_or_service_principals
      az_command: "az ad user delete --id <upn>"
      evidence: docs/evidence/<ts>/break-glass-reduction/

    step_7_final_state_verification:
      query: "az rest GET /directoryRoles/25fc5549-4496-42f6-96cf-92effad8e76b/members"
      expected_result:
        - breakglass01@insightpulseai.com
        - breakglass02@insightpulseai.com
      jake_pim_eligible: confirmed_via_pim_ui

