    current_state: Two incompatible ATC namespaces in active use
    target_state: Single namespace with individual/corporate distinction
    blocking: true
    recommended_action: |
      Adopt the WI/WC namespace (used by Supabase and matching BIR RR 11-2018).
      Update Odoo rules and rates to use WI/WC codes.
      Add migration path for any persisted W-series data.

