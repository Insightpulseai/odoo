version: 1
type: review_skill
family: odoo_coding_guidelines
skill:
  name: odoo-xml-structure-check
  status: draft
  owner: agents
  purpose: >
    Verify XML files follow Odoo conventions — file naming, XML ID patterns,
    record formatting, data file organization, and Odoo 19 specific rules
    (tree renamed to list).

  triggers:
    - XML file creation or modification
    - view definitions (form, list, search, kanban)
    - data files (cron, sequences, templates)
    - security files (groups, ACLs, record rules)
    - manifest data key ordering changes

  inputs:
    - XML files under review
    - module manifest (__manifest__.py)
    - diff or full source of changed files

  steps:
    - check file naming against conventions (views/<model>_views.xml, etc.)
    - verify XML ID patterns (view_form, view_list, _action, _menu, etc.)
    - check record formatting and attribute ordering
    - verify data file organization in manifest (security groups first, then ACLs, data, views)
    - check for deprecated patterns (tree renamed to list in Odoo 19)
    - verify ACL CSV format (all 4 CRUD columns, proper ID pattern)
    - check for proper noupdate attributes on data records

  outputs:
    - xml_compliance_report
    - violation_list (with file, line, severity, rule)
    - fix_suggestions
    - upgrade_safety_notes (Odoo 19 specific)

  guardrails:
    - tree views are deprecated in Odoo 19 — always flag as violation
    - XML IDs must follow naming convention — no arbitrary names
    - prefer inherited extension over core patching
    - methods should remain small and single-responsibility
    - do not hardcode logic that blocks extension by submodules
    - do not call cr.commit() unless explicitly justified and documented
    - catch only specific exceptions
    - follow Odoo file, XML, and import conventions

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-review/xml-structure-check/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - ~/.claude/rules/odoo19-coding.md
