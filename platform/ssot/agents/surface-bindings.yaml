version: 1
system: pulser
surface_bindings:
  - surface: www.insightpulseai.com
    class: flagship_platform
    default_domain_pack: pulser_platform
    shared_role_packs:
      - strategy_pack
      - product_pack
      - support_pack
      - engineering_pack
    optional_domain_packs:
      - pulser_finance
      - pulser_identity_ops
    default_judges:
      - grounding_judge
      - platform_policy_judge
      - brand_judge
    default_tools:
      - docs_retrieval
      - platform_metadata_read
    blocked_default_tools:
      - guarded_odoo_write
      - guarded_finance_actions
      - identity_admin_write
  - surface: www.w9studio.net
    class: commercial_branch
    default_domain_pack: pulser_w9studio
    shared_role_packs:
      - marketing_pack
      - sales_pack
      - support_pack
      - project_management_pack
    default_judges:
      - brand_judge
      - customer_value_judge
      - safe_public_response_judge
    default_tools:
      - crm_read
      - notifications
      - scheduling_optional
    blocked_default_tools:
      - accounting_read
      - guarded_finance_actions
      - guarded_odoo_write
      - identity_admin_write
  - surface: prismalab.insightpulseai.com
    class: evidence_workspace
    default_domain_pack: pulser_prismalab_research
    shared_role_packs:
      - support_pack
    default_judges:
      - grounding_judge
      - citation_judge
      - evidence_quality_judge
      - research_policy_judge
    default_tools:
      - doc_ingest
      - retrieval
      - extraction
      - citation_export
    blocked_default_tools:
      - guarded_odoo_write
      - guarded_finance_actions
      - identity_admin_write
  - surface: erp.insightpulseai.com
    class: transactional_backoffice
    default_domain_pack: pulser_erp
    secondary_domain_packs:
      - pulser_finance
    shared_role_packs:
      - support_pack
      - project_management_pack
    default_judges:
      - erp_mutation_guard_judge
      - branch_context_judge
      - policy_judge
    default_tools:
      - odoo_read
      - accounting_read
      - payment_read
    guarded_tools:
      - guarded_odoo_write
      - guarded_finance_actions
    blocked_default_tools:
      - public_cms_write
      - identity_admin_write
context_inheritance:
  global:
    - actor
    - tenant
    - environment
  session:
    - domain
    - branch
    - trade_name
    - selected_contact
    - selected_account
    - selected_project
  request:
    - task
    - object
    - approval_mode
    - persona_override
