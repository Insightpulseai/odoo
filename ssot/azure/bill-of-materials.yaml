# ---------------------------------------------------------------------------
# Azure Bill of Materials — Target-State Contract
# ---------------------------------------------------------------------------
# Authority:    ssot/azure/bill-of-materials.yaml (this file)
# Locked:       2026-04-15
# Doctrine:     Tight target-state BOM. Not "whatever is in the subscription."
# Enforcement:  Azure Pipelines validation + Bicep-managed infra + tag contract
#
# Blunt summary:
#   1 subscription
#   7 canonical resource groups
#   1 Key Vault, 1 ACR, 1 Postgres Flex
#   1 Foundry resource + 1 project
#   1 Databricks workspace, 1 AI Search
#   1 primary VNet boundary
#   1 observability stack per major lane
#   Bicep-managed tags and policy everywhere
#   Azure Pipelines-only delivery
# ---------------------------------------------------------------------------

metadata:
  authority: ssot/azure/bill-of-materials.yaml
  locked_at: 2026-04-15
  supersedes: []
  companions:
    - ssot/azure/tagging-standard.yaml
    - infra/azure/tags/main.bicep
    - docs/architecture/azure-bom-target-state.md
    - docs/architecture/domain-and-web-bom-target-state.md
  doctrine_anchors:
    - "CLAUDE.md §Engineering & Delivery Authority (REVISED 2026-04-14)"
    - "CLAUDE.md §Engineering Execution Doctrine"
    - ".claude/rules/security-baseline.md"

subscription:
  target_count: 1
  canonical:
    name: Microsoft Azure Sponsorship
    id: eba824fb-332d-4623-9dfb-2c9f7ee83f4e
    offer: MS-AZR-0036P
    directory: Default Directory (insightpulseai.com)
  deprecated:
    - id: 536d8cf6-89e1-4815-aef3-d5f2c5f4d070
      name: Azure subscription 1
      status: migration_in_progress_2026-04-15
      target: consolidate_to_sponsored

resource_groups:
  target_count: 7
  canonical:
    - name: rg-ipai-shared
      plane: shared
      purpose: ACR, shared Key Vault, shared managed identities
    - name: rg-ipai-dev-network
      plane: network
      purpose: VNet, private DNS, NSG, private endpoints
    - name: rg-ipai-dev-observability
      plane: observability
      purpose: Log Analytics, App Insights, action groups, alerts
    - name: rg-ipai-dev-odoo-runtime
      plane: transaction
      purpose: ACA env, Odoo apps and jobs
    - name: rg-ipai-dev-odoo-data
      plane: transaction-data
      purpose: Postgres Flex, runtime storage
    - name: rg-ipai-dev-agent-ai
      plane: agent
      purpose: Foundry, AI Search, Doc Intelligence, Language if used
    - name: rg-ipai-dev-data-intel
      plane: data-intelligence
      purpose: Databricks, access connector, Purview, lake storage
  rationalize:
    - pattern: 12+ ad-hoc RGs observed today
      action: consolidate_into_canonical_7
    - pattern: RGs with mixed planes
      action: split_by_plane
    - pattern: RGs without owner_plane tag
      action: tag_or_delete

# ---------------------------------------------------------------------------
# Governance / control-plane BOM
# ---------------------------------------------------------------------------
governance:
  tagging:
    ref: ssot/azure/tagging-standard.yaml
    bicep_module: infra/azure/tags/main.bicep
    enforcement: Azure Policy + Bicep validation
  policy:
    required:
      - tag_compliance         # from tagging-standard.yaml
      - allowed_locations      # southeastasia, eastus2
      - allowed_skus           # listed per resource type
      - deny_risky_drift       # no portal-only infra changes
  rbac:
    model: Entra groups + managed identities
    principle: least_privilege
    workload_identity: managed_identity_first
    service_principal_exceptions: documented_in_repo
  key_management:
    canonical_vault: kv-ipai-dev
    rg: rg-ipai-shared
    target_count: 1
    secrets_policy: .claude/rules/security-baseline.md

# ---------------------------------------------------------------------------
# Odoo transaction-plane BOM
# ---------------------------------------------------------------------------
odoo_plane:
  runtime:
    aca_environment:
      target_count: 1
      canonical_name: ipai-odoo-dev-env-v2
      rg: rg-ipai-dev-odoo-runtime
    odoo_web_container_app:
      target_count: 1
      canonical_name: ipai-odoo-dev-web
    jobs:
      target_count: 1-3
      canonical: init/migration + optional worker jobs
  registry:
    target_count: 1
    canonical: acripaiodoo.azurecr.io
    rg: rg-ipai-shared
  database:
    target_count: 1
    canonical: pg-ipai-odoo
    rg: rg-ipai-dev-odoo-data
    type: Azure PostgreSQL Flexible Server
    version: 16
  storage:
    target_count: 1-2
    purpose: runtime file artifacts only
    rationalize: merge_overlapping_accounts
  network:
    target_count: 1
    vnet: canonical only
    private_dns: canonical only
    private_endpoints: where_needed_only
  monitoring:
    app_insights: 1
    log_analytics: 1
    scope: odoo_lane

# ---------------------------------------------------------------------------
# Agent / Foundry plane BOM
# ---------------------------------------------------------------------------
agent_plane:
  foundry_resource:
    target_count: 1
    canonical_name: ipai-copilot-resource
    rg: rg-data-intel-ph   # current; target rg-ipai-dev-agent-ai
    region: eastus2
  foundry_project:
    target_count: 1
    canonical_name: proj-ipai-copilot
    status: pending_creation
  model_deployments:
    canonical:
      - name: gpt-4.1
        status: live
      - name: text-embedding-3-small
        status: live
      - name: w9-pulser
        base_model: gpt-4o-mini
        status: live
      - name: claude-sonnet-4-6
        status: pending_quota_grant
  connections:
    required:
      - app_insights
      - ai_search
      - storage
    order: add_in_declared_order
  tools:
    mode: per_agent_enablement
    never: globally_enabled
    canonical_mcps:
      - azure
      - azure_devops
      - postgresql
      - foundry
      - ai_search
  deferred:
    - durable_state
    - cache_redis

# ---------------------------------------------------------------------------
# Data-intelligence plane BOM
# ---------------------------------------------------------------------------
data_intelligence_plane:
  databricks_workspace:
    target_count: 1
    canonical_name: dbw-ipai-dev
    rg: rg-ipai-dev-data-intel
  governance:
    unity_catalog: required
    catalogs_schemas: defined_in_repo
  storage:
    adls_lake: 1
    role: bronze_silver_gold
  access_connector:
    target_count: 1
  ai_search:
    target_count: 1
    purpose: grounded_retrieval
  purview:
    required_if_actively_used: true
  event_hubs:
    required_if_streaming: true
  semantic_consumption:
    fabric_power_bi: add_when_consumer_path_real
  rules:
    - no_writeback_to_operational_truth
    - bronze_silver_gold_path_clear
    - semantic_serving_separate_from_engineering

# ---------------------------------------------------------------------------
# Observability BOM
# ---------------------------------------------------------------------------
observability:
  log_analytics:
    target_count: 1_per_environment_lane
    rationalize: consolidate_fragmented_workspaces
  app_insights:
    target_count: 1_per_major_app_surface
    canonical_surfaces:
      - odoo
      - agent
      - web_control_plane
  action_groups:
    target_count: 1-2
    canonical: standard_action_groups
  alerts:
    required:
      - budget
      - availability
      - queue_job_failure
      - db_health
      - agent_failure

# ---------------------------------------------------------------------------
# Delivery / IaC BOM
# ---------------------------------------------------------------------------
delivery:
  iac_language:
    default: bicep
    standardize: true
  authoring:
    editor: vscode
    extension: bicep
  validation:
    local: azure_cli
    commands:
      - az bicep build
      - az deployment group what-if
      - az deployment group validate
  ci_cd:
    canonical: azure_pipelines
    forbidden:
      - github_actions
      - vercel
  contracts:
    required:
      - ssot/azure/bill-of-materials.yaml      # this file
      - ssot/azure/tagging-standard.yaml
      - ssot/foundry/runtime_inventory.yaml
      - ssot/governance/platform-authority-split.yaml
  drift_control:
    required:
      - azure_policy
      - what_if_before_deploy
      - tag_validation
      - contract_validation
  forbidden:
    - portal_only_changes
    - untagged_resources
    - resources_outside_canonical_rgs

# ---------------------------------------------------------------------------
# Keep / rationalize / add matrix
# ---------------------------------------------------------------------------
keep:
  - foundry_resource_plus_project
  - postgres_flexible_server
  - acr
  - databricks_workspace
  - ai_search
  - key_vault
  - core_vnets_private_dns
  - app_insights_log_analytics
  - event_hubs_purview_service_bus_if_actively_wired

rationalize:
  - too_many_storage_accounts_without_clear_role
  - too_many_log_analytics_workspaces
  - duplicate_or_unclear_runtime_rgs
  - placeholder_or_failed_aca_apps_or_jobs
  - any_resource_without_clear_owner_plane_and_tag_set

add_next:
  - canonical_tag_module_in_bicep        # infra/azure/tags/main.bicep
  - foundry_connection_inventory         # ssot/foundry/runtime_inventory.yaml
  - azure_pipelines_validation_for_bicep_tags_foundry_contract
  - finops_budget_anomaly_alerting_layer

