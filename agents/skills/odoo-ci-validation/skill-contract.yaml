version: 1
type: delivery_skill
family: odoo_sh_delivery
skill:
  name: odoo-ci-validation
  status: draft
  owner: odoo-developer
  purpose: >
    Validate CI pipeline status, test gate compliance, and build
    verification for Odoo CE 18 module changes via GitHub Actions.

  triggers:
    - PR opened or updated with module changes
    - CI pipeline failure on required status check
    - pre-merge validation request
    - build status verification after push

  inputs:
    - PR number or commit SHA
    - GitHub Actions workflow run status
    - required status check configuration
    - test output logs
    - build artifact status

  steps:
    - query GitHub Actions for workflow run status
    - verify all required status checks pass (lint, typecheck, test, build)
    - analyze test output for failures and classify per testing policy
    - check build artifact was produced successfully
    - verify no secret scanning alerts
    - validate module test coverage evidence exists
    - produce CI compliance report

  outputs:
    - ci_status
    - status_check_results
    - test_analysis
    - build_status
    - findings
    - blockers
    - evidence

  guardrails:
    - never skip required status checks
    - never mark CI as passing when any required check fails
    - never ignore test failures — classify per testing policy
    - never bypass pre-commit hooks (--no-verify)
    - bind to GitHub Actions CI, not Odoo.sh CI

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-delivery/odoo-ci-validation/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-sh-persona-model.md
  - agents/personas/odoo-developer.md
  - .claude/rules/testing.md
  - .github/workflows/
