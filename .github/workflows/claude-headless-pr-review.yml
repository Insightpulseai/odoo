name: Claude Headless — PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run schema-constrained PR review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p .review
          bash agent-platform/runtimes/claude-headless/scripts/review-pr.sh \
            "origin/${{ github.base_ref }}" \
            "HEAD" \
            .review/pr-review.json

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-review
          path: .review/pr-review.json

      - name: Post review summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('.review/pr-review.json', 'utf8'));
            const findings = (r.findings || []).map(f =>
              `- **[${f.severity}]** \`${f.file}${f.line ? ':' + f.line : ''}\` (${f.category}) — ${f.message}`
            ).join('\n') || '_No findings._';
            const body = `## Claude Headless — PR Review\n\n**Verdict:** ${r.verdict}\n\n${r.summary}\n\n### Findings\n${findings}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on block verdict
        run: |
          VERDICT=$(jq -r '.verdict' .review/pr-review.json)
          if [ "$VERDICT" = "block" ]; then
            echo "::error::PR review returned verdict=block"
            exit 1
          fi
