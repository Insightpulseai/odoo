trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  PYTHON_VERSION: '3.12'

jobs:
  - job: Validate_Codebase
    displayName: 'PR Validation & Linting'
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '$(PYTHON_VERSION)'
        displayName: 'Use Python $(PYTHON_VERSION)'

      - script: |
          python -m pip install --upgrade pip
          pip install black flake8
        displayName: 'Install Python Linters'

      - script: |
          # The exact same command used via VS Code tasks locally
          make lint
        displayName: 'Run Universal Linting via Make'

      - script: |
          make test
        displayName: 'Run Unit Tests'
