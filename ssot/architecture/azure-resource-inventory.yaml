  "infra":
    primary_resources:
      - vnet-ipai-dev-sea
      - private_endpoints (pe-ipai-dev-*)
      - public_dns_zones (insightpulseai.com, w9studio.net)
      - private_dns_zones
      - acae-ipai-dev-sea
      - acripaiodoo
      - monitoring_substrate
  "platform":
    primary_resources:
      - kv-ipai-dev-sea_references
      - managed_identity_bindings
      - environment_and_model_metadata
  "agent-platform":
    primary_resources:
      - ipai-copilot-resource
      - ipai-copilot
      - docai-ipai-dev
      - srch-ipai-dev-sea
      - redis-ipai-dev-sea
      - sigr-ipai-dev-sea
      - acs-ipai-dev-sea
      - id-ipai-dev-agent
      - id-ipai-dev-runtime
      - appi-ipai-dev-agent-sea
      - appi-ipai-dev-runtime-sea
