# ---------------------------------------------------------------------------
# Azure Tagging Standard — Target-State Contract
# ---------------------------------------------------------------------------
# Authority:    ssot/azure/tagging-standard.yaml (this file)
# Locked:       2026-04-15
# Doctrine:     Mandatory tag object applied by Bicep at subscription/RG/resource
#               scope. Bicep replaces existing tags unless explicitly preserved.
# Anchor:       https://learn.microsoft.com/azure/azure-resource-manager/bicep/scenarios-rg
# Supersedes:   Prior deprecated version + ssot/azure/tag-policy.yaml (consolidated here)
# ---------------------------------------------------------------------------

metadata:
  authority: ssot/azure/tagging-standard.yaml
  locked_at: 2026-04-15
  version: 2.0.0
  status: canonical
  subscription_id: eba824fb-332d-4623-9dfb-2c9f7ee83f4e
  subscription_name: "Microsoft Azure Sponsorship"
  tenant_id: 402de71a-87ec-4302-a609-fb76098d1da7
  companions:
    - ssot/azure/bill-of-materials.yaml
    - infra/azure/tags/main.bicep

# ---------------------------------------------------------------------------
# Required tags — every resource, RG, and subscription
# ---------------------------------------------------------------------------
required_tags:
  environment:
    type: enum
    values: [dev, staging, prod]
    description: Environment lane
  plane:
    type: enum
    values: [transaction, agent, data-intelligence, platform, observability, network, shared]
    description: Platform plane per feedback_four_plane_architecture_doctrine
  system:
    type: enum
    values: [odoo, pulser, fabric, databricks, shared, foundry, web]
    description: Logical system the resource belongs to
  owner:
    type: string
    default: jake
    description: Single accountable owner
  cost_center:
    type: string
    default: ipai
    description: FinOps allocation anchor
  managed_by:
    type: enum
    values: [bicep, terraform, portal_migration_temp, claude]
    target: bicep
    description: Control-plane tool managing the resource
  criticality:
    type: enum
    values: [low, medium, high]
    description: Incident priority
  data_classification:
    type: enum
    values: [internal, restricted, confidential, public]
    description: Data sensitivity
  lifecycle:
    type: enum
    values: [experimental, active, legacy]
    description: Lifecycle stage

# ---------------------------------------------------------------------------
# Optional tags (surface-specific)
# ---------------------------------------------------------------------------
optional_tags:
  product:
    description: "insightpulseai | w9studio | prismalab"
  domain:
    description: "insightpulseai.com | w9studio.net | prismalab.insightpulseai.com"
  workload:
    description: "marketing-site | booking | erp-runtime | foundry-agent | etc."
  deployed:
    description: ISO date resource was deployed
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
  compliance_scope:
    description: "bir-ph | gdpr | pci | none"

# ---------------------------------------------------------------------------
# Deprecated tag keys (normalize to canonical)
# ---------------------------------------------------------------------------
deprecated_tag_keys:
  - from: env
    to: environment
  - from: Environment
    to: environment
  - from: costCenter
    to: cost_center
  - from: costcenter
    to: cost_center
  - from: data-classification
    to: data_classification
  - from: app
    to: system
  - from: application
    to: system

# ---------------------------------------------------------------------------
# Canonical tag object (for Bicep import / API body)
# ---------------------------------------------------------------------------
canonical_tag_example:
  environment: dev
  plane: transaction
  system: odoo
  owner: jake
  cost_center: ipai
  managed_by: bicep
  criticality: medium
  data_classification: internal
  lifecycle: active
  product: insightpulseai
  domain: erp.insightpulseai.com
  workload: erp-runtime
  deployed: "2026-04-15"

# ---------------------------------------------------------------------------
# Azure Policy enforcement
# ---------------------------------------------------------------------------
policy_enforcement:
  mode: deny_on_create_without_required_tags
  scope: subscription
  policy_assignment_name: require-canonical-tags
  exemptions:
    - resource_type: Microsoft.Authorization/*
      reason: Azure-managed, cannot tag
    - resource_type: Microsoft.App/managedEnvironments/managedCertificates
      reason: Auto-created by ACA; tag post-create
      documented_in: docs/runbooks/zoho-bookings-to-odoo-cutover.md

# ---------------------------------------------------------------------------
# Bicep contract
# ---------------------------------------------------------------------------
bicep_contract:
  module: infra/azure/tags/main.bicep
  required_params:
    - environment
    - plane
    - system
    - owner
    - cost_center
    - criticality
    - data_classification
    - lifecycle
  behavior:
    - merge_not_replace_at_rg_scope
    - explicit_tag_preserve_for_resource_level
    - fail_pipeline_if_missing_required_tag
