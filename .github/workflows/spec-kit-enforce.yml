name: Spec Kit Enforce

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-spec-kit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Run Spec Bundle Checker
        run: python3 scripts/ci/check_spec_bundle.py
