# Canonical Entity Map — Cross-System Ownership Contract
# Extends: spec/schema/entities.yaml (v1)
# Purpose: Defines which system owns each entity class, sync targets, and conflict resolution.
# Consumers: CI gates, sync workers, architecture docs, onboarding.
#
# Rules:
#   - Each entity has exactly ONE owner system (source of truth).
#   - Sync is always initiated by the owner unless marked "bidirectional".
#   - Supabase ctrl.* schema is the integration hub, never a leaf.
#   - Databricks is read-only; it never writes back to source systems.
#   - Financial transactions MUST live in Odoo; no other system may own them.

version: 2
extends: spec/schema/entities.yaml

# ---------------------------------------------------------------------------
# Systems
# ---------------------------------------------------------------------------
systems:
  plane:
    role: "Project management & issue tracking"
    owned_entities:
      - projects
      - issues
      - cycles
      - modules
      - labels
      - views
    sync_targets:
      - odoo
      - supabase
    api_protocol: REST
    auth_method: api_key

  atomic_crm:
    role: "Customer relationship management"
    owned_entities:
      - contacts
      - companies
      - deals
      - activities
      - pipelines
      - deal_stages
      - contact_tags
    sync_targets:
      - odoo
      - plane
      - supabase
    api_protocol: REST
    auth_method: api_key

  shelf:
    role: "Asset & document management"
    owned_entities:
      - assets
      - kits
      - categories
      - custody_records
      - qr_codes
      - asset_check_in_out
    sync_targets:
      - odoo
      - supabase
    api_protocol: REST
    auth_method: api_key

  odoo:
    role: "ERP backbone -- finance, HR, operations"
    owned_entities:
      - chart_of_accounts
      - journal_entries
      - invoices
      - payments
      - employees
      - payroll
      - tax_returns
      - purchase_orders
      - bills
      - bank_reconciliation
      - products
      - inventory_moves
      - leave_requests
      - expense_reports
    sync_targets:
      - supabase
      - databricks
    api_protocol: XML-RPC
    auth_method: service_account

  supabase:
    role: "Integration hub -- identity map, sync state, real-time events"
    owned_entities:
      - identity_map
      - entity_links
      - sync_state
      - integration_events
      - user_profiles
      - org_memberships
    sync_targets: []   # Hub, not a leaf
    api_protocol: PostgREST
    auth_method: service_role_key

  databricks:
    role: "Analytics lakehouse -- gold tables, ML models, dashboards"
    owned_entities:
      - bronze_tables
      - silver_tables
      - gold_tables
      - ml_models
      - feature_stores
    sync_targets: []   # Read-only consumer
    api_protocol: SQL
    auth_method: service_principal

# ---------------------------------------------------------------------------
# Sync Rules  (per system pair)
# ---------------------------------------------------------------------------
sync_rules:
  # --- Plane --> Odoo ---
  plane_to_odoo:
    source: plane
    target: odoo
    direction: unidirectional        # Plane is owner
    entities:
      projects:
        odoo_model: project.project
        field_map:
          name: name
          description: description
          status: stage_id           # requires stage mapping
      issues:
        odoo_model: project.task
        field_map:
          title: name
          description: description
          priority: priority
          assignee: user_id          # requires identity_map lookup
    frequency: near_realtime         # webhook-driven
    conflict_resolution: source_wins
    error_handling: retry_3_then_dlq

  # --- Atomic CRM --> Odoo ---
  atomic_crm_to_odoo:
    source: atomic_crm
    target: odoo
    direction: bidirectional
    entities:
      contacts:
        odoo_model: res.partner
        field_map:
          name: name
          email: email
          phone: phone
          company_id: parent_id      # requires identity_map lookup
        sync_back_fields:
          - credit_limit
          - total_invoiced
      companies:
        odoo_model: res.partner
        filter: is_company=True
        field_map:
          name: name
          domain: website
          industry: industry_id
      deals:
        odoo_model: crm.lead
        field_map:
          name: name
          value: expected_revenue
          stage: stage_id
          contact_id: partner_id
    frequency: near_realtime
    conflict_resolution: source_wins
    error_handling: retry_3_then_dlq

  # --- Atomic CRM --> Plane ---
  atomic_crm_to_plane:
    source: atomic_crm
    target: plane
    direction: unidirectional
    entities:
      deals:
        plane_entity: projects
        trigger: deal_stage == "won"
        field_map:
          name: name
          company: description_prefix
          value: metadata.deal_value
    frequency: event_driven           # on deal won
    conflict_resolution: source_wins
    error_handling: retry_3_then_dlq

  # --- Shelf --> Odoo ---
  shelf_to_odoo:
    source: shelf
    target: odoo
    direction: unidirectional
    entities:
      assets:
        odoo_model: account.asset
        field_map:
          name: name
          category: category_id
          purchase_value: original_value
          purchase_date: date
      custody_records:
        odoo_model: stock.move
        field_map:
          asset_id: product_id       # requires identity_map lookup
          custodian: partner_id
          action: picking_type_id
    frequency: near_realtime
    conflict_resolution: source_wins
    error_handling: retry_3_then_dlq

  # --- All --> Supabase (hub) ---
  all_to_supabase:
    source: "*"
    target: supabase
    direction: unidirectional
    entities:
      identity_map:
        description: "Cross-system entity identity resolution"
      entity_links:
        description: "Bidirectional entity relationships"
      sync_state:
        description: "Sync cursors, watermarks, last-sync timestamps"
      integration_events:
        description: "Event log for all cross-system operations"
    frequency: on_every_sync
    conflict_resolution: append_only
    error_handling: log_and_alert

  # --- All --> Databricks ---
  all_to_databricks:
    source: "*"
    target: databricks
    direction: unidirectional        # Read-only consumer
    entities:
      bronze_tables:
        description: "Raw ingestion from all source systems"
      silver_tables:
        description: "Cleaned, normalized, deduplicated"
      gold_tables:
        description: "Aggregated KPIs, materialized views"
    frequency: scheduled_batch       # hourly or daily
    conflict_resolution: last_write_wins
    error_handling: retry_3_then_dlq

# ---------------------------------------------------------------------------
# Conflict Resolution Defaults
# ---------------------------------------------------------------------------
conflict_resolution:
  default: source_wins
  overrides:
    # CRM contacts synced back from Odoo get Odoo financial fields
    atomic_crm_to_odoo.contacts.sync_back: odoo_wins
    # Identity map is append-only, never overwritten
    all_to_supabase.identity_map: append_only

# ---------------------------------------------------------------------------
# Anti-Patterns (enforced by CI lint)
# ---------------------------------------------------------------------------
anti_patterns:
  - rule: "Never store financial transactions outside Odoo"
    affected_entities:
      - journal_entries
      - invoices
      - payments
      - bank_reconciliation
      - tax_returns
    forbidden_systems:
      - plane
      - atomic_crm
      - shelf
      - supabase
      - databricks    # read-only copy is allowed via bronze/silver/gold

  - rule: "Never use Supabase as a leaf sync target for business data"
    description: "Supabase ctrl.* is the integration hub. Business records belong in their owner system."

  - rule: "Never write back to Databricks source systems"
    description: "Databricks is a read-only analytics consumer."

  - rule: "Never store PII in Databricks bronze tables without pseudonymization"
    description: "PII must be hashed or tokenized before landing in bronze."

  - rule: "Never bypass identity_map for cross-system references"
    description: "All foreign keys across system boundaries must resolve via ctrl.identity_map."
