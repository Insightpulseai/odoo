# ============================================================================
# VMOKRAPI — Strategic Goals
# ============================================================================

vision: >
  InsightPulseAI becomes the leading AI-assisted operational platform for
  SMEs running Odoo on Azure in Southeast Asia — displacing D365 Finance
  at a fraction of the cost.

mission: >
  Deliver Pulser for Odoo — a policy-gated AI copilot that automates
  finance operations, BIR compliance, and project control for Philippine
  SMEs and professional services firms on Odoo Community Edition + Azure.

objectives:
  O1:
    statement: "Publish a transactable SaaS offer on Microsoft Marketplace by Q3 2026"
    measure: "Offer live and purchasable on Azure Marketplace"
    target_date: "2026-09-01"
    sprint: R3-S09
    status: not_started

  O2:
    statement: "Acquire 10 paying customers by end of ISV Success Year 1"
    measure: "10 tenants with active subscriptions generating MBS"
    target_date: "2027-03-31"
    status: not_started

  O3:
    statement: "Achieve $47K ARR (Base scenario) by Mar 2027"
    measure: "Marketplace Billed Sales TTM"
    target_date: "2027-03-31"
    status: not_started

  O4:
    statement: "Reach Solutions Partner Data & AI qualification (70+ points)"
    measure: "Partner Center scoring dashboard"
    target_date: "2027-06-30"
    status: not_started

  O5:
    statement: "Achieve 80% D365 Finance functional parity on CE 18 + OCA + Pulser"
    measure: "Capability matrix coverage vs D365 Finance feature set"
    target_date: "2026-12-15"
    sprint: R4-S16
    status: "35-45% current"

key_result_areas:
  KRA1:
    name: "Marketplace Revenue"
    owner: Jake Tolentino
    weight: 30
    objectives: [O2, O3]

  KRA2:
    name: "Product Readiness"
    owner: Jake Tolentino
    weight: 25
