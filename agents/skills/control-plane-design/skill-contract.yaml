id: control-plane-design
name: Control Plane Design
version: 0.1.0
type: benchmark_skill
classification: capability_uplift
family: azure-saas-mt
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design the SaaS control plane for tenant management, covering tenant catalog,
  configuration management, health monitoring, admin portal, and API design.

triggers:
  - "Building a new multi-tenant SaaS platform"
  - "Tenant management is ad-hoc or manual"
  - "Need centralized visibility into all tenants"
  - "Scaling beyond what manual tenant management supports"

inputs:
  - tenant_count: "Current and projected tenant count"
  - management_operations: "Required tenant management actions (CRUD, suspend, migrate)"
  - integration_points: "Systems the control plane must integrate with"
  - admin_personas: "Platform admin, tenant admin, support engineer"
  - api_consumers: "Internal automation, partner integrations, admin portal"

steps:
  - "Design tenant catalog schema (source of truth for all tenant metadata)"
  - "Define configuration management for tenant-specific settings"
  - "Design health monitoring aggregation across all tenants"
  - "Build admin portal for tenant management operations"
  - "Design control plane API with authentication and rate limiting"
  - "Implement audit logging for all control plane operations"

outputs:
  - tenant_catalog_schema: "Database schema for tenant metadata and state"
  - config_management: "How tenant configuration is stored, versioned, and applied"
  - health_aggregation: "Per-tenant health status rollup and alerting"
  - admin_portal_design: "Admin UI wireframes and feature list"
  - api_specification: "OpenAPI spec for control plane API"
  - audit_design: "Audit log schema and retention policy"

guardrails:
  - "Tenant catalog is the single source of truth for tenant state"
  - "All tenant mutations must go through the control plane API"
  - "Control plane must be in a separate fault domain from tenant workloads"
  - "Admin portal access must require MFA and be audit-logged"

evidence:
  - "All tenant state queries resolved from catalog"
  - "Tenant CRUD operations complete via API with audit trail"
  - "Control plane operational when tenant stamps are down"

dependencies:
  - saas-resource-organization
  - tenant-provisioning-design

evals:
  - scenario: "Tenant stamp is down"
    pass: "Control plane operational, shows tenant as unhealthy"
  - scenario: "Admin suspends a tenant"
    pass: "Tenant resources paused, API returns 403 for tenant users, audit logged"
  - scenario: "Control plane API rate limited"
    pass: "Excessive requests throttled, legitimate admin operations unaffected"

benchmark_source: "Azure SaaS Dev Kit Control Plane, Azure APIM"
