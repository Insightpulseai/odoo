name: Build and Publish n8n Custom Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'automations/n8n/custom-nodes/**'
      - 'docker/n8n/**'
    tags:
      - 'n8n-v*.*.*'
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DO: registry.digitalocean.com/insightpulseai
  IMAGE_NAME: n8n-custom
  N8N_VERSION: "1.23.0"

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  authenticate:
    name: "🔐 OIDC Authentication"
    runs-on: ubuntu-latest
    outputs:
      supabase_token: ${{ steps.auth.outputs.token }}
    steps:
      - name: Get OIDC Token
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=insightpulseai-odoo" \
            | jq -r '.value')
          echo "::add-mask::$OIDC_TOKEN"
          echo "oidc_token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Exchange for Supabase Token
        id: auth
        run: |
          SUPABASE_TOKEN=$(curl -X POST \
            "${{ secrets.SUPABASE_URL }}/auth/v1/token?grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d "{\"assertion\": \"${{ steps.oidc.outputs.oidc_token }}\"}" \
            | jq -r '.access_token')
          echo "::add-mask::$SUPABASE_TOKEN"
          echo "token=$SUPABASE_TOKEN" >> $GITHUB_OUTPUT

  build-and-push:
    name: "🐳 Build and Push n8n Custom Image"
    runs-on: self-hosted
    needs: authenticate
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.N8N_VERSION }}
            type=raw,value=${{ env.N8N_VERSION }}-{{sha}}
            type=semver,pattern={{version}},prefix=n8n-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=n8n Custom
            org.opencontainers.image.description=n8n with InsightPulse AI custom nodes
            com.insightpulseai.n8n.version=${{ env.N8N_VERSION }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/n8n/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            N8N_VERSION=${{ env.N8N_VERSION }}

  security-scan:
    name: "🔍 Security Scan"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.N8N_VERSION }}-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

#      - name: Upload results
#        uses: github/codeql-action/upload-sarif@v2
#        with:
#          sarif_file: 'trivy-results.sarif'

  notify:
    name: "📢 Notifications"
    runs-on: ubuntu-latest
    needs: [authenticate, build-and-push, security-scan]
    if: always()
    steps:
      - name: Notify Slack
        env:
          SUPABASE_TOKEN: ${{ needs.authenticate.outputs.supabase_token }}
        run: |
          SLACK_BOT_TOKEN=$(curl -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_workflow_secrets" \
            -H "Authorization: Bearer $SUPABASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"workflow_name": "docker-build-n8n"}' \
            | jq -r '.SLACK_BOT_TOKEN')

          STATUS_EMOJI="✅"
          if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            STATUS_EMOJI="❌"
          fi

          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C06DEPLOYMENTS\",
              \"text\": \"$STATUS_EMOJI **n8n Custom Image Build**\n\n**Image**: \\\`${{ env.IMAGE_NAME }}:${{ env.N8N_VERSION }}-${{ github.sha }}\\\`\n**Status**: ${{ needs.build-and-push.result }}\"
            }"
