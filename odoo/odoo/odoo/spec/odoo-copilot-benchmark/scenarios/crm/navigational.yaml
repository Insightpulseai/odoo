# CRM — Navigational Benchmark Scenarios
# Capability class: navigational (direct user to views, records, configurations)

scenarios:
  - id: "BM-CRM-N-001"
    domain: crm
    capability_class: navigational
    persona: sales_rep
    prompt: "Show me my open opportunities"
    expected_behavior:
      type: navigate
      model: crm.lead
      action_id: "crm.crm_lead_all_pipeline"
      view_type: kanban
      domain_filter: [["type", "=", "opportunity"], ["user_id", "=", "uid"]]
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
    soft_scores:
      completeness: { weight: 0.35 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 3000, weight: 0.10 }
    tags: [crm, pipeline, kanban]

  - id: "BM-CRM-N-002"
    domain: crm
    capability_class: navigational
    persona: sales_mgr
    prompt: "Open the CRM pipeline analysis report"
    expected_behavior:
      type: navigate
      model: crm.lead
      view_type: pivot
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
    soft_scores:
      completeness: { weight: 0.35 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 3000, weight: 0.10 }
    tags: [crm, reporting, pivot]

  - id: "BM-CRM-N-003"
    domain: crm
    capability_class: navigational
    persona: sales_mgr
    prompt: "Go to the CRM configuration for pipeline stages"
    expected_behavior:
      type: navigate
      model: crm.stage
      action_id: "crm.crm_stage_action"
      view_type: list
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
    soft_scores:
      completeness: { weight: 0.35 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 3000, weight: 0.10 }
    tags: [crm, configuration, stages]
