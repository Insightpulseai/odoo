# =============================================================================
# Spec-to-Issues Pipeline — Azure DevOps
# =============================================================================
# Parses spec/*/tasks.md on changes and creates GitHub Issues for open tasks.
# Calls the spec-to-issues Azure Function (platform/services/spec-to-issues/).
#
# Trigger: Changes to spec/*/tasks.md on main branch
# Service connection: sc-azure-dev-platform
# Variable group: vg-ipai-platform-secrets (GITHUB_TOKEN, SPEC_FUNCTION_URL)
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - spec/*/tasks.md

pr: none  # Only run on merge to main

variables:
  - group: vg-ipai-platform-secrets

pool:
  vmImage: ubuntu-latest

stages:
  - stage: ParseAndCreateIssues
    displayName: Spec → GitHub Issues
    jobs:
      - job: SpecToIssues
        displayName: Parse tasks.md and create issues
        steps:
          - checkout: self
            fetchDepth: 2  # Need diff against previous commit

          - script: |
              # Find which spec/*/tasks.md files changed in this push
              CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'spec/*/tasks.md' 2>/dev/null || echo "")
              if [ -z "$CHANGED" ]; then
                echo "No tasks.md changes detected"
                echo "##vso[task.setvariable variable=specFiles]"
                exit 0
              fi
              echo "Changed spec files:"
              echo "$CHANGED"
              echo "##vso[task.setvariable variable=specFiles]$CHANGED"
            displayName: Detect changed spec tasks

          - script: |
              if [ -z "$(specFiles)" ]; then
                echo "No spec files to process — skipping"
                exit 0
              fi

              IFS=$'\n'
              for TASKS_FILE in $(specFiles); do
                # Extract spec name from path: spec/<name>/tasks.md
                SPEC_NAME=$(echo "$TASKS_FILE" | sed 's|spec/||;s|/tasks.md||')
                echo "Processing spec: $SPEC_NAME"

                # Read tasks.md content
                TASKS_CONTENT=$(cat "$TASKS_FILE")

                # Call the Azure Function
                RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                  "$(SPEC_FUNCTION_URL)" \
                  -H "Content-Type: application/json" \
                  -H "x-functions-key: $(SPEC_FUNCTION_KEY)" \
                  -d "$(python3 -c "
import json, sys
content = open('$TASKS_FILE').read()
print(json.dumps({
    'spec_name': '$SPEC_NAME',
    'tasks_md': content,
    'assignee': '$(COPILOT_ASSIGNEE)',
}))
")")

                HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                BODY=$(echo "$RESPONSE" | head -n -1)

                echo "HTTP $HTTP_CODE"
                echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

                if [ "$HTTP_CODE" -ge 400 ]; then
                  echo "##vso[task.logissue type=warning]Failed to process spec: $SPEC_NAME (HTTP $HTTP_CODE)"
                fi
              done
            displayName: Create GitHub Issues from spec tasks
            env:
              SPEC_FUNCTION_URL: $(SPEC_FUNCTION_URL)
              SPEC_FUNCTION_KEY: $(SPEC_FUNCTION_KEY)
              COPILOT_ASSIGNEE: $(COPILOT_ASSIGNEE)
