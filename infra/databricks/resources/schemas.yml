# Schema and Table Definitions

resources:
  schemas:
    bronze:
      name: bronze
      catalog_name: ${var.catalog}
      comment: "Raw data layer - stores unmodified source data"

    silver:
      name: silver
      catalog_name: ${var.catalog}
      comment: "Cleaned and normalized data layer"

    gold:
      name: gold
      catalog_name: ${var.catalog}
      comment: "Business-ready data marts and aggregations"

# Tables created by DLT pipelines (proven 2026-03-21):
#
# dev_ppm.bronze.raw_projects          — Seed project records
# dev_ppm.bronze.raw_budget_lines      — Seed budget line items
# dev_ppm.bronze.projects              — Cleansed projects (DLT expectations)
# dev_ppm.bronze.budget_lines          — Cleansed budget lines (DLT expectations)
# dev_ppm.bronze.project_budget_summary — Budget vs actual aggregates (gold)
