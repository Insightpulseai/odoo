name: Validate Secrets Usage

on:
  push:
    branches:
      - main
    paths:
      - 'ssot/secrets/**'
      - '.github/workflows/**'
      - 'scripts/ci/validate_secrets_usage.py'
      - 'scripts/ci/check_secrets_ssot.py'
  pull_request:
    paths:
      - 'ssot/secrets/**'
      - '.github/workflows/**'
      - 'scripts/ci/validate_secrets_usage.py'
      - 'scripts/ci/check_secrets_ssot.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-registry:
    name: Validate Secrets Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate registry schema
        run: |
          python scripts/ci/check_secrets_ssot.py --repo-root .

      - name: Validate inventory (if exists)
        if: hashFiles('ssot/secrets/inventory.yaml') != ''
        run: |
          python scripts/ci/check_secrets_ssot.py --repo-root . --check-inventory

  validate-usage:
    name: Validate Workflow Secrets Usage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scan

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate secrets usage
        run: |
          python scripts/ci/validate_secrets_usage.py --repo-root .

      - name: Generate evidence
        if: always()
        run: |
          EVIDENCE_DIR="web/docs/evidence/$(date +%Y%m%d-%H%M+0800)/secrets-validation/logs"
          mkdir -p "$EVIDENCE_DIR"

          # Capture validation output
          python scripts/ci/validate_secrets_usage.py --repo-root . > "$EVIDENCE_DIR/validation.log" 2>&1 || true
          python scripts/ci/check_secrets_ssot.py --repo-root . > "$EVIDENCE_DIR/registry-check.log" 2>&1 || true

          # Generate summary
          cat > "$EVIDENCE_DIR/summary.json" <<EOF
          {
            "workflow": "validate-secrets-usage",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "status": "${{ job.status }}",
            "logs": [
              "validation.log",
              "registry-check.log"
            ]
          }
          EOF

          echo "Evidence saved to: $EVIDENCE_DIR"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-validation-evidence
          path: web/docs/evidence/
          retention-days: 30

  detect-hardcoded-secrets:
    name: Detect Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Scan for hardcoded secrets
        run: |
          python scripts/ci/validate_secrets_usage.py --repo-root . | tee hardcoded-check.log

          # Check if hardcoded secrets were detected
          if grep -q "Potential hardcoded secrets detected" hardcoded-check.log; then
            echo "::error::Hardcoded secrets detected in workflows"
            exit 1
          fi

  cross-reference:
    name: Cross-Reference Registry and Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Cross-reference secrets
        run: |
          python scripts/ci/validate_secrets_usage.py --repo-root .

          echo "## Secrets Cross-Reference Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates that all workflow secret references are registered in ssot/secrets/registry.yaml" >> $GITHUB_STEP_SUMMARY

  all-checks:
    name: All Secrets Validation Checks
    runs-on: ubuntu-latest
    needs:
      - validate-registry
      - validate-usage
      - detect-hardcoded-secrets
      - cross-reference
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.validate-registry.result }}" != "success" ] || \
             [ "${{ needs.validate-usage.result }}" != "success" ] || \
             [ "${{ needs.detect-hardcoded-secrets.result }}" != "success" ] || \
             [ "${{ needs.cross-reference.result }}" != "success" ]; then
            echo "::error::Secrets validation failed"
            exit 1
          fi
          echo "::notice::All secrets validation checks passed"
