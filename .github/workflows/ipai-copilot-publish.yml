name: "IPAI Copilot — Publish Agent"
# Trigger modes:
#   push → validate-only (runs 'validate' job on every push to main)
#   workflow_dispatch → validate + publish + smoke (manual trigger required for Foundry deployment)

on:
  push:
    branches: [main]
    paths:
      - "agents/foundry/ipai-odoo-copilot-azure/**"
      - "scripts/foundry/**"
      - "ssot/foundry/ipai-copilot.yaml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Foundry changes)"
        type: boolean
        default: true
      skip_eval:
        description: "Skip eval suite"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # For OIDC auth to Azure

jobs:
  validate:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tool definitions JSON
        run: |
          python3 -c "
          import json
          data = json.load(open('agents/foundry/ipai-odoo-copilot-azure/tool-definitions.json'))
          tools = data.get('tools', [])
          for t in tools:
              fn = t['function']
              assert 'name' in fn, f'Missing name: {t}'
              assert 'description' in fn, f'Missing description: {fn[\"name\"]}'
              assert 'parameters' in fn, f'Missing parameters: {fn[\"name\"]}'
          print(f'Validated {len(tools)} tools')
          "

      - name: Validate required artifacts exist
        run: |
          for f in \
            agents/foundry/ipai-odoo-copilot-azure/system-prompt.md \
            agents/foundry/ipai-odoo-copilot-azure/tool-definitions.json \
            agents/foundry/ipai-odoo-copilot-azure/metadata.yaml \
            agents/foundry/ipai-odoo-copilot-azure/guardrails.md \
            ssot/foundry/ipai-copilot.yaml; do
            [ -f "$f" ] && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate SSOT YAML
        run: |
          python3 -c "
          import yaml
          with open('ssot/foundry/ipai-copilot.yaml') as f:
              data = yaml.safe_load(f)
          assert data['runtime']['resource_name'] == 'ipai-copilot-resource', 'Wrong resource'
          assert data['lifecycle']['stage'] in ('building', 'publishing', 'live'), 'Invalid stage'
          print('SSOT valid')
          "

  publish:
    name: Publish to Foundry
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync Agent to Foundry
        env:
          AZURE_AI_FOUNDRY_OPENAI_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_OPENAI_ENDPOINT }}
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          AZURE_AI_FOUNDRY_AGENT_ID: ${{ secrets.AZURE_AI_FOUNDRY_AGENT_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 scripts/foundry/sync_agent.py --dry-run
          else
            python3 scripts/foundry/sync_agent.py
          fi

  smoke:
    name: Smoke Tests
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == false
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Run Smoke Tests
        env:
          AZURE_AI_FOUNDRY_OPENAI_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_OPENAI_ENDPOINT }}
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          AZURE_AI_FOUNDRY_AGENT_ID: ${{ secrets.AZURE_AI_FOUNDRY_AGENT_ID }}
        run: bash scripts/foundry/smoke_test.sh
