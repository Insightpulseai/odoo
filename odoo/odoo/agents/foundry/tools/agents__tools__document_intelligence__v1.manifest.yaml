# agents__tools__document_intelligence__v1.manifest.yaml
apiVersion: ipai.tool/v1
kind: ToolManifest
metadata:
  name: document-intelligence-extract
  version: "1.0.0"
  description: "Extract structured data from documents using Azure AI Document Intelligence"
  owner: platform-team
  last_updated: "2026-03-16"

spec:
  provider: azure
  service: Azure AI Document Intelligence
  resource: docai-ipai-dev
  region: southeastasia

  authentication:
    method: managed_identity
    key_vault: kv-ipai-dev
    secret_name: docai-ipai-dev-key

  models:
    prebuilt-invoice:
      description: "Extract vendor bill / invoice fields"
      document_classes: [vendor_bill]
      key_fields: [VendorName, InvoiceId, InvoiceDate, DueDate, InvoiceTotal, Items, TaxDetails]
    prebuilt-receipt:
      description: "Extract expense receipt fields"
      document_classes: [receipt]
      key_fields: [MerchantName, TransactionDate, Total, Subtotal, TotalTax, Items]
    prebuilt-layout:
      description: "Extract document structure (tables, paragraphs, sections)"
      document_classes: [contract, bank_statement, tax_document]
      key_fields: [tables, paragraphs, sections, key_value_pairs]
    prebuilt-read:
      description: "OCR text extraction"
      document_classes: [policy_document]
      key_fields: [content, pages, languages]

  output_envelope:
    format: normalized_extraction_envelope
    schema:
      document_id: { type: string, description: "Unique extraction ID" }
      document_class: { type: string, description: "Classified document type" }
      confidence: { type: number, description: "Overall extraction confidence 0-1" }
      fields: { type: object, description: "Extracted key-value fields" }
      tables: { type: array, description: "Extracted table data" }
      review_required: { type: boolean, description: "True if confidence below threshold" }
      raw_response: { type: object, description: "Full Document Intelligence response" }

  rate_limits:
    requests_per_second: 15
    pages_per_request: 2000
    concurrent_requests: 10
