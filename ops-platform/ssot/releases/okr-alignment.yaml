# ============================================================
# OKR ALIGNMENT LAYER
# ============================================================
# Maps release governance to OKR methodology.
# Replaces Viva Goals (retired Dec 31, 2025) with native
# tracking through Ops Console + ADO integration.
# Last updated: 2026-03-15
# ============================================================

schema_version: "1.0"
alignment_id: okr-alignment
replaces: "Microsoft Viva Goals (retired 2025-12-31)"

# ----------------------------------------------------------
# Why this exists
# ----------------------------------------------------------
# Viva Goals provided:
#   - OKR hierarchy (org → team → individual)
#   - Check-in cadence
#   - Integration with ADO, Jira, Tableau, Power BI
#   - Dashboards and rhythm-of-business reporting
#
# All of these capabilities are now handled by:
#   - Release governance YAMLs (this repo)
#   - Ops Console (R3)
#   - ADO integration (R4)
#   - Tableau/BI connector (R5)
# ----------------------------------------------------------

# ----------------------------------------------------------
# Objective 1: Ship Internal Agent Platform
# ----------------------------------------------------------
objectives:

  - id: O1
    objective: "Ship internal agent platform with governance"
    owner: ai_team
    time_bound: "2026-Q2"
    key_results:

      - id: O1-KR1
        description: "All governance YAMLs merged and CI-enforced"
        measure: binary
        target: true
        current: false
        source_release: R0
        check_in_cadence: weekly
        data_source: github_ci
        tracking_query: "CI policy compliance passing on every PR"

      - id: O1-KR2
        description: "3+ internal users querying Odoo Copilot daily"
        measure: count
        target: 3
        current: 0
        source_release: R1
        check_in_cadence: weekly
        data_source: app_insights
        tracking_query: "distinct_users(odoo_copilot, period=daily) >= 3"

      - id: O1-KR3
        description: "Smoke evals green for 5 consecutive days"
        measure: streak_days
        target: 5
        current: 0
        source_release: R1
        check_in_cadence: daily
        data_source: eval_pipeline
        tracking_query: "consecutive_green_days(smoke_evals) >= 5"

  - id: O2
    objective: "Deliver workflow automation with audit trails"
    owner: ai_team
    time_bound: "2026-Q2"
    key_results:

      - id: O2-KR1
        description: "Invoice extraction accuracy > 90% on test set"
        measure: percentage
        target: 90
        current: 0
        source_release: R2
        check_in_cadence: biweekly
        data_source: eval_pipeline
        tracking_query: "extraction_accuracy(finance_docflow, test_set) > 90"

      - id: O2-KR2
        description: "Review flow works end-to-end (submit → approve → post)"
        measure: binary
        target: true
        current: false
        source_release: R2
        check_in_cadence: biweekly
        data_source: manual_test
        tracking_query: "e2e_review_flow_passing"

      - id: O2-KR3
        description: "Single Ops Console screen answers: what exists, deployable, blocked"
        measure: binary
        target: true
        current: false
        source_release: R3
        check_in_cadence: biweekly
        data_source: ops_console
        tracking_query: "console_dashboard_complete"

  - id: O3
    objective: "Integrate with enterprise tooling and prepare packaging"
    owner: ai_team
    time_bound: "2026-Q2"
    key_results:

      - id: O3-KR1
        description: "Every staging promotion has release/work-item/test-evidence chain"
        measure: binary
        target: true
        current: false
        source_release: R4
        check_in_cadence: monthly
        data_source: ado_boards
        tracking_query: "promotion_traceability_complete"

      - id: O3-KR2
        description: "Tableau reads governed outputs, not raw internals"
        measure: binary
        target: true
        current: false
        source_release: R5
        check_in_cadence: monthly
        data_source: tableau_cloud
        tracking_query: "governed_metric_export_active"

      - id: O3-KR3
        description: "R6 packaging artifacts ready for Month 4 review"
        measure: binary
        target: true
        current: false
        source_release: R6
        check_in_cadence: monthly
        data_source: packaging_checklist
        tracking_query: "packaging_readiness_complete"

# ----------------------------------------------------------
# Check-in schedule (replaces Viva Goals rhythm)
# ----------------------------------------------------------
check_in_schedule:
  daily:
    - "Eval pipeline status (automated)"
    - "Agent health check (automated)"
  weekly:
    - "KR progress review (Ops Console dashboard)"
    - "Release lane status sync"
  biweekly:
    - "OKR check-in meeting"
    - "Promotion candidate review"
  monthly:
    - "Objective health assessment"
    - "Decision point review (per release-90day-plan.yaml)"
  quarterly:
    - "OKR scoring and retrospective"
    - "Next quarter OKR drafting"

# ----------------------------------------------------------
# Data source mapping (replaces Viva Goals integrations)
# ----------------------------------------------------------
data_sources:

  - id: github_ci
    type: automated
    description: "GitHub Actions CI status"
    replaces_viva_integration: "GitHub"
    available_now: true

  - id: eval_pipeline
    type: automated
    description: "Agent factory eval orchestration"
    replaces_viva_integration: null
    available_now: false
    available_at: R1

  - id: app_insights
    type: automated
    description: "Application telemetry and usage metrics"
    replaces_viva_integration: null
    available_now: false
    available_at: R1

  - id: ado_boards
    type: automated
    description: "Azure DevOps Boards work items and test plans"
    replaces_viva_integration: "Azure DevOps"
    available_now: false
    available_at: R4

  - id: tableau_cloud
    type: automated
    description: "Tableau governed metric layer"
    replaces_viva_integration: "Tableau"
    available_now: false
    available_at: R5

  - id: ops_console
    type: semi_automated
    description: "Ops Console dashboard (R3)"
    replaces_viva_integration: "Viva Goals Dashboard"
    available_now: false
    available_at: R3

  - id: manual_test
    type: manual
    description: "Manual test execution and signoff"
    replaces_viva_integration: null
    available_now: true

  - id: packaging_checklist
    type: manual
    description: "ARM template and portal UI readiness checklist"
    replaces_viva_integration: null
    available_now: true

# ----------------------------------------------------------
# OKR scoring rules
# ----------------------------------------------------------
scoring:
  method: "0.0 – 1.0 scale (Google-style)"
  thresholds:
    red: "< 0.3 — at risk, needs intervention"
    yellow: "0.3 – 0.7 — progressing, may need adjustment"
    green: "> 0.7 — on track or complete"
  sweet_spot: "0.6 – 0.7 indicates ambitious but achievable targets"
  scoring_cadence: quarterly
