id: rl-training-benchmarking
version: 1
status: active
classification: encoded_preference
owner: reinforcement-learning-architect
benchmark_source: "HF Deep RL Course"
implementation_source: "SB3, TensorBoard, Weights & Biases"

purpose: >
  Benchmark RL training runs with rigorous metrics, multiple seeds,
  and fair comparisons across algorithms and configurations.

inputs:
  - name: environment
    type: string
    required: true
  - name: algorithms
    type: list
    required: true
    description: "Algorithms to compare"
  - name: n_seeds
    type: integer
    default: 5
    description: "Number of random seeds per configuration"

outputs:
  - name: benchmark_report
    type: dict
    description: "Metrics per algorithm per seed"
  - name: learning_curves
    type: list
    description: "Return vs timesteps with confidence intervals"
  - name: comparison_table
    type: table
    description: "Summary statistics across algorithms"

constraints:
  - "Minimum 3 seeds per configuration (5 preferred)"
  - "Same evaluation protocol across all algorithms"
  - "Report both sample efficiency and wall-clock time"
  - "Include random baseline"

metrics:
  primary:
    - name: mean_eval_return
      description: "Mean return over evaluation episodes"
    - name: sample_efficiency
      description: "Timesteps to reach threshold return"
  secondary:
    - name: wall_clock_time
      description: "Training time in seconds"
    - name: final_return_std
      description: "Standard deviation across seeds"
    - name: training_stability
      description: "Monotonicity of smoothed learning curve"
  diagnostic:
    - name: value_loss
    - name: policy_loss
    - name: entropy
    - name: kl_divergence
    - name: clip_fraction
