id: rl-environment-selection
version: 1
status: active
classification: encoded_preference
owner: reinforcement-learning-architect
benchmark_source: "HF Deep RL Course — Intro to Deep RL"
implementation_source: "Gymnasium docs"

purpose: >
  Select and configure RL training environments appropriate for the problem,
  algorithm family, and available compute budget.

inputs:
  - name: problem_description
    type: text
    required: true
    description: "What the RL agent needs to learn"
  - name: action_space_type
    type: enum
    values: [discrete, continuous, multi-discrete, multi-binary]
    required: false
    description: "Preferred action space type, if known"
  - name: compute_budget
    type: enum
    values: [minimal, moderate, large]
    required: false
    description: "Available training compute"

outputs:
  - name: environment_id
    type: string
    description: "Gymnasium environment ID or custom env class"
  - name: wrapper_stack
    type: list
    description: "Ordered list of environment wrappers"
  - name: justification
    type: text
    description: "Why this environment fits the problem"

constraints:
  - "Prefer standard Gymnasium environments over custom"
  - "Custom environments must implement gymnasium.Env interface"
  - "Document reward structure and termination conditions"
  - "Specify observation and action space types explicitly"

dependencies:
  - gymnasium
  - numpy
