# =============================================================================
# Foundry Runtime PR Validation — platform/ci/foundry-runtime-pr.yml
# =============================================================================
# Replaces agent-platform/azure-pipelines-pr.yml.
# PR-only validation for platform/packages/apps changes.
# =============================================================================

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - platform/**
      - packages/**
      - apps/**

pool:
  vmImage: ubuntu-latest

jobs:
  - job: Validate
    displayName: 'PR Validation'
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '20.x'
        displayName: 'Use Node.js 20.x'

      - script: npm ci
        displayName: 'Install dependencies'

      - script: npm run build
        displayName: 'TypeScript build'

      - script: npm run test -w @ipai/builder-factory 2>/dev/null || echo "No tests configured"
        displayName: 'Run smoke tests'
