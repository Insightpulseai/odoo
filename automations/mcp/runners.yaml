version: 1
owner_repo: automations

jobs:
  - id: prod_verify
    description: Run production verification using platform checks and browser smoke
    tools:
      - azure
      - azure-devops
      - playwright
    outputs:
      - verification_json
      - screenshot_artifacts
      - evidence_index

  - id: evidence_pack
    description: Collect verification artifacts into auditable evidence bundle
    script: automations/scripts/evidence_pack.sh
    required_env:
      - BUILD_ID
    optional_env:
      - EVIDENCE_ROOT
      - OUTPUT_DIR
      - BASE_URL
    outputs:
      - evidence_pack_json
      - screenshots_dir
      - logs_dir
      - tarball

  - id: docs_grounding_refresh
    description: Refresh Microsoft reference grounding for operational docs
    tools:
      - microsoft-learn
    outputs:
      - source_snapshot
      - citation_index
