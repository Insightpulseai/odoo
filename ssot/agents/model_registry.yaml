    resource_group: rg-data-intel-ph
    region: eastus2
    context_window: 1048576
    max_output_tokens: 32768
    capabilities: [text, vision, tools, streaming]
    cost_tier: standard
    canonicality: canonical
    consumers:
      - ipai_odoo_copilot
      - pulser-odoo-ask
