# =============================================================================
# DNS cutover procedure (per hostname)
# =============================================================================
cutover_procedure:
  pre_cutover:
    - "Verify -azure test hostname healthy for >= stabilization_hours"
    - "Run synthetic transaction test against -azure hostname"
    - "Confirm rollback_target is valid and reachable"
    - "Notify stakeholders of impending cutover window"
  cutover:
    - "Update Cloudflare DNS: change A record to CNAME pointing at Front Door endpoint"
    - "Set Cloudflare proxy mode to DNS-only (grey cloud) for Front Door hostnames"
    - "Wait for DNS propagation (TTL flush — typically 5 minutes for proxied records)"
    - "Verify health_check_path returns 200 via production hostname"
  post_cutover:
    - "Monitor error rates for 1 hour"
    - "Run synthetic transaction test against production hostname"
    - "Update hostname status to 'cutover' in this file"
    - "Keep DO origin running for rollback_target duration (72h minimum)"
  rollback:
    - "Revert Cloudflare DNS to rollback_target (A record to 178.128.112.214)"
    - "Re-enable Cloudflare proxy (orange cloud)"
    - "Verify health_check_path returns 200 via production hostname"
    - "Update hostname status to 'rolled-back' in this file"
    - "File incident report in Plane"
