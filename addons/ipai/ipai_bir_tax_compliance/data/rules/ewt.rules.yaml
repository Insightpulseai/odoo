        EWT_RENT_WI170, EWT_RENT_WC170
      )

    output_bucket: EWT_TOTAL

    notes: "Total creditable expanded withholding tax"

# Legacy code mapping for backward compatibility
legacy_code_map:
  W010: WI010
  W020: WC020
  W030: WI030
  W040: WI040
  W157: [WI157, WC157]
  W158: [WI158, WC158]
  W161: WI161
  W169: [WI169, WC169]
  W170: [WI170, WC170]

metadata:
  version: 2.0.0
  effective_from: "2025-01-01"
  atc_namespace_reconciled: "2026-04-01"
  legal_basis:
    - "NIRC Section 57"
    - "RR 2-98 (Consolidated Withholding Tax Regulations)"
    - "RR 11-2018 (Updated ATC Master List)"
    - "RMC 25-2011 (Updated ATC Codes)"
  notes: |
    EWT rules match transactions to ATC codes and apply creditable withholding rates.
    These amounts are reported on BIR Form 1601-EQ (Quarterly) or 1601-C (Monthly for compensation).
    ATC codes use official BIR WI/WC namespace per RR 11-2018.
    Legacy W-series codes accepted for backward compatibility.
