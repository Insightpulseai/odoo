version: 1
namespace: ipai.odoo.expenses.expense_entities.v1
artifact_type: entity
repo_key: odoo
domain: expenses
subject: expense_entities

# =============================================================================
# Odoo Expense Entity Contract (Machine-Readable)
# =============================================================================
# Source: Odoo CE 18.0 data model (hr_expense module)
# Generated: 2026-03-15
# Do NOT hand-edit — regenerate from source code crawl
# =============================================================================

name: odoo-expense-entities
odoo_module_version: "18.0.1.0.0"
generated: "2026-03-15"
odoo_version: "18.0"
modules:
  - hr_expense
  - hr

entities:

  # ---------------------------------------------------------------------------
  # hr.expense — Individual Expense Lines
  # ---------------------------------------------------------------------------
  - model: hr.expense
    description: >
      Individual expense line items submitted by employees for reimbursement.
      Each expense records an amount, category, and optional receipt attachment.
      Expenses are grouped into expense sheets (hr.expense.sheet) for approval.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Expense description (e.g. "Client lunch", "Taxi to airport").
      - name: employee_id
        type: Many2one
        relation: hr.employee
        required: true
        description: Employee who incurred the expense.
      - name: product_id
        type: Many2one
        relation: product.product
        required: false
        description: Expense category product (e.g. Travel, Meals, Accommodation).
      - name: unit_amount
        type: Float
        required: true
        description: Unit price.
      - name: quantity
        type: Float
        required: true
        description: Quantity (default 1.0).
      - name: total_amount
        type: Monetary
        required: false
        description: Total amount (unit_amount * quantity, computed).
      - name: total_amount_company
        type: Monetary
        required: false
        description: Total in company currency (computed, handles multi-currency).
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: true
        description: Expense currency.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: date
        type: Date
        required: true
        description: Date the expense was incurred.
      - name: account_id
        type: Many2one
        relation: account.account
        required: false
        description: Expense account (defaults from product category).
      - name: tax_ids
        type: Many2many
        relation: account.tax
        required: false
        description: Taxes on the expense.
      - name: payment_mode
        type: Selection
        required: true
        description: "Who paid: own_account (employee, to reimburse) or company_account (company card)."
      - name: reference
        type: Char
        required: false
        description: Reference number (receipt number, etc.).
      - name: description
        type: Text
        required: false
        description: Additional notes or justification.
      - name: sheet_id
        type: Many2one
        relation: hr.expense.sheet
        required: false
        description: Parent expense report (assigned when submitted).
      - name: state
        type: Selection
        required: true
        description: "Status: draft, reported, approved, done, refused."
      - name: analytic_distribution
        type: Json
        required: false
        description: "Analytic distribution as JSON dict {analytic_account_id: percentage}."

    state_machine:
      initial: draft
      transitions:
        - from: draft
          to: reported
          method: action_submit_expenses
          description: Submit expense to an expense report (creates or adds to sheet).
        - from: reported
          to: approved
          method: approve_expense_sheets
          description: Manager approves the expense report (via sheet).
        - from: reported
          to: refused
          method: refuse_expense_sheets
          description: Manager refuses the expense report (via sheet).
        - from: approved
          to: done
          method: action_sheet_move_create
          description: Post journal entries for approved expenses (via sheet).
        - from: refused
          to: draft
          method: action_reset_expense_sheets
          description: Reset refused expenses back to draft (via sheet).

    key_methods:
      - name: action_submit_expenses
        description: Create or add to an expense sheet and submit for approval.
      - name: _get_default_expense_sheet_values
        description: Compute default values for creating a new expense sheet.

    common_filters:
      - name: my_expenses
        domain: "[('employee_id.user_id', '=', uid)]"
      - name: to_submit
        domain: "[('state', '=', 'draft'), ('sheet_id', '=', False)]"
      - name: reported
        domain: "[('state', '=', 'reported')]"
      - name: this_month
        domain: "[('date', '>=', context_today().strftime('%Y-%m-01'))]"

    access_groups:
      - group: hr_expense.group_hr_expense_team_approver
        description: Team approver — approve expenses for their team.
      - group: hr_expense.group_hr_expense_manager
        description: All approver — approve any expense report.
      - group: base.group_user
        description: Internal user — create own expenses.

  # ---------------------------------------------------------------------------
  # hr.expense.sheet — Expense Reports
  # ---------------------------------------------------------------------------
  - model: hr.expense.sheet
    description: >
      Expense report grouping multiple expense lines for a single employee.
      The sheet follows an approval workflow: submit, approve, post, pay.
      Journal entries are created when the sheet is posted.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Expense report name / summary.
      - name: employee_id
        type: Many2one
        relation: hr.employee
        required: true
        description: Employee submitting the report.
      - name: expense_line_ids
        type: One2many
        relation: hr.expense
        required: false
        description: Expense lines in this report.
      - name: state
        type: Selection
        required: true
        description: "Status: draft, submit, approve, post, done, cancel."
      - name: approval_date
        type: Date
        required: false
        description: Date the report was approved.
      - name: user_id
        type: Many2one
        relation: res.users
        required: false
        description: Manager who approved the report.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: true
        description: Currency.
      - name: total_amount
        type: Monetary
        required: false
        description: Total of all expense lines (computed).
      - name: amount_residual
        type: Monetary
        required: false
        description: Remaining amount to reimburse (computed).
      - name: payment_state
        type: Selection
        required: false
        description: "Payment status: not_paid, in_payment, paid, partial."
      - name: account_move_ids
        type: One2many
        relation: account.move
        required: false
        description: Generated journal entries.
      - name: journal_id
        type: Many2one
        relation: account.journal
        required: false
        description: Expense journal for posting.
      - name: payment_mode
        type: Selection
        required: false
        description: "Payment mode: own_account or company_account (from expense lines)."

    state_machine:
      initial: draft
      transitions:
        - from: draft
          to: submit
          method: action_submit_sheet
          description: Employee submits the report for approval.
        - from: submit
          to: approve
          method: approve_expense_sheets
          description: Manager approves the report.
        - from: submit
          to: cancel
          method: refuse_sheet
          description: Manager refuses the report.
        - from: approve
          to: post
          method: action_sheet_move_create
          description: Post journal entries for the approved report.
        - from: post
          to: done
          method: action_register_payment
          description: Register payment to employee (reimbursement).
        - from: cancel
          to: draft
          method: action_reset_expense_sheets
          description: Reset refused report back to draft.

    key_methods:
      - name: action_submit_sheet
        description: Submit the expense report for manager approval.
      - name: approve_expense_sheets
        description: Approve the expense report.
      - name: refuse_sheet
        description: Refuse the expense report with reason.
      - name: action_sheet_move_create
        description: Create journal entries for the approved report.
      - name: action_register_payment
        description: Register reimbursement payment to the employee.
      - name: action_reset_expense_sheets
        description: Reset report back to draft state.

    common_filters:
      - name: to_approve
        domain: "[('state', '=', 'submit')]"
      - name: approved
        domain: "[('state', '=', 'approve')]"
      - name: to_pay
        domain: "[('state', '=', 'post'), ('payment_state', '!=', 'paid')]"
      - name: my_reports
        domain: "[('employee_id.user_id', '=', uid)]"

    access_groups:
      - group: hr_expense.group_hr_expense_team_approver
        description: Team approver — approve team expense reports.
      - group: hr_expense.group_hr_expense_manager
        description: All approver — approve any expense report.
      - group: account.group_account_user
        description: Accountant — post journal entries for approved reports.

  # ---------------------------------------------------------------------------
  # hr.employee — Employee (Reference Entity)
  # ---------------------------------------------------------------------------
  - model: hr.employee
    description: >
      Employee record. Referenced by expense entities for employee identification,
      department, manager hierarchy, and bank account for reimbursement.
      Defined in the hr module (base HR).
    key_fields:
      - name: name
        type: Char
        required: true
        description: Employee name.
      - name: user_id
        type: Many2one
        relation: res.users
        required: false
        description: Linked Odoo user account.
      - name: department_id
        type: Many2one
        relation: hr.department
        required: false
        description: Department.
      - name: parent_id
        type: Many2one
        relation: hr.employee
        required: false
        description: Manager (direct supervisor).
      - name: expense_manager_id
        type: Many2one
        relation: res.users
        required: false
        description: Expense approver (if different from direct manager).
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: job_title
        type: Char
        required: false
        description: Job title.
      - name: work_email
        type: Char
        required: false
        description: Work email address.
      - name: bank_account_id
        type: Many2one
        relation: res.partner.bank
        required: false
        description: Bank account for salary/reimbursement payments.
      - name: active
        type: Boolean
        required: false
        description: Whether the employee record is active.

    key_methods:
      - name: action_open_expense_sheets
        description: View expense reports for this employee.

    common_filters:
      - name: active_employees
        domain: "[('active', '=', True)]"
      - name: my_department
        domain: "[('department_id', '=', user.employee_id.department_id.id)]"

    access_groups:
      - group: hr.group_hr_user
        description: HR Officer — manage employee records.
      - group: hr.group_hr_manager
        description: HR Manager — full access to all employees.
