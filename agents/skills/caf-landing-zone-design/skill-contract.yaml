version: 1
type: benchmark_skill
classification: encoded_preference
family: microsoft-caf
skill:
  name: caf-landing-zone-design
  id: caf-landing-zone-design
  version: "0.1.0"
  status: draft
  owner_persona: landing-zone-architect
  source_family: microsoft-caf
  benchmark_source: "Microsoft Cloud Adoption Framework"
  purpose: >
    Design Azure landing zone following CAF enterprise-scale architecture.
    Covers management group hierarchy, subscription topology, identity baseline,
    network topology, and platform automation foundations.

  triggers:
    - new Azure environment being provisioned
    - subscription topology review or restructuring
    - network architecture redesign
    - platform automation foundation being established
    - landing zone compliance audit

  inputs:
    - current subscription and resource group topology
    - network requirements (connectivity, segmentation, DNS)
    - identity requirements (Entra ID, RBAC, PIM)
    - compliance and regulatory requirements
    - IaC toolchain (Bicep, Terraform)

  steps:
    - assess current management group and subscription topology
    - design management group hierarchy aligned with CAF reference
    - define subscription topology (platform vs application subscriptions)
    - establish identity baseline (Entra ID, RBAC roles, Conditional Access)
    - design network topology (hub-spoke or VWAN)
    - configure DNS resolution strategy
    - define platform automation approach (Bicep modules, Azure Verified Modules)
    - establish shared services (logging, monitoring, security center)
    - document landing zone architecture with diagrams
    - validate against CAF landing zone review checklist

  outputs:
    - landing_zone_architecture
    - management_group_hierarchy
    - subscription_topology
    - network_design
    - identity_baseline
    - platform_automation_approach
    - shared_services_design

  guardrails:
    - "CAF is a benchmark reference, not a runtime dependency"
    - "Canonical stack remains Odoo CE + Azure Container Apps"
    - "A benchmark becomes integration only with explicit contract in docs/contracts/"
    - "Landing zone design must align with existing rg-ipai-* resource group conventions"
    - "Never propose management group changes without mapping to current topology"
    - "Network design must account for ACA ingress via Front Door"

  evidence:
    required: true
    format: "docs/evidence/{stamp}/caf/landing-zone/"

  evals:
    dimensions: [accuracy, completeness, security, scalability, evidence_quality]
    thresholds:
      accuracy: 0.95
      security: 0.95

cross_references:
  - agents/knowledge/benchmarks/microsoft-cloud-adoption-framework.md
  - agents/personas/landing-zone-architect.md
  - agents/skills/azure-deployment-ops/
  - .claude/rules/infrastructure.md
