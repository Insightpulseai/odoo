# ============================================================================
# G6 — Monitoring
# ============================================================================
# Gate ref: agent-factory-lifecycle.yaml → G6_monitoring
# Foundry primitive: Monitor AI apps + Azure Monitor
# Pass condition: Health, latency, failures, and cost visible in dashboards.
#   Alert rules configured.

g6_monitoring:

  # --- Azure Monitor metric alerts (deployed 2026-04-07) ---
  alert_rules_deployed:
    deployment_name: alert-rules-20260407
    template: infra/azure/monitoring/alert-rules.bicep
    deploy_script: scripts/azure/deploy-alert-rules.sh
    resource_group: rg-ipai-dev-odoo-runtime
    action_group: ag-ipai-ops-email (ops@insightpulseai.com)
    metric_alerts:
      - alert-ipai-aca-web-restarts (severity 1, restart > 3 in 5m)
      - alert-ipai-aca-worker-restarts (severity 1)
      - alert-ipai-aca-cron-restarts (severity 1)
      - alert-ipai-aca-copilot-restarts (severity 1)
      - alert-ipai-pg-cpu-high (severity 2, CPU > 80% sustained)
      - alert-ipai-aca-http-5xx (severity 1, 5xx > 5 in 5m)
      - alert-ipai-copilot-cpu-high (severity 2, CPU > 80%)
      - alert-ipai-aca-web-zero-replicas (severity 0, critical)
      - alert-ipai-aca-copilot-zero-replicas (severity 0, critical)
    log_alerts_deployed:
      - alert-ipai-agent-error-rate (severity 1, agent error rate > threshold)
      - alert-ipai-agent-latency-p95 (severity 2, p95 latency > threshold)
      - alert-ipai-content-safety-blocks (severity 2, content safety blocks > threshold)
    app_insights: appi-ipai-dev (rg-ipai-dev-odoo-runtime, provisioned 2026-04-07)
    status: 13 metric alerts + 3 agent log alerts DEPLOYED (all active)

  ask-agent:
    agent_version: v3
    foundry_name: ask-agent
    health_endpoint: Foundry Agent Service health (built-in)
    latency_p50_p95_p99: Observable via Application Insights query
    failure_rate: Observable via Application Insights query
    cost_per_interaction: "Observable via Foundry usage metrics (model: gpt-4.1, TPM tracked at 50000)"
    alert_rules: 13 metric + 3 agent log alerts active (container restarts, CPU, 5xx, zero replicas, error rate, latency p95, content safety)
    status: PASS
    evidence: >
      Foundry Monitor AI apps dashboards active. 9 Azure Monitor metric alert
      rules deployed (2026-04-07) covering restarts, CPU, HTTP 5xx, zero replicas.
      Action group ag-ipai-ops-email sends to ops@insightpulseai.com.

