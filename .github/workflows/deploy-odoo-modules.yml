name: Deploy Odoo Modules (Blue-Green)

# Blue-green deployment workflow for Odoo modules with rollback capability
# Implements zero-downtime deployment with health checks and automatic rollback

on:
  push:
    branches: [main]
    paths:
      - 'addons/ipai/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
      modules:
        description: 'Modules to deploy (comma-separated, or "all")'
        required: true
        default: 'all'
      skip_tests:
        description: 'Skip pre-deployment tests (use only for hotfixes)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  issues: write

env:
  DEPLOYMENT_ID: ${{ github.run_id }}-${{ github.run_attempt }}
  EVIDENCE_DIR: web/docs/evidence/$(date +%Y%m%d-%H%M+0800)/deploy-odoo-${{ github.run_id }}

jobs:
  # Step 1: OIDC Authentication
  authenticate:
    name: "🔐 OIDC Authentication"
    runs-on: ubuntu-latest
    outputs:
      supabase_token: ${{ steps.auth.outputs.token }}
    steps:
      - name: Get OIDC Token
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=insightpulseai-odoo" \
            | jq -r '.value')
          echo "::add-mask::$OIDC_TOKEN"
          echo "oidc_token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Exchange for Supabase Token
        id: auth
        run: |
          SUPABASE_TOKEN=$(curl -X POST \
            "${{ secrets.SUPABASE_URL }}/auth/v1/token?grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d "{\"assertion\": \"${{ steps.oidc.outputs.oidc_token }}\"}" \
            | jq -r '.access_token')
          echo "::add-mask::$SUPABASE_TOKEN"
          echo "token=$SUPABASE_TOKEN" >> $GITHUB_OUTPUT

  # Step 2: Fetch Secrets from Vault
  fetch-secrets:
    name: "🔑 Fetch Secrets from Vault"
    runs-on: ubuntu-latest
    needs: authenticate
    outputs:
      secrets: ${{ steps.vault.outputs.secrets }}
    steps:
      - name: Fetch from Vault
        id: vault
        env:
          SUPABASE_TOKEN: ${{ needs.authenticate.outputs.supabase_token }}
        run: |
          SECRETS=$(curl -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_workflow_secrets" \
            -H "Authorization: Bearer $SUPABASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"workflow_name": "deploy-odoo-modules"}' \
            | jq -c '{
              ssh_private_key: .ssh_private_key,
              plane_api_key: .plane_api_key,
              slack_webhook: .slack_webhook,
              do_host: .do_deployment_host
            }')

          echo "::add-mask::$(echo $SECRETS | jq -r '.ssh_private_key')"
          echo "::add-mask::$(echo $SECRETS | jq -r '.plane_api_key')"
          echo "::add-mask::$(echo $SECRETS | jq -r '.slack_webhook')"

          echo "secrets=$(echo $SECRETS | base64 -w 0)" >> $GITHUB_OUTPUT

  # Step 3: Pre-Deployment Tests
  pre-deployment-tests:
    name: "🧪 Pre-Deployment Tests"
    runs-on: self-hosted
    if: github.event.inputs.skip_tests != 'true'
    outputs:
      tests_passed: ${{ steps.tests.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Odoo module tests
        id: tests
        timeout-minutes: 15
        continue-on-error: true
        run: |
          # Determine modules to test
          if [ "${{ github.event.inputs.modules }}" = "all" ]; then
            MODULES=$(ls -d addons/ipai/ipai_* | xargs -n1 basename | tr '\n' ',' | sed 's/,$//')
          else
            MODULES="${{ github.event.inputs.modules }}"
          fi

          echo "Testing modules: $MODULES"

          # Run tests with retry logic
          for i in {1..3}; do
            if python3 -m pytest addons/ipai/ -v --maxfail=5; then
              echo "passed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Test attempt $i failed, retrying..."
            sleep $((2**$i))
          done

          echo "passed=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Block deployment on test failure
        if: steps.tests.outputs.passed == 'false'
        run: |
          echo "❌ Pre-deployment tests failed. Deployment blocked."
          exit 1

  # Step 4: Blue-Green Deployment
  deploy:
    name: "🚀 Blue-Green Deployment"
    runs-on: self-hosted
    needs: [fetch-secrets, pre-deployment-tests]
    if: always() && (needs.pre-deployment-tests.result == 'success' || github.event.inputs.skip_tests == 'true')
    outputs:
      deployment_success: ${{ steps.deploy.outputs.success }}
      green_version: ${{ steps.deploy.outputs.green_version }}
      blue_version: ${{ steps.deploy.outputs.blue_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Decode Secrets
        id: decode
        run: |
          echo "${{ needs.fetch-secrets.outputs.secrets }}" | base64 -d > /tmp/secrets.json
          echo "SSH_PRIVATE_KEY=$(jq -r '.ssh_private_key' /tmp/secrets.json)" >> $GITHUB_ENV
          echo "DO_HOST=$(jq -r '.do_host' /tmp/secrets.json)" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

      - name: Blue-Green Deployment
        id: deploy
        timeout-minutes: 10
        continue-on-error: true
        env:
          MODULES: ${{ github.event.inputs.modules }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          # Connect to server and execute deployment
          ssh -i ~/.ssh/deploy_key root@$DO_HOST << 'REMOTE_SCRIPT'
            set -e

            # Determine deployment slot (blue/green)
            if [ -f /opt/odoo/current_slot ]; then
              CURRENT=$(cat /opt/odoo/current_slot)
              if [ "$CURRENT" = "blue" ]; then
                NEW_SLOT="green"
                OLD_SLOT="blue"
              else
                NEW_SLOT="blue"
                OLD_SLOT="green"
              fi
            else
              NEW_SLOT="blue"
              OLD_SLOT="green"
            fi

            echo "Current slot: $OLD_SLOT"
            echo "Deploying to: $NEW_SLOT"

            # Create deployment directory
            DEPLOY_DIR="/opt/odoo/$NEW_SLOT"
            mkdir -p $DEPLOY_DIR

            # Sync new code
            rsync -av --delete \
              /opt/odoo/repo/addons/ipai/ \
              $DEPLOY_DIR/addons/ipai/

            # Update modules in Odoo
            docker exec odoo-$NEW_SLOT odoo-bin \
              --addons-path="/var/lib/odoo/addons/ipai,/usr/lib/python3/dist-packages/odoo/addons" \
              --database=odoo \
              --update $MODULES \
              --stop-after-init \
              --no-http

            # Health check
            for i in {1..5}; do
              if curl -f http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              echo "Health check attempt $i/5 failed"
              sleep 2
            done

            # Switch traffic to new slot
            echo $NEW_SLOT > /opt/odoo/current_slot

            # Update nginx to point to new slot
            sed -i "s/odoo-$OLD_SLOT/odoo-$NEW_SLOT/g" /etc/nginx/sites-available/odoo
            nginx -t && systemctl reload nginx

            echo "Deployment successful. Traffic switched to $NEW_SLOT"
            echo "green_version=$NEW_SLOT" >> $GITHUB_OUTPUT
            echo "blue_version=$OLD_SLOT" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
          REMOTE_SCRIPT

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key /tmp/secrets.json

  # Step 5: Post-Deployment Health Checks
  health-check:
    name: "🏥 Health Check"
    runs-on: ubuntu-latest
    needs: [deploy, fetch-secrets]
    if: always() && needs.deploy.outputs.deployment_success == 'true'
    outputs:
      health_status: ${{ steps.health.outputs.status }}
    steps:
      - name: Decode Secrets
        run: |
          echo "${{ needs.fetch-secrets.outputs.secrets }}" | base64 -d > /tmp/secrets.json
          echo "DO_HOST=$(jq -r '.do_host' /tmp/secrets.json)" >> $GITHUB_ENV

      - name: Execute Health Checks
        id: health
        timeout-minutes: 5
        continue-on-error: true
        run: |
          HOST=$DO_HOST

          # Check 1: HTTP 200
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$HOST/web/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ HTTP health check failed: $HTTP_CODE"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check 2: Database connectivity
          DB_CHECK=$(curl -s http://$HOST/web/database/selector | grep -c "database")
          if [ "$DB_CHECK" -eq 0 ]; then
            echo "❌ Database check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check 3: Module status
          # (Add module-specific health checks here)

          echo "✅ All health checks passed"
          echo "status=passed" >> $GITHUB_OUTPUT

  # Step 6: Rollback (if health checks fail)
  rollback:
    name: "⏮️ Rollback Deployment"
    runs-on: self-hosted
    needs: [deploy, health-check, fetch-secrets]
    if: always() && (needs.health-check.outputs.health_status == 'failed' || needs.deploy.outputs.deployment_success != 'true')
    steps:
      - name: Decode Secrets
        run: |
          echo "${{ needs.fetch-secrets.outputs.secrets }}" | base64 -d > /tmp/secrets.json
          echo "SSH_PRIVATE_KEY=$(jq -r '.ssh_private_key' /tmp/secrets.json)" >> $GITHUB_ENV
          echo "DO_HOST=$(jq -r '.do_host' /tmp/secrets.json)" >> $GITHUB_ENV

      - name: Execute Rollback
        timeout-minutes: 5
        run: |
          ssh -i <(echo "$SSH_PRIVATE_KEY") root@$DO_HOST << 'ROLLBACK_SCRIPT'
            # Switch back to previous slot
            CURRENT=$(cat /opt/odoo/current_slot)
            if [ "$CURRENT" = "blue" ]; then
              ROLLBACK_SLOT="green"
            else
              ROLLBACK_SLOT="blue"
            fi

            echo "Rolling back to $ROLLBACK_SLOT"

            # Update nginx
            sed -i "s/odoo-$CURRENT/odoo-$ROLLBACK_SLOT/g" /etc/nginx/sites-available/odoo
            nginx -t && systemctl reload nginx

            # Update current slot marker
            echo $ROLLBACK_SLOT > /opt/odoo/current_slot

            echo "✅ Rollback complete. Traffic switched to $ROLLBACK_SLOT"
          ROLLBACK_SCRIPT

  # Step 7: Export Metrics & Notifications
  finalize:
    name: "📊 Export Metrics & Notify"
    runs-on: ubuntu-latest
    needs: [authenticate, deploy, health-check, rollback]
    if: always()
    steps:
      - name: Export Metrics to Supabase
        env:
          SUPABASE_TOKEN: ${{ needs.authenticate.outputs.supabase_token }}
        run: |
          STATUS="unknown"
          if [ "${{ needs.health-check.outputs.health_status }}" = "passed" ]; then
            STATUS="success"
          elif [ "${{ needs.rollback.result }}" = "success" ]; then
            STATUS="rolled_back"
          else
            STATUS="failed"
          fi

          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ops.workflow_runs" \
            -H "Authorization: Bearer $SUPABASE_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"workflow_name\": \"deploy-odoo-modules\",
              \"run_id\": \"${{ github.run_id }}\",
              \"status\": \"$STATUS\",
              \"started_at\": \"${{ github.event.repository.pushed_at }}\",
              \"completed_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"metadata\": {
                \"modules\": \"${{ github.event.inputs.modules }}\",
                \"environment\": \"${{ github.event.inputs.environment }}\",
                \"green_version\": \"${{ needs.deploy.outputs.green_version }}\",
                \"blue_version\": \"${{ needs.deploy.outputs.blue_version }}\"
              }
            }"

      - name: Create Plane Issue (if failed)
        if: needs.health-check.outputs.health_status == 'failed' && needs.rollback.result != 'success'
        run: |
          echo "TODO: Create Plane issue for failed deployment"
          # Implementation via vault-github-actions-bridge

      - name: Slack Notification
        if: always()
        run: |
          echo "TODO: Send Slack notification"
          # Implementation via vault-github-actions-bridge
