version: 1
type: delivery_skill
family: odoo_sh_delivery
skill:
  name: odoo-github-flow
  status: draft
  owner: odoo-developer
  purpose: >
    Validate GitHub integration workflow — PR discipline, branch naming,
    merge rules, required status checks, and CODEOWNERS enforcement for
    Odoo CE 18 module development.

  triggers:
    - new PR opened against main or staging branch
    - branch naming convention violation detected
    - merge attempt without required status checks
    - CODEOWNERS file modification

  inputs:
    - PR number and branch name
    - required status check results
    - CODEOWNERS file path coverage
    - branch protection rule configuration
    - commit message format

  steps:
    - verify branch naming follows convention (feat/, fix/, chore/, docs/, test/)
    - check commit messages follow OCA convention (type(scope): description)
    - validate all required status checks are passing
    - confirm CODEOWNERS covers modified paths
    - verify no force-push or history rewrite on protected branches
    - check PR has required approvals
    - validate no secrets in diff (GHAS secret scanning)
    - produce GitHub flow compliance evidence

  outputs:
    - validation_result
    - branch_compliance
    - commit_message_compliance
    - status_check_summary
    - findings
    - blockers
    - evidence

  guardrails:
    - never force-push to main or staging branches
    - never bypass required status checks
    - never commit secrets — flag GHAS alerts as blockers
    - never merge without required approvals
    - never rewrite history on protected branches
    - bind to Azure-first stack — GitHub Actions CI, not Odoo.sh CI

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-delivery/odoo-github-flow/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-sh-persona-model.md
  - agents/personas/odoo-developer.md
  - .claude/rules/github-governance.md
  - .claude/rules/security-baseline.md
