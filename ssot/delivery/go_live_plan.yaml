# -----------------------------------------------------------------------------
# Risks
# -----------------------------------------------------------------------------

risks:
  - id: RISK-GL-001
    description: M365 Business Premium never redeemed
    likelihood: high
    impact: medium
    mitigation: Continue with Entra ID Free + Security Defaults

  - id: RISK-GL-002
    description: ADO access for ceo@ remains blocked
    likelihood: high
    impact: medium
    mitigation: Use admin@ for Board operations

  - id: RISK-GL-003
    description: Azure Front Door deployment fails
    likelihood: medium
    impact: high
    mitigation: Fall back to ACA direct ingress with Cloudflare proxy

  - id: RISK-GL-004
    description: analytic_account_id fix cascades to other modules
    likelihood: medium
    impact: medium
    mitigation: Test on disposable DB; do not modify OCA source

  - id: RISK-GL-005
    description: Self-hosted agent pool unavailable
    likelihood: medium
    impact: medium
    mitigation: ci-cd.yml already has ubuntu-latest fallback

  - id: RISK-GL-006
    description: Solo operator capacity constraint
    likelihood: high
    impact: high
    mitigation: Strict scope cut; defer everything not on critical path

