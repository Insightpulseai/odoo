# ---------------------------------------------------------------------------
# Resource group topology (per-env: 7; total 14 across nonprod+prod;
# +shared-management RGs)
# ---------------------------------------------------------------------------
resource_groups:
  per_env_target_count: 7
  total_target_count: 18           # 7×2 + 4 shared-mgmt
  pattern_per_env:
    - name: rg-ipai-<env>-shared
      plane: shared
      purpose: ACR refs, shared MIs, env-shared utilities
    - name: rg-ipai-<env>-network
      plane: network
      purpose: VNet, subnets, private DNS, private endpoints, NAT
    - name: rg-ipai-<env>-observability
      plane: observability
      purpose: Log Analytics, App Insights (×4 per env), alerts, action groups
    - name: rg-ipai-<env>-web
      plane: web
      purpose: web surfaces (root, erp shell, prisma web, w9 booking)
    - name: rg-ipai-<env>-odoo-runtime
      plane: transaction
      purpose: ACA env + Odoo apps/jobs + storage + Postgres references
    - name: rg-ipai-<env>-agent-ai
      plane: agent
      purpose: Foundry, AI Search, Doc Intelligence, agent storage
    - name: rg-ipai-<env>-data-intel
      plane: data-intelligence
      purpose: Databricks, access connector, lake storage, Purview
  shared_mgmt_rgs:
    - name: rg-ipai-mgmt-edge
      purpose: AFD Premium + WAF policy
    - name: rg-ipai-mgmt-registry
      purpose: ACR (1 shared registry across envs)
    - name: rg-ipai-mgmt-secrets
      purpose: Shared mgmt KV
    - name: rg-ipai-mgmt-governance
      purpose: Budgets, policies, action groups (cross-env)

# ---------------------------------------------------------------------------
# Global shared BOM (counts across the whole platform)
# ---------------------------------------------------------------------------
global_shared:
  azure_subscriptions: 3
  entra_tenant: 1
  azure_front_door_premium: 1
  waf_policy: 1
  shared_acr: 1
  shared_key_vault_mgmt: 1
  shared_action_group: 1
  shared_cost_budgets: 4    # global + per-major-plane
  dns_pattern_standard: 1

# ---------------------------------------------------------------------------
# Per-environment platform slice (apply to nonprod and prod)
# ---------------------------------------------------------------------------
per_env_slice:
  resource_groups: 7
  key_vault: 1
  vnet: 1
  subnets: 3                # web, runtime, data/private-link
  private_dns_zones: 4      # postgres, privatelink, search, storage
  nat_gateway: 1
  log_analytics_workspace: 1
  app_insights: 4           # web, product, agent, research
  aca_environments: 2       # app/runtime + product
  aca_apps: 5               # odoo-app, odoo-worker, pulser-api, prisma-api, forms-api
  aca_jobs: 2               # odoo-init, odoo-batch
  postgres_flexible_server: 1
  odoo_storage_account: 1
  foundry_resource: 1
  foundry_project: 1
  ai_search: 1
  agent_storage_account: 1
  managed_identities: 3     # app-runtime, jobs-ops, data-connector
  databricks_workspace: 1
  databricks_access_connector: 1
  lake_storage_account: 1
  purview: 0_to_1           # only if actively used
  service_bus: 0_to_1
  event_hubs: 0_to_1
  redis: 0                  # defer until justified
  cosmos_db: 0              # defer until justified
  api_management: 0_to_1    # only when external API productization is real

per_env_total: 38_to_42_resources
total_partner_ready: 84_to_94_resources

# ---------------------------------------------------------------------------
# Product planes (4 — revised upward)
# ---------------------------------------------------------------------------
planes:
  shared_saas_control:
    role: tenancy + identity + billing + observability + deployment + policy
    components:
      - tenant model + pricing/tiering
      - per-tenant Entra apps where customer-facing
      - per-tenant managed identities for service-to-service
      - shared Key Vault with `<tenant>-<secret-name>` naming
      - per-tenant feature flags (ops.feature_flags)
      - per-tenant audit (ops.audit_log)
      - cost allocation via mandatory tags
      - SLOs + noisy-neighbor controls
      - Marketplace metering wiring
    qty_per_env:
      app_insights: 1
      managed_identities: 1
      reuses_shared_kv_acr_afd: true

  core_operations:
    role: D365 Finance + Project Operations + Business Central parity
    components:
      - Odoo CE 18 + OCA + ipai_*
      - Pulser advisory workflows + Tax Guru
      - Finance close + BIR compliance per docs/backlog/ph-close-bir-compliance-board-pack.md
      - Project Operations parity per docs/architecture/odata-to-odoo-mapping.md §7.2
      - Business Central parity (broader SMB ERP)
    qty_per_env:
      postgres: 1
      odoo_storage: 1
      aca_env: 1
      aca_apps: 3   # odoo-web, odoo-worker, pulser-api
      aca_jobs: 2   # odoo-init, odoo-batch
      app_insights: 1
      managed_identity: 1

  ads_customer_intel:
    role: Microsoft Advertising + Customer Insights parity (lead-gen + audience)
    components:
      - ad activation workflows
      - customer profile unification (data-intel + customer contract)
      - segmentation (Pulser customer intel + analytics)
      - journeys / lead handoff (campaign/journey APIs + CRM/Odoo)
      - campaign analytics (Databricks + Search + dashboards)
    qty_per_env:
      app_insights: 1
      managed_identity: 1
      reuses_databricks_search_forms: true
      no_separate_database_initially: true

  research_life_sciences:
    role: research / public-health analytics, NOT clinical PHI
    components:
      - PrismaLab tools (PRISMA, PubMed, PICO, Cochrane)
      - protocol support, evidence synthesis
      - AI-assisted research support (grounded retrieval)
      - optional public-health analytics
    qty_per_env:
      aca_apps: 2          # prisma-web, prisma-api
      aca_worker_optional: 0_to_1
      app_insights: 1
      search_index_or_partition: 1
      research_artifact_storage: 1   # container in shared storage
    not_in_default_bom:
      - Health Data Services workspace
      - FHIR service
      - DICOM service
      - regulated clinical lakehouse
    escalation_gate: regulated_scope tag transitions from `none` → `research` → `health` → `clinical` only with governance approval

# ---------------------------------------------------------------------------
# Domains / public surfaces (per docs/architecture/domain-and-web-bom-target-state.md)
# ---------------------------------------------------------------------------
domains:
  - hostname: www.insightpulseai.com
    role: root brand / GTM
    runtime_class: marketing-content
  - hostname: erp.insightpulseai.com
    role: product ingress (public shell + authenticated entry)
    runtime_class: interactive-product
  - hostname: prismalab.insightpulseai.com
    role: research app surface (interactive product, not microsite)
    runtime_class: interactive-product
  - hostname: w9studio.net
    role: booking / commerce microsite
    runtime_class: marketing-content
  - hostname: ads.insightpulseai.com or partner portal
    role: optional future external portal
    runtime_class: tbd
    qty_target: 0_to_1

