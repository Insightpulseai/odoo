name: Platform Restoration (Direct-to-Origin)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Restoration scope'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - erp
          - website
          - w9
      fix_assets:
        description: 'Run Odoo asset repair after restoration'
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  restore:
    name: Execute Platform Restoration
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restoration Logic
        shell: bash
        run: |
          set -euo pipefail
          
          if [ "${{ inputs.target }}" == "all" ]; then
            bash scripts/restoration/restore_all_direct.sh
          elif [ "${{ inputs.target }}" == "erp" ]; then
            bash scripts/restoration/restore_erp.sh
          elif [ "${{ inputs.target }}" == "website" ]; then
            bash scripts/restoration/restore_website.sh
          elif [ "${{ inputs.target }}" == "w9" ]; then
            bash scripts/restoration/restore_w9.sh
          fi

      - name: Asset Repair
        if: inputs.fix_assets == true
        shell: bash
        run: |
          bash scripts/restoration/fix_erp_assets.sh

      - name: Final Smoke Test
        run: |
          curl -ILk -m 10 https://erp.insightpulseai.com || echo "ERP still propagates..."
          curl -ILk -m 10 https://www.insightpulseai.com || echo "Website still propagates..."
