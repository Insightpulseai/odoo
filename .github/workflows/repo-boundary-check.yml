# DISABLED: GHA runners non-functional (billing). CI migrating to Azure DevOps Pipelines.
# To re-enable: remove `if: false` from jobs.
# .github/workflows/repo-boundary-check.yml
# Stops repo sprawl: blocked dirs, unknown top-level dirs, provisional dirs.
name: Repo Boundary Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: repo-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundary-check:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check top-level directory allowlist
        run: |
          set -euo pipefail

          # Canonical top-level directories and files
          allowed_dirs=(
            .claude
            .devcontainer
            .github
            .vscode
            addons
            apps
            db
            deploy
            docker
            docs
            infra
            mcp
            n8n
            node_modules
            oca_repos
            odoo
            odoo19
            packages
            scripts
            skills
            spec
            ssot
            supabase
          )

          # Build grep pattern
          pattern=$(printf '|^%s$' "${allowed_dirs[@]}")
          pattern="${pattern:1}"  # remove leading |

          fail=0
          while IFS= read -r dir; do
            basename="$(basename "$dir")"
            # Skip hidden dirs (., .git, etc.)
            [[ "$basename" == .* ]] && continue
            if ! echo "$basename" | grep -Eq "$pattern"; then
              echo "::error::Unknown top-level directory: $basename — add to allowlist or remove"
              fail=1
            fi
          done < <(find . -maxdepth 1 -mindepth 1 -type d | sort)

          if [ "$fail" -eq 0 ]; then
            echo "All top-level directories are in the allowlist."
          fi
          exit "$fail"

      - name: Check for blocked patterns
        run: |
          set -euo pipefail
          fail=0

          # No .env files committed (except .env.example)
          while IFS= read -r f; do
            case "$f" in
              *.example|*.sample|*.template) continue ;;
            esac
            echo "::error file=$f::Committed .env file detected — must be gitignored"
            fail=1
          done < <(find . -name '.env' -o -name '.env.local' -o -name '.env.prod' \
                    -o -name '.env.staging' 2>/dev/null | grep -v node_modules | grep -v .git)

          # No Vercel config in root (retired platform)
          if [ -f "vercel.json" ]; then
            echo "::warning file=vercel.json::Vercel config in repo root — Vercel is retired, consider removal"
          fi

          exit "$fail"

      - name: Validate addons directory structure
        run: |
          set -euo pipefail

          # All ipai modules must have __manifest__.py
          fail=0
          while IFS= read -r d; do
            if [ ! -f "$d/__manifest__.py" ]; then
              echo "::error::Module directory missing __manifest__.py: $d"
              fail=1
            fi
          done < <(find addons/ipai -mindepth 1 -maxdepth 1 -type d 2>/dev/null)

          # Check root-level ipai_* modules too
          while IFS= read -r d; do
            if [ ! -f "$d/__manifest__.py" ]; then
              echo "::warning::Root-level ipai module missing __manifest__.py: $d"
            fi
          done < <(find addons -maxdepth 1 -mindepth 1 -type d -name 'ipai_*' 2>/dev/null)

          exit "$fail"
