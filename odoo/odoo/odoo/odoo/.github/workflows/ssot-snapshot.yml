name: SSOT Inventory Snapshot

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: 'Snapshot scope'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - org-only
          - repo-only
          - vercel-only
      single_repo:
        description: 'Single repo name (repo-only scope)'
        required: false
        type: string

permissions:
  contents: write
  actions: read
  administration: read

env:
  GH_ORG: Insightpulseai

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run snapshot
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          MAX_WORKFLOW_RUNS: '50'
        run: |
          ARGS=""
          SCOPE="${{ inputs.scope || 'full' }}"

          case "${SCOPE}" in
            org-only)    ARGS="--org-only" ;;
            repo-only)   ARGS="--repo-only" ;;
            vercel-only) ARGS="--vercel-only" ;;
          esac

          if [[ -n "${{ inputs.single_repo }}" ]]; then
            ARGS="${ARGS} --repo ${{ inputs.single_repo }}"
          fi

          chmod +x scripts/ssot/snapshot_github_and_vercel.sh
          bash scripts/ssot/snapshot_github_and_vercel.sh ${ARGS}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssot-snapshot-${{ github.run_id }}
          path: |
            ssot/github/*.snapshot.json
            ssot/github/repo-details/
            ssot/vercel/*.snapshot.json
            ssot/evidence/snapshot-manifest.json
          retention-days: 90

      - name: Commit snapshot (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ssot/github/ ssot/vercel/ ssot/evidence/snapshot-manifest.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore(ssot): weekly inventory snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Summary
        run: |
          echo "## SSOT Snapshot Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ -f ssot/evidence/snapshot-manifest.json ]]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.summary' ssot/evidence/snapshot-manifest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No manifest generated." >> $GITHUB_STEP_SUMMARY
          fi
