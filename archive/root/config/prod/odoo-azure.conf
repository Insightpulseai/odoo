[options]
; =============================================================================
; Odoo Azure Container Apps Configuration
; =============================================================================
; Environment: Azure (dev/staging/prod via env vars)
; DB connection: via HOST, PORT, USER, PASSWORD env vars (set in ACA)
;
; The official odoo:19 entrypoint reads HOST/PORT/USER/PASSWORD env vars
; and passes them to Odoo. This conf only sets non-connection options.

; Database
; db_host, db_port, db_user, db_password are injected by ACA env vars
; The official entrypoint converts HOST→db_host, USER→db_user, etc.
db_name = odoo
dbfilter = ^odoo$

; Addons Path (OCA flattened + IPAI modules)
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/opt/odoo/addons/oca,/opt/odoo/addons/ipai

; Server
http_port = 8069
proxy_mode = True
workers = 4
max_cron_threads = 2

; Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1

; Logging (stdout for Azure Log Analytics)
log_level = info
log_handler = :INFO
logfile = False

; Security
list_db = False
admin_passwd = False

; Queue Job Configuration
[queue_job]
channels = root:4,high:2,medium:2,low:1
scheme = http
host = localhost
port = 8069
