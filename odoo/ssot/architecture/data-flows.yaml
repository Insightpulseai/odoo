# =============================================================================
# Data Flows — InsightPulse AI
# =============================================================================
#
# Canonical data flow declarations across the six-plane architecture.
# Governs ETL, reverse ETL, agent tool calls, and authority surface flows.
#
# Cross-references:
#   - ssot/architecture/platform-boundaries.yaml (system assignments)
#   - ssot/integrations/adls-etl-reverse-etl.yaml (ADLS medallion details)
#   - docs/contracts/REVERSE_ETL_GUARDRAILS.md (writeback contracts)
#   - docs/contracts/DATA_AUTHORITY_CONTRACT.md (entity ownership)
#
# Last updated: 2026-03-18
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-18"

# -----------------------------------------------------------------------------
# Inbound ETL: Source Systems → Lakehouse
# -----------------------------------------------------------------------------

inbound_etl:
  - id: odoo_to_bronze
    source: odoo_ce_19
    target: adls_gen2_bronze
    mechanism: batch_extract_api
    transport: azure_service_bus
    frequency: daily
    description: >
      Odoo transactional data extracted via JSON-RPC/REST API.
      Lands in ADLS bronze as append-only Parquet/Delta.
    entities:
      - account.move
      - sale.order
      - purchase.order
      - stock.picking
      - project.project
      - hr.employee
      - bir.tax.return

  - id: supabase_to_bronze
    source: supabase
    target: adls_gen2_bronze
    mechanism: incremental_batch
    frequency: daily_or_hourly
    status: transitional
    description: >
      Supabase platform events and orchestration state replicated to bronze.
      Transitional flow — may be replaced as Supabase role evolves.
    entities:
      - auth.users
      - ops.platform_events
      - ops.task_queue

# -----------------------------------------------------------------------------
# Medallion Transforms: Bronze → Silver → Gold
# -----------------------------------------------------------------------------

medallion_transforms:
  - id: bronze_to_silver
    source: adls_gen2_bronze
    target: adls_gen2_silver
    engine: databricks_lakeflow_sdp
    operations:
      - deduplication
      - type_casting
      - null_handling
      - schema_validation
    governance: unity_catalog

  - id: silver_to_gold
    source: adls_gen2_silver
    target: adls_gen2_gold
    engine: databricks_lakeflow_sdp
    operations:
      - business_logic
      - aggregation
      - cross_source_resolution
      - feature_engineering
    governance: unity_catalog
    output_domains:
      - finance       # budget, actuals, variance
      - projects      # portfolio, resource, timeline
      - compliance    # BIR filing status, deadlines
      - platform      # user activity, events
      - ml_features   # feature tables for agent consumption

# -----------------------------------------------------------------------------
# Outbound: Gold → Consumers
# -----------------------------------------------------------------------------

gold_consumers:
  - id: gold_to_foundry_agents
    source: adls_gen2_gold
    target: microsoft_foundry
    mechanism: serving_endpoints
    description: >
      Gold-layer context products served to Foundry agents
      via Databricks serving endpoints or direct ADLS reads.
    domains:
      - ml_features
      - finance
      - compliance

  - id: gold_to_bi
    source: adls_gen2_gold
    target: bi_surfaces
    mechanism: direct_query
    description: >
      BI tools (Tableau Cloud / Fabric) consume gold layer directly.
      No writeback from BI surfaces.

# -----------------------------------------------------------------------------
# Agent Tool Calls: Foundry → APIM → Odoo
# -----------------------------------------------------------------------------

agent_tool_flows:
  - id: foundry_agent_to_odoo
    source: microsoft_foundry
    target: odoo_ce_19
    mediation: azure_api_management
    description: >
      Foundry-hosted agents execute tool calls against Odoo via APIM.
      All calls are RBAC-constrained, traced, and logged.
    constraints:
      - all_calls_through_apim
      - rbac_enforced_per_agent_identity
      - tracing_mandatory
      - no_direct_database_access

  - id: document_intelligence_to_odoo
    source: azure_ai_document_intelligence
    target: odoo_ce_19
    mediation: azure_api_management
    description: >
      OCR-extracted vendor bills and POs routed to Odoo as draft entries.
      Always draft-first; never auto-posted.
    constraints:
      - draft_only_on_creation
      - human_review_before_posting

# -----------------------------------------------------------------------------
# Reverse ETL: Gold → Operational Systems (Bounded)
# -----------------------------------------------------------------------------
#
# All reverse ETL is bounded, typed, and contract-governed.
# See docs/contracts/REVERSE_ETL_GUARDRAILS.md for full rules.
# -----------------------------------------------------------------------------

reverse_etl:
  - id: scoring_writeback
    source: adls_gen2_gold
    target: supabase
    type: scoring_writeback
    description: ML risk scores written to enrichment columns only
    guard: enrichment_column_only

  - id: read_model_refresh
    source: adls_gen2_gold
    target: supabase
    type: read_model_refresh
    description: Materialized view refresh (full table replace)
    guard: full_table_replace

  - id: enrichment_writeback
    source: adls_gen2_gold
    target: odoo_ce_19
    type: enrichment_writeback
    description: Budget forecasts to Odoo enrichment fields only
    guard: enrichment_fields_only
    target_fields: "x_forecast_*"

  - id: notification_trigger
    source: adls_gen2_gold
    target: slack
    type: notification_trigger
    mediation: n8n
    description: Anomaly alerts routed via n8n to Slack
    guard: alert_payload_only

# -----------------------------------------------------------------------------
# Authority Surface Flows
# -----------------------------------------------------------------------------
#
# These are not data ETL flows — they describe the operational authority
# relationships between governance systems.
# -----------------------------------------------------------------------------

authority_flows:
  - id: boards_to_pipelines
    from: azure_boards
    to: azure_pipelines
    relationship: planned_work_triggers_release
    description: Work item completion gates release pipeline execution

  - id: github_to_pipelines
    from: github
    to: azure_pipelines
    relationship: code_merge_triggers_build
    description: PR merge to main triggers CI/CD pipeline

  - id: resource_graph_to_governance
    from: azure_resource_graph
    to: azure_policy
    relationship: live_state_audited_by_policy
    description: Resource Graph provides drift detection against intended state

  - id: foundry_to_observability
    from: microsoft_foundry
    to: azure_monitor
    relationship: agent_traces_to_telemetry
    description: Foundry tracing/eval results feed into unified observability

  - id: ssot_to_all
    from: repo_ssot
    to: all_systems
    relationship: intended_state_governs_deployment
    description: >
      Machine-readable SSOT in repo drives IaC, CI gates, and config.
      No system may diverge from repo-declared intended state without
      explicit drift documentation.

# -----------------------------------------------------------------------------
# Prohibited Flows
# -----------------------------------------------------------------------------

prohibited:
  - description: Databricks writing directly to Odoo PostgreSQL
    reason: Lakehouse is read-only consumer of ERP data
  - description: BI surfaces writing back to any operational system
    reason: BI is presentation-only
  - description: Agents bypassing APIM for Odoo access
    reason: All agent-to-Odoo calls must be governed and traced
  - description: ADLS used as operational data source
    reason: ADLS is analytical only; read from Odoo/Supabase for operational needs
  - description: Supabase used as primary identity plane
    reason: Microsoft Entra ID is canonical identity; Supabase Auth is transitional
