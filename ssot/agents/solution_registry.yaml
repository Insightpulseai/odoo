  # ---------------------------------------------------------------------------
  # Pulser Professional Office Skills
  # ---------------------------------------------------------------------------
  - id: office-skills
    name: "Pulser Professional Office Skills"
    type: skill_pack
    components:
      - powerpoint_studio
      - word_studio
      - excel_studio
    studios:
      - id: powerpoint-studio
        name: "PowerPoint Studio"
        outputs: [PPTX, PDF]
        grounding: [ppm_okrs, odoo_docs, retained_visuals, policies]
        quality_gates: [story_flow, no_overflow, render_qa]
      - id: word-studio
        name: "Word Studio"
        outputs: [DOCX, PDF]
        grounding: [odoo_docs, policy_indexes, approvals]
        quality_gates: [page_render, hierarchy, citations, signoff]
      - id: excel-studio
        name: "Excel Studio"
        outputs: [XLSX]
        grounding: [record_metrics, tasks, okrs, derived_formulas]
        quality_gates: [formula_integrity, recalc, render_qa]
    agents:
      - id: office-triage
        name: "Office Triage Agent"
        role: request_interpretation_and_studio_routing
      - id: office-planning
        name: "Office Planning Agent"
        role: narrative_structure_and_data_bindings
      - id: office-grounding
        name: "Office Research / Grounding Agent"
        role: enterprise_data_retrieval_and_evidence_classification
      - id: powerpoint-studio-agent
        name: "PowerPoint Studio Agent"
        role: native_pptx_generation
      - id: word-studio-agent
        name: "Word Studio Agent"
        role: native_docx_generation
      - id: excel-studio-agent
        name: "Excel Studio Agent"
        role: native_xlsx_generation
      - id: publishability-qa
        name: "Publishability QA Agent"
        role: governed_pass_fail_gate_before_output
      - id: evidence-documents
        name: "Evidence / Documents Agent"
        role: retention_trace_links_metadata_tagging
    orchestration: triage → planning → grounding → studio → qa → evidence
    capability_family: pulser-office-publishing
    sub_skills:
      - triage
      - source-grounding
      - narrative-planning
      - ppt-generation
      - docx-generation
      - xlsx-generation
      - formatting-qa
      - publishability-review
      - evidence-linking
    dependencies:
      runtime: [python-pptx, python-docx, openpyxl]
      odoo: [ipai_odoo_copilot, project, documents]
      oca: [report_xlsx]
    publish_gate:
      - content_grounded_in_odoo_documents_or_approved_knowledge
      - artifact_renders_cleanly_no_layout_defects
      - reviewer_notes_resolved_and_retained_copies_stored
      - output_ready_to_circulate_without_reformatting
    success_criteria: [SC-PH-25, SC-PH-26, SC-PH-27, SC-PH-28, SC-PH-29, SC-PH-30]
    production_boundary:
      poc: { scope: single_studio_manual_review, gate: internal_only }
      pilot: { scope: multi_studio_with_qa, gate: reviewer_approved }
      production: { scope: full_orchestration, gate: governed_publish_flow }
    release_phases:
      - { phase: R1, scope: foundation, status: in_progress }
      - { phase: R2, scope: core, status: planned }
      - { phase: R3, scope: hardening, status: planned }
    spec_bundle: spec/pulser-odoo/
    canonicality: canonical
    criticality: important
    status: active

