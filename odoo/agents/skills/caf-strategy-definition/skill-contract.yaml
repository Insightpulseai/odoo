version: 1
type: benchmark_skill
classification: capability_uplift
family: microsoft-caf
skill:
  name: caf-strategy-definition
  id: caf-strategy-definition
  version: "0.1.0"
  status: draft
  owner_persona: cloud-strategy-advisor
  source_family: microsoft-caf
  benchmark_source: "Microsoft Cloud Adoption Framework"
  purpose: >
    Define cloud adoption strategy with business justification, motivations,
    outcomes, and financial model. Uses CAF Strategy phase methodology to
    frame why the organization is adopting cloud and what success looks like.

  triggers:
    - new cloud adoption initiative proposed
    - business case review for cloud migration
    - annual cloud strategy refresh
    - new workload class identified for cloud consideration

  inputs:
    - current infrastructure inventory
    - business objectives and KPIs
    - cost baseline (current spend)
    - organizational constraints and compliance requirements

  steps:
    - identify adoption motivations (migrate, innovate, govern)
    - define measurable business outcomes (fiscal, agility, reach, engagement)
    - build cloud economics model (TCO comparison, OpEx shift analysis)
    - assess digital estate using 5 Rs rationalization
    - map workloads to rationalization categories
    - identify first adoption project (quick win)
    - document strategy in structured format
    - validate strategy against organizational constraints

  outputs:
    - strategy_document
    - motivation_classification
    - business_outcomes_table
    - financial_model_summary
    - digital_estate_rationalization
    - first_project_recommendation

  guardrails:
    - "CAF is a benchmark reference, not a runtime dependency"
    - "Canonical stack remains Odoo CE + Azure Container Apps"
    - "A benchmark becomes integration only with explicit contract in docs/contracts/"
    - "Financial models must use real cost data, never fabricated estimates"
    - "Strategy outputs inform but do not override existing platform commitments"

  evidence:
    required: true
    format: "docs/evidence/{stamp}/caf/strategy/"

  evals:
    dimensions: [accuracy, completeness, business_alignment, feasibility, evidence_quality]
    thresholds:
      accuracy: 0.90
      business_alignment: 0.90

cross_references:
  - agents/knowledge/benchmarks/microsoft-cloud-adoption-framework.md
  - agents/personas/cloud-strategy-advisor.md
  - agent-platform/ssot/learning/microsoft_caf_skill_map.yaml
