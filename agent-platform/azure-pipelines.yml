# =============================================================================
# DEPRECATED — Re-homed to platform/ci/foundry-runtime-ci.yml
# =============================================================================
# agent-platform is not a canonical boundary. Foundry runtime/governance
# belongs under platform/; agent assets belong under agents/.
#
# This file is a thin wrapper to avoid breaking AzDO pipeline ID 10.
# Delete after updating AzDO pipeline definition to point to:
#   platform/ci/foundry-runtime-ci.yml
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - platform/**
      - packages/**
      - apps/**

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Redirect
    displayName: 'Redirected to platform/ci'
    jobs:
      - job: Notice
        steps:
          - script: |
              echo "=============================================="
              echo "This pipeline has moved to:"
              echo "  platform/ci/foundry-runtime-ci.yml"
              echo ""
              echo "Update AzDO pipeline ID 10 to point there."
              echo "=============================================="
            displayName: 'Pipeline moved — update AzDO definition'
