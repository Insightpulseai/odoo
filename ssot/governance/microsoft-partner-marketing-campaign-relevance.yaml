  - ssot/governance/smb-copilot-services-motion.yaml
  - ssot/governance/microsoft-365-e7-and-agent-365-opportunity.yaml
  - ssot/governance/isv-success-program-engagement.yaml
  - ssot/governance/reference-platform-doctrine.yaml
  - ssot/governance/power-platform-adoption.yaml
  - docs/gtm/partner_center_checklist.md
  - docs/gtm/marketplace_research_brief.md
