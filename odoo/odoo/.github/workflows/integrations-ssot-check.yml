name: Integrations SSOT Check

on:
  push:
    paths:
      - 'ssot/integrations/odoo-n8n-supabase*'
      - 'scripts/validate_integrations_ssot.py'
      - '.github/workflows/integrations-ssot-check.yml'
  pull_request:
    paths:
      - 'ssot/integrations/odoo-n8n-supabase*'
      - 'scripts/validate_integrations_ssot.py'
      - '.github/workflows/integrations-ssot-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate integrations SSOT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate SSOT
        run: python scripts/validate_integrations_ssot.py
