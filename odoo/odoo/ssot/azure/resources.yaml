# =============================================================================
# Azure Resource Inventory — InsightPulse AI (SSOT)
# =============================================================================
#
# This file is the single source of truth for all confirmed Azure resources.
# Do NOT add resources here unless they are deployed (source: confirmed)
# or defined in IaC (source: bicep) or formally planned (source: planned).
#
# Naming convention (target): {type}-ipai-{env}
# Region: southeastasia (NOT encoded in resource names — no -sea suffix)
# Environments: dev | staging | prod
#
# Fields per resource:
#   name           — actual Azure portal name (as-is, even if non-conforming)
#   type           — Azure resource type
#   resource_group — actual RG name
#   region         — Azure region
#   source         — confirmed | bicep | planned
#   lifecycle      — active | legacy | experimental | managed | planned
#   owner_domain   — odoo | infra | lakehouse | platform | ai | devops
#   managed_by     — (optional) service that auto-created this resource
#   notes          — context
#
# Reconciled: 2026-03-11 from Azure CLI export (65 confirmed resources)
#
# ERRATA — Names That Do NOT Exist:
#   oai-ipai-sea       WRONG — correct name is oai-ipai-dev
#   kv-ipai-sea        WRONG — correct name is kv-ipai-dev
#   vnet-ipai-sea      WRONG — correct name is vnet-ipai-databricks
#   search-ipai-sea    WRONG — correct name is srch-ipai-dev
# The -sea suffix does not exist in the naming convention.
# =============================================================================

schema_version: "2.0"
