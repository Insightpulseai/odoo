version: 1
type: governance_skill
family: oca_community_governance
skill:
  name: odoo-openupgrade-assessment
  status: draft
  owner: odoo-developer
  purpose: >
    Assess upgrade readiness using OpenUpgrade as the benchmark path —
    coverage analysis, migration script inventory, breaking change
    identification.

  triggers:
    - new Odoo version release
    - upgrade planning
    - pre-migration review

  inputs:
    - current Odoo version and target version
    - installed module list (from addons.manifest.yaml or database)
    - custom ipai_* module inventory

  steps:
    - inventory current modules and versions
    - check OpenUpgrade coverage for each module
    - identify modules without migration scripts
    - classify gaps (covered/partial/missing)
    - assess custom ipai_* module migration needs
    - generate upgrade readiness report

  outputs:
    - upgrade_readiness_assessment
    - coverage_matrix
    - gap_list
    - migration_script_inventory
    - risk_classification

  guardrails:
    - never treat OpenUpgrade as guaranteed complete coverage
    - always verify per-module
    - flag custom modules requiring manual migration
    - require rehearsal before production upgrade

  evidence:
    required: true
    format: "docs/evidence/{stamp}/oca-governance/odoo-openupgrade-assessment/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/oca-community-governance.md
  - agent-platform/ssot/learning/oca_skill_persona_map.yaml
