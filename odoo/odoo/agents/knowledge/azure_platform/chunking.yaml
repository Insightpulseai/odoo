# Azure Platform — Chunking Contract

name: azure-platform-chunking
description: Markdown heading-aware chunking for Azure documentation

strategy: heading-aware
format: md  # Microsoft Learn uses Markdown

chunking:
  split_on:
    - h1  # # heading
    - h2  # ## heading
    - h3  # ### heading
  max_chunk_tokens: 512
  overlap_tokens: 64
  min_chunk_tokens: 50

  context_window:
    include_parent_headings: true
    include_breadcrumb: true
    max_parent_depth: 3

metadata_per_chunk:
  id_template: "{source}:{service}:{path}:{heading_chain}:{ordinal}:{content_hash_8}"
  fields:
    - source        # azure-docs, azure-cli, azure-devops
    - service       # container-apps, frontdoor, search, etc.
    - path          # URL path or doc path
    - heading_chain # Service > Topic > Subtopic
    - ordinal       # chunk index within section
    - content_hash  # SHA-256 first 8 chars
    - product       # azure
    - lang          # en
    - source_type   # documentation | cli-reference | tutorial

md_handling:
  strip_elements:
    - "<!-- -->"          # HTML comments
    - ":::image"          # MS Learn image zones
    - ":::zone"           # Zone pivots
  preserve_elements:
    - "```"               # Code blocks
    - "> [!NOTE]"         # Note callouts
    - "> [!TIP]"          # Tip callouts
    - "> [!WARNING]"      # Warning callouts
    - "> [!IMPORTANT]"    # Important callouts
  strip_metadata_header: true  # Remove YAML frontmatter from MS Learn
