# Image Evaluation Rubric
# Used by judge_image.md and creative_eval.py
# Version: 1

rubric_version: 1
asset_type: image

dimensions:
  prompt_adherence:
    weight: 0.25
    scale: "0.0-1.0"
    scoring:
      1.0: "Image perfectly matches all elements of the prompt"
      0.8: "Image matches most elements; minor omissions or additions"
      0.6: "Image partially matches; some key elements missing or wrong"
      0.4: "Image loosely related to prompt; major elements missing"
      0.2: "Image barely relates to prompt"
      0.0: "Image is completely unrelated to the prompt"

  composition:
    weight: 0.15
    scale: "0.0-1.0"
    scoring:
      1.0: "Excellent layout, clear hierarchy, balanced visual weight, professional framing"
      0.8: "Good composition with minor balance issues"
      0.6: "Acceptable but could improve hierarchy or spacing"
      0.4: "Poor layout, cluttered or unbalanced"
      0.2: "Very poor composition, confusing visual hierarchy"
      0.0: "No discernible composition structure"

  aesthetic_quality:
    weight: 0.15
    scale: "0.0-1.0"
    scoring:
      1.0: "Premium, polished, launch-ready visual quality"
      0.8: "High quality with minor polish gaps"
      0.6: "Acceptable quality, noticeable rough edges"
      0.4: "Below professional standard"
      0.2: "Poor quality, clearly AI-generated artifacts"
      0.0: "Unusable quality"

  text_rendering_accuracy:
    weight: 0.20
    scale: "0.0-1.0"
    hard_fail_below: 0.5
    scoring:
      1.0: "All text perfectly rendered, correct spelling, clean fonts"
      0.8: "Text mostly correct, minor kerning or style issues"
      0.6: "Text readable but with noticeable rendering issues"
      0.4: "Text partially garbled or misspelled"
      0.2: "Text mostly unreadable or wrong"
      0.0: "No legible text when text was required, or completely wrong text"
    notes: "Score 1.0 if no text was required and none appears"

  brand_compliance:
    weight: 0.15
    scale: "0.0-1.0"
    hard_fail_below: 0.5
    scoring:
      1.0: "All brand names correct, style fully aligned, no forbidden terms"
      0.8: "Brand names correct, minor style drift"
      0.6: "Brand names present but minor issues (spacing, case)"
      0.4: "Brand name misspelled or deprecated term used"
      0.2: "Multiple brand violations"
      0.0: "Forbidden brand name prominently displayed"
    hard_fail_triggers:
      - "Odoo Copilot visible in image"
      - "Ask Odoo Copilot visible in image"
      - "Pulsar visible in image (instead of Pulser)"
      - "InsightPulse AI with space visible as brand"

  artifact_detection:
    weight: 0.10
    scale: "0.0-1.0"
    hard_fail_below: 0.3
    scoring:
      1.0: "No artifacts, clean output"
      0.8: "Very minor artifacts, not visible at normal viewing"
      0.6: "Some artifacts visible on close inspection"
      0.4: "Obvious artifacts (broken hands, warped text, seams)"
      0.2: "Severe artifacts degrading the image"
      0.0: "Corrupted output, watermarks, or gibberish"

aggregate:
  method: weighted_sum
  pass_threshold: 0.85
  warn_threshold: 0.70
  any_hard_fail_overrides_pass: true
