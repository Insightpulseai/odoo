    phase: 4
    action: retire

  - resource: vm-ipai-supabase-dev
    type: virtualMachine
    current_rg: rg-ipai-agents-dev
    target_rg: rg-ipai-agents-dev
    moveable: n/a
    phase: 4
    action: review
    notes: Keep isolated or retire — depends on Supabase self-hosted decision

# -----------------------------------------------------------------------------
# Phase Summary
# -----------------------------------------------------------------------------
phases:
  - phase: 0
    name: Preparation
    downtime: none
    risk: none
    deliverables:
      - This migration matrix
      - Per-RG Bicep modules
      - Updated SSOT files

  - phase: 1
    name: Observability + AI
    downtime: none
    risk: low
    actions:
      - "az resource move: law-ipai-dev → rg-ipai-shared-observability"
      - "az resource move: appi-ipai-dev → rg-ipai-shared-observability"
      - "Verify: all AI resources confirmed in rg-ipai-ai-dev"

  - phase: 2
    name: Data + Identity + Registry
    downtime: none
    risk: low
    actions:
      - "az resource move: ipai-odoo-dev-pg → rg-ipai-dev-odoo-data"
      - "az resource move: Key Vaults → rg-ipai-dev-platform"
      - "az resource move: ACRs → rg-ipai-dev-platform"
      - "az resource move: managed identities → owning RGs"
      - "Re-grant all RBAC role assignments at new scope"

  - phase: 3
    name: Odoo Runtime Recreation
    downtime: "5-15 min (maintenance window)"
    risk: high
    actions:
      - Deploy new ACA environment in rg-ipai-dev-odoo-runtime
      - Deploy all apps (same images, same PG FQDN, same KV refs)
      - Update Front Door origins to new ACA FQDNs
      - 72h stabilization hold

  - phase: 4
    name: Retire Legacy
    downtime: none
    risk: none
    actions:
      - Delete debug-odoo-ep, odoo-init, cae-ipai-dev
      - Delete empty RGs (rg-ipai-dev, rg-ipai-data-dev)

  - phase: 5
    name: CI/CD + SSOT Update
    downtime: none
    risk: none
    actions:
      - Update all workflow files with new RG names
      - Update all SSOT files to final state
