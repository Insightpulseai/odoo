# =============================================================================
# Microsoft MCP Server Policy — SSOT
# =============================================================================
# Canonical list of approved Microsoft MCP servers for agent workflows.
# Do not install servers outside this list without architecture review.
#
# Last reviewed: 2026-03-27
# =============================================================================

schema_version: 1
kind: mcp_server_policy
last_reviewed: "2026-03-27"

# ─────────────────────────────────────────────────────────────────────────────
# APPROVED — install and use
# ─────────────────────────────────────────────────────────────────────────────

approved:
  - name: Azure MCP Server
    purpose: Core Azure resource operations and tooling
    priority: P0

  - name: Microsoft Learn
    purpose: Grounded documentation lookup from official Microsoft sources
    priority: P0

  - name: Azure DevOps
    purpose: Boards, Repos, Pipelines integration
    priority: P0

  - name: Playwright
    purpose: Browser automation, testing, regression tasks
    priority: P0

  - name: Markitdown
    purpose: File and document conversion for agent workflows
    priority: P0

  - name: Microsoft MCP Server for Enterprise
    purpose: Entra identity, user, group, app, and policy querying
    priority: P1
    notes: "Read-only. Provisioned 2026-03-27. 36 MCP.* scopes granted to VS Code."

# ─────────────────────────────────────────────────────────────────────────────
# CONDITIONAL — install only if actively using the service
# ─────────────────────────────────────────────────────────────────────────────

conditional:
  - name: Microsoft Sentinel Data Exploration
    condition: "Only if actively doing SecOps / SIEM work"

  - name: Fabric Real-Time Intelligence
    condition: "Only if using Fabric Eventstreams / KQL"

  - name: Dev Box
    condition: "Only if using Microsoft Dev Box"

  - name: Clarity
    condition: "Only if using Microsoft Clarity analytics"

  - name: Microsoft NuGet
    condition: "Only if needing package/repo/feed workflows"

# ─────────────────────────────────────────────────────────────────────────────
# NOT APPROVED — do not install
# ─────────────────────────────────────────────────────────────────────────────

not_approved:
  - name: Awesome Copilot MCP Server
    reason: "Optional reference, not core"

# ─────────────────────────────────────────────────────────────────────────────
# POLICY RULES
# ─────────────────────────────────────────────────────────────────────────────

rules:
  - "Do not install all available Microsoft MCP servers"
  - "Start with the 6 approved servers only"
  - "Installing a conditional server requires documenting the active use case"
  - "Each server adds auth surface, tool noise, and debugging complexity"
  - "Prefer fewer, well-understood servers over broad coverage"
  - "Review this policy when adding new Microsoft services to the platform"
