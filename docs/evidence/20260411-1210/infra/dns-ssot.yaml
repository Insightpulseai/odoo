  - host: www
    service: WWW redirect → AFD root-redirect → erp.insightpulseai.com
    stack: azure-front-door
    dns_type: CNAME
    resolves_to: ipai-prod.z01.azurefd.net
    status: BROKEN — DNS not yet cut over
    fix: |
      In Azure DNS zone insightpulseai.com:
        DELETE: A record www → 178.128.112.214 (DO, decommissioned)
        ADD:    CNAME www → ipai-prod.z01.azurefd.net
      Then verify AFD custom domain insightpulseai.com and www.insightpulseai.com
      have ManagedCertificate provisioned and association state = Approved.
    notes: "\n  CURRENT STATE: DNS_PROBE_FINISHED_NXDOMAIN in browser (DO IP dead)\n  TARGET STATE: CNAME → AFD endpoint, AFD route root-redirect → erp.insightpulseai.com"

  # --- Apex (insightpulseai.com) ---
  - host: "@"
    service: Apex redirect → AFD root-redirect → erp.insightpulseai.com
    stack: azure-front-door
    dns_type: ALIAS
    resolves_to: ipai-prod.z01.azurefd.net
    status: BROKEN — DNS not yet cut over
    fix: |
      In Azure DNS zone insightpulseai.com:
        DELETE: A record @ → 178.128.112.214 (DO, decommissioned)
        ADD:    ALIAS record @ → ipai-prod.z01.azurefd.net
              (Azure DNS supports ALIAS for apex; use resource type = Azure Front Door)
      Then verify AFD custom domain insightpulseai.com has ManagedCertificate = Approved.
    notes: "\n  CURRENT STATE: ERR_CONNECTION_TIMED_OUT (DO droplet dead)\n  TARGET STATE: ALIAS → AFD endpoint, AFD route root-redirect → erp.insightpulseai.com"

