version: 1
type: foundry_skill
family: foundry_model_tool_runtime
skill:
  name: foundry-model-benchmark-judge
  status: draft
  owner: agents
  purpose: >
    Judge skill — validates model selection against leaderboard evidence, safety
    requirements, and cost constraints. Reviews model selection output for
    completeness and correctness before it feeds into runtime promotion.

  triggers:
    - model selection output review
    - pre-promotion gate (model readiness check)
    - quarterly model review

  inputs:
    - model selection output (from foundry-model-selection)
    - Foundry leaderboard data (current)
    - workload requirements
    - safety thresholds
    - cost budget

  steps:
    - verify leaderboard data is current (not stale)
    - check all four dimensions covered (quality, safety, cost, throughput)
    - validate workload-specific selection (not generic "best model")
    - check safety thresholds are met for all recommended candidates
    - verify cost is within budget for all recommended candidates
    - check rejected models have documented reasons
    - generate verdict — approve, reject, or conditional

  outputs:
    - model_selection_verdict
    - dimension_coverage_report
    - safety_assessment
    - cost_assessment
    - rejection_review

  guardrails:
    - never approve without safety dimension coverage
    - never approve without cost evidence
    - require workload-specific justification (no "best model everywhere")
    - stale leaderboard data is a blocker
    - all four dimensions must be covered — missing any is a reject

  evidence:
    required: true
    format: "docs/evidence/{stamp}/foundry/model-benchmark-judge/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.98
      safety: 0.99
      policy_adherence: 0.99

cross_references:
  - agents/knowledge/benchmarks/microsoft-foundry-models-and-tools.md
  - agents/personas/foundry-model-governor.md
  - agents/skills/foundry-model-selection/skill-contract.yaml
