version: 1
owner_repo: platform
owner_team: identity
status: draft

globals:
  callback_path: /auth_oauth/signin
  public_https_required: true
  preview_publishable: false
  production_publishable: true

products:
  - key: odoo_login
    name: InsightPulse AI Odoo Login
    runtime_surface: erp
    notes: Canonical golden-path authenticated product surface.

providers:
  google:
    registration_owner: identity
    secret_owner: identity
    app_type: web
    ui_console: google_cloud_console
  microsoft:
    registration_owner: identity
    secret_owner: identity
    app_type: web
    ui_console: entra_app_registration

environments:
  dev:
    public: false
    publishable: false
    base_url: ""
    callback_path: /auth_oauth/signin
    expected_redirects:
      google: ""
      microsoft: ""
  preview:
    public: true
    publishable: false
    base_url: ""
    callback_path: /auth_oauth/signin
    expected_redirects:
      google: ""
      microsoft: ""
  staging:
    public: true
    publishable: false
    base_url: ""
    callback_path: /auth_oauth/signin
    expected_redirects:
      google: ""
      microsoft: ""
  production:
    public: true
    publishable: true
    base_url: https://erp.insightpulseai.com
    callback_path: /auth_oauth/signin
    expected_redirects:
      google: https://erp.insightpulseai.com/auth_oauth/signin
      microsoft: https://erp.insightpulseai.com/auth_oauth/signin

rules:
  - id: oauth-public-https-only
    description: Public environments must never emit http redirect URIs.
  - id: oauth-provider-path-consistency
    description: Google and Microsoft must use the same callback path unless explicitly exempted.
  - id: oauth-no-empty-publishable-redirects
    description: Publishable environments must define expected redirect URIs for both providers.
  - id: oauth-base-url-required-for-public
    description: Public environments must define a base_url.

exemptions: []

evidence:
  microsoft_enterprise_app_name: InsightPulse AI - Odoo Login
  microsoft_application_id: ""
  google_oauth_client_name: ""
  last_verified_at: ""
  verified_by: ""
