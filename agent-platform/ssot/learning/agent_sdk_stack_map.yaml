version: 1
source: microsoft_github_palantir_sdks
status: active
type: framework_taxonomy
family: agent_sdk_stack
updated_at: "2026-03-17"

description: >
  Four SDK layers mapped to bounded personas and skills.
  Microsoft Agent Framework for orchestration, M365 Agents SDK for channels,
  GitHub Copilot SDK for developer assistance, Palantir Foundry SDK for
  external integration only.

sdk_layers:
  - id: microsoft-agent-framework
    repo: microsoft/agent-framework
    role: core_orchestration_framework
    canonical_for:
      - multi_agent_workflows
      - graph_orchestration
      - telemetry_ready_agents
    persona: agent-orchestrator
    skill: agent-framework-core

  - id: microsoft-365-agents-sdk
    repo: microsoft/Agents
    role: channel_delivery_sdk
    canonical_for:
      - teams_channel
      - m365_copilot_channel
      - web_custom_app_channel
    persona: m365-channel-agent
    skill: m365-agents-channel-delivery

  - id: github-copilot-sdk
    repo: github/copilot-sdk
    role: developer_assistant_sdk
    canonical_for:
      - coding_assistant
      - repo_aware_dev_helper
    persona: developer-copilot
    skill: copilot-sdk-dev-assistant
    maturity: technical_preview

  - id: palantir-foundry-platform-python
    repo: palantir/foundry-platform-python
    role: external_platform_sdk
    canonical_for:
      - palantir_foundry_integration_only
    persona: external-platform-integrator
    skill: palantir-foundry-integration-assessment
    default_status: out_of_scope_unless_explicitly_needed

cross_references:
  - agents/knowledge/benchmarks/microsoft-agent-framework.md
  - agents/knowledge/benchmarks/microsoft-365-agents-sdk.md
  - agents/knowledge/benchmarks/github-copilot-sdk.md
  - agents/knowledge/benchmarks/palantir-foundry-platform-sdk.md
