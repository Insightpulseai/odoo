version: 1
namespace: ipai.ops_platform.finance.document_pipeline_registry.v1
artifact_type: registry
repo_key: ops_platform
domain: finance
subject: document_pipeline_registry

pipelines:
  - pipeline_key: vendor_bill_ingest
    document_class: vendor_bill
    owner_repo: odoo
    stages:
      - stage_key: intake
        handler: document_intake_service
        owner_repo: ops_platform
      - stage_key: classify
        handler: document_intelligence.classify_document
        owner_repo: agents
      - stage_key: extract
        handler: document_intelligence.extract_invoice
        owner_repo: agents
      - stage_key: normalize
        handler: normalized_extraction_envelope
        owner_repo: ops_platform
      - stage_key: review
        handler: finance_doc_review
        owner_repo: odoo
      - stage_key: draft_create
        handler: create_vendor_bill_draft
        owner_repo: odoo
      - stage_key: approve
        handler: vendor_bill_approval_workflow
        owner_repo: odoo
      - stage_key: post
        handler: vendor_bill_posting_workflow
        owner_repo: odoo
      - stage_key: evidence
        handler: evidence_registry_write
        owner_repo: ops_platform
    rules:
      human_review_required_if:
        - confidence_below_threshold
        - duplicate_candidate_found
        - vendor_unresolved
        - tax_ambiguity
      direct_posting_allowed: false
      auto_payment_allowed: false

  - pipeline_key: expense_receipt_ingest
    document_class: receipt
    owner_repo: odoo
    stages:
      - stage_key: intake
        handler: document_intake_service
        owner_repo: ops_platform
      - stage_key: classify
        handler: document_intelligence.classify_document
        owner_repo: agents
      - stage_key: extract
        handler: document_intelligence.extract_receipt
        owner_repo: agents
      - stage_key: normalize
        handler: normalized_extraction_envelope
        owner_repo: ops_platform
      - stage_key: review
        handler: finance_doc_review
        owner_repo: odoo
      - stage_key: draft_create
        handler: create_expense_draft
        owner_repo: odoo
      - stage_key: submit
        handler: submit_expense_report
        owner_repo: odoo
      - stage_key: approve
        handler: approve_expense_report
        owner_repo: odoo
      - stage_key: reimburse
        handler: reimburse_expense_report
        owner_repo: odoo
      - stage_key: evidence
        handler: evidence_registry_write
        owner_repo: ops_platform
    rules:
      human_review_required_if:
        - confidence_below_threshold
        - employee_unresolved
        - category_unresolved
      auto_reimburse_allowed: false

  - pipeline_key: bank_statement_ingest
    document_class: bank_statement
    owner_repo: odoo
    stages:
      - stage_key: intake
        handler: document_intake_service
        owner_repo: ops_platform
      - stage_key: classify
        handler: document_intelligence.classify_document
        owner_repo: agents
      - stage_key: extract
        handler: document_intelligence.extract_layout
        owner_repo: agents
      - stage_key: normalize
        handler: normalized_extraction_envelope
        owner_repo: ops_platform
      - stage_key: review
        handler: reconciliation_review
        owner_repo: odoo
      - stage_key: draft_create
        handler: create_bank_statement_import_batch
        owner_repo: odoo
      - stage_key: reconcile
        handler: reconciliation_workflow
        owner_repo: odoo
      - stage_key: evidence
        handler: evidence_registry_write
        owner_repo: ops_platform
    rules:
      human_review_required_if:
        - confidence_below_threshold
        - balance_mismatch
        - account_unresolved
      auto_reconcile_allowed: false

shared_contracts:
  extraction_output_ref: ipai.ops_platform.docint.output_schema_registry.v1
  odoo_mapping_ref: ipai.odoo.finance.ocr_destination_mapping.v1
  review_queue_ref: ipai.ops_platform.finance.human_review_queue_contract.v1

status_values:
  - intake_received
  - classified
  - extracted
  - normalized
  - review_required
  - draft_created
  - approved
  - posted
  - reimbursed
  - reconciled
  - failed

evidence:
  required_for_all_terminal_states: true
  registry_ref: ipai.ops_platform.finance.evidence_registry.v1
