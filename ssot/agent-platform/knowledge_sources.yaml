# =============================================================================
# Knowledge Source Authority — Agent Platform SSOT
# =============================================================================
# Defines the authoritative knowledge sources for the IPAI agent platform,
# their precedence order, and per-source metadata.
#
# Cross-references:
#   - ssot/ai/sources.yaml          (AI search index definitions)
#   - ssot/agents/knowledge-bindings.yaml (collection-to-agent bindings)
#   - ssot/agent-platform/learn_mcp_topic_map.yaml (MCP query catalogue)
#   - ssot/agent-platform/skills_manifest.yaml     (skill-to-source bindings)
#
# Authority rule: higher-priority source wins when content conflicts.
# Repo SSOT (priority 1) always overrides generic Microsoft Learn guidance.
# =============================================================================

version: 1
artifact: ssot/agent-platform/knowledge_sources.yaml
source_of_truth: true
profile: insightpulseai-knowledge-sources

purpose:
  description: knowledge_source_authority_and_precedence_for_agent_platform

# ---------------------------------------------------------------------------
# Precedence ladder
# ---------------------------------------------------------------------------
# Agents MUST resolve conflicts by descending this list — stop at the first
# source that contains a definitive answer.

source_precedence:
  - priority: 1
    type: repo_ssot
    description: >
      Committed YAML/Markdown in ssot/, CLAUDE.md, AGENTS.md, docs/architecture/.
      This is the single source of truth for the InsightPulseAI platform.
      Overrides ALL external sources.
    conflict_resolution: repo_wins_unconditionally

  - priority: 2
    type: architecture_reference_docs
    description: >
      Repo-local architecture decision records and platform doctrine files
      under docs/architecture/ and docs/ai/. Authoritative for design
      rationale and historical context.
    conflict_resolution: repo_doc_wins_over_external

  - priority: 3
    type: microsoft_learn_mcp
    description: >
      First-party Microsoft Learn content retrieved via the MCP server at
      https://learn.microsoft.com/api/mcp. Use tools: microsoft_docs_search,
      microsoft_code_sample_search, microsoft_docs_fetch.
    conflict_resolution: use_for_azure_service_specifics_not_covered_by_ssot

  - priority: 4
    type: official_microsoft_github_samples
    description: >
      Azure-Samples and Microsoft GitHub organizations. Use for working code
      patterns not yet covered by Learn MCP. Validate against repo SSOT before
      adoption.
    conflict_resolution: validate_against_ssot_first

  - priority: 5
    type: secondary_sources
    description: >
      OCA READMEs, vendor docs, community references. Always mark as advisory.
      Must not contradict higher-priority sources. Never adopt patterns from
      secondary sources that bypass SSOT rules.
    conflict_resolution: advisory_only_mark_explicitly

# ---------------------------------------------------------------------------
# Source catalogue
# ---------------------------------------------------------------------------

sources:

