version: 2
owner_repo: platform
updated: "2026-04-04"
description: MCP registry for the Insightpulseai platform layer

servers:
  - id: azure
    name: Azure MCP Server
    source: "https://github.com/Azure/azure-mcp-server"
    docs: "https://learn.microsoft.com/en-us/azure/developer/azure-mcp-server/overview"
    vendor: Microsoft (first-party)
    enabled: true
    priority: 1
    category: infra
    description: >
      First-party MCP server from Microsoft. 40+ Azure service namespaces.
      Authenticates via Entra ID / Azure RBAC. Supports read-only mode,
      namespace filtering, tool annotations (destructive/idempotent/read-only/secret).
    namespaces:
      enabled:
        - postgres       # Azure Database for PostgreSQL (ipai-odoo-dev-pg)
        - keyvault       # Key Vault (kv-ipai-dev, ipai-odoo-dev-kv)
        - acr            # Container Registry (ipaiodoodevacr, cripaidev)
        - storage        # Blob/File storage
        - monitor        # Azure Monitor (adapt for Odoo telemetry)
        - appservice     # Container Apps inspection
        - deploy         # Deployment status
        - foundry        # AI Foundry (oai-ipai-dev, agent layer)
        - search         # AI Search (srch-ipai-dev, KB retrieval)
        - role           # RBAC inspection
        - policy         # Azure Policy governance
      deferred:
        - bicepschema    # IaC authoring (add when azd template is ready)
        - pricing        # Cost analysis (add when FinOps lane is active)
        - extension      # azd CLI tools (add when azd template is ready)
    purpose:
      - resource_inspection
      - deployment_state
      - runtime_health
      - secret_reference_check
      - postgres_server_inspection
      - container_registry_ops
      - foundry_agent_tooling
    repos:
      - platform
      - automations
      - infra
      - agent-platform
    environments:
      - dev
      - staging
      - prod
    config:
      default_mode: read_only
      elicitation: true  # user confirmation for secret-bearing ops

  - id: azure-devops
    name: Azure DevOps MCP
    enabled: true
    priority: 2
    category: delivery
    purpose:
      - work_items
      - builds
      - releases
      - test_plans
    repos:
      - platform
      - automations
      - docs

  - id: microsoft-learn
    name: Microsoft Learn MCP
    enabled: true
    priority: 3
    category: grounding
    purpose:
      - trusted_docs_lookup
      - microsoft_reference_grounding
    repos:
      - agents
      - docs
      - platform

  - id: playwright
    name: Playwright
    enabled: true
    priority: 4
    category: verification
    purpose:
      - browser_smoke_tests
      - evidence_capture
      - ui_regression_checks
    repos:
      - automations
      - web
      - docs

  - id: markitdown
    name: Markitdown
    enabled: true
    priority: 5
    category: transformation
    purpose:
      - document_to_markdown
      - evidence_normalization
      - grounding_prep
    repos:
      - automations
      - agents
      - docs

deferred_servers:
  - id: azure-ai-foundry
    reason: experimental — Azure MCP Server `foundry` namespace covers most needs
  - id: mcp-enterprise
    reason: add only when Entra natural-language lookup is needed
  - id: fabric-rti
    reason: add only if Eventhouse/KQL lane is active

evaluation_queue:
  - id: dev-proxy
    name: Dev Proxy
    vendor: Microsoft
    source: "https://github.com/dotnet/dev-proxy"
    docs: "https://learn.microsoft.com/en-us/microsoft-cloud/dev/dev-proxy/overview"
    category: testing
    description: >
      API simulator for chaos testing. Intercepts HTTP calls to simulate failures,
      rate limits, throttling. Has LanguageModelRateLimitingPlugin for LLM token
      limit simulation. Not an MCP server but complements the test harness.
    purpose:
      - llm_rate_limit_chaos_testing
      - api_failure_simulation
      - agent_resilience_testing
    repos:
      - agent-platform
      - automations
    action: evaluate — add to agent-platform test harness
    note: not an MCP server; listed here for tool registry completeness

explicit_exclusions:
  - id: clarity
    reason: web analytics only; not Clarity PPM
  - id: typespec
    reason: FastAPI's native OpenAPI generation is sufficient; revisit if multi-protocol needed
  - id: copilot-app-modernization
    reason: Java/.NET only; not applicable to Python/Odoo stack
