name: Devcontainer pre-build

# Builds and pushes pre-built devcontainer images to GHCR weekly.
# Fast Codespace startup: image pull instead of full build (~60s vs ~8min).
#
# Images published:
#   ghcr.io/insightpulseai/odoo-devcontainer:latest
#   ghcr.io/insightpulseai/infra-devcontainer:latest
#   ghcr.io/insightpulseai/platform-devcontainer:latest
#
# Triggered: weekly Sunday 00:00 UTC + on devcontainer.json changes + manual

on:
  schedule:
    - cron: "0 0 * * 0"   # Sunday 00:00 UTC
  push:
    paths:
      - "odoo/.devcontainer/**"
      - "infra/.devcontainer/**"
      - "platform/.devcontainer/**"
      - ".github/workflows/devcontainer-ci.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Which devcontainer to rebuild (all | odoo | infra | platform)"
        required: false
        default: "all"

env:
  REGISTRY: ghcr.io
  ORG: insightpulseai

permissions:
  contents: read
  packages: write   # push to GHCR

jobs:

  # ── Determine which containers need rebuilding ─────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      odoo:     ${{ steps.filter.outputs.odoo }}
      infra:    ${{ steps.filter.outputs.infra }}
      platform: ${{ steps.filter.outputs.platform }}
      all:      ${{ github.event.inputs.target == 'all' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            odoo:
              - 'odoo/.devcontainer/**'
            infra:
              - 'infra/.devcontainer/**'
            platform:
              - 'platform/.devcontainer/**'

  # ── Odoo devcontainer ──────────────────────────────────────────────────────
  build-odoo:
    needs: changes
    if: needs.changes.outputs.odoo == 'true' || needs.changes.outputs.all == 'true' || github.event.inputs.target == 'odoo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push odoo-devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.ORG }}/odoo-devcontainer
          imageTag: latest,sha-${{ github.sha }}
          configFile: odoo/.devcontainer/devcontainer.json
          push: always
          platform: linux/amd64

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/odoo-devcontainer:latest
          docker run --rm ${{ env.REGISTRY }}/${{ env.ORG }}/odoo-devcontainer:latest python --version
          docker run --rm ${{ env.REGISTRY }}/${{ env.ORG }}/odoo-devcontainer:latest az --version | head -1
          echo "✓ odoo-devcontainer image verified"

  # ── Infra devcontainer ─────────────────────────────────────────────────────
  build-infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true' || needs.changes.outputs.all == 'true' || github.event.inputs.target == 'infra'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push infra-devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.ORG }}/infra-devcontainer
          imageTag: latest,sha-${{ github.sha }}
          configFile: infra/.devcontainer/devcontainer.json
          push: always
          platform: linux/amd64

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/infra-devcontainer:latest
          docker run --rm ${{ env.REGISTRY }}/${{ env.ORG }}/infra-devcontainer:latest az bicep version
          echo "✓ infra-devcontainer image verified"

  # ── Platform devcontainer ──────────────────────────────────────────────────
  build-platform:
    needs: changes
    if: needs.changes.outputs.platform == 'true' || needs.changes.outputs.all == 'true' || github.event.inputs.target == 'platform'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push platform-devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.ORG }}/platform-devcontainer
          imageTag: latest,sha-${{ github.sha }}
          configFile: platform/.devcontainer/devcontainer.json
          push: always
          platform: linux/amd64

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/platform-devcontainer:latest
          echo "✓ platform-devcontainer image verified"

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    needs: [build-odoo, build-infra, build-platform]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build summary
        run: |
          echo "## Devcontainer pre-build summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| odoo-devcontainer | ${{ needs.build-odoo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| infra-devcontainer | ${{ needs.build-infra.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| platform-devcontainer | ${{ needs.build-platform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
