schema: ssot.plane.platform_portfolio.v1
version: 1
updated: "2026-03-16"

contract:
  name: Platform Portfolio Management Contract
  workspace_slug: ipai-platform
  project_ref: ssot/plane/projects/platform.yaml
  taxonomy_refs:
    labels: ssot/plane/taxonomy/labels.yaml
    modules: ssot/plane/taxonomy/modules.yaml
    states: ssot/plane/taxonomy/states.yaml
    estimates: ssot/plane/taxonomy/estimates.yaml
    cycles: ssot/plane/taxonomy/cycles.yaml
    work_item_types: ssot/plane/taxonomy/work_item_types.yaml
  template_refs:
    epic: ssot/plane/templates/epic.yaml
    feature: ssot/plane/templates/feature.yaml
    story: ssot/plane/templates/story.yaml
    task: ssot/plane/templates/task.yaml
    bug: ssot/plane/templates/bug.yaml
    risk: ssot/plane/templates/risk.yaml
    change: ssot/plane/templates/change.yaml
    client_deliverable: ssot/plane/templates/client_deliverable.yaml
  pages_ref: ssot/plane/pages/index.yaml

# Azure Boards Agile alignment
azure_boards_alignment:
  process: Agile
  hierarchy:
    portfolio_backlog:
      - Epic
      - Feature
    product_backlog:
      - Story
      - Task
    defect:
      - Bug
    governance:
      - Risk
      - Change
      - Client Deliverable

  mapping:
    team_project: "Plane Project (Odoo on Azure Platform)"
    portfolio_backlog_epics: "Work items typed Epic + filtered view"
    feature_backlog: "Work items typed Feature + filtered view"
    product_backlog_stories: "Work items typed Story"
    sprint_iteration: "Cycle (delivery wave)"
    area_path: "Module (architecture slice)"
    tag: "Label"
    delivery_plan: "Cycle-scoped views across modules"
    wiki_page: "Plane Page"
    work_item_template: "Plane Work Item Template (requires Pro)"
    board_column: "State (Backlog -> Done)"
    rollup_progress: "Plane Analytics (workspace/project/cycle/module)"

strategy_linkage:
  canonical_strategy_file: ssot/governance/unified_strategy.yaml
  portfolio_sor: azure_boards
  mirror: plane
  every_epic_requires: canonical_objective_id  # OBJ-001..007
  every_feature_requires: thematic_okr_id      # obj_A..E or O1..O3
  linkage_rule: >
    Epics in Plane must reference an OBJ-xxx from unified_strategy.yaml.
    Features must reference an obj_x or Ox rollup.
    This ensures every work item traces back to a strategic objective.

governance:
  required_label_prefixes:
    - Type/
    - Module/
    - Priority/
    - Wave/
  required_states:
    - Backlog
    - Approved
    - In Progress
    - Blocked
    - In Review
    - Done
    - Cancelled
  portfolio_rules:
    - "Every Epic must have at least one child Feature"
    - "Every Feature must have at least one child Story"
    - "Every Story must have acceptance criteria in description"
    - "Every Risk must have mitigation and trigger defined"
    - "Every Change must have rollback plan defined"
    - "Client Deliverables must have demo/evidence link before Done"
