version: 1
profile: insightpulseai-odoo18-mvp
generated_from_session: true

governance:
  odoo_truth_rule: true
  no_parallel_ledger: true
  no_parallel_workflow_engine: true
  ce_oca_first_sourcing_order:
    - ce_native
    - oca_native_direct
    - oca_native_adjacent
    - composite_ce_oca
    - thin_ipai_delta
    - optional_external_bridge
  mvp_shape: viable_horizontal_slice
  saas_vs_multitenancy:
    saas_is_business_model: true
    multitenancy_is_architecture_decision: true
    tenant_definition_required_per_bundle: true
  responsible_ai:
    human_oversight_required: true
    confirm_critical_actions: true
    sensitive_domains:
      - finance
      - tax
      - compliance
    tool_validation_required: true
    monitoring_observability_required: true
    content_safety_required: true
    references:
      azure_agent_service_transparency_note: "https://learn.microsoft.com/en-us/azure/foundry/responsible-ai/agents/transparency-note"
      microsoft_agent_framework_transparency_faq: "https://github.com/microsoft/agent-framework/blob/main/TRANSPARENCY_FAQ.md"

azure_baseline:
  runtime:
    resource_groups:
      runtime: rg-ipai-dev-odoo-runtime
      data: rg-ipai-dev-odoo-data
      platform: rg-ipai-dev-platform
    network:
      vnet: vnet-ipai-dev
      waf_policy: wafipaidev
    data:
      postgres_flexible_server: pg-ipai-odoo
    secrets:
      key_vault: kv-ipai-dev
    existing_dependencies:
      - private_endpoints
      - private_dns
      - log_analytics
      - container_apps
    rule: reuse_before_new_infra
  ai:
    resource: ipai-copilot-resource
    project: ipai-copilot
    region: eastus2
    endpoints:
      foundry_project: "https://ipai-copilot-resource.services.ai.azure.com/api/projects/ipai-copilot"
      azure_openai_base_host: "https://ipai-copilot-resource.openai.azure.com/"
      azure_openai_sdk_base: "https://ipai-copilot-resource.openai.azure.com/openai/v1/"
      ai_services_base: "https://ipai-copilot-resource.services.ai.azure.com/"
    connected_resources_confirmed:
      - category: AIServices
      - category: AzureStorageAccount
      - category: ApiKey
        name: bing-grounding
    endpoint_discipline:
      foundry_project_for:
        - agents
        - evaluations
        - project_native_capabilities
      azure_openai_for:
        - chat_completions
        - embeddings
        - inference
      ai_services_for:
        - document_intelligence
        - language
        - content_safety
    optional_foundry_connections_not_assumed:
      - azure_ai_search
      - cosmos_db
      - fabric
      - grounding_with_bing_search_extra
      - application_insights

repos:
  odoo:
    role: erp_truth_and_thin_bridges
    source_layout:
      oca_root: addons/oca
      ipai_root: addons/ipai
      local_root: addons/local
    container_mounts:
      oca_repo_mount_prefix: /mnt/oca
      ipai_mount: /mnt/extra-addons/ipai
      local_mount: /mnt/extra-addons/local
    owns:
      - orm_models
      - approvals
      - accounting
      - taxes
      - expenses
      - project_state
      - access_rules
      - chatter
      - qweb_reports
      - thin_assistant_bridges
    must_not_own:
      - foundry_runtime
      - standalone_chat_backend
      - external_agent_orchestrator_truth

  agent-platform:
    role: agent_runtime_orchestration_grounding_ingestion
    preferred_template: get_started_with_ai_agents
    optional_templates:
      - get_started_with_ai_chat
      - multi_modal_content_processing
      - build_your_own_copilot_solution_accelerator
    owns:
      - foundry_runtime_integration
      - chat_backend
      - agent_orchestration
      - retrieval_grounding
      - attachment_ingestion
      - document_intelligence_bridge
      - tool_execution_runtime
      - telemetry
    must_not_own:
      - erp_truth
      - accounting_truth
      - approval_truth

  agents:
    role: declarative_agent_specs_skills_evals_registry
    owns:
      - prompts
      - skill_contracts
      - evals
      - routing_metadata
      - sub_agent_registry_specs
    must_not_own:
      - erp_truth
      - runtime_services
      - direct_business_logic_execution

  web:
    role: optional_browser_facing_shells
    preferred_template_if_needed: get_started_with_ai_chat
    optional_templates:
      - build_your_conversational_agent
    owns:
      - browser_shells
      - companion_ux
      - external_assistant_surfaces
    must_not_own:
      - erp_truth
      - runtime_orchestration_core

  infra:
    role: azure_cloudflare_iac_and_runtime_promotion
    owns:
      - network
      - waf
      - deployment_topology
      - key_vault_integration
      - promotion_lane_hardening

  platform:
    role: control_plane_ssot_backend_glue
    owns:
      - metadata
      - control_plane_contracts
      - vault_references
      - environment_contracts

templates:
  primary:
    pulser_joule: get_started_with_ai_agents
    concur_companion: get_started_with_ai_chat
    avatax_review: get_started_with_ai_agents
    api_edge: fastapi_membership_api_template_for_azure_container_apps
  optional:
    ocr_extraction: multi_modal_content_processing
    simple_chat_shell: get_started_with_ai_chat
    managed_identity_baseline: securely_authenticate_and_access_your_genai_app_with_managed_identity
  promotion_lane_only:
    - deploy_your_ai_application_in_production
    - multi_agent_workflow_automation
    - data_and_agent_governance_and_security
    - agentic_applications_for_unified_data_foundation

bundles:
  ppm_clarity:
    mvp: true
    status: ce_oca_first
    ce18_required:
      - project
      - project_account
      - project_hr_expense
      - project_purchase
      - project_sale_expense
      - sale_project
      - sale_timesheet
      - hr_timesheet
      - analytic
      - spreadsheet
      - spreadsheet_dashboard
      - spreadsheet_dashboard_hr_timesheet
      - spreadsheet_dashboard_sale_timesheet
    oca_required:
      direct:
        - project_parent
        - project_group
        - project_department
        - project_type
        - project_version
        - project_key
        - project_template
        - project_task_ancestor
        - project_task_parent_completion_blocking
        - project_task_parent_due_auto
        - project_task_stage_mgmt
        - project_task_stage_change_restriction
        - project_task_stage_state
        - project_task_code
        - project_task_name_with_id
        - project_stakeholder
        - project_reviewer
        - project_role
        - project_timeline
        - project_timeline_hr_timesheet
      adjacent:
        - hr_timesheet_sheet
        - hr_timesheet_sheet_policy_project_manager
        - hr_timesheet_begin_end
        - project_pivot
        - mis_builder
        - mis_builder_budget
        - sale_timesheet_budget
    ipai_required:
      - ipai_finance_ppm
    ipai_scope:
      - portfolio_rollup
      - governance_gate_reviews
      - risk_register
      - issue_register
      - investment_scoring
      - portfolio_rag_health
    non_module_required:
      - executive_analytics_optional
    deferred:
      - drag_drop_resource_optimization
      - enterprise_capacity_optimization
      - scenario_optimization

  reverse_sap_concur:
    mvp: true
    status: odoo_first_addon_plus_companion
    ce18_required:
      - hr_expense
      - sale_expense
      - project_hr_expense
      - project_sale_expense
      - account
      - account_payment
      - analytic
      - hr
      - mail
      - spreadsheet_dashboard_hr_expense
    oca_required:
      direct:
        - hr_expense_advance_clearing
        - hr_expense_advance_clearing_sequence
        - hr_expense_payment
        - hr_expense_sequence
        - hr_expense_tier_validation
      adjacent:
        - base_tier_validation
        - dms
        - dms_field
        - document_page_approval
        - queue_job
        - auditlog
        - mis_builder
        - helpdesk_mgmt
    ipai_required:
      - ipai_hr_expense_liquidation
      - ipai_expense_ops
      - ipai_expense_wiring
    ipai_scope:
      - cash_advance_request
      - approval_release_monitoring
      - liquidation_linkage
      - settlement_math
      - finance_review_posting_approval_metadata
      - tbwa_printable_forms
    optional_companion:
      api_edge: fastapi_membership_api_template_for_azure_container_apps
      web_shell: get_started_with_ai_chat
      ai_assist_allowed:
        - reminders
        - summaries
        - status_queries
    non_module_required:
      - qweb_cash_advance_form
      - qweb_itemized_liquidation_form
    deferred:
      - ocr_baseline
      - corporate_card_feeds
      - full_travel_stack
      - standalone_concur_platform
      - mobile_native_app

  reverse_sap_joule:
    mvp: true
    status: pulser_shell_plus_runtime
    ce18_required:
      - base
      - web
      - mail
      - bus
      - attachment_indexation
    oca_required: []
    ipai_required:
      - ipai_odoo_copilot
      - ipai_copilot_actions
      - ipai_ai_agent_sources
    ipai_optional_not_proven:
      - ipai_agent
    ipai_scope:
      - tri_modal_assistant
      - safe_action_classes
      - domain_agent_routing_contract
      - audit_logs
      - odoo_grounded_live_state
    runtime_required:
      foundry_project: ipai-copilot
      template: get_started_with_ai_agents
    rag_scope_only:
      - policies
      - sops
      - help
      - uploaded_docs
      - curated_knowledge
    deferred:
      - full_sub_agent_family_runtime
      - broad_multi_agent_autonomy
      - cross_suite_orchestration
      - governed_foundry_heavy_runtime

  reverse_avatax:
    mvp: true
    status: odoo_tax_truth_plus_review_plane
    ce18_required:
      - account
      - account_payment
      - account_tax_python
      - hr_expense
      - sale_expense
      - l10n_ph
      - l10n_account_withholding_tax
    oca_required: []
    ipai_required:
      - ipai_tax_intelligence
    ipai_scope:
      - pre_posting_validation
      - explainable_tax_exceptions
      - approval_aware_blocking
      - audit_trail
      - compliance_pack_boundary
    optional_runtime:
      template: get_started_with_ai_agents
      azure_openai_explanations: true
      document_extraction_later: multi_modal_content_processing
    deferred:
      - mandatory_third_party_tax_engine
      - multi_country_filing_automation
      - autonomous_tax_ops
      - global_parity_claims

  expense_parity_addon:
    mvp: true
    status: thin_boundary_and_wiring_module
    ce18_required:
      - hr_expense
      - account
      - mail
    oca_required:
      adjacent:
        - dms
        - queue_job
        - auditlog
    ipai_required:
      - ipai_expense_wiring
    ipai_scope:
      - boundary_documentation
      - parity_config
      - receipt_archival_wiring
    deferred:
      - ocr_baseline
      - ai_review_baseline
      - card_feed_baseline

testing:
  doctrine:
    odoo_native_first: true
    playwright_secondary: true
    devtools_debug_only: true
  layers:
    - transactioncase
    - form
    - httpcase_if_needed
    - playwright_critical_path_only
  required_for_mvp:
    - executable_tests_for_core_workflows
    - human_reviewable_failures
    - runtime_install_upgrade_validation
  browser_critical_only_for:
    - pulser_shell_ui
    - mobile_companion_flows
    - exposed_browser_surfaces

foundry_tooling:
  tool_policy_ssot: ssot/agent-platform/foundry_tool_policy.yaml
  tool_policy_doc: docs/architecture/FOUNDRY_TOOL_POLICY.md
  mcp_policy_ssot: ssot/agent-platform/mcp_policy.yaml
  mcp_policy_doc: docs/architecture/MCP_POLICY.md
  summary:
    preference_order:
      - built_in_tools
      - function_calling
      - openapi
      - mcp
      - a2a_preview_later
    built_in_preferred_for:
      web_grounding: web_search
      uploaded_docs: file_search
      data_analysis: code_interpreter
    mcp_for: shared_remote_and_ops_tools_only
    project_connections_for_auth: true
    structured_inputs_preferred: true
    preview_tools_off_mvp_critical_path: true

postgres_mcp_policy:
  source: "https://github.com/Azure-Samples/azure-postgres-mcp-demo"
  role: optional_ops_dba_tool
  on_mvp_critical_path: false
  best_placement:
    repo: agent-platform or infra
    mode: optional_tool_integration_ops_assistant
    permissions: read_only_first
  allowed:
    - read_only_schema_discovery
    - admin_ops_queries
    - troubleshooting
    - support_investigation
    - migration_verification_helpers
    - databricks_reporting_support_later
  prohibited:
    - direct_business_writes
    - approval_state_changes
    - accounting_state_changes
    - tax_state_mutation
    - expense_workflow_mutation
    - bypassing_odoo_orm_for_erp_work
  guardrail: >
    Adopt as an optional Postgres ops/debug MCP tool only.
    Never use as a replacement for Odoo APIs or ORM-owned business logic.
    Pulser must not talk straight to Postgres for ERP work.

deferred_global:
  - deploy_your_ai_application_in_production
  - azure_ai_search_as_default
  - cosmos_db_as_default
  - fabric_as_default
  - full_sub_agent_registry_runtime
  - speculative_ipai_module_sprawl
