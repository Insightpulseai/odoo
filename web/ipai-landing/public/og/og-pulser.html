<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>InsightPulseAI - Pulser OG Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #09090F;
  }

  .card {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(170deg, #09090F 0%, #0C0C18 30%, #0A0A14 70%, #080810 100%);
  }

  /* Top accent */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #F59E0B 0%, #D97706 35%, rgba(217, 119, 6, 0.3) 70%, transparent 100%);
  }

  /* Pulse rings - the hero visual */
  .pulse-container {
    position: absolute;
    right: 220px;
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    z-index: 1;
  }

  .pulse-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(245, 158, 11, 0.08);
    transform: translate(-50%, -50%);
  }

  .pulse-ring:nth-child(1) {
    width: 100px;
    height: 100px;
    border-color: rgba(245, 158, 11, 0.22);
    box-shadow: 0 0 30px rgba(245, 158, 11, 0.06), inset 0 0 30px rgba(245, 158, 11, 0.03);
  }

  .pulse-ring:nth-child(2) {
    width: 200px;
    height: 200px;
    border-color: rgba(245, 158, 11, 0.15);
  }

  .pulse-ring:nth-child(3) {
    width: 320px;
    height: 320px;
    border-color: rgba(245, 158, 11, 0.10);
  }

  .pulse-ring:nth-child(4) {
    width: 460px;
    height: 460px;
    border-color: rgba(245, 158, 11, 0.06);
  }

  .pulse-ring:nth-child(5) {
    width: 620px;
    height: 620px;
    border-color: rgba(245, 158, 11, 0.03);
  }

  .pulse-ring:nth-child(6) {
    width: 800px;
    height: 800px;
    border-color: rgba(245, 158, 11, 0.015);
  }

  /* Core glow */
  .pulse-core {
    position: absolute;
    right: 220px;
    top: 50%;
    transform: translate(50%, -50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.6) 0%, rgba(245, 158, 11, 0.2) 40%, transparent 70%);
    z-index: 2;
  }

  .pulse-core::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #F59E0B;
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.5), 0 0 60px rgba(245, 158, 11, 0.2);
  }

  /* Ambient glow */
  .ambient-glow {
    position: absolute;
    right: 100px;
    top: 40%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.04) 0%, rgba(217, 119, 6, 0.02) 30%, transparent 60%);
    z-index: 0;
  }

  /* Secondary subtle blue glow for depth */
  .ambient-glow-blue {
    position: absolute;
    right: 350px;
    top: 60%;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.03) 0%, transparent 60%);
    z-index: 0;
  }

  /* Content */
  .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 64px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 5;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .wordmark-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, #F59E0B, #D97706);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wordmark-icon::after {
    content: '';
    width: 14px;
    height: 14px;
    border: 2.5px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
  }

  .wordmark-text {
    font-size: 22px;
    font-weight: 700;
    color: #E0DDD5;
    letter-spacing: -0.02em;
  }

  .wordmark-text span {
    color: #F59E0B;
  }

  .headline-block {
    max-width: 580px;
  }

  .headline {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.12;
    color: #FFFFFF;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }

  .headline .accent {
    color: #FBBF24;
  }

  /* Pulser badge */
  .pulser-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-radius: 100px;
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.18);
  }

  .pulser-badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #F59E0B;
    box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
  }

  .pulser-badge-text {
    font-size: 14px;
    font-weight: 600;
    color: #D97706;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .domain {
    font-size: 15px;
    font-weight: 500;
    color: #2E2B24;
    letter-spacing: 0.02em;
  }

  /* Floating data particles along rings */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(245, 158, 11, 0.35);
    z-index: 2;
  }

  .particle.bright {
    background: rgba(245, 158, 11, 0.6);
    box-shadow: 0 0 6px rgba(245, 158, 11, 0.3);
  }

  .particle.dim {
    background: rgba(245, 158, 11, 0.15);
    width: 3px;
    height: 3px;
  }

  /* Wave lines emanating from center */
  .wave-line {
    position: absolute;
    right: 220px;
    top: 50%;
    height: 1px;
    transform-origin: right center;
    z-index: 1;
  }

  .wave-line-inner {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, rgba(245, 158, 11, 0.12), transparent);
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-line"></div>
  <div class="ambient-glow"></div>
  <div class="ambient-glow-blue"></div>

  <!-- Pulse rings -->
  <div class="pulse-container">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
  </div>
  <div class="pulse-core"></div>

  <!-- Particles scattered along ring paths -->
  <div class="particle bright" style="right: 270px; top: 200px;"></div>
  <div class="particle" style="right: 160px; top: 340px;"></div>
  <div class="particle dim" style="right: 320px; top: 420px;"></div>
  <div class="particle bright" style="right: 380px; top: 260px;"></div>
  <div class="particle dim" style="right: 120px; top: 180px;"></div>
  <div class="particle" style="right: 350px; top: 380px;"></div>
  <div class="particle dim" style="right: 200px; top: 150px;"></div>
  <div class="particle bright" style="right: 90px; top: 290px;"></div>
  <div class="particle dim" style="right: 440px; top: 320px;"></div>
  <div class="particle" style="right: 280px; top: 470px;"></div>

  <!-- Wave lines -->
  <div class="wave-line" style="width: 200px; transform: rotate(-25deg);">
    <div class="wave-line-inner"></div>
  </div>
  <div class="wave-line" style="width: 160px; transform: rotate(15deg);">
    <div class="wave-line-inner"></div>
  </div>
  <div class="wave-line" style="width: 180px; transform: rotate(-60deg);">
    <div class="wave-line-inner"></div>
  </div>
  <div class="wave-line" style="width: 140px; transform: rotate(45deg);">
    <div class="wave-line-inner"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="wordmark">
      <div class="wordmark-icon"></div>
      <div class="wordmark-text">InsightPulse<span>AI</span></div>
    </div>

    <div class="headline-block">
      <h1 class="headline">Run Odoo in the Cloud<br>with <span class="accent">Practical AI</span></h1>
      <div class="pulser-badge">
        <div class="pulser-badge-dot"></div>
        <div class="pulser-badge-text">Powered by Pulser</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="domain">insightpulseai.com</div>
    </div>
  </div>
</div>
</body>
</html>
