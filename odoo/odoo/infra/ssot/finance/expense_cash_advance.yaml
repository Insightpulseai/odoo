# schema: ssot.finance.expense_cash_advance.v1
# Domain model for Concur-like cash advance + expense liquidation + monitoring.
# Owning spec: spec/expense-cash-advance/
# Existing modules: ipai_hr_expense_liquidation (partial), ipai_expense_ocr
# OCA baseline: OCA/hr-expense (submodule present, no 19.0 modules checked out)
# No SAP integration. No EE code reuse. First-party capability.

version: 1
meta:
  owner: finance
  purpose: "Machine-readable domain spec for cash advance lifecycle, liquidation, monitoring, and OCR."
  created: "2026-03-03"
  last_reviewed: "2026-03-03"

# ── Entities ──────────────────────────────────────────────────────────────────

entities:

  - id: cash_advance_request
    odoo_model: hr.expense.liquidation   # Existing model (liquidation_type=cash_advance)
    description: "Request for cash advance before a trip or project"
    fields:
      - name: requester
        type: many2one
        comodel: hr.employee
        required: true
      - name: purpose
        type: text
        required: true
      - name: trip_or_project
        type: char
        description: "Trip name or project reference"
      - name: currency_id
        type: many2one
        comodel: res.currency
        required: true
      - name: amount_requested
        type: monetary
        required: true
      - name: date_from
        type: date
      - name: date_to
        type: date
      - name: policy_context
        type: text
        description: "Applicable expense policy rules"
      - name: attachments
        type: many2many
        comodel: ir.attachment
        description: "Supporting evidence (approval emails, trip orders)"
      - name: status
        type: selection
        ref: status_machine.cash_advance

  - id: cash_advance_release
    odoo_model: null                      # [NEEDS MODEL] — extend hr.expense.liquidation or new model
    description: "Record of fund disbursement to employee"
    fields:
      - name: request_id
        type: many2one
        ref: cash_advance_request
        required: true
      - name: payment_method
        type: selection
        options: [bank_transfer, check, petty_cash]
      - name: payment_ref
        type: char
        description: "Bank reference or check number"
      - name: released_amount
        type: monetary
        required: true
      - name: released_at
        type: datetime
      - name: released_by
        type: many2one
        comodel: res.users
      - name: journal_entry_id
        type: many2one
        comodel: account.move
        description: "Accounting entry for advance disbursement"

  - id: cash_advance_liquidation
    odoo_model: hr.expense.liquidation   # Existing model
    description: "Settlement of advance against actual expenses"
    fields:
      - name: request_id
        type: many2one
        ref: cash_advance_request
      - name: expense_lines
        type: one2many
        ref: expense_item
      - name: total_expenses
        type: monetary
        computed: true
      - name: returned_amount
        type: monetary
        description: "Cash returned if expenses < advance"
      - name: additional_reimbursement
        type: monetary
        description: "Extra reimbursement if expenses > advance"
      - name: liquidation_status
        type: selection
        ref: status_machine.liquidation
      - name: submitted_at
        type: datetime

  - id: expense_item
    odoo_model: hr.expense.liquidation.line  # Existing model
    description: "Individual expense line with receipt evidence"
    fields:
      - name: date
        type: date
        required: true
      - name: merchant
        type: char
      - name: category
        type: selection
        ref: bucket_categories
      - name: tax_amount
        type: monetary
      - name: amount
        type: monetary
        required: true
      - name: currency_id
        type: many2one
        comodel: res.currency
      - name: cost_center
        type: char
        description: "Analytic account or project reference"
      - name: attendees
        type: text
        description: "Names of attendees (for meals/entertainment)"
      - name: receipt_artifact_id
        type: many2one
        description: "Link to OCR extraction result"
      - name: extraction_confidence
        type: float
        description: "OCR confidence score (0.0-1.0)"
      - name: policy_flags
        type: text
        description: "JSON array of policy violation flags"

  - id: policy_violation
    odoo_model: null                      # [NEEDS MODEL] — new model for violation tracking
    description: "Policy violation detected during expense review"
    fields:
      - name: violation_type
        type: selection
        options: [over_limit, missing_receipt, duplicate_claim, unapproved_category, late_submission]
      - name: severity
        type: selection
        options: [info, warning, blocking]
      - name: evidence_refs
        type: text
        description: "JSON array of evidence file paths or record references"
      - name: override_decision
        type: selection
        options: [pending, approved_override, rejected]
      - name: approver_id
        type: many2one
        comodel: res.users
      - name: timestamp
        type: datetime

# ── Bucket categories (existing in ipai_hr_expense_liquidation) ───────────────

bucket_categories:
  - meals                                # Meals & Entertainment
  - transportation                       # Transportation & Travel
  - miscellaneous                        # Miscellaneous

# ── Status machines ───────────────────────────────────────────────────────────

status_machines:

  cash_advance:
    description: "Full lifecycle from request to closure"
    current_implementation: "draft → submitted → approved → settled (+ rejected)"
    target_implementation: "draft → submitted → manager_approved → finance_approved → released → in_liquidation → liquidated → closed"
    states:
      - draft
      - submitted
      - manager_approved
      - finance_approved
      - released
      - in_liquidation
      - liquidated
      - closed
      - rejected
      - cancelled
    transitions:
      - from: draft
        to: submitted
        trigger: action_submit
      - from: submitted
        to: manager_approved
        trigger: action_manager_approve
        guard: "user in group hr.group_hr_manager or manager_id"
      - from: submitted
        to: rejected
        trigger: action_reject
      - from: manager_approved
        to: finance_approved
        trigger: action_finance_approve
        guard: "user in group account.group_account_manager"
      - from: finance_approved
        to: released
        trigger: action_release
        accounting: "create advance payable entry"
      - from: released
        to: in_liquidation
        trigger: action_start_liquidation
      - from: in_liquidation
        to: liquidated
        trigger: action_liquidate
        accounting: "move expenses to expense accounts, clear advance balance"
      - from: liquidated
        to: closed
        trigger: action_close
        accounting: "record return or additional reimbursement"
      - from: [draft, submitted]
        to: cancelled
        trigger: action_cancel

  liquidation:
    description: "Expense liquidation review and posting"
    current_implementation: "draft → submitted → approved → settled (+ rejected)"
    target_implementation: "draft → submitted → audited → posted → closed"
    states:
      - draft
      - submitted
      - audited
      - posted
      - closed
      - needs_info
      - rejected
    transitions:
      - from: draft
        to: submitted
        trigger: action_submit
      - from: submitted
        to: audited
        trigger: action_audit
        guard: "user in group account.group_account_user"
      - from: submitted
        to: needs_info
        trigger: action_request_info
      - from: needs_info
        to: submitted
        trigger: action_resubmit
      - from: audited
        to: posted
        trigger: action_post
        accounting: "create journal entries"
      - from: posted
        to: closed
        trigger: action_close
      - from: [submitted, audited]
        to: rejected
        trigger: action_reject

# ── Accounting outcomes ───────────────────────────────────────────────────────

accounting:

  on_release:
    description: "When cash advance is released to employee"
    debit_account: "employee_advance_receivable"    # e.g., 1200 - Employee Advances
    credit_account: "cash_or_bank"                  # e.g., 1000 - Cash/Bank
    amount: "released_amount"
    idempotency_key: "cash_advance_release_{request_id}_{released_at}"

  on_liquidation:
    description: "When expenses are posted against advance"
    entries:
      - debit_account: "expense_accounts"           # Per expense category
        credit_account: "employee_advance_receivable"
        amount: "min(total_expenses, advance_amount)"
    idempotency_key: "cash_advance_liquidation_{request_id}_{submitted_at}"

  on_return:
    description: "When employee returns unused advance"
    debit_account: "cash_or_bank"
    credit_account: "employee_advance_receivable"
    amount: "advance_amount - total_expenses"
    condition: "total_expenses < advance_amount"
    idempotency_key: "cash_advance_return_{request_id}"

  on_additional_reimbursement:
    description: "When expenses exceed advance (company reimburses)"
    debit_account: "expense_accounts"
    credit_account: "accounts_payable_employee"
    amount: "total_expenses - advance_amount"
    condition: "total_expenses > advance_amount"
    idempotency_key: "cash_advance_reimburse_{request_id}"

  idempotency_rule: >
    All accounting entries use idempotency keys derived from request_id + timestamp.
    Repeated postings with the same key must be no-ops (skip, not error).
    Implementation: check for existing account.move with ref matching idempotency_key.

# ── OCA vs Bridge decision ────────────────────────────────────────────────────

dependency_decisions:

  - capability: "cash_advance_request_approval_release"
    oca_module: null                     # OCA/hr-expense submodule is empty for 19.0
    decision: "ipai_hr_expense_liquidation (existing custom module)"
    notes: >
      OCA has hr_expense_advance_clearing for older versions.
      19.0 port status unknown. Submodule is checked out but empty.
      Proceed with existing ipai_hr_expense_liquidation; adopt OCA when 19.0 port available.
      Mark [NEEDS CLARIFICATION] for OCA availability.

  - capability: "expense_liquidation_posting"
    oca_module: null
    decision: "Extend ipai_hr_expense_liquidation with accounting posting logic"

  - capability: "receipt_ocr"
    oca_module: null
    decision: "Bridge-first via ipai_expense_ocr (existing module)"
    notes: "OCR is always bridge-first per architecture decision"

  - capability: "monitoring_controls"
    oca_module: null
    decision: "New monitoring logic in ipai_hr_expense_liquidation or new module"

  - capability: "policy_violation_tracking"
    oca_module: null
    decision: "New model (ipai.expense.policy.violation) — [NEEDS MODEL]"

# ── Module inventory (cash advance core set) ─────────────────────────────────

module_core_set:
  custom:
    - id: ipai_hr_expense_liquidation
      status: active
      purpose: "Cash advance tracking + itemized liquidation + bucket totals"
      depends: [base, hr, hr_expense, account]
    - id: ipai_expense_ocr
      status: active
      purpose: "Receipt OCR ingestion into hr.expense"
      depends: [base, mail, hr_expense]
  odoo_core:
    - hr_expense
    - hr
    - account
    - account_payment
    - mail
    - analytic                           # Optional: cost center allocation
  oca:
    - hr_expense_advance_clearing: "[NEEDS CLARIFICATION] — 19.0 port status unknown"

# ── References ────────────────────────────────────────────────────────────────

references:
  spec_bundle: spec/expense-cash-advance/
  receipt_ocr_spec: spec/odoo-receipt-digitization/prd.md
  finance_ppm_spec: spec/finance-ppm/prd.md
  tool_contract: contracts/tools/TOOL_SPEC_TEMPLATE.md
  eval_action: eval/action_eval.yaml
