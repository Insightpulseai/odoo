version: 1
id: hf_training_skill_map
status: active
source_family: hf_smol_training_playbook
type: benchmark_curriculum
updated_at: "2026-03-17"

description: >
  Maps the Hugging Face Smol Training Playbook to bounded personas, skills,
  and knowledge bases. The playbook is the benchmark anchor; actual skill
  contracts are pinned to Transformers, Accelerate, and TRL docs.

canonical_fit:
  smol_training_playbook: "benchmark doctrine for training small/open models well"
  transformers: "core training workflow surface"
  accelerate: "distributed training surface"
  trl: "post-training / alignment surface"
  repo: "bounded skills + eval gates + promotion rules"

personas:
  - id: training-architect
    file: agents/personas/training-architect.md
    owns:
      - pretraining-recipe-design
      - fine-tuning-recipe-design
    responsibility: "Training recipe selection, architecture, checkpoint strategy"

  - id: dataset-curator
    file: agents/personas/dataset-curator.md
    owns:
      - model-data-curation
    responsibility: "Corpus quality, filtering, deduplication, task/domain fit"

  - id: distributed-training-engineer
    file: agents/personas/distributed-training-engineer.md
    owns:
      - distributed-training-design
    responsibility: "Multi-GPU/node strategy, parallelism, memory optimization"

  - id: post-training-engineer
    file: agents/personas/post-training-engineer.md
    owns:
      - sft-alignment-design
      - preference-optimization-design
    responsibility: "SFT, DPO/GRPO, alignment pipeline"

  - id: training-eval-judge
    file: agents/personas/training-eval-judge.md
    owns:
      - training-readiness-judge
    responsibility: "Checkpoint promotion gates, eval completeness, reproducibility"

knowledge_bases:
  - id: hf-smol-training-playbook
    file: agents/knowledge/benchmarks/hf-smol-training-playbook.md
    covers:
      - "Training workflow stages"
      - "Data curation principles"
      - "Small model training doctrine"
      - "Eval-driven promotion"

skills:
  - id: model-data-curation
    file: agents/skills/model-data-curation/
    persona: dataset-curator
    classification: encoded_preference
    purpose: "Corpus selection, filtering, task/domain fit, split design"
    surface: "HuggingFaceTB datasets, Datasets library"

  - id: pretraining-recipe-design
    file: agents/skills/pretraining-recipe-design/
    persona: training-architect
    classification: encoded_preference
    purpose: "Pretraining vs continued pretraining decision, architecture, training args"
    surface: "Transformers Trainer"

  - id: fine-tuning-recipe-design
    file: agents/skills/fine-tuning-recipe-design/
    persona: training-architect
    classification: encoded_preference
    purpose: "Domain adaptation, instruction tuning, supervised downstream tuning"
    surface: "Transformers Trainer, fine-tuning guide"

  - id: distributed-training-design
    file: agents/skills/distributed-training-design/
    persona: distributed-training-engineer
    classification: capability_uplift
    purpose: "Multi-GPU/node strategy, parallelism, memory optimization"
    surface: "Accelerate"

  - id: sft-alignment-design
    file: agents/skills/sft-alignment-design/
    persona: post-training-engineer
    classification: encoded_preference
    purpose: "SFT with chat/instruction data, truncation, packing, sequence decisions"
    surface: "TRL SFTTrainer"

  - id: preference-optimization-design
    file: agents/skills/preference-optimization-design/
    persona: post-training-engineer
    classification: encoded_preference
    purpose: "DPO/GRPO stage design, preference data, post-SFT refinement"
    surface: "TRL DPO Trainer, GRPO Trainer"

  - id: training-readiness-judge
    file: agents/skills/training-readiness-judge/
    persona: training-eval-judge
    classification: encoded_preference
    purpose: "Checkpoint promotion gate: data quality, eval quality, reproducibility"
    surface: "Repo eval gates"

build_order:
  - phase: 1
    skills: [model-data-curation]
    reason: "Data quality comes first"
  - phase: 2
    skills: [pretraining-recipe-design, fine-tuning-recipe-design]
    reason: "Training recipe design depends on data"
  - phase: 3
    skills: [distributed-training-design]
    reason: "Scale-out decisions follow recipe"
  - phase: 4
    skills: [sft-alignment-design, preference-optimization-design]
    reason: "Post-training follows base training"
  - phase: 5
    skills: [training-readiness-judge]
    reason: "Promotion gate is final step"

rules:
  - id: data_quality_first
    text: "Dataset quality is the highest-leverage factor — curate before you train"
  - id: playbook_is_benchmark
    text: "Smol Training Playbook is benchmark anchor; skill contracts pin to concrete HF docs"
  - id: eval_drives_promotion
    text: "No checkpoint advances without eval evidence"
  - id: reproducibility_required
    text: "Configs, seeds, data versions must be tracked for every training run"
