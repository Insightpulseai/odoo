# Accounting — Informational Benchmark Scenarios

scenarios:
  - id: "BM-ACC-I-001"
    domain: accounting
    capability_class: informational
    persona: accountant
    prompt: "What is the current balance of account 1000 (Cash)?"
    expected_behavior:
      type: aggregate
      source_model: account.move.line
      fields:
        balance: "sum where account_id.code = 1000"
      citation_required: true
    hard_gates:
      capability: true
      correctness: true
      grounding: true
    soft_scores:
      completeness: { weight: 0.30 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 5000, weight: 0.10 }
    tags: [accounting, balance, account-query]

  - id: "BM-ACC-I-002"
    domain: accounting
    capability_class: informational
    persona: accountant
    prompt: "How many vendor bills are overdue as of today?"
    expected_behavior:
      type: aggregate
      source_model: account.move
      fields:
        count: "where move_type=in_invoice and state=posted and invoice_date_due < today"
      citation_required: true
    hard_gates:
      capability: true
      correctness: true
      grounding: true
    soft_scores:
      completeness: { weight: 0.30 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 5000, weight: 0.10 }
    tags: [accounting, overdue, payables]

  - id: "BM-ACC-I-003"
    domain: accounting
    capability_class: informational
    persona: exec_readonly
    prompt: "Summarize the profit and loss for the current fiscal year"
    notes: "Grounded informational with explicit evidence: copilot must cite account groups and totals"
    expected_behavior:
      type: aggregate
      source_model: account.move.line
      fields:
        revenue: "sum where account_id.account_type = income"
        expense: "sum where account_id.account_type = expense"
        net: "revenue - expense"
      citation_required: true
    hard_gates:
      capability: true
      correctness: true
      grounding: true
    soft_scores:
      completeness: { weight: 0.30 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 5000, weight: 0.10 }
    tags: [accounting, pnl, summary, grounding-evidence]
