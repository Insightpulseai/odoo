name: File Taxonomy Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-taxonomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Run Taxonomy Checker
        run: python3 scripts/ci/check_file_taxonomy.py
