version: 1
namespace: ipai.agents.foundry.model_routing.v1
artifact_type: policy
repo_key: agents
domain: foundry
subject: model_routing

# ============================================================================
# MODEL ROUTING POLICY
# ============================================================================
# Agents call aliases, not raw model names.
# This policy defines which alias each agent category uses.
# Registry: ops-platform/ssot/foundry/ops_platform__foundry__model_registry__v1.registry.yaml
# Deployments: infra/ssot/foundry/infra__foundry__deployment_inventory__v1.inventory.yaml
# ============================================================================

routes:
  conversational_agents:
    default_alias: chat_default
    fallback_alias: chat_fast
    examples:
      - odoo_copilot
      - docs_assistant
      - ops_console_chat

  knowledge_grounded_agents:
    default_alias: router_balanced
    fallback_alias: chat_default
    examples:
      - bir_compliance_assistant
      - expense_review_agent

  coding_agents:
    default_alias: coding_default
    fallback_alias: coding_fast
    examples:
      - coding_agent_from_issue
      - remediation_agent

  reasoning_workflows:
    default_alias: reasoning_default
    fallback_alias: reasoning_fast
    examples:
      - sre_feedback_loop
      - expense_audit_agent

  document_extraction:
    default_alias: vision_extract_default
    examples:
      - invoice_ocr
      - receipt_ocr
      - bir_form_extraction

  evaluation_judges:
    default_alias: chat_default
    note: "Evals must pin an alias. Never use 'latest' or router for eval baselines."

  embedding:
    default_alias: embedding_default
    examples:
      - knowledge_indexing
      - semantic_search

# ============================================================================
# SDK ROUTING
# ============================================================================

sdk_routing:
  agents_evals_traces: foundry_sdk
  direct_model_calls: openai_sdk
  local_multi_agent: agent_framework
  point_ai_services: foundry_tools_sdk  # Document Intelligence, Speech, Vision, Language

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:
  prod_must_use_registered_alias: true
  evals_must_pin_alias: true
  routers_disallowed_for_gold_benchmarks: true
  preview_models_blocked_in_prod: true
  preview_models_allowed_in_dev: true
  require_eval_pass_before_publish: true
  require_trace_enabled: true
