# E-Commerce Solutions Skill
# Online store development with Odoo and custom integrations

name: ecommerce_solutions
version: 1.0.0
key: web.ecommerce
description: |
  Build e-commerce solutions: product catalog, cart, checkout,
  payment integration, inventory sync, and order management via Odoo.

intents:
  - build ecommerce
  - online store
  - payment integration
  - product catalog
  - shopping cart
  - odoo ecommerce

guardrails:
  - PCI compliance for payment flows (never store card data)
  - Odoo CE website_sale module as foundation
  - Inventory sync must be real-time or near-real-time
  - Tax calculations via BIR-compliant modules for PH
  - Performance: sub-3s page load for product pages

tools:
  - key: ecom.catalog
    name: Product Catalog
    target_model: ipai.ecom.runner
    target_method: setup_catalog
    description: Configure product categories, attributes, variants

  - key: ecom.storefront
    name: Storefront Design
    target_model: ipai.ecom.runner
    target_method: build_storefront
    description: Design and build the customer-facing store

  - key: ecom.payment
    name: Payment Integration
    target_model: ipai.ecom.runner
    target_method: integrate_payment
    description: Configure payment providers (Stripe, PayMongo, etc.)

  - key: ecom.inventory
    name: Inventory Sync
    target_model: ipai.ecom.runner
    target_method: sync_inventory
    description: Real-time inventory sync between store and Odoo

  - key: ecom.orders
    name: Order Management
    target_model: ipai.ecom.runner
    target_method: setup_orders
    description: Configure order processing workflow in Odoo

workflow:
  - ecom.catalog
  - ecom.storefront
  - ecom.payment
  - ecom.inventory
  - ecom.orders

input_schema:
  type: object
  required:
    - store_name
  properties:
    store_name: { type: string }
    platform:
      type: string
      enum: [odoo_website_sale, headless_nextjs, custom]
    payment_providers:
      type: array
      items: { type: string, enum: [stripe, paymongo, paypal, bank_transfer] }
    product_count: { type: integer }
    country: { type: string }

output_schema:
  type: object
  properties:
    store_url: { type: string }
    modules_installed: { type: array, items: { type: string } }
    payment_config: { type: object }
    inventory_sync_status: { type: object }

agentInstructions: |
  When building e-commerce:

  1. **Catalog**: Odoo product.template + product.product models
  2. **Storefront**: Odoo website_sale or headless Next.js with Odoo API
  3. **Payment**: Integrate via Odoo payment providers framework
  4. **Inventory**: Real-time sync via webhooks or polling
  5. **Orders**: Odoo sale.order → stock.picking → account.move flow
