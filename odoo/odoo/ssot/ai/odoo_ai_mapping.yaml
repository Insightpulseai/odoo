version: 1
meta:
  owner: platform
  purpose: "Maps Odoo 19 AI primitives (Ask AI, Agents, Topics/Tools/Sources) to our first-party copilot architecture (registries, governance, evals)."
  references:
    - "https://www.odoo.com/documentation/19.0/applications/productivity/ai.html"
    - "https://www.odoo.com/documentation/19.0/applications/productivity/ai/agents.html"
    - "https://www.odoo.com/documentation/19.0/applications/productivity/ai/apikeys.html"
    - "https://www.odoo.com/documentation/19.0/applications/productivity/ai/live-chat.html"

odoo_primitives:
  ask_ai:
    description: "Global assistant surface (Ctrl+K) used to ask questions, open views, and improve content; read-only by default."
    safety_default: "read_only"
    expected_behaviors:
      - "Can open views/reports"
      - "Cannot commit database changes without explicit write-enabled agent/topic/tool configuration"
      - "Uses configured provider (Gemini/OpenAI) depending on setup"

  ai_agent:
    description: "An agent composed of Topics and Sources; Topics include Tools."
    key_rules:
      - "No Topics => informational mode only (no task execution)"
      - "Topics define scope + instructions + tool enablement"
      - "Sources define what the agent can cite and use as knowledge"

  topic:
    description: "Instruction/scope bundle that grants access to specific Tools."
    governance:
      - "Write topics must require preview->approval->commit"
      - "Topics must map to tool specs and action eval coverage"

  source:
    description: "Knowledge inputs for an agent; must be permissioned and citeable."
    governance:
      - "Sources must be registered with ACL mapping and retention class"
      - "Every output must cite sources unless explicitly gated as ungrounded"

our_primitives:
  agent_registry:
    ssot_paths:
      - "ssot/agents/skills.yaml"                  # PRESENT — 81+ skills
      - "ssot/ai/copilot_parity_priorities.yaml"    # Created in this PR
      # ssot/agent/feature_ledger.yaml — [NEEDS CLARIFICATION] directory ssot/agent/ does not exist
    description: "Defines agents, roles/scopes, and which tools they can use."

  corpus_registry:
    ssot_paths:
      - "ssot/knowledge/corpus_registry.yaml"       # Created in this PR (skeleton)
    description: "Defines corpora, ACL mapping, retention, ingestion modes."

  tool_contract_v1:
    spec_template: "contracts/tools/TOOL_SPEC_TEMPLATE.md"  # Created in this PR
    gate:
      - "scripts/check_tool_spec_contract.py"       # To be implemented
    description: "Preview/approval/idempotency/audit envelope for all tools."

  eval_harnesses:
    knowledge_eval: "eval/knowledge_copilot_eval.yaml"  # Created in this PR (skeleton)
    action_eval: "eval/action_eval.yaml"                # Created in this PR (skeleton)
    description: "Regression gates for citation faithfulness and action correctness."

mappings:
  - id: map-ask-ai-surface
    odoo: "ask_ai"
    ours:
      surfaces:
        - "Odoo Ask panel (global)"
        - "Ops Console assistant"
        - "Dev/Repo assistant"
    invariants:
      - "Read-only by default"
      - "Citations required for grounded answers"
      - "Audit envelope for retrieval events"
    required_artifacts:
      - "ssot/ai/copilot_parity_priorities.yaml:read-only-default-safety"
      - "eval/action_eval.yaml:read_only_default_agent_case"

  - id: map-topics-to-tools
    odoo: "topic"
    ours:
      tool_enablement: "Tool Contract v1 + explicit allow-list by role/agent"
      approvals: "preview -> approval -> commit for state-changing tools"
    invariants:
      - "Every enabled tool has a tool spec doc: contracts/tools/<tool_id>.md"
      - "Every enabled tool has action eval coverage"
      - "Every state-changing tool emits audit envelope"
    required_artifacts:
      - "contracts/tools/TOOL_SPEC_TEMPLATE.md"
      - "eval/action_eval.yaml"

  - id: map-sources-to-corpora
    odoo: "source"
    ours:
      registry: "ssot/knowledge/corpus_registry.yaml"
      retrieval: "citation-first RAG; JIT retrieval; ACL-filtered"
    invariants:
      - "Every snippet has provenance + stable doc/chunk IDs"
      - "Outputs default to citations; ungrounded output is gated"
    required_artifacts:
      - "ssot/knowledge/corpus_registry.yaml"
      - "eval/knowledge_copilot_eval.yaml"

  - id: map-live-chat-escalation
    odoo: "ai_live_chat"
    ours:
      behavior: "no-guess escalation; create human follow-up task when uncertain"
      logging: "uncertainty reason + missing evidence captured as docs-gap artifact"
    invariants:
      - "Agent must not fabricate when coverage is low"
      - "Escalation creates a trackable artifact"
    required_artifacts:
      - "ssot/knowledge/gaps/"
      - "eval/action_eval.yaml:no_guess_escalation_case"

gaps_to_close:
  - id: gap-ask-ai-write
    description: "Odoo Ask AI is read-only by default; parity requires governed write agents with explicit topics/tools and approvals."
    priority: "P0"
    owner: platform
    status: planned

  - id: gap-citations-everywhere
    description: "Ensure citations are enforced across all assistant surfaces, not only in the knowledge copilot."
    priority: "P0"
    owner: platform
    status: planned
