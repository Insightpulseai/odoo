version: 3
updated: "2026-03-24"
repo: Insightpulseai  # umbrella monorepo
role: platform_umbrella

repo_boundaries:
  umbrella_repo:
    must_not_track:
      - odoo/**
      - archive/dot-github-repo/**
      - archive/work/**
      - data-intelligence/**
      - documentaion/**
      - web-site/**
      - archive/root/addons/oca/**
    enforcement: .gitignore
    note: >
      Nested git repos must never be staged in the umbrella index.
      Each is managed as its own git boundary.
  nested_repos:
    odoo:
      ownership: separate_git_repo
      tracked_in_umbrella: false
      purpose: ERP runtime (Odoo 19 CE + OCA + IPAI bridge)
    data-intelligence:
      ownership: separate_git_repo
      tracked_in_umbrella: false
      purpose: Databricks analytics engineering
    documentaion:
      ownership: separate_git_repo
      tracked_in_umbrella: false
      purpose: Legacy documentation (review for archival)
    web-site:
      ownership: separate_git_repo
      tracked_in_umbrella: false
      purpose: Legacy web site (review for archival)

current_state:
  contains_cross_domain_artifacts: true
  note: >
    Repository currently hosts ERP runtime plus transitional cross-domain
    artifacts pending decomposition to owning repositories.

target_ownership:
  addons: odoo
  config: odoo
  docker: odoo
  erp_docs: odoo
  erp_scripts: odoo
  erp_ssot: odoo
  erp_spec: odoo
  tests: odoo
  infra: infra
  platform_apps: platform
  shared_agents: agents
  agent_platform: agent-platform
  automations: automations
  design_assets: design
  public_web: web
  lakehouse: data-intelligence
  supabase: platform
  cross_platform_docs: docs

canonical_repos:
  - name: .github
    visibility: private
    purpose: Org governance, reusable workflows, policies
  - name: odoo
    visibility: public
    purpose: ERP runtime (Odoo 19 CE + OCA + IPAI bridge)
  - name: agents
    visibility: public
    purpose: Agent personas, skills, judges, evals, metadata, registries, and prompt contracts
  - name: agent-platform
    visibility: private
    purpose: Agent runtime platform — orchestration, task ledger, execution contracts, control-room integrations, and runtime glue
  - name: platform
    visibility: private
    purpose: Platform control plane and SSOT — vault references, platform metadata, backend/control-plane contracts, and edge/runtime glue
  - name: data-intelligence
    visibility: private
    purpose: Databricks + Unity Catalog analytics engineering, medallion contracts, semantic-serving prep, and BI delivery artifacts
  - name: infra
    visibility: private
    purpose: Azure-first infrastructure as code, Cloudflare edge/security, and remaining legacy/runtime infrastructure
  - name: web
    visibility: private
    purpose: User-facing web surfaces — ops console, marketing sites, docs sites, and browser-facing product apps
  - name: automations
    visibility: private
    purpose: Workflow automation, scheduled jobs, n8n assets, and operational runbooks
  - name: design
    visibility: internal
    purpose: Design tokens, component specs, icon pipeline, and brand assets
  - name: docs
    visibility: public
    purpose: Cross-repo architecture, strategy, governance, runbooks, evidence, and operating model docs
  - name: templates
    visibility: private
    purpose: Bootstrap-only starter kits, scaffolds, repo templates, and Spec Kit starters

deprecated_runtime_surfaces:
  - name: vercel
    deprecated: "2026-03-11"
    replacement: azure_container_apps
  - name: digitalocean
    deprecated: "2026-03-15"
    replacement: azure_container_apps
  - name: mailgun
    deprecated: "2026-03-11"
    replacement: zoho_smtp

deprecated_labels:
  - name: control-plane
    replacement: platform
  - name: design-system
    replacement: design
  - name: lakehouse
    replacement: data-intelligence
  - name: ops-platform
    replacement: platform

auth_model:
  target_authority: entra_id
  transitional_runtime: keycloak
  standalone_auth_workload: false
  note: >
    Auth is a capability provided by Entra ID (target) or Keycloak
    (transitional). It is NOT modeled as a standalone workload.

addon_layers:
  canonical_extension_layers:
    - addons/oca
    - addons/ipai
    - addons/local
  vendor_core:
    note: >
      Odoo CE core addons are managed via vendor runtime paths
      (e.g. vendor/odoo/addons/ or /opt/odoo/addons/).
      They are NOT counted as extension layers.

github_ui_metadata_drift:
  note: >
    The following GitHub UI metadata items require separate cleanup
    via gh CLI or GitHub settings. They cannot be fixed by README edits alone.
  items:
    - "Repository website field may still show Vercel URLs"
    - "Deployment history may still show Vercel deployments"
    - "Environment settings may reference deprecated DO endpoints"

decomposition:
  tranche_1:
    status: planned
    repos:
      - infra
      - platform
      - agents
      - automations
      - web
    source_repo: odoo
    strategy: copy_then_cutover
    notes:
      - "Preserve ERP runtime authority in odoo."
      - "Do not centralize mixed spec/ssot/tests/scripts; split by owning repo."
      - "skills/odoo-implementation remains in odoo for tranche 1."

canonical_project:
  azure_devops_project: ipai-platform

authority_model:
  azure: cloud_runtime_control_access
  azure_devops: planning_governance_spine
  github: current_engineering_truth_transitional
  repo_ssot: intended_state_truth
  executable_contracts: iac_migrations_pipelines_tests

naming_normalization:
  ops-platform: platform
  design-system: design
  lakehouse: data-intelligence

local_runtime:
  docker_context: colima-odoo
  compose_contract: docker-compose.yml
  devcontainer_role: tooling_only
  canonical_databases:
    - odoo_dev
    - odoo_staging
    - odoo

canonical_ssot_files:
  - ssot/agents/assistant_surfaces.yaml
  - ssot/architecture/tenancy_model.yaml
  - ssot/governance/agentops_policy.yaml
  - ssot/governance/copilot_release_stages.yaml
  - ssot/creative/provider_policy.yaml
  - ssot/repo/ownership-boundaries.yaml
  - ssot/agents/diva_copilot.yaml
  - ssot/agents/diva_copilot_family.yaml
  - ssot/agents/diva_goals.yaml
  - ssot/identity/entra_target_state.yaml
  - ssot/delivery/go_live_plan.yaml

canonical_architecture_docs:
  - docs/architecture/ASSISTANT_SURFACES.md
  - docs/architecture/TENANCY_MODEL.md
  - docs/architecture/A2A_INTEROP.md
  - docs/architecture/AGENTOPS_DOCTRINE.md
  - docs/architecture/AI_RUNTIME_AUTHORITY.md
  - docs/architecture/CREATIVE_PROVIDER_POLICY.md
  - docs/architecture/RETRIEVAL_AND_MEMORY_POLICY.md
  - docs/architecture/GO_LIVE_MATRIX.md
  - docs/architecture/GO_LIVE_CHECKLIST.md
  - docs/architecture/DOMAIN_INTELLIGENCE_SHELLS.md
  - docs/architecture/REPO_BOUNDARIES.md

canonical_target_state:
  architecture_doc: docs/architecture/INSIGHTPULSEAI_ODOO_ON_AZURE_TARGET_STATE.md
  benchmark_model:
    informational: true
    navigational: true
    transactional: true
  canonical_runtime_roles:
    odoo: transactional_system_of_record
    odoo_copilot: user_facing_erp_copilot
    foundry_agent_applications: governed_ai_runtime
    document_intelligence: ocr_and_structured_extraction

resource_group_target:
  model: "16-RG: 1 shared + 5 per env x 3 envs"
  shared:
    - rg-ipai-shared-observability
  per_environment:
    edge: "rg-ipai-<env>-edge"
    odoo_runtime: "rg-ipai-<env>-odoo-runtime"
    odoo_data: "rg-ipai-<env>-odoo-data"
    platform: "rg-ipai-<env>-platform"
    ai: "rg-ipai-<env>-ai"
  environments:
    - dev
    - staging
    - prod
