version: 1
namespace: ipai.odoo.copilot.tool_surface.v1
artifact_type: contract
repo_key: odoo
domain: copilot
subject: tool_surface

# odoo__copilot__tool_surface__v1.contract.yaml
# Defines which Odoo models/methods agents may call via RPC
apiVersion: ipai.contract/v1
kind: ToolSurfaceContract
metadata:
  name: odoo-copilot-tool-surface
  version: "1.0.0"
  owner: platform-team
  last_updated: "2026-03-16"
  description: "Allowlisted Odoo RPC surface for Foundry agents"

spec:
  transport: json-rpc
  endpoint: "${ODOO_URL}/jsonrpc"
  auth: api_key
  auth_secret: kv-ipai-dev/odoo-agent-api-key

  # Read-only operations — no confirmation needed
  read_operations:
    - model: res.partner
      methods: [search_read, read]
      allowed_fields: [id, name, vat, email, phone, street, city, country_id, property_account_payable_id, property_account_receivable_id]
      max_limit: 50
      note: "Partner lookup for document matching"

    - model: account.move
      methods: [search_read, read]
      allowed_fields: [id, name, date, journal_id, partner_id, amount_total, amount_residual, state, move_type, line_ids, ref]
      max_limit: 200
      note: "Journal entry queries for close assistant"

    - model: account.move.line
      methods: [search_read, read]
      allowed_fields: [id, name, account_id, partner_id, debit, credit, balance, date, move_id, reconciled]
      max_limit: 500

    - model: account.journal
      methods: [search_read, read]
      allowed_fields: [id, name, type, code, bank_id, currency_id]
      max_limit: 20

    - model: hr.employee
      methods: [search_read, read]
      allowed_fields: [id, name, department_id, job_id, work_email]
      max_limit: 50
      note: "Employee lookup for expense matching"

    - model: product.product
      methods: [search_read, read]
      allowed_fields: [id, name, default_code, list_price, standard_price, categ_id]
      max_limit: 100

  # Write operations — may require confirmation
  write_operations:
    - model: account.move
      methods: [create]
      required_context:
        move_type: [in_invoice, in_refund]
      defaults:
        state: draft
      constraints:
        - "Always creates in draft — never auto-posts"
        - "move_type restricted to vendor bills/refunds"
      confirmation: conditional
      auto_approve_conditions:
        max_amount: 50000
        min_confidence: 0.90

    - model: hr.expense
      methods: [create]
      defaults:
        state: draft
      constraints:
        - "Employee must be active"
        - "Product must be expense category"
      confirmation: conditional
      auto_approve_conditions:
        max_amount: 10000
        min_confidence: 0.85

    - model: account.move
      methods: [action_post, button_draft, button_cancel]
      constraints:
        - "Must follow state machine: draft → posted → cancel"
        - "Never skip states"
      confirmation: always
      note: "State transitions always require human approval"

  # Explicitly prohibited
  prohibited:
    models:
      - res.users  # Never modify user accounts
      - ir.rule  # Never modify security rules
      - hr.payslip  # Payroll data is off-limits
      - ir.config_parameter  # System parameters
    methods:
      - unlink  # Never delete records
      - write on res.partner  # Read-only for partners
    patterns:
      - "Direct SQL via self.env.cr.execute"
      - "sudo() without documented justification"
      - "Any operation on hr.payroll.* models"

  audit:
    log_all_calls: true
    log_destination: opentelemetry
    include_in_log: [model, method, domain, user_id, timestamp, agent_name]
    retain_days: 90
