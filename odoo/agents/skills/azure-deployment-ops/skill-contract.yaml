version: 1
type: ops_skill
family: azure_copilot_ops
skill:
  name: azure-deployment-ops
  status: draft
  owner: agents
  purpose: >
    Validate Azure deployment topology — Container Apps, Front Door,
    managed identity, Key Vault binding. Ensures every new service
    follows canonical resource group and naming conventions.

  triggers:
    - new Azure Container App provisioned
    - deployment configuration change in PR
    - infrastructure PR modifying Bicep or Terraform
    - new custom domain binding request

  inputs:
    - resource group name
    - Container App name or configuration
    - Front Door routing rules
    - Key Vault references in environment variables

  steps:
    - verify resource group exists and matches naming convention (rg-ipai-{env})
    - check Container App is in correct ACA environment (cae-ipai-{env})
    - validate managed identity is assigned (system or user-assigned)
    - confirm Key Vault references use managed identity, not connection strings
    - verify Front Door origin group includes the new Container App
    - check custom domain TLS certificate is bound and valid
    - validate ingress configuration (target port, transport, CORS)
    - confirm health probe endpoint returns 200
    - verify container registry pull uses managed identity
    - produce deployment topology evidence

  outputs:
    - validation_result
    - topology_summary
    - findings
    - blockers
    - evidence

  guardrails:
    - never create Azure resources directly — validation only
    - all queries are read-only (Resource Graph, az CLI with --output)
    - flag missing managed identity as blocker (never suggest connection strings)
    - flag missing Key Vault binding as blocker
    - never expose secret values in output — reference Key Vault secret names only

  evidence:
    required: true
    format: "docs/evidence/{stamp}/azure-ops/deployment/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - docs/contracts/azure-resource-graph-contract.md
  - ssot/runtime/resource-graph-query-catalog.yaml
  - docs/architecture/reference-benchmarks.md
  - .claude/rules/infrastructure.md
