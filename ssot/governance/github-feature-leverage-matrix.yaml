version: 1
kind: github_feature_leverage_matrix
status: canonical
last_updated: "2026-04-19"
owner: platform-architecture
source: "GitHub Features page (github.com/features) — 7 categories"

doctrine: >
  Every GitHub feature is classified against IPAI's existing governance
  substrate. States: ADOPTED (already codified), TARGET-STATE (should
  adopt, not yet live), EVALUATE (research needed), DEFER (not now,
  specific trigger), EXCLUDED (doctrine conflict). Leverage score:
  HIGH / MEDIUM / LOW.

parent_ssots:
  - ssot/governance/github-well-architected-framework.yaml
  - ssot/governance/github-desired-state.yaml
  - ssot/governance/github-target-state-success-criteria.yaml

# -----------------------------------------------------------------------------
# 1. Collaborative Coding
# -----------------------------------------------------------------------------
collaborative_coding:
  - feature: codespaces
    state: adopted
    leverage: high
    why: devcontainer_contract_is_canonical_dev_runtime
    action: enforce_dot_devcontainer_as_only_dev_entry
  - feature: copilot_coding_assistance
    state: target_state
    leverage: high
    why: coding_agent_replaces_boilerplate_prs_with_foundry_model_authority
    action: enroll_enterprise_copilot_confirm_foundry_routing
  - feature: pull_requests
    state: adopted
    leverage: high
    why: branch_protection_plus_azure_pipelines_merge_gate_codified
    action: none
  - feature: discussions
    state: defer
    leverage: low
    why: slack_is_comms_authority_no_doctrine_role_for_discussions
    action: trigger_community_or_oss_launch
  - feature: code_search_and_code_view
    state: adopted
    leverage: medium
    why: useful_for_355_workflow_plus_69_module_repo_scale
    action: none
  - feature: code_review
    state: adopted
    leverage: high
    why: pr_review_gate_codified_copilot_code_review_in_scope
    action: add_copilot_review_when_copilot_enrolled
  - feature: draft_pull_requests
    state: adopted
    leverage: medium
    why: already_used_in_delivery_workflow
    action: none
  - feature: protected_branches
    state: adopted
    leverage: high
    why: tier_0_repo_branch_rules_codified
    action: none

# -----------------------------------------------------------------------------
# 2. Automation & CI/CD
# -----------------------------------------------------------------------------
automation_and_ci_cd:
  - feature: github_actions
    state: adopted
    leverage: high
    why: default_ci_plus_nonprod_deploy_authority_via_oidc_scoped_exception
    action: enforce_billing_through_azure_subscription
  - feature: github_packages
    state: evaluate
    leverage: medium
    why: container_registry_alternative_to_acr_for_internal_images
    action: evaluate_acr_vs_ghcr_consolidation
  - feature: apis_rest_graphql
    state: adopted
    leverage: high
    why: coding_agent_plus_claude_code_consume_github_api_via_mcp
    action: none
  - feature: github_marketplace
    state: defer
    leverage: low
    why: not_distribution_channel_for_ipai_offer_azure_marketplace_is
    action: trigger_oss_tooling_to_publish
  - feature: webhooks
    state: adopted
    leverage: medium
    why: azure_logic_apps_consumes_repo_events
    action: none
  - feature: github_hosted_runners
    state: adopted
    leverage: medium
    why: gha_scoped_exception_uses_hosted_runners_zero_self_hosted_doctrine
    action: none
  - feature: self_hosted_runners
    state: excluded
    leverage: none
    why: deprecated_2026-03-15_azure_devops_pool_is_replacement
    action: remove_any_residual_self_hosted_configs
  - feature: workflow_visualization
    state: adopted
    leverage: low
    why: useful_for_355_workflow_audit
    action: none
  - feature: workflow_templates
    state: evaluate
    leverage: medium
    why: org_level_starter_workflows_reduce_drift_across_repos
    action: define_3_to_4_canonical_org_level_templates

