# =============================================================================
# Reusable Job: Deploy Preview Revision to Azure Container Apps
# =============================================================================
# Creates a labeled preview revision with 0% traffic weight.
# Produces a deterministic preview URL for PR/branch testing.
#
# Odoo.sh parity: "unlimited development branches / your own runbot"
# Azure equivalent: ACA revision with label, isolated from production traffic.
#
# Usage:
#   jobs:
#     - template: templates/jobs/deploy-preview.yml
#       parameters:
#         containerAppName: ipai-odoo-dev-web
#         resourceGroup: rg-ipai-dev-odoo-runtime
#         imageName: ipai-odoo
#         imageTag: 18.0-copilot
#         previewLabel: pr-42
# =============================================================================

parameters:
  - name: containerAppName
    type: string
  - name: resourceGroup
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
    default: latest
  - name: acrName
    type: string
    default: acripaiodoo
  - name: serviceConnection
    type: string
    default: ipai-dev-wif
  - name: previewLabel
    type: string
    # Deterministic label derived from PR number or branch name.
    # Convention: pr-<number> or branch-<sanitized-name>

jobs:
  - job: DeployPreview
    displayName: 'Deploy preview: ${{ parameters.previewLabel }}'
    pool:
      vmImage: ubuntu-latest
    steps:
      - task: AzureCLI@2
        displayName: 'Create preview revision with label'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            APP="${{ parameters.containerAppName }}"
            RG="${{ parameters.resourceGroup }}"
            IMAGE="${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:${{ parameters.imageTag }}"
            LABEL="${{ parameters.previewLabel }}"

            # Sanitize label for ACA (lowercase, alphanumeric + hyphens, max 64 chars)
            SAFE_LABEL=$(echo "$LABEL" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-64)
            REVISION_SUFFIX="preview-${SAFE_LABEL}-$(Build.BuildNumber)"
            # ACA revision suffix max 64 chars
            REVISION_SUFFIX=$(echo "$REVISION_SUFFIX" | cut -c1-64 | sed 's/-$//')

            echo "=== Preview Deploy ==="
            echo "App:      ${APP}"
            echo "Image:    ${IMAGE}"
            echo "Label:    ${SAFE_LABEL}"
            echo "Revision: ${APP}--${REVISION_SUFFIX}"

            # Deactivate any existing revision with this label (idempotent re-deploy)
            EXISTING=$(az containerapp revision list \
              --name "${APP}" --resource-group "${RG}" \
              --query "[?properties.active && contains(name, 'preview-${SAFE_LABEL}')].name" -o tsv 2>/dev/null || true)

            if [[ -n "$EXISTING" ]]; then
              echo "Deactivating previous preview revision: ${EXISTING}"
              az containerapp revision deactivate \
                --name "${APP}" --resource-group "${RG}" \
                --revision "${EXISTING}" --output none 2>/dev/null || true
            fi

            # Create new revision with 0% traffic (preview only)
            az containerapp update \
              --name "${APP}" \
              --resource-group "${RG}" \
              --image "${IMAGE}" \
              --revision-suffix "${REVISION_SUFFIX}" \
              --output none

            echo "Waiting for revision to activate..."
            sleep 20

            # Get the new revision name
            NEW_REVISION=$(az containerapp revision list \
              --name "${APP}" --resource-group "${RG}" \
              --query "[?contains(name, '${REVISION_SUFFIX}')].name" -o tsv)

            if [[ -z "$NEW_REVISION" ]]; then
              echo "ERROR: Preview revision not found"
              exit 1
            fi

            echo "Preview revision created: ${NEW_REVISION}"

            # Apply label for deterministic URL access
            az containerapp revision label add \
              --name "${APP}" --resource-group "${RG}" \
              --label "${SAFE_LABEL}" \
              --revision "${NEW_REVISION}" \
              --output none 2>/dev/null || {
                # Label might exist on old revision — remove and re-add
                az containerapp revision label remove \
                  --name "${APP}" --resource-group "${RG}" \
                  --label "${SAFE_LABEL}" --output none 2>/dev/null || true
                az containerapp revision label add \
                  --name "${APP}" --resource-group "${RG}" \
                  --label "${SAFE_LABEL}" \
                  --revision "${NEW_REVISION}" \
                  --output none
              }

            # Set traffic weight: 0% on preview (prod unaffected)
            az containerapp ingress traffic set \
              --name "${APP}" --resource-group "${RG}" \
              --label-weight "${SAFE_LABEL}=0" \
              --output none 2>/dev/null || true

            # Get the labeled preview URL
            APP_FQDN=$(az containerapp show \
              --name "${APP}" --resource-group "${RG}" \
              --query "properties.configuration.ingress.fqdn" -o tsv)

            # ACA label URLs: <label>---<app-fqdn>
            # Or: <label>.<env-domain>
            PREVIEW_URL="https://${SAFE_LABEL}---${APP_FQDN}"

            echo ""
            echo "=== Preview Ready ==="
            echo "Revision:    ${NEW_REVISION}"
            echo "Label:       ${SAFE_LABEL}"
            echo "Preview URL: ${PREVIEW_URL}"
            echo "Traffic:     0% (isolated from production)"

            # Output variables for downstream stages
            echo "##vso[task.setvariable variable=previewUrl;isOutput=true]${PREVIEW_URL}"
            echo "##vso[task.setvariable variable=previewRevision;isOutput=true]${NEW_REVISION}"
            echo "##vso[task.setvariable variable=previewLabel;isOutput=true]${SAFE_LABEL}"
          name: preview
