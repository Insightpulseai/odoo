    domain: orchestration
    has_scripts: true
    path: skills/superset/
    reason: "validate_superset_health.py, get_superset_embed_url.py, get_superset_guest_token.py"

  # --- OCR bridge ---
  - id: ocr-bridge-configure
    domain: ocr_ml
    has_scripts: false
    path: skills/ocr.bridge.configure/
    reason: "Prompt + skill.yaml + examples (paddleocr-prod, health-check-fail, missing-secret). References live ocr.insightpulseai.com"

  # --- Mail configuration ---
  - id: odoo-mail-configure
    domain: odoo_ce
    has_scripts: false
    path: skills/odoo.mail.configure/
    reason: "Prompt + skill.yaml + examples (zoho-dev, zoho-prod, missing-secret). References live Zoho SMTP"

  # --- Odoo 18 domain skills with Python ---
  - id: odoo18-config-params
    domain: odoo_ce
    has_scripts: true
    path: skills/odoo/
    reason: "fetch_odoo_config_params.py — executable Python for Odoo config extraction"

  # --- Supabase schema catalog ---
  - id: supabase-schema-catalog
    domain: platform
    has_scripts: true
    path: skills/user/supabase-schema-catalog/
    reason: "scripts/build_schema_catalog.sh — builds schema catalog from live Supabase"

  # --- Visio/DrawIO export ---
  - id: visio-drawio-export
    domain: diagrams
    has_scripts: true
    path: skills/visio-drawio-export/
    reason: "Docker entrypoint.sh for diagram export pipeline"

  # --- Standards (executable via agent prompts, not scripts) ---
  - id: oca-development-standards
    domain: odoo_ce
    has_scripts: false
    path: skills/oca-development-standards/
    reason: "SKILL.md used as ODOO-SAGE entrypoint. Directly governs agent code generation."

  - id: oca-owl-standards
    domain: odoo_ce
    has_scripts: false
    path: skills/oca-owl-standards/
    reason: "SKILL.md used as UI-CRAFT entrypoint. OWL component standards."

