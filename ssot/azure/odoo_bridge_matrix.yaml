      Justified Odoo addons: thin connector surfaces, action launch points,
      auth/session mapping, status/result sync, minimal UI hooks. Everything else
      belongs outside addons/.
    notes: >
      Tier 1 repos are approved for immediate adoption in the external agent/runtime lane.
      Tier 2 repos are deferred unless M365/Teams channel delivery is activated.
      Classification reviewed 2026-04-05.

