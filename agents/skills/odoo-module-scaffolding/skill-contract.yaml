version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-module-scaffolding
  status: active
  owner: agents
  build_order: 1
  lane: backend_foundation
  purpose: >
    Create new Odoo module structure with correct directory layout, manifest,
    init files, security stubs, and README. Ensures every new ipai_* module
    follows canonical naming, licensing, and dependency conventions for Odoo CE 18.

  triggers:
    - new custom module requested
    - new ipai_* feature requirement identified
    - spec bundle references a module that does not yet exist
    - PR introduces a new addons/ipai/ directory

  inputs:
    - module_name (ipai_<domain>_<feature> pattern)
    - short_description
    - target_models (optional list of model names)
    - dependencies (list of Odoo/OCA module names)

  steps:
    - validate module name follows ipai_<domain>_<feature> convention
    - create module directory under addons/ipai/
    - scaffold __manifest__.py with version 19.0.1.0.0, LGPL-3, minimal deps
    - create __init__.py importing models package
    - create models/__init__.py with model imports
    - create models/<model>.py stub with _name, _description, _inherit (if extending)
    - create security/ir.model.access.csv with header and stub ACL rows (all 4 CRUD columns)
    - create views/ directory with stub XML view and menu
    - create tests/__init__.py and tests/test_<module>.py stub
    - create README.rst with module purpose and usage
    - verify manifest is valid Python (py_compile)
    - verify no Enterprise dependencies in manifest

  outputs:
    - module_directory_path
    - manifest_validation_result
    - file_tree_summary
    - evidence

  guardrails:
    - module name must match ipai_<domain>_<feature> pattern
    - license must be LGPL-3
    - version must be 19.0.x.y.z
    - no Enterprise module dependencies
    - no odoo.com IAP dependencies
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified
    - dependencies must be minimal and explicit
    - always include security/ir.model.access.csv with all 4 CRUD columns

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-module-scaffolding/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo18-coding.md
  - .claude/rules/oca-governance.md
