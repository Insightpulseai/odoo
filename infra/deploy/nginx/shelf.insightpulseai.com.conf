# Nginx Configuration - shelf.insightpulseai.com (redirect-only)
# Status: PRODUCTION
# Last Updated: 2026-03-05
#
# Purpose: Redirect shelf.insightpulseai.com → https://shelf.nu
# No upstreams, no proxy_pass. Pure 301 redirect.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name shelf.insightpulseai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://shelf.nu$request_uri;
    }
}

# HTTPS → shelf.nu redirect
server {
    listen 443 ssl http2;
    server_name shelf.insightpulseai.com;

    ssl_certificate /etc/letsencrypt/live/insightpulseai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insightpulseai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://shelf.nu$request_uri;
}
