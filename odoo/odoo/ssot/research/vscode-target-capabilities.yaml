target_engineering_model:
  name: vscode-agentic-workflow
  status: adopted
  version: "1.0"

  local_environment:
    editor: vscode
    isolation: devcontainers
    required_features:
      - azure-cli
      - terraform
      - python
      - docker-in-docker
      - gh-cli

  agent_integration:
    primary_interface: devcontainer_exec
    capabilities:
      - cli_execution
      - file_modification
      - test_execution
    boundaries:
      - cannot_bypass_ci_cd
      - requires_human_pr_approval

  sdlc_control_plane:
    provider: azure_devops
    traceability: board_to_repo_to_pipeline
    environment_gates: manual_approval_required
