name: "Org Taxonomy Guard"

on:
  pull_request:
    paths:
      - "ssot/github/org_repos.yaml"
      - "scripts/ci/validate_org_taxonomy.py"
  push:
    branches: [main]
    paths:
      - "ssot/github/org_repos.yaml"

jobs:
  validate-taxonomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate org taxonomy SSOT
        run: python scripts/ci/validate_org_taxonomy.py
