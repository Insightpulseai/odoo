version: 1
namespace: ipai.odoo.expenses.expense_workflow.v1
artifact_type: contract
repo_key: odoo
domain: expenses
subject: expense_workflow

# odoo__expenses__expense_workflow__v1.contract.yaml
# Boundary contract: How agents interact with expense workflow in Odoo
apiVersion: ipai.contract/v1
kind: WorkflowContract
metadata:
  name: expense-workflow
  version: "1.0.0"
  owner: finance-team
  last_updated: "2026-03-16"

spec:
  odoo_model: hr.expense
  description: "Expense lifecycle from receipt ingestion to reimbursement"

  states:
    draft:
      description: "Expense created, awaiting submission"
      agent_can_create: true
      agent_can_modify: true
      human_gate: false
    reported:
      description: "Submitted in expense report"
      agent_can_create: false
      agent_can_modify: false
      human_gate: true
    approved:
      description: "Manager approved"
      agent_can_create: false
      agent_can_modify: false
      human_gate: true
    done:
      description: "Posted to accounting"
      agent_can_create: false
      agent_can_modify: false
      human_gate: true
    refused:
      description: "Manager refused"
      agent_can_create: false
      agent_can_modify: false
      human_gate: true

  transitions:
    - from: draft
      to: reported
      action: action_submit_expenses
      requires_human: true
      agent_role: "Agent creates draft, employee submits"
    - from: reported
      to: approved
      action: approve_expense_sheets
      requires_human: true
      agent_role: "Agent notifies manager, manager approves"
    - from: reported
      to: refused
      action: refuse_expense_sheets
      requires_human: true
    - from: approved
      to: done
      action: action_sheet_move_create
      requires_human: true

  agent_permissions:
    create_draft:
      allowed: true
      conditions:
        - "Valid employee_id (from session or document context)"
        - "Valid expense product_id"
        - "Receipt document attached"
      auto_approve:
        max_amount: 10000
        min_confidence: 0.85
        currency: PHP

    modify_draft:
      allowed: true
      conditions:
        - "Expense is in draft state"
        - "Only the creating agent or the employee can modify"

    submit_report:
      allowed: false
      note: "Employee-only action"

    approve:
      allowed: false
      note: "Manager-only action"

  document_flow:
    ingestion:
      source: "Receipt photo/scan upload"
      tool: document_intelligence_extract
      config:
        model_id: prebuilt-receipt
    matching:
      step: "Identify employee from session/context"
      source: session_user
    creation:
      step: "Create draft expense"
      tool: odoo_create_expense
      attach: source_receipt
    notification:
      step: "Notify employee for review"
      tool: slack_send_message
      template: "Expense draft created: {merchant} — {amount} PHP — Please review and submit"

  validation_rules:
    - name: receipt_required
      description: "Source receipt must be attached"
      action: block_if_missing
    - name: amount_limit
      description: "Flag expenses above PHP 25,000 for additional review"
      threshold: 25000
      action: flag_for_review
    - name: duplicate_check
      description: "Check for same employee + amount + date within 3 days"
      action: flag_if_duplicate
    - name: category_match
      description: "Expense product should match receipt merchant category"
      action: suggest_correction
