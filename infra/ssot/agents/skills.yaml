# ssot/agents/skills.yaml
# Single source of truth for all IPAI agent skills.
#
# CI validator: scripts/ci/validate_skills_registry.py
# Sync action:  .github/workflows/skills-sync.yml → ops.skills (Supabase)
# Interface:    ssot/agents/interface_schema.yaml (required fields + security defaults)
# Tools:        ssot/tools/registry.yaml (allowed_tools must reference IDs here)
#
# Field reference:
#   id            - unique kebab-case identifier (also the FK used in ops.runs.skill_id)
#   name          - human-readable display name
#   description   - what the skill does (1-2 sentences)
#   executor      - vercel_sandbox | do_runner | supabase_edge_fn
#   max_duration_s- hard timeout; Edge Function returns 504 if exceeded
#   tags          - free-form list for filtering
#   state_machine - list of required states in order (must be subset of PLAN,PATCH,VERIFY,PR,MONITOR)
#   owner         - team or person responsible for keeping it green
#   status        - active | deprecated | experimental
#   allowed_tools - list of tool IDs from ssot/tools/registry.yaml; ["__none__"] = no tools
#   security      - security controls block (see ssot/agents/interface_schema.yaml)
#
# Last updated: 2026-03-15
# Spec:         spec/deerflow-patterns-adoption/

meta:
  schema_version: "1.1"
  updated_at: "2026-03-15"
  spec: "spec/deerflow-patterns-adoption/"

skills:
  - id: pulser-patch
    name: "Pulser Patch"
    description: >
      Implements a code change from a Plane issue or GitHub issue.
      Reads the spec, generates a diff, opens a PR, and records CI results.
    executor: vercel_sandbox
    max_duration_s: 300
    tags: [patch, pr, pulser, core]
    state_machine: [PLAN, PATCH, VERIFY, PR]
    owner: platform-team
    status: active
    allowed_tools:
      - ops_start_run
      - ops_log_event
      - ops_complete_run
      - ops_fail_run
      - ops_add_artifact
      - github_read_issue
      - github_open_pr
      - mcp_plane_read_issue
      - slack_post_approval_request
      - repo_read_file
      - repo_write_file
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000

  - id: document-intelligence-analyze
    name: "Document Intelligence Analyze"
    description: >
      Extracts structured data from documents (PDFs, images, scans) using
      Azure Document Intelligence prebuilt and custom models. Supports invoices,
      receipts, tax forms, ID documents, contracts, and batch processing.
    executor: do_runner
    max_duration_s: 600
    tags: [azure, document-intelligence, pdf, ocr, invoices, receipts, tax-forms, extraction]
    state_machine: [PLAN, PATCH, VERIFY]
    owner: platform-team
    status: experimental
    allowed_tools:
      - ops_start_run
      - ops_log_event
      - ops_complete_run
      - ops_fail_run
      - ops_add_artifact
      - repo_read_file
      - repo_write_file
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000

  - id: document-intelligence-train
    name: "Document Intelligence Train"
    description: >
      Trains custom Azure Document Intelligence models (template or neural)
      from labeled training data. Manages model lifecycle including build,
      evaluate, compose, and version management.
    executor: do_runner
    max_duration_s: 1800
    tags: [azure, document-intelligence, custom-model, training, neural]
    state_machine: [PLAN, PATCH, VERIFY, MONITOR]
    owner: platform-team
    status: experimental
    allowed_tools:
      - ops_start_run
      - ops_log_event
      - ops_complete_run
      - ops_fail_run
      - ops_add_artifact
      - repo_read_file
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000

  - id: document-intelligence-classify
    name: "Document Intelligence Classify"
    description: >
      Classifies incoming documents by type (invoice, receipt, contract, tax form)
      using Azure Document Intelligence classification models. Routes documents
      to the appropriate extraction pipeline.
    executor: do_runner
    max_duration_s: 300
    tags: [azure, document-intelligence, classification, routing, triage]
    state_machine: [PLAN, VERIFY]
    owner: platform-team
    status: experimental
    allowed_tools:
      - ops_start_run
      - ops_log_event
      - ops_complete_run
      - ops_fail_run
      - repo_read_file
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000

  - id: fixbot-triage
    name: "FixBot Triage"
    description: >
      Triages a failing CI run or error report. Classifies the failure
      using ssot/errors/failure_modes.yaml, creates a remediation plan,
      and either auto-fixes or escalates with a labelled GitHub issue.
    executor: vercel_sandbox
    max_duration_s: 180
    tags: [triage, ci, fixbot, error-handling]
    state_machine: [PLAN, PATCH, VERIFY]
    owner: platform-team
    status: active
    allowed_tools:
      - ops_start_run
      - ops_log_event
      - ops_complete_run
      - ops_fail_run
      - github_read_issue
      - github_read_ci_run
      - mcp_plane_read_issue
      - mcp_plane_create_issue
      - slack_post_ops_alert
      - repo_read_file
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000

  - id: ops-advisor-scan
    name: "Ops Advisor Scan"
    description: >
      Scans the monorepo for convergence issues (drift, stale SSOT,
      dependency vulnerabilities, orphaned specs). Writes findings to
      ops.convergence_findings and posts a summary comment on main.
    executor: do_runner
    max_duration_s: 600
    tags: [scan, advisor, convergence, ssot]
    state_machine: [PLAN, VERIFY]
    owner: platform-team
    status: active
    allowed_tools:
      - ops_start_run
      - ops_log_event
      - ops_complete_run
      - ops_fail_run
      - ops_write_convergence_finding
      - ops_add_artifact
      - github_read_ci_run
      - slack_post_ops_alert
      - edge_fn_convergence_scan
      - repo_read_file
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000
