version: 1
namespace: ipai.ops_platform.factory.skill_pack_schema.v1
artifact_type: schema
repo_key: ops_platform
domain: factory
subject: skill_pack_schema

# ============================================================================
# FACTORY SKILL PACK SCHEMA — Layer 2 Output
# ============================================================================
# Every factory run produces a skill pack.
# Inspired by OpenAI Academy Skills concept.
# ============================================================================

fields:
  skill_pack_id:
    type: string
    format: uuid
    required: true

  title:
    type: string
    required: true

  description:
    type: string
    required: true

  skills:
    type: array
    required: true
    items:
      type: object
      properties:
        skill_id:
          type: string
          required: true
        skill_type:
          type: string
          required: true
          enum: [process_skill, tool_skill, convention_skill, role_pack]
        title:
          type: string
          required: true
        description:
          type: string
          required: true
        inputs:
          type: array
          items: { type: string }
        outputs:
          type: array
          items: { type: string }
        dependencies:
          type: array
          items: { type: string }
        tool_bindings:
          type: array
          items: { type: string }
        eval_criteria:
          type: array
          items: { type: string }
        upstream_source:
          type: string
        version:
          type: string
          required: true

  project_ref:
    type: string
    description: "Reference to the project this skill pack belongs to"

  reusable:
    type: boolean
    default: true

  created_at:
    type: string
    format: datetime
