schema_version: "1.0"
target_state: azure_operator_view
description: Canonical environment-first mapping for Azure Resource Groups and deployments.

environments:
  - name: shared
    resource_group: insightpulseai-shared
    services:
      - edge
      - identity
      - key-vault
      - observability
      - network

  - name: dev
    resource_group: insightpulseai-dev
    services:
      - odoo-web
      - odoo-worker
      - odoo-cron
      - auth
      - plane
      - mcp-coordinator
      - mcp-plane
      - ocr
      - supabase
      - superset
      - crm
      - shelf
      - website

  - name: staging
    resource_group: insightpulseai-staging
    services:
      - odoo-web
      - odoo-worker
      - odoo-cron
      - auth
      - plane
      - mcp-coordinator
      - ocr
      - supabase
      - superset

  - name: prod
    resource_group: insightpulseai-prod
    services:
      - odoo-web
      - odoo-worker
      - odoo-cron
      - auth
      - plane
      - mcp-coordinator
      - ocr
      - supabase
      - superset

naming_conventions:
  forbidden_service_names:
    - odoo
    - platform
  required_tags_for_abandoned_resources:
    - legacy
    - experimental
    - retire
