name: Devcontainer Drift Guard
on:
  push:
    paths:
      - '.devcontainer/**'
  pull_request:
    paths:
      - '.devcontainer/**'

jobs:
  devcontainer-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assert colima-odoo guard in devcontainer.json
        run: |
          if ! grep -q 'Expected docker context colima-odoo' .devcontainer/devcontainer.json; then
            echo "::error file=.devcontainer/devcontainer.json::Missing colima-odoo context assertion in initializeCommand — must contain 'Expected docker context colima-odoo'"
            exit 1
          fi
          echo "✓ colima-odoo guard present"

      - name: Assert sudo chown fix in post-create.sh
        run: |
          if ! grep -q 'sudo chown -R vscode:vscode ~/.commandhistory' .devcontainer/post-create.sh; then
            echo "::error file=.devcontainer/post-create.sh::Missing 'sudo chown -R vscode:vscode ~/.commandhistory' — Docker volume is root-owned, postCreateCommand will fail"
            exit 1
          fi
          echo "✓ commandhistory ownership fix present"
