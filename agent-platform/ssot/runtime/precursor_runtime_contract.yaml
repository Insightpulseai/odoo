version: 1
namespace: ipai.agent_platform.runtime.precursor_contract.v1
artifact_type: contract
last_updated: "2026-03-19"
status: v0.1-implemented

# =============================================================================
# PRECURSOR RUNTIME CONTRACT
# =============================================================================
# Defines the runtime behavior for the Odoo Copilot precursor flow.
# Source assets: agents/ repository
# Runtime execution: agent-platform/ packages
# =============================================================================

identity:
  name: IPAI Odoo Copilot Precursor
  version: "0.1.0"
  benchmark_primary: SAP Joule
  benchmark_secondary: Notion 3.0

asset_source:
  repository: agents/
  profile: foundry/ipai-odoo-copilot-azure/
  consumed_assets:
    - path: foundry/ipai-odoo-copilot-azure/system-prompt.md
      type: system_prompt
      version: "2.1.0"
    - path: foundry/ipai-odoo-copilot-azure/tool-definitions.json
      type: tool_manifest
      version: "1.0.0"
      stage: 1
    - path: foundry/ipai-odoo-copilot-azure/metadata.yaml
      type: agent_metadata
    - path: foundry/ipai-odoo-copilot-azure/guardrails.md
      type: guardrails
    - path: foundry/ipai-odoo-copilot-azure/context-envelope-contract.md
      type: context_contract
      version: "1.0.0"
    - path: foundry/ipai-odoo-copilot-azure/telemetry-contract.md
      type: telemetry_contract
    - path: foundry/policies/agents__policy__tool_allowlist__v1.policy.yaml
      type: tool_policy
    - path: evals/odoo-copilot/thresholds.yaml
      type: eval_thresholds
    - path: evals/odoo-copilot/rubric.md
      type: eval_rubric
    - path: evals/odoo-copilot/dataset.jsonl
      type: eval_dataset

runtime_packages:
  - name: "@ipai/builder-contract"
    path: packages/builder-contract/
    role: typed_contracts
    exports: [ContextEnvelope, PrecursorRequest, PrecursorResponse, ToolDefinition, AuditEvent, EvalRunResult, SpecialistRouter]

  - name: "@ipai/builder-foundry-client"
    path: packages/builder-foundry-client/
    role: foundry_adapter
    implementations: [MockFoundryClient, AzureFoundryClient]

  - name: "@ipai/builder-orchestrator"
    path: packages/builder-orchestrator/
    role: orchestration_engine
    components: [AssetLoader, PolicyEngine, ConsoleAuditEmitter, Orchestrator]

  - name: "@ipai/builder-evals"
    path: packages/builder-evals/
    role: eval_runner
    functions: [loadEvalDataset, runEvals, generateEvidencePack]

  - name: "@ipai/builder-runner"
    path: packages/builder-runner/
    role: cli_runner
    commands: [chat, health, eval, status]

runtime_app:
  name: "@ipai/builder-factory"
  path: apps/builder-factory/
  role: precursor_gateway
  entry: src/index.ts

default_mode: PROD-ADVISORY
fail_closed_rules:
  - "Tax/compliance specialist routes are blocked if specialist is not production_ready"
  - "Write tools are blocked in PROD-ADVISORY mode"
  - "Foundry API failures return empty response, never hallucinate"
  - "Missing context envelope defaults to most-restrictive behavior"

cloud_integration:
  foundry_endpoint_env: AZURE_AI_FOUNDRY_ENDPOINT
  foundry_project_env: AZURE_AI_FOUNDRY_PROJECT
  auth_preference:
    - managed_identity
    - service_principal
    - api_key_non_prod_only
  supabase: spdtwktxdalcfigzeqrz

ci_cd:
  platform: azure_devops
  note: "No GitHub Actions — Azure DevOps is sole CI/CD"
