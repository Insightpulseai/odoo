# SSOT: Google OAuth Provider Configuration
# Canonical definition for Google Sign-In used by Odoo and other services.
# Used by scripts/odoo/seed_auth_providers.py to configure Odoo.
#
# Last updated: 2026-04-16
contract_version: 1

provider:
  name: "Google (OIDC)"
  display_label: "Sign in with Google"
  auth_endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
  validation_endpoint: "https://openidconnect.googleapis.com/v1/userinfo"
  scopes:
    - openid
    - email
    - profile
  client_id: "916601142061-kva9q6607moot9rfm00so8l7h7a4b341.apps.googleusercontent.com"  # W9 Studio Project
  client_secret_env: "GOOGLE_CLIENT_SECRET"
  redirect_uris:
    - "https://erp.insightpulseai.com/auth_oauth/signin"
    - "http://localhost:8069/auth_oauth/signin"  # Development
  enabled: true
  sequence: 20
  css_class: "fa fa-fw fa-google"
