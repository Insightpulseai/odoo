version: 1
owner_repo: platform
owner_team: release
status: draft

product:
  key: odoo-login-foundry-copilot
  name: InsightPulse AI Odoo Login
  runtime_surface: erp
  foundry_project: ipai-copilot
  identity_surface: google_and_microsoft_oauth
  publish_channel: microsoft_marketplace
  package_contract: marketplace-publishing/contracts/golden-path-packaging.yaml
  compliance_contract: marketplace-publishing/contracts/golden-path-compliance.yaml
  gtm_contract: marketplace-publishing/contracts/golden-path-gtm.yaml

environments:
  sequence:
    - dev
    - preview
    - staging
    - production

promotion_requirements:
  dev_to_preview:
    - oauth_contract_valid
    - foundry_endpoint_contract_valid
    - preview_deploy_green
  preview_to_staging:
    - google_oauth_smoke_green
    - microsoft_oauth_smoke_green
    - foundry_client_config_green
  staging_to_production:
    - release_gate_green
    - compliance_ready
    - packaging_ready
    - gtm_ready

rollback:
  source_of_truth: git_and_environment_deploy_history
  triggers:
    - oauth_smoke_failure
    - foundry_client_regression
    - production_health_failure

rules:
  - id: golden-path-single-product
    description: Only one product is in scope for this golden path.
  - id: golden-path-no-parallel-package-models
    description: The golden path must use one package model only.
  - id: golden-path-preview-before-live
    description: Live promotion cannot bypass preview validation.
