version: 1
name: sft-alignment-design
description: "Design supervised fine-tuning alignment with chat/instruction data using TRL SFTTrainer"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: post-training-engineer
source_family: hf_smol_training_playbook
status: active

triggers:
  - "supervised fine-tuning"
  - "SFT alignment"
  - "chat model training"
  - "instruction alignment"

inputs:
  - base_model: "Pretrained or fine-tuned model"
  - instruction_data: "Chat/instruction formatted dataset"
  - chat_template: "Conversation format template"

steps:
  - id: format_data
    action: "Apply chat template, handle system/user/assistant turns"
  - id: configure_sft
    action: "Set SFTTrainer args: max_seq_length, packing, truncation"
  - id: train
    action: "Run SFT with evaluation checkpoints"
  - id: evaluate
    action: "Assess aligned model quality"

outputs:
  - sft_config: "SFTTrainer configuration"
  - aligned_checkpoint: "Base aligned model"
  - eval_results: "Quality assessment"

guardrails:
  - "Truncation strategy must be explicit — never silently truncate"
  - "Packing improves throughput but must preserve conversation boundaries"
  - "Max sequence length must match deployment context window"
  - "Chat template must match inference format exactly"

benchmark_source: "https://huggingface.co/docs/trl/sft_trainer"
