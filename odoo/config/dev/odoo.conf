[options]
; ============================================================
; Canonical local-dev Odoo runtime config
; Optimized for:
;   - fast feedback
;   - single-process debugging
;   - explicit local paths
;   - predictable addon loading
;   - safe local defaults
; Not for staging/prod use.
; ============================================================

; --- Core runtime ---
http_port = 8069
gevent_port = 8072
proxy_mode = False
workers = 0
max_cron_threads = 1

; --- Database ---
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False
dbfilter = ^odoo(_dev|_dev_demo)?$
list_db = True

; --- Addons ---
; Keep this rendered from SSOT if you already enforce it.
addons_path = /mnt/oca,/mnt/extra-addons/ipai,/mnt/extra-addons/local

; --- Data paths ---
data_dir = /var/lib/odoo
admin_passwd = admin

; --- Dev ergonomics ---
without_demo = all
unaccent = True

; Odoo dev flags:
;   xml      -> auto-reload XML/QWeb/assets in dev
;   reload   -> Python auto-reload where supported
;   qweb     -> template debug
;   werkzeug -> nicer tracebacks/dev server integration
dev_mode = xml,reload,qweb,werkzeug

; --- Logging ---
log_level = info
log_handler = :INFO,odoo.addons.base.models.ir_actions_report:WARNING,werkzeug:WARNING
log_db = False
logfile = False

; --- Resource / safety defaults ---
limit_time_cpu = 120
limit_time_real = 240
limit_memory_soft = 0
limit_memory_hard = 0
limit_request = 0

; --- Email / test friendliness ---
smtp_server = mailpit
smtp_port = 1025
smtp_ssl = False
smtp_user = False
smtp_password = False
email_from = no-reply@insightpulseai.local

; --- Longpolling / bus ---
longpolling_port = 8072

; --- File import/export ---
csv_internal_sep = ,
