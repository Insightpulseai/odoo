# -----------------------------------------------------------------------------
# Area Paths (architectural boundary, not cadence)
# -----------------------------------------------------------------------------
area_paths:
  root: ipai-platform
  children:
    - ipai-platform\odoo
    - ipai-platform\agent-platform
    - ipai-platform\agents
    - ipai-platform\web
    - ipai-platform\data-intelligence
    - ipai-platform\platform
    - ipai-platform\infra
    - ipai-platform\docs
    - ipai-platform\automations
    - ipai-platform\design
    - ipai-platform\templates
    - ipai-platform\identity-security
  rule: reflect_repos_not_sprint_cadence

# -----------------------------------------------------------------------------
# Iteration Paths (cadence, not architecture)
# -----------------------------------------------------------------------------
iterations:
  rule: reflect_time_cadence_not_architecture
  model:
    fiscal_year: FY26
    quarters: [Q1, Q2, Q3, Q4]
    sprint_length_weeks: 1_or_2_weeks_for_one_person_team
  example_structure:
    - FY26\Q2\Sprint 01
    - FY26\Q2\Sprint 02
    - FY26\Q2\Sprint 03
    - FY26\Q2\Sprint 04

# -----------------------------------------------------------------------------
# Naming conventions
# -----------------------------------------------------------------------------
naming:
  epic:
    pattern: "<Capability domain>"
    examples:
      - "Business Systems / Odoo ERP"
      - "AI Runtime / Agent Platform"
  issue:
    pattern: "<Domain>: <Deliverable slice>"
    examples:
      - "ERP: Normalize branch and entity model"
      - "AI Runtime: Bind Foundry provider to ipai-copilot-resource"
      - "Web: Launch Prismalab workspace shell"
      - "Identity: Convert TBWA\\SMP contacts to guest model"
      - "Infra: Provision ACA baseline for agent runtime"
  task:
    pattern: "<Verb> <concrete implementation step>"
    examples:
      - "Add Foundry provider settings loader"
      - "Create Odoo tool adapter contract"
      - "Render shared chat workspace layout"
      - "Add guest access policy documentation"
      - "Provision managed identity role assignments"

# -----------------------------------------------------------------------------
# Tags (cross-cutting lenses, not hierarchy)
# -----------------------------------------------------------------------------
tags:
  rule: cross_cutting_lenses_not_hierarchy
  canonical_set:
    - foundry
    - agent-framework
    - odoo
    - erp
    - prismalab
    - w9
    - identity
    - security
    - aca
    - entra
    - guest-access
    - retrieval
    - evals
    - observability
    - release
    - docs
    - breaking-change
    - production

# -----------------------------------------------------------------------------
# Workflow states (lean)
# -----------------------------------------------------------------------------
workflow:
  rule: keep_lean_unless_reporting_need_demands_more
  states:
    - New
    - Active
    - Blocked
    - Resolved
    - Closed
  optional_if_needed:
    - Ready for Validation
    - Ready for Release

# -----------------------------------------------------------------------------
# First-wave Epics to create now
# -----------------------------------------------------------------------------
first_wave:
  priority_order:
    - EPIC-001  # Business Systems / Odoo ERP
    - EPIC-002  # AI Runtime / Agent Platform
    - EPIC-004  # Web Experience Surfaces
    - EPIC-007  # Infrastructure / Azure / Edge / Hosting
    - EPIC-008  # Identity / Security / Governance
    - EPIC-009  # Docs / Architecture / Runbooks / Evidence
  rationale: >
    Enough to organize the whole program without overcomplicating it.
    Other epics (003 Agents, 005 Data, 006 Platform, 010 Automations,
    011 Design, 012 Templates) can be added when work starts landing in
    those lanes.

# -----------------------------------------------------------------------------
# Board queries / views
# -----------------------------------------------------------------------------
board_queries:
  by_architectural_boundary:
    - name: "Active work by Area Path"
      wiql_hint: "WHERE [System.AreaPath] UNDER 'ipai-platform' AND [System.State] = 'Active'"
    - name: "Blocked work by Area Path"
      wiql_hint: "WHERE [System.State] = 'Blocked'"
    - name: "Production-impacting work across all areas"
      wiql_hint: "WHERE [System.Tags] CONTAINS 'production'"
  by_governance_lens:
    - production_tag
    - identity_tag
    - breaking_change_tag
    - work_without_linked_spec_or_doc_evidence
  by_lifecycle:
    - strategize_design_ready
    - in_implementation
    - rehearsal_pre_prod
    - done_with_evidence

# -----------------------------------------------------------------------------
# Executed vs codified scope
# -----------------------------------------------------------------------------
execution_boundary:
  this_ssot_is:
    - machine_readable_spec_for_taxonomy
    - reference_for_board_queries
    - naming_convention_authority
  this_ssot_is_not:
    - a_live_board_state_mirror
    - auto_applied_to_the_ado_project
  execution_runbook: docs/runbooks/azure-boards-setup.md
  rule: >
    Creating Epics, Area Paths, and Iterations in Azure DevOps is a
    visible shared-state mutation. Execute only via the runbook with
    explicit approval.

# -----------------------------------------------------------------------------
# Future scaling path (ADO scale-agile features deferred until team growth)
# -----------------------------------------------------------------------------
future_scaling_path:
  upstream_reference: https://learn.microsoft.com/azure/devops/boards/plans/agile-at-scale
  current_scale: solo_ops_or_small_focused_team
  current_decision: basic_process_plus_12_area_paths_plus_1_to_2_week_iterations_sufficient

  scaling_features_deferred:

    portfolio_management:
      status: deferred
      adopt_when: multiple_teams_delivering_against_shared_program_goals
      capability: multi_level_work_hierarchies_rollup_reporting_cross_team_capacity
      ipai_current_equivalent: >
        12 Area Paths acting as team boundaries; one-person portfolio
        rollup happens in aac map and scope matrix SSOTs.

    delivery_plans:
      status: deferred
      adopt_when: coordinated_multi_team_release_trains
      capability: timeline_calendar_view_of_features_across_teams
      ipai_current_equivalent: >
        ssot/release/go-live-scope-matrix.yaml serves as the single
        timeline view for the first gate; expand to ADO Delivery Plans
        when multi-team releases emerge.

    multi_team_dashboards:
      status: deferred
      adopt_when: stakeholder_reporting_at_multiple_org_levels_demands_it
      capability: team_program_leadership_dashboards_with_rollup
      ipai_current_equivalent: >
        Databricks PPM Control Tower + Power BI dashboards serve
        leadership reporting; ADO native dashboards deferred.

    hierarchical_team_structure:
      status: deferred
      adopt_when: 3_or_more_autonomous_engineering_teams
      capability: team_of_teams_with_portfolio_rollups
      ipai_current_equivalent: >
        Area Paths currently represent capability boundaries, not team
        boundaries. When real teams form, split Area Paths into
        team-scoped sub-paths under existing capability roots.

    dependency_tracking_in_delivery_plans:
      status: deferred
      adopt_when: cross_team_dependencies_become_a_coordination_bottleneck
      capability: predecessor_successor_arrows_on_timeline

  revisit_triggers:
    any_one_triggers_evaluation:
      - team_grows_beyond_3_active_engineers
      - multi_team_release_coordination_becomes_recurring_problem
      - leadership_demand_for_rollup_portfolio_views
      - cross_team_dependencies_delay_delivery_more_than_once
      - client_engagement_contractually_requires_portfolio_reporting

  migration_path:
    rule: additive_not_destructive
    steps:
      - 1_add_team_scoped_sub_area_paths_under_existing_capability_paths
      - 2_keep_basic_process_hierarchy_Epic_Issue_Task (no need to switch to Scrum)
      - 3_enable_ADO_Delivery_Plans_feature_on_existing_epics_issues
      - 4_add_program_dashboards_pulling_from_existing_area_paths
      - 5_evaluate_process_change_to_Scrum_only_if_ceremonies_become_real_value

# -----------------------------------------------------------------------------
# Anchors
# -----------------------------------------------------------------------------
anchors:
  runbook: docs/runbooks/azure-boards-setup.md
  aac_map: ssot/architecture/azure-architecture-center-map.yaml
  existing_contract: ssot/planning/azure-boards.contract.yaml
  agent_factory_mapping: ssot/agent-platform/boards_mapping.yaml
  ado_github_authority: ssot/governance/ado_github_authority_map.yaml
