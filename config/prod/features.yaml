mode: prod

debug:
  xml_reload: false
  python_reload: false
  qweb_debug: false
  werkzeug_debug: false

database:
  allowed_names:
    - odoo
  dbfilter: "^odoo$"
  data_source: live

runtime:
  workers: 4
  max_cron_threads: 2
  proxy_mode: true
  base_url: https://erp.insightpulseai.com

mail:
  provider: zoho_smtp
  host: smtppro.zoho.com
  port: 587
  starttls: true
  credentials: key_vault
  email_from: no-reply@insightpulseai.com

cron:
  mode: live
  default_active: true

integrations:
  payment_providers: live
  sms_gateway: live
  external_apis: live

safety:
  pii_masking: false
  live_webhooks: enabled
  production_api_keys: key_vault

backup:
  cadence: daily
  retention_days: 30
  pitr: true

addons:
  paths:
    - /usr/lib/python3/dist-packages/odoo/addons
    - /opt/odoo/addons/oca
    - /opt/odoo/addons/ipai
