# Zoho Mail Integration — SSOT
version: "1.0.0"
schema: ssot.integrations.v1
updated_at: "2026-03-31"

integration:
  id: zoho_mail
  name: "Zoho Mail (SMTP + API)"
  vendor: zoho
  status: active
  category: email

capabilities:
  send:
    protocol: smtp
    host: smtp.zoho.com
    port: 587
    tls: starttls
    sender: business@insightpulseai.com
  read:
    protocol: zoho_mail_api
    auth: self_client_oauth2
    account_id: "2190180000000008002"

secrets:
  vault: kv-ipai-dev
  entries:
    - name: zoho-smtp-user
    - name: zoho-smtp-password
    - name: zoho-mail-client-id
    - name: zoho-mail-client-secret
    - name: zoho-mail-refresh-token
    - name: zoho-mail-account-id
    - name: zoho-mail-api-base-url

notes: "Bidirectional email confirmed live 2026-03-31. Stock ir.mail_server for send."
