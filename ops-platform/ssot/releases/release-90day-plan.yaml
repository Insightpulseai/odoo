# ============================================================
# 90-DAY RELEASE PLAN
# ============================================================
# Concrete month-by-month shipping targets.
# Last updated: 2026-03-15
# ============================================================

schema_version: "1.0"
plan_id: release-90day-plan
start_date: "2026-03-15"
end_date: "2026-06-15"

# ----------------------------------------------------------
# Month 1 (March 15 – April 15, 2026)
# ----------------------------------------------------------
month_1:
  label: "Foundation + Flagship Preview"
  releases:
    - release: R0
      milestone: "Governance & Policy Pack"
      deliverables:
        - "policy-pack committed and CI-enforced"
        - "connection-registry populated"
        - "packaging-channel-matrix published"
        - "offer-registry initialized"
        - "agent-publish-rules documented"
        - "model-aliasing-rules documented"
      exit_criteria:
        - "All governance YAMLs merged to main"
        - "CI validates policy compliance on every PR"

    - release: R1
      milestone: "Odoo Copilot Internal Dev Preview"
      deliverables:
        - "Odoo Copilot manifest live"
        - "Read-only Foundry-backed chat working"
        - "Approved tools only"
        - "Trace + eval + owner metadata functional"
      exit_criteria:
        - "3+ internal users can query finance/compliance topics"
        - "Smoke evals green for 5 consecutive days"

# ----------------------------------------------------------
# Month 2 (April 15 – May 15, 2026)
# ----------------------------------------------------------
month_2:
  label: "Workflows + Control Plane"
  releases:
    - release: R2
      milestone: "Finance DocFlow Alpha"
      deliverables:
        - "Invoice/receipt extraction pipeline"
        - "Review queue UI"
        - "Draft-only posting (no auto-booking)"
        - "Audit trail for all extractions"
      exit_criteria:
        - "Extraction accuracy > 90% on test invoice set"
        - "Review flow works end-to-end"

    - release: R3
      milestone: "Ops Console Beta"
      deliverables:
        - "Release registry dashboard"
        - "Agent status view"
        - "Eval status view"
        - "Environment + packaging visibility"
      exit_criteria:
        - "Single screen answers: what exists, deployable, blocked"

# ----------------------------------------------------------
# Month 3 (May 15 – June 15, 2026)
# ----------------------------------------------------------
month_3:
  label: "Integration + BI + Packaging Prep"
  releases:
    - release: R4
      milestone: "Azure DevOps Release-Control Integration"
      deliverables:
        - "ADO Boards binding"
        - "Release item linking"
        - "Test Plans/UAT linkage"
        - "Promotion gates in pipeline"
      exit_criteria:
        - "Every staging promotion has release/work-item/test-evidence chain"

    - release: R5
      milestone: "Tableau / BI Connector Surface"
      deliverables:
        - "Governed metric export"
        - "Semantic access layer"
        - "Tableau Cloud consumption path"
      exit_criteria:
        - "Tableau reads governed outputs, not raw internals"

    - milestone: "R6 Packaging Prep (no ship)"
      deliverables:
        - "ARM template skeleton for managed app"
        - "Portal UI definition draft"
        - "Packaging readiness checklist complete"
      exit_criteria:
        - "R6 packaging artifacts ready for Month 4 review"

# ----------------------------------------------------------
# Decision points
# ----------------------------------------------------------
decision_points:
  - date: "2026-04-15"
    question: "Is R0 governance enforced? Can R1 proceed to biweekly lane?"
  - date: "2026-05-15"
    question: "Is R2 extraction accurate enough? Is R3 console useful?"
  - date: "2026-06-15"
    question: "Is R6 managed app packaging justified? Which candidate?"
