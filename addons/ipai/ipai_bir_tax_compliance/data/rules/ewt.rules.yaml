    description: Sum of all expanded withholding tax amounts
    priority: 200
    tax_type: ewt

    condition:
      always: true

    formula: |
      SUM(
        EWT_PROF_WI010, EWT_PROF_WC020, EWT_PROF_WI030, EWT_PROF_WI040,
