version: 1
owner_repo: platform
owner_team: ai-platform
status: draft

resources:
  - key: ipai-foundry-sea
    kind: microsoft_foundry_project
    subscription_id: ""
    resource_group: ""
    resource_id: ""
    project_name: ipai-copilot

principals:
  - key: admin-user
    display_name: admin@insightpulseai.com
    principal_type: user
    object_id: ""
  - key: odoo-runtime-mi
    display_name: ""
    principal_type: managed_identity
    object_id: ""
  - key: github-cicd
    display_name: ""
    principal_type: federated_identity
    object_id: ""

required_access:
  - principal: admin-user
    resource: ipai-foundry-sea
    client: ai_toolkit
    required_actions:
      - read_project
      - read_connections
    required_roles: []
    status: unknown
  - principal: odoo-runtime-mi
    resource: ipai-foundry-sea
    client: runtime_apps
    required_actions:
      - invoke_models
    required_roles: []
    status: unknown
  - principal: github-cicd
    resource: ipai-foundry-sea
    client: ci_cd
    required_actions:
      - deploy_or_configure
    required_roles: []
    status: unknown

verification:
  method:
    - portal_check
    - cli_check
  last_verified_at: ""
  verified_by: ""
