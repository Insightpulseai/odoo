version: 1
name: autonomous-agent-fit-assessment
description: "Assess whether a task genuinely requires an autonomous agent or if a simpler workflow pattern suffices"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: workflow-architect
source_family: anthropic_agent_patterns
status: active

triggers:
  - "autonomous agent proposed"
  - "should this be a full agent?"
  - "agent vs workflow decision"

inputs:
  - task_description: "What the agent would do"
  - predictability: "Can steps be predicted in advance?"
  - feedback_dependency: "Does progress depend on environmental feedback?"
  - adaptability_need: "Must strategy change based on intermediate results?"

steps:
  - id: predictability_check
    action: "Can the steps be enumerated in advance?"
    gate: "If yes → not an agent task, recommend workflow"
  - id: feedback_check
    action: "Does the task require environmental feedback to determine next actions?"
    gate: "If no → not an agent task"
  - id: adaptability_check
    action: "Must the strategy change based on what's discovered?"
    gate: "If no → not an agent task"
  - id: cost_benefit
    action: "Is the quality improvement worth the latency and cost increase?"
  - id: guardrail_design
    action: "Define mandatory guardrails: sandbox, limits, monitoring, human review"

outputs:
  - fit_assessment: "agent_justified | workflow_sufficient | single_call_sufficient"
  - justification: "Why this assessment"
  - guardrails: "If agent justified: sandbox, resource limits, monitoring, human checkpoints"

guardrails:
  - "Must demonstrate why ALL simpler patterns fail before recommending agent"
  - "Agent recommendation MUST include guardrails"
  - "Cost/latency tradeoff must be explicitly acknowledged"

benchmark_source: "https://www.anthropic.com/engineering/building-effective-agents"
