# Migration sequencing
sequencing:
  phase_1:
    - "Freeze SSOT files (this PR)"
    - "Apply Azure Policy for mandatory tags (audit-only first)"
    - "Tag all current resources to baseline"
  phase_2:
    - "Normalize observability resources (low blast radius)"
    - "Normalize Key Vault casing"
  phase_3:
    - "Move PG Flexible Server to transaction plane (cross-RG; coordinate with app)"
    - "Move identities to correct planes"
  phase_4:
    - "Rename ACA Environment (requires ACA app re-registration)"
    - "Split Prismalab from Odoo stg RG"
  phase_5:
    - "Stand up stg/prod RG taxonomy via Bicep"
    - "Switch policy to Deny effect after 100% baseline"

# Blast radius notes
risk:
  high:
    - "PG Flexible Server move/rename — connection strings change; requires app downtime or DNS aliasing"
    - "ACA Environment rename — apps in env may need re-registration"
  medium:
    - "Storage account rename (constrained) — references in scripts/Bicep need update"
    - "ACR rename — image pull paths break until referrers updated"
  low:
    - "Tag application"
    - "Observability resource renames (App Insights connection strings update)"

# Anchors
