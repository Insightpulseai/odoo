name: ipai-odoo-copilot-azure
runtime: azure-ai-foundry
version: "1.0.0"
description: >
  Azure AI Foundry agent for IPAI Odoo Copilot.
  Serves as the conversational AI backend for Philippine finance
  and tax compliance operations on Odoo 19 CE.

publish_target:
  type: azure-ai-agent-service
  endpoint_env: AZURE_AI_FOUNDRY_ENDPOINT
  project_env: AZURE_AI_FOUNDRY_PROJECT

capabilities:
  - navigational      # Deep-link to Odoo records
  - informational     # Q&A on Odoo docs and BIR rules
  - transactional     # Read/write Odoo data (when authorized)
  - compliance_intel   # Proactive tax findings and alerts

write_policy:
  default: read_only
  modes:
    - read_only        # Agent cannot execute writes
    - draft_only       # Writes surfaced as drafts for approval
    - full_access      # Writes executed directly (requires explicit opt-in)

consumption:
  odoo_discuss: true   # Via ipai_odoo_copilot Discuss bot
  http_api: true       # Via /ipai/copilot/chat controller
  docs_widget: true    # Via documentaion repo chat widget

model_deployment: gpt-4.1
knowledge_grounding:
  search_service: srch-ipai-dev
  search_index: ipai-knowledge-index
