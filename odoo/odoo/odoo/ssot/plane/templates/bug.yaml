schema: ssot.plane.template.v1
type: bug
updated: "2026-03-16"

template:
  name: Bug Template
  description_structure: |
    ## Observed Behavior
    What happens currently?

    ## Expected Behavior
    What should happen instead?

    ## Repro Steps
    1. Step 1
    2. Step 2
    3. Step 3

    ## Logs / Evidence
    Attach relevant logs, screenshots, or error output.

    ## Severity
    Critical / High / Medium / Low

  required_fields:
    - title
    - description
    - priority
    - state

  label_convention:
    - "Type/Bug"  # implicit from work item type
    - "Module/<module>"
    - "Priority/<severity>"

  module_assignment_rule: >
    Assign to the module where the bug manifests.

  cycle_assignment_rule: >
    Assign to current active cycle.

  done_rule: >
    Fix committed.
    Repro steps no longer reproduce the bug.
    Regression test added or existing test updated.
