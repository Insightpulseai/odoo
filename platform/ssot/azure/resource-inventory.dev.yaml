      - name: privatelink.vaultcore.azure.net
        type: Private DNS zone
        resource_group: rg-ipai-dev-net-sea
        region: global
        role: vault_private_dns
      - name: NetworkWatcher_southeastasia
        type: Network Watcher
        resource_group: NetworkWatcherRG
        region: southeastasia
        role: network_diagnostics
  observability:
    repo_owner: infra
    consumers:
      - odoo
      - agent-platform
      - data-intelligence
      - web
    resources:
      - name: ag-ipai-dev-sea
        type: Action group
        resource_group: rg-ipai-dev-mon-sea
        region: global
        role: alert_routing
      - name: Application Insights Smart Detection
        type: Action group
        resource_group: rg-ipai-dev-mon-sea
        region: global
        role: smart_detection_notifications
      - name: appi-ipai-dev
        type: Application Insights
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: shared_app_insights
      - name: appi-ipai-dev-agent-sea
        type: Application Insights
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: agent_app_insights
      - name: appi-ipai-dev-runtime-sea
        type: Application Insights
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: runtime_app_insights
      - name: log-ipai-dev-sea
        type: Log Analytics workspace
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: shared_logs
      - name: log-ipai-dev-agent-sea
        type: Log Analytics workspace
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: agent_logs
      - name: log-ipai-dev-runtime-sea
        type: Log Analytics workspace
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: runtime_logs
      - name: log-ipai-dev-data-sea
        type: Log Analytics workspace
        resource_group: rg-ipai-dev-mon-sea
        region: southeastasia
        role: data_logs
  realtime:
    repo_owner: agent-platform
    resources:
      - name: acs-ipai-dev-sea
        type: Communication Service
        resource_group: rg-ipai-dev-realtime
        region: global
        role: communication_channel
      - name: redis-ipai-dev-sea
        type: Azure Cache for Redis
        resource_group: rg-ipai-dev-realtime
        region: southeastasia
        role: cache_state
      - name: sigr-ipai-dev-sea
        type: SignalR
        resource_group: rg-ipai-dev-realtime
        region: southeastasia
        role: realtime_transport
identity_model:
  mailbox_authorities:
    insightpulseai.com: zoho_mail
    w9studio.net: google_workspace
  workforce_authority:
    tenant: Microsoft Entra ID
    domain: insightpulseai.com
  managed_identities:
    - name: id-ipai-dev
      purpose: shared_platform
    - name: id-ipai-dev-agent
      purpose: agent_runtime
    - name: id-ipai-dev-data
      purpose: analytics_runtime
    - name: id-ipai-dev-pipeline
      purpose: ci_cd_pipeline
    - name: id-ipai-dev-runtime
      purpose: shared_app_runtime
exceptions:
  - key: foundry_region_split
    description: Foundry resource is hosted in East US 2 while primary runtime, data, network, and app workloads are in Southeast Asia.
  - key: app_runtime_rg_drift
    description: rg-ipai-dev-odoo-sea functions as shared app runtime RG for multiple sites and apps, not Odoo-only.
naming_recommendations:
  - rg-ipai-dev-odoo-sea should be renamed or semantically documented as shared app runtime RG in future normalization.
  - Foundry resource region exception should be explicitly captured in platform bindings and infra docs.
  - Managed identities already align well to repo/runtime boundaries and should be preserved.
