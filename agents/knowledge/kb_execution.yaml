name: kb_execution
description: Work item completion, PR merges, pipeline runs, and deployment evidence
domain: execution
sources:
  - type: azure_boards
    project: ipai-platform
    query: "SELECT [System.Id] FROM WorkItems WHERE [System.WorkItemType] IN ('Task', 'Bug') AND [System.State] IN ('Active', 'Closed')"
  - type: github
    org: Insightpulseai
    repos: [odoo, agents, data-intelligence]
    artifacts: [pull_requests, commits, workflow_runs]
  - type: azure_pipelines
    project: ipai-platform
    definitions: ["*"]
index_name: diva_execution
refresh_schedule: "0 */6 * * *"  # Every 6 hours
access_policy:
  read: [diva_orchestrator, diva_judge, diva_collector]
  write: [diva_collector]
