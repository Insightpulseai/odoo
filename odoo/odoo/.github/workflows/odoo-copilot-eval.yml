name: Odoo Copilot Eval
on:
  push:
    branches: [main]
    paths:
      - "addons/ipai/ipai_odoo_copilot/**"
      - "packages/odoo-docs-kb/**"
      - "apps/odoo-docs-kb/**"
      - "agents/evals/**"
      - "tests/copilot/**"
  pull_request:
    paths:
      - "addons/ipai/ipai_odoo_copilot/**"
      - "packages/odoo-docs-kb/**"
      - "apps/odoo-docs-kb/**"
      - "agents/evals/**"
      - "tests/copilot/**"
  workflow_dispatch:

jobs:
  static-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest pyyaml
      - name: Run static contract tests
        run: python -m pytest tests/copilot/ -v -k "not integration" --tb=short

  capability-scoring:
    runs-on: ubuntu-latest
    if: hashFiles('agents/evals/score_capabilities.py') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml
      - name: Run capability scoring
        run: python agents/evals/score_capabilities.py
      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copilot-capability-eval
          path: artifacts/evals/
          if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pytest pyyaml azure-search-documents azure-identity
      - name: Run integration tests
        if: env.AZURE_SEARCH_API_KEY != ''
        env:
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
        run: python -m pytest tests/copilot/ -v -k "integration" --tb=short
