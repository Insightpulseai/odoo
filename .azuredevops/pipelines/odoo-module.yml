# =============================================================================
# Odoo Module Governed Pipeline — Odoo CE 18 + OCA 18
# =============================================================================
# Implements the idea-to-release pipeline contract:
#   docs/architecture/idea-to-release-pipeline.md
#
# Stages: Validate → Test → Package → Stage → Eval → Approve → Deploy → Marketplace
#
# Service connection: github-insightpulseai (GitHub)
# Variable group: vg-ipai-platform-secrets (Key Vault-backed)
# Pool: ubuntu-latest (hosted) or ipai-build-pool (self-hosted)
# =============================================================================

name: odoo-module-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
  - name: slug
    type: string
    default: ""
  - name: workItemId
    type: string
    default: ""
  - name: moduleName
    type: string
    default: ""
  - name: deployTarget
    type: string
    default: "azure_runtime"
    values:
      - azure_runtime
      - odoo_sh
  - name: aiEnabled
    type: boolean
    default: false
  - name: marketplacePublish
    type: boolean
    default: false

variables:
  - group: vg-ipai-platform-secrets
  - name: specRoot
    value: spec/${{ parameters.slug }}
  - name: evalRoot
    value: foundry/evals/${{ parameters.slug }}
  - name: marketplaceRoot
    value: marketplace/odoo/${{ parameters.moduleName }}
  - name: pythonVersion
    value: '3.11'
  - name: odooVersion
    value: '18.0'
  - name: acrName
    value: cripaidev
  - name: imageName
    value: ipai-odoo-web

resources:
  repositories:
    - repository: templates
      type: github
      name: Insightpulseai/infra
      endpoint: github-insightpulseai
      ref: refs/heads/main

stages:

  # ---------------------------------------------------------------------------
  # Stage 1: Validate metadata and contract inputs
  # ---------------------------------------------------------------------------
  - stage: Validate_Metadata
    displayName: Validate metadata and contract inputs
    jobs:
      - job: validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: |
              set -euo pipefail
              test -n "${{ parameters.slug }}"
              test -n "${{ parameters.workItemId }}"
              test -n "${{ parameters.moduleName }}"
              echo "PASS: Required parameters present."
            displayName: Validate required parameters

          - script: |
              set -euo pipefail
              test -f "$(specRoot)/constitution.md"
              test -f "$(specRoot)/prd.md"
              test -f "$(specRoot)/plan.md"
              test -f "$(specRoot)/tasks.md"
              echo "PASS: Spec Kit bundle complete."
            displayName: Validate Spec Kit bundle exists

          - script: |
              set -euo pipefail
              MODULE_DIR="addons/ipai/${{ parameters.moduleName }}"
              test -d "$MODULE_DIR"
              test -f "$MODULE_DIR/__manifest__.py"

              python3 -c "
              import ast, sys
              with open('${MODULE_DIR}/__manifest__.py') as f:
                  data = ast.literal_eval(f.read())
              assert isinstance(data, dict), 'Manifest must be a dict'
              assert 'name' in data, 'Missing name'
              assert 'version' in data, 'Missing version'
              ver = data['version']
              assert ver.startswith('18.0.'), f'Version must start with 18.0., got {ver}'
              print(f'OK: {data[\"name\"]} v{ver}')
              "
              echo "PASS: Module manifest valid for Odoo 18."
            displayName: Validate module manifest (18.0)

          - script: |
              set -euo pipefail
              if [ "${{ parameters.aiEnabled }}" = "true" ]; then
                test -f "$(evalRoot)/thresholds.yaml"
                echo "PASS: Eval gate file present."
              else
                echo "SKIP: AI not enabled."
              fi
            displayName: Validate eval gate file when AI-enabled

  # ---------------------------------------------------------------------------
  # Stage 2: Lint and test (Odoo 18 + OCA 18)
  # ---------------------------------------------------------------------------
  - stage: Lint_And_Test
    displayName: Lint and test (Odoo 18)
    dependsOn: Validate_Metadata
    jobs:
      - job: test
        pool:
          vmImage: ubuntu-latest
        services:
          postgres: postgres:16
        variables:
          PGHOST: localhost
          PGUSER: odoo
          PGPASSWORD: odoo
        steps:
          - checkout: self
            submodules: recursive
            fetchDepth: 0

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          # Install Odoo 18 + deps
          - script: |
              set -euo pipefail
              pip install setuptools wheel
              pip install -r vendor/odoo/requirements.txt
              pip install -e vendor/odoo/
              pip install flake8 black isort
              # Install OCA external deps
              pip install python-jose sentry-sdk || true
              echo "PASS: Odoo 18 + deps installed."
            displayName: Install Odoo 18 and dependencies

          # Python lint on the target module
          - script: |
              set -euo pipefail
              MODULE_DIR="addons/ipai/${{ parameters.moduleName }}"
              echo "=== Lint: $MODULE_DIR ==="
              flake8 "$MODULE_DIR" --max-line-length=120 --extend-ignore=E501,W503,E203 || true
              black --check --diff "$MODULE_DIR" || true
              isort --check --diff "$MODULE_DIR" || true
              python3 -m py_compile "$MODULE_DIR/__init__.py"
              echo "Lint complete."
            displayName: Python lint (module)
            continueOnError: true

          # Create test database
          - script: |
              set -euo pipefail
              export PGPASSWORD=odoo
              psql -h localhost -U odoo -d postgres \
                -c "CREATE DATABASE test_${{ parameters.moduleName }} ENCODING 'UTF8' LC_COLLATE 'C' LC_CTYPE 'C' TEMPLATE template0;"
              echo "PASS: Test DB created."
            displayName: Create test database

          # Build full addons path from OCA repos
          - script: |
              set -euo pipefail
              OCA_PATHS=$(find addons/oca -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort | tr '\n' ',')
              FULL_PATH="vendor/odoo/addons,addons/ipai,${OCA_PATHS%,}"
              echo "##vso[task.setvariable variable=ADDONS_PATH]$FULL_PATH"
              echo "Addons path: $FULL_PATH"
            displayName: Build addons path

          # Test install module
          - script: |
              set -euo pipefail
              echo "=== Installing ${{ parameters.moduleName }} on Odoo 18 ==="
              python vendor/odoo/odoo-bin \
                --database=test_${{ parameters.moduleName }} \
                --db_host=localhost --db_port=5432 \
                --db_user=odoo --db_password=odoo \
                --addons-path="$(ADDONS_PATH)" \
                --stop-after-init --no-http \
                -i ${{ parameters.moduleName }} \
                2>&1 | tee test_install.log

              # Check for errors
              if grep -qE "ERROR|CRITICAL" test_install.log; then
                echo "FAIL: Module install produced errors."
                grep -E "ERROR|CRITICAL" test_install.log
                exit 1
              fi
              echo "PASS: Module ${{ parameters.moduleName }} installed on Odoo 18."
            displayName: Test install module (Odoo 18)

          # Run Odoo tests for the module
          - script: |
              set -euo pipefail
              echo "=== Running tests for ${{ parameters.moduleName }} ==="
              python vendor/odoo/odoo-bin \
                --database=test_${{ parameters.moduleName }} \
                --db_host=localhost --db_port=5432 \
                --db_user=odoo --db_password=odoo \
                --addons-path="$(ADDONS_PATH)" \
                --stop-after-init --no-http \
                --test-enable --test-tags /${{ parameters.moduleName }} \
                -u ${{ parameters.moduleName }} \
                2>&1 | tee test_run.log

              # Classify result
              if grep -q "FAIL" test_run.log; then
                echo "FAIL: Tests failed."
                grep "FAIL" test_run.log
                exit 1
              elif grep -q "Ran 0 tests" test_run.log; then
                echo "WARN: Module has no tests (init-only)."
              else
                echo "PASS: Tests passed."
              fi
            displayName: Run module tests (Odoo 18)

          # Publish test evidence
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: test_install.log
              artifact: test-evidence-install
            displayName: Publish install evidence
            condition: always()

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: test_run.log
              artifact: test-evidence-run
            displayName: Publish test evidence
            condition: always()

  # ---------------------------------------------------------------------------
  # Stage 3: Package module/release artifact
  # ---------------------------------------------------------------------------
  - stage: Package
    displayName: Package module + container image
    dependsOn: Lint_And_Test
    condition: |
      and(
        succeeded('Lint_And_Test'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: package
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            submodules: recursive
            fetchDepth: 0

          # Build Docker image with Odoo 18 base
          - template: pipelines/templates/build-container.yml@templates
            parameters:
              serviceConnection: sc-azure-dev-platform
              imageName: $(imageName)
              dockerfilePath: docker/Dockerfile.prod
              acrName: $(acrName)
              runTrivy: true
              buildArgs: 'ODOO_BASE_IMAGE=odoo:18.0'

  # ---------------------------------------------------------------------------
  # Stage 4: Deploy to staging
  # ---------------------------------------------------------------------------
  - stage: Deploy_Staging
    displayName: Deploy to staging
    dependsOn: Package
    jobs:
      - deployment: deploy_staging
        environment: insightpulseai-staging
        pool: ipai-build-pool
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - ${{ if eq(parameters.deployTarget, 'odoo_sh') }}:
                  - script: |
                      echo "Odoo.sh staging: push to staging branch triggers build."
                      echo "Odoo.sh is benchmark-only — verify manually."
                    displayName: Odoo.sh staging (benchmark)

                - ${{ if eq(parameters.deployTarget, 'azure_runtime') }}:
                  - template: pipelines/templates/deploy-aca.yml@templates
                    parameters:
                      serviceConnection: sc-azure-dev-platform
                      containerAppName: ipai-odoo-staging-web
                      imageName: $(imageName)
                      imageTag: $(Build.SourceVersion)
                      acrName: $(acrName)
                      resourceGroup: rg-ipai-dev
                      environmentLabel: staging
                      healthPath: /web/health

                # Post-deploy: update module in staging DB
                - script: |
                    echo "=== Staging smoke check ==="
                    sleep 30
                    curl -sf "https://erp-staging.insightpulseai.com/web/health" || echo "WARN: Staging health check pending"
                  displayName: Staging smoke check

  # ---------------------------------------------------------------------------
  # Stage 5: AI evaluation gate (conditional)
  # ---------------------------------------------------------------------------
  - stage: Eval_Gate
    displayName: AI evaluation gate
    dependsOn: Deploy_Staging
    condition: and(succeeded(), eq('${{ parameters.aiEnabled }}', 'true'))
    jobs:
      - job: eval
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: |
              set -euo pipefail
              echo "=== Foundry Eval Gate ==="
              THRESHOLDS="$(evalRoot)/thresholds.yaml"
              test -f "$THRESHOLDS"
              echo "Thresholds file: $THRESHOLDS"
              cat "$THRESHOLDS"
              # TODO: Wire to Foundry eval SDK when available
              echo "WARN: Foundry eval execution pending SDK integration."
            displayName: Run Foundry eval

  # ---------------------------------------------------------------------------
  # Stage 6: Production approval
  # ---------------------------------------------------------------------------
  - stage: Approve_Production
    displayName: Production approval
    dependsOn:
      - Deploy_Staging
      - Eval_Gate
    condition: |
      or(
        and(succeeded('Deploy_Staging'), eq('${{ parameters.aiEnabled }}', 'false')),
        and(succeeded('Deploy_Staging'), succeeded('Eval_Gate'), eq('${{ parameters.aiEnabled }}', 'true'))
      )
    jobs:
      - job: approval
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              instructions: |
                Confirm before production deploy:
                - Module: ${{ parameters.moduleName }}
                - Odoo version: 18.0
                - Linked work item: ${{ parameters.workItemId }}
                - Spec slug: ${{ parameters.slug }}
                - Staging validation passed
                - Rollback path exists (ACA revision rollback)
                - Eval gate passed (if AI-enabled)
              notifyUsers: ""
            displayName: Manual production approval

  # ---------------------------------------------------------------------------
  # Stage 7: Deploy to production
  # ---------------------------------------------------------------------------
  - stage: Deploy_Production
    displayName: Deploy to production
    dependsOn: Approve_Production
    jobs:
      - deployment: deploy_prod
        environment: insightpulseai-production
        pool: ipai-build-pool
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - ${{ if eq(parameters.deployTarget, 'odoo_sh') }}:
                  - script: |
                      echo "Odoo.sh production: promote staging → production branch."
                      echo "Odoo.sh is benchmark-only — verify manually."
                    displayName: Odoo.sh production (benchmark)

                - ${{ if eq(parameters.deployTarget, 'azure_runtime') }}:
                  - template: pipelines/templates/deploy-aca.yml@templates
                    parameters:
                      serviceConnection: sc-azure-dev-platform
                      containerAppName: ipai-odoo-dev-web
                      imageName: $(imageName)
                      imageTag: $(Build.SourceVersion)
                      acrName: $(acrName)
                      resourceGroup: rg-ipai-dev-odoo-runtime
                      environmentLabel: production
                      healthPath: /web/health

                # Production smoke check
                - script: |
                    set -euo pipefail
                    echo "=== Production smoke check ==="
                    sleep 60
                    HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://erp.insightpulseai.com/web/login")
                    if [ "$HTTP_CODE" -eq 200 ]; then
                      echo "PASS: Production responding (HTTP $HTTP_CODE)."
                    else
                      echo "FAIL: Production returned HTTP $HTTP_CODE."
                      exit 1
                    fi
                  displayName: Production smoke check

                # Publish deployment evidence
                - script: |
                    set -euo pipefail
                    STAMP=$(date -u +%Y%m%d-%H%M)
                    mkdir -p docs/evidence/$STAMP/${{ parameters.moduleName }}
                    echo "module: ${{ parameters.moduleName }}" > docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml
                    echo "odoo_version: 18.0" >> docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml
                    echo "target: ${{ parameters.deployTarget }}" >> docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml
                    echo "commit: $(Build.SourceVersion)" >> docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml
                    echo "pipeline_run: $(Build.BuildNumber)" >> docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml
                    echo "timestamp: $STAMP" >> docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml
                    echo "Evidence written to docs/evidence/$STAMP/${{ parameters.moduleName }}/deploy.yaml"
                  displayName: Publish deployment evidence

  # ---------------------------------------------------------------------------
  # Stage 8: Marketplace readiness (conditional)
  # ---------------------------------------------------------------------------
  - stage: Marketplace_Readiness
    displayName: Marketplace readiness
    dependsOn: Deploy_Production
    condition: and(succeeded(), eq('${{ parameters.marketplacePublish }}', 'true'))
    jobs:
      - job: marketplace
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: |
              set -euo pipefail
              echo "=== Marketplace readiness check ==="
              CHECKLIST="$(marketplaceRoot)/manifest-checklist.md"
              test -f "$CHECKLIST" || { echo "FAIL: $CHECKLIST not found."; exit 1; }

              MODULE_DIR="addons/ipai/${{ parameters.moduleName }}"
              python3 -c "
              import ast
              with open('${MODULE_DIR}/__manifest__.py') as f:
                  data = ast.literal_eval(f.read())
              required = ['name', 'version', 'summary', 'author', 'website', 'license', 'category']
              missing = [k for k in required if k not in data]
              if missing:
                  print(f'FAIL: Missing manifest fields for marketplace: {missing}')
                  exit(1)
              assert data.get('license') in ('LGPL-3', 'AGPL-3', 'GPL-3'), f'License must be LGPL-3/AGPL-3/GPL-3, got {data.get(\"license\")}'
              print(f'PASS: Marketplace manifest valid — {data[\"name\"]} v{data[\"version\"]}')
              "
            displayName: Validate marketplace package
