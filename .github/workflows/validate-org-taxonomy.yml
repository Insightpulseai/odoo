name: Validate Org Taxonomy

on:
  push:
    branches: [main]
    paths:
      - 'ssot/github/org_repos.yaml'
      - 'scripts/ci/validate_org_taxonomy.py'
      - '.github/workflows/validate-org-taxonomy.yml'
  pull_request:
    paths:
      - 'ssot/github/org_repos.yaml'
      - 'scripts/ci/validate_org_taxonomy.py'
      - '.github/workflows/validate-org-taxonomy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-schema:
    name: Validate Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Run schema validation
        run: |
          python scripts/ci/validate_org_taxonomy.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-github-api:
    name: Verify GitHub Repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Verify repos exist on GitHub
        run: |
          python scripts/ci/validate_org_taxonomy.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cross-reference:
    name: Cross-Reference with Secrets Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Check cross-references
        run: |
          echo "✅ Cross-reference validation (placeholder - to be implemented with secrets registry v2)"
          # Future: Validate that all repos in org_repos.yaml have corresponding entries in secrets/registry.yaml

  generate-evidence:
    name: Generate Evidence
    runs-on: ubuntu-latest
    needs: [validate-schema, validate-github-api, cross-reference]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Generate validation evidence
        run: |
          mkdir -p web/docs/evidence
          timestamp=$(date -u +"%Y%m%d-%H%M%z" | sed 's/+0000/+0800/')
          evidence_dir="web/docs/evidence/${timestamp}/org-taxonomy-validation"
          mkdir -p "${evidence_dir}/logs"

          echo "📝 Running validation with evidence capture..."
          python scripts/ci/validate_org_taxonomy.py > "${evidence_dir}/logs/validation.log" 2>&1
          validation_exit_code=$?

          echo "📊 Creating summary..."
          cat > "${evidence_dir}/summary.json" <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S%z)",
            "workflow": "validate-org-taxonomy",
            "status": "$([ $validation_exit_code -eq 0 ] && echo 'COMPLETE' || echo 'BLOCKED')",
            "exit_code": $validation_exit_code,
            "logs": {
              "validation": "logs/validation.log"
            }
          }
          EOF

          echo "✅ Evidence saved to ${evidence_dir}"

          exit $validation_exit_code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org-taxonomy-validation-evidence
          path: web/docs/evidence/
          retention-days: 30
