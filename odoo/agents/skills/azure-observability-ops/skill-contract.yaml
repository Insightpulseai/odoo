version: 1
type: ops_skill
family: azure_copilot_ops
skill:
  name: azure-observability-ops
  status: draft
  owner: agents
  purpose: >
    Validate monitoring and observability posture — Application Insights,
    Log Analytics, Resource Graph queries, and alert rules. Ensures no
    production service operates without structured telemetry.

  triggers:
    - new service deployed to production
    - observability configuration change in PR
    - incident postmortem requiring telemetry review
    - KQL query catalog update

  inputs:
    - service name or Container App resource
    - Application Insights resource
    - Log Analytics workspace
    - alert rule definitions
    - KQL query catalog entries

  steps:
    - verify Application Insights is connected to the service
    - check Log Analytics workspace exists and receives data
    - validate KQL queries from catalog execute without errors
    - confirm alert rules exist for key failure modes (5xx, latency, restart)
    - verify action groups are configured with correct notification targets
    - check Resource Graph queries return expected resource inventory
    - validate custom metrics or availability tests if applicable
    - confirm log retention meets policy (minimum 30 days)
    - produce observability posture evidence

  outputs:
    - validation_result
    - instrumentation_status
    - alert_coverage
    - query_validation_results
    - findings
    - blockers
    - evidence

  guardrails:
    - never disable existing alerts
    - require evidence from Resource Graph before making claims
    - flag services without Application Insights as blockers
    - never modify Log Analytics workspace retention without approval
    - KQL queries must be validated against actual workspace, not assumed

  evidence:
    required: true
    format: "docs/evidence/{stamp}/azure-ops/observability/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - docs/contracts/azure-resource-graph-contract.md
  - ssot/runtime/resource-graph-query-catalog.yaml
  - docs/architecture/reference-benchmarks.md
