# Nginx Configuration - shelf.insightpulseai.com (placeholder)
# Status: PRODUCTION
# Last Updated: 2026-03-05
#
# Purpose: Placeholder until self-hosted Shelf.nu fork is deployed on :3003.
# Returns 503 Service Unavailable with a JSON body.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name shelf.insightpulseai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — 503 placeholder
server {
    listen 443 ssl http2;
    server_name shelf.insightpulseai.com;

    ssl_certificate /etc/letsencrypt/live/insightpulseai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insightpulseai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        default_type application/json;
        return 503 '{"status":"unavailable","service":"shelf","message":"Shelf asset management is not yet deployed. Coming soon."}';
    }
}
