# -----------------------------------------------------------------------------
# Guest access model
# -----------------------------------------------------------------------------
access_model:
  assignment_rule: group_only_no_direct_app_binding
  standing_roles: none
  mfa_required: true
  invitation_redirect_url: "https://myapplications.microsoft.com"
  invitation_message: >
    You have been invited by InsightPulse AI to collaborate on the TBWA\SMP
    Finance engagement. You will retain your @omc.com sign-in. Accept this
    invitation to receive access to the agreed collaboration apps. MFA is
    required on first sign-in.

# -----------------------------------------------------------------------------
# Prohibitions
# -----------------------------------------------------------------------------
prohibitions:
  - guests_MUST_NOT_be_created_as_Member
  - guests_MUST_NOT_hold_any_directory_role
  - guests_MUST_NOT_be_assigned_directly_to_apps_bypassing_groups
  - guests_display_name_MUST_use_TBWA_SMP_not_Omnicom
  - guests_email_MUST_remain_at_omc_com
