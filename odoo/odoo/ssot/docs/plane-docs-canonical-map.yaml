      - docs/troubleshooting/
    notes: >
      All operational runbooks (deployment, backup, restore, monthly close,
      certificate renewal, troubleshooting) migrate to Plane Wiki.
      Repo files replaced with redirect stubs. GOLDEN_PATH.md becomes
      the developer onboarding runbook.

  # -----------------------------------------------------------------
