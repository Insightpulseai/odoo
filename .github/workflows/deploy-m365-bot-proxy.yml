name: Deploy M365 Bot Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'agent-platform/services/m365-bot-proxy/**'
      - 'infra/azure/modules/aca-app-m365-bot-proxy.bicep'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to ACR
        run: |
          az acr build --registry ${{ secrets.ACR_NAME }} \
            --image m365-bot-proxy:${{ github.sha }} \
            agent-platform/services/m365-bot-proxy/

      - name: Deploy to ACA via Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --template-file infra/azure/modules/aca-app-m365-bot-proxy.bicep \
            --parameters \
              environmentName=${{ secrets.ACA_ENVIRONMENT }} \
              imageName=${{ secrets.ACR_NAME }}.azurecr.io/m365-bot-proxy:${{ github.sha }} \
              microsoftAppId=${{ secrets.MICROSOFT_APP_ID }} \
              microsoftAppPassword=${{ secrets.MICROSOFT_APP_PASSWORD }}

      - name: Health Check
        run: |
          # Simplified health check logic
          echo "Verifying health..."
          # curl -f https://<fqdn>/health
