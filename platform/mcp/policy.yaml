version: 2
owner_repo: platform
updated: "2026-04-04"

principles:
  - Odoo 18 CE/OCA is the business execution authority
  - MCP provides tool access, verification, and grounding only
  - No MCP server may directly mutate accounting or tax records without Odoo-side approval flow
  - Production actions must be auditable
  - Favor read-only access by default

access_policy:
  default_mode: read_only
  escalation_required_for:
    - deployment_mutation
    - production_exec
    - release_approval
    - identity_admin_queries
  forbidden_direct_targets:
    - odoo_accounting_post
    - taxguru_auto_apply
    - direct_database_mutation

repo_bindings:
  odoo:
    allowed_servers: []
    note: "No direct MCP dependency in addon runtime"
  platform:
    allowed_servers:
      - azure
      - azure-devops
      - microsoft-learn
  automations:
    allowed_servers:
      - azure
      - azure-devops
      - playwright
      - markitdown
  agents:
    allowed_servers:
      - microsoft-learn
      - markitdown
      - azure
      - azure-devops
  agent-platform:
    allowed_servers:
      - azure
      - azure-devops
      - microsoft-learn
    allowed_namespaces:
      - foundry
      - search
      - keyvault
      - monitor
  infra:
    allowed_servers:
      - azure
      - azure-devops
    allowed_namespaces:
      - postgres
      - keyvault
      - acr
      - storage
      - appservice
      - deploy
      - role
      - policy
  docs:
    allowed_servers:
      - microsoft-learn
      - markitdown
      - playwright
  web:
    allowed_servers:
      - playwright
  data-intelligence:
    allowed_servers:
      - azure
    allowed_namespaces:
      - search
      - storage
