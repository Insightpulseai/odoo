# Automatically generated release notes configuration
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
# Usage: gh release create v<YYYY.M.N> --generate-notes --title "..."
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "Breaking Changes"
      labels: [breaking]
    - title: "New Features"
      labels: [feat, feature, enhancement]
    - title: "Bug Fixes"
      labels: [fix, bugfix, bug]
    - title: "Security"
      labels: [security]
    - title: "Dependencies"
      labels: [dependencies]
    - title: "CI / Infrastructure"
      labels: [ci, chore]
    - title: "Documentation"
      labels: [docs, documentation]
