name: PPM Clarity - Integration Tests

on:
  pull_request:
    paths:
      - 'scripts/ppm/**'
      - 'supabase/migrations/*_create_ppm_clarity_schema.sql'
      - '.github/workflows/ppm-clarity-integration-test.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/ppm/**'
      - 'supabase/migrations/*_create_ppm_clarity_schema.sql'

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scripts/ppm
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️  requirements.txt not found, installing pytest only"
            pip install pytest pytest-asyncio pytest-cov
          fi

      - name: Run all tests with coverage
        run: |
          cd scripts/ppm
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: scripts/ppm/htmlcov/

  mock-sync-tests:
    name: Test Sync Logic (Mocked)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scripts/ppm
          pip install pytest pytest-asyncio pytest-mock

      - name: Run sync logic tests
        run: |
          cd scripts/ppm
          if [ -d tests ]; then
            python -m pytest tests/ -v -k sync --tb=short
          else
            echo "✅ No sync tests found yet (expected for initial implementation)"
          fi

  reconciliation-tests:
    name: Test Reconciliation Logic
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scripts/ppm
          pip install pytest pytest-asyncio

      - name: Run reconciliation tests
        run: |
          cd scripts/ppm
          if [ -d tests ]; then
            python -m pytest tests/ -v -k reconciliation --tb=short
          else
            echo "✅ No reconciliation tests found yet (expected for initial implementation)"
          fi

  slack-integration-tests:
    name: Test Slack Integration (Mocked)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scripts/ppm
          pip install pytest pytest-asyncio pytest-mock

      - name: Run Slack integration tests
        run: |
          cd scripts/ppm
          if [ -d tests ]; then
            python -m pytest tests/ -v -k slack --tb=short
          else
            echo "✅ No Slack tests found yet (expected for initial implementation)"
          fi
