version: 1
status: active
id: tenant_model

model:
  control_plane: shared
  data_plane: selective_isolation

control_plane_capabilities:
  - onboarding
  - provisioning
  - configuration
  - entitlement
  - billing_metering
  - support_ops
  - feature_entitlements
  - deployment_orchestration

data_plane_requirements:
  - explicit_tenant_context
  - tenant_scoped_authorization
  - tenant_specific_reporting
  - tenant_context_in_agents
  - isolation_by_design
  - isolation_testing
  - noisy_neighbor_mitigation

tenant_classes:
  - marketing_agency
  - retail_media_operator
  - entertainment_creator_team
  - financial_services_or_regulated_client

lifecycle:
  - prospect
  - onboarded
  - configured
  - active
  - suspended
  - archived

rules:
  - tenants_are_not_users
  - control_plane_and_data_plane_are_distinct
  - tenant_context_must_propagate_across_business_data_and_agent_planes
  - per_tenant_consumption_should_be_measurable
  - tenant_lifecycle_should_be_automated
