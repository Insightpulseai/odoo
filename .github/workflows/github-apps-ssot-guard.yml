name: GitHub Apps SSOT Guard

# Validates GitHub App integration SSOT consistency.
#
# Two independent checks run in parallel:
#
#   guard-legacy    — validates ssot/github/apps.yaml (two-app model; kept for
#                     backwards compatibility until ipai-n8n / ipai-plane-bridge
#                     are formally decommissioned)
#
#   guard-integrations — validates ssot/integrations/github_apps.yaml (canonical
#                        single-app model: ipai-integrations). This is the
#                        authoritative check going forward.
#
# Does NOT create or update GitHub Apps (one-time manual step).
# Runbook: docs/runbooks/GITHUB_APP_PROVISIONING.md
# SSOT:    ssot/integrations/github_apps.yaml

on:
  pull_request:
    paths:
      - "ssot/github/apps.yaml"
      - "ssot/github/app-manifest.yaml"
      - "ssot/integrations/github_apps.yaml"
      - "infra/github/apps/**"
      - "ssot/secrets/registry.yaml"
      - "supabase/functions/ops-github-webhook-ingest/**"
      - "scripts/ci/check_github_apps_ssot.py"
      - "scripts/github/create-app-from-manifest.sh"
  push:
    branches: [main]
    paths:
      - "ssot/github/apps.yaml"
      - "ssot/integrations/github_apps.yaml"
      - "infra/github/apps/**"
      - "scripts/github/**"

jobs:
  # ── Canonical check: single-app integration SSOT ─────────────────────────
  guard-integrations:
    name: Integrations SSOT parity (ipai-integrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Run SSOT parity check
        run: python3 scripts/ci/check_github_apps_ssot.py

  # ── Legacy check: two-app model (kept until decommission) ─────────────────
  guard-legacy:
    name: Legacy SSOT guard (ssot/github/apps.yaml)
    runs-on: ubuntu-latest
    # Only run when the legacy SSOT or legacy manifests are touched.
    # Remove this job once ipai-n8n and ipai-plane-bridge are decommissioned.
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Check — every legacy app has a manifest.json
        run: |
          set -euo pipefail
          FAIL=0
          # Legacy SSOT may not exist after consolidation — skip gracefully
          if [[ ! -f ssot/github/apps.yaml ]]; then
            echo "ℹ️  ssot/github/apps.yaml not present — skipping legacy guard"
            exit 0
          fi
          APP_IDS=$(yq '.apps[].id' ssot/github/apps.yaml)
          for app_id in $APP_IDS; do
            manifest="infra/github/apps/${app_id}/manifest.json"
            if [[ ! -f "$manifest" ]]; then
              echo "❌ MISSING manifest: $manifest (app: $app_id)"
              FAIL=1
            else
              echo "✅ $manifest"
            fi
          done
          exit $FAIL

      - name: Check — legacy manifest webhook URLs match SSOT
        run: |
          set -euo pipefail
          FAIL=0
          [[ -f ssot/github/apps.yaml ]] || exit 0
          APP_COUNT=$(yq '.apps | length' ssot/github/apps.yaml)
          for i in $(seq 0 $((APP_COUNT - 1))); do
            app_id=$(yq ".apps[$i].id" ssot/github/apps.yaml)
            ssot_url=$(yq ".apps[$i].webhook.url" ssot/github/apps.yaml)
            manifest="infra/github/apps/${app_id}/manifest.json"
            [[ -f "$manifest" ]] || continue
            manifest_url=$(python3 -c "import json; d=json.load(open('$manifest')); print(d.get('hook_attributes',{}).get('url',''))")
            if [[ "$ssot_url" != "$manifest_url" ]]; then
              echo "❌ Webhook URL mismatch for $app_id"
              echo "   SSOT:     $ssot_url"
              echo "   manifest: $manifest_url"
              FAIL=1
            else
              echo "✅ $app_id webhook URL consistent"
            fi
          done
          exit $FAIL

      - name: Check — legacy secret_refs exist in registry.yaml
        run: |
          set -euo pipefail
          FAIL=0
          [[ -f ssot/github/apps.yaml ]] || exit 0
          REFS=$(yq '.apps[].secrets[]' ssot/github/apps.yaml 2>/dev/null || true)
          for ref in $REFS; do
            if ! grep -qE "^  ${ref}:|^  ${ref}$" ssot/secrets/registry.yaml; then
              echo "❌ secret_ref '${ref}' not found in ssot/secrets/registry.yaml"
              FAIL=1
            else
              echo "✅ secret_ref '${ref}' registered"
            fi
          done
          exit $FAIL
