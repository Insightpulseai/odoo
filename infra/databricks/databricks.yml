# Databricks Asset Bundle Configuration
# For Notion x Finance PPM Control Room

bundle:
  name: notion-finance-ppm

variables:
  catalog:
    description: Unity Catalog name
    default: ppm
  schema_bronze:
    description: Bronze schema name
    default: bronze
  schema_silver:
    description: Silver schema name
    default: silver
  schema_gold:
    description: Gold schema name
    default: gold
  warehouse_id:
    description: SQL warehouse ID for queries
    default: ""
  notion_token:
    description: Notion integration token
    default: ""
  databricks_token:
    description: Databricks token for API calls
    default: ""
  slack_webhook_url:
    description: Slack webhook URL for connector alerts
    default: ""
  job_pool_id:
    description: Instance pool ID for job clusters (cost optimization)
    default: ""
  odoo_pg_host:
    description: Odoo PostgreSQL host
    default: "localhost"
  github_org:
    description: GitHub organization name
    default: "Insightpulseai"

# workspace.host is set via DATABRICKS_HOST env var (variable interpolation not supported)

include:
  - resources/*.yml
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  - resources/clusters/*.yml
  - resources/schedules/*.yml
  - resources/permissions/*.yml

artifacts:
  notion_sync_wheel:
    type: whl
    path: ../../services/notion-sync
    build: pip3 wheel --no-deps --wheel-dir dist .

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: ipai_lakehouse_dev
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/notion-finance-ppm-dev
    resources:
      jobs:
        notion_sync_bronze:
          name: "[DEV] Notion Sync Bronze"
        notion_transform_silver:
          name: "[DEV] Notion Transform Silver"
        ppm_marts_gold:
          name: "[DEV] PPM Marts Gold"
        azure_rg_ingest:
          name: "[DEV] Azure RG Ingest"
        dq_checks:
          name: "[DEV] DQ Checks"
        control_room_refresh:
          name: "[DEV] Control Room Refresh"
        connector_sync_notion:
          name: "[DEV] Connector Sync: Notion"
        connector_sync_odoo_pg:
          name: "[DEV] Connector Sync: Odoo PG"
        connector_sync_github:
          name: "[DEV] Connector Sync: GitHub"
        connector_sync_azure:
          name: "[DEV] Connector Sync: Azure"
        connector_replay:
          name: "[DEV] Connector Replay / Backfill"

  staging:
    mode: development
    variables:
      catalog: staging_ppm
    workspace:
      root_path: /Workspace/Shared/notion-finance-ppm-staging

  prod:
    mode: production
    variables:
      catalog: ppm
    workspace:
      root_path: /Workspace/Shared/notion-finance-ppm
    run_as:
      service_principal_name: notion-ppm-service-principal
    permissions:
      - level: CAN_VIEW
        group_name: data-engineers
      - level: CAN_MANAGE
        group_name: platform-admins
