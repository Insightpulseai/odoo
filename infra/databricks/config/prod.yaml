# Production environment configuration

environment: prod
catalog: ppm

schemas:
  bronze: bronze
  silver: silver
  gold: gold

# Alerting (enabled in prod)
alerting:
  enabled: true
  webhook_url: "${SLACK_WEBHOOK_URL}"

# Data quality thresholds (strictest in prod)
quality:
  null_threshold_pct: 1.0
  unique_threshold_pct: 0.0
  referential_threshold_pct: 0.1
