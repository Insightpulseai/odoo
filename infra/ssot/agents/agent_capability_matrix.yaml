version: 1.1.0
system: odoo_copilot_foundry
updated_at: "2026-03-15"

# Tool naming convention:
#   Foundry built-ins: search_knowledge, web_search, code_interpreter, file_search, image_generation
#   Odoo MCP tools:    search_records, read_record, create_draft, create_record, update_record, execute_action
#   Vendor tools:      databricks_sql_query, databricks_unity_search, fal_image_generate, etc.
#   Abstract groups:   odoo_read_only_ops (= search_records + read_record)
#                      odoo_approved_write_tools (= create_draft + create_record + update_record + execute_action)

# "Light" attachment: pack provides prompt context only, no dedicated tool invocations.
# Router groundedness: not applicable (deterministic code, no LLM inference).

components:
  - name: ipai-odoo-copilot-advisory
    form: foundry_prompt_agent
    plane: control
    purpose: user_facing_grounded_qa
    capability_packs:
      - databricks_intelligence
      - fal_creative_production        # read-only preview access
      - marketing_strategy_and_insight # full attachment
      - bir_compliance                 # full — informational grounding + search
    tools:
      - search_records                 # Odoo MCP
      - read_record                    # Odoo MCP
      - search_knowledge               # Foundry built-in (= foundry_knowledge)
      - web_search                     # Foundry built-in
    allowed_actions:
      - explain
      - summarize
      - recommend
      - compare
      - handoff
    blocked_actions:
      - writes
      - admin_security_changes
      - finance_execution
      - direct_publish_export
    evals:
      system:
        - task_completion
        - task_adherence
        - intent_resolution
        - relevance
        - groundedness                 # threshold: ≥ 0.8 (mandatory, not optional)
      safety:
        - content_risk
        - jailbreak_screening
        - sampled_human_review

  - name: ipai-odoo-copilot-ops
    form: agent_framework_agent
    plane: execution
    purpose: internal_read_only_diagnostics
    capability_packs:
      - databricks_intelligence
      - fal_creative_production        # read-only preview access
      - marketing_strategy_and_insight # full attachment
      - bir_compliance                 # read-only — filing inspection + diagnostics
    tools:
      - search_records                 # Odoo MCP
      - read_record                    # Odoo MCP
      - search_knowledge               # Foundry built-in
      - code_interpreter               # Foundry built-in
      - file_search                    # Foundry built-in
      - databricks_monitoring_read     # Databricks pack
      - infra_runtime_read             # infra reads
    allowed_actions:
      - inspect
      - diagnose
      - compare_state
      - summarize_incidents
      - recommend_remediation
    blocked_actions:
      - record_mutation
      - secret_changes
      - role_changes
      - uncontrolled_job_execution
    evals:
      system:
        - task_completion
        - task_adherence
      process:
        - tool_selection
        - tool_call_success
        - tool_output_utilization
      safety:
        - leakage_refusal
        - internal_red_team_scenarios

  - name: ipai-odoo-copilot-actions
    form: agent_framework_agent
    plane: execution
    purpose: controlled_execution_and_bounded_writes
    capability_packs:
      - databricks_intelligence
      - fal_creative_production        # write/generate access
      - marketing_strategy_and_insight # light — prompt context only, no dedicated tools
      - bir_compliance                 # write — compute, validate, export (approval-gated)
    tools:
      - search_records                 # Odoo MCP (read)
      - read_record                    # Odoo MCP (read)
      - create_draft                   # Odoo MCP (write)
      - create_record                  # Odoo MCP (write)
      - update_record                  # Odoo MCP (write)
      - execute_action                 # Odoo MCP (write)
      - image_generation               # Foundry built-in
      - code_interpreter               # Foundry built-in
      - fal_image_generate             # fal pack
      - fal_video_generate             # fal pack
      - fal_style_transfer             # fal pack
      - databricks_approved_job_actions # Databricks pack
      - evidence_writer                # internal
    allowed_actions:
      - create_update_allowed_records
      - trigger_approved_jobs
      - launch_approved_creative_runs
      - prepare_exports
      - write_evidence
    blocked_actions:
      - unrestricted_writes
      - destructive_ops
      - policy_bypass
      - silent_batch_execution
    evals:
      process:
        - tool_selection
        - tool_input_accuracy
        - tool_call_success
      safety:
        - approval_compliance
        - unauthorized_action_refusal
        - policy_tests
        - human_review_before_production

  - name: ipai-odoo-copilot-router
    form: agent_framework_workflow
    plane: execution
    purpose: deterministic_routing_approvals_handoffs
    implementation: python                # copilot_router.py, not LLM
    groundedness_eval: not_applicable     # deterministic code, no LLM inference
    capability_packs:
      - databricks_intelligence          # routing context
      - fal_creative_production          # routing context
      - bir_compliance                   # routing context for BIR intent classification
    tools:
      - workflow_graph
      - approval_steps
      - evidence_correlation
    allowed_actions:
      - route
      - pause_for_approval
      - resume
      - handoff
      - checkpoint
      - collect_trace_context
    blocked_actions:
      - free_form_reasoning
      - broad_vendor_logic
      - direct_domain_mutation
    evals:
      process:
        - routing_correctness
        - handoff_success
        - approval_compliance
      system:
        - end_to_end_task_completion

# --- Capability Pack Definitions ---

capability_packs:
  - name: databricks_intelligence
    description: Databricks SQL, Unity Catalog, Lakeview dashboards
    tools: [databricks_sql_query, databricks_unity_search, databricks_dashboard_embed]
    credentials: [DATABRICKS_HOST, DATABRICKS_TOKEN]
    degrades: pack_disabled_if_credentials_absent

  - name: fal_creative_production
    description: Image/video generation, style transfer via fal.ai
    tools: [fal_image_generate, fal_video_generate, fal_style_transfer]
    credentials: [FAL_KEY]
    degrades: falls_back_to_foundry_image_generation

  - name: marketing_strategy_and_insight
    description: Brand guidelines, campaign context, marketing strategy
    tools: [web_search, search_knowledge]
    credentials: []
    degrades: not_applicable

  - name: bir_compliance
    description: BIR tax compliance — rates, rules, computation, filing, knowledge
    spec_ref: spec/tax-pulse-sub-agent/
    tool_contracts: infra/ssot/agents/tax_pulse_tool_contracts.yaml
    tools:
      - bir_compliance_search          # Advisory, Ops
      - check_overdue_filings          # Ops
      - compute_bir_vat_return         # Actions (approval-gated)
      - compute_bir_withholding_return # Actions (approval-gated)
      - validate_bir_return            # Actions (approval-gated)
      - generate_alphalist             # Actions (approval-gated)
      - generate_efps_xml              # Actions (approval-gated)
      - generate_bir_pdf               # Actions (approval-gated)
    credentials: []
    degrades: pack_works_without_external_credentials
    knowledge_sources:
      - data/rates/ph_rates_2025.json
      - data/rules/vat.rules.yaml
      - data/rules/ewt.rules.yaml
    eval_datasets:
      - eval/datasets/bir_advisory.yaml
      - eval/datasets/bir_ops.yaml
      - eval/datasets/bir_actions.yaml
    sft_assets:
      - eval/training/bir_sft_catalog.yaml
      - eval/training/bir_sft_train.jsonl
      - eval/training/bir_sft_valid.jsonl
    attachment_by_agent:
      advisory: full              # informational grounding + search
      ops: read_only              # filing inspection + diagnostics
      actions: write              # compute, validate, export (approval-gated)
      router: routing_context     # BIR intent classification

  - name: document_intake_and_extraction
    description: Document Intelligence for invoices, receipts, BIR attachments
    spec_ref: spec/copilot-target-state/prd.md
    tools: [document_extract, document_classify, document_link_record]
    credentials: [AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT, AZURE_DOCUMENT_INTELLIGENCE_KEY]
    degrades: pack_disabled_if_credentials_absent
    status: planned

# Safety caveat (applies to all components):
# Foundry safety evaluations are helpful but not sufficient alone.
# They are not comprehensive, can produce false positives/negatives,
# and must be combined with human review and domain-specific policy
# tests before production release.
