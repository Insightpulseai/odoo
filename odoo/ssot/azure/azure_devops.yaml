schema_version: "1.0"
target_state: azure_devops_config
description: Canonical SSOT for Azure DevOps Project, Boards, and Pipeline environments.

project:
  name: InsightPulseAI
  visibility: private
  source_control: github
  repositories:
    - Insightpulseai/odoo

boards:
  template: agile
  hierarchy:
    - epic
    - feature
    - user_story
    - task
  integrations:
    - github_app: true
      linking_syntax: "AB#{id}"

pipelines:
  strategy: yaml_in_repo
  path_prefix: .azure/pipelines/
  agent_pools:
    default: ubuntu-latest
    fallback: self-hosted-if-vnet-required

environments:
  - name: insightpulseai-dev
    trigger: automatic
    branches:
      - main
  - name: insightpulseai-staging
    trigger: manual_approval
    approvers:
      - platform_owner
  - name: insightpulseai-prod
    trigger: manual_approval
    approvers:
      - platform_owner

service_connections:
  azure_rm:
    type: workload_identity_federation
    environments:
      - dev
      - staging
      - prod
