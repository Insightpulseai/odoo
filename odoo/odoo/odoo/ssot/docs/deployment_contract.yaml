# Org Doc Platform — Deployment Contract (SSOT)
# Registered in: ssot/azure/service-matrix.yaml (svc_011)
# Created: 2026-03-15

name: org-docs-kb
compute: Azure Container Apps
container_app: ipai-org-docs-kb
container_env: cae-ipai-dev
resource_group: rg-ipai-dev
region: southeastasia
image: cripaidev.azurecr.io/org-docs-kb:latest
port: 8000
health_check: /health

scaling:
  min_replicas: 0
  max_replicas: 2
  cpu: "0.5"
  memory: "1.0Gi"

env_vars:
  - name: AZURE_SEARCH_SERVICE_NAME
    source: keyvault
    secret_name: azure-search-service-name
  - name: AZURE_SEARCH_INDEX_NAME
    source: literal
    value: org-docs
  - name: AZURE_SEARCH_API_KEY
    source: keyvault
    secret_name: azure-search-api-key
  - name: AZURE_OPENAI_ENDPOINT
    source: keyvault
    secret_name: azure-openai-endpoint
  - name: AZURE_OPENAI_API_KEY
    source: keyvault
    secret_name: azure-openai-api-key
  - name: AZURE_OPENAI_DEPLOYMENT
    source: literal
    value: text-embedding-ada-002

dependencies:
  - service: Azure AI Search
    purpose: Document indexing and semantic search
  - service: Azure OpenAI
    purpose: Text embeddings (ada-002)
  - service: ACR (cripaidev.azurecr.io)
    purpose: Container image registry

refresh_workflow:
  file: .github/workflows/org-docs-refresh.yml
  schedule: "0 7 * * 1"  # Monday 07:00 UTC
  manual_trigger: true

observability:
  health_endpoint: /health
  log_source: azure_container_apps
  metrics: azure_monitor
  alerts:
    - type: health_check_failure
      threshold: 3_consecutive
      channel: slack
