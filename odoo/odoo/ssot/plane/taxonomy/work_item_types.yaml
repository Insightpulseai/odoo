schema: ssot.plane.taxonomy.work_item_types.v1
version: 1
updated: "2026-03-16"

# Aligned with Azure Boards Agile process hierarchy.
# Portfolio Backlog: Epic > Feature
# Product Backlog:  Story > Task
# Defect:           Bug
# Governance:       Risk, Change, Client Deliverable

portfolio_backlog:
  - id: epic
    name: Epic
    description: "Objective / major program outcome"
    color: "#7B61FF"
    azure_boards_type: Epic
  - id: feature
    name: Feature
    description: "Major capability block"
    color: "#0091FF"
    azure_boards_type: Feature

product_backlog:
  - id: story
    name: Story
    description: "Deliverable unit of value"
    color: "#00C853"
    azure_boards_type: User Story
  - id: task
    name: Task
    description: "Implementation step"
    color: "#78909C"
    azure_boards_type: Task

defect:
  - id: bug
    name: Bug
    description: "Defect"
    color: "#FF5252"
    azure_boards_type: Bug

governance:
  - id: risk
    name: Risk
    description: "Governance/security/delivery risk"
    color: "#FF9100"
    azure_boards_type: Issue
  - id: change
    name: Change
    description: "Infra/runtime/cutover change"
    color: "#7C4DFF"
    azure_boards_type: Issue
  - id: client_deliverable
    name: Client Deliverable
    description: "Sales/packageable output"
    color: "#00BFA5"
    azure_boards_type: Feature
