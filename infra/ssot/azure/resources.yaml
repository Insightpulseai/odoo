# -----------------------------------------------------------------------------
# Databricks
# -----------------------------------------------------------------------------
databricks:
  # ---------------------------------------------------------------------------
  # Canonical Workspace Posture
  # ---------------------------------------------------------------------------
  # Reference template: "Default Storage Firewall + Private Endpoint + Access Connector"
  # https://learn.microsoft.com/en-us/samples/azure/azure-quickstart-templates/databricks-all-in-one-template-for-vnet-injection-privateendpoint-default-storage-firewall-with-nat-gateway/
  #
  # Target posture:
  #   - VNet injection (mandatory)
  #   - Private endpoint (mandatory)
  #   - Default storage firewall enabled (mandatory)
  #   - System-assigned access connector (mandatory)
  #   - NAT gateway for egress normalization (mandatory)
  #   - Secure Cluster Connectivity / no public IP (mandatory)
  #   - Premium SKU for Unity Catalog (mandatory)
  #
  # Fallback baseline (lighter):
  #   VNet injection + private endpoint (no storage firewall opinion)
  #   https://learn.microsoft.com/en-us/samples/azure/azure-quickstart-templates/databricks-all-in-one-template-for-vnet-injection-privateendpoint-with-nat-gateway/
  #
  # Follow-on hardening (not day-one unless compliance requires):
  #   - CMK for managed services
  #   - CMK for DBFS root encryption
  #   - Private endpoint + CMK combinations
  #
  # Do NOT use as canonical:
  #   - Plain workspace deploy (too weak)
  #   - Plain VNet injection only (too weak)
  #   - Custom address range only (too weak)
  # ---------------------------------------------------------------------------

  - name: dbw-ipai-dev
    type: Microsoft.Databricks/workspaces
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    sku: premium
