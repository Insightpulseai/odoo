name: release-workflow-contract

on:
  pull_request:
    paths:
      - '.github/workflows/cd-production.yml'
      - '.github/workflows/ship-on-deploy.yml'
      - 'scripts/build_release_manifest.py'
      - 'ssot/runtime/release_contract.yaml'
      - 'scripts/check_release_workflow_contract.py'
      - '.github/workflows/release-workflow-contract.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/cd-production.yml'
      - '.github/workflows/ship-on-deploy.yml'
      - 'scripts/build_release_manifest.py'
      - 'ssot/runtime/release_contract.yaml'
      - 'scripts/check_release_workflow_contract.py'
  merge_group:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release workflow contract
        run: python scripts/check_release_workflow_contract.py
