# Claude Platform KB — Chunking & Indexing Configuration
# Version: 1.0.0
# Created: 2026-03-23
# Purpose: Defines how Claude Platform source docs are chunked, tagged,
#   and indexed for retrieval via Azure AI Search.

version: 1
kb_id: claude_platform

chunking:
  strategy: semantic_sections
  max_chunk_tokens: 512
  overlap_tokens: 64
  section_delimiters:
    - h2
    - h3
    - code_block

facets:
  # Tool use taxonomy
  - tool_use
  - client_tools
  - server_tools
  - strict_tool_use

  # Web search
  - web_search
  - citations
  - allowed_domains
  - blocked_domains
  - max_uses
  - web_search_pricing

  # Tool execution
  - tool_execution_loop
  - tool_results
  - tool_errors
  - pause_turn

  # MCP
  - mcp_tool_conversion
  - mcp_server_registration

  # Schema
  - tool_schemas
  - json_schema
  - structured_outputs

  # Agent patterns
  - agent_tooling
  - tool_descriptions
  - tool_naming
  - auth_hierarchy

index:
  service: azure_ai_search
  index_name: claude-platform-kb
  vector_dimensions: 1536
  scoring_profile: bm25_plus_vector
  filterable_fields:
    - domain
    - tags
    - priority
