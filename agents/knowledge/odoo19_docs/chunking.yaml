# Odoo 18 Documentation — Chunking Contract

name: odoo18-docs-chunking
description: Heading-aware chunking strategy for Odoo 18 documentation

strategy: heading-aware
format: rst  # primary format in odoo/documentation

chunking:
  # Split on headings (RST uses underline characters: =, -, ~, ^, ")
  split_on:
    - h1  # === overline + underline
    - h2  # --- underline
    - h3  # ~~~ underline
  max_chunk_tokens: 512
  overlap_tokens: 64
  min_chunk_tokens: 50

  # Semantic windows: keep context from parent headings
  context_window:
    include_parent_headings: true
    include_breadcrumb: true  # e.g., "Accounting > Invoicing > Tax Configuration"
    max_parent_depth: 3

metadata_per_chunk:
  # Deterministic chunk ID: repo + branch + path + heading_chain + ordinal + content_hash
  id_template: "{repo}:{branch}:{path}:{heading_chain}:{ordinal}:{content_hash_8}"
  fields:
    - repo          # odoo/documentation
    - branch        # 19.0
    - path          # content/applications/accounting/invoicing.rst
    - heading_chain # Accounting > Invoicing > Tax Configuration
    - ordinal       # 0, 1, 2... within heading section
    - content_hash  # first 8 chars of SHA-256 of chunk content
    - product       # odoo
    - version       # 19.0
    - lang          # en
    - source_type   # documentation

rst_handling:
  # RST-specific processing
  strip_directives:
    - ".. image::"
    - ".. figure::"
    - ".. raw::"
    - ".. only::"
  preserve_directives:
    - ".. note::"
    - ".. tip::"
    - ".. warning::"
    - ".. important::"
    - ".. seealso::"
    - ".. code-block::"
  resolve_references: false  # do not resolve :ref:, :doc: etc. — keep as metadata
  strip_toctree: true
