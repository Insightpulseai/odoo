doctrine: >
  Break-glass admin accounts are non-MFA-dependent emergency-only
  identities for tenant recovery. Microsoft best practice = 2 break-
  glass accounts. IPAI currently has 5 break-glass + 1 human (admin@)
  = 6 total Global Administrators. Excess break-glass accounts inflate
  attack surface without improving recovery posture. Go-live blocker
  B-03 resolution requires reduction to target state.

