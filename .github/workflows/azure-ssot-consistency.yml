name: Azure SSOT Consistency

on:
  push:
    branches: [main]
    paths:
      - 'ssot/azure/**'
      - 'spec/azure-target-state/**'
      - 'scripts/ci/check_azure_ssot.py'
  pull_request:
    paths:
      - 'ssot/azure/**'
      - 'spec/azure-target-state/**'
      - 'scripts/ci/check_azure_ssot.py'

permissions:
  contents: read

jobs:
  validate:
    name: Validate Azure SSOT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Azure SSOT
        run: python3 scripts/ci/check_azure_ssot.py
