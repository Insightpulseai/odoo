name: spec-bundle-validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-spec-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Spec Kit bundle structure
        shell: bash
        run: |
          set -euo pipefail

          bundles=$(find spec -mindepth 1 -maxdepth 1 -type d | sort || true)
          if [ -z "${bundles}" ]; then
            echo "No spec bundles found under spec/"
            exit 1
          fi

          fail=0
          warn=0

          for bundle in ${bundles}; do
            echo "Checking ${bundle}"

            # Bundles with fewer than all 4 required files are treated as
            # drafts: warn but do not fail the gate.  Only fully-scaffolded
            # bundles (all 4 files present) are validated strictly.
            missing_count=0
            for f in constitution.md prd.md plan.md tasks.md; do
              if [ ! -f "${bundle}/${f}" ]; then
                missing_count=$((missing_count + 1))
              fi
            done

            if [ "${missing_count}" -gt 0 ] && [ "${missing_count}" -lt 4 ]; then
              echo "::warning::${bundle} is incomplete (${missing_count} file(s) missing) — treated as draft"
              warn=$((warn + 1))
              continue
            elif [ "${missing_count}" -eq 4 ]; then
              echo "::warning::${bundle} has no spec files — skipping"
              warn=$((warn + 1))
              continue
            fi

            # Full bundle — validate content
            if [ -f "${bundle}/constitution.md" ]; then
              grep -q "^# " "${bundle}/constitution.md" || { echo "constitution.md missing title in ${bundle}"; fail=1; }
            fi

            if [ -f "${bundle}/prd.md" ]; then
              grep -q "^# " "${bundle}/prd.md" || { echo "prd.md missing title in ${bundle}"; fail=1; }
              grep -qi "Smart Success Criteria\|Success Criteria\|Acceptance Criteria" "${bundle}/prd.md" \
                || echo "::warning::prd.md missing Success Criteria section in ${bundle}"
            fi

            if [ -f "${bundle}/plan.md" ]; then
              grep -q "^# " "${bundle}/plan.md" || { echo "plan.md missing title in ${bundle}"; fail=1; }
            fi

            if [ -f "${bundle}/tasks.md" ]; then
              grep -q "^# " "${bundle}/tasks.md" || { echo "tasks.md missing title in ${bundle}"; fail=1; }
              grep -q "\- \[ \]" "${bundle}/tasks.md" \
                || echo "::warning::tasks.md has no open checklist items in ${bundle} (bundle may be completed)"
            fi
          done

          echo "---"
          echo "Bundles with warnings (drafts): ${warn}"
          echo "Strict validation failures: ${fail}"
          exit "${fail}"
