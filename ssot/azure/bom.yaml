  shared:
    - rg-ipai-shared-sea
  dev:
    - rg-ipai-dev-transaction-sea
    - rg-ipai-dev-data-sea
    - rg-ipai-dev-observability-sea
    - rg-ipai-dev-security-sea
  stg:
    - rg-ipai-stg-transaction-sea
    - rg-ipai-stg-data-sea
    - rg-ipai-stg-observability-sea
    - rg-ipai-stg-security-sea
  prod:
    - rg-ipai-prod-transaction-sea
    - rg-ipai-prod-data-sea
    - rg-ipai-prod-observability-sea
    - rg-ipai-prod-security-sea

# Per-resource normalization map
# action: rename | move | normalize | keep | exception
resources:

  # ───── Shared / Platform ─────
  - current_name: acripaiodoo
    type: container_registry
    current_rg: rg-ipai-shared
    desired_name: acripaisharedsea
    desired_rg: rg-ipai-shared-sea
    action: rename
    note: "ACR is shared, not workload-specific"

  - current_name: NetworkWatcher_southeastasia
    type: network_watcher
    current_rg: NetworkWatcherRG
    desired_name: NetworkWatcher_southeastasia
    desired_rg: NetworkWatcherRG
    action: keep
    note: "Azure-managed default; provider exception"

  # ───── Dev — Transaction Plane ─────
  - current_name: acae-ipai-dev-sea
    type: container_apps_environment
    current_rg: rg-ipai-dev-odoo-sea
    desired_name: cae-ipai-dev-odoo-sea
    desired_rg: rg-ipai-dev-transaction-sea
    action: rename_and_move

  - current_name: ca-ipai-odoo-web-dev
    type: container_app
    current_rg: rg-ipai-dev-odoo-sea
    desired_name: ca-ipai-dev-odoo-web-sea
    desired_rg: rg-ipai-dev-transaction-sea
    action: rename_and_move

  - current_name: init-db
    type: container_app_job
    current_rg: rg-ipai-dev-odoo-sea
    desired_name: caj-ipai-dev-odoo-initdb-sea
    desired_rg: rg-ipai-dev-transaction-sea
    action: rename_and_move

  - current_name: pg-ipai-odoo-dev
    type: postgresql_flexible
    current_rg: rg-ipai-dev-data-sea
    desired_name: pgfs-ipai-dev-odoo-sea
    desired_rg: rg-ipai-dev-transaction-sea
    action: rename_and_move
    note: "PG is OLTP — belongs in transaction plane, not data plane"

  - current_name: sb-ipai-dev-sea
    type: service_bus
    current_rg: rg-ipai-dev-odoo-sea
    desired_name: sb-ipai-dev-odoo-sea
    desired_rg: rg-ipai-dev-transaction-sea
    action: rename_and_move

  - current_name: id-ipai-dev
    type: managed_identity
    current_rg: rg-ipai-dev-security-sea
    desired_name: id-ipai-dev-odoo-sea
    desired_rg: rg-ipai-dev-transaction-sea
    action: rename_and_move
    note: "Workload identity — colocate with Odoo runtime; keep generic security identities in security plane"

  # ───── Dev — Data Plane ─────
  - current_name: dbw-ipai-dev
    type: databricks_workspace
    current_rg: rg-ipai-dev-ai-sea
    desired_name: dbw-ipai-dev-data-sea
    desired_rg: rg-ipai-dev-data-sea
    action: rename_and_move

  - current_name: stdevipai
    type: storage_account
    current_rg: rg-ipai-dev-data-sea
    desired_name: stipaidevsea
    desired_rg: rg-ipai-dev-data-sea
    action: rename
    constraint: service_constrained

  - current_name: stlkipaidev
    type: storage_account
    current_rg: rg-ipai-dev-data-sea
    desired_name: stipailakedevsea
    desired_rg: rg-ipai-dev-data-sea
    action: rename
    constraint: service_constrained

  - current_name: unity-catalog-access-connector
    type: access_connector
    current_rg: rg-ipai-dev-dbw-managed
    desired_name: acn-ipai-dev-dbw-sea
    desired_rg: rg-ipai-dev-data-sea
    action: rename_and_move
    note: "Verify provider-managed vs user-managed before move"

  - current_name: workers-vnet
    type: vnet
    current_rg: rg-ipai-dev-dbw-managed
    desired_name: vnet-ipai-dev-dbw-sea
    desired_rg: rg-ipai-dev-data-sea
    action: rename_and_move

  - current_name: workers-sg
    type: nsg
    current_rg: rg-ipai-dev-dbw-managed
    desired_name: nsg-ipai-dev-dbw-sea
    desired_rg: rg-ipai-dev-data-sea
    action: rename_and_move

  # ───── Dev — Observability Plane ─────
  - current_name: appi-ipai-dev
    type: application_insights
    current_rg: rg-ipai-dev-mon-sea
    desired_name: appi-ipai-dev-odoo-sea
    desired_rg: rg-ipai-dev-observability-sea
    action: rename_and_move

  - current_name: log-ipai-dev-sea
    type: log_analytics_workspace
    current_rg: rg-ipai-dev-mon-sea
    desired_name: law-ipai-dev-odoo-sea
    desired_rg: rg-ipai-dev-observability-sea
    action: rename_and_move

  - current_name: "Application Insights Smart Detection"
    type: action_group
    current_rg: rg-ipai-dev-mon-sea
    desired_name: ag-ipai-dev-observability-sea
    desired_rg: rg-ipai-dev-observability-sea
    action: replace_with_user_managed
    note: "Auto-created Smart Detection AG remains; create user-managed AG alongside"

  # ───── Dev — Security Plane ─────
  - current_name: kv-ipai-dev-sea
    type: key_vault
    current_rg: rg-ipai-dev-security-sea
    desired_name: kv-ipai-dev-security-sea
    desired_rg: rg-ipai-dev-security-sea
