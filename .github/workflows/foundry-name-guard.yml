name: Foundry Name Guard

on:
  pull_request:
    paths:
      - 'addons/**'
      - 'agent-platform/**'
      - 'agents/**'
      - 'infra/**'
      - 'odoo/**'
      - 'ssot/**'
      - 'Dockerfile*'
      - '**/requirements*.txt'
      - '**/package.json'
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if source code references aifoundry-ipai-dev
        run: |
          # Only fail on code/config, not docs/evidence/corpus/spec files
          # which legitimately describe the historical state.
          FOUND=$(grep -r "aifoundry-ipai-dev" \
            --include="*.py" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            --include="*.yml" \
            --include="*.yaml" \
            --include="Dockerfile*" \
            --include="*.json" \
            addons/ agent-platform/src/ agents/ infra/ odoo/addons/ 2>/dev/null \
            | grep -v "^docs/evidence\|^corpus/" \
            || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Source references the deprecated name 'aifoundry-ipai-dev'. Use 'ipai-copilot-resource' per agent-platform/docs/foundry/sdk-2x-migration.md"
            echo "$FOUND"
            exit 1
          fi

      - name: Fail if source uses old 1.x endpoint pattern for projects
        run: |
          # Old: cognitiveservices.azure.com/api/projects
          # New: services.ai.azure.com/api/projects
          FOUND=$(grep -rE "cognitiveservices\.azure\.com/api/projects" \
            --include="*.py" --include="*.ts" --include="*.tsx" \
            addons/ agent-platform/src/ agents/ odoo/addons/ 2>/dev/null \
            || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Source uses deprecated Foundry 1.x project endpoint pattern. Use services.ai.azure.com/api/projects/<name>"
            echo "$FOUND"
            exit 1
          fi

      - name: Warn on legacy SDK pin
        run: |
          FOUND=$(grep -rE '"azure-ai-projects==1\.|"@azure/ai-projects":\s*"[~^]?1\.' \
            --include="*.txt" --include="*.json" \
            . 2>/dev/null \
            | grep -v "node_modules" \
            || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Found azure-ai-projects 1.x pins. Upgrade to >=2.0.0 per sdk-2x-migration.md"
            echo "$FOUND"
          fi
