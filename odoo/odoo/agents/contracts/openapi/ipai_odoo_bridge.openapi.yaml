openapi: 3.0.3
info:
  title: IPAI Odoo Bridge API
  description: >
    Narrow bridge API for Azure AI Foundry agents to interact with Odoo 19.
    Fronted by Azure APIM. Backend: Azure Function / FastAPI.
    Architecture: Foundry Advisory (front door) -> APIM -> Bridge -> Odoo JSON-RPC.
  version: 1.0.0
servers:
  - url: https://apim-ipai-dev.azure-api.net/odoo
    description: Azure APIM gateway (production)
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-IPAI-Key
security:
  - ApiKeyAuth: []
paths:
  /compliance_findings:
    get:
      summary: Retrieve tax compliance findings
      operationId: getComplianceFindings
      parameters:
        - name: period
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [open, in_review, remediated, signed_off]
      responses:
        '200':
          description: List of compliance findings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    check_id: { type: string }
                    name: { type: string }
                    amount: { type: number }
                    state: { type: string }
                    bir_form: { type: string }
    post:
      summary: Create a compliance finding (requires confirmation)
      operationId: createComplianceFinding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [check_id, name, period]
              properties:
                check_id: { type: string }
                name: { type: string }
                period: { type: string }
                amount: { type: number }
                description: { type: string }
      responses:
        '201':
          description: Finding created
  /compliance_tasks/{id}:
    patch:
      summary: Update a compliance task (requires confirmation)
      operationId: updateComplianceTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state: { type: string, enum: [draft, open, done, cancelled] }
                assignee_id: { type: integer }
                completion_note: { type: string }
      responses:
        '200':
          description: Task updated
  /chatter/{model}/{id}:
    post:
      summary: Post a chatter note to any Odoo record
      operationId: postChatterNote
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        '200':
          description: Note posted
