name: PR Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY || 'ipaiodoodevacr.azurecr.io' }}
  ACR_REPO: ipai-odoo
  ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP || 'rg-ipai-dev' }}
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # ──────────────────────────────────────────────
  # Deploy preview on PR open/update
  # ──────────────────────────────────────────────
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image
        run: |
          SHA="${GITHUB_SHA::8}"
          TAG="${ACR_REGISTRY}/${ACR_REPO}:pr-${PR_NUMBER}-${SHA}"
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

          az acr login --name "${ACR_REGISTRY%%.*}"
          docker build -t "${TAG}" -f docker/Dockerfile.prod .
          docker push "${TAG}"

      - name: Deploy ACA preview revision
        run: |
          PREVIEW_NAME="ipai-odoo-pr-${PR_NUMBER}"

          # Create or update preview container app
          az containerapp create \
            --name "${PREVIEW_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --environment "ipai-odoo-dev-env" \
            --image "${IMAGE_TAG}" \
            --target-port 8069 \
            --ingress external \
            --min-replicas 0 \
            --max-replicas 1 \
            --env-vars \
              "HOST=ipai-odoo-dev-pg.postgres.database.azure.com" \
              "PORT=5432" \
              "USER=odoo_admin" \
              "PASSWORD=secretref:db-password" \
              "db_name=odoo_dev" \
              "dbfilter=^odoo_dev$" \
            2>/dev/null || \
          az containerapp update \
            --name "${PREVIEW_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${IMAGE_TAG}"

          # Get the preview URL
          FQDN=$(az containerapp show \
            --name "${PREVIEW_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "PREVIEW_URL=https://${FQDN}" >> $GITHUB_ENV
          echo "Preview URL: https://${FQDN}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### 🚀 Preview Environment

            | Detail | Value |
            |--------|-------|
            | **URL** | [${process.env.PREVIEW_URL}](${process.env.PREVIEW_URL}) |
            | **Image** | \`${process.env.IMAGE_TAG}\` |
            | **Database** | \`odoo_dev\` (shared dev DB) |
            | **PR** | #${context.issue.number} |

            > Preview uses the dev database. Changes are visible but not isolated.
            > Preview auto-deletes when PR is closed.`;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.body.includes('Preview Environment') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # ──────────────────────────────────────────────
  # Cleanup preview on PR close
  # ──────────────────────────────────────────────
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete preview container app
        run: |
          PREVIEW_NAME="ipai-odoo-pr-${PR_NUMBER}"
          az containerapp delete \
            --name "${PREVIEW_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --yes 2>/dev/null || echo "Preview app already deleted"
          echo "Cleaned up preview: ${PREVIEW_NAME}"
