# Plane Pages for the Platform project.
# Each page sits inside the "Odoo on Azure Platform" project context.
# Mirrors Azure DevOps Wiki structure for portfolio-level documentation.

pages:
  - id: strategy
    title: Strategy
    description: "Platform vision, mission, OKRs, and strategic priorities"

  - id: operating_model
    title: "Operating Model / RACI"
    description: "Roles, responsibilities, and decision authority matrix"

  - id: target_architecture
    title: Target Architecture
    description: "Azure-native target state diagram and component map"

  - id: landing_zone
    title: Landing Zone Decisions
    description: "Azure landing zone choices, resource group layout, networking"

  - id: migration_waves
    title: Migration Waves
    description: "Phased migration plan from current state to Azure target"

  - id: dns_target_matrix
    title: DNS Target Matrix
    description: "Subdomain registry, Cloudflare config, Front Door routing"

  - id: runbooks
    title: Runbooks
    description: "Operational runbooks for deployment, rollback, incident response"

  - id: client_offering
    title: Client Offering Pack
    description: "Packaged deliverables, pricing, and demo materials"

  - id: tbwa_smp
    title: "TBWA/SMP Fit"
    description: "TBWA/SMP-specific customization and branding requirements"

  - id: done_definitions
    title: "Acceptance Criteria / Done Definitions"
    description: "Definition of done for each work item type and delivery gate"
