name: odoo-test-image-ci

# CI workflow for changed-module testing with the minimal Odoo test image
# Uses docker/Dockerfile.test (NOT docker/Dockerfile.unified)
# SSOT: docs/architecture/CANONICAL_RUNTIME_IMAGE.md

on:
  pull_request:
    branches: [main, "claude/**"]
    paths:
      - "addons/**"
      - "docker/Dockerfile.test"
      - "docker/compose/test.yml"
      - "scripts/ci/detect_changed_odoo_modules.py"
      - "scripts/ci/run_odoo_module_tests.sh"
  push:
    branches: [main, "claude/**"]
    paths:
      - "addons/**"
      - "docker/Dockerfile.test"
      - "docker/compose/test.yml"
      - "scripts/ci/detect_changed_odoo_modules.py"
      - "scripts/ci/run_odoo_module_tests.sh"
  workflow_dispatch:
    inputs:
      modules:
        description: "Comma-separated modules to test (blank = auto-detect)"
        required: false
        type: string

permissions:
  contents: read

env:
  TEST_IMAGE: ipai-odoo-test:${{ github.sha }}

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Detect which Odoo modules changed
  # -----------------------------------------------------------------------
  detect:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      modules_csv: ${{ steps.detect.outputs.modules_csv }}
      has_modules: ${{ steps.detect.outputs.has_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Odoo modules
        id: detect
        run: |
          if [ -n "${{ inputs.modules }}" ]; then
            # Manual dispatch with explicit modules
            MODULES='${{ inputs.modules }}'
            echo "modules_csv=${MODULES}" >> "$GITHUB_OUTPUT"
            # Convert CSV to JSON array
            MODULES_JSON=$(echo "${MODULES}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip().split(',')))")
            echo "modules=${MODULES_JSON}" >> "$GITHUB_OUTPUT"
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
          else
            # Auto-detect from git diff
            BASE_REF="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
            HEAD_REF="${{ github.sha }}"

            MODULES_JSON=$(python3 scripts/ci/detect_changed_odoo_modules.py \
              --base "${BASE_REF}" --head "${HEAD_REF}" \
              --format json --allow-empty)

            echo "modules=${MODULES_JSON}" >> "$GITHUB_OUTPUT"

            # Convert JSON to CSV
            MODULES_CSV=$(echo "${MODULES_JSON}" | python3 -c "import sys,json; print(','.join(json.load(sys.stdin)))")
            echo "modules_csv=${MODULES_CSV}" >> "$GITHUB_OUTPUT"

            if [ "${MODULES_JSON}" = "[]" ]; then
              echo "has_modules=false" >> "$GITHUB_OUTPUT"
              echo "No Odoo modules changed — skipping tests."
            else
              echo "has_modules=true" >> "$GITHUB_OUTPUT"
              echo "Changed modules: ${MODULES_CSV}"
            fi
          fi

  # -----------------------------------------------------------------------
  # Job 2: Build the minimal test image
  # -----------------------------------------------------------------------
  build:
    name: Build test image
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_modules == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.test
          tags: ${{ env.TEST_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image size
        run: |
          SIZE=$(docker image inspect "${{ env.TEST_IMAGE }}" --format='{{.Size}}' | numfmt --to=iec-i --suffix=B)
          echo "Test image size: ${SIZE}"
          echo "## Test Image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.TEST_IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Size: ${SIZE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Save image for test job
        run: docker save "${{ env.TEST_IMAGE }}" | gzip > /tmp/test-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-image
          path: /tmp/test-image.tar.gz
          retention-days: 1

  # -----------------------------------------------------------------------
  # Job 3: Run targeted module tests
  # -----------------------------------------------------------------------
  test:
    name: Test modules
    runs-on: ubuntu-latest
    needs: [detect, build]
    if: needs.detect.outputs.has_modules == 'true'
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo -d odoo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Download test image
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp

      - name: Load test image
        run: docker load < /tmp/test-image.tar.gz

      - name: Run module tests
        run: |
          MODULES="${{ needs.detect.outputs.modules_csv }}"
          echo "Testing modules: ${MODULES}"

          docker run --rm \
            --network host \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            -e DB_USER=odoo \
            -e DB_PASSWORD=odoo \
            -e DB_NAME=odoo_test \
            -e TEST_MODULES="${MODULES}" \
            "${{ env.TEST_IMAGE }}" \
            2>&1 | tee /tmp/test-output.log

          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Modules: \`${MODULES}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: Passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: /tmp/test-output.log
          retention-days: 7
