# =============================================================================
# CE/OCA/IPAI + Azure Service Matrix
# =============================================================================
# SSOT for capability-to-service mapping with SMART success criteria
# and evidence traceability to hardening plan tranches.
#
# 4-layer model: Odoo Core → OCA → IPAI → Azure
# Canonical compute: Azure Container Apps (+ Front Door)
# CSV export: docs/exports/ce-oca-azure-matrix.csv
# =============================================================================

version: 2
artifact: ce-oca-azure-matrix
canonical_compute: azure_container_apps
last_updated: "2026-04-05"

# -----------------------------------------------------------------------------
# Doctrine
# -----------------------------------------------------------------------------

capability_layering_doctrine: |
  - Odoo core owns the transactional baseline.
  - OCA owns open-source parity and workflow-depth extensions.
  - IPAI owns bridge, shell, security, and copilot-specific modules.
  - Azure owns runtime, identity, edge, observability, and AI services.

compute_doctrine: |
  The current canonical Odoo-on-Azure runtime is Azure Container Apps
  integrated with Front Door. This is the production-aligned compute
  baseline for the platform.

  Virtual Machines / VM Scale Sets remain a valid alternate hosting lane
  for cases requiring a deliberately self-managed runtime model, but they
  are not the default recommendation for the current platform state.

  All compute recommendations must preserve:
  - repeatable deployment
  - health and revision visibility
  - rollback safety
  - ingress control
  - release evidence

# -----------------------------------------------------------------------------
# Matrix rules
# -----------------------------------------------------------------------------

matrix_rules:
  exclude_from_capability_rows:
    - ipai_finance_close_seed
    - ipai_project_seed

columns:
  - capability
  - odoo_core
  - oca
  - ipai_module
  - azure_service
  - baseline_or_optional
  - smart_success_criteria
  - evidence_traceability
  - notes

