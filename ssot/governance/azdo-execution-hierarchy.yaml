          scope: "Odoo transactional, Databricks analytical, Copilot advisory — ownership and boundary rules"
        acceptance_criteria:
          - "Ownership model documented in architecture doc"
          - "SSOT YAML file defines plane boundaries"
          - "No ambiguous dual-write paths remain"
        due: "2026-04-30"

      - id: FEAT-008-02
        title: "[FEAT] Bounded integration contracts"
        tags: [platform, foundry, databricks]
        owner: platform-lead
        target_iteration: "Sprint 5"
        description:
          purpose: "Codify all approved cross-plane data and action paths"
          scope: "Copilot→Odoo tool contract, Databricks→Copilot context contract"
        acceptance_criteria:
          - "Copilot-to-Odoo bounded tool contract published"
          - "Databricks-to-Copilot curated context contract published"
          - "Both contracts registered in PLATFORM_CONTRACTS_INDEX.md"
        due: "2026-05-30"

      - id: FEAT-008-03
        title: "[FEAT] End-to-end observability linkage"
        tags: [platform, security]
        owner: platform-lead
        target_iteration: "Sprint 6"
        description:
          purpose: "Enable correlation of Odoo events, lakehouse pipelines, and Copilot traces"
          scope: "Trace correlation, audit linkage, incident routing"
        acceptance_criteria:
          - "Odoo events, Databricks pipeline runs, and Copilot traces correlatable"
          - "Incident routing model documented"
          - "Evidence captured for at least 1 production release path"
        due: "2026-06-10"

      - id: FEAT-008-04
        title: "[FEAT] Architectural ambiguity elimination"
        tags: [platform]
        owner: platform-lead
        target_iteration: "Sprint 4"
        description:
          purpose: "Close all known contradictions in SoR, lakehouse write path, and Copilot action authority"
          scope: "Architecture docs, SSOT files, spec bundles"
        acceptance_criteria:
          - "Zero conflicting SoR statements across all architecture docs"
          - "Zero conflicting write-path claims across all SSOT files"
          - "Verification evidence captured"
        due: "2026-05-15"

