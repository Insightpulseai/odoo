# ============================================================================
# Blocking issues (honest assessment)
# ============================================================================

blocking_issues:

  - gate: G6_monitoring
    status: PARTIAL
    detail: >
      Foundry Monitor AI apps provides default dashboards for all registered
      agents, but custom Azure Monitor alert rules are not yet configured.
      This blocks promotion from internal to staging per
      agent-factory-lifecycle.yaml transition internal_to_staging which does
      not require G6, but staging_to_production requires G6 fully passed.
      Alert rules are a prerequisite for production readiness.
    remediation: >
      Configure Azure Monitor alert rules for each agent: latency P95
      threshold, failure rate threshold, cost anomaly detection. Requires
      Azure Monitor action group + alert rule definitions in IaC.

  - gate: G2_knowledge
