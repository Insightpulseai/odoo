# =============================================================================
# Entra Group Definitions — InsightPulse AI
# =============================================================================
#
# Canonical Entra ID security group definitions, membership, and metadata.
#
# Naming convention:
#   sg-ipai-{scope}-{role}     — standard security groups
#   rl-ipai-{scope}-{role}     — role-assignable groups (for PIM)
#
# Human-readable narrative: docs/security/ACCESS_MODEL.md § 5
# Last updated: 2026-03-18
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-18"

groups:

  # ---------------------------------------------------------------------------
  # Administrative Groups
  # ---------------------------------------------------------------------------

  - name: sg-ipai-platform-owners
    display_name: "IPAI Platform Owners"
    description: "Platform owner role — full admin across all planes and environments"
    type: security
    role_assignable: true
    mail_enabled: false
    membership_type: assigned
    members:
      - upn: admin@insightpulseai.com
        type: member
      - upn: ceo@insightpulseai.com
        type: guest
    azure_rbac_assignments:
      - scope: subscription
        role: Contributor
      - scope: subscription
        role: User Access Administrator
    app_role_assignments:
      - app: "InsightPulse AI - Odoo ERP"
        role: ops.admin
    notes: "Day-to-day operations. NOT Global Admin for daily use."

  - name: sg-ipai-emergency-admins
    display_name: "IPAI Emergency Admins"
    description: "Break-glass accounts — Global Admin for recovery only"
    type: security
    role_assignable: true
    mail_enabled: false
    membership_type: assigned
    members:
      - upn: admin@insightpulseai.com
        type: member
      - upn: emergency-admin@insightpulseai.com
        type: member
    entra_directory_roles:
      - Global Administrator
    azure_rbac_assignments:
      - scope: subscription
        role: Owner
    monitoring:
      - sign_in_alerts: true
        alert_channel: slack_security_alerts
        alert_method: azure_monitor_action_group
    notes: "Never use for daily operations. Sign-in triggers immediate alert."

  # ---------------------------------------------------------------------------
  # Team Role Groups
  # ---------------------------------------------------------------------------

  - name: sg-ipai-developers
    display_name: "IPAI Developers"
    description: "Engineers — dev full access, staging deploy, prod pipeline only"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # future team members
    azure_rbac_assignments:
      - scope: rg-ipai-dev
        role: Contributor
      - scope: rg-ipai-shared-dev
        role: Reader
    notes: "Empty group — ready for first team hire."

  - name: sg-ipai-data-engineers
    display_name: "IPAI Data Engineers"
    description: "Databricks + ADLS operators — lakehouse pipeline builders"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # future
    azure_rbac_assignments:
      - scope: rg-ipai-ai-dev
        role: Contributor
      - scope: rg-ipai-data-dev
        role: Reader

  - name: sg-ipai-finance-operators
    display_name: "IPAI Finance Operators"
    description: "Odoo finance close + BIR compliance users"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # future
    app_role_assignments:
      - app: "InsightPulse AI - Odoo ERP"
        role: finance.close.operator
      - app: "InsightPulse AI - Odoo ERP"
        role: finance.viewer

  - name: sg-ipai-analysts
    display_name: "IPAI Analysts"
    description: "Read-only BI consumers — dashboards and reports"
    type: security
    role_assignable: false
    mail_enabled: false
    membership_type: assigned
    members: []  # future
    app_role_assignments:
      - app: "InsightPulse AI - Odoo ERP"
        role: analytics.viewer
      - app: "InsightPulse AI - Odoo ERP"
        role: copilot.advisory

