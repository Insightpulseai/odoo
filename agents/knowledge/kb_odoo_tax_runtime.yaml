name: kb_odoo_tax_runtime
description: Odoo tax configuration, journal entries, withholding tax, and BIR filing runtime
domain: odoo_tax_runtime
sources:
  - type: odoo
    model: account.tax
    domain: "[('country_id.code', '=', 'PH')]"
  - type: odoo
    model: account.journal
    domain: "[('type', 'in', ['sale', 'purchase'])]"
  - type: module_docs
    path: addons/ipai/ipai_bir_tax_compliance/
  - type: module_docs
    path: addons/ipai/ipai_finance_ppm/
  - type: manual
    path: docs/architecture/TAX_BIR_KNOWLEDGE_MAP.md
index_name: diva_odoo_tax_runtime
refresh_schedule: "0 */12 * * *"  # Every 12 hours
access_policy:
  read: [diva_orchestrator, diva_judge, tax_reviewer, finance_team]
  write: [diva_collector]
