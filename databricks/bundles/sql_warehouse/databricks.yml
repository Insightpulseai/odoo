# Databricks Asset Bundle: SQL Warehouse
# Purpose: SQL-first Gold/Platinum marts, serving views, dashboard-supporting assets
# Spec: spec/databricks-bundles-foundation/

bundle:
  name: sql_warehouse

include:
  - ../../shared/*.yml
  - resources/**/*.yml

sync:
  paths:
    - src

variables:
  catalog:
    default: ${var.catalog}
  gold_schema:
    default: ${var.gold_schema}
  warehouse_id:
    default: ${var.warehouse_id}

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-7405610347978231.11.azuredatabricks.net
    variables:
      catalog: dev_ppm

  staging:
    mode: production
    workspace:
      host: https://adb-7405610347978231.11.azuredatabricks.net
    variables:
      catalog: staging_ppm

  prod:
    mode: production
    workspace:
      host: https://adb-7405610347978231.11.azuredatabricks.net
    variables:
      catalog: ppm
