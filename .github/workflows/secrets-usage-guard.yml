name: "Secrets Usage Guard"

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "ssot/secrets/registry.yaml"
      - "scripts/ci/validate_secrets_usage.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
      - "ssot/secrets/registry.yaml"

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate secrets usage against SSOT
        run: python scripts/ci/validate_secrets_usage.py
