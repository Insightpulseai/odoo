# RG Normalization — Phase 4 complete (2026-03-20)
# Full migration matrix: infra/ssot/azure/rg-normalization-matrix.yaml
# Bicep modules: odoo/odoo/infra/azure/rg-{shared-observability,dev-odoo-data,dev-odoo-runtime,dev-platform,dev-ai}.bicep
rg_normalization:
  phase: 4
  completed: "2026-03-20"
  target_model: 5-RG lifecycle-aligned
  new_aca_domain: salmontree-b7d27e19.southeastasia.azurecontainerapps.io
  stabilization_hold: "2026-03-23"
  pragmatic_decisions:
    - Front Door stays in rg-ipai-shared-dev (cannot move, cosmetic rename not worth risk)
    - rg-ipai-ai-dev accepted as canonical AI RG (Databricks/Foundry cannot move)
    - Single ACA environment in rg-ipai-dev-odoo-runtime for all apps (cost efficiency)
    - UserAssignedIdentities cannot move cross-RG — stay in rg-ipai-shared-dev

