# =============================================================================
# Resource Graph Query Catalog — Canonical KQL Queries
# =============================================================================
# Machine-readable index of Azure Resource Graph queries used for
# inventory, drift detection, and governance.
#
# Each query has a corresponding .kql file in scripts/azure/resource_graph/queries/
# Reference: docs/contracts/azure-resource-graph-contract.md (C-36)
# =============================================================================

version: 1
id: resource_graph_query_catalog
status: active
owner: platform
plane: live_azure_inventory
updated_at: "2026-03-17"

description: >
  Canonical Azure Resource Graph query catalog for inventory, drift, and governance checks.

defaults:
  output_formats:
    - json
    - csv
  scope_policy:
    default_scope: approved_subscriptions
    allow_narrow_scope: true
  evidence_required: true

query_classes:
  - id: q00
    name: all_resources
    purpose: "Enumerate all live Azure resources across approved subscriptions"
    file: scripts/azure/resource_graph/queries/00_all_resources.kql
    categories: [inventory, reconciliation]
    class: mandatory
    frequency: pre_release_and_weekly

  - id: q10
    name: frontdoor_inventory
    purpose: "Inventory Azure Front Door profiles, endpoints, and related surfaces"
    file: scripts/azure/resource_graph/queries/10_frontdoor_inventory.kql
    categories: [networking, edge, inventory]
    class: mandatory
    frequency: pre_release

  - id: q20
    name: containerapps_inventory
    purpose: "Inventory Container Apps and managed environments"
    file: scripts/azure/resource_graph/queries/20_containerapps_inventory.kql
    categories: [runtime, workload, inventory]
    class: mandatory
    frequency: pre_release

  - id: q30
    name: postgres_flexible_inventory
    purpose: "Inventory PostgreSQL Flexible Servers and related properties"
    file: scripts/azure/resource_graph/queries/30_postgres_flexible_inventory.kql
    categories: [database, inventory]
    class: mandatory
    frequency: pre_release

  - id: q40
    name: foundry_inventory
    purpose: "Inventory Azure AI / Foundry-adjacent resources"
    file: scripts/azure/resource_graph/queries/40_foundry_inventory.kql
    categories: [ai, foundry, inventory]
    class: mandatory
    frequency: pre_release

  - id: q50
    name: managed_identities
    purpose: "Inventory user-assigned and system-assigned identity resources"
    file: scripts/azure/resource_graph/queries/50_managed_identities.kql
    categories: [identity, governance]
    class: mandatory
    frequency: monthly

  - id: q60
    name: keyvault_inventory
    purpose: "Inventory Key Vault resources for secret-boundary verification"
    file: scripts/azure/resource_graph/queries/60_keyvault_inventory.kql
    categories: [security, secrets, inventory]
    class: mandatory
    frequency: pre_release

  - id: q70
    name: tag_compliance
    purpose: "Detect missing or inconsistent required tags"
    file: scripts/azure/resource_graph/queries/70_tag_compliance.kql
    categories: [governance, compliance]
    class: mandatory
    frequency: pre_release

  - id: q80
    name: recent_changes
    purpose: "Inspect recent resource configuration changes (14-day window)"
    file: scripts/azure/resource_graph/queries/80_recent_changes.kql
    categories: [drift, audit, recent_changes]
    class: mandatory
    frequency: pre_release

  - id: q90
    name: container_registries
    purpose: "Inventory container registries with SKU and admin-user status"
    file: scripts/azure/resource_graph/queries/90_container_registries.kql
    categories: [containers, inventory]
    class: recommended
    frequency: monthly

  - id: q91
    name: region_compliance
    purpose: "Detect resources outside allowed regions"
    file: scripts/azure/resource_graph/queries/91_region_compliance.kql
    categories: [governance, compliance]
    class: mandatory
    frequency: pre_release

  - id: q92
    name: stale_resources
    purpose: "Resources with no changes in 30+ days (cleanup candidates)"
    file: scripts/azure/resource_graph/queries/92_stale_resources.kql
    categories: [drift, governance]
    class: recommended
    frequency: monthly

  - id: q93
    name: public_endpoints
    purpose: "Resources with public network access outside Front Door path"
    file: scripts/azure/resource_graph/queries/93_public_endpoints.kql
    categories: [security, networking]
    class: recommended
    frequency: monthly

required_before:
  major_runtime_reconciliation:
    - q00
    - q20
    - q30
    - q40
  dns_runtime_alignment_review:
    - q00
    - q10
    - q20
  security_boundary_review:
    - q50
    - q60
    - q70
  drift_investigation:
    - q00
    - q80

reconciliation_targets:
  - ssot/runtime/
  - ssot/agents/
  - infra/ssot/azure/resources.yaml
  - docs/architecture/
  - docs/contracts/

failure_classification:
  - ssot_stale
  - runtime_drift
  - unauthorized_or_unexpected_resource
  - permission_or_scope_issue
