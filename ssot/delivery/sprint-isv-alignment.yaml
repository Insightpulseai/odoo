program:
  name: Microsoft ISV Success
  enrolled: "2026-03-31"
  expires: "2027-03-31"
  renewal_available: "2027-03-01"
  benefit_value: "$126K USD"
  em: So Yeong Choi (v-soychoi@microsoft.com)
  team_lead: Krati Khandelwal (v-kratikh@microsoft.com)
  marketplace_target: "Q3 2026 (Aug-Sep)"
  offer_type: Transactable
  offer_name: "Pulser for Odoo"

  marketplace_offer:
    type: SaaS
    rationale: >
      SaaS is the right fit: Pulser is hosted in our Azure infrastructure (ACA),
      customers subscribe and use it online, we manage infra/app/data.
      SaaS requires: multitenant, Entra ID auth, SaaS Fulfillment API integration.
    pricing_model: per_user_plus_metered
    options:
      base: "Per user/month (flat rate for Odoo + Pulser access)"
      metered_dimensions:
        - "AI queries (Pulser inference calls beyond included quota)"
        - "Document extractions (DocAI pages processed)"
        - "Databricks compute (Genie/gold mart query minutes)"
    billing:
      frequencies: [monthly, annual]
      contract_durations: [1-month, 1-year, 2-year, 3-year]
      payment_options: [monthly, annual, upfront]
    store_fee: "3% standard (Microsoft keeps 3%, publisher gets 97%)"
    renewal_discount: "50% agency fee discount on private offer renewals"
    free_trial: "30-day free trial (transact scenario)"
    private_plans: true
    requirements:
      - "Multitenant SaaS application"
      - "Microsoft Entra ID authentication"
      - "SaaS Fulfillment API v2 integration"
      - "Payout account + tax profile in Partner Center"
      - "Publisher must bundle Azure infra costs into license fee"
    customer_billing:
      - "Enterprise Agreement (itemized, separate from Azure usage)"
      - "Credit card + monthly invoice"
      - "Azure monetary commitment (credits apply to Azure usage only, not license fees)"

  stages:
    get_started: completed
    build: in_progress
    publish: not_started
    grow: in_progress

  build_stage_actions:
    - name: "Start draft offer"
      status: in_progress
      unlocks: "Marketplace listing optimization consultation"
      action_url: "Partner Center → Marketplace offers → Create new offer"
    - name: "Activate product benefits"
      status: pending
    - name: "Application Architecture Design (ADS) session"
      status: not_scheduled
      description: "Design a well-architected app with MS expert"
    - name: "Application Design Review (ADR) session"
      status: not_scheduled
      description: "Refine application architecture with MS expert"
    - name: "Marketplace listing optimization consultation"
      status: locked
      unlock_trigger: "Complete draft offer step"

