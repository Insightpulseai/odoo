# =============================================================================
# Reusable Job: Odoo Module Tests on Azure PostgreSQL
# =============================================================================
# Runs Odoo 18 module tests against a disposable database on Azure PG.
# Creates a temp database, installs modules, runs tests, drops the database.
#
# Usage:
#   jobs:
#     - template: templates/jobs/odoo-module-test.yml
#       parameters:
#         installModules: 'ipai_auth_oidc,ipai_ops_api'
#         testTags: '/ipai_auth_oidc,/ipai_ops_api'
# =============================================================================

parameters:
  - name: installModules
    type: string
    displayName: Modules to install (comma-separated)
    default: 'base,account,purchase,project,hr,mail,auth_oauth'
  - name: testTags
    type: string
    displayName: Test tags (Odoo --test-tags format)
    default: ''
  - name: imageName
    type: string
    default: ipai-odoo
  - name: imageTag
    type: string
    default: '18.0'
  - name: acrName
    type: string
    default: acripaiodoo
  - name: serviceConnection
    type: string
    default: ipai-dev-wif
  - name: keyVaultName
    type: string
    default: kv-ipai-dev
  - name: pgServer
    type: string
    default: pg-ipai-odoo
  - name: pgHost
    type: string
    default: pg-ipai-odoo.postgres.database.azure.com
  - name: pgAdminUser
    type: string
    default: odoo_admin
  - name: resourceGroup
    type: string
    default: rg-ipai-dev-odoo-runtime
  - name: pythonVersion
    type: string
    default: '3.11'
  - name: timeoutMinutes
    type: number
    default: 60

jobs:
  - job: OdooModuleTest
    displayName: 'Test: ${{ parameters.installModules }}'
    timeoutInMinutes: ${{ parameters.timeoutMinutes }}
    pool: ipai-aca-agents
    steps:
      - checkout: self
        submodules: false
        clean: true
        fetchDepth: 1

      # -----------------------------------------------------------------
      # Load secrets from Key Vault
      # -----------------------------------------------------------------
      - task: AzureKeyVault@2
        displayName: Load secrets from ${{ parameters.keyVaultName }}
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          KeyVaultName: ${{ parameters.keyVaultName }}
          SecretsFilter: 'pg-ipai-odoo-admin-password'
          RunAsPreJob: false

      # -----------------------------------------------------------------
      # Clone Odoo 18 source
      # -----------------------------------------------------------------
      - script: |
          set -euo pipefail
          git clone --depth 1 --branch 18.0 https://github.com/odoo/odoo.git vendor/odoo
          echo "PASS: Odoo 18 source cloned"
        displayName: Clone Odoo 18 source

      # -----------------------------------------------------------------
      # Setup Python + Odoo 18 deps
      # -----------------------------------------------------------------
      - script: |
          set -euo pipefail
          python3 --version
          export PATH="/azp/.local/bin:$PATH"
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --only-binary :all: gevent greenlet
          grep -iv '^gevent\|^greenlet' vendor/odoo/requirements.txt > /tmp/requirements-filtered.txt
          python3 -m pip install -r /tmp/requirements-filtered.txt
          python3 -m pip install -e vendor/odoo/
          python3 -m pip install python-jose sentry-sdk || true
          echo "PASS: Odoo 18 + deps installed"
        displayName: Install Odoo 18 and dependencies

      # -----------------------------------------------------------------
      # Create disposable test database
      # -----------------------------------------------------------------
      - task: AzureCLI@2
        name: prepare_db
        displayName: Create disposable test database
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            PG_RG="$(az resource list \
              --name "${{ parameters.pgServer }}" \
              --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" \
              --query '[0].resourceGroup' -o tsv)"

            TEST_DB="odoo_test_$(Build.BuildId)_$(System.JobAttempt)"

            echo "Resource group: ${PG_RG}"
            echo "Test database:  ${TEST_DB}"

            az postgres flexible-server db create \
              --resource-group "${PG_RG}" \
              --server-name "${{ parameters.pgServer }}" \
              --database-name "${TEST_DB}"

            echo "##vso[task.setvariable variable=PG_RG;isReadOnly=true]${PG_RG}"
            echo "##vso[task.setvariable variable=TEST_DB;isReadOnly=true]${TEST_DB}"

      # -----------------------------------------------------------------
      # Run Odoo module tests
      # -----------------------------------------------------------------
      - bash: |
          set -euo pipefail

          INSTALL_MODULES="${{ parameters.installModules }}"
          TEST_TAGS="${{ parameters.testTags }}"

          echo "=== Odoo Module Tests ==="
          echo "Modules: ${INSTALL_MODULES}"
          echo "Tags: ${TEST_TAGS}"
          echo "Database: $(TEST_DB)"

          ADDONS_PATH="addons/ipai,addons/oca,vendor/odoo/addons,vendor/odoo/odoo/addons"

          TEST_ARGS=""
          if [[ -n "${TEST_TAGS}" ]]; then
            TEST_ARGS="--test-tags ${TEST_TAGS}"
          fi

          mkdir -p .artifacts/test-logs

          python3 vendor/odoo/odoo-bin \
            --database "$(TEST_DB)" \
            --db_host "${{ parameters.pgHost }}" \
            --db_port 5432 \
            --db_user "${{ parameters.pgAdminUser }}" \
            --db_password "$(pg-ipai-odoo-admin-password)" \
            --db_sslmode require \
            --addons-path "${ADDONS_PATH}" \
            --init "${INSTALL_MODULES}" \
            --test-enable \
            ${TEST_ARGS} \
            --stop-after-init \
            --http-port 18069 \
            --log-level test \
            --log-file .artifacts/test-logs/odoo-test.log \
            2>&1 | tee .artifacts/test-logs/odoo-test-console.log

          # Check for test failures in log
          if grep -q "FAIL" .artifacts/test-logs/odoo-test.log 2>/dev/null; then
            echo "##vso[task.logissue type=error]Odoo tests reported failures"
            exit 1
          fi

          echo "PASS: Odoo module tests completed"
        displayName: 'Run Odoo tests: ${{ parameters.installModules }}'
        env:
          PGPASSWORD: $(pg-ipai-odoo-admin-password)

      # -----------------------------------------------------------------
      # Convert Odoo log to JUnit XML for Tests tab
      # -----------------------------------------------------------------
      - bash: |
          set -euo pipefail
          mkdir -p .artifacts/test-results

          LOG=".artifacts/test-logs/odoo-test.log"
          JUNIT=".artifacts/test-results/odoo-junit.xml"

          # Parse Odoo test log → JUnit XML
          # Odoo outputs lines like:
          #   INFO ... PASS: TestClassName.test_method
          #   ERROR ... FAIL: TestClassName.test_method
          #   ERROR ... ERROR: TestClassName.test_method
          python3 - "${LOG}" "${JUNIT}" <<'PYEOF'
          import sys, re, xml.etree.ElementTree as ET
          from datetime import datetime

          log_path, junit_path = sys.argv[1], sys.argv[2]

          tests, failures, errors = [], [], []
          test_pattern = re.compile(
              r'(PASS|FAIL|ERROR|OK):\s+'
              r'(?:test\s+)?(\S+?)(?:\s|$)'
          )
          # Also capture Odoo's unittest-style output
          unit_pattern = re.compile(
              r'(\S+)\s+\((\S+)\)\s+\.\.\.\s+(ok|FAIL|ERROR)',
              re.IGNORECASE
          )

          with open(log_path, 'r', errors='replace') as f:
              for line in f:
                  m = test_pattern.search(line)
                  if m:
                      status, name = m.group(1), m.group(2)
                      entry = {'name': name, 'status': status.upper(), 'message': line.strip()}
                      if status.upper() == 'FAIL':
                          failures.append(entry)
                      elif status.upper() == 'ERROR':
                          errors.append(entry)
                      tests.append(entry)
                      continue
                  m = unit_pattern.search(line)
                  if m:
                      method, cls, status = m.group(1), m.group(2), m.group(3)
                      name = f"{cls}.{method}"
                      entry = {'name': name, 'status': status.upper(), 'message': line.strip()}
                      if status.upper() == 'FAIL':
                          failures.append(entry)
                      elif status.upper() == 'ERROR':
                          errors.append(entry)
                      tests.append(entry)

          # If no structured test output found, create a single summary test case
          if not tests:
              with open(log_path, 'r', errors='replace') as f:
                  content = f.read()
              has_fail = 'FAIL' in content or 'Traceback' in content
              tests.append({
                  'name': 'odoo_module_install',
                  'status': 'FAIL' if has_fail else 'PASS',
                  'message': 'Module install + test run'
              })
              if has_fail:
                  failures.append(tests[0])

          # Build JUnit XML
          suite = ET.Element('testsuite', {
              'name': 'OdooModuleTests',
              'tests': str(len(tests)),
              'failures': str(len(failures)),
              'errors': str(len(errors)),
              'timestamp': datetime.utcnow().isoformat(),
          })
          for t in tests:
              tc = ET.SubElement(suite, 'testcase', {
                  'classname': 'odoo',
                  'name': t['name'],
              })
              if t['status'] == 'FAIL':
                  ET.SubElement(tc, 'failure', {'message': t['message']})
              elif t['status'] == 'ERROR':
                  ET.SubElement(tc, 'error', {'message': t['message']})

          tree = ET.ElementTree(suite)
          ET.indent(tree, space='  ')
          tree.write(junit_path, xml_declaration=True, encoding='utf-8')
          print(f"JUnit XML: {len(tests)} tests, {len(failures)} failures, {len(errors)} errors → {junit_path}")
          PYEOF
        displayName: Convert Odoo test log to JUnit XML
        condition: always()

      # -----------------------------------------------------------------
      # Publish test results to Tests tab
      # -----------------------------------------------------------------
      - task: PublishTestResults@2
        displayName: Publish Odoo test results
        condition: always()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: '.artifacts/test-results/odoo-junit.xml'
          testRunTitle: 'Odoo CE 18 Module Tests — $(Build.BuildNumber)'
          mergeTestResults: true
          failTaskOnFailedTests: true
          failTaskOnMissingResultsFile: false

      # -----------------------------------------------------------------
      # Publish test logs as artifact
      # -----------------------------------------------------------------
      - publish: .artifacts/test-logs
        artifact: 'odoo-test-logs-$(Build.BuildId)'
        displayName: Publish Odoo test logs
        condition: always()

      # -----------------------------------------------------------------
      # Drop disposable test database (always)
      # -----------------------------------------------------------------
      - task: AzureCLI@2
        displayName: Drop disposable test database
        condition: always()
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            if [ -n "${PG_RG:-}" ] && [ -n "${TEST_DB:-}" ]; then
              echo "Dropping ${TEST_DB} on ${{ parameters.pgServer }}..."
              az postgres flexible-server db delete \
                --resource-group "${PG_RG}" \
                --server-name "${{ parameters.pgServer }}" \
                --database-name "${TEST_DB}" \
                --yes
              echo "PASS: Test database dropped"
            else
              echo "SKIP: No test database to drop"
            fi
