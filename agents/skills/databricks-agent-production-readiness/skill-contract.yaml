version: 1
name: databricks-agent-production-readiness
status: draft
owner: agents
type: benchmark_skill
family: databricks_production_readiness

purpose: >
  Assess whether a Databricks agent meets production-readiness criteria
  covering agent structure, eval/benchmarking, monitoring/tracing,
  deployment discipline, and user trust/measurable validation.

triggers:
  - new agent deployment to production
  - agent promotion from dev/staging to production
  - agent evaluation review

inputs:
  - agent definition
  - tool registry
  - eval results
  - deployment config
  - trust/safety policy

dependencies:
  - agents/knowledge/benchmarks/databricks-production-ready.md
  - docs/architecture/data/ENTERPRISE_DATA_PLATFORM.md

steps:
  - verify agent follows Databricks Agent Framework template (not ad-hoc LLM calls)
  - check tool definitions are registered and scoped
  - verify evaluation suite exists with measurable thresholds
  - confirm monitoring/tracing — MLflow traces, latency metrics, error rates
  - check deployment on Databricks Apps (not notebook-served)
  - verify safety guardrails — content filtering, tool use boundaries, escalation path
  - confirm A/B or shadow deployment capability for rollout
  - check user feedback loop exists (thumbs up/down, explicit corrections)

outputs:
  - agent_readiness_assessment
  - eval_coverage_report
  - trust_safety_review
  - gap_list
  - remediation_recommendations
  - evidence

guardrails:
  - >
    Databricks "production ready" is a benchmark for production discipline,
    not a blanket trust label. A Databricks capability is production-grade
    in our doctrine only when: release maturity is acceptable (GA or Public
    Preview with stable interface/SLA/support), deployment path is codified,
    observability/evaluation exists, rollback/recovery expectations are defined.
    Beta, Private Preview, and Experimental features must NOT be treated as
    canonical production baseline.
  - never approve agent without eval evidence
  - never skip safety review
  - require tracing enabled before production sign-off
  - require user feedback mechanism

evidence:
  format: docs/evidence/{stamp}/databricks/agent-readiness/
  required:
    - agent definition artifact
    - eval results with thresholds
    - tracing/monitoring configuration proof
    - safety guardrail configuration

evals:
  accuracy: 0.95
  completeness: 0.95
  safety: 0.99
  policy_adherence: 0.99
