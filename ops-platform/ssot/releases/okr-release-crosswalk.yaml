# ============================================================
# OKR ↔ RELEASE CROSSWALK
# ============================================================
# Links every OKR key result to its release deliverable,
# data source, and automated tracking mechanism.
# Last updated: 2026-03-15
# ============================================================

schema_version: "1.0"
crosswalk_id: okr-release-crosswalk

# ----------------------------------------------------------
# Crosswalk entries
# ----------------------------------------------------------
entries:

  # --- R0: Governance & Policy Pack ---
  - release: R0
    milestone: "Governance & Policy Pack"
    objective: O1
    key_result: O1-KR1
    deliverables:
      - "policy-pack committed and CI-enforced"
      - "connection-registry populated"
      - "packaging-channel-matrix published"
      - "offer-registry initialized"
      - "agent-publish-rules documented"
      - "model-aliasing-rules documented"
    tracking:
      automated: true
      source: github_ci
      signal: "All governance YAMLs merged + CI green"
    decision_point:
      date: "2026-04-15"
      question: "Is R0 governance enforced?"

  # --- R1: Odoo Copilot Internal Dev Preview ---
  - release: R1
    milestone: "Odoo Copilot Internal Dev Preview"
    objective: O1
    key_results: [O1-KR2, O1-KR3]
    deliverables:
      - "Odoo Copilot manifest live"
      - "Read-only Foundry-backed chat working"
      - "Approved tools only"
      - "Trace + eval + owner metadata functional"
    tracking:
      automated: true
      sources: [eval_pipeline, app_insights]
      signals:
        - "distinct_users >= 3"
        - "consecutive_green_eval_days >= 5"
    decision_point:
      date: "2026-04-15"
      question: "Can R1 proceed to biweekly lane?"

  # --- R2: Finance DocFlow Alpha ---
  - release: R2
    milestone: "Finance DocFlow Alpha"
    objective: O2
    key_results: [O2-KR1, O2-KR2]
    deliverables:
      - "Invoice/receipt extraction pipeline"
      - "Review queue UI"
      - "Draft-only posting (no auto-booking)"
      - "Audit trail for all extractions"
    tracking:
      automated: partial
      sources: [eval_pipeline, manual_test]
      signals:
        - "extraction_accuracy > 90%"
        - "e2e_review_flow_passing"
    decision_point:
      date: "2026-05-15"
      question: "Is R2 extraction accurate enough?"

  # --- R3: Ops Console Beta ---
  - release: R3
    milestone: "Ops Console Beta"
    objective: O2
    key_result: O2-KR3
    deliverables:
      - "Release registry dashboard"
      - "Agent status view"
      - "Eval status view"
      - "Environment + packaging visibility"
      - "OKR progress view (replaces Viva Goals dashboard)"
    tracking:
      automated: false
      source: ops_console
      signal: "Dashboard answers: what exists, deployable, blocked"
    decision_point:
      date: "2026-05-15"
      question: "Is R3 console useful?"
    viva_goals_replacement_note: >
      R3 is the primary Viva Goals dashboard replacement.
      Must include OKR progress tracking as a first-class view.

  # --- R4: ADO Release-Control Integration ---
  - release: R4
    milestone: "Azure DevOps Release-Control Integration"
    objective: O3
    key_result: O3-KR1
    deliverables:
      - "ADO Boards binding"
      - "Release item linking"
      - "Test Plans/UAT linkage"
      - "Promotion gates in pipeline"
    tracking:
      automated: true
      source: ado_boards
      signal: "Every promotion has release/work-item/test-evidence chain"
    viva_goals_replacement_note: >
      R4 replaces Viva Goals' Azure DevOps integration.
      Work item sync is now native to the release pipeline.

  # --- R5: Tableau / BI Connector Surface ---
  - release: R5
    milestone: "Tableau / BI Connector Surface"
    objective: O3
    key_result: O3-KR2
    deliverables:
      - "Governed metric export"
      - "Semantic access layer"
      - "Tableau Cloud consumption path"
    tracking:
      automated: true
      source: tableau_cloud
      signal: "Tableau reads governed outputs, not raw internals"
    viva_goals_replacement_note: >
      R5 replaces Viva Goals' Tableau integration.
      BI data flows through governed semantic layer.

  # --- R6: Packaging Prep ---
  - release: R6
    milestone: "R6 Packaging Prep (no ship)"
    objective: O3
    key_result: O3-KR3
    deliverables:
      - "ARM template skeleton for managed app"
      - "Portal UI definition draft"
      - "Packaging readiness checklist complete"
    tracking:
      automated: false
      source: packaging_checklist
      signal: "Packaging artifacts ready for Month 4 review"
    decision_point:
      date: "2026-06-15"
      question: "Is R6 managed app packaging justified? Which candidate?"

# ----------------------------------------------------------
# Tracking automation summary
# ----------------------------------------------------------
automation_summary:
  fully_automated: [R0, R1, R4, R5]
  partially_automated: [R2]
  manual_tracking: [R3, R6]
  ops_console_views_needed:
    - "OKR progress grid (all objectives + KRs with status)"
    - "Release → KR linkage view"
    - "Data source health (which automated feeds are active)"
    - "Decision point calendar with countdown"
