# -----------------------------------------------------------------------------
# Benefits checklist
# -----------------------------------------------------------------------------
benefits:

  azure_credit:
    sku: Azure Sponsorship Credit
    duration: 12_months_from_activation_date
    activation_path: partner_center_benefits_workspace
    critical_stacking_rule: >
      "We cannot combine free Azure credits with existing sponsorships
      from other programs, such as CSP or MCA. If you have Azure
      through CSP or MCA, consider setting up a new PAYG Azure
      subscription to access the free Azure sponsorship."
    ipai_conflict:
      existing_ipai_subscriptions:
        - microsoft_azure_sponsorship (eba824fb-332d-4623-9dfb-2c9f7ee83f4e) — already_sponsored
        - microsoft_customer_agreement_mca (active per m365-mca-billing-account.yaml)
      implication: >
        ISV Success Azure credit CANNOT be applied to the existing
        eba824fb sponsorship subscription. A NEW PAYG subscription
        must be provisioned to receive the ISV credit, OR the credit
        is deferred until the existing sponsorship expires.
      decision_required_by: platform-architecture + fp_and_a
      recommended_disposition: >
        Option A (preferred): provision new PAYG subscription under
        MCA billing, redeem ISV Success credit there, use for Pulser
        Marketplace publish workloads (preview tenant, eval env).
        Option B: defer until current sponsorship expires.
    status: not_yet_activated
    action: decide_subscription_target_before_activation
    terms_and_conditions_ref: "Azure Sponsorship Offer | Microsoft Azure"

  azure_standard_support_plan:
    sku_label_from_partner_center: "Azure Standard Support Plan"
    quantity: unlimited_incidents (verified 2026-04-19 via Technical support & consultation page)
    activation_deadline: "2027-04-30"
    status_in_partner_center: unknown_not_activated
    activation_path: partner_center_benefits_workspace > technical_support_and_consultation
    ticket_tag: "Partner ISV Success Azur Std"
    priority_routing: yes_with_severity_selection
    important_distinction: >
      "Unlimited incidents" here is the actual benefit value (NOT the
      50/year cap that applies to SPD Partner Cloud Support per policy
      change effective June 23 2025). IPAI is on ISV Success not SPD,
      so the unlimited benefit holds.
    status: ready_to_activate_low_risk_high_value

  dynamics_365_partner_sandbox_sales_fs_cs:
    sku_label_from_partner_center: "Dynamics 365 Partner Sandbox – Sales, Field Service and Customer Service"
    seats: 25
    activation_deadline: "2027-04-30"
    status_in_partner_center: REDEEMED (verified 2026-04-19 via Benefits | Cloud services page)
    activation_status_live: already_visible_in_tenant_license_inventory (0/25 assigned)
    cross_reference: ssot/identity/m365-tenant-license-inventory-and-capability-map.yaml
    ipai_disposition: hold_unassigned (Odoo is canonical ERP; sandbox is discretionary)

  dynamics_365_discounted_and_free_licenses:
    sku_label_from_partner_center: "Dynamics 365 discounted and free licenses"
    seats: 25
    activation_deadline: "2027-04-30"
    status_in_partner_center: unknown_not_redeemed (verified 2026-04-19)
    ipai_disposition: evaluate_then_defer
    rationale: >
      This is DISTINCT from the D365 Partner Sandbox (which is already
      redeemed). "Discounted and free licenses" is a commercial-use
      benefit for internal operational D365. IPAI does NOT adopt D365
      as its ERP (Odoo is canonical) so this benefit is likely of
      low-to-zero strategic value. Leave unredeemed unless a specific
      D365 use case emerges.
    action: defer_until_specific_need_identified

  m365_e5_developer_subscription:
    sku_label_from_partner_center: "Microsoft 365 E5 Developer Subscription"
    seats: 25
    activation_deadline: "2027-04-30"
    status_in_partner_center: unknown_not_redeemed (verified 2026-04-19)
    important_distinction: >
      This is the DEVELOPER subscription, not a production M365 E5.
      It's a sandbox/dev-tenant SKU for testing + app development.
      It does NOT entitle you to run real customer workloads on it.
    activation_path: partner_center_benefits_workspace + Microsoft 365 Dev Center (https://aka.ms/m365devprogram)
    six_month_reuse_restriction: >
      "If a user has previously activated the M365 sandbox and has not
      utilized it, they will be unable to use it for the next six months.
      As an alternative, activate a different domain or email."
    status: not_yet_activated
    priority_for_ipai: medium
    ipai_use_case: >
      Use this dev tenant to prototype the Agent 365 SDK integration
      without touching the production tenant. Aligns with
      microsoft-365-e7-and-agent-365-opportunity.yaml#integration_roadmap
      phase_1_sdk_familiarization.

  github_enterprise_cloud_subscription:
    sku_label_from_partner_center: "GitHub Enterprise Cloud Subscription"
    seats_awarded: 20
    seats_remaining: 20
    activation_deadline: "2027-04-30"
    status_in_partner_center: not_redeemed (verified 2026-04-19 via Benefits | Developer tools page)
    coupon_code_ref: stored_in_partner_center_workspace_and_em_email_only
    coupon_code_value: NOT_RECORDED_HERE (keep out of git per secrets-policy)
    public_preview: yes
    upgrades_over_free_or_team:
      - 50_gb_package_storage
      - 50000_automation_minutes_per_month
    earlier_concern_about_existing_enterprise:
      concern_text: >
        Per the EM email: "If you have Enterprise, this benefit is not
        available." IPAI already has the `ipai` GitHub Enterprise account.
      partner_center_evidence: >
        DESPITE that rule, the benefit shows as AVAILABLE (Not Redeemed,
        20 of 20 seats remaining) in IPAI's Partner Center. This suggests
        either (a) the rule doesn't apply to IPAI's enterprise variant,
        (b) Microsoft awards it regardless and redemption may still fail,
        or (c) the Preview program has different eligibility logic.
      disposition: verify_redemption_path_with_em_before_attempting
    redemption_flow_if_eligible:
      - launch_activation_url_in_incognito_on_correct_tenant
      - sign_into_ipai_organization_account (not personal jgtolentino)
      - redirect_to_redeem_your_coupon_page
      - provide_payment_instrument (no charge until expiry)
    status: pending_em_confirmation_then_redemption_if_eligible
    action_required:
      - ask_em_to_confirm_whether_redemption_works_when_ipai_enterprise_exists
      - if_redemption_fails_at_checkout_it_is_a_clean_no_op_no_commitment_made
      - if_redemption_succeeds_20_seats_augment_existing_ipai_enterprise_for_12_months

  microsoft_visual_studio_enterprise_ide:
    sku_label_from_partner_center: "Microsoft Visual Studio Enterprise IDE"
    seats_awarded: 25
    seats_remaining: 24
    seats_already_assigned: 1 (likely jgtolentino personal account from prior activation)
    activation_deadline: "2027-04-30"
    status_in_partner_center: partially_redeemed (verified 2026-04-19)
    activation_path: partner_center_benefits_workspace (user_by_user_assignment)
    bundle_notes: "VS Enterprise + GitHub benefits are adjacent in Developer tools tab; not bundled as one activation"
    ipai_disposition:
      - assign_to_platform-architecture_first (you)
      - reserve_pool_for_scim_provisioned_engineers_when_team_grows
      - do_not_assign_to_personal_accounts_of_contractors_without_review

  curated_resources:
    location: https://aka.ms/isvsuccessresources
    composition: mix_of_curated_resources_and_isv_success_specific_content
    status: ongoing_access

  technical_enablement_sessions:
    verified_in_partner_center: 2026-04-19
    visible_sessions_in_technical_support_and_consultation_tab:
      - name: Application architecture design session (ADS)
        quantity: 1 consultation
        activate_by: "2027-04-30"
        status: unknown_not_activated
      - name: Application design review (ADR)
        quantity: 1 consultation
        activate_by: "2027-04-30"
        status: unknown_not_activated
      - name: Application publishing consultation
        quantity: 1 consultation
        activate_by: "2027-04-30"
        status: unknown_not_activated
    discrepancy_note: >
      EM email listed "D&P, Arch Design, Arch Review & Mkt Publish Consult"
      as 4 sessions. Partner Center shows 3 consultation sessions (ADS,
      ADR, Publishing) + Azure Standard Support (unlimited). The "D&P"
      referenced by EM may have been rolled into ADS or is surfaced
      elsewhere. Ask EM to clarify if the 4th session is missing or
      reclassified.
    total_visible_consultations: 3
    ipai_priority:
      first_session: application_publishing_consultation (closest to Aug-Sep publish target)
      second_session: application_design_review_adr (validate foundry + agent-platform + AFD topology)
      third_session: application_architecture_design_session_ads (if new scope emerges)
    status: 0_of_3_visible_used

