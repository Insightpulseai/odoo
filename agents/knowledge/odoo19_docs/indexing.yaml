# Odoo 18 Documentation — Indexing Contract

name: odoo18-docs-indexing
description: Vector index configuration for Odoo 18 documentation KB

index:
  backend: azure-ai-search
  index_name: odoo18-docs
  api_version: "2024-07-01"

  # Embedding model
  embedding:
    model: text-embedding-ada-002  # Azure OpenAI deployment
    dimensions: 1536
    batch_size: 100

  # Search configuration
  search:
    semantic_config: odoo18-docs-semantic
    scoring_profile: odoo18-docs-scoring
    default_top_k: 8
    max_top_k: 20

  # Field schema
  fields:
    - name: chunk_id
      type: Edm.String
      key: true
      filterable: true
    - name: content
      type: Edm.String
      searchable: true
      analyzer: en.microsoft
    - name: content_vector
      type: Collection(Edm.Single)
      searchable: true
      dimensions: 1536
      vector_search_profile: odoo18-vector-profile
    - name: path
      type: Edm.String
      filterable: true
      facetable: true
    - name: heading_chain
      type: Edm.String
      searchable: true
      filterable: true
    - name: version
      type: Edm.String
      filterable: true
    - name: product
      type: Edm.String
      filterable: true
    - name: source_type
      type: Edm.String
      filterable: true
    - name: repo
      type: Edm.String
      filterable: true
    - name: branch
      type: Edm.String
      filterable: true
    - name: ordinal
      type: Edm.Int32
      sortable: true
    - name: content_hash
      type: Edm.String
      filterable: true
    - name: indexed_at
      type: Edm.DateTimeOffset
      sortable: true
    - name: source_commit
      type: Edm.String
      filterable: true

incremental:
  # Incremental re-indexing keyed by commit + file hash
  strategy: diff-based
  tracking:
    last_indexed_commit: null  # set after first index
    manifest_path: agents/knowledge/odoo18_docs/.index_manifest.json
  behavior:
    on_file_changed: re-chunk + re-embed + upsert
    on_file_deleted: delete chunks by path prefix
    on_file_added: chunk + embed + insert
    on_unchanged: skip

refresh:
  schedule: weekly  # CI workflow handles this
  workflow: .github/workflows/odoo-docs-kb-refresh.yml

citation:
  # Every retrieval response must include citation metadata
  format: "repo={repo} branch={branch} path={path} heading={heading_chain} chunk_id={chunk_id}"
  required_fields:
    - repo
    - branch
    - path
    - heading_chain
    - chunk_id
