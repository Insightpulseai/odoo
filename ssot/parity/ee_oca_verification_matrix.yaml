# schema: ssot.parity.ee_oca_verification_matrix.v1
# PURPOSE: Bridge between research (T1 mapping) and repo reality (T2-T4 verification).
# This is the single source of truth for parity VERIFICATION state.
#
# Tier definitions:
#   T0: Unmapped — no replacement identified
#   T1: Mapped — replacement identified, OCA repo verified to exist
#   T2: Installable — installs on our Odoo 19 CE baseline without error
#   T3: Functional — ≥80% feature coverage for our workflows (evidence required)
#   T4: Verified — production-tested, 30-day soak complete
#
# Source: derived from ssot/parity/ee_to_oca_proof_matrix.yaml (T1 mapping)
# Owner: platform
# Last updated: 2026-03-08

version: 1
meta:
  owner: platform
  purpose: "Track verification tier progression for EE parity replacements"
