# Databricks Asset Bundle Configuration
# For Notion x Finance PPM Control Room + Finance & BIR Compliance

bundle:
  name: ipai-lakehouse

variables:
  catalog:
    description: Unity Catalog name
    default: ipai_gold
  schema_bronze:
    description: Bronze schema name
    default: bronze
  schema_silver:
    description: Silver schema name
    default: silver
  schema_gold:
    description: Gold schema name
    default: gold
  warehouse_id:
    description: SQL warehouse ID for queries
  databricks_host:
    description: Databricks workspace URL
    default: https://adb-7405610347978231.11.azuredatabricks.net
  databricks_token:
    description: Databricks token for API calls
  notion_token:
    description: Notion integration token
  bronze_storage_path:
    description: ADLS Bronze zone base path
    default: abfss://bronze@stipaidev.dfs.core.windows.net

workspace:
  host: ${var.databricks_host}

include:
  - resources/*.yml
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  - resources/clusters/*.yml
  - resources/schedules/*.yml
  - resources/permissions/*.yml

artifacts:
  notion_sync_wheel:
    type: whl
    path: ../../services/notion-sync
    build: python setup.py bdist_wheel

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: dev_ipai
      bronze_storage_path: abfss://bronze@stipaidev.dfs.core.windows.net
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/ipai-lakehouse-dev
    resources:
      pipelines:
        finance_bir_pipeline:
          name: "[DEV] Finance & BIR Compliance"
          development: true
      jobs:
        odoo_jdbc_extract:
          name: "[DEV] Odoo JDBC Extract"
        notion_sync_bronze:
          name: "[DEV] Notion Sync Bronze"
        notion_transform_silver:
          name: "[DEV] Notion Transform Silver"
        ppm_marts_gold:
          name: "[DEV] PPM Marts Gold"
        azure_rg_ingest:
          name: "[DEV] Azure RG Ingest"
        dq_checks:
          name: "[DEV] DQ Checks"
        control_room_refresh:
          name: "[DEV] Control Room Refresh"

  staging:
    mode: development
    variables:
      catalog: staging_ipai
      bronze_storage_path: abfss://bronze@stipaistaging.dfs.core.windows.net
    workspace:
      root_path: /Workspace/Shared/ipai-lakehouse-staging
    resources:
      pipelines:
        finance_bir_pipeline:
          name: "[STAGING] Finance & BIR Compliance"
          development: true

  prod:
    mode: production
    variables:
      catalog: ipai_gold
      bronze_storage_path: abfss://bronze@stipaiprod.dfs.core.windows.net
    workspace:
      root_path: /Workspace/Shared/ipai-lakehouse
    resources:
      pipelines:
        finance_bir_pipeline:
          name: "Finance & BIR Compliance"
          development: false
          continuous: false
    run_as:
      service_principal_name: ipai-lakehouse-service-principal
    permissions:
      - level: CAN_VIEW
        group_name: data-engineers
      - level: CAN_MANAGE
        group_name: platform-admins
