testing:
  doctrine:
    odoo_native_first: true
    playwright_secondary: true
    devtools_debug_only: true
  layers:
    - transactioncase
    - form
    - httpcase_if_needed
    - playwright_critical_path_only
  required_for_release:
    - executable_tests_for_core_workflows
    - fresh_db_install_validation
    - runtime_install_upgrade_validation

mcp_tooling:
  optional: true
  not_business_truth: true
  allowed:
    - playwright_mcp
    - chrome_devtools_mcp
    - azure_mcp_server
    - microsoft_learn_mcp
    - azure_devops_mcp_if_needed
    - markitdown
  experimental_not_on_mvp_critical_path:
    - azure_ai_foundry_mcp

deferred_global:
  - deploy_your_ai_application_in_production
  - azure_ai_search_as_default
  - cosmos_db_as_default
  - fabric_as_default
  - full_sub_agent_registry_runtime
  - speculative_ipai_module_sprawl
