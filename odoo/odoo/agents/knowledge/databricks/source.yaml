# Databricks — Knowledge Source Contract
# Covers: CLI, developer tools, industry solutions, products, Azure Databricks

name: databricks-kb
description: Databricks platform knowledge base — data engineering, industry solutions, Azure integration

sources:
  # Developer documentation
  - name: databricks-dev
    type: web-crawl
    base_urls:
      - https://docs.databricks.com/aws/en/dev-tools/cli/tutorial
      - https://docs.databricks.com/aws/en/developers/
    crawl_depth: 2
    content_selector: "main article"

  # Product capabilities
  - name: databricks-products
    type: web-crawl
    base_urls:
      - https://www.databricks.com/product/databricks-apps
      - https://www.databricks.com/product/data-engineering
      - https://www.databricks.com/product/azure
    crawl_depth: 1
    content_selector: "main"

  # Industry solutions
  - name: databricks-industries
    type: web-crawl
    base_urls:
      - https://www.databricks.com/solutions/industries/financial-services
      - https://www.databricks.com/solutions/industries/marketing
      - https://www.databricks.com/solutions/industries/retail-industry-solutions
      - https://www.databricks.com/solutions/industries/media-and-entertainment
    crawl_depth: 1
    content_selector: "main"

ingestion:
  include:
    - "dev-tools/**"
    - "developers/**"
    - "product/**"
    - "solutions/**"
  exclude:
    - "**/static/**"
    - "**/images/**"
    - "**/assets/**"
  file_types:
    - "*.md"
    - "*.html"

metadata:
  product: databricks
  source_type: documentation
  lang: en

# Content domains
domains:
  developer:
    - cli-tutorial        # Databricks CLI setup and usage
    - sdk                 # Python/Java/REST SDKs
    - api-reference       # REST API reference
    - ide-integration     # IDE plugins and extensions

  data-engineering:
    - spark               # Apache Spark on Databricks
    - delta-lake          # Delta Lake (open-source lakehouse)
    - lakeflow            # Lakeflow (rebranded June 2025): Connect + Declarative Pipelines + Jobs
    - pipelines           # Spark Declarative Pipelines (formerly Delta Live Tables / DLT)
    - streaming           # Structured Streaming
    - lakeflow-designer   # AI-powered visual pipeline builder (no-code)

  apps:
    - databricks-apps     # Application framework
    - dashboards          # SQL dashboards
    - notebooks           # Collaborative notebooks

  azure-integration:
    - azure-databricks    # Azure Databricks workspace (10k+ orgs, 60%+ Fortune 500)
    - unity-catalog       # Governance backbone — central across Apps, Azure, Data Engineering
    - azure-storage       # ADLS Gen2 integration
    - power-bi            # Automated publish with governed datasets
    - azure-data-factory  # Native Databricks Job activity for Workflows
    - azure-ai-foundry    # Native connector for real-time domain-aware insights (Genie)
    - power-platform      # Power Apps, Power Automate, Copilot Studio connector
    - microsoft-purview   # Mirrored Databricks Catalog for Unity Catalog → Microsoft Fabric

  industry-solutions:
    - financial-services  # Risk/VaR, fraud detection, compliance, open banking, ESG scoring (14 accelerators)
    - marketing           # Multi-touch attribution, campaign measurement, martech integrations (Adobe, Braze, Salesforce)
    - retail              # Demand forecasting, customer 360, supply chain, on-shelf availability
    - media-entertainment # Content recommendations, CLV modeling, streaming QoS, advertiser 360

# Key patterns across all sources
cross_cutting:
  - name: solution-accelerators
    description: Pre-built notebooks/templates per industry vertical — reduces implementation time
  - name: unity-catalog
    description: Central governance mechanism across Apps, Azure, and Data Engineering
  - name: marketplace
    description: Partner integrations and external data enrichment (Martech, Retail, FS)
  - name: lakeflow-rebrand
    description: "DLT → Spark Declarative Pipelines, Workflows → Lakeflow Jobs, new: Lakeflow Connect + Designer (June 2025)"

# Note: Industry solution pages are JS-heavy (SPA). Web loader may need
# fallback to search-based extraction for these URLs.
