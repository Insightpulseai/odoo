# Azure Platform Maturity Benchmark — Machine-Readable Rubric
# SSOT: infra/spec/azure-platform-maturity-benchmark/
# Generated: 2026-03-11
# Schema: v1.0.0

version: "1.0.0"
pass_threshold: 70
cutover_threshold: 85
min_domain_score: 50
min_domain_cutover: 60

domains:
  identity_governance:
    weight: 20
    criteria:
      entra_id_config:
        weight: 3
        levels:
          L0: "No tenant"
          L1: "Tenant exists, no MFA"
          L2: "MFA enforced for admins"
          L3: "MFA all users + conditional access"
          L4: "PIM + break-glass + JIT"
      managed_identities:
        weight: 3
        levels:
          L0: "Hardcoded credentials"
          L1: "Service principal + secret"
          L2: "System-assigned MI for ACA"
          L3: "User-assigned MI with least-privilege"
          L4: "MI for all services + no secrets"
      rbac_assignments:
        weight: 2
        levels:
          L0: "Owner on all resources"
          L1: "Contributor broadly"
          L2: "Role-scoped per resource group"
          L3: "Custom roles + PIM"
          L4: "Custom roles + PIM + access reviews"
      resource_tagging:
        weight: 1
        levels:
          L0: "No tags"
          L1: "Partial tags"
          L2: "env + owner tags on all RGs"
          L3: "Full tag policy enforced"
          L4: "Tag inheritance + cost allocation"
      policy_assignments:
        weight: 1
        levels:
          L0: "No policies"
          L1: "Audit-only policies"
          L2: "Deny policies on critical resources"
          L3: "Initiative-level enforcement"
          L4: "Remediation tasks automated"

  networking:
    weight: 15
    criteria:
      vnet_topology:
        weight: 3
        levels:
          L0: "Flat/public"
          L1: "Single VNet, no NSGs"
          L2: "Hub-spoke or segmented"
          L3: "NSG per subnet + flow logs"
          L4: "Private endpoints + no public IPs"
      cloudflare_integration:
        weight: 3
        levels:
          L0: "Direct IP exposure"
          L1: "DNS only"
          L2: "DNS + proxy"
          L3: "DNS + proxy + WAF rules"
          L4: "Full stack: DNS + proxy + WAF + rate limit + bot mgmt"
      tls_termination:
        weight: 2
        levels:
          L0: "No TLS"
          L1: "Self-signed"
          L2: "Cloudflare edge TLS"
          L3: "Edge + origin TLS (Full Strict)"
          L4: "mTLS where applicable"
      dns_management:
        weight: 2
        levels:
          L0: "Manual records"
          L1: "Cloudflare UI-only"
          L2: "YAML-first + CI apply"
          L3: "YAML + Terraform + drift detection"
          L4: "Automated subdomain lifecycle"

  compute_runtime:
    weight: 20
    criteria:
      container_runtime:
        weight: 4
        levels:
          L0: "Manual docker run"
          L1: "Docker Compose on VM"
          L2: "ACA single revision"
          L3: "ACA with revision management + scaling"
          L4: "ACA with Dapr + KEDA + zone redundancy"
      image_lifecycle:
        weight: 3
        levels:
          L0: "No registry"
          L1: "ACR exists, manual push"
          L2: "CI pushes to ACR"
          L3: "CI + image signing + vulnerability scan"
          L4: "Signed + scanned + auto-prune + SBOM"
      resource_limits:
        weight: 2
        levels:
          L0: "No limits"
          L1: "CPU/memory set"
          L2: "Autoscale rules defined"
          L3: "Scale-to-zero + burst limits"
          L4: "Cost-optimized scaling profiles"
      health_probes:
        weight: 1
        levels:
          L0: "None"
          L1: "Liveness only"
          L2: "Liveness + readiness"
          L3: "L + R + startup probe"
          L4: "Probes + dependency health cascade"

  monitoring_observability:
    weight: 15
    criteria:
      log_aggregation:
        weight: 3
        levels:
          L0: "No logging"
          L1: "Container stdout only"
          L2: "Log Analytics workspace"
          L3: "Structured logs + queries"
          L4: "Alerts on log patterns + dashboards"
      metrics_collection:
        weight: 3
        levels:
          L0: "None"
          L1: "Basic Azure metrics"
          L2: "App Insights instrumented"
          L3: "Custom metrics + SLI definition"
          L4: "SLO dashboards + burn-rate alerts"
      tracing:
        weight: 2
        levels:
          L0: "None"
          L1: "Request IDs"
          L2: "Distributed tracing (App Insights)"
          L3: "Cross-service correlation"
          L4: "Full trace context propagation"
      alerting:
        weight: 2
        levels:
          L0: "None"
          L1: "Email on error"
          L2: "Action groups + severity levels"
          L3: "PagerDuty/Slack integration"
          L4: "Runbook-linked auto-remediation"

  backup_dr:
    weight: 15
    criteria:
      database_backup:
        weight: 4
        levels:
          L0: "No backups"
          L1: "Manual pg_dump"
          L2: "Scheduled automated backups"
          L3: "Automated + tested restore"
          L4: "PITR + cross-region + verified RTO"
      filestore_backup:
        weight: 2
        levels:
          L0: "No backup"
          L1: "Manual copy"
          L2: "Scheduled rsync/snapshot"
          L3: "Versioned storage + lifecycle"
          L4: "Cross-region replication"
      dr_runbook:
        weight: 2
        levels:
          L0: "None"
          L1: "Documented"
          L2: "Documented + reviewed"
          L3: "Tested quarterly"
          L4: "Tested + automated failover"
      rto_rpo_targets:
        weight: 2
        levels:
          L0: "Undefined"
          L1: "Defined"
          L2: "Defined + measured"
          L3: "Met consistently"
          L4: "Exceeded with margin"

  deployment_promotion:
    weight: 15
    criteria:
      cicd_pipeline:
        weight: 4
        levels:
          L0: "Manual deploy"
          L1: "Basic GH Actions"
          L2: "Build + test + deploy"
          L3: "Branch-based environments + gates"
          L4: "Full GitOps with policy engine"
      environment_promotion:
        weight: 3
        levels:
          L0: "No staging"
          L1: "dev to prod direct"
          L2: "dev to staging to prod"
          L3: "Promotion gates + approval"
          L4: "Automated promotion with rollback"
      iac_coverage:
        weight: 2
        levels:
          L0: "No IaC"
          L1: "Partial Terraform/Bicep"
          L2: "All infra in IaC"
          L3: "IaC + drift detection"
          L4: "IaC + drift + auto-remediation"
      rollback_capability:
        weight: 1
        levels:
          L0: "No rollback"
          L1: "Manual revert"
          L2: "Automated rollback trigger"
          L3: "Blue-green or canary"
          L4: "Zero-downtime rollback + verification"
