<html lang="en">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "InsightPulseAI",
          "url": "https://www.insightpulseai.com",
          "logo": "https://www.insightpulseai.com/logo.png",
          "description": "AI-native operations for marketing, media, retail, and financial services. Combines Odoo on Cloud, Pulser operational intelligence, analytics, and managed cloud operations.",
          "sameAs": ["https://github.com/InsightPulseAI"]
        },
        {
          "@type": "SoftwareApplication",
          "name": "Pulser",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "AI-native intelligence layer for Odoo workflows. Surfaces context, detects exceptions, and accelerates operational action.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Custom pricing based on deployment scope"
          },
          "author": {
            "@type": "Organization",
            "name": "InsightPulseAI"
          }
        },
        {
          "@type": "WebSite",
          "name": "InsightPulseAI",
          "url": "https://www.insightpulseai.com",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.insightpulseai.com/#resources?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
