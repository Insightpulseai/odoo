version: 1
namespace: ipai.ops_platform.foundry.tool_registry.v1
artifact_type: registry
repo_key: ops_platform
domain: foundry
subject: tool_registry

tools:
  - tool_key: document_intelligence
    tool_kind: custom
    provider: microsoft_document_intelligence
    auth_mode: entra
    approval_mode: policy_driven
    owner_repo: agents
    manifest_ref: agents__tools__document_intelligence__v1

  - tool_key: odoo_actions
    tool_kind: custom
    provider: ipai_odoo
    auth_mode: managed_identity
    approval_mode: policy_driven
    owner_repo: odoo
    manifest_ref: agents__tools__odoo_actions__v1

  - tool_key: learn_mcp
    tool_kind: remote_mcp
    provider: microsoft
    auth_mode: entra
    approval_mode: none
    owner_repo: agents

  - tool_key: github_mcp
    tool_kind: remote_mcp
    provider: github
    auth_mode: oauth2
    approval_mode: none
    owner_repo: agents

  - tool_key: sharepoint_grounding
    tool_kind: built_in
    provider: microsoft
    auth_mode: entra
    approval_mode: none
    owner_repo: agents

  - tool_key: azure_databricks_genie
    tool_kind: remote_mcp
    provider: databricks
    auth_mode: entra
    approval_mode: policy_driven
    owner_repo: lakehouse

  - tool_key: supabase
    tool_kind: remote_mcp
    provider: supabase
    auth_mode: key
    approval_mode: policy_driven
    owner_repo: ops_platform
