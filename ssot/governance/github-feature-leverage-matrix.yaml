# -----------------------------------------------------------------------------
# Prioritized adoption ladder — top 10 actions in order
# -----------------------------------------------------------------------------
prioritized_adoption_ladder:
  - priority: 1
    action: secret_scanning_rotation
    rationale: 144-commit push-block is an active production blocker; unblock immediately
    blocks: all_push_based_work
  - priority: 2
    action: foundry_project_ipai_copilot_resource_provisioning
    rationale: go-live blocker; unlocks Copilot Autofix and Copilot secret scanning
    cross_reference: platform/ssot/ai/foundry-resource-model.yaml
  - priority: 3
    action: saml_sso_vs_emu_decision
    rationale: decide before provisioning — sets identity posture for downstream team sync and SCIM
    cross_reference: ssot/governance/github-identity-and-oauth.yaml
  - priority: 4
    action: team_sync_entra_to_github_via_scim
    rationale: depends on SAML/EMU decision; eliminates manual access management across 43+ SSOTs
  - priority: 5
    action: copilot_enterprise_enrollment
    rationale: unlocks Autofix + Copilot secret scanning + Coding Agent PR generation
    cross_reference: ssot/governance/github-enterprise-current-state-snapshot.yaml (Copilot training opt-out by 2026-04-24)
  - priority: 6
    action: codeql_confirmation_on_tier_0
    rationale: GHAS trial is active; prove coverage before trial expires (30d window)
    cross_reference: ssot/governance/github-enterprise-current-state-snapshot.yaml
  - priority: 7
    action: audit_log_streaming_to_azure_monitor
    rationale: agentic workflow security doctrine requires who-acted-when traceability
    cross_reference: CLAUDE.md §Agentic_Workflow_Security_Doctrine
  - priority: 8
    action: extend_repository_rules_to_tier_1
    rationale: tier_0 is covered; tier_1 (web, data-intelligence, agents, design, automations) needs same gates
    cross_reference: ssot/governance/repo-classes.yaml
  - priority: 9
    action: gha_billing_wired_to_azure_subscription
    rationale: doctrine requires it; no new GHA workflows until billing confirmed
    cross_reference: ssot/governance/gha-scoped-exception.yaml
  - priority: 10
    action: github_projects_to_ado_boards_sync_contract
    rationale: Issues is the engineering backlog; Projects surfacing needs a sync contract with Azure Boards portfolio authority
    cross_reference: ssot/governance/github-projects-v2-scope.yaml

# -----------------------------------------------------------------------------
# Tallies
# -----------------------------------------------------------------------------
tallies:
  by_state:
    adopted: 25
    target_state: 6
    evaluate: 13
    defer: 8
    excluded: 4
  by_leverage:
    high: 26
    medium: 14
    low: 12
    none: 4
  total_features: 56

# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not adopting every feature marked target_state at once
  - not reopening excluded features without doctrine revision
  - not tracking defer items as active work
  - not treating this matrix as a static snapshot (re-score quarterly or on feature launch)

