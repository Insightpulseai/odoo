# Databricks Asset Bundle: Lakeflow Ingestion
# Purpose: DLT/Lakeflow ingestion pipelines for Bronze layer population
# Spec: spec/databricks-bundles-foundation/

bundle:
  name: lakeflow_ingestion

include:
  - ../../shared/*.yml
  - resources/**/*.yml

sync:
  paths:
    - src

variables:
  catalog:
    default: ${var.catalog}
  bronze_schema:
    default: ${var.bronze_schema}

targets:
  dev:
    default: true
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: ipai_dev

  staging:
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: ipai_staging

  prod:
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: ipai
