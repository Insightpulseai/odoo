name: verify-ops-ssot
on:
  pull_request:
    paths:
      - 'ops/**'
      - 'ssot/**'
      - '.github/workflows/verify-ops-ssot.yml'
  push:
    branches: [ main ]
    paths:
      - 'ops/**'
      - 'ssot/**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify ops SSOT docs/scripts exist
        run: scripts/ci/verify_ops_docs.sh
