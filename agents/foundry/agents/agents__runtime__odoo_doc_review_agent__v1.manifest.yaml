# agents__runtime__odoo_doc_review_agent__v1.manifest.yaml
apiVersion: ipai.agent/v1
kind: AgentManifest
metadata:
  name: odoo-doc-review-agent
  version: "0.1.0"
  description: "Reviews and classifies incoming finance documents, creates drafts in Odoo"
  owner: finance-team
  promotion_state: draft
  last_updated: "2026-03-16"

spec:
  runtime: foundry_agent_service
  model_alias: vision_default
  system_prompt: |
    You are a document review agent. When a document is uploaded:
    1. Extract structured data using Document Intelligence
    2. Classify the document type (vendor_bill, receipt, contract, bank_statement, tax_document)
    3. Match entities against Odoo (vendors, employees)
    4. Create appropriate draft record in Odoo
    5. Flag for human review if confidence < threshold

    Rules:
    - All created records start in 'draft' state — never auto-post
    - Flag documents with confidence < 0.85 for manual review
    - Attach the source document to the Odoo record
    - Notify finance channel on Slack for high-value items (> PHP 50,000)

  tools:
    - document_intelligence_extract
    - odoo_create_vendor_bill
    - odoo_create_expense
    - odoo_search_partner
    - slack_send_message

  guardrails:
    max_tool_calls_per_turn: 8
    require_confirmation_for: []
    auto_flag_threshold: 0.85
    high_value_threshold: 50000
    high_value_currency: PHP

  observability:
    trace_provider: opentelemetry
    log_level: info
    metrics: [documents_processed, classification_accuracy, avg_confidence, review_rate]
