# ssot/secrets/inventory.yaml
# Decision-grade status inventory for all SSOT-registered secrets.
#
# SCHEMA: ssot.secrets.inventory.v1
# Complements ssot/secrets/registry.yaml — IDs must match registry keys exactly.
#
# STATUS VALUES:
#   working  — confirmed operational via evidence cited
#   stale    — confirmed non-functional (401, timeout, hash mismatch)
#   missing  — expected to exist but confirmed absent from store
#   unknown  — insufficient evidence to determine; assume working until proven otherwise
#
# EVIDENCE KINDS:
#   api_call     — direct HTTP call returned expected response
#   ssh_session  — SSH connection to host succeeded
#   psql_query   — direct database query confirmed field value set
#   ci_run       — GitHub Actions run ID shows step using secret passed
#   smtp_e2e     — end-to-end email delivery confirmed
#   edge_fn_log  — Supabase edge function log shows secret resolved
#   session_log  — CLI session output (this session stamp: 2026-03-02T00:00:00+08:00)
#
# NEVER include secret values. IDs only.
# Generated: 2026-03-02T00:00:00+08:00
# Source session: cbdf4ee25 (fix/dns-mailgun-tracking-cname-confirmed)

version: "1.0.0"
schema: ssot.secrets.inventory.v1
generated: "2026-03-02T10:00:00+08:00"
methodology: >
  Status determined from session evidence (API calls, SSH, psql) dated 2026-03-02,
  available CI run IDs, and compose-file inspection. "unknown" means no test was
  performed — do not interpret as confirmed working.
  Second pass 2026-03-02T10:00+08:00: live API calls for all 13 env-available secrets.
  Duplicate registry keys (YAML overwrites) are noted in affected entries.

