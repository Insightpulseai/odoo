# Azure OpenAI Integration — SSOT
version: "1.0.0"
schema: ssot.integrations.v1
updated_at: "2026-03-31"

integration:
  id: azure_openai
  name: "Azure OpenAI Service"
  vendor: microsoft
  status: active
  category: ai_inference

resources:
  - name: oai-ipai-dev
    type: azure_openai
    rg: rg-ipai-ai-dev
    region: eastus
  - name: ipai-copilot-resource
    type: azure_openai
    rg: rg-ipai-ai-dev
    region: eastus2
    notes: "Consolidated copilot resource, keys in kv-ipai-dev"

secrets:
  vault: kv-ipai-dev
  entries:
    - name: azure-openai-key
    - name: azure-openai-endpoint

consumers:
  - ipai_ai_copilot
  - ipai-copilot-gateway
  - agent-platform
