# =============================================================================
# SMART ↔ Execution Hierarchy Cross-Reference
# =============================================================================
# Maps SMART targets to Azure Boards execution hierarchy
boards_mapping:
  note: >
    SMART targets map to Azure Boards Epics. Each KR maps to an Issue.
    Implementation slices map to Tasks under each Issue.
    Epic: OBJ-NNN, Issue: KR-NNN.N, Tasks: design|build|validate|deploy|evidence
  epics:
    - smart_target: OBJ-001
      boards_epic: OBJ-001
      area_path: "ipai-platform\\Infrastructure"
    - smart_target: OBJ-002
      boards_epic: OBJ-002
      area_path: "ipai-platform\\Enterprise-Parity"
    - smart_target: OBJ-003
      boards_epic: OBJ-004
      area_path: "ipai-platform\\Data-Intelligence"
    - smart_target: OBJ-004
      boards_epic: OBJ-003
      area_path: "ipai-platform\\AI-Agents"
    - smart_target: OBJ-005
      boards_epic: "OBJ-008"
      area_path: "ipai-platform"
      note: "New Epic — cross-plane governance (spans all area paths)"
