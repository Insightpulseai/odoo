name: Claude Headless — Spec Kit Check

on:
  pull_request:
    paths:
      - 'spec/**'
  push:
    branches: [main]
    paths:
      - 'spec/**'
  workflow_dispatch:
    inputs:
      bundle:
        description: 'Spec bundle path (e.g. spec/pulser-odoo)'
        required: true
        default: 'spec/pulser-odoo'

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bundle:
          - spec/pulser-odoo
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Spec Kit bundle check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p .review
          BUNDLE="${{ github.event.inputs.bundle || matrix.bundle }}"
          bash agent-platform/runtimes/claude-headless/scripts/check-spec-bundle.sh \
            "$BUNDLE" \
            ".review/spec-check-$(basename $BUNDLE).json"

      - name: Upload spec check artifact
        uses: actions/upload-artifact@v4
        with:
          name: spec-check-${{ matrix.bundle }}
          path: .review/spec-check-*.json

      - name: Fail on block issues
        run: |
          for f in .review/spec-check-*.json; do
            STATUS=$(jq -r '.status' "$f")
            BLOCKS=$(jq -r '[.issues[] | select(.severity=="block")] | length' "$f")
            if [ "$STATUS" = "fail" ] || [ "$BLOCKS" -gt 0 ]; then
              echo "::error::$f failed spec check (status=$STATUS, block_issues=$BLOCKS)"
              jq '.' "$f"
              exit 1
            fi
          done
