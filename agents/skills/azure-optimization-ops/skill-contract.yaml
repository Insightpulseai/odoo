version: 1
type: ops_skill
family: azure_copilot_ops
skill:
  name: azure-optimization-ops
  status: draft
  owner: agents
  purpose: >
    Validate cost and performance optimization — SKU right-sizing,
    idle resource detection, reserved capacity evaluation, and
    autoscaling rule configuration.

  triggers:
    - monthly cost review cycle
    - stale or idle resource detection via Resource Graph
    - SKU change proposed in PR
    - scaling rule modification

  inputs:
    - resource group or subscription scope
    - Resource Graph stale_resources query results (q92)
    - Azure Advisor recommendations
    - current SKU and scaling configuration
    - 30-day usage metrics

  steps:
    - run stale_resources Resource Graph query (q92) to identify idle resources
    - check SKU compliance against platform sizing policy
    - verify autoscaling rules are configured for Container Apps
    - identify Container Apps with zero traffic in the last 30 days
    - review Azure Advisor cost recommendations
    - validate reserved capacity alignment with actual usage
    - check for orphaned disks, NICs, or public IPs
    - calculate estimated monthly savings from identified optimizations
    - produce optimization report with evidence

  outputs:
    - validation_result
    - idle_resources
    - sku_compliance
    - scaling_status
    - advisor_recommendations
    - estimated_savings
    - findings
    - blockers
    - evidence

  guardrails:
    - never downgrade SKU without stakeholder approval
    - require 30-day usage evidence before any resize recommendation
    - flag resources with zero traffic but do not auto-delete
    - never reduce reserved capacity without cost analysis
    - optimization recommendations must include rollback path

  evidence:
    required: true
    format: "docs/evidence/{stamp}/azure-ops/optimization/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - docs/contracts/azure-resource-graph-contract.md
  - ssot/runtime/resource-graph-query-catalog.yaml
  - docs/architecture/reference-benchmarks.md
