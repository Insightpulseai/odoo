name: Databricks Bundles CI

on:
  pull_request:
    paths:
      - "databricks/**"
      - "spec/databricks-bundles-foundation/**"
      - "docs/architecture/DATABRICKS_BUNDLES_BASELINE.md"
  push:
    branches: [main]
    paths:
      - "databricks/**"

jobs:
  detect:
    name: Detect changed bundles
    runs-on: ubuntu-latest
    outputs:
      foundation_python: ${{ steps.filter.outputs.foundation_python }}
      lakeflow_ingestion: ${{ steps.filter.outputs.lakeflow_ingestion }}
      sql_warehouse: ${{ steps.filter.outputs.sql_warehouse }}
      spec_or_docs: ${{ steps.filter.outputs.spec_or_docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            foundation_python:
              - "databricks/bundles/foundation_python/**"
              - "databricks/shared/**"
            lakeflow_ingestion:
              - "databricks/bundles/lakeflow_ingestion/**"
              - "databricks/shared/**"
            sql_warehouse:
              - "databricks/bundles/sql_warehouse/**"
              - "databricks/shared/**"
            spec_or_docs:
              - "spec/databricks-bundles-foundation/**"
              - "docs/architecture/DATABRICKS_BUNDLES_BASELINE.md"

  validate-foundation-python:
    name: Validate foundation_python
    needs: detect
    if: needs.detect.outputs.foundation_python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: databricks/bundles/foundation_python
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies and run tests
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest
          pytest tests/ -v

  validate-lakeflow-ingestion:
    name: Validate lakeflow_ingestion
    needs: detect
    if: needs.detect.outputs.lakeflow_ingestion == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: databricks/bundles/lakeflow_ingestion
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

  validate-sql-warehouse:
    name: Validate sql_warehouse
    needs: detect
    if: needs.detect.outputs.sql_warehouse == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: databricks/bundles/sql_warehouse
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  enforce-doc-spec-alignment:
    name: Doc and spec alignment
    needs: detect
    if: needs.detect.outputs.spec_or_docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spec kit completeness
        run: |
          for f in constitution.md prd.md plan.md tasks.md; do
            if [ ! -f "spec/databricks-bundles-foundation/$f" ]; then
              echo "FAIL: missing spec/databricks-bundles-foundation/$f"
              exit 1
            fi
          done
          echo "PASS: all spec files present"

      - name: Check architecture doc exists
        run: |
          if [ ! -f "docs/architecture/DATABRICKS_BUNDLES_BASELINE.md" ]; then
            echo "FAIL: missing docs/architecture/DATABRICKS_BUNDLES_BASELINE.md"
            exit 1
          fi
          echo "PASS: architecture doc present"

      - name: Check bundle directories match taxonomy
        run: |
          for d in foundation_python lakeflow_ingestion sql_warehouse; do
            if [ ! -d "databricks/bundles/$d" ]; then
              echo "FAIL: missing databricks/bundles/$d"
              exit 1
            fi
          done
          echo "PASS: all bundle directories present"
