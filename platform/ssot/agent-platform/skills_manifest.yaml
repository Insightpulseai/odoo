# =============================================================================
# Skills Manifest — Agent Platform SSOT
# =============================================================================
# Registry of all agent platform skills across three skill directories.
# Governs which skills are active, their impact tier, knowledge dependencies,
# and MVP gate status.
#
# Cross-references:
#   - ssot/agent-platform/knowledge_sources.yaml  (source IDs used below)
#   - ssot/agent-platform/foundry_tool_policy.yaml (tool selection rules)
#   - ssot/agent-platform/mcp_policy.yaml          (MCP tool controls)
#   - agents/skills/registry.yaml                  (legacy runtime registry, deprecated)
#
# Skill locations:
#   .github/skills/  — Benchmark gap-closure skills (MCP-integrated, evidence-gated)
#   .claude/skills/  — Claude Code runtime skills (inline agent execution)
#   agents/skills/   — Full platform skill library (264+ skills, platform runtime)
# =============================================================================

version: 1
artifact: ssot/agent-platform/skills_manifest.yaml
source_of_truth: true
profile: insightpulseai-skills-manifest

purpose:
  description: registry_of_agent_platform_skills_and_their_locations

# ---------------------------------------------------------------------------
# Skill directory map
# ---------------------------------------------------------------------------

skill_locations:
  github_skills:
    path: .github/skills/
    description: >
      Benchmark gap-closure skills for coding agents. Each skill closes a
      specific gap from the Odoo-on-Azure enterprise audit. Skills are
      evidence-gated — completion requires artifact proof in docs/evidence/.
      MCP-integrated: agents query https://learn.microsoft.com/api/mcp
      (microsoft_docs_search, microsoft_code_sample_search, microsoft_docs_fetch)
      as a mandatory second step after inspecting repo evidence.
    authority_order:
      - "1. repo_evidence (inspect exact paths listed in each SKILL.md)"
      - "2. microsoft_learn_mcp (query MCP server)"
      - "3. docs_and_specs (consult docs/, spec/, infra/ssot/)"
    evidence_path_pattern: docs/evidence/<YYYYMMDD-HHMM>/<skill-name>/

  claude_skills:
    path: .claude/skills/
    description: >
      Claude Code runtime skills. These are available to claude-code sessions
      as slash commands or invokable capabilities. Covers architecture reviews,
      governance audits, OCA module porting, identity governance, and more.
    runtime: claude_code_harness

  platform_skills:
    path: agents/skills/
    description: >
      Full agent platform skill library (264+ skills). Covers the complete
      lifecycle from agent design through deployment, monitoring, and
      tenant management. Referenced by agents registered in ssot/agents/*.yaml.
    notes: >
      agents/skills/registry.yaml is deprecated (no runtime loader).
      Skills in this directory are discovered via agents/skills/AGENTS.md
      and bound to agents in ssot/agents/*.yaml.

