# SSOT — Secrets Reference Map
# Locked: 2026-04-16
# Authority: this file tells agents WHERE config and secrets live. Never raw values.
# An agent reading this file knows the vault name, the secret IDs, and the auth posture.
# Companion: ssot/odoo/platform.contract.yaml §6
#
# RULE: This file MUST NEVER contain raw secret values. Only names and references.

schema_version: 1
last_updated: "2026-04-16"

# =============================================================================
# Secret store
# =============================================================================
secret_store:
  provider: azure_key_vault
  vault_name: kv-ipai-dev-sea
  resource_group: rg-ipai-dev-security-sea
  subscription: Microsoft Azure Sponsorship (eba824fb-332d-4623-9dfb-2c9f7ee83f4e)

# =============================================================================
# Auth posture (preferred → fallback)
# =============================================================================
auth:
  preferred_mode: managed_identity     # DefaultAzureCredential. No keys. No passwords. CLAUDE.md doctrine.
  fallback_mode: key_vault_secret      # retrieve from KV at runtime via MI binding
  forbidden:
    - hardcoded_secret_in_code         # CLAUDE.md non-negotiable #1
    - PAT_in_tracked_file              # docs/architecture/entra-app-registry-governance.md
    - client_secret_without_cert       # certificate auth preferred per Entra governance
    - env_var_in_docker_compose        # use KV secret refs, not literal env vars
    - .env_files_in_git                # .env* is gitignored; KV at runtime

# =============================================================================
# Secret references — by domain
# =============================================================================
references:

  # --- PostgreSQL ---
  postgres:
    host: pg-ipai-odoo.postgres.database.azure.com   # NOT a secret — public hostname
    port: 5432
    admin_user: ipaiadmin                              # NOT a secret — just the username
    secrets:
      - kv_name: odoo-pg-password
        purpose: Odoo app DB password (used by ipai-odoo-dev-web/worker/cron)
        consumer: ACA env var DB_PASSWORD → secretRef odoo-pg-password
      - kv_name: pg-ipai-odoo-admin-password
        purpose: PG server admin password (DDL, maintenance)
        consumer: manual / emergency use only
      - kv_name: pg-readonly-password
        purpose: read-only PG user for analytics / Fabric mirroring
        consumer: Fabric mirroring connection
      - kv_name: pg-readonly-user
        purpose: read-only PG username
        consumer: Fabric mirroring connection

  # --- Odoo ---
  odoo:
    secrets:
      - kv_name: odoo-db-password
        purpose: Odoo DB connection (legacy — may overlap with odoo-pg-password)
        consumer: verify if still needed; may be deprecated
      - kv_name: odoo-pg-host
        purpose: PG host override (currently matches postgres.host above)
        consumer: ACA env var DB_HOST
      - kv_name: odoo-pg-user
        purpose: PG user for Odoo runtime
        consumer: ACA env var DB_USER

  # --- Zoho Mail ---
  zoho:
    secrets:
      - kv_name: zoho-smtp-user
        purpose: Zoho SMTP sending user (insightpulseai.com domain)
        consumer: Odoo ir.mail_server → SMTP auth
      - kv_name: zoho-smtp-password
        purpose: Zoho SMTP password
        consumer: Odoo ir.mail_server → SMTP auth

  # --- Foundry / OpenAI ---
  foundry:
    auth_mode: managed_identity        # MI-only. No API keys for Foundry.
    notes: >
      ipai-copilot-resource uses DefaultAzureCredential via system-assigned MI.
      The Cognitive Services OpenAI User RBAC role grants inference access.
      No API keys stored in KV for Foundry. This is the gold-standard posture.

  # --- Entra / OAuth ---
  entra:
    notes: >
      Entra app registrations use certificate auth (not client secrets) per
      docs/architecture/entra-app-registry-governance.md.
      OIDC federated identity (ipai-github-oidc) uses no secret at all.
      Per-app cert rotation tracked in that governance doc.

  # --- Deprecated secrets (do not use) ---
  deprecated:
    - kv_name: n8n-db-password
      reason: n8n deprecated 2026-04-07
    - kv_name: supabase-pg-meta-crypto-key
      reason: Supabase deprecated 2026-03-26
    - kv_name: supabase-realtime-db-enc-key
      reason: Supabase deprecated 2026-03-26

# =============================================================================
# Rules
# =============================================================================
rules:
  - "This file MUST NEVER contain raw secret values"
  - "All secrets stored in Azure Key Vault (kv-ipai-dev-sea); no other secret stores"
  - "Managed Identity is preferred auth; KV secrets are fallback"
  - "Agent code MUST NOT hardcode secrets — use DefaultAzureCredential or KV SecretClient"
  - "Deprecated secrets should be deleted from KV on the next quarterly audit"
  - "New secrets require a PR adding a reference entry here before the secret is created in KV"
