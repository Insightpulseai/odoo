version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-upgrade-safe-extension
  status: active
  owner: agents
  build_order: 6
  lane: maintainability
  purpose: >
    Ensure all module changes use inheritance-based patterns and are safe
    across Odoo version upgrades. Validates that no core or OCA files are
    modified, migration scripts exist for schema changes, and dependencies
    are explicit and minimal.

  triggers:
    - module review or audit for upgrade safety
    - PR modifies models, views, or data files
    - version upgrade planning (e.g. 18.0 to 19.0)
    - new module added to install baseline

  inputs:
    - module_path
    - changes_description (what was modified and why)

  steps:
    - verify all model extensions use _inherit (not copy-paste)
    - verify no files modified under vendor/odoo/ or addons/oca/
    - verify all view changes use inherited views with xpath (not replacement)
    - check for migration scripts in migrations/ for any schema changes
    - verify __manifest__.py version follows 19.0.x.y.z
    - verify dependencies are explicit and minimal
    - check for deprecated patterns (raw x2many tuples, context mutation, f-string translations)
    - verify Odoo 19 breaking changes handled (groups_id renamed to group_ids, tree to list)
    - run upgrade_code tool if porting from 18.0
    - produce upgrade safety report

  outputs:
    - safety_assessment (safe/unsafe with reasons)
    - inheritance_audit (list of _inherit usages)
    - migration_scripts_status
    - deprecated_patterns_found
    - evidence

  guardrails:
    - never modify files under vendor/odoo/
    - never modify files under addons/oca/ — create ipai_* override instead
    - never copy OCA files into addons/ipai/ — use _inherit
    - schema changes require migration scripts in migrations/ directory
    - use Command tuples for x2many (not raw tuples)
    - use with_context() (never mutate env.context)
    - use lazy translation _() with positional args (never f-strings)
    - Odoo 19: groups_id is renamed to group_ids
    - Odoo 19: tree view type is renamed to list in user-facing contexts
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-upgrade-safe-extension/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo19-coding.md
  - .claude/rules/oca-governance.md
