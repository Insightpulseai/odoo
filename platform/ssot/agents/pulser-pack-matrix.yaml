version: 1
system: pulser
default_runtime_repo: agent-platform
default_definition_repo: agents
default_binding_repo: platform
core:
  pack_id: pulser_core
  kind: core
  owns:
    - context_resolution
    - actor_resolution
    - tenant_resolution
    - branch_resolution
    - environment_resolution
    - contact_resolution
    - session_memory
    - policy_engine
    - hook_engine
    - tool_registry
    - audit_logging
    - telemetry
    - judge_runner
  runtime_components:
    - context_resolver
    - persona_router
    - task_router
    - policy_engine
    - hook_lifecycle
    - tool_runner
    - judge_runner
    - session_store
    - audit_event_sink
shared_role_packs:
  - pack_id: strategy_pack
    kind: shared_role
    repo: agents
    personas:
      - platform_strategist
      - solution_advisor
    tasks:
      - explain_capabilities
      - compare_options
      - summarize_strategy
    judges:
      - grounding_judge
      - policy_judge
    tools:
      - docs_retrieval
      - platform_metadata_read
  - pack_id: product_pack
    kind: shared_role
    repo: agents
    personas:
      - product_architect
      - workflow_designer
    tasks:
      - define_scope
      - propose_workflow
      - summarize_requirements
    judges:
      - grounding_judge
      - policy_judge
    tools:
      - docs_retrieval
      - platform_metadata_read
  - pack_id: engineering_pack
    kind: shared_role
    repo: agents
    personas:
      - engineering_advisor
      - integration_architect
    tasks:
      - explain_architecture
      - propose_integration
      - summarize_runtime_state
    judges:
      - grounding_judge
      - release_readiness_judge
    tools:
      - docs_retrieval
      - runtime_metadata_read
  - pack_id: marketing_pack
    kind: shared_role
    repo: agents
    personas:
      - campaign_assistant
      - copy_assistant
    tasks:
      - draft_copy
      - summarize_offer
      - adapt_message
    judges:
      - brand_judge
      - safe_public_response_judge
    tools:
      - cms_read
      - asset_catalog_read
  - pack_id: sales_pack
    kind: shared_role
    repo: agents
    personas:
      - sales_assistant
      - qualification_assistant
    tasks:
      - qualify_lead
      - summarize_account
      - draft_followup
    judges:
      - customer_value_judge
      - policy_judge
    tools:
      - crm_read
      - notifications
  - pack_id: support_pack
    kind: shared_role
    repo: agents
    personas:
      - support_concierge
      - case_assistant
    tasks:
      - answer_question
      - route_user
      - summarize_case
    judges:
      - grounding_judge
      - policy_judge
    tools:
      - docs_retrieval
      - case_read
      - notifications
  - pack_id: project_management_pack
    kind: shared_role
    repo: agents
    personas:
      - project_coordinator
      - delivery_assistant
    tasks:
      - summarize_project
      - identify_blockers
      - draft_status
    judges:
      - grounding_judge
      - policy_judge
    tools:
      - project_read
      - task_read
      - notifications
domain_packs:
  - pack_id: pulser_platform
    kind: domain
    repo: agents
    surfaces:
      - www.insightpulseai.com
    personas:
      - platform_strategist
      - product_architect
      - support_concierge
      - solution_advisor
    tasks:
      - explain_capabilities
      - route_user
      - summarize_platform_state
      - draft_solution_response
    judges:
      - grounding_judge
      - platform_policy_judge
      - brand_judge
      - release_readiness_judge
    tools:
      - docs_retrieval
      - platform_metadata_read
    mutation_policy: read_only
    split_reason: flagship_platform_surface
  - pack_id: pulser_w9studio
    kind: domain
    repo: agents
    surfaces:
      - www.w9studio.net
    personas:
      - studio_sales_assistant
      - booking_coordinator
      - client_support_agent
      - creative_brief_assistant
    tasks:
      - qualify_lead
      - answer_booking_questions
      - draft_followup
      - summarize_client_request
    judges:
      - brand_judge
      - customer_value_judge
      - safe_public_response_judge
    tools:
      - crm_read
      - notifications
      - scheduling_optional
    mutation_policy: guarded_write
    split_reason: commercial_branch_surface
  - pack_id: pulser_prismalab_research
    kind: domain
    repo: agents
    surfaces:
      - prismalab.insightpulseai.com
    personas:
      - research_screener
      - evidence_extractor
      - synthesis_assistant
      - methods_reviewer
    tasks:
      - classify_document
      - extract_evidence
      - compare_studies
      - generate_cited_summary
    judges:
      - grounding_judge
      - citation_judge
      - evidence_quality_judge
      - research_policy_judge
      - responsible_ai_judge
    tools:
      - doc_ingest
      - retrieval
      - extraction
      - citation_export
    mutation_policy: read_only
    split_reason: evidence_heavy_specialized_domain
  - pack_id: pulser_erp
    kind: domain
    repo: agents
    surfaces:
      - erp.insightpulseai.com
    personas:
      - erp_operator
      - project_ops_coordinator
    tasks:
      - inspect_object_state
      - summarize_order_or_project
      - prepare_safe_action
    judges:
      - erp_mutation_guard_judge
      - branch_context_judge
      - policy_judge
    tools:
      - odoo_read
      - guarded_odoo_write
    mutation_policy: guarded_write
    split_reason: transactional_backoffice_surface
  - pack_id: pulser_finance
    kind: domain
    repo: agents
    surfaces:
      - erp.insightpulseai.com
      - www.insightpulseai.com
    personas:
      - finance_ops_assistant
      - invoice_analyst
      - reconciliation_assistant
    tasks:
      - summarize_receivables
      - summarize_payables
      - explain_invoice
      - stage_reconciliation
    judges:
      - finance_correctness_judge
      - policy_judge
      - grounding_judge
      - branch_context_judge
    tools:
      - accounting_read
      - payment_read
      - guarded_finance_actions
    mutation_policy: guarded_write
    split_reason: finance_risk_and_ontology
  - pack_id: pulser_identity_ops
    kind: domain
    repo: agents
    surfaces:
      - www.insightpulseai.com
    personas:
      - identity_operations_advisor
      - guest_access_coordinator
    tasks:
      - summarize_identity_state
      - classify_identity
      - draft_access_recommendation
    judges:
      - identity_policy_judge
      - policy_judge
      - responsible_ai_judge
    tools:
      - entra_read
      - identity_audit_read
    mutation_policy: read_only
    split_reason: privileged_identity_domain
  - pack_id: pulser_asset_ops
    kind: domain
    repo: agents
    surfaces:
      - erp.insightpulseai.com
      - mobile_companion (future)
    personas:
      - asset_operator
      - kit_coordinator
      - booking_coordinator
      - custodian
    tasks:
      - register_asset
      - compose_kit
      - reserve_resource
      - checkout_kit
      - checkin_kit
      - record_custody_event
      - flag_damage_or_maintenance
      - produce_utilization_summary
    judges:
      - policy_judge
      - branch_context_judge
      - grounding_judge
    tools:
      - odoo_read
      - guarded_odoo_write
      - barcode_scan_ingest
      - mobile_scan_companion_bridge
    mutation_policy: guarded_write
    split_reason: production_asset_operations_distinct_ontology_and_mobile_surface
    entities:
      - asset
      - asset_kit
      - booking
      - checkout
      - checkin
      - custody_event
      - room_resource
      - maintenance_event
      - scan_event
    mvp_includes:
      - asset_master
      - barcode_qr_labels
      - scan_based_checkout_checkin
      - reservations_calendar
      - room_studio_booking
      - loaning_borrower_tracking
      - damage_in_repair_flag
      - mobile_scan_return_companion
    deferred:
      - rfid
      - complex_warehouse_routing
      - advanced_predictive_maintenance
      - global_multi_site_optimization
      - deep_utilization_analytics_beyond_basic_dashboards
  - pack_id: pulser_expense_mobile_companion
    kind: domain
    repo: agents
    surfaces:
      - mobile_companion
    personas:
      - expense_submitter
      - cash_advance_requester
      - approval_manager
    tasks:
      - capture_receipt_photo
      - upload_supporting_docs
      - run_ocr_extraction
      - review_extracted_fields
      - submit_expense_or_cash_advance
      - monitor_reimbursement_or_advance_status
      - manager_approve_reject_request_changes
      - receive_overdue_or_missing_evidence_alerts
    judges:
      - finance_correctness_judge
      - grounding_judge
      - policy_judge
      - responsible_ai_judge
    tools:
      - mobile_camera_capture
      - ocr_foundry_pipeline
      - accounting_read
      - guarded_finance_actions
      - push_notifications
    mutation_policy: guarded_write
    split_reason: mobile_native_workflow_narrow_companion
    scope_rule: >
      Narrow mobile companion ONLY. Not a full mobile ERP. Not a
      broad multi-domain mobile launch. Not a broad Pulser mobile shell.
    includes:
      - receipt_capture
      - ocr_submission
      - expense_draft_review
      - cash_advance_status
      - approval_actions
      - push_notifications
    excludes:
      - full_backoffice_erp
      - full_databricks_authoring
      - broad_multi_domain_workflows
judges:
  - judge_id: grounding_judge
    kind: shared
    repo: agents
    contract:
      requires_citations: true
      blocks_on_missing_evidence: true
  - judge_id: citation_judge
    kind: domain
    repo: agents
    contract:
      requires_citations: true
      validates_reference_format: true
  - judge_id: evidence_quality_judge
    kind: domain
    repo: agents
    contract:
      requires_structured_evidence: true
      blocks_on_low_confidence: true
  - judge_id: finance_correctness_judge
    kind: domain
    repo: agents
    contract:
      validates_finance_terms: true
      blocks_unsafe_mutations: true
  - judge_id: erp_mutation_guard_judge
    kind: domain
    repo: agents
    contract:
      requires_guarded_write_policy: true
      blocks_unapproved_side_effects: true
  - judge_id: branch_context_judge
    kind: domain
    repo: agents
    contract:
      validates_branch_trade_name_scope: true
  - judge_id: platform_policy_judge
    kind: shared
    repo: agents
    contract:
      validates_surface_policy: true
  - judge_id: brand_judge
    kind: shared
    repo: agents
    contract:
      validates_brand_tone: true
  - judge_id: customer_value_judge
    kind: shared
    repo: agents
    contract:
      validates_customer_clarity: true
  - judge_id: safe_public_response_judge
    kind: shared
    repo: agents
    contract:
      validates_public_safe_content: true
  - judge_id: release_readiness_judge
    kind: shared
    repo: agents
    contract:
      validates_operational_readiness: true
  - judge_id: research_policy_judge
    kind: domain
    repo: agents
    contract:
      validates_research_workflow_rules: true
  - judge_id: identity_policy_judge
    kind: domain
    repo: agents
    contract:
      validates_identity_governance_rules: true
  - judge_id: responsible_ai_judge
    kind: shared
    repo: agents
    contract:
      requires_risk_assessment_for_sensitive_actions: true
      requires_auditability_for_guarded_workflows: true
      requires_human_review_for_high_risk_outputs: true
      validates_least_privilege_tool_usage: true
hook_events:
  - SessionStart
  - UserPromptSubmit
  - PreToolUse
  - PostToolUse
  - PreCompact
  - SubagentStart
  - SubagentStop
  - Stop
