id: q-learning-baseline-design
version: 1
status: active
classification: capability_uplift
owner: policy-optimization-engineer
benchmark_source: "HF Deep RL Course — Q-Learning"
implementation_source: "Custom implementation / SB3 docs"

purpose: >
  Design tabular Q-learning agents as RL baselines for problems with
  discrete state and action spaces small enough for table representation.

inputs:
  - name: environment
    type: string
    required: true
    description: "Gymnasium environment ID with discrete spaces"
  - name: state_space_size
    type: integer
    required: true
    description: "Number of discrete states"
  - name: action_space_size
    type: integer
    required: true
    description: "Number of discrete actions"

outputs:
  - name: q_table
    type: numpy.ndarray
    shape: "[state_space_size, action_space_size]"
    description: "Trained Q-table"
  - name: hyperparameters
    type: dict
    description: "Learning rate, discount factor, epsilon schedule"
  - name: training_curve
    type: list
    description: "Episode returns over training"

constraints:
  - "State space must be discrete and enumerable"
  - "Action space must be discrete"
  - "State space size should be < 10,000 for practical tabular Q-learning"
  - "Q-table initialized to zeros or small random values"

hyperparameters:
  learning_rate:
    default: 0.7
    range: [0.01, 1.0]
    decay: "Optional linear or exponential decay"
  discount_factor:
    default: 0.95
    range: [0.9, 0.999]
  epsilon_start:
    default: 1.0
  epsilon_end:
    default: 0.05
  epsilon_decay:
    default: 0.0005
    description: "Per-episode decay rate"
  n_episodes:
    default: 10000
    range: [1000, 1000000]
