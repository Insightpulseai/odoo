name: kb_agent_capability
description: Agent roles, skill registries, eval results, and autonomy tier assignments
domain: agent_capability
sources:
  - type: ssot_yaml
    path: agents/registry/agents.yaml
  - type: ssot_yaml
    path: agents/knowledge/registry.yaml
  - type: eval_results
    path: agents/evals/
    glob: "*.yaml"
  - type: ssot_yaml
    path: infra/ssot/agents/skills.yaml
index_name: diva_agent_capability
refresh_schedule: "0 */12 * * *"  # Every 12 hours
access_policy:
  read: [diva_orchestrator, diva_judge, agent_reviewer]
  write: [diva_collector]
