# Azure Developer CLI (azd) service mapping for InsightPulseAI platform.
#
# This file maps application services to Azure resources for azd-compatible
# provisioning and deployment workflows.
#
# IMPORTANT: This file is an azd manifest, NOT the canonical resource inventory.
# The SSOT for Azure resources is: ssot/azure/resources.yaml
# This file defers to that SSOT for resource names, states, and existence.
#
# Usage:
#   azd init    (already initialized — this file exists)
#   azd up      (provision + deploy)
#   azd deploy  (deploy only, resources must exist)
#
# Spec: spec/azure-target-state/
# SSOT: ssot/azure/resources.yaml
# Constitution: spec/azure-target-state/constitution.md

name: insightpulseai-platform
metadata:
  template: insightpulseai/odoo@latest
  owner: platform-engineering
  purpose: azd service-to-resource mapping for InsightPulseAI Azure workloads
  status: bootstrap-complete
  prerequisite_phase: 0
  ssot_spec: spec/azure-target-state/plan.md
  notes: >
    This manifest is not canonical inventory. Resource existence and state
    are tracked in ssot/azure/resources.yaml. Services listed here are
    gated by Phase 0 landing zone completion (RGs, Key Vault, Log Analytics).

services:
  # ── Odoo ERP (Container App) ─────────────────────────────────────────────
  odoo:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./docker/Dockerfile
      context: .
    config:
      port: 8069
      targetPort: 8069
    metadata:
      phase: 1
      depends_on:
        - rg-ipai-agents-dev
        - cae-ipai-dev
        - cripaidev

  # ── MCP Plane Server (Container App) ─────────────────────────────────────
  mcp-plane:
    project: ./mcp/servers/plane
    language: ts
    host: containerapp
    config:
      port: 3000
    metadata:
      phase: 1
      depends_on:
        - rg-ipai-agents-dev
        - cae-ipai-dev
        - cripaidev

  # ── MCP Coordinator (Container App) ──────────────────────────────────────
  mcp-coordinator:
    project: ./mcp/servers/coordinator
    language: ts
    host: containerapp
    config:
      port: 3001
    metadata:
      phase: 1
      depends_on:
        - rg-ipai-agents-dev
        - cae-ipai-dev
        - cripaidev

  # ── Supabase Self-Hosted (Azure VM + Docker Compose) ────────────────────
  # Replaces managed Supabase project spdtwktxdalcfigzeqrz.
  # SSOT: ssot/azure/supabase.yaml
  supabase:
    project: ./infra/azure/supabase
    language: docker
    host: vm
    docker:
      path: ./infra/azure/supabase/docker-compose.supabase.yml
    config:
      port: 8000
      targetPort: 8000
    metadata:
      phase: 1
      target_url: https://supabase.insightpulseai.com
      ssot: ssot/azure/supabase.yaml
      deployment_model: azure-vm-docker-compose
      vm_name: vm-ipai-supabase-dev
      vm_size: Standard_B2ms
      depends_on:
        - rg-ipai-agents-dev
        - kv-ipai-dev
      notes: >
        Self-hosted Supabase stack on Azure VM. 12 services via Docker Compose.
        Secrets in Azure Key Vault kv-ipai-dev. Deploy via infra/azure/supabase/deploy.sh.

  # ── Odoo Worker (Container App, no ingress) ──────────────────────────
  odoo-worker:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./docker/Dockerfile
      context: .
    metadata:
      phase: 1
      ingress: false
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev
        - cripaidev

  # ── Odoo Cron (Container App, no ingress) ────────────────────────────
  odoo-cron:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./docker/Dockerfile
      context: .
    metadata:
      phase: 1
      ingress: false
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev
        - cripaidev

  # ── Auth / Keycloak (Container App) ──────────────────────────────────
  auth:
    project: ./infra/azure/auth
    language: java
    host: containerapp
    config:
      port: 8080
    metadata:
      phase: 1
      notes: Keycloak (transitional → Entra ID)
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev

  # ── OCR Service (Container App) ──────────────────────────────────────
  ocr:
    project: ./infra/azure/ocr
    language: python
    host: containerapp
    config:
      port: 8000
    metadata:
      phase: 2
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev

  # ── Superset BI (Container App) ──────────────────────────────────────
  superset:
    project: ./infra/azure/superset
    language: python
    host: containerapp
    config:
      port: 8088
    metadata:
      phase: 2
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev
        - pg-ipai-dev

  # ── Plane Project Management (Container App) ─────────────────────────
  plane:
    project: ./infra/azure/plane
    language: python
    host: containerapp
    config:
      port: 3000
    metadata:
      phase: 2
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev

  # ── CRM Service (Container App) ──────────────────────────────────────
  crm:
    project: ./infra/azure/crm
    language: python
    host: containerapp
    config:
      port: 8000
    metadata:
      phase: 2
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev

  # ── Shelf Service (Container App) ────────────────────────────────────
  shelf:
    project: ./infra/azure/shelf
    language: python
    host: containerapp
    config:
      port: 8000
    metadata:
      phase: 2
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev

  # ── Website (Container App) ──────────────────────────────────────────
  website:
    project: ./infra/azure/website
    language: ts
    host: containerapp
    config:
      port: 3000
    metadata:
      phase: 2
      depends_on:
        - rg-ipai-dev
        - cae-ipai-dev

# ── Infrastructure ─────────────────────────────────────────────────────────
infra:
  provider: bicep
  path: ./infra/azure
  module: ./infra/azure/platform/main.bicep

# ── CI/CD Pipeline ─────────────────────────────────────────────────────────
pipeline:
  provider: github
