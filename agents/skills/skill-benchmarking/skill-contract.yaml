version: 1
name: skill-benchmarking
description: "Run benchmark comparisons between skill versions and manage eval lifecycle"
type: benchmark_skill
skill_classification: capability_uplift
owner_persona: skill-eval-judge
source_family: anthropic_skill_authoring
status: active

triggers:
  - "benchmark skill versions"
  - "compare skill performance"
  - "skill regression check"
  - "eval lifecycle management"

inputs:
  - skill_name: "Skill to benchmark"
  - eval_suite: "Eval test cases"
  - baseline_version: "Previous version results"
  - current_version: "Current version to test"

steps:
  - id: run_evals
    action: "Execute eval suite with parallel clean-context agents"
  - id: collect_metrics
    action: "Gather pass rate, execution time, token consumption"
  - id: compare
    action: "Compare current vs. baseline (A/B if available)"
  - id: lifecycle_check
    action: "Check if capability evals should graduate to regression"
  - id: refresh_check
    action: "Check if regression suite needs harder challenges"

outputs:
  - pass_rate: "Current pass rate with confidence interval"
  - comparison: "Delta from baseline"
  - lifecycle_action: "graduate_to_regression | refresh_challenges | no_action"
  - report: "Benchmark report with evidence"

guardrails:
  - "Use parallel clean-context agents for uncontaminated evaluation"
  - "Never compare results from different context conditions"
  - "Graduate saturated capability evals to regression suites"

benchmark_source: "https://claude.com/blog/improving-skill-creator-test-measure-and-refine-agent-skills"
