# =============================================================================
# Reusable Job: Deploy to Azure Container Apps
# =============================================================================
# Updates a Container App with a new image and verifies the revision is active.
#
# Usage:
#   jobs:
#     - template: templates/jobs/deploy-containerapp.yml
#       parameters:
#         containerAppName: ipai-website-dev
#         resourceGroup: rg-ipai-dev-odoo-runtime
#         imageName: ipai-website
#         imageTag: latest
# =============================================================================

parameters:
  - name: containerAppName
    type: string
  - name: resourceGroup
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
    default: latest
  - name: acrName
    type: string
    default: acripaiodoo
  - name: serviceConnection
    type: string
    default: ipai-dev-wif

jobs:
  - job: DeployContainerApp
    displayName: 'Deploy ${{ parameters.containerAppName }}'
    pool:
      vmImage: ubuntu-latest
    steps:
      - task: AzureCLI@2
        displayName: 'Update Container App revision'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            IMAGE="${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:${{ parameters.imageTag }}"
            SUFFIX="build-$(Build.BuildId)"
            APP="${{ parameters.containerAppName }}"
            RG="${{ parameters.resourceGroup }}"

            echo "=== Deploy Container App ==="
            echo "App: ${APP}"
            echo "Image: ${IMAGE}"
            echo "Revision suffix: ${SUFFIX}"

            az containerapp update \
              --name "${APP}" \
              --resource-group "${RG}" \
              --image "${IMAGE}" \
              --revision-suffix "${SUFFIX}" \
              --output none

            echo "Waiting for revision to activate..."
            sleep 30

            # Verify revision is running
            ACTIVE_REVISIONS=$(az containerapp revision list \
              --name "${APP}" \
              --resource-group "${RG}" \
              --query "[?properties.active].name" -o tsv | wc -l)

            echo "Active revisions: ${ACTIVE_REVISIONS}"

            FQDN=$(az containerapp show \
              --name "${APP}" \
              --resource-group "${RG}" \
              --query "properties.configuration.ingress.fqdn" -o tsv)

            echo "##vso[task.setvariable variable=appFqdn;isOutput=true]${FQDN}"
            echo "PASS: Deployed ${APP} with image ${IMAGE}"
          name: deploy
