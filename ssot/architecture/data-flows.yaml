version: 1
status: active
id: core_data_flows

flows:
  - id: business_to_data
    source: odoo
    targets:
      - adls
      - databricks
      - fabric
    purpose:
      - analytics
      - governed_reporting
      - ml_features

  - id: documents_to_structured
    source:
      - inbound_documents
      - pdf_forms
      - invoices
      - receipts
    processor:
      - azure_document_intelligence
      - logic_apps
      - azure_functions
    targets:
      - odoo
      - adls
      - foundry_agents

  - id: data_to_agents
    source:
      - databricks
      - fabric_semantic_outputs
      - curated_business_records
    targets:
      - foundry_agents
    purpose:
      - grounded_assistance
      - planning
      - analysis
      - recommendation

  - id: control_to_runtime
    source:
      - azure_boards
      - github
      - azure_pipelines
      - repo_ssot
    targets:
      - workload_runtimes
      - foundry_runtime
    purpose:
      - release
      - governance
      - promotion

  - id: live_inventory_reconciliation
    source:
      - azure_resource_graph
    targets:
      - repo_ssot
      - runtime_evidence
    purpose:
      - drift_detection
      - reconciliation
      - audit
