version: "1.0.0"
naming_convention: "ipai-<service>-<env>"
environments: [dev, staging, prod]

local_dev:
  required:
    - name: insightpulse-devcontainer
      role: "Main coding container"
      contents: [python, node, odoo-tooling, git, linters, dev-shell]
    - name: insightpulse-dev-db
      role: "Local PostgreSQL sidecar"
      engine: postgresql
      version: "16"
  optional:
    - name: insightpulse-dev-redis
      role: "Cache"
      trigger: "cache-dependent features"
    - name: insightpulse-dev-ocr
      role: "OCR service"
      trigger: "document processing"
    - name: insightpulse-dev-mailcatcher
      role: "Mail sink (Mailpit)"
      trigger: "email flows"
    - name: insightpulse-dev-mcp
      role: "MCP server"
      trigger: "MCP integrations"
    - name: insightpulse-dev-n8n
      role: "Automation"
      trigger: "workflow triggers"
  default_container_count: 2

azure_runtime:
  total_runtime_units: 10
  services:
    # Core Odoo (4 units)
    - name: ipai-odoo-web
      type: app
      role: "Odoo HTTP/RPC server"
      repo_owner: odoo
      health_endpoint: "/web/health"
      ingress: true
      lifecycle: persistent

    - name: ipai-odoo-worker
      type: app
      role: "Async worker (longpolling, cron offload)"
      repo_owner: odoo
      health_endpoint: "/web/health"
      ingress: false
      lifecycle: persistent

    - name: ipai-odoo-cron
      type: app
      role: "Scheduled actions runner"
      repo_owner: odoo
      health_endpoint: "/web/health"
      ingress: false
      lifecycle: persistent

    - name: ipai-odoo-init
      type: job
      role: "Module install/upgrade (deploy-time only)"
      repo_owner: odoo
      ingress: false
      lifecycle: ephemeral
      note: "Runs on deploy, not persistent in production"

    # Platform Services (6 units)
    - name: ipai-auth
      type: app
      role: "Authentication gateway (Keycloak)"
      repo_owner: infra
      health_endpoint: "/health"
      ingress: true
      lifecycle: persistent

    - name: ipai-mcp
      type: app
      role: "MCP server coordinator"
      repo_owner: infra
      health_endpoint: "/health"
      ingress: true
      lifecycle: persistent

    - name: ipai-n8n
      type: app
      role: "Workflow automation"
      repo_owner: infra
      health_endpoint: "/healthz"
      ingress: true
      lifecycle: persistent

    - name: ipai-ocr
      type: app
      role: "Document OCR processing"
      repo_owner: infra
      health_endpoint: "/health"
      ingress: false
      lifecycle: persistent

    - name: ipai-superset
      type: app
      role: "BI dashboards (Apache Superset)"
      repo_owner: infra
      health_endpoint: "/health"
      ingress: true
      lifecycle: persistent

    - name: ipai-plane
      type: app
      role: "Project management (Plane.so)"
      repo_owner: infra
      health_endpoint: "/api/health"
      ingress: true
      lifecycle: persistent

  managed_services:
    - name: postgresql
      provider: "Azure Database for PostgreSQL Flexible Server"
      note: "Not a container in production"
    - name: redis
      provider: "Azure Cache for Redis"
      note: "Only if cache-dependent features require it"

prohibited_names:
  - "odoo-web"
  - "odoo-core"
  - "odoo-dev"
  - "ipai-nginx"
  - "postgres"  # Must use explicit role naming
