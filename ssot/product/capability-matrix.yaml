key_principle: >
  Do not compete with Odoo 19 on raw native feature count.
  Compete on better workflow visibility, better control-tower intelligence,
  better guided assistance, better finance/compliance operating experience.

source_inspirations:
  sap_afc: SAP Advanced Financial Closing — calendarized close orchestration
  sap_tax_compliance: SAP Tax Compliance — rule/check cockpit
  joule: SAP Joule — plain-language finance guidance
  odoo19_tax_return: Odoo 19 tax return + PH localization
  odoo19_payment: Odoo 19 payment flow enhancements
  odoo19_ph_localization: Odoo 19 PH BIR format/export improvements
  avatax: Avalara AvaTax — compliance/tax-control expectations
  notion: Notion 3.0 — workspace/agent/search patterns
  clarity: Broadcom Clarity PPM — phases/milestones/OKR
  databricks_control_tower: Databricks operational intelligence pattern
