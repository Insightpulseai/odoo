# CRM — Transactional Benchmark Scenarios
# Capability class: transactional (state-changing business actions)

scenarios:
  - id: "BM-CRM-T-001"
    domain: crm
    capability_class: transactional
    persona: sales_rep
    prompt: "Create a new opportunity for ACME Corp worth $50,000 in the Q2 pipeline"
    setup:
      seed_records:
        - model: res.partner
          values: { name: "ACME Corp", is_company: true }
    expected_behavior:
      type: create
      model: crm.lead
      fields:
        partner_id: "ACME Corp"
        expected_revenue: 50000
        type: "opportunity"
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [crm, create, opportunity]

  - id: "BM-CRM-T-002"
    domain: crm
    capability_class: transactional
    persona: sales_mgr
    prompt: "Mark opportunity 'ACME Corp Q2 Deal' as won with a revenue of $48,000"
    setup:
      seed_records:
        - model: crm.lead
          values: { name: "ACME Corp Q2 Deal", type: "opportunity", expected_revenue: 50000 }
    expected_behavior:
      type: action
      model: crm.lead
      method: action_set_won_rainbowman
      fields:
        stage_id: "Won"
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [crm, stage-change, won]

  - id: "BM-CRM-T-003"
    domain: crm
    capability_class: transactional
    persona: sales_rep
    prompt: "Schedule a call activity for tomorrow on the ACME Corp opportunity"
    setup:
      seed_records:
        - model: crm.lead
          values: { name: "ACME Corp Follow-up", type: "opportunity" }
    expected_behavior:
      type: create
      model: mail.activity
      fields:
        activity_type_id: "Phone Call"
        res_model: "crm.lead"
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [crm, activity, schedule]
