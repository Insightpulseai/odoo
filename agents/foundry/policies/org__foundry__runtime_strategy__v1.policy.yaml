version: 1
namespace: ipai.org.foundry.runtime_strategy.v1
artifact_type: policy
repo_key: org
domain: foundry
subject: runtime_strategy

# ============================================================================
# FOUNDRY RUNTIME STRATEGY
# ============================================================================
# Defines which repo owns what in the Foundry platform.
# Agent Service is the canonical hosted agent runtime.
# ============================================================================

runtime:
  canonical: agent_service
  description: >
    Microsoft Foundry Agent Service is the canonical hosted agent runtime.
    It provides built-in tool orchestration, structured traces, evaluations,
    Entra/RBAC, and bring-your-own resources.

repo_ownership:
  agents:
    role: primary_foundry_developer_repo
    owns:
      - agent definitions (manifests)
      - tool configurations
      - knowledge bindings
      - evaluation datasets
      - routing policies
      - publish rules

  ops_platform:
    role: registry_and_control_plane
    owns:
      - project registry
      - agent registry
      - tool registry
      - knowledge registry
      - evaluation registry
      - promotion registry
      - model registry
      - connection registry

  infra:
    role: provisioning_and_security
    owns:
      - Foundry resource provisioning (Terraform/Bicep)
      - networking and VNet configuration
      - identity and RBAC
      - diagnostics and monitoring
      - deployment inventory

  web:
    role: operator_ui
    owns:
      - ops console (traces, evaluations, agent playground)
      - dashboard surfacing

  lakehouse:
    role: data_and_analytics
    owns:
      - eval datasets (source of truth)
      - telemetry exports
      - retrieval and business metrics

  odoo:
    role: business_tools
    owns:
      - Odoo action adapters (ipai_* modules)
      - approval-safe Odoo action tools

  automations:
    role: workflow_glue
    owns:
      - n8n workflows that trigger/consume agents
      - webhook handlers

# ============================================================================
# SDK ROUTING (CANONICAL)
# ============================================================================

sdk_routing:
  foundry_sdk:
    use_for:
      - agent creation and versioning
      - evaluations
      - tracing
      - Foundry-native operations
    package: "azure-ai-projects>=2.0.0b4"

  openai_sdk:
    use_for:
      - direct model calls only
    package: "openai"

  agent_framework:
    use_for:
      - local or code-defined multi-agent orchestration
    package: "azure-ai-agentserver-agentframework"

  foundry_tools_sdk:
    use_for:
      - Document Intelligence
      - Speech
      - Vision
      - Language
      - Content Safety

# ============================================================================
# TEMPLATE POLICY
# ============================================================================

template_policy:
  templates_are_bootstrap_only: true
  do_not_deploy_tutorial_code_to_prod: true
  preview_packages_blocked_in_prod: true

  template_to_repo_mapping:
    "Get started with AI agents": agents
    "Deploy your AI application in production": infra
    "Get Started with AI Chat": web
    "Create a multi-agent Release Manager Assistant": ops_platform
    "Multi-modal content processing": odoo  # document-heavy flows
    "Agentic applications for unified data foundation": lakehouse
