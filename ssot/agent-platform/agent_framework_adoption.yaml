# =============================================================================
# Microsoft Agent Framework (MAF) Adoption — SSOT
# =============================================================================
# Authority: canonical decision that Microsoft Agent Framework is the runtime
#            substrate of agent-platform/. Python-first src-layout package.
#            Foundry is the default model/provider lane. Odoo, Databricks,
#            Document Intelligence, storage, and communications are tool
#            adapters under src/agent_platform/tools/.
# Related:   docs/architecture/agent-framework-adoption.md
#            agent-platform/spec/agent-platform-runtime/
#            agent-platform/ssot/runtime/
#            CLAUDE.md invariant #10a
# =============================================================================

schema_version: "2.0"
last_updated: "2026-04-19"
supersedes: "1.0 (same day — superseded by canonical target tree)"
owner: "platform-architecture"
status: canonical

# -----------------------------------------------------------------------------
# Decision
# -----------------------------------------------------------------------------
decision:
  framework: microsoft/agent-framework
  placement_repo: agent-platform/
  package_layout: src_layout
  package_import_name: agent_platform
  language_primary: python
  language_secondary_allowed: dotnet
  build_tool: uv
  dependency_manifest: pyproject.toml + uv.lock

  placement_rule: >
    MAF runtime code lives ONLY in agent-platform/. It MUST NOT be imported by
    agents/, odoo/, platform/, infra/, or data-intelligence/. Those repos
    consume orchestrated capability via A2A envelopes or HTTP contracts.

# -----------------------------------------------------------------------------
# Canonical repo responsibility model
# -----------------------------------------------------------------------------
responsibility_model:

  agent_platform_repo:
    path: agent-platform/
    owns:
      - runtime_engine
      - orchestration_supervisor_router_planner_handoffs
      - session_state
      - retrieval_execution
      - model_provider_integration_foundry_first
      - tool_adapters_odoo_databricks_docintel_storage_comms
      - eval_runtime
      - telemetry_metrics_audit
      - security_authz_pii_content_filters_secrets
    does_not_own:
      - persona_or_prompt_text
      - judge_criteria_text
      - eval_fixture_data
      - skill_registry_metadata
      - mailbox_user_identity_logic

  agents_repo:
    path: agents/
    owns:
      - personas
      - system_prompts
      - judge_prompt_contracts
      - eval_scenario_definitions
      - tool_metadata
      - maturity_and_policy_metadata
    does_not_own:
      - runtime_code
      - framework_imports
      - execution_loops

  platform_repo:
    path: platform/
    owns:
      - tenant_metadata
      - app_bindings
      - environment_configuration_registry
      - secret_references
      - feature_flags

  odoo_repo:
    path: addons/
    owns:
      - erp_runtime
      - business_data
      - odoo_module_surfaces
      - agent_consumable_apis

# -----------------------------------------------------------------------------
# Canonical target tree for agent-platform/ (Python-first src-layout)
# -----------------------------------------------------------------------------
target_tree:
  agent-platform:
    root_files:
      - README.md
      - pyproject.toml
      - uv.lock
      - .env.example
      - .python-version
    github_workflows_scope_exception_only:
      - .github/workflows/ci.yml                # lint + unit tests (scoped exception)
      - .github/workflows/contract-checks.yml   # PR-only SSOT contract validation
    azure_pipelines_canonical:
      - azure-pipelines.yml                     # main deploy lane
      - azure-pipelines-pr.yml                  # PR validation
      - azure-pipelines-eval-gate.yml           # eval-gate promotion
    docs:
      architecture:
        - RUNTIME_OVERVIEW.md
        - TOOL_ADAPTER_MODEL.md
        - IDENTITY_AND_AUTH.md
        - SESSION_MODEL.md
        - OBSERVABILITY.md
      runbooks:
        - LOCAL_DEV.md
        - DEPLOYMENT.md
        - ROLLBACK.md
        - INCIDENT_RESPONSE.md
      evidence: {}
    spec:
      agent-platform-runtime:
        - constitution.md
        - prd.md
        - plan.md
        - tasks.md
    ssot:
      runtime:
        - services.yaml
        - agents.yaml
        - tools.yaml
        - models.yaml
        - sessions.yaml
        - environments.yaml
      security:
        - auth_policy.yaml
        - role_bindings.yaml
        - allowed_tools.yaml
      eval:
        - gates.yaml
        - scenarios.yaml
        - score_thresholds.yaml
    src:
      agent_platform:
        root:
          - __init__.py
          - config.py
          - logging.py
          - settings.py
          - main.py
        api:
          - __init__.py
          - health.py
          - chat.py
          - sessions.py
          - attachments.py
          - admin.py
        runtime:
          - __init__.py
          - engine.py
          - registry.py
          - loader.py
          - lifecycle.py
          - graph_builder.py
          - middleware.py
          - checkpointing.py
        orchestration:
          - __init__.py
          - router.py
          - planner.py
          - supervisor.py
          - handoffs.py
          - human_in_loop.py
          - policies.py
        providers:
          foundry:
            - __init__.py
            - client.py
            - auth.py
            - models.py
            - embeddings.py
          fallback:
            - __init__.py
            - null_provider.py
        tools:
          root:
            - __init__.py
            - base.py
            - registry.py
            - contracts.py
            - validators.py
          odoo:
            - __init__.py
            - client.py
            - auth.py
            - sales.py
            - accounting.py
            - crm.py
            - documents.py
          databricks:
            - __init__.py
            - sql.py
            - jobs.py
            - unity_catalog.py
          docintel:
            - __init__.py
            - extract.py
            - classify.py
          storage:
            - __init__.py
            - blobs.py
            - artifacts.py
          communications:
            - __init__.py
            - email.py
            - notifications.py
        retrieval:
          - __init__.py
          - ingestion.py
          - chunking.py
          - indexing.py
          - reranking.py
          - grounding.py
          - citations.py
        attachments:
          - __init__.py
          - pipeline.py
          - normalization.py
          - mime.py
          - virus_scan.py
        sessions:
          - __init__.py
          - store.py
          - memory.py
          - transcripts.py
          - state_machine.py
        evals:
          - __init__.py
          - runner.py
          - fixtures.py
          - assertions.py
          - scorecards.py
          - report.py
        observability:
          - __init__.py
          - tracing.py
          - metrics.py
          - correlation.py
          - audit.py
        security:
          - __init__.py
          - authz.py
          - tenant_policy.py
          - pii.py
          - secrets.py
