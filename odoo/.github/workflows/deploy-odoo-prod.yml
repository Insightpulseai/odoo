name: Deploy Odoo Prod (upgrade module)

on:
  push:
    branches: [ main ]
    paths:
      - "addons/ipai/**"
      - "scripts/deploy_odoo_upgrade.sh"
      - ".github/workflows/deploy-odoo-prod.yml"
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to deploy (comma separated)'
        required: true
        default: 'ipai_studio_ai'
      action:
        description: 'Action to perform'
        required: true
        default: 'upgrade'
        type: choice
        options:
        - upgrade
        - install

concurrency:
  group: odoo-prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment:
      name: odoo-production
      url: https://erp.insightpulseai.com
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ODOO_PROD_HOST }}
          username: ${{ secrets.ODOO_PROD_USER }}
          key: ${{ secrets.ODOO_PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            # Server repo path: /opt/odoo/repo (verified via SSH)
            TARGET_DIR="${{ secrets.ODOO_REPO_PATH || '/opt/odoo/repo' }}"

            echo "Deploying to $TARGET_DIR"
            cd "$TARGET_DIR" || { echo "Directory $TARGET_DIR not found"; exit 1; }

            git fetch --all
            git stash --include-untracked || true
            git checkout main
            git pull --ff-only
            git stash pop || true
            chmod +x scripts/deploy_odoo_upgrade.sh

            # Determine params from inputs or defaults
            MODULES="${{ github.event.inputs.modules || 'ipai_studio_ai' }}"
            ACTION="${{ github.event.inputs.action || 'upgrade' }}"

            # Run the upgrade script
            ODOO_CONTAINER=odoo-prod \
            ODOO_DB=${{ secrets.ODOO_PROD_DB }} \
            ODOO_MODULES="$MODULES" \
            ODOO_ACTION="$ACTION" \
            scripts/deploy_odoo_upgrade.sh

            # --- POST-DEPLOY MARKERS ---
            echo "::group::Details"
            echo "SHA=$(git rev-parse --short HEAD)"

            echo ">>> Container Status"
            docker ps --filter "name=odoo-prod" --format "CONTAINER={{.Names}} STATUS={{.Status}}"

            echo ">>> Recent Logs (Verification)"
            # Check for success/error signals in recent logs
            docker logs --tail=50 odoo-prod 2>&1 | grep -E "Initiating shutdown|Ready|loaded|Traceback|ERROR" || true
            echo "::endgroup::"

      - name: Emit deployment.completed event
        if: success()
        uses: ./.github/actions/emit-ops-event
        with:
          topic: deployment
          payload: |
            {
              "system": "odoo-modules",
              "environment": "production",
              "status": "completed",
              "version": "${{ github.sha }}",
              "metadata": {
                "modules": "${{ github.event.inputs.modules || 'ipai_studio_ai' }}",
                "action": "${{ github.event.inputs.action || 'upgrade' }}",
                "actor": "${{ github.actor }}"
              }
            }
          supabase_url: ${{ secrets.SUPABASE_URL }}
          ops_ingest_secret: ${{ secrets.OPS_INGEST_HMAC_SECRET }}

      - name: Emit deployment.failed event
        if: failure()
        uses: ./.github/actions/emit-ops-event
        with:
          topic: deployment
          payload: |
            {
              "system": "odoo-modules",
              "environment": "production",
              "status": "failed",
              "version": "${{ github.sha }}",
              "metadata": {
                "modules": "${{ github.event.inputs.modules || 'ipai_studio_ai' }}",
                "action": "${{ github.event.inputs.action || 'upgrade' }}",
                "actor": "${{ github.actor }}"
              }
            }
          supabase_url: ${{ secrets.SUPABASE_URL }}
          ops_ingest_secret: ${{ secrets.OPS_INGEST_HMAC_SECRET }}
