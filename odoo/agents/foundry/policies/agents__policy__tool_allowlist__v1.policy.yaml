version: 1
namespace: ipai.agents.foundry.tool_allowlist.v1
artifact_type: policy
repo_key: agents
domain: foundry
subject: tool_allowlist

# ============================================================================
# TOOL ALLOWLIST POLICY
# ============================================================================
# Only org-approved tools may be attached to agents.
# New tools require approval + entry in this allowlist before use.
# ============================================================================

approved_tools:

  # --- Knowledge Grounding ---
  knowledge:
    - tool_id: learn_mcp
      kind: remote_mcp
      auth_mode: anonymous
      server_url: https://learn.microsoft.com/api/mcp
      approval_mode: always
      approved_for: [knowledge_assistants, docs_agents]

    - tool_id: sharepoint_grounding
      kind: built_in
      auth_mode: entra
      approval_mode: policy_driven
      approved_for: [enterprise_agents, policy_agents]

    - tool_id: azure_ai_search
      kind: built_in
      auth_mode: managed_identity
      approval_mode: none
      approved_for: [retrieval, knowledge_assistants]

  # --- Developer / Delivery ---
  developer:
    - tool_id: github_mcp
      kind: remote_mcp
      auth_mode: entra
      server_url: https://api.githubcopilot.com/mcp
      approval_mode: always
      approved_for: [coding_agents, sre_agents]

    - tool_id: azure_devops_mcp
      kind: remote_mcp
      auth_mode: entra
      approval_mode: always
      approved_for: [ci_cd_agents, release_agents]

    - tool_id: foundry_mcp
      kind: remote_mcp
      auth_mode: entra
      approval_mode: always
      approved_for: [platform_agents]

  # --- Data ---
  data:
    - tool_id: azure_postgres
      kind: custom
      auth_mode: managed_identity
      approval_mode: none
      approved_for: [data_agents, odoo_agents]

    - tool_id: databricks_genie
      kind: remote_mcp
      auth_mode: entra
      approval_mode: policy_driven
      approved_for: [analytics_agents, reporting_agents]

    - tool_id: supabase
      kind: custom
      auth_mode: key
      approval_mode: none
      approved_for: [platform_agents, ops_agents]

  # --- Azure Estate ---
  azure:
    - tool_id: azure_mcp
      kind: remote_mcp
      auth_mode: entra
      approval_mode: always
      approved_for: [infra_agents, sre_agents]

  # --- Business Systems ---
  business:
    - tool_id: odoo_actions
      kind: custom
      auth_mode: key  # XML-RPC credentials via Key Vault
      approval_mode: policy_driven
      approved_for: [odoo_copilot, finance_agents, hr_agents]
      note: "Use ipai_* adapter modules, not raw XML-RPC"

  # --- Built-in Agent Service Tools ---
  built_in:
    - tool_id: web_search
      kind: built_in
      approval_mode: none
      approved_for: [all_agents]

    - tool_id: code_interpreter
      kind: built_in
      approval_mode: policy_driven
      approved_for: [coding_agents, data_agents]

    - tool_id: file_search
      kind: built_in
      approval_mode: none
      approved_for: [all_agents]

# ============================================================================
# RULES
# ============================================================================

rules:
  require_allowlist_entry: true
  block_unapproved_mcp_servers: true
  block_unapproved_openapi_tools: true
  require_auth_mode_declared: true
  require_approval_mode_declared: true
  log_all_tool_calls_to_traces: true
