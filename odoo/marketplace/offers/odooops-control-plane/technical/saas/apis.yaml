# API surface for marketplace integration

fulfillment:
  # Microsoft SaaS Fulfillment API v2 integration
  resolve_url: https://marketplaceapi.microsoft.com/api/saas/subscriptions/resolve
  activate_url: https://n8n.insightpulseai.com/webhook/marketplace-activate
  webhook_url: https://n8n.insightpulseai.com/webhook/marketplace-webhook

  operations:
    - resolve
    - activate
    - change_plan
    - change_quantity
    - suspend
    - reinstate
    - unsubscribe

metering:
  # Usage-based metering for Professional/Enterprise plans
  dimensions:
    - id: ai_queries
      unit: query
      description: AI copilot queries
    - id: ocr_pages
      unit: page
      description: OCR processed pages
    - id: active_users
      unit: user
      description: Monthly active users

  reporting_frequency: hourly
  batch_endpoint: https://marketplaceapi.microsoft.com/api/batchUsageEvent

authentication:
  type: azure_ad_app
  tenant_id: TBD
  client_id: TBD
  scopes:
    - 20e940b3-4c77-4b0b-9a53-9e16a1b010a7/.default
