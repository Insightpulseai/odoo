# =============================================================================
# Evidence Policy
# =============================================================================
evidence_policy:
  required_types:
    - pull_request
    - ci_pass
    - repository_file
    - test_output
    - runtime_screenshot
    - portal_inventory_snapshot
    - validation_log
  rule: >
    No key result may be marked complete without at least one evidence mapping.

# =============================================================================
# Risks
# =============================================================================
risks:
  - id: RISK-001
    description: Foundry state can diverge from repos if not mirrored
    likelihood: high
    impact: high
    mitigation: Maintain repo-backed inventories and manifests

  - id: RISK-002
    description: Capabilities may drift into the wrong repo or layer
    likelihood: high
    impact: high
    mitigation: Enforce ownership boundaries through SSOT and CI

  - id: RISK-003
    description: Status may be overstated without artifact-backed evidence
    likelihood: medium
    impact: medium
    mitigation: Require evidence index mapping for key results

  - id: RISK-004
    description: Advanced features may be added before grounding and evaluation maturity
    likelihood: medium
    impact: medium
    mitigation: Gate advanced features behind evaluation and contract readiness

# =============================================================================
# SPATRES Analysis
# =============================================================================
spatres:
  scope:
    - 10 active repositories with defined boundaries
    - Azure AI Foundry project with agent, models, tools, guardrails
    - Azure Databricks workspace for governed data intelligence
    - Odoo CE 19 as ERP system of record
  people:
    - Solo developer covering 5 roles at fractional capacity
    - Platform governance and AI platform as primary focus areas
  artifacts:
    - SSOT YAML files for ownership, inventories, and strategy
    - Repo-backed agent manifests and evaluation scaffolds
    - CI validators for governance drift detection
  timeline:
    - "Q2 2026: Ownership codification and Foundry repo-backing"
    - "Q2/Q3 2026: Databricks AI contracts and evidence-backed reporting"
  risks:
    - Portal-only drift if Foundry state is not mirrored
    - Ownership ambiguity without enforced boundaries
    - Narrative-only reporting without evidence backing
    - Premature expansion before evaluation maturity
  environments:
    - GitHub (source control, CI/CD)
    - Azure (Foundry, Databricks, ACA, Front Door, Key Vault)
    - Self-hosted Odoo CE 19
  success:
    - All repos have codified boundaries enforced by CI
    - Foundry state fully mirrored in repo-backed inventories
    - Databricks AI contracts source-controlled with clear ownership
    - Strategy status derived from evidence, not narrative
