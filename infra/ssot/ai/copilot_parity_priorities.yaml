# schema: ssot.ai.copilot_parity_priorities.v1
# Prioritized AI copilot capabilities for Odoo 18 CE IPAI deployment.
# Referenced by: spec/ai-copilot/prd.md, ssot/ai/odoo_ai_mapping.yaml
# Gate: capabilities must reach "active" status before production enablement.

version: 1
meta:
  owner: platform
  purpose: "Prioritized capability registry for AI copilot parity — P0 ship-blocking, P1 next sprint, P2 strategic."
  reference_models:
    - id: notion_ai
      name: "Notion AI / Notion Agents"
      key_capabilities: [agent_runtime, knowledge_sources, workspace_integration]
    - id: m365_copilot
      name: "Microsoft 365 Copilot"
      key_capabilities: [pervasive_sidebar, governed_tool_use, cross_app_context, proactive_insights]
    - id: sap_joule
      name: "SAP Joule"
      key_capabilities: [natural_language_query, action_execution, erp_context_awareness]
    - id: kapa_ai
      name: "Kapa AI"
      key_capabilities: [citation_first_rag, knowledge_base_indexing, confidence_scoring]
    - id: github_copilot
      name: "GitHub Copilot (coding agent)"
      key_capabilities: [issue_to_pr, code_generation, autonomous_agent_loop]
  odoo_baseline:
    mapping: "ssot/ai/odoo_ai_mapping.yaml"
    native_capabilities: [ask_ai, ai_agents, topics_tools, sources_rag, live_chat_ai]
    note: "Odoo 18 EE-only; CE has zero native AI. All capabilities must be provided by ipai_* modules."

priorities:

  # ── P0: Ship-blocking ─────────────────────────────────────────────────────
  # Must be complete and validated before production AI enablement.
  P0:
    - id: citation-first-knowledge-copilot
      reference: kapa_ai
      description: >
        Every grounded answer must cite its source with provenance (doc ID, chunk ID, URL).
        Ungrounded responses must be explicitly gated and labeled.
        Citation faithfulness validated by eval harness.
      acceptance:
        - "eval/knowledge_copilot_eval.yaml passes with >= 95% citation coverage"
        - "Citation present in 100% of RAG-augmented responses"
        - "Ungrounded responses labeled with confidence < threshold"
      depends_on:
        - "addons/ipai/ipai_ai_rag"
        - "ssot/knowledge/corpus_registry.yaml"
        - "addons/ipai/ipai_ai_core (ipai.ai.citation model)"
      owner: platform
      status: planned

    - id: governed-tool-use-contract
      reference: [m365_copilot, sap_joule]
      description: >
        All state-changing tools follow preview->approval->commit contract.
        Each tool has a formal spec doc. Action correctness validated by eval harness.
      acceptance:
        - "contracts/tools/TOOL_SPEC_TEMPLATE.md exists and populated for each active tool"
        - "eval/action_eval.yaml passes for all write tools"
        - "ipai.copilot.tool.requires_confirmation enforced for write category"
      depends_on:
        - "addons/ipai/ipai_ai_copilot (ipai.copilot.tool model)"
        - "addons/ipai/ipai_agent (ipai.agent.policy model)"
        - "contracts/tools/TOOL_SPEC_TEMPLATE.md"
      owner: platform
      status: partial
      notes: "Confirmation gate exists in ipai_ai_copilot. Formal spec template and eval harness missing."

    - id: agent-runtime-run-ledger
      reference: notion_agents
      description: >
        Every agent run is tracked with full lifecycle: queued->running->succeeded/failed.
        Runs include idempotency keys, HMAC auth, evidence logs, duration tracking.
      acceptance:
        - "ipai.agent.run records all executions with state lifecycle"
        - "duration_seconds computed and available in pivot views"
        - "evidence_log populated for completed runs"
        - "Idempotency guard prevents duplicate runs within 300-second window"
      depends_on:
        - "addons/ipai/ipai_agent (agent_run.py)"
      owner: platform
      status: active
      notes: "Fully implemented. 30 tests in test_agent.py. State machine, HMAC, governance policies all active."

    - id: context-engineering-rules
      reference: anthropic_best_practices
      description: >
        System prompt construction follows deterministic rules. Context window managed
        with session truncation (50 turns). Bridge payload construction tested.
      acceptance:
        - "spec/ai-copilot/constitution.md rules 1-10 enforced"
        - "Session truncation at 50 turns verified"
        - "bridge_payload() includes system prompt + tools + context + history"
      depends_on:
        - "addons/ipai/ipai_ai_copilot/controllers/copilot.py"
        - "spec/ai-copilot/constitution.md"
      owner: platform
      status: active
      notes: "Constitution has 10 non-negotiable rules. Session model enforces 50-turn FIFO."

    - id: read-only-default-safety
      reference: odoo_ask_ai
      description: >
        Agents default to read-only. Write operations require explicit tool registration
        with requires_confirmation=True and user approval in the UI.
      acceptance:
        - "No write operation executes without confirmation dialog"
        - "Tools with category=read do not show confirmation"
        - "Tools with category=write always show confirmation"
        - "eval/action_eval.yaml:read_only_default passes"
      depends_on:
        - "addons/ipai/ipai_ai_copilot (copilot_tool.py)"
      owner: platform
      status: active
      notes: "Confirmation gate implemented. 14 tools categorized: 6 read (no confirm), 8 write (require confirm)."

  # ── P1: Next sprint ───────────────────────────────────────────────────────
  # High value, scheduled after P0 gates pass.
  P1:
    - id: coding-agent-issue-to-pr
      reference: github_copilot
      harness_policy: "ssot/evals/swebench_harness_policy.yaml"
      description: >
        Autonomous agent that reads a GitHub issue, generates implementation,
        runs tests, and opens a PR. Sandboxed execution with human approval gate.
        Follows SWE-bench-style harness: explore→plan→implement→verify loop.
      acceptance:
        - "Agent creates branch from issue"
        - "Generated code passes lint + existing tests"
        - "PR opened with structured description"
        - "Human approval required before merge"
        - "Tests-first: test written/strengthened before code change when feasible"
        - "Verify loop enforced: agent runs tests before marking complete"
        - "Evidence pack emitted: docs/evidence/agent_runs/<run_id>/"
      depends_on:
        - "addons/ipai/ipai_agent (agent runtime)"
        - "GitHub Actions CI"
        - "ssot/evals/swebench_harness_policy.yaml"
      owner: platform
      status: planned

    - id: proactive-insight-engine
      reference: m365_copilot
      description: >
        Cron-driven analysis surfaces business insights (overdue invoices, low stock,
        deals closing, pending approvals) without user asking.
      acceptance:
        - "ipai.copilot.insight records created by daily cron"
        - "Insights tab shows 3+ alerts on sidebar open"
        - "Each insight has category, priority, actionable link"
      depends_on:
        - "addons/ipai/ipai_ai_copilot (copilot_insight.py, cron)"
      owner: platform
      status: partial
      notes: "Cron and insight model exist. Eval coverage and quality scoring missing."

    - id: natural-language-query
      reference: sap_joule
      description: >
        Query any ERP data in plain English. Natural language -> Odoo domain + fields ->
        search_read() under user permissions -> formatted results.
      acceptance:
        - "search_records tool handles free-text queries"
        - "Results respect ir.rule and ir.model.access"
        - "Top 5 results returned with summary"
      depends_on:
        - "addons/ipai/ipai_ai_copilot (search_records tool)"
      owner: platform
      status: partial
      notes: "search_records tool exists but relies on AI to construct domain. No dedicated NLQ engine."

    - id: multi-provider-routing
      reference: ipai_differentiator
      description: >
        Route AI requests to optimal provider based on cost, quality, and latency.
        Supports OpenAI, Anthropic, Google, Ollama, Supabase Edge.
      acceptance:
        - "ipai.ai.provider model supports 5 provider types"
        - "Default provider per company enforced"
        - "Usage stats tracked (requests, latency, tokens)"
        - "Fallback on provider failure"
      depends_on:
        - "addons/ipai/ipai_ai_core (ai_provider.py)"
        - "ssot/ai/odoo_ai.yaml (provider config)"
      owner: platform
      status: partial
      notes: "Provider model exists with stats tracking. Routing strategy (cost/quality/latency) not yet implemented."

  # ── P2: Strategic ──────────────────────────────────────────────────────────
  # Longer-term capabilities for competitive differentiation.
  P2:
    - id: predictive-analytics
      reference: ipai_differentiator
      description: >
        AI predicts cash flow, inventory demand, lead scoring, payment delay, churn risk.
        Cron-driven engines produce ipai.ai.prediction records linked to copilot insights.
      acceptance:
        - "At least 2 prediction engines producing scored predictions"
        - "Predictions visible in copilot insights tab"
      depends_on:
        - "addons/ipai/ipai_ai_predict (to be created)"
      owner: platform
      status: planned

    - id: workspace-live-erp-views
      reference: notion_ai
      description: >
        Notion-like workspace with live ERP data views. Block-based pages can embed
        real-time Odoo data (pipeline, revenue charts, AI analysis).
      acceptance:
        - "ipai.workspace.page supports database_view block type"
        - "Live data renders from Odoo search_read"
      depends_on:
        - "addons/ipai/ipai_workspace_core"
      owner: platform
      status: planned

    - id: voice-transcription
      reference: m365_copilot
      description: >
        Transcribe voice input to text for copilot interaction. External provider
        (Whisper API or similar).
      acceptance:
        - "Voice input button in copilot sidebar"
        - "Transcription accuracy >= 90%"
      depends_on:
        - "External voice transcription API"
      owner: platform
      status: planned

    - id: ai-field-generation
      reference: odoo_ee_studio
      description: >
        AI generates field values (summaries, translations, classifications)
        based on record context. Replaces Odoo EE AI Fields (Studio).
      acceptance:
        - "At least 3 field types supported (summary, translation, classification)"
        - "Field generation respects record-level permissions"
      depends_on:
        - "addons/ipai/ipai_ai_fields (to be created)"
      owner: platform
      status: planned
