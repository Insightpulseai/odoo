name: Agent Deployments Hardening Gates
on: [push]
jobs:
  validate-deployments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: npm install -g ajv-cli
      - run: ajv validate -s ssot/deployments/agents/deployment_contract.schema.json
      - run: grep "single_writer_supervisor" infra/agents/manifests/foundry-supervisor.yaml
      - run: grep "timeoutSeconds" infra/agents/manifests/task-router.yaml
