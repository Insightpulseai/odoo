version: 1
type: ops_skill
family: azure_sample_azd
skill:
  name: azure-cli-resource-operations
  status: draft
  owner: azure-cli-admin
  purpose: >
    Execute granular Azure resource operations via Azure CLI. Covers resource
    CRUD, diagnostics, log queries, configuration changes, and maintenance tasks.
    Use only when azd is insufficient for the task.

  triggers:
    - resource inventory or compliance check needed
    - diagnostics or log query required
    - individual resource configuration change
    - maintenance operation (scaling, restart, cert rotation)
    - post-deployment verification requiring granular queries

  inputs:
    - resource type and name
    - resource group
    - operation type (query, create, update, delete, diagnose)
    - output format preference (json, table, tsv)

  steps:
    - verify azd cannot accomplish the task (tool selection guardrail)
    - identify correct az CLI command group and subcommand
    - construct command with correct resource group and resource name
    - execute with structured output format
    - capture evidence in structured format
    - verify operation result

  outputs:
    - command executed with full output
    - structured result (JSON or table)
    - evidence for audit trail
    - verification of operation success

  guardrails:
    - use Azure CLI only when azd is insufficient
    - always use structured output (--output json or --output table)
    - destructive operations require explicit justification
    - prefer Azure Resource Graph for inventory queries
    - log queries must use time-bounded ranges
    - never expose secrets in command output or logs
