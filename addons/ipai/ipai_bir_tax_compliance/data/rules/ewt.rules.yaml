---
# Expanded Withholding Tax (EWT) Rules for Philippines
# ATC codes per BIR RR 11-2018 Annex (official format: WI/WC/WB prefix)
# Pattern: PayrollEngine rules DSL with JSONLogic + ATC code matching
# Formula: base * rate (rate looked up from ATC table)
#
# Migration note (2025.2): ATC codes migrated from short-form (W010, W157)
# to BIR official format (WI010, WC010) per RR 11-2018 Annex.

rules:
  # Professional fees - Individuals (VAT-registered or gross > PHP 3M)
  - code: EWT_PROF_WI010
    name: Professional fees - individuals, VAT or >3M (ATC WI010)
    description: 10% EWT on professional fees paid to VAT-registered individuals or those with gross income > PHP 3M
    priority: 100
    tax_type: ewt
    atc_code: WI010

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WI010"]
        - "==": [{"var": "vendor_type"}, "PROFESSIONAL"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WI010
    rate_value: 0.10
    formula: "base * rate"

    output_bucket: EWT_PROF_WI010

    notes: "10% creditable withholding on professional fees to individuals (VAT-registered or >3M). RR 11-2018."

  # Professional fees - Individuals (non-VAT, gross ≤ PHP 3M)
  - code: EWT_PROF_WI011
    name: Professional fees - individuals, non-VAT ≤3M (ATC WI011)
    description: 5% EWT on professional fees paid to non-VAT individuals with gross income ≤ PHP 3M
    priority: 100
    tax_type: ewt
    atc_code: WI011

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WI011"]
        - "==": [{"var": "vendor_type"}, "PROFESSIONAL"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WI011
    rate_value: 0.05
    formula: "base * rate"

    output_bucket: EWT_PROF_WI011

    notes: "5% creditable withholding on professional fees to non-VAT individuals ≤ PHP 3M. RR 11-2018."

  # Professional fees - Juridical
  - code: EWT_PROF_WI020
    name: Professional fees - juridical (ATC WI020)
    description: 10% EWT on professional fees paid to corporations
    priority: 100
    tax_type: ewt
    atc_code: WI020

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WI020"]
        - "==": [{"var": "vendor_type"}, "PROFESSIONAL"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WI020
    rate_value: 0.10
    formula: "base * rate"

    output_bucket: EWT_PROF_WI020

    notes: "10% creditable withholding on professional fees to corporations. RR 11-2018."

  # Medical practitioners
  - code: EWT_PROF_WI030
    name: Professional fees - medical practitioners (ATC WI030)
    description: 10% EWT on fees paid to doctors, dentists, etc.
    priority: 100
    tax_type: ewt
    atc_code: WI030

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WI030"]
        - "in": [{"var": "vendor_type"}, ["PROFESSIONAL", "MEDICAL"]]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WI030
    rate_value: 0.10
    formula: "base * rate"

    output_bucket: EWT_PROF_WI030

    notes: "10% creditable withholding on medical professional fees. RR 11-2018."

  # Lawyers
  - code: EWT_PROF_WI040
    name: Professional fees - lawyers (ATC WI040)
    description: 10% EWT on legal fees
    priority: 100
    tax_type: ewt
    atc_code: WI040

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WI040"]
        - "==": [{"var": "vendor_type"}, "PROFESSIONAL"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WI040
    rate_value: 0.10
    formula: "base * rate"

    output_bucket: EWT_PROF_WI040

    notes: "10% creditable withholding on legal professional fees. RR 11-2018."

  # Contractors - Individuals (2%)
  - code: EWT_CONTRACTOR_WC010
    name: Income payments to contractors - individuals (ATC WC010)
    description: 2% EWT on payments to individual contractors
    priority: 100
    tax_type: ewt
    atc_code: WC010

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WC010"]
        - "==": [{"var": "vendor_type"}, "SUPPLIER"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WC010
    rate_value: 0.02
    formula: "base * rate"

    output_bucket: EWT_CONTRACTOR_WC010

    notes: "2% creditable withholding on contractor payments (individuals). RR 11-2018."

  # Contractors - Juridical (2%)
  - code: EWT_CONTRACTOR_WC020
    name: Income payments to contractors - juridical (ATC WC020)
    description: 2% EWT on payments to corporate contractors
    priority: 100
    tax_type: ewt
    atc_code: WC020

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WC020"]
        - "==": [{"var": "vendor_type"}, "SUPPLIER"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WC020
    rate_value: 0.02
    formula: "base * rate"

    output_bucket: EWT_CONTRACTOR_WC020

    notes: "2% creditable withholding on contractor payments (juridical). RR 11-2018."

  # Government purchases - Goods (1%)
  - code: EWT_GOVT_WC600
    name: Government money payments - goods (ATC WC600)
    description: 1% EWT on government procurement of goods
    priority: 100
    tax_type: ewt
    atc_code: WC600

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WC600"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WC600
    rate_value: 0.01
    formula: "base * rate"

    output_bucket: EWT_GOVT_WC600

    notes: "1% creditable withholding on government procurement of goods. RR 11-2018."

  # Government purchases - Services (2%)
  - code: EWT_GOVT_WC610
    name: Government money payments - services (ATC WC610)
    description: 2% EWT on government procurement of services
    priority: 100
    tax_type: ewt
    atc_code: WC610

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WC610"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WC610
    rate_value: 0.02
    formula: "base * rate"

    output_bucket: EWT_GOVT_WC610

    notes: "2% creditable withholding on government procurement of services. RR 11-2018."

  # Commissions - Individuals
  - code: EWT_COMMISSION_WC100
    name: Commissions - individuals (ATC WC100)
    description: 10% EWT on commissions paid to individual agents
    priority: 100
    tax_type: ewt
    atc_code: WC100

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WC100"]
        - "in": [{"var": "vendor_type"}, ["AGENT", "INDIVIDUAL"]]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WC100
    rate_value: 0.10
    formula: "base * rate"

    output_bucket: EWT_COMMISSION_WC100

    notes: "10% creditable withholding on commissions (individuals). RR 11-2018."

  # Rent - Real property (individuals)
  - code: EWT_RENT_WB010
    name: Rent - real property, individuals (ATC WB010)
    description: 5% EWT on rental payments for real property to individuals
    priority: 100
    tax_type: ewt
    atc_code: WB010

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WB010"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WB010
    rate_value: 0.05
    formula: "base * rate"

    output_bucket: EWT_RENT_WB010

    notes: "5% creditable withholding on real property rent (individuals). RR 11-2018."

  # Rent - Real property (juridical)
  - code: EWT_RENT_WB020
    name: Rent - real property, juridical (ATC WB020)
    description: 5% EWT on rental payments for real property to juridical persons
    priority: 100
    tax_type: ewt
    atc_code: WB020

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WB020"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WB020
    rate_value: 0.05
    formula: "base * rate"

    output_bucket: EWT_RENT_WB020

    notes: "5% creditable withholding on real property rent (juridical). RR 11-2018."

  # Rent - Personal property
  - code: EWT_RENT_WB050
    name: Rent - personal property (ATC WB050)
    description: 5% EWT on rental payments for personal property (>PHP 10K/yr)
    priority: 100
    tax_type: ewt
    atc_code: WB050

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "==": [{"var": "atc_code"}, "WB050"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WB050
    rate_value: 0.05
    formula: "base * rate"

    output_bucket: EWT_RENT_WB050

    notes: "5% creditable withholding on personal property rent (>PHP 10K/yr). RR 11-2018."

  # Aggregation rule
  - code: EWT_TOTAL
    name: Total EWT withheld
    description: Sum of all expanded withholding tax amounts
    priority: 200
    tax_type: ewt

    condition:
      always: true

    formula: |
      SUM(
        EWT_PROF_WI010, EWT_PROF_WI011, EWT_PROF_WI020,
        EWT_PROF_WI030, EWT_PROF_WI040,
        EWT_CONTRACTOR_WC010, EWT_CONTRACTOR_WC020,
        EWT_GOVT_WC600, EWT_GOVT_WC610,
        EWT_COMMISSION_WC100,
        EWT_RENT_WB010, EWT_RENT_WB020, EWT_RENT_WB050
      )

    output_bucket: EWT_TOTAL

    notes: "Total creditable expanded withholding tax"

metadata:
  version: 2.0.0
  effective_from: "2025-01-01"
  legal_basis:
    - "NIRC Section 57"
    - "RR 2-98 (Consolidated Withholding Tax Regulations)"
    - "RR 11-2018 (TRAIN Law EWT implementation)"
    - "RR 14-2018 (EWT amendments)"
  breaking_changes:
    - "ATC codes migrated from short-form (W010, W157, W169) to BIR official format (WI010, WC010, WB010) per RR 11-2018 Annex"
    - "Added WI011 (5% for non-VAT individuals ≤ PHP 3M)"
    - "Separated contractor codes (WC010/WC020) from supplier goods/services"
    - "Added government procurement codes (WC600/WC610)"
    - "Split rent into individual (WB010) and juridical (WB020) + personal property (WB050)"
  notes: |
    EWT rules match transactions to ATC codes and apply creditable withholding rates.
    These amounts are reported on BIR Form 1601-E (Monthly) or 1601-EQ (Quarterly).
