version: 1
name: sap-btp-azure-integration
status: draft
owner: agents
type: benchmark_skill

purpose: >
  Extract identity provider, SSO, and integration patterns from SAP BTP
  on Azure guidance for translation to the actual Entra + Odoo + Foundry
  integration model.

triggers:
  - identity provider integration design
  - SSO architecture for multi-service platform
  - integration pattern selection for ERP + AI + automation
  - user asks about BTP integration patterns

inputs:
  - current identity architecture
  - integration topology
  - service catalog
  - auth requirements

dependencies:
  - agents/knowledge/benchmarks/sap-on-microsoft-cloud-learning-path.md
  - docs/contracts/foundry-vscode-auth-contract.md

steps:
  - identify integration concern (identity, SSO, service integration, API)
  - extract BTP-on-Azure pattern from Microsoft guidance
  - translate to actual stack (Entra, Odoo OIDC, Foundry, MCP)
  - produce recommendation with integration mapping
  - flag patterns requiring BTP vs patterns that are generic Azure

outputs:
  - benchmark_extracted
  - relevance_to_current_platform
  - recommended_translation
  - risks
  - out_of_scope
  - evidence

guardrails:
  - do not require SAP BTP
  - translate BTP identity patterns to Entra-first model
  - integration patterns should use standard protocols (OIDC, SAML, REST)
  - do not prescribe SAP Integration Suite

evidence:
  - cited Microsoft Learn BTP module
  - translated integration recommendation
  - identified non-goals

evals:
  - integration pattern correctly extracted
  - identity patterns map to Entra
  - no BTP dependency introduced
  - standard protocols used in translation
