version: 1
namespace: ipai.odoo.finance.finance_entities.v1
artifact_type: entity
repo_key: odoo
domain: finance
subject: finance_entities

# =============================================================================
# Odoo Finance Entity Contract (Machine-Readable)
# =============================================================================
# Source: Odoo CE 19.0 data model (account module)
# Generated: 2026-03-15
# Do NOT hand-edit — regenerate from source code crawl
# =============================================================================

name: odoo-finance-entities
odoo_module_version: "19.0.1.0.0"
generated: "2026-03-15"
odoo_version: "19.0"
modules:
  - account
  - account_payment

entities:

  # ---------------------------------------------------------------------------
  # account.move — Invoices, Bills, Journal Entries
  # ---------------------------------------------------------------------------
  - model: account.move
    description: >
      Unified model for customer invoices, vendor bills, credit/debit notes,
      and journal entries. In Odoo 19 CE, all accounting documents share this
      single model differentiated by move_type.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Sequence number (e.g. INV/2026/0001). Auto-generated from journal sequence.
      - name: move_type
        type: Selection
        required: true
        description: >
          Document type. Values: entry (journal entry), out_invoice (customer invoice),
          out_refund (credit note), in_invoice (vendor bill), in_refund (vendor credit note),
          out_receipt (sales receipt), in_receipt (purchase receipt).
      - name: state
        type: Selection
        required: true
        description: "Draft or posted. Values: draft, posted, cancel."
      - name: date
        type: Date
        required: true
        description: Accounting date of the entry.
      - name: invoice_date
        type: Date
        required: false
        description: Invoice/bill date (distinct from accounting date).
      - name: invoice_date_due
        type: Date
        required: false
        description: Due date for payment.
      - name: partner_id
        type: Many2one
        relation: res.partner
        required: false
        description: Customer or vendor partner.
      - name: journal_id
        type: Many2one
        relation: account.journal
        required: true
        description: Journal for this entry.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company owning this entry.
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: true
        description: Currency of the entry.
      - name: line_ids
        type: One2many
        relation: account.move.line
        required: false
        description: Journal items (debit/credit lines).
      - name: amount_total
        type: Monetary
        required: false
        description: Total amount including tax (computed).
      - name: amount_residual
        type: Monetary
        required: false
        description: Remaining amount due (computed).
      - name: amount_untaxed
        type: Monetary
        required: false
        description: Total amount excluding tax (computed).
      - name: amount_tax
        type: Monetary
        required: false
        description: Total tax amount (computed).
      - name: payment_state
        type: Selection
        required: false
        description: "Payment status. Values: not_paid, in_payment, paid, partial, reversed."
      - name: fiscal_position_id
        type: Many2one
        relation: account.fiscal.position
        required: false
        description: Fiscal position for tax/account mapping.
      - name: ref
        type: Char
        required: false
        description: Reference (vendor bill number, payment reference).
      - name: narration
        type: Html
        required: false
        description: Internal notes / terms and conditions.
      - name: invoice_payment_term_id
        type: Many2one
        relation: account.payment.term
        required: false
        description: Payment terms.

    state_machine:
      initial: draft
      transitions:
        - from: draft
          to: posted
          method: action_post
          description: Validate and post the entry. Assigns sequence number.
        - from: posted
          to: cancel
          method: button_cancel
          description: Cancel a posted entry (if journal allows).
        - from: posted
          to: draft
          method: button_draft
          description: Reset to draft (if journal allows).

    key_methods:
      - name: action_post
        description: Validate and post the journal entry / invoice.
      - name: button_draft
        description: Reset entry to draft state.
      - name: button_cancel
        description: Cancel the entry.
      - name: action_register_payment
        description: Open the payment registration wizard.
      - name: action_reverse
        description: Create a reversal (credit note / debit note).

    common_filters:
      - name: open_invoices
        domain: "[('move_type', '=', 'out_invoice'), ('state', '=', 'posted'), ('payment_state', '!=', 'paid')]"
      - name: unpaid_bills
        domain: "[('move_type', '=', 'in_invoice'), ('state', '=', 'posted'), ('payment_state', '!=', 'paid')]"
      - name: draft_entries
        domain: "[('state', '=', 'draft')]"
      - name: this_month
        domain: "[('date', '>=', context_today().strftime('%Y-%m-01'))]"

    access_groups:
      - group: account.group_account_invoice
        description: Invoicing — create/edit invoices and bills.
      - group: account.group_account_user
        description: Accountant — full journal entry access.
      - group: account.group_account_manager
        description: Adviser — full access including configuration.

  # ---------------------------------------------------------------------------
  # account.move.line — Journal Items
  # ---------------------------------------------------------------------------
  - model: account.move.line
    description: >
      Individual debit/credit lines within a journal entry. Each line
      references an account, may carry analytic distribution, and
      participates in reconciliation.
    key_fields:
      - name: move_id
        type: Many2one
        relation: account.move
        required: true
        description: Parent journal entry.
      - name: account_id
        type: Many2one
        relation: account.account
        required: true
        description: General ledger account.
      - name: name
        type: Char
        required: false
        description: Label / description of the line.
      - name: debit
        type: Monetary
        required: true
        description: Debit amount in company currency.
      - name: credit
        type: Monetary
        required: true
        description: Credit amount in company currency.
      - name: balance
        type: Monetary
        required: false
        description: "Debit - Credit (computed)."
      - name: amount_currency
        type: Monetary
        required: false
        description: Amount in the entry currency (for multi-currency).
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: true
        description: Currency of amount_currency.
      - name: partner_id
        type: Many2one
        relation: res.partner
        required: false
        description: Partner for receivable/payable lines.
      - name: tax_ids
        type: Many2many
        relation: account.tax
        required: false
        description: Taxes applied to this line.
      - name: tax_line_id
        type: Many2one
        relation: account.tax
        required: false
        description: Tax that generated this line (for tax lines).
      - name: reconciled
        type: Boolean
        required: false
        description: Whether the line is fully reconciled.
      - name: date_maturity
        type: Date
        required: false
        description: Due date for this line.
      - name: analytic_distribution
        type: Json
        required: false
        description: "Analytic distribution as JSON dict {analytic_account_id: percentage}."
      - name: quantity
        type: Float
        required: false
        description: Quantity (for invoice lines).
      - name: price_unit
        type: Float
        required: false
        description: Unit price (for invoice lines).
      - name: product_id
        type: Many2one
        relation: product.product
        required: false
        description: Product (for invoice lines).
      - name: full_reconcile_id
        type: Many2one
        relation: account.full.reconcile
        required: false
        description: Full reconciliation reference.

    key_methods:
      - name: reconcile
        description: Reconcile selected journal items together.
      - name: remove_move_reconcile
        description: Unreconcile this line.

    common_filters:
      - name: unreconciled_receivables
        domain: "[('account_id.account_type', '=', 'asset_receivable'), ('reconciled', '=', False)]"
      - name: unreconciled_payables
        domain: "[('account_id.account_type', '=', 'liability_payable'), ('reconciled', '=', False)]"

    access_groups:
      - group: account.group_account_user
        description: Accountant — read/write journal items.
      - group: account.group_account_manager
        description: Adviser — full access.

  # ---------------------------------------------------------------------------
  # account.payment — Payments
  # ---------------------------------------------------------------------------
  - model: account.payment
    description: >
      Payment records for customer receipts and vendor payments.
      Inherits account.move (each payment creates a journal entry).
    key_fields:
      - name: payment_type
        type: Selection
        required: true
        description: "inbound (customer payment) or outbound (vendor payment)."
      - name: partner_type
        type: Selection
        required: true
        description: "customer or supplier."
      - name: partner_id
        type: Many2one
        relation: res.partner
        required: true
        description: Customer or vendor.
      - name: amount
        type: Monetary
        required: true
        description: Payment amount.
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: true
        description: Payment currency.
      - name: journal_id
        type: Many2one
        relation: account.journal
        required: true
        description: Payment journal (bank/cash).
      - name: date
        type: Date
        required: true
        description: Payment date.
      - name: ref
        type: Char
        required: false
        description: Payment reference / memo.
      - name: payment_method_line_id
        type: Many2one
        relation: account.payment.method.line
        required: true
        description: Payment method (manual, check, etc.).
      - name: state
        type: Selection
        required: true
        description: "draft, posted, cancel."

    state_machine:
      initial: draft
      transitions:
        - from: draft
          to: posted
          method: action_post
          description: Confirm and post the payment.
        - from: posted
          to: cancel
          method: action_cancel
          description: Cancel the payment.
        - from: posted
          to: draft
          method: action_draft
          description: Reset payment to draft.

    key_methods:
      - name: action_post
        description: Confirm and post the payment, creating journal entry.
      - name: action_cancel
        description: Cancel the payment.
      - name: action_draft
        description: Reset to draft.

    common_filters:
      - name: posted_payments
        domain: "[('state', '=', 'posted')]"
      - name: customer_payments
        domain: "[('payment_type', '=', 'inbound'), ('partner_type', '=', 'customer')]"
      - name: vendor_payments
        domain: "[('payment_type', '=', 'outbound'), ('partner_type', '=', 'supplier')]"

    access_groups:
      - group: account.group_account_user
        description: Accountant — create and manage payments.

  # ---------------------------------------------------------------------------
  # account.account — Chart of Accounts
  # ---------------------------------------------------------------------------
  - model: account.account
    description: >
      General ledger accounts forming the chart of accounts.
      Each account has a type that determines its role in financial reporting.
    key_fields:
      - name: code
        type: Char
        required: true
        description: Account code (e.g. 101001).
      - name: name
        type: Char
        required: true
        description: Account name.
      - name: account_type
        type: Selection
        required: true
        description: >
          Account type. Values include: asset_receivable, asset_cash, asset_current,
          asset_non_current, asset_prepayments, asset_fixed, liability_payable,
          liability_credit_card, liability_current, liability_non_current,
          equity, equity_unaffected, income, income_other, expense, expense_depreciation,
          expense_direct_cost, off_balance.
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: false
        description: Account currency (forces entries in this currency).
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: reconcile
        type: Boolean
        required: false
        description: Whether entries on this account can be reconciled.
      - name: deprecated
        type: Boolean
        required: false
        description: Mark account as deprecated (no new entries).
      - name: tax_ids
        type: Many2many
        relation: account.tax
        required: false
        description: Default taxes for this account.
      - name: tag_ids
        type: Many2many
        relation: account.account.tag
        required: false
        description: Account tags for reporting.

    key_methods:
      - name: action_read_account
        description: Open the ledger for this account.

    common_filters:
      - name: receivable_accounts
        domain: "[('account_type', '=', 'asset_receivable')]"
      - name: payable_accounts
        domain: "[('account_type', '=', 'liability_payable')]"
      - name: bank_accounts
        domain: "[('account_type', '=', 'asset_cash')]"
      - name: active_accounts
        domain: "[('deprecated', '=', False)]"

    access_groups:
      - group: account.group_account_manager
        description: Adviser — create/modify chart of accounts.
      - group: account.group_account_user
        description: Accountant — read access.

  # ---------------------------------------------------------------------------
  # account.journal — Journals
  # ---------------------------------------------------------------------------
  - model: account.journal
    description: >
      Accounting journals (sales, purchase, bank, cash, miscellaneous).
      Each journal defines a sequence and default accounts.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Journal name.
      - name: code
        type: Char
        required: true
        description: Short code (max 5 chars, e.g. INV, BNK1).
      - name: type
        type: Selection
        required: true
        description: "Journal type: sale, purchase, cash, bank, general."
      - name: default_account_id
        type: Many2one
        relation: account.account
        required: false
        description: Default account for journal entries.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: currency_id
        type: Many2one
        relation: res.currency
        required: false
        description: Journal currency (if different from company currency).
      - name: bank_account_id
        type: Many2one
        relation: res.partner.bank
        required: false
        description: Bank account (for bank journals).

    key_methods:
      - name: action_create_new
        description: Create a new entry in this journal.

    common_filters:
      - name: sale_journals
        domain: "[('type', '=', 'sale')]"
      - name: purchase_journals
        domain: "[('type', '=', 'purchase')]"
      - name: bank_journals
        domain: "[('type', '=', 'bank')]"

    access_groups:
      - group: account.group_account_manager
        description: Adviser — create/modify journals.

  # ---------------------------------------------------------------------------
  # account.tax — Taxes
  # ---------------------------------------------------------------------------
  - model: account.tax
    description: >
      Tax definitions including VAT, withholding taxes, and other tax types.
      Applied to invoice lines to compute tax amounts.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Tax name (e.g. "VAT 12%").
      - name: type_tax_use
        type: Selection
        required: true
        description: "Tax scope: sale, purchase, or none."
      - name: amount_type
        type: Selection
        required: true
        description: "Computation type: percent, fixed, group, division."
      - name: amount
        type: Float
        required: true
        description: Tax rate or fixed amount.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: active
        type: Boolean
        required: false
        description: Whether the tax is active.
      - name: price_include
        type: Boolean
        required: false
        description: Whether the price includes this tax.
      - name: include_base_amount
        type: Boolean
        required: false
        description: Whether this tax amount is added to the base for subsequent taxes.
      - name: invoice_repartition_line_ids
        type: One2many
        relation: account.tax.repartition.line
        required: false
        description: Tax repartition lines for invoices.
      - name: refund_repartition_line_ids
        type: One2many
        relation: account.tax.repartition.line
        required: false
        description: Tax repartition lines for refunds.

    key_methods:
      - name: compute_all
        description: Compute tax amounts for given base amount and quantity.

    common_filters:
      - name: sale_taxes
        domain: "[('type_tax_use', '=', 'sale'), ('active', '=', True)]"
      - name: purchase_taxes
        domain: "[('type_tax_use', '=', 'purchase'), ('active', '=', True)]"

    access_groups:
      - group: account.group_account_manager
        description: Adviser — create/modify tax definitions.

  # ---------------------------------------------------------------------------
  # account.fiscal.position — Fiscal Positions
  # ---------------------------------------------------------------------------
  - model: account.fiscal.position
    description: >
      Fiscal positions map default taxes and accounts to alternative ones
      based on customer/vendor location or tax status. Used for tax exemptions,
      intra-community transactions, etc.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Fiscal position name.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: tax_ids
        type: One2many
        relation: account.fiscal.position.tax
        required: false
        description: Tax mapping rules.
      - name: account_ids
        type: One2many
        relation: account.fiscal.position.account
        required: false
        description: Account mapping rules.
      - name: auto_apply
        type: Boolean
        required: false
        description: Automatically apply based on country/state.
      - name: country_id
        type: Many2one
        relation: res.country
        required: false
        description: Country for auto-apply matching.
      - name: country_group_id
        type: Many2one
        relation: res.country.group
        required: false
        description: Country group for auto-apply matching.

    key_methods:
      - name: map_tax
        description: Map source taxes to destination taxes per fiscal position rules.
      - name: map_account
        description: Map source account to destination account per fiscal position rules.

    common_filters:
      - name: auto_apply_positions
        domain: "[('auto_apply', '=', True)]"

    access_groups:
      - group: account.group_account_manager
        description: Adviser — create/modify fiscal positions.

  # ---------------------------------------------------------------------------
  # account.analytic.account — Analytic Accounts
  # ---------------------------------------------------------------------------
  - model: account.analytic.account
    description: >
      Analytic accounts for cost/revenue tracking across projects, departments,
      or cost centers. In Odoo 19, analytic distribution is stored as JSON on
      journal items rather than a single Many2one.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Analytic account name.
      - name: code
        type: Char
        required: false
        description: Reference code.
      - name: plan_id
        type: Many2one
        relation: account.analytic.plan
        required: true
        description: Analytic plan this account belongs to.
      - name: company_id
        type: Many2one
        relation: res.company
        required: false
        description: Company (empty = shared across companies).
      - name: partner_id
        type: Many2one
        relation: res.partner
        required: false
        description: Associated partner (customer/project).
      - name: active
        type: Boolean
        required: false
        description: Whether the analytic account is active.
      - name: balance
        type: Monetary
        required: false
        description: Current balance (computed from analytic lines).
      - name: debit
        type: Monetary
        required: false
        description: Total debit (computed).
      - name: credit
        type: Monetary
        required: false
        description: Total credit (computed).

    key_methods:
      - name: action_view_lines
        description: View analytic lines for this account.

    common_filters:
      - name: active_accounts
        domain: "[('active', '=', True)]"

    access_groups:
      - group: analytic.group_analytic_accounting
        description: Analytic Accounting — manage analytic accounts.

  # ---------------------------------------------------------------------------
  # account.bank.statement — Bank Statements
  # ---------------------------------------------------------------------------
  - model: account.bank.statement
    description: >
      Bank statement records imported from bank feeds or entered manually.
      Contains statement lines that are reconciled against journal items.
    key_fields:
      - name: name
        type: Char
        required: false
        description: Statement reference/name.
      - name: date
        type: Date
        required: true
        description: Statement date.
      - name: journal_id
        type: Many2one
        relation: account.journal
        required: true
        description: Bank journal.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.
      - name: balance_start
        type: Monetary
        required: false
        description: Starting balance.
      - name: balance_end_real
        type: Monetary
        required: false
        description: Ending balance (from bank).
      - name: balance_end
        type: Monetary
        required: false
        description: Computed ending balance (start + transactions).
      - name: line_ids
        type: One2many
        relation: account.bank.statement.line
        required: false
        description: Statement lines (transactions).

    key_methods:
      - name: button_validate_or_action
        description: Validate the bank statement.

    common_filters:
      - name: unvalidated
        domain: "[('is_complete', '=', False)]"

    access_groups:
      - group: account.group_account_user
        description: Accountant — manage bank statements.

  # ---------------------------------------------------------------------------
  # account.reconcile.model — Reconciliation Models
  # ---------------------------------------------------------------------------
  - model: account.reconcile.model
    description: >
      Predefined rules for bank statement reconciliation. Can auto-match
      statement lines to journal items or create write-off entries.
    key_fields:
      - name: name
        type: Char
        required: true
        description: Model name.
      - name: rule_type
        type: Selection
        required: true
        description: "Rule type: writeoff_button (manual), writeoff_suggestion (auto-suggest), invoice_matching (auto-match)."
      - name: auto_reconcile
        type: Boolean
        required: false
        description: Automatically validate the matched entries.
      - name: match_partner
        type: Boolean
        required: false
        description: Match on partner.
      - name: match_label
        type: Selection
        required: false
        description: "Label matching: contains, not_contains, match_regex."
      - name: match_label_param
        type: Char
        required: false
        description: Label matching parameter.
      - name: match_amount
        type: Selection
        required: false
        description: "Amount matching: lower, greater, between."
      - name: line_ids
        type: One2many
        relation: account.reconcile.model.line
        required: false
        description: Write-off lines to create on match.
      - name: company_id
        type: Many2one
        relation: res.company
        required: true
        description: Company.

    key_methods:
      - name: _apply_rules
        description: Apply reconciliation rules to bank statement lines.

    common_filters:
      - name: auto_reconcile_models
        domain: "[('auto_reconcile', '=', True)]"
      - name: invoice_matching_models
        domain: "[('rule_type', '=', 'invoice_matching')]"

    access_groups:
      - group: account.group_account_manager
        description: Adviser — create/modify reconciliation models.
