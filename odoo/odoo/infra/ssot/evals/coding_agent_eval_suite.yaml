version: 1
meta:
  owner: platform
  purpose: "Internal SWE-bench-like eval suite: apply known patches and run tests to validate coding-agent harness regressions."
  policy: "ssot/evals/swebench_harness_policy.yaml"

defaults:
  timeout_seconds: 900
  evidence_root: "docs/evidence/coding_agent_eval"
  allowlisted_test_command_regex:
    - "^python(3)?\\s+-m\\s+pytest\\b.*"
    - "^pytest\\b.*"
    - "^python(3)?\\s+-m\\s+unittest\\b.*"
    - "^python(3)?\\s+-c\\s+.*"   # allow tiny smoke checks only

cases: []
#
# Add cases like:
# cases:
#   - id: "fix-<slug>"
#     description: "Short description of issue + expected behavior."
#     patch: "eval/coding_agent_cases/fix-<slug>/patch.diff"
#     test_command: "python -m pytest -q tests/test_<slug>.py"
#     timeout_seconds: 1200
