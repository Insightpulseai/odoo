name: build-push-acr

# Build custom Odoo image (OCA + IPAI addons) and push to Azure Container Registry
# Then update Container Apps to use the new image

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        type: choice
        options:
          - dev
          - staging
          - production
        required: true
      image_tag:
        description: 'Image tag (default: 19.0-azure)'
        type: string
        default: '19.0-azure'
      install_modules:
        description: 'Comma-separated modules to install (empty = skip)'
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - "addons/ipai/**"
      - "addons/oca/**"
      - "docker/Dockerfile.unified"
      - "config/prod/odoo-azure.conf"
      - "docker/requirements/**"

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  build-and-push:
    name: "Build & Push to ACR"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      acr_name: ${{ steps.meta.outputs.acr_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set metadata
        id: meta
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          ACR_NAME="ipaiodoo${ENV}acr"
          ACR_SERVER="${ACR_NAME}.azurecr.io"
          TAG="${{ github.event.inputs.image_tag || '19.0-azure' }}"
          echo "acr_name=${ACR_NAME}" >> "$GITHUB_OUTPUT"
          echo "acr_server=${ACR_SERVER}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${ACR_SERVER}/ipai-odoo:${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login -n ${{ steps.meta.outputs.acr_name }}

      - name: Clone OCA repos (19.0)
        run: |
          pip install git-aggregator
          gitaggregate -c oca-aggregate.yml -j 4

      - name: Build & Push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.unified
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.acr_server }}/ipai-odoo:latest
          build-args: |
            TARGET=azure
            BUILD_DATE=${{ github.event.head_commit.timestamp || '' }}
            GIT_SHA=${{ github.sha }}

  deploy:
    name: "Deploy to Container Apps"
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container Apps
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          RG="rg-ipai-${ENV}"
          IMAGE="${{ needs.build-and-push.outputs.image_ref }}"

          for ROLE in web worker cron; do
            APP="ipai-odoo-${ENV}-${ROLE}"
            echo "Updating ${APP} → ${IMAGE}"
            az containerapp show -n "$APP" -g "$RG" > /dev/null 2>&1 && {
              az containerapp update \
                --name "$APP" \
                --resource-group "$RG" \
                --image "$IMAGE"
              echo "${ROLE}: updated"
            } || echo "${ROLE}: not found, skipping"
          done

      - name: Verify Health
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          RG="rg-ipai-${ENV}"
          APP="ipai-odoo-${ENV}-web"

          FQDN=$(az containerapp show -n "$APP" -g "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "FQDN: ${FQDN}"

          # Wait for new revision to become ready
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/web/health" || echo "000")
            echo "Attempt $i: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: Health check did not return 200 after 2 minutes"
          exit 1

  install-modules:
    name: "Install Modules"
    needs: deploy
    if: github.event.inputs.install_modules != ''
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Install modules via Container App Job
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          RG="rg-ipai-${ENV}"
          MODULES="${{ github.event.inputs.install_modules }}"
          IMAGE="${{ needs.build-and-push.outputs.image_ref }}"
          ENV_ID=$(az containerapp env show -n "ipai-odoo-${ENV}-env" -g "$RG" --query id -o tsv)

          # Get DB connection from web app
          DB_HOST=$(az containerapp show -n "ipai-odoo-${ENV}-web" -g "$RG" \
            --query "properties.template.containers[0].env[?name=='HOST'].value | [0]" -o tsv)
          DB_USER=$(az containerapp show -n "ipai-odoo-${ENV}-web" -g "$RG" \
            --query "properties.template.containers[0].env[?name=='USER'].value | [0]" -o tsv)
          DB_PASSWORD=$(az keyvault secret show --vault-name "ipai-odoo-${ENV}-kv" -n pg-admin-password --query value -o tsv)

          JOB_NAME="ipai-odoo-${ENV}-install-$(echo $MODULES | tr ',' '-' | cut -c1-20)"

          cat > /tmp/install-job.yaml <<YAML
          properties:
            environmentId: ${ENV_ID}
            configuration:
              replicaTimeout: 600
              replicaRetryLimit: 0
              triggerType: Manual
              manualTriggerConfig:
                parallelism: 1
                replicaCompletionCount: 1
              registries:
                - server: ipaiodoo${ENV}acr.azurecr.io
                  identity: system
              secrets:
                - name: db-password
                  value: "${DB_PASSWORD}"
            template:
              containers:
                - name: odoo-install
                  image: ${IMAGE}
                  command: ["/bin/bash", "-c"]
                  args:
                    - |
                      odoo --db_host \$HOST --db_port \$PORT --db_user \$USER --db_password \$PASSWORD -d odoo -i ${MODULES} --stop-after-init --no-http
                  resources:
                    cpu: 1.0
                    memory: 2Gi
                  env:
                    - name: HOST
                      value: "${DB_HOST}"
                    - name: PORT
                      value: "5432"
                    - name: USER
                      value: "${DB_USER}"
                    - name: PASSWORD
                      secretRef: db-password
          YAML

          az containerapp job create \
            -n "$JOB_NAME" -g "$RG" \
            --yaml /tmp/install-job.yaml 2>&1 || true

          az containerapp job start -n "$JOB_NAME" -g "$RG" 2>&1

          echo "Module install job started: ${JOB_NAME}"
          echo "Modules: ${MODULES}"

          # Wait for completion
          for i in $(seq 1 60); do
            STATUS=$(az containerapp job execution list -n "$JOB_NAME" -g "$RG" \
              --query "[0].properties.status" -o tsv 2>/dev/null || echo "Unknown")
            echo "Status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Module installation complete"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Module installation failed"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for module install"
          exit 1
