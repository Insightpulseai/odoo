id: multitenant-compliance-dns-safety
version: 1
status: active
classification: encoded_preference
persona: tenant-isolation-judge
updated_at: "2026-03-17"

purpose: >
  Verify compliance requirements and DNS safety per tenant for
  multi-tenant SaaS platforms.

inputs:
  - tenant_compliance_map: "Per-tenant compliance requirements"
  - domain_model: "Subdomain, custom domain, or shared domain"
  - certificate_management: "Managed certificates, BYOC, or ACM"
  - data_residency_requirements: "Per-tenant data location requirements"

outputs:
  - compliance_matrix: "Per-tenant compliance requirement mapping"
  - domain_lifecycle: "Custom domain provisioning and deprovisioning"
  - dns_safety_controls: "Subdomain takeover prevention measures"
  - data_residency_enforcement: "How data location is enforced per tenant"
  - certificate_automation: "Certificate issuance, renewal, and revocation"

guardrails:
  - "Dangling DNS records must be detected and removed automatically"
  - "Custom domains must be verified before activation"
  - "Certificate renewal must be automated with advance alerting"
  - "Data residency must be enforced at infrastructure level, not just policy"

benchmark_source: "Azure Multitenancy Checklist - Security Pillar"
