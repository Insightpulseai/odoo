version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: [dependencies, python]

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    labels: [dependencies, node]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: [dependencies, ci]
