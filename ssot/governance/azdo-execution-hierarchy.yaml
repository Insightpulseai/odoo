  # ===========================================================================
  # OBJ-008: Cross-Plane Governed Operating Model
  # ===========================================================================
  - id: OBJ-008
    title: "[OBJ-008] Cross-Plane Governed Operating Model"
    type: epic
    tags: [objective, platform, odoo, foundry, databricks]
    owner: platform-lead
    description:
      purpose: >
        Connect Odoo (SoR), Databricks (SoI), and Copilot (Foundry agent
        runtime) into one governed operating model with explicit ownership
        boundaries, integration contracts, and end-to-end observability.
      scope: "Cross-plane ownership model, integration contracts, observability linkage, ambiguity elimination"
      out_of_scope: "Individual plane implementation (covered by OBJ-001..007)"
      why: >
        Without explicit cross-plane contracts, each plane evolves independently
        and produces conflicting SoR claims, untraced data flows, and ungoverned
        action paths. This Epic is the connective tissue.
    acceptance_criteria:
      - "Odoo/Databricks/Copilot ownership boundaries fully documented"
      - "All Copilot-to-Odoo and Databricks-to-Copilot paths represented in spec and SSOT"
      - "End-to-end observability linkage for 100% of production release paths"
      - "Zero conflicting SoR/lakehouse/Copilot action authority statements in architecture"
    strategy_objectives_ref: []  # Spans all strategic objectives
    smart_target_ref: OBJ-005  # enterprise_okrs.yaml
    links:
      - ssot/governance/enterprise_okrs.yaml
      - docs/architecture/UNIFIED_TARGET_ARCHITECTURE.md

    features:

      - id: FEAT-008-01
