version: 1.0.0
system: odoo_copilot_tax_pulse
n8n_role:
  classification: async_automation_layer
  owns:
    - notifications
    - webhook_fanout
    - connector_sync
    - scheduled_reminders
    - package_delivery
  does_not_own:
    - canonical_task_state
    - tax_rule_truth
    - approval_authority
    - conversational_frontdoor
    - primary_business_objects
preferred_paths:
  use_native_odoo_node_for:
    - contacts
    - notes
    - opportunities
    - simple_custom_resource_calls
  use_http_request_or_bridge_for:
    - specialized_bir_flows
    - approval_gated_write_actions
    - compliance_specific_exports
    - custom_taxpulse_endpoints
