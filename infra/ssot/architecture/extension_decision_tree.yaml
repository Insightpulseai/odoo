# schema: ssot.architecture.extension_decision_tree.v1
# Machine-readable decision tree for choosing CE config vs OCA vs custom addon vs Bridge.
# Referenced by: spec/expense-cash-advance/constitution.md, spec/ai-copilot/constitution.md
# Applies to: all new capabilities in the Insightpulseai/odoo repo.

version: 1
meta:
  owner: platform
  purpose: "Deterministic decision tree for capability extension path selection"
  created: "2026-03-03"
  last_reviewed: "2026-03-03"

# ── Decision nodes (evaluate in order A → D; E = tie-breakers) ────────────────

decision_nodes:

  - id: A
    question: "Can Odoo CE configuration satisfy the requirement?"
    check: "ir.config_parameter, system settings, built-in module options"
    if_yes:
      action: configure
      artifact: "ssot/odoo/settings_catalog.yaml"
      code_required: false
    if_no: proceed_to_B

  - id: B
    question: "Does an OCA module exist for this capability?"
    check: "Search OCA/* repos, OCA app store, OCA GitHub org"
    if_yes_mature:
      condition: "19.0 port available and actively maintained"
      action: adopt_oca
      artifact: ".gitmodules pin or requirements.txt entry"
      rules:
        - "Do not fork or vendor OCA source"
        - "Use _inherit overrides for customization"
        - "Pin to specific commit or version tag"
    if_yes_immature:
      condition: "Module exists but no 19.0 port"
      action: mark_needs_port
      label: "[NEEDS PORT]"
      fallback: "Temporary ipai_* shim if blocking; plan migration when port lands"
      artifact: "Issue filed on OCA repo or port initiated via oca-port"
    if_no: proceed_to_C

  - id: C
    question: "Is a custom Odoo addon the right approach?"
    check: "A and B are exhausted; capability is Odoo-native (models, views, security)"
    if_yes:
      action: create_custom_addon
      naming: "ipai_<domain>_<feature>"
      requirements:
        - "OCA quality standards (pre-commit, manifest, README, tests)"
        - "Must not duplicate OCA functionality"
        - "Must have spec bundle reference"
      artifact: "addons/ipai/ipai_<domain>_<feature>/ with __manifest__.py + tests/"
    if_no: proceed_to_D

  - id: D
    question: "Does the capability require an external service?"
    check: "AI/ML inference, OCR, vector search, or non-Odoo runtime"
    if_yes:
      action: bridge_first
      architecture: "Odoo addon (ipai_*) = thin connector; heavy logic in external service"
      requirements:
        - "Tool spec in contracts/tools/ (preview → approval → commit)"
        - "Audit envelope (trace_id, user_id, tool_name, args, result, timestamp)"
        - "Idempotency key for all state-changing operations"
        - "Bridge entry in ssot/bridges/catalog.yaml"
      artifact: "contracts/tools/<tool_name>.md + ssot/bridges/catalog.yaml entry"

# ── Tie-breakers (applied when multiple paths are viable) ─────────────────────

tie_breakers:

  - condition: "Feature is an EE parity target"
    prefer: oca
    reason: "OCA path (even partial) over custom addon for EE parity"
    artifact: "Row in ssot/parity/ee_to_oca_proof_matrix.yaml"

  - condition: "Capability involves AI/ML"
    prefer: bridge
    reason: "All AI/ML routes through IPAI bridge — no direct LLM calls from Odoo"
    references:
      - "spec/ai-copilot/constitution.md Rule 4"
      - "spec/ai-bridge/constitution.md Rule 3"

  - condition: "Capability involves accounting entries"
    prefer: custom_addon
    reason: "Accounting requires idempotency keys — custom addon with explicit journal entry logic"
    references:
      - "spec/expense-cash-advance/constitution.md Rule 3"

  - condition: "Capability crosses SSOT domain boundaries"
    prefer: contract_first
    reason: "Cross-domain integration requires a contract doc before implementation"
    references:
      - ".claude/rules/ssot-platform.md Rule 9"
    artifact: "docs/contracts/<NAME>_CONTRACT.md + index entry"

# ── Required artifacts per path ───────────────────────────────────────────────

artifact_matrix:
  configure:
    - "ssot/odoo/settings_catalog.yaml entry"
  adopt_oca:
    - ".gitmodules pin or requirements.txt entry"
  create_custom_addon:
    - "addons/ipai/ipai_<domain>_<feature>/__manifest__.py"
    - "addons/ipai/ipai_<domain>_<feature>/tests/"
    - "Spec bundle reference (spec/<feature-slug>/)"
  bridge_first:
    - "contracts/tools/<tool_name>.md"
    - "ssot/bridges/catalog.yaml entry"
    - "addons/ipai/ipai_<connector>/ (thin Odoo connector)"
  parity:
    - "ssot/parity/ee_to_oca_proof_matrix.yaml row"
