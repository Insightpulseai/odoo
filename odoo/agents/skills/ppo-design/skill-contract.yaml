id: ppo-design
version: 1
status: active
classification: capability_uplift
owner: reinforcement-learning-architect
benchmark_source: "HF Deep RL Course — PPO"
implementation_source: "SB3, CleanRL docs"

purpose: >
  Design PPO training pipelines with clipped surrogate objectives.
  PPO is the default starting algorithm for most RL problems.

inputs:
  - name: environment
    type: string
    required: true
    description: "Gymnasium environment ID"
  - name: action_space_type
    type: enum
    values: [discrete, continuous]
    required: true

outputs:
  - name: model
    type: neural_network
    description: "Trained PPO policy (actor-critic)"
  - name: hyperparameters
    type: dict
    description: "Full hyperparameter configuration"
  - name: training_curve
    type: list
    description: "Episode returns and diagnostics over training"

constraints:
  - "Clipped surrogate objective is the default variant"
  - "Multiple mini-batch epochs per rollout"
  - "GAE for advantage estimation"
  - "Monitor KL divergence for early stopping signal"

hyperparameters:
  learning_rate:
    default: 0.0003
    range: [0.00001, 0.003]
  n_steps:
    default: 2048
    range: [64, 8192]
    description: "Steps per rollout before update"
  batch_size:
    default: 64
    range: [32, 512]
    description: "Mini-batch size for updates"
  n_epochs:
    default: 10
    range: [3, 30]
    description: "Number of epochs per rollout update"
  gamma:
    default: 0.99
  gae_lambda:
    default: 0.95
  clip_range:
    default: 0.2
    range: [0.1, 0.3]
    description: "PPO clipping parameter"
  entropy_coefficient:
    default: 0.0
    range: [0.0, 0.01]
  value_loss_coefficient:
    default: 0.5
  max_grad_norm:
    default: 0.5
  n_envs:
    default: 1
    description: "Parallel environments"
  total_timesteps:
    default: 1000000
