# Odoo Implementation Skill
# End-to-end Odoo CE deployment and configuration

name: odoo_implementation
version: 1.0.0
key: odoo.implementation
description: |
  Execute Odoo CE implementation workflows: environment setup,
  module installation, data migration, configuration, and go-live.

intents:
  - implement odoo
  - deploy odoo modules
  - install odoo
  - configure odoo
  - odoo go live
  - set up odoo

guardrails:
  - Follow canonical setup (odoo18/ directory patterns)
  - Single database per environment (list_db = False)
  - File-based secrets only (never hardcode)
  - Always run --stop-after-init verification
  - Back up database before any destructive operation

tools:
  - key: impl.env_setup
    name: Environment Setup
    target_model: ipai.impl.runner
    target_method: setup_environment
    description: Configure Docker compose, PostgreSQL, addons path

  - key: impl.module_install
    name: Module Installation
    target_model: ipai.impl.runner
    target_method: install_modules
    description: Install and configure Odoo modules in dependency order

  - key: impl.data_migrate
    name: Data Migration
    target_model: ipai.impl.runner
    target_method: migrate_data
    description: Import and transform data from legacy systems

  - key: impl.configure
    name: System Configuration
    target_model: ipai.impl.runner
    target_method: configure_system
    description: Apply system settings, company info, chart of accounts

  - key: impl.validate
    name: Go-Live Validation
    target_model: ipai.impl.runner
    target_method: validate_golive
    description: Run pre-go-live checklist and smoke tests

workflow:
  - impl.env_setup
  - impl.module_install
  - impl.data_migrate
  - impl.configure
  - impl.validate

input_schema:
  type: object
  required:
    - environment
    - modules
  properties:
    environment:
      type: string
      enum: [dev, staging, prod]
      description: Target deployment environment
    modules:
      type: array
      items: { type: string }
      description: Modules to install (technical names)
    database:
      type: string
      description: Target database name
    migration_source:
      type: string
      description: Legacy system type for data migration
    company_data:
      type: object
      description: Company configuration (name, currency, country)

output_schema:
  type: object
  properties:
    environment_status:
      type: string
      enum: [ready, error]
    installed_modules:
      type: array
      items: { type: string }
    migration_log:
      type: object
    health_check:
      type: object
      properties:
        http_status: { type: integer }
        db_connected: { type: boolean }
        modules_loaded: { type: boolean }

agentInstructions: |
  When implementing Odoo:

  1. **Environment Setup**:
     - Use canonical setup from odoo18/ directory
     - Configure docker-compose with health checks
     - Set db_name per environment (odoo_dev / odoo_staging / odoo)
     - Disable database selector (list_db = False)

  2. **Module Installation**:
     - Resolve dependency order from __manifest__.py
     - Install base modules first, then OCA, then ipai_*
     - Run: docker compose exec -T web odoo -d <db> -i <modules> --stop-after-init
     - Verify each module loads without errors

  3. **Data Migration**:
     - Create backup before migration
     - Use Odoo's data import (CSV/XML) for structured data
     - Validate record counts and referential integrity
     - Log all migration operations

  4. **Configuration**:
     - Set company info, currency, fiscal year
     - Configure chart of accounts
     - Set up user roles and access groups
     - Configure email (Zoho SMTP on smtp.zoho.com:587)

  5. **Go-Live Validation**:
     - Health check: curl http://localhost:8069/web/health
     - Module list verification
     - User login test
     - Critical workflow smoke test
