version: 1
namespace: ipai.org.foundry.artifact_naming_convention.v1
artifact_type: policy
repo_key: org
domain: foundry
subject: artifact_naming_convention

# ============================================================================
# UNIFIED ARTIFACT NAMING CONVENTION
# ============================================================================
# Every managed schema, registry, mapping, manifest, policy, and contract file
# must follow this identity contract.
#
# Identity tuple: repo_key + domain + subject + version + artifact_type
# This tuple appears in: filename, namespace, schema $id, CI check.
# ============================================================================

filename_pattern: "<repo_key>__<domain>__<subject>__v<major>.<artifact_type>.<ext>"
namespace_pattern: "ipai.<repo_key>.<domain>.<subject>.v<major>"
schema_id_pattern: "https://schemas.insightpulseai.com/ipai/<repo_key>/<domain>/<subject>/v<major>"

# ============================================================================
# FILENAME REGEX
# ============================================================================

filename_regex: "^[a-z0-9_]+__[a-z0-9_]+__[a-z0-9_]+__v[0-9]+\\.(schema|registry|mapping|manifest|policy|contract|entity|catalog|inventory|config)\\.(yaml|json)$"

# ============================================================================
# ALLOWED ARTIFACT TYPES
# ============================================================================

allowed_artifact_types:
  - schema
  - registry
  - mapping
  - manifest
  - policy
  - contract
  - entity
  - catalog
  - inventory
  - config

# ============================================================================
# FORBIDDEN BASENAMES
# ============================================================================
# These generic names are NEVER valid as standalone filenames for managed artifacts.

forbidden_basenames:
  - schema
  - registry
  - mapping
  - manifest
  - contract
  - config
  - default
  - main
  - stuff

# ============================================================================
# REPO ALIASES
# ============================================================================
# Normalize repo names for namespace/filename use (snake_case).
# Actual GitHub repo directory names remain unchanged.

repo_aliases:
  github: ".github"
  infra: infra
  ops_platform: ops-platform
  lakehouse: lakehouse
  agents: agents
  odoo: odoo
  web: web
  automations: automations
  design_system: design-system
  templates: templates

# ============================================================================
# REQUIRED HEADER
# ============================================================================

required_header_fields:
  - version        # integer, major only
  - namespace      # must match filename tokens
  - artifact_type  # from allowed list
  - repo_key       # from repo_aliases
  - domain         # business/platform domain
  - subject        # stable noun phrase

# ============================================================================
# UNIQUENESS RULES
# ============================================================================

uniqueness:
  basename_unique_per_repo: true
  namespace_unique_per_repo: true
  domain_subject_version_artifact_unique: true
  filename_must_match_header: true
  json_schema_id_must_match_namespace: true

# ============================================================================
# VERSIONING
# ============================================================================

versioning:
  use_major_only_in_filename: true
  breaking_change_bumps_major: true
  non_breaking_keeps_same_version: true
  forbidden_patterns:
    - "v1.2"
    - "v1.0.0"
    - "-final"
    - "-new"
    - "-latest"

# ============================================================================
# PATH CONVENTION
# ============================================================================

path_convention:
  ssot_domain: "ssot/<domain>/"
  ssot_schema: "ssot/schema/"
  contracts: "contracts/"
  docs_architecture: "docs/architecture/"
  spec: "spec/<slug>/"
