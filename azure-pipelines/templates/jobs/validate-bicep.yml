# =============================================================================
# Reusable Job: Validate Bicep Templates
# =============================================================================
# Runs `az bicep build` to validate Bicep syntax and structure.
# Optionally runs what-if against a target resource group.
#
# Usage:
#   jobs:
#     - template: templates/jobs/validate-bicep.yml
#       parameters:
#         templateFile: infra/azure/main.bicep
#         resourceGroup: rg-ipai-dev-odoo-runtime
# =============================================================================

parameters:
  - name: templateFile
    type: string
    default: infra/azure/main.bicep
  - name: parametersFile
    type: string
    default: ''
  - name: resourceGroup
    type: string
    default: rg-ipai-dev-odoo-runtime
  - name: runWhatIf
    type: boolean
    default: true
  - name: serviceConnection
    type: string
    default: azure-ipai

jobs:
  - job: ValidateBicep
    displayName: 'Validate Bicep: ${{ parameters.templateFile }}'
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
        fetchDepth: 1

      - task: AzureCLI@2
        displayName: 'Bicep build (syntax check)'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            echo "=== Bicep Syntax Validation ==="
            az bicep build --file "${{ parameters.templateFile }}"
            echo "PASS: Bicep syntax valid"

      - ${{ if parameters.runWhatIf }}:
        - task: AzureCLI@2
          displayName: 'Bicep what-if'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -euo pipefail

              echo "=== Bicep What-If ==="
              PARAMS_ARG=""
              if [[ -n "${{ parameters.parametersFile }}" ]]; then
                PARAMS_ARG="--parameters @${{ parameters.parametersFile }}"
              fi

              az deployment group what-if \
                --resource-group "${{ parameters.resourceGroup }}" \
                --template-file "${{ parameters.templateFile }}" \
                ${PARAMS_ARG} \
                --no-pretty-print || true

              echo "PASS: What-if completed"
