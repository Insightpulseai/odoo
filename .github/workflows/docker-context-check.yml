name: Docker Context Check

# Non-invasive smoke check — skips live daemon tests gracefully if Docker is
# unavailable (CI runners). Always runs static and daemonless regression tests.
#
# Guards against:
#   1. Deprecated colima-odoo context sneaking back into devcontainer.json
#   2. docker_doctor.sh silently passing on broken contexts
#   3. Script losing its executable bit

on:
  pull_request:
    paths:
      - '.devcontainer/devcontainer.json'
      - 'scripts/dev/docker_doctor.sh'
      - '.github/workflows/docker-context-check.yml'
  push:
    branches: [main]
    paths:
      - '.devcontainer/devcontainer.json'
      - 'scripts/dev/docker_doctor.sh'
      - '.github/workflows/docker-context-check.yml'

permissions:
  contents: read

jobs:
  docker-context-check:
    name: Docker context policy check
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Static checks (always run — no daemon required)
      # ------------------------------------------------------------------

      - name: Validate docker_doctor.sh syntax
        run: |
          bash -n scripts/dev/docker_doctor.sh
          echo "✅ docker_doctor.sh syntax OK"

      - name: Check docker_doctor.sh is executable
        run: |
          if [[ ! -x scripts/dev/docker_doctor.sh ]]; then
            echo "::error::scripts/dev/docker_doctor.sh must be executable (chmod +x)"
            exit 1
          fi
          echo "✅ docker_doctor.sh is executable"

      - name: Check devcontainer.json does not use deprecated colima-odoo context
        run: |
          CONTEXT=$(python3 -c "
          import json, re
          raw = open('.devcontainer/devcontainer.json').read()
          clean = re.sub(r'//[^\n]*', '', raw)   # strip JS-style comments
          d = json.loads(clean)
          print(d.get('dockerContext', ''))
          ")

          echo "devcontainer.json dockerContext: '${CONTEXT}'"

          if [[ "${CONTEXT}" == "colima-odoo" ]]; then
            echo "::error::devcontainer.json uses deprecated context 'colima-odoo'."
            echo "colima-odoo is reserved for Supabase tooling isolation, not Dev Containers."
            echo "Use 'desktop-linux' (Docker Desktop) or 'colima' (default Colima profile)."
            exit 1
          fi

          echo "✅ Docker context '${CONTEXT}' is not deprecated"

      - name: Check devcontainer.json initializeCommand honours DOCKER_CONTEXT_OVERRIDE
        run: |
          RAW=$(python3 -c "
          import json, re
          raw = open('.devcontainer/devcontainer.json').read()
          clean = re.sub(r'//[^\n]*', '', raw)
          d = json.loads(clean)
          print(d.get('initializeCommand', ''))
          ")
          echo "initializeCommand: ${RAW}"

          if echo "${RAW}" | grep -qF 'DOCKER_CONTEXT_OVERRIDE'; then
            echo "✅ initializeCommand supports DOCKER_CONTEXT_OVERRIDE"
          else
            echo "::warning::initializeCommand does not reference DOCKER_CONTEXT_OVERRIDE — override mechanism may be missing"
          fi

      # ------------------------------------------------------------------
      # Daemonless regression test — doctor must fail fast on bad context
      # ------------------------------------------------------------------

      - name: "Regression: doctor fails non-zero on nonexistent context"
        run: |
          # Temporarily make docker unavailable so we can test the failure path
          # without a real daemon. We do this by pointing at a fake socket.
          export DOCKER_HOST="unix:///tmp/nonexistent-docker.sock"

          # Run doctor with a clearly bogus context name
          if DOCKER_CONTEXT_OVERRIDE=__invalid_context_xyz__ \
               bash scripts/dev/docker_doctor.sh 2>&1; then
            echo "::error::docker_doctor.sh should have exited non-zero for a missing context"
            exit 1
          fi
          echo "✅ docker_doctor.sh correctly exits non-zero for missing context"

      - name: "Regression: doctor emits actionable error text on failure"
        run: |
          export DOCKER_HOST="unix:///tmp/nonexistent-docker.sock"

          OUTPUT=$(DOCKER_CONTEXT_OVERRIDE=__invalid_context_xyz__ \
                   bash scripts/dev/docker_doctor.sh 2>&1 || true)
          echo "--- doctor output ---"
          echo "${OUTPUT}"
          echo "--------------------"

          if echo "${OUTPUT}" | grep -qiE "ERROR|not found|context"; then
            echo "✅ doctor output contains actionable error token"
          else
            echo "::error::doctor output does not contain an actionable error message"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Live smoke test — only if Docker daemon is actually available
      # ------------------------------------------------------------------

      - name: Live smoke test (skip if no Docker daemon)
        run: |
          if ! docker version >/dev/null 2>&1; then
            echo "ℹ️ No Docker daemon in CI runner — skipping live smoke test"
            exit 0
          fi

          AVAILABLE=$(docker context ls --format '{{.Name}}' | head -1)
          echo "Running docker_doctor.sh against first available context: ${AVAILABLE}"
          bash scripts/dev/docker_doctor.sh "${AVAILABLE}"
