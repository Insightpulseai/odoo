# =============================================================================
# Enterprise OKR Framework — InsightPulse AI
# =============================================================================
#
# Strategic objectives and OKR stack for the enterprise operating model.
# Cross-references operational KPIs in:
#   platform/data/contracts/control_room_kpis.yaml
#
# See also: platform-strategy-2026.yaml (VMOKRAPI-SPATRES full model)
# Planning index: planning_system_index.yaml (layer: operational_okrs)
#
# Spec bundle: spec/wholesale-saas-erp-azure/
# CI validator: scripts/ci/validate_enterprise_okrs.py
#
# Note on Viva Goals: Microsoft Viva Goals was retired 2025-12-31.
# These targets use OKR/SMART wording per Microsoft guidance, stored in
# Azure Boards + spec bundle + SSOT — not deployed to Viva.
# Ref: https://learn.microsoft.com/en-us/viva/goals/goals-retirement
# =============================================================================

schema_version: "2.0"
last_updated: "2026-03-19"

# =============================================================================
# Strategic Objectives (A-E) — Operational KPI Layer
# =============================================================================
strategic_objectives:

  - id: obj_A
    name: "Delivery Speed"
    description: >
      Accelerate time-to-value for engineering and business outcomes through
      governed automation, CI/CD maturity, and streamlined approval workflows.
    key_results:
      - kr: "Deployment frequency >= 2/week (kpi_016)"
        kpi_ref: kpi_016
      - kr: "Approval turnaround P50 < 24h (kpi_001)"
        kpi_ref: kpi_001
      - kr: "CI green rate >= 95% (kpi_017)"
        kpi_ref: kpi_017

  - id: obj_B
    name: "Safety & Reliability"
    description: >
      Ensure production systems maintain high availability, data integrity,
      and sync consistency across the integration backbone.
    key_results:
      - kr: "Sync lag < 15 min (kpi_015)"
        kpi_ref: kpi_015
      - kr: "Identity resolution >= 99% (kpi_014)"
        kpi_ref: kpi_014
      - kr: "n8n workflow success rate >= 95% (kpi_010)"
        kpi_ref: kpi_010

  - id: obj_C
    name: "Infrastructure Efficiency"
    description: >
      Maximize ROI on self-hosted infrastructure through automation coverage,
      document processing throughput, and agent tool reliability.
    key_results:
      - kr: "Automation coverage >= 80% (kpi_011)"
        kpi_ref: kpi_011
      - kr: "OCR accuracy >= 95% (kpi_007)"
        kpi_ref: kpi_007
      - kr: "Invoice throughput >= 50/day (kpi_008)"
        kpi_ref: kpi_008

  - id: obj_D
    name: "Cost & Governance"
    description: >
      Maintain cost-minimized posture while enforcing governance controls
      across finance operations, monthly close, and compliance.
    key_results:
      - kr: "Monthly close cycle < 10 business days (kpi_003)"
        kpi_ref: kpi_003
      - kr: "Expense processing P50 < 48h (kpi_002)"
        kpi_ref: kpi_002
      - kr: "Approval backlog < 20 items (kpi_004)"
        kpi_ref: kpi_004

  - id: obj_E
    name: "Security & Compliance"
    description: >
      Achieve 100% on-time BIR filing, maintain tax reconciliation accuracy,
      and ensure agent platform reliability for compliance workflows.
    key_results:
      - kr: "BIR filing on-time rate = 100% (kpi_005)"
        kpi_ref: kpi_005
      - kr: "Tax reconciliation variance < 0.1% (kpi_006)"
        kpi_ref: kpi_006
      - kr: "Agent tool success rate >= 90% (kpi_012)"
        kpi_ref: kpi_012

# =============================================================================
# Canonical OKR Stack (O1-O3) — Strategic Layer
# =============================================================================
canonical_okrs:

  - id: okr_O1
    name: "Governed Engineering Control Plane"
    description: >
      Establish a fully governed engineering control plane where all repos,
      CI/CD, infrastructure, and integrations are SSOT-managed, observable,
      and audit-trailed.
    parent_objectives: [obj_A, obj_B]
    key_results:
      - kr: "9 active repos classified by 5-layer model with CODEOWNERS"
        measurement: "ssot/github/desired-end-state.yaml org_layers coverage"
      - kr: "3 org-level GitHub Projects operational (Roadmap, Board, Backlog)"
        measurement: "GitHub Projects API query"
      - kr: "CI green rate sustained >= 95%"
        kpi_ref: kpi_017
      - kr: "All SSOT YAML files validated by CI on every push"
        measurement: "Workflow pass rate for *-ssot-gate.yml"

  - id: okr_O2
    name: "Odoo as Governed Runtime"
    description: >
      Position Odoo CE 19 as the governed ERP runtime for finance, HR, and
      approvals with CE + OCA + ipai_* achieving >= 80% EE parity.
    parent_objectives: [obj_D, obj_E]
    key_results:
      - kr: "EE parity score >= 80% weighted"
        measurement: "scripts/test_ee_parity.py output"
      - kr: "BIR filing on-time rate = 100%"
        kpi_ref: kpi_005
      - kr: "Monthly close cycle < 10 business days"
        kpi_ref: kpi_003
      - kr: "All ipai_* modules pass CI gates"
        measurement: "ci-odoo-ce.yml green on main"

  - id: okr_O3
    name: "Azure-Native AI/Data Maturity"
    description: >
      Progress Databricks workspace maturity through defined phases while
      maintaining agent platform reliability and data governance.
    parent_objectives: [obj_C, obj_E]
    key_results:
      - kr: "Databricks workspace at Phase 1 (shared sandbox) with Unity Catalog"
        measurement: "ssot/databricks/workspace.yaml maturity_phases.current"
      - kr: "Agent tool success rate >= 90%"
        kpi_ref: kpi_012
      - kr: "Copilot response latency P95 < 5s"
        kpi_ref: kpi_013
      - kr: "Medallion pipeline coverage for all finance data"
        measurement: "Databricks catalog table count"

# =============================================================================
# SMART Target Set — Q2 2026 (Viva Goals–style)
# =============================================================================
# Three-plane architecture: Odoo (SoR) + Databricks (SoI) + Foundry (Agents)
# Pattern: [Verb] + [specific measurable output] + [deadline] + [constraint]
# Status scale: not_started | in_progress | at_risk | blocked | complete
# Confidence: low | medium | high

smart_targets:

  # ---------------------------------------------------------------------------
  # OBJ-001: Azure Platform Foundation
  # ---------------------------------------------------------------------------
  - id: OBJ-001
    objective: "Establish the Azure platform foundation for InsightPulseAI"
    owner: Jake
    start: "2026-03-19"
    target_date: "2026-05-20"
    status: in_progress
    confidence: medium
    baseline: "Fragmented target-state docs; partial Azure inventory exists"
    target: "1 approved architecture bundle, 4 SSOT topology files, dev/staging/prod separation, monitoring baseline"
    parent_okrs: [okr_O1]
    parent_objectives: [obj_A, obj_B]
    epic_ref: OBJ-001  # azdo-execution-hierarchy.yaml
    key_results:
      - id: KR-001.1
        kr: "Publish 1 canonical landing-zone architecture spec bundle + 4 SSOT topology files"
        metric_type: output
        baseline: "0 approved bundle"
        target: "1 approved bundle + 4 SSOT files"
        due: "2026-04-15"
        status: in_progress
      - id: KR-001.2
        kr: "Define platform/Odoo/data-intelligence/agent-runtime dev-staging-prod boundaries"
        metric_type: milestone
        baseline: "Partial"
        target: "100% defined"
        due: "2026-04-30"
        status: not_started
      - id: KR-001.3
        kr: "Implement baseline identity, policy, secrets, and monitoring controls"
        metric_type: output
        baseline: "Partial"
        target: "100% documented"
        due: "2026-05-15"
        status: not_started
      - id: KR-001.4
        kr: "Implement shared observability baseline for 100% of production-bound services"
        metric_type: output
        baseline: "Partial"
        target: "100% baseline defined"
        due: "2026-05-20"
        status: not_started
    initiatives:
      - "Author landing-zone plan and workload split"
      - "Define subscription/environment model"
      - "Define Key Vault, RBAC, policy, and monitoring baseline"
      - "Codify SSOT YAML files"

  # ---------------------------------------------------------------------------
  # OBJ-002: Odoo Transactional System of Record on Azure
  # ---------------------------------------------------------------------------
  - id: OBJ-002
    objective: "Make Odoo the stable transactional system of record on Azure"
    owner: Jake
    start: "2026-03-19"
    target_date: "2026-05-20"
    status: not_started
    confidence: medium
    baseline: "Odoo target state defined in fragments"
    target: "Approved workload topology, PostgreSQL constraints, filestore/backup pattern, 0 non-Odoo write paths"
    parent_okrs: [okr_O2]
    parent_objectives: [obj_D, obj_E]
    epic_ref: OBJ-002  # azdo-execution-hierarchy.yaml
    key_results:
      - id: KR-002.1
        kr: "Define Odoo workload topology with runtime, database, filestore, backup, and private access"
        metric_type: output
        baseline: "Partial"
        target: "100% documented and approved"
        due: "2026-04-20"
        status: not_started
      - id: KR-002.2
        kr: "Deploy Odoo Azure workload passing health checks and core login/app availability in dev"
        metric_type: milestone
        baseline: "Container running but not hardened"
        target: "Health checks green in dev"
        due: "2026-05-10"
        status: not_started
      - id: KR-002.3
        kr: "Harden PostgreSQL layer with TLS 1.2+ enforced and Azure security baseline alignment"
        metric_type: output
        baseline: "Partial"
        target: "100% security posture documented"
        due: "2026-05-15"
        status: not_started
      - id: KR-002.4
        kr: "Enforce SoR boundaries: 0 approved production flows with direct non-Odoo DB writes"
        metric_type: outcome
        baseline: "Ambiguous"
        target: "0 approved exceptions"
        due: "2026-05-20"
        status: not_started
    initiatives:
      - "Finalize Odoo workload landing-zone spec"
      - "Configure Azure PostgreSQL Flexible Server posture"
      - "Define filestore and backup pattern"
      - "Define disallowed write-path doctrine"

  # ---------------------------------------------------------------------------
  # OBJ-003: Databricks Lakehouse as Governed Intelligence Plane
  # ---------------------------------------------------------------------------
  - id: OBJ-003
    objective: "Build the Databricks lakehouse as the governed intelligence plane"
    owner: Jake
    start: "2026-03-19"
    target_date: "2026-06-05"
    status: not_started
    confidence: medium
    baseline: "Databricks target state partially defined"
    target: "Odoo ingestion defined, governance boundary defined, curated outputs for BI and Copilot"
    parent_okrs: [okr_O3]
    parent_objectives: [obj_C, obj_E]
    epic_ref: OBJ-004  # azdo-execution-hierarchy.yaml
    key_results:
      - id: KR-003.1
        kr: "Define bronze/silver/gold lakehouse topology with flow, ingestion ownership, and consumer contracts"
        metric_type: output
        baseline: "Partial"
        target: "100% documented and approved"
        due: "2026-04-25"
        status: not_started
      - id: KR-003.2
        kr: "Implement Odoo-to-bronze ingestion for at least 5 priority subject areas"
        metric_type: output
        baseline: "0 defined"
        target: "5 subject areas with documented freshness"
        due: "2026-05-20"
        status: not_started
      - id: KR-003.3
        kr: "Govern analytical plane with Unity Catalog — 100% of production analytical assets registered"
        metric_type: output
        baseline: "Partial"
        target: "100% under governed catalog"
        due: "2026-05-30"
        status: not_started
      - id: KR-003.4
        kr: "Publish at least 3 curated gold outputs for downstream BI and Copilot consumption"
        metric_type: output
        baseline: "0 canonical outputs"
        target: "3 curated outputs"
        due: "2026-06-05"
        status: not_started
    initiatives:
      - "Define Odoo replication/export contract"
      - "Create bronze/silver/gold model"
      - "Apply Unity Catalog governance"
      - "Publish curated outputs only, not raw unrestricted tables"

  # ---------------------------------------------------------------------------
  # OBJ-004: Odoo Copilot on Foundry with Bounded Actions
  # ---------------------------------------------------------------------------
  - id: OBJ-004
    objective: "Launch Odoo Copilot on Microsoft Foundry with bounded actions"
    owner: Jake
    start: "2026-03-19"
    target_date: "2026-06-10"
    status: not_started
    confidence: medium
    baseline: "Copilot concept and partial architecture exist"
    target: "Runtime boundary approved, context sources approved, bounded actions only, eval/tracing baseline"
    parent_okrs: [okr_O3]
    parent_objectives: [obj_C, obj_E]
    epic_ref: OBJ-003  # azdo-execution-hierarchy.yaml
    key_results:
      - id: KR-004.1
        kr: "Define Copilot runtime boundary with allowed/disallowed capabilities and tool boundaries"
        metric_type: output
        baseline: "Partial"
        target: "100% documented and approved"
        due: "2026-04-25"
        status: not_started
      - id: KR-004.2
        kr: "Implement grounded retrieval using approved enterprise docs, Databricks outputs, and Odoo endpoints"
        metric_type: output
        baseline: "Partial"
        target: "3 approved source classes defined"
        due: "2026-05-25"
        status: not_started
      - id: KR-004.3
        kr: "Enforce bounded action paths — 100% of production Copilot actions through approved tool interfaces, 0 direct DB writes"
        metric_type: outcome
        baseline: "Ambiguous"
        target: "100% tool-mediated actions"
        due: "2026-06-01"
        status: not_started
      - id: KR-004.4
        kr: "Establish runtime tracing and evaluation — 100% of releases have trace visibility, eval evidence, guardrail checks"
        metric_type: output
        baseline: "Partial"
        target: "100% baseline documented"
        due: "2026-06-10"
        status: not_started
    initiatives:
      - "Define odoo_copilot_foundry.yaml"
      - "Wire approved context sources"
      - "Expose bounded Odoo tool actions"
      - "Add tracing/eval/guardrail baseline"

  # ---------------------------------------------------------------------------
  # OBJ-005: Cross-Plane Governed Operating Model
  # ---------------------------------------------------------------------------
  - id: OBJ-005
    objective: "Connect Odoo, Databricks, and Copilot into one governed operating model"
    owner: Jake
    start: "2026-03-19"
    target_date: "2026-06-10"
    status: not_started
    confidence: medium
    baseline: "Cross-plane boundaries partially defined"
    target: "Architecture and SSOT fully align on SoR, lakehouse, copilot, and audit boundaries"
    parent_okrs: [okr_O1, okr_O2, okr_O3]
    parent_objectives: [obj_A, obj_B, obj_C, obj_D, obj_E]
    epic_ref: null  # New — needs azdo-execution-hierarchy addition
    key_results:
      - id: KR-005.1
        kr: "Document cross-plane data ownership model — Odoo/Databricks/Copilot responsibilities explicitly separated"
        metric_type: output
        baseline: "Partial"
        target: "100% documented in architecture and SSOT"
        due: "2026-04-30"
        status: not_started
      - id: KR-005.2
        kr: "Implement end-to-end observability linkage — Odoo events, lakehouse pipelines, Copilot traces correlatable"
        metric_type: output
        baseline: "Partial"
        target: "100% of production release paths"
        due: "2026-06-10"
        status: not_started
      - id: KR-005.3
        kr: "Publish bounded integration contract for all Copilot-to-Odoo and Databricks-to-Copilot paths"
        metric_type: output
        baseline: "0 canonical contract"
        target: "All paths in spec and SSOT"
        due: "2026-05-30"
        status: not_started
      - id: KR-005.4
        kr: "Reduce architectural ambiguity to zero — close all SoR/lakehouse/Copilot action authority contradictions"
        metric_type: outcome
        baseline: "Known contradictions exist"
        target: "0 conflicting statements"
        due: "2026-05-15"
        status: not_started
    initiatives:
      - "Write cross-plane architecture doc"
      - "Add integration SSOT"
      - "Define audit and incident linkage"
      - "Validate no conflicting SoR language remains"

