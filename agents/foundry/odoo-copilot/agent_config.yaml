# =============================================================================
# Pulser — Foundry Agent Configuration
# =============================================================================
# Defines the hosted agent for Azure AI Foundry deployment.
# Uses Responses API (Agents v2) with function calling.
#
# Foundry project: data-intel-ph
# Foundry resource: data-intel-ph-resource
# Model: gpt-4.1
#
# Skill registry: agents/skills/pulser/SKILL_REGISTRY.yaml
# KB registry: agents/knowledge/pulser/KB_REGISTRY.yaml
# =============================================================================

agent:
  name: ipai-odoo-copilot
  display_name: "Pulser — Odoo Copilot"
  description: "AI assistant for Odoo ERP operations — search, analyze, and act on business data"
  model: gpt-4.1
  project: data-intel-ph
  resource: data-intel-ph-resource

instructions: |
  You are Pulser, the Odoo Copilot for InsightPulseAI. You help users manage their ERP data through natural language.

  Your capabilities:
  - Search contacts, customers, and companies
  - View CRM pipeline and opportunities
  - Check sales orders and quotations
  - Review overdue invoices and financial data
  - Monitor project tasks and deadlines
  - Check inventory and stock levels
  - Create follow-up activities and notes
  - Manage CMS pages (list, publish, unpublish)
  - Check system health

  Rules:
  - Always confirm before creating or modifying records
  - Never expose raw database IDs to users without context
  - Format financial amounts with currency symbols
  - Use the user's timezone for date/time displays
  - If you cannot find data, say so clearly — do not hallucinate records
  - For sensitive operations (delete, bulk update), explain what will happen before executing
  - Odoo is the source of truth for all business data

  Grounding:
  - Use Azure AI Search (index: odoo-knowledge) for documentation queries
  - Use Odoo JSON-2 API tools for live business data queries

tools:
  # Odoo business tools (from MCP connector)
  - type: function
    function:
      name: odoo_search_partners
      description: "Search contacts and companies by name, email, or phone"
      parameters:
        type: object
        properties:
          query: {type: string, description: "Search term"}
          limit: {type: integer, minimum: 1, maximum: 25}
        required: [query]

  - type: function
    function:
      name: odoo_list_opportunities
      description: "List CRM pipeline opportunities"
      parameters:
        type: object
        properties:
          stage: {type: string, description: "Filter by stage name"}
          limit: {type: integer, minimum: 1, maximum: 50}

  - type: function
    function:
      name: odoo_search_sale_orders
      description: "Search sale orders by customer or reference"
      parameters:
        type: object
        properties:
          query: {type: string}
          limit: {type: integer, minimum: 1, maximum: 25}
        required: [query]

  - type: function
    function:
      name: odoo_list_overdue_invoices
      description: "List overdue customer invoices"
      parameters:
        type: object
        properties:
          partner_name: {type: string}
          limit: {type: integer, minimum: 1, maximum: 50}

  - type: function
    function:
      name: odoo_list_project_tasks
      description: "List project tasks with optional filters"
      parameters:
        type: object
        properties:
          project_id: {type: integer}
          stage: {type: string}
          limit: {type: integer, minimum: 1, maximum: 50}

  - type: function
    function:
      name: odoo_get_product_availability
      description: "Check product stock availability"
      parameters:
        type: object
        properties:
          query: {type: string, description: "Product name or SKU"}
        required: [query]

  - type: function
    function:
      name: odoo_create_activity
      description: "Create a follow-up activity on an Odoo record"
      parameters:
        type: object
        properties:
          model: {type: string, description: "Odoo model (e.g., crm.lead, sale.order)"}
          record_id: {type: integer}
          summary: {type: string}
          date_deadline: {type: string, description: "YYYY-MM-DD"}
        required: [model, record_id, summary]

  - type: function
    function:
      name: odoo_health_check
      description: "Check Odoo ERP connectivity and health"
      parameters:
        type: object
        properties: {}

  # Azure AI Search grounding
  - type: function
    function:
      name: search_odoo_knowledge
      description: "Search Odoo documentation and knowledge base for answers about features, modules, and workflows"
      parameters:
        type: object
        properties:
          query: {type: string, description: "Search query about Odoo features or workflows"}
        required: [query]

search:
  service: srch-ipai-copilot
  index: odoo-knowledge
  semantic_config: default
  top_k: 5

# Consolidated registries (canonical skill + KB definitions)
registries:
  skills: agents/skills/pulser/SKILL_REGISTRY.yaml
  knowledge: agents/knowledge/pulser/KB_REGISTRY.yaml

auth:
  mode: entra_id
  token_scope: "https://cognitiveservices.azure.com/.default"
  required_roles:
    - Cognitive Services User

safety:
  content_filter: default
  grounding_detection: true
  prompt_shields: true
