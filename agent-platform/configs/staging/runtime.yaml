# runtime.yaml — staging environment runtime configuration
environment: staging
api:
  port: 8090
  host: "0.0.0.0"

orchestrator:
  max_concurrent_sessions: 25
  session_timeout_ms: 300000
  checkpoint_interval_steps: 3

executor:
  max_tokens_per_call: 4096
  tool_timeout_ms: 30000
  sandbox_enabled: true

gateway:
  rate_limit_per_minute: 120
  circuit_breaker_threshold: 5
  backends:
    odoo:
      url: ""  # TODO: Set staging Odoo URL
    foundry:
      url: ""  # TODO: Set staging Foundry URL

telemetry:
  enabled: true
  exporter: "azure-monitor"

logging:
  level: "info"
