---
# Azure Sample Catalog + azd + Azure CLI Skill Map
# Family: azure_sample_azd
# Created: 2026-03-17

meta:
  name: azure_sample_azd_skill_map
  version: 1
  family: azure_sample_azd
  description: >
    Maps personas, skills, and knowledge bases for the Azure Sample Catalog,
    Azure Developer CLI, and Azure CLI benchmark layer. Enforces doctrine:
    samples are fixtures, azd first for app bootstrap, Azure CLI for granular admin.

# Global rules for this skill family
global_rules:
  - Use azd first for app bootstrap and deployment
  - Use Azure CLI when you need granular admin/resource control
  - Prefer sample patterns that are secure by default (managed identity, VNet, keyless)
  - Treat samples as fixtures, not as canonical architecture
  - Extract patterns from samples into contracts before standardizing
  - Keycloak is transitional — new auth integrations target Entra directly
  - ACA is canonical compute — never propose AKS without explicit justification
  - Flex Consumption is default for Azure Functions — Classic only with justification

# Persona registry
personas:
  - name: azure-bootstrap-engineer
    path: agents/personas/azure-bootstrap-engineer.md
    owns:
      - azd-template-selection
      - azd-environment-bootstrap
    authority: azd template selection, environment bootstrap, azure.yaml configuration

  - name: app-hosting-engineer
    path: agents/personas/app-hosting-engineer.md
    owns:
      - azd-secure-default-deployment
      - aca-app-deployment-patterns
    authority: ACA deployment, secure-default posture, managed identity + VNet + keyless

  - name: functions-platform-engineer
    path: agents/personas/functions-platform-engineer.md
    owns:
      - azure-functions-azd-patterns
    authority: Azure Functions Flex Consumption, triggers, managed identity, VNet

  - name: entra-auth-integrator
    path: agents/personas/entra-auth-integrator.md
    owns:
      - entra-auth-app-patterns
    authority: Entra app registrations, token validation, keyless access, OpenAI + Entra

  - name: sample-fixture-curator
    path: agents/personas/sample-fixture-curator.md
    owns:
      - sample-to-contract-extraction
    authority: Pattern extraction from samples, contract drafting, secure-default verification

  - name: azure-cli-admin
    path: agents/personas/azure-cli-admin.md
    owns:
      - azure-cli-resource-operations
      - azure-load-testing-cli-patterns
    authority: Azure CLI granular admin, diagnostics, log queries, maintenance, load testing

  - name: azd-deployment-judge
    path: agents/personas/azd-deployment-judge.md
    owns:
      - azd-vs-azure-cli-decision
    authority: Tool selection judgment (AZD / AZURE_CLI / BOTH)

# Skill registry
skills:
  - name: azd-template-selection
    path: agents/skills/azd-template-selection/
    type: ops_skill
    owner: azure-bootstrap-engineer
    purpose: Select appropriate azd template for workload type
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: azd-environment-bootstrap
    path: agents/skills/azd-environment-bootstrap/
    type: ops_skill
    owner: azure-bootstrap-engineer
    purpose: Initialize azd environment with correct targeting
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: azd-secure-default-deployment
    path: agents/skills/azd-secure-default-deployment/
    type: ops_skill
    owner: app-hosting-engineer
    purpose: Deploy with secure-by-default posture via azd
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: azure-cli-resource-operations
    path: agents/skills/azure-cli-resource-operations/
    type: ops_skill
    owner: azure-cli-admin
    purpose: Granular Azure resource operations via CLI
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: azure-functions-azd-patterns
    path: agents/skills/azure-functions-azd-patterns/
    type: ops_skill
    owner: functions-platform-engineer
    purpose: Azure Functions with azd + Flex Consumption + secure defaults
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: aca-app-deployment-patterns
    path: agents/skills/aca-app-deployment-patterns/
    type: ops_skill
    owner: app-hosting-engineer
    purpose: ACA deployment with scaling, ingress, health probes
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: entra-auth-app-patterns
    path: agents/skills/entra-auth-app-patterns/
    type: ops_skill
    owner: entra-auth-integrator
    purpose: Entra authentication, keyless access, OpenAI + Entra pattern
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: sample-to-contract-extraction
    path: agents/skills/sample-to-contract-extraction/
    type: ops_skill
    owner: sample-fixture-curator
    purpose: Extract patterns from Azure samples into platform contracts
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: azd-vs-azure-cli-decision
    path: agents/skills/azd-vs-azure-cli-decision/
    type: judge_skill
    owner: azd-deployment-judge
    purpose: Judge tool selection — AZD / AZURE_CLI / BOTH
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

  - name: azure-load-testing-cli-patterns
    path: agents/skills/azure-load-testing-cli-patterns/
    type: ops_skill
    owner: azure-cli-admin
    purpose: Azure Load Testing via CLI — creation, execution, analysis
    files:
      - skill-contract.yaml
      - prompt.md
      - README.md
      - checklist.md
      - examples.md
      - EVALS.md

# Knowledge base registry
knowledge_bases:
  - name: azure-sample-code-catalog
    path: agents/knowledge/benchmarks/azure-sample-code-catalog.md
    type: benchmark
    doctrine: Samples are implementation fixtures, NOT architecture doctrine
    covers:
      - secure-by-default Functions patterns
      - Entra-authenticated AI apps
      - full-stack ACA templates
      - data integration patterns
      - IaC patterns

  - name: azure-developer-cli
    path: agents/knowledge/benchmarks/azure-developer-cli.md
    type: benchmark
    doctrine: azd is the developer-facing app bootstrap/deploy tool
    covers:
      - key commands (init, env, up, provision, deploy, monitor, pipeline config)
      - template model and azure.yaml structure
      - environment management
      - CI/CD integration (GitHub Actions, Azure Pipelines)

  - name: azure-cli-vs-azd
    path: agents/knowledge/benchmarks/azure-cli-vs-azd.md
    type: benchmark
    doctrine: azd = app lifecycle, Azure CLI = granular admin
    covers:
      - decision matrix (when to use which)
      - anti-patterns (wrong tool for the job)
      - hybrid scenarios and boundaries
      - platform-specific rules

# Skill workflow chains
workflows:
  app_bootstrap:
    description: Full app bootstrap from template to deployment
    steps:
      - skill: azd-vs-azure-cli-decision
        verdict: AZD
      - skill: azd-template-selection
      - skill: azd-environment-bootstrap
      - skill: azd-secure-default-deployment

  aca_deployment:
    description: ACA-specific deployment
    steps:
      - skill: azd-vs-azure-cli-decision
        verdict: AZD
      - skill: aca-app-deployment-patterns
      - skill: azure-cli-resource-operations
        note: post-deployment verification only

  functions_deployment:
    description: Azure Functions deployment
    steps:
      - skill: azd-vs-azure-cli-decision
        verdict: AZD
      - skill: azure-functions-azd-patterns

  auth_integration:
    description: Entra authentication integration
    steps:
      - skill: entra-auth-app-patterns
      - skill: azd-secure-default-deployment
        note: deploy with auth configured

  sample_extraction:
    description: Extract pattern from Azure sample
    steps:
      - skill: sample-to-contract-extraction
      - skill: azd-template-selection
        note: if sample becomes a template candidate

  performance_testing:
    description: Load testing workflow
    steps:
      - skill: azd-vs-azure-cli-decision
        verdict: AZURE_CLI
      - skill: azure-load-testing-cli-patterns

# Tool selection quick reference
tool_selection:
  azd_tasks:
    - app bootstrap and initialization
    - infrastructure provisioning
    - application deployment
    - CI/CD pipeline configuration
    - template browsing and selection
    - environment management
    - resource cleanup (azd down)

  azure_cli_tasks:
    - resource inventory and queries
    - diagnostics and log queries
    - scaling adjustments
    - certificate management
    - DNS configuration
    - Front Door routing
    - Key Vault operations
    - load testing
    - role assignments
    - monitoring queries

  both_tasks:
    - deploy + verify (azd deploy, az check)
    - provision + configure (azd provision, az fine-tune)
    - initial setup + diagnostics (azd up, az logs)
