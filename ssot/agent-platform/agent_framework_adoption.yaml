    Start with the smallest shape that preserves boundaries and runs end-to-end.
    Expand from this skeleton phase-by-phase, not big-bang.
  files:
    - agent-platform/pyproject.toml
    - agent-platform/README.md
    - agent-platform/spec/agent-platform-runtime/constitution.md
    - agent-platform/spec/agent-platform-runtime/prd.md
    - agent-platform/spec/agent-platform-runtime/plan.md
    - agent-platform/spec/agent-platform-runtime/tasks.md
    - agent-platform/ssot/runtime/agents.yaml
    - agent-platform/ssot/runtime/tools.yaml
    - agent-platform/ssot/runtime/models.yaml
    - agent-platform/ssot/runtime/environments.yaml
    - agent-platform/src/agent_platform/__init__.py
    - agent-platform/src/agent_platform/main.py
    - agent-platform/src/agent_platform/settings.py
    - agent-platform/src/agent_platform/runtime/__init__.py
    - agent-platform/src/agent_platform/runtime/engine.py
    - agent-platform/src/agent_platform/runtime/registry.py
    - agent-platform/src/agent_platform/runtime/graph_builder.py
    - agent-platform/src/agent_platform/orchestration/__init__.py
    - agent-platform/src/agent_platform/orchestration/router.py
    - agent-platform/src/agent_platform/orchestration/supervisor.py
    - agent-platform/src/agent_platform/providers/__init__.py
    - agent-platform/src/agent_platform/providers/foundry/__init__.py
    - agent-platform/src/agent_platform/providers/foundry/auth.py
    - agent-platform/src/agent_platform/providers/foundry/client.py
    - agent-platform/src/agent_platform/tools/__init__.py
    - agent-platform/src/agent_platform/tools/base.py
    - agent-platform/src/agent_platform/tools/registry.py
    - agent-platform/src/agent_platform/tools/odoo/__init__.py
    - agent-platform/src/agent_platform/tools/odoo/client.py
    - agent-platform/src/agent_platform/tools/odoo/sales.py
    - agent-platform/src/agent_platform/tools/odoo/accounting.py
    - agent-platform/src/agent_platform/evals/__init__.py
    - agent-platform/src/agent_platform/evals/runner.py
    - agent-platform/src/agent_platform/evals/scorecards.py
