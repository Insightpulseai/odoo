version: 1
namespace: ipai.agents.runtime.odoo_copilot.v1
artifact_type: manifest
repo_key: agents
domain: runtime
subject: odoo_copilot

# ============================================================================
# ODOO COPILOT AGENT MANIFEST
# ============================================================================
# Canonical definition of the IPAI Odoo Copilot hosted on Foundry Agent Service.
# This is the primary user-facing AI assistant for the InsightPulseAI platform.
# ============================================================================

foundry:
  project_key: data_intel_ph
  runtime: agent_service
  agent_type: prompt  # prompt | workflow | hosted
  sdk_mode: foundry_sdk

identity:
  name: ipai-odoo-copilot
  description: >
    Workspace-native AI copilot for Odoo 18 CE. Benchmarked against
    Notion 3.0 at the behavior layer: context-aware, action-oriented,
    structured outputs, memory/instructions, workflow completion.
    Not a chatbot — an ERP operator agent.
  owner_repo: agents
  owner_team: "@Insightpulseai/platform"

benchmark:
  reference: "Notion 3.0 Agent (behavior layer, not visual style)"
  source: "https://www.notion.com/blog/introducing-notion-3-0"
  principles:
    - id: native_not_bolted_on
      description: "Agent is part of the core workspace, not a disconnected widget"
      status: done  # Systray + side panel shipped
    - id: action_first
      description: "Agent finishes real work (drafts, summaries, tool execution)"
      status: partial  # 13 read-only tools, no write tools yet
    - id: structured_outputs
      description: "Returns structured artifacts, not just markdown in a chat bubble"
      status: planned  # Currently returns text + citations
    - id: personalization_memory
      description: "User/company-scoped instructions, role behavior, preferences"
      status: planned
    - id: multi_agent_future
      description: "Specialist agents (finance, procurement, helpdesk, compliance)"
      status: future

  tiers:
    tier_1_now:
      - systray_entry
      - side_panel
      - current_record_context
      - response_with_citations
      - audit_safe_behavior
      - disabled_error_states
    tier_2_next:
      - saved_instructions_memory
      - structured_response_blocks
      - multi_step_tool_summaries
      - completion_notifications
      - reusable_prompt_presets
    tier_3_future:
      - custom_specialist_agents
      - scheduled_triggered_agents
      - broader_mcp_connectors
      - role_specific_agent_ux

model:
  alias: chat_default
  fallback_alias: chat_fast
  deployment_name: ipai-chat-default

capabilities:
  - navigational      # Deep-link to Odoo records
  - informational     # Q&A on Odoo docs, OCA, BIR rules
  - transactional     # Read/write Odoo data (when authorized)
  - compliance_intel  # Proactive tax findings and alerts

write_policy:
  default: read_only
  modes:
    - read_only
    - draft_only
    - full_access  # Requires explicit opt-in

tools:
  - tool_id: azure_ai_search
    purpose: Knowledge grounding (Odoo docs, OCA docs, BIR rules)
    auth_mode: managed_identity

  - tool_id: learn_mcp
    purpose: Microsoft Learn documentation access
    auth_mode: anonymous
    approval_mode: always

  - tool_id: odoo_actions
    purpose: Read/write Odoo records via XML-RPC
    auth_mode: key
    approval_mode: policy_driven

  - tool_id: web_search
    purpose: Real-time web information
    approval_mode: none

knowledge:
  primary_kb: ipai-knowledge-index
  search_service: srch-ipai-dev
  registry: agents/knowledge/pulser/KB_REGISTRY.yaml
  sources:
    - odoo_18_official_docs
    - oca_module_documentation
    - bir_compliance_rules
    - ipai_internal_procedures

skills:
  registry: agents/skills/pulser/SKILL_REGISTRY.yaml
  active_packs:
    - pulser_erp_core
    - pulser_taxpulse_ph
    - pulser_finance_ops
    - pulser_knowledge_search

consumption:
  odoo_discuss: true     # Via ipai_odoo_copilot Discuss bot
  http_api: true         # Via /ipai/copilot/chat controller
  docs_widget: true      # Via documentation site chat widget
  teams_channel: false   # Future: publish to Microsoft Teams

evaluation:
  dataset: evals/odoo-copilot/dataset.jsonl
  evaluators:
    - builtin.task_adherence
    - builtin.groundedness
    - builtin.fluency
    - builtin.violence
  thresholds:
    task_adherence: 3  # out of 5
    groundedness: 3
    fluency: 3
    violence: 1        # severity scale 0-7, must be ≤1

promotion_status:
  dev: deployed
  staging: pending  # Blocked: Foundry project not provisioned
  prod: not_started

blockers:
  - "Azure AI Foundry project not yet provisioned in rg-ipai-ai-dev"
  - "Knowledge index (srch-ipai-dev) needs seeding with Odoo/OCA/BIR docs"
  - "Odoo Discuss bot module (ipai_odoo_copilot) needs deployment"
  - "Eval dataset needs expansion from 4 → 20 test cases"
