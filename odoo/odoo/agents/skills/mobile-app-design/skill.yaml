# Mobile App Design Skill
# Mobile application design and development

name: mobile_app_design
version: 1.0.0
key: app.mobile.design
description: |
  Design and develop mobile applications: wireframes, UI components,
  navigation flows, offline support, and Odoo mobile integration.

intents:
  - design mobile app
  - mobile app development
  - mobile ui design
  - app wireframes
  - mobile odoo interface

guardrails:
  - Platform-agnostic design (React Native or Flutter preferred)
  - Offline-first architecture for field service use cases
  - Follow platform design guidelines (Material Design / HIG)
  - Odoo integration via REST API only (no direct DB)
  - Accessibility compliance (WCAG 2.1 AA)

tools:
  - key: mobile.wireframe
    name: Create Wireframes
    target_model: ipai.mobile.runner
    target_method: create_wireframes
    description: Generate wireframe specifications for screens

  - key: mobile.components
    name: Design Components
    target_model: ipai.mobile.runner
    target_method: design_components
    description: Design reusable UI component library

  - key: mobile.navigation
    name: Navigation Design
    target_model: ipai.mobile.runner
    target_method: design_navigation
    description: Define navigation structure and screen flows

  - key: mobile.prototype
    name: Build Prototype
    target_model: ipai.mobile.runner
    target_method: build_prototype
    description: Create functional prototype with mock data

workflow:
  - mobile.wireframe
  - mobile.components
  - mobile.navigation
  - mobile.prototype

input_schema:
  type: object
  required:
    - app_name
    - platform
  properties:
    app_name: { type: string }
    platform:
      type: string
      enum: [react_native, flutter, pwa, native_ios, native_android]
    screens:
      type: array
      items:
        type: object
        properties:
          name: { type: string }
          purpose: { type: string }
          components: { type: array, items: { type: string } }
    odoo_models:
      type: array
      items: { type: string }

output_schema:
  type: object
  properties:
    wireframes: { type: array, items: { type: string } }
    component_library: { type: object }
    navigation_map: { type: object }
    prototype_url: { type: string }

agentInstructions: |
  When designing mobile apps:

  1. **Wireframes**: Screen-by-screen specs with component placement
  2. **Components**: Reusable component library matching design system
  3. **Navigation**: Tab bar, stack navigation, drawer patterns
  4. **Offline**: Queue mutations, sync on reconnect
  5. **Odoo Integration**: REST endpoints for CRUD operations
