# =============================================================================
# Design Parity Enforcement Rules
# =============================================================================
# Repo-local gate. All visual implementation must resolve to governed
# foundations, approved component mappings, or approved assets.
#
# Upstream reference: Fluent UI / Fluent 2 (component + interaction + token model)
# Local authority: design/ directory (foundations, assets, guidance, validation)
# =============================================================================

version: 1
status: active
owner: design-system
description: >
  Repo-local design parity enforcement rules. All visual implementation must
  resolve to governed foundations, approved component mappings, or approved assets.

source_of_truth:
  order:
    - design/foundations/tokens/
    - design/components/fluent-mappings/
    - design/assets/
    - design/guidance/
  upstream_references:
    - name: fluent-ui
      role: component-and-interaction-reference
    - name: fluent-2
      role: token-and-motion-reference

scope:
  includes:
    - web/**
    - apps/**
    - platform/**
    - odoo/**
    - design/**
  excludes:
    - archive/**
    - docs-site/**
    - web-site/**
    - documentaion/**
    - node_modules/**
    - dist/**
    - build/**
    - coverage/**
    - .next/**
    - .turbo/**
    - vendor/**

# -----------------------------------------------------------------------------
# Foundations — Token governance
# -----------------------------------------------------------------------------
foundations:
  required_token_files:
    - design/foundations/tokens/color.json
    - design/foundations/tokens/typography.json
    - design/foundations/tokens/spacing.json
    - design/foundations/tokens/radius.json
    - design/foundations/tokens/elevation.json
    - design/foundations/tokens/shadow.json
    - design/foundations/tokens/motion.json
    - design/foundations/tokens/zindex.json
    - design/foundations/tokens/iconography.json

  token_usage:
    colors:
      must_come_from:
        - color.json
      forbid:
        - hardcoded-hex
        - arbitrary-rgb
        - arbitrary-hsl
    typography:
      must_come_from:
        - typography.json
      forbid:
        - ad-hoc-font-size
        - ad-hoc-line-height
        - ad-hoc-font-weight
    spacing:
      must_come_from:
        - spacing.json
      forbid:
        - arbitrary-spacing-scale
    radius:
      must_come_from:
        - radius.json
      forbid:
        - one-off-border-radius
    elevation:
      must_come_from:
        - elevation.json
        - shadow.json
      forbid:
        - one-off-box-shadow
        - one-off-drop-shadow
    motion:
      must_come_from:
        - motion.json
      forbid:
        - one-off-duration
        - one-off-easing
        - ungoverned-keyframes

# -----------------------------------------------------------------------------
# Components — Fluent-aligned mapping governance
# -----------------------------------------------------------------------------
components:
  mapping_files:
    - design/components/fluent-mappings/component-map.yaml
    - design/components/fluent-mappings/interaction-map.yaml

  requirements:
    every_net_new_component_must_have_mapping: true
    every_override_must_have_record: true
    fluent_alignment_required_by_default: true

  forbidden_patterns:
    - custom-component-without-mapping
    - variant-without-token-reference
    - state-style-without-interaction-map
    - duplicate-component-semantics

# -----------------------------------------------------------------------------
# Interaction — State and accessibility requirements
# -----------------------------------------------------------------------------
interaction:
  states_required:
    - default
    - hover
    - active
    - focus
    - disabled
    - loading
    - selected
    - error
  accessibility_required:
    visible_focus_state: true
    reduced_motion_path: true
    keyboard_state_parity: true

# -----------------------------------------------------------------------------
# Motion — Functional, not decorative
# -----------------------------------------------------------------------------
motion:
  principles:
    reduced_motion_must_be_supported: true
    motion_must_be_functional_not_decorative_only: true
    page_transition_motion_requires_explicit_approval: true
  defaults:
    source: design/foundations/tokens/motion.json

# -----------------------------------------------------------------------------
# Assets — Governed roots only
# -----------------------------------------------------------------------------
assets:
  approved_roots:
    - design/assets/brand/
    - design/assets/icons/
    - design/assets/illustrations/
    - design/assets/media/

  rules:
    no_unregistered_brand_assets: true
    no_inline_logo_copies: true
    no_random_stock_assets_in_product: true
    no_vendor_assets_rehosted_without_license_record: true

  file_classes:
    brand:
      roots:
        - design/assets/brand/
    icons:
      roots:
        - design/assets/icons/
    illustrations:
      roots:
        - design/assets/illustrations/
    media:
      roots:
        - design/assets/media/

# -----------------------------------------------------------------------------
# Platform diagrams — Microsoft icon rules
# -----------------------------------------------------------------------------
platform_diagrams:
  microsoft_icon_rules:
    preserve_aspect_ratio: true
    no_rotation: true
    no_cropping: true
    no_recoloring: true
    keep_label_near_icon: true

# -----------------------------------------------------------------------------
# Code enforcement — Pattern deny rules
# -----------------------------------------------------------------------------
code_enforcement:
  css_like_files:
    - "**/*.css"
    - "**/*.scss"
    - "**/*.sass"
    - "**/*.less"
    - "**/*.module.css"
    - "**/*.module.scss"
  ui_code_files:
    - "**/*.tsx"
    - "**/*.jsx"
    - "**/*.xml"
    - "**/*.js"
    - "**/*.ts"

  deny_patterns:
    hardcoded_hex:
      regex: "#([0-9a-fA-F]{3}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})\\b"
      allowlist_files: []
    arbitrary_box_shadow:
      regex: "\\bbox-shadow\\s*:\\s*(?!var\\(|token\\(|--)"
      allowlist_files: []
    arbitrary_transition_duration:
      regex: "\\b(transition|animation)(-duration)?\\s*:\\s*(?!var\\(|token\\(|--)"
      allowlist_files: []
    arbitrary_border_radius:
      regex: "\\bborder-radius\\s*:\\s*(?!var\\(|token\\(|--)"
      allowlist_files: []
    inline_brand_asset_path:
      regex: "(logo|brand|illustration|hero).*(png|svg|jpg|webp)"
      allowlist_roots:
        - design/assets/

# -----------------------------------------------------------------------------
# Overrides — Exception registry
# -----------------------------------------------------------------------------
overrides:
  registry_file: design/validation/parity-overrides.yaml
  required_fields:
    - id
    - owner
    - rationale
    - scope
    - replacement_rule
    - approval_date
    - review_date
    - expiry_date
  policy:
    override_required_for_any_exception: true
    expired_override_fails_ci: true

# -----------------------------------------------------------------------------
# CI — Fail and warn conditions
# -----------------------------------------------------------------------------
ci:
  fail_on:
    - missing_required_token_files
    - missing_component_mapping
    - forbidden_pattern_match
    - missing_override_for_exception
    - expired_override
    - unapproved_asset_root
  warn_on:
    - unused_tokens
    - duplicate_component_mappings
    - stale_assets
    - shadow_token_not_used
