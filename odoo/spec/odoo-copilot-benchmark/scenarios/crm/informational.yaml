# CRM — Informational Benchmark Scenarios
# Capability class: informational (retrieve and present factual data)

scenarios:
  - id: "BM-CRM-I-001"
    domain: crm
    capability_class: informational
    persona: sales_mgr
    prompt: "What is the total expected revenue of open opportunities this quarter?"
    setup:
      seed_records:
        - model: crm.lead
          values: { name: "Deal A", type: "opportunity", expected_revenue: 25000 }
        - model: crm.lead
          values: { name: "Deal B", type: "opportunity", expected_revenue: 35000 }
        - model: crm.lead
          values: { name: "Deal C", type: "opportunity", expected_revenue: 40000 }
    expected_behavior:
      type: aggregate
      source_model: crm.lead
      fields:
        expected_revenue: 100000
      citation_required: true
    hard_gates:
      capability: true
      correctness: true
      grounding: true
    soft_scores:
      completeness: { weight: 0.30 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 5000, weight: 0.10 }
    tags: [crm, revenue, aggregate]

  - id: "BM-CRM-I-002"
    domain: crm
    capability_class: informational
    persona: sales_rep
    prompt: "Summarize the last 3 activities on the ACME Corp opportunity"
    setup:
      seed_records:
        - model: crm.lead
          values: { name: "ACME Corp Renewal", type: "opportunity" }
    expected_behavior:
      type: search
      source_model: mail.activity
      fields: {}
      citation_required: true
    hard_gates:
      capability: true
      correctness: true
      grounding: true
    soft_scores:
      completeness: { weight: 0.30 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 5000, weight: 0.10 }
    tags: [crm, activity, summary]

  - id: "BM-CRM-I-003"
    domain: crm
    capability_class: informational
    persona: sales_mgr
    prompt: "How many opportunities were lost this month and what were the top 3 loss reasons?"
    expected_behavior:
      type: aggregate
      source_model: crm.lead
      fields:
        lost_reason_id: "top 3 by count"
      citation_required: true
    hard_gates:
      capability: true
      correctness: true
      grounding: true
    soft_scores:
      completeness: { weight: 0.30 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 5000, weight: 0.10 }
    tags: [crm, lost-reasons, aggregate]
