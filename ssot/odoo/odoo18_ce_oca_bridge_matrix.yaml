version: 1
artifact: odoo18_ce_oca_bridge_matrix
target_odoo_version: "18.0"

legend:
  deployed_now: "Validated as installed/effectively covered in current odoo_dev baseline"
  native_core: "Handled by Odoo 18 core, not required as separate OCA install for this baseline"
  bridge_next: "Best handled by external bridge/service or copilot integration layer"
  backlog_later: "Not part of current validated baseline; defer unless explicitly prioritized"

environment:
  database: odoo_dev
  validation_summary:
    installed_modules_count: 71
    expected_modules_count: 75
    effective_baseline_status: complete
    notes:
      - "3 of 4 apparent missing modules are already covered by Odoo 18 core"
      - "timesheet_timer is not present in OCA 18.0 timesheet repo"
      - "hr_timesheet_begin_end is the candidate replacement for precise start/stop timing"

baseline_validation:
  deployed_now:
    - base
    - accounting
    - sales
    - purchase
    - projects
  native_core:
    - web_advanced_search
    - web_listview_range_select
    - mail_activity_plan
  replacement_candidates:
    timesheet_timer:
      status: missing_from_oca_18
      recommended_replacement: hr_timesheet_begin_end
      required: false

ai_lane:
  oca_ai_repo:
    branch: "18.0"
    installed:
      - ai_oca_bridge
      - ai_oca_bridge_extra_parameters
    optional:
      - ai_oca_bridge_chatter
    skipped_by_default:
      - ai_oca_native_generate_ollama
    strategy: foundry_first_bridge
    notes:
      - "OCA/ai is treated as a lightweight bridge abstraction"
      - "Primary copilot/runtime lane remains external bridge + Foundry-style orchestration"

domains:
  base_admin_ux_controls:
    lane: ce_oca
    status:
      deployed_now: true
      native_core: []
      bridge_next: []
      backlog_later: []
    oca_repos:
      - partner-contact
      - queue
      - reporting-engine
      - server-auth
      - server-brand
      - server-tools
      - server-ux
      - web
      - mail
      - knowledge
      - social
    representative_modules:
      - queue_job
      - report_xlsx
      - password_security
      - auditlog
      - base_name_search_improved
      - date_range
      - server_action_mass_edit
      - web_dialog_size
      - web_environment_ribbon
      - web_favicon
      - web_m2x_options
      - web_no_bubble
      - web_pivot_computed_measure
      - web_refresher
      - web_responsive
      - web_search_with_and
      - web_tree_many2one_clickable
      - mail_debrand
      - mail_tracking
      - document_url
      - base_search_mail_content
