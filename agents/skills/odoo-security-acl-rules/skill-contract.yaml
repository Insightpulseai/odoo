version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-security-acl-rules
  status: active
  owner: agents
  build_order: 4
  lane: security
  purpose: >
    Define security groups, ACLs (ir.model.access.csv), and record rules
    for Odoo CE 18 modules. Ensures every model has proper access control,
    multi-company record rules, and correct group hierarchy.

  triggers:
    - new model created without security definitions
    - access control changes required for existing module
    - multi-company record rules needed
    - security audit flags missing ACLs

  inputs:
    - model_names (list of models requiring security)
    - groups (optional custom group definitions)
    - record_rules (optional domain-based rules)
    - multi_company (boolean, whether multi-company rules apply)

  steps:
    - define security groups in security/security.xml with category and implied_ids
    - create ir.model.access.csv with header and all 4 CRUD columns
    - use ID pattern access_<model>_<group> for ACL rows
    - create record rules in security/security.xml for multi-company isolation
    - verify Portal and Internal User groups are mutually exclusive (Odoo 18)
    - ensure group hierarchy is correct (manager implies user)
    - test access by creating records under different users on disposable DB
    - verify no model is left without at least one ACL row

  outputs:
    - security_xml_path
    - acl_csv_path
    - groups_defined
    - record_rules_defined
    - access_test_result
    - evidence

  guardrails:
    - always provide all 4 CRUD columns in ir.model.access.csv
    - ACL ID pattern must be access_<model>_<group>
    - Portal and Internal User are mutually exclusive in Odoo 18
    - never grant full CRUD to public/portal users without explicit justification
    - multi-company record rules must use ['|', ('company_id', '=', False), ('company_id', 'in', company_ids)]
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified
    - security XML must be listed first in __manifest__.py data section

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-security-acl-rules/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo18-coding.md
