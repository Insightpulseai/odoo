version: 1
namespace: ipai.agents.foundry.agent_publish_rules.v1
artifact_type: policy
repo_key: agents
domain: foundry
subject: agent_publish_rules

# ============================================================================
# AGENT PUBLISH RULES
# ============================================================================
# No agent may be published to a stable endpoint without passing these gates.
# Based on Databricks State of AI Agents 2026 findings:
#   - Governance → 12x production deployment rate
#   - Evaluations → 6x production deployment rate
# ============================================================================

publish_gates:

  # --- Evaluation ---
  evaluation:
    require_eval_dataset: true
    min_test_cases: 10
    require_task_adherence_pass: true
    require_safety_eval_pass: true
    require_groundedness_eval: true  # If agent uses knowledge grounding
    eval_must_pin_alias: true
    eval_must_not_use_router: true   # Use pinned model for deterministic baselines

  # --- Tracing ---
  tracing:
    require_trace_enabled: true
    require_application_insights_connected: true
    require_span_naming_convention: true  # OpenTelemetry semantic conventions

  # --- Tool Compliance ---
  tools:
    require_all_tools_in_allowlist: true
    require_auth_mode_for_each_tool: true
    require_approval_mode_declared: true

  # --- Identity ---
  identity:
    require_entra_agent_identity: true
    require_least_privilege_rbac: true
    require_identity_reassignment_on_publish: true  # Shared → distinct identity

  # --- Knowledge ---
  knowledge:
    require_kb_binding_declared: true  # If agent uses knowledge grounding
    require_acl_enforcement: true      # Permission-aware retrieval

  # --- Ownership ---
  ownership:
    require_owner_declared: true
    require_owner_repo_declared: true
    require_version_pinned: true

# ============================================================================
# PROMOTION FLOW
# ============================================================================

promotion:
  dev:
    gates: [eval_dataset_exists, trace_enabled]
    auto_promote: true

  staging:
    gates: [eval_pass, tools_allowlist_pass, identity_configured]
    auto_promote: false
    require_approval: true
    approvers: [platform_team]

  prod:
    gates: [all_gates_pass, safety_eval_pass, groundedness_pass]
    auto_promote: false
    require_approval: true
    approvers: [platform_team, security_team]

# ============================================================================
# TEMPLATE POLICY
# ============================================================================

template_policy:
  foundry_templates_are_bootstrap_only: true
  do_not_deploy_tutorial_code_to_prod: true
  preview_packages_blocked_in_prod: true
  extract_patterns_not_code: true
