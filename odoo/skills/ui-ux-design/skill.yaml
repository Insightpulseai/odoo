# UI/UX Design Skill
# User interface and experience design workflows

name: ui_ux_design
version: 1.0.0
key: design.ui.ux
description: |
  Execute UI/UX design workflows: user research, information architecture,
  wireframing, prototyping, design system creation, and usability testing.

intents:
  - ui design
  - ux design
  - user research
  - wireframe design
  - create prototype
  - design system
  - usability testing
  - user interface

guardrails:
  - Accessibility compliance (WCAG 2.1 AA minimum)
  - Mobile-first responsive design
  - Design decisions backed by user research or heuristics
  - Figma as source of truth for design files
  - Design tokens exportable to CSS/JSON
  - No decorative-only animations that hurt performance

tools:
  - key: ux.research
    name: User Research
    target_model: ipai.ux.runner
    target_method: conduct_research
    description: Define personas, user journeys, and pain points

  - key: ux.ia
    name: Information Architecture
    target_model: ipai.ux.runner
    target_method: design_ia
    description: Create sitemap, navigation structure, content hierarchy

  - key: ux.wireframe
    name: Wireframes
    target_model: ipai.ux.runner
    target_method: create_wireframes
    description: Low-fidelity wireframes for key screens

  - key: ux.design_system
    name: Design System
    target_model: ipai.ux.runner
    target_method: create_design_system
    description: Tokens, components, patterns, and documentation

  - key: ux.prototype
    name: Prototype
    target_model: ipai.ux.runner
    target_method: build_prototype
    description: Interactive prototype for user testing

  - key: ux.test
    name: Usability Testing
    target_model: ipai.ux.runner
    target_method: run_usability_test
    description: Define test scenarios and evaluate results

workflow:
  - ux.research
  - ux.ia
  - ux.wireframe
  - ux.design_system
  - ux.prototype
  - ux.test

input_schema:
  type: object
  required:
    - project_name
    - design_scope
  properties:
    project_name: { type: string }
    design_scope:
      type: string
      enum: [full_product, feature, redesign, component_library, audit]
    platform:
      type: string
      enum: [web, mobile, desktop, cross_platform]
    style:
      type: string
      enum: [minimalist, bold, corporate, playful, glassmorphism, brutalist, neumorphism]
    figma_url: { type: string }
    brand_guidelines: { type: string }
    target_users:
      type: array
      items:
        type: object
        properties:
          persona: { type: string }
          goals: { type: array, items: { type: string } }
          pain_points: { type: array, items: { type: string } }

output_schema:
  type: object
  properties:
    personas: { type: array, items: { type: object } }
    sitemap: { type: object }
    wireframes: { type: array, items: { type: string } }
    design_tokens: { type: object }
    component_specs: { type: array, items: { type: object } }
    prototype_url: { type: string }
    usability_report: { type: object }

agentInstructions: |
  When executing UI/UX design:

  1. **Research**:
     - Define 2-4 user personas with goals and pain points
     - Map user journeys (happy path + edge cases)
     - Identify key tasks and success metrics

  2. **Information Architecture**:
     - Sitemap with page hierarchy
     - Navigation patterns (top nav, sidebar, breadcrumbs)
     - Content prioritization per screen

  3. **Wireframes**:
     - Mobile-first layouts
     - Key screens: landing, dashboard, forms, lists, detail
     - Annotate interactions and state changes

  4. **Design System**:
     - Tokens: colors, typography, spacing, shadows, borders
     - Components: buttons, inputs, cards, modals, tables
     - Patterns: forms, search, filtering, pagination
     - Export tokens as CSS custom properties + JSON

  5. **Prototype**:
     - Interactive flows for key user journeys
     - Realistic data (not lorem ipsum)
     - Responsive breakpoints demonstrated

  6. **Testing**:
     - 5 task-based scenarios per persona
     - Success rate, time-on-task, error rate metrics
     - Prioritized list of findings and recommendations
