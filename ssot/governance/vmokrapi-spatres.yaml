      R1_end: 0           # Apr-May 2026 — building
      R2_end: 0           # Jul 2026 — pre-publication
      R3_end: 1470        # Sep 2026 — 3 customers × 5 users × $49 × 2 months
      R4_end: 3920        # Dec 2026 — 10 customers × 8 users × $49
      Y1_end: 3920        # Mar 2027 — sustained
