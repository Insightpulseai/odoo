# Nginx Configuration - insightpulseai.com (redirect-only)
# Status: PRODUCTION
# Last Updated: 2026-03-05
#
# Purpose: Redirect apex and www to canonical ERP URL
# Canonical Odoo URL: https://erp.insightpulseai.com
#
# This file contains NO upstreams and NO proxy_pass.
# All Odoo traffic is served by erp.insightpulseai.com vhost.

# ============================================================
# HTTP → HTTPS redirect (apex + www only)
# ============================================================
server {
    listen 80;
    server_name insightpulseai.com www.insightpulseai.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://erp.insightpulseai.com$request_uri;
    }
}

# ============================================================
# HTTPS apex → erp redirect
# ============================================================
server {
    listen 443 ssl http2;
    server_name insightpulseai.com;

    ssl_certificate /etc/letsencrypt/live/insightpulseai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insightpulseai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://erp.insightpulseai.com$request_uri;
}

# ============================================================
# HTTPS www → erp redirect
# ============================================================
server {
    listen 443 ssl http2;
    server_name www.insightpulseai.com;

    ssl_certificate /etc/letsencrypt/live/insightpulseai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insightpulseai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://erp.insightpulseai.com$request_uri;
}
