# =============================================================================
# OCA Baseline — Curated Module Inventory for Odoo CE 19
# =============================================================================
# Grouped by domain per OCA repo taxonomy.
# Status: target = planned for install, verify = needs 19.0 branch check
# =============================================================================

schema_version: 1
odoo_version: "19.0"
last_reviewed: "2026-03-28"

# ─── MUST-HAVE ───────────────────────────────────────────────────────────────

must_have:

  server_auth:
    repo: OCA/server-auth
    modules:
      - name: auth_oidc
        status: target
        priority: P0
        notes: "Entra/Google OIDC SSO"
      - name: auth_oidc_environment
        status: target
        priority: P0
      - name: auth_session_timeout
        status: target
        priority: P1
      - name: password_security
        status: target
        priority: P0
      - name: auth_api_key
        status: target
        priority: P1
        notes: "API key auth for service integrations"

  queue:
    repo: OCA/queue
    modules:
      - name: queue_job
        status: target
        priority: P0
        notes: "Async job processing — required for scale"
      - name: queue_job_cron
        status: target
        priority: P0

  server_tools:
    repo: OCA/server-tools
    modules:
      - name: auditlog
        status: verify
        priority: P0
        notes: "Already in Dockerfile sparse checkout"
      - name: base_exception
        status: target
        priority: P1
      - name: auto_backup
        status: target
        priority: P1

  mail:
    repo: OCA/social
    modules:
      - name: mail_activity_done
        status: target
        priority: P1
      - name: mail_composer_cc_bcc
        status: target
        priority: P1
      - name: mail_debrand
        status: verify
        priority: P0
        notes: "Already in Dockerfile sparse checkout"

  account_financial_tools:
    repo: OCA/account-financial-tools
    modules:
      - name: account_asset_management
        status: verify
        priority: P0
        notes: "Already installed on production"
      - name: account_chart_update
        status: target
        priority: P1

  account_financial_reporting:
    repo: OCA/account-financial-reporting
    modules:
      - name: account_financial_report
        status: verify
        priority: P0
        notes: "Already installed on production"
      - name: account_tax_balance
        status: verify
        priority: P0
        notes: "Already installed on production"
      - name: partner_statement
        status: target
        priority: P1

  account_reconcile:
    repo: OCA/account-reconcile
    modules:
      - name: account_move_base_import
        status: target
        priority: P1
      - name: account_in_payment
        status: target
        priority: P2

