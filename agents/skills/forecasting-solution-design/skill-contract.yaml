version: 1
name: forecasting-solution-design
status: draft
owner: agents
type: benchmark_skill
family: databricks-architecture
classification: capability_uplift

purpose: >
  Design demand forecasting architecture using Azure Databricks. Covers retail/FMCG
  scenario blueprints, analytics + prediction + action loops, and feature engineering
  for time-series problems.

source: "Use AI to Forecast Customer Orders" (Microsoft Learn architecture card)

triggers:
  - demand forecasting use case design
  - time-series prediction architecture review
  - retail/FMCG inventory optimization project
  - analytics-to-action pipeline design

inputs:
  - business domain (retail, FMCG, supply chain, etc.)
  - forecasting granularity (SKU, store, region, daily/weekly)
  - historical data availability and quality
  - action requirements (what decisions does the forecast drive?)

dependencies:
  - agents/knowledge/benchmarks/azure-databricks-architecture-cards.md
  - agent-platform/ssot/learning/databricks_architecture_card_map.yaml

steps:
  - classify forecasting scenario (demand, inventory, staffing, revenue)
  - assess data availability (history depth, granularity, external signals)
  - design feature engineering pipeline (lags, rolling aggregates, calendar, external)
  - select modeling approach (statistical, ML, ensemble, hierarchical)
  - define analytics-prediction-action loop
  - establish evaluation methodology (MAPE, RMSE, bias, backtesting)
  - design output integration (ERP, inventory system, dashboards)

outputs:
  - forecasting_architecture_design
  - feature_engineering_specification
  - evaluation_methodology
  - action_integration_plan
  - evidence

guardrails:
  - >
    This is a scenario archetype, not a control-plane skill. Forecasting solution
    design does not influence core platform architecture. It provides a reusable
    pattern for demand/forecast workloads that can be instantiated when a matching
    use case arises.
  - never design forecasting without defined evaluation methodology
  - require backtesting on holdout periods before production deployment
  - require action integration plan (forecast without action is waste)
  - do not over-engineer for simple forecasting needs (statistical methods first)

evidence:
  format: docs/evidence/{stamp}/databricks/forecasting-design/
  required:
    - architecture description
    - feature engineering specification
    - evaluation results (backtesting)
    - action integration plan

evals:
  accuracy: 0.90
  completeness: 0.90
  safety: 0.99
  policy_adherence: 0.99
