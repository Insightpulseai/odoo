# =============================================================================
# Azure Boards Taxonomy — SSOT
# =============================================================================
# Authority: canonical Epic/Area/Iteration taxonomy for the ipai-platform
#            Azure DevOps project. Lean Basic-process hierarchy:
#            Epic → Issue → Task. Epic = capability domain, Issue =
#            deliverable slice, Task = implementation step.
# Related:   ssot/planning/azure-boards.contract.yaml (generic contract)
#            ssot/agent-platform/boards_mapping.yaml (Agent Factory scope)
#            ssot/architecture/azure-architecture-center-map.yaml
#            ssot/governance/ado_github_authority_map.yaml
# =============================================================================

schema_version: "1.0"
last_updated: "2026-04-19"
owner: "platform-architecture"
status: canonical

project: ipai-platform
process: basic
hierarchy:
  epic: capability_domain
  issue: deliverable_slice
  task: implementation_step

# -----------------------------------------------------------------------------
# Canonical Epic set (12)
# -----------------------------------------------------------------------------
epics:

