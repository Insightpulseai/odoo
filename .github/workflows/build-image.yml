name: Build Odoo Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Registry Logins: DockerHub + DOCR
      # -----------------------------------------------------------------------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install doctl for DOCR login
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      # -----------------------------------------------------------------------
      # Metadata (multi-registry tags)
      # -----------------------------------------------------------------------
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            insightpulseai/odoo
            registry.digitalocean.com/insightpulseai/odoo
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      # -----------------------------------------------------------------------
      # Build & Push to DockerHub + DOCR
      # -----------------------------------------------------------------------
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/odoo/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
