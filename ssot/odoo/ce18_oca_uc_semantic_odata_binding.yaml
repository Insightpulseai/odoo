# =============================================================================
# CE 18 + OCA + ipai_* → Unity Catalog → Semantic Layer → OData — Binding SSOT
# =============================================================================
# Authority: canonical cross-layer binding that ties the Odoo CE 18 runtime
#            (toggles + OCA must-have + ipai_* delta) to the analytics
#            governance plane (Unity Catalog), the metric/dimension plane
#            (semantic layer), and the consumer query plane (OData).
#
# Mental model: one truth at each layer; each layer projects into the next
#               via well-defined contracts. No metrics live in Odoo. No OLTP
#               truth lives in UC. No ad-hoc OData on top of raw tables.
# =============================================================================

schema_version: "1.0"
last_updated: "2026-04-19"
owner: "platform-architecture"
status: canonical

# -----------------------------------------------------------------------------
# Layer authorities (must-hold invariants)
# -----------------------------------------------------------------------------
layer_authorities:

  layer_1_odoo_orm:
    role: operational_truth_oltp
    authority_ssot: ssot/odoo/orm-registry.yaml
    rule: "All transactional writes happen against Odoo ORM. No writes against UC/semantic/OData."

  layer_2_odoo_feature_toggles:
    role: feature_surface_truth
    authority_ssot: ssot/odoo/settings_catalog.yaml
    rule: "Toggles determine which domain tables exist and which fields are populated."

  layer_3_oca_must_have:
    role: ee_parity_and_capability_extension
    authority_ssots:
      - infra/ssot/oca/must_have_base.yaml
      - infra/ssot/oca/must_have_accounting.yaml
      - infra/ssot/oca/must_have_sales.yaml
      - infra/ssot/oca/must_have_purchases.yaml
      - infra/ssot/oca/must_have_projects.yaml
    rule: "OCA modules extend Odoo ORM; they DO NOT introduce new authoritative layers."

  layer_4_ipai_delta:
    role: thin_delta_for_integration_bridges
    authority_ssot: ssot/odoo/package-classification.yaml
    rule: "ipai_* wraps CE+OCA. Never duplicates OCA capability."

  layer_5_unity_catalog:
    role: governance_discovery_access
    authority_ssot: ssot/lakehouse/unity-catalog-map.yaml
    rule: "UC governs analytics projections of Odoo ORM. UC is NOT an OLTP source."

  layer_6_semantic:
    role: metric_and_dimension_truth
    authority_ssot: ssot/semantic/semantic-layer.yaml
    rule: "KPIs, dimensions, and business metric definitions live here — not in UC, not in OData, not in Odoo reports."

  layer_7_odata:
    role: consumer_query_interface
    authority_ssot: platform/ssot/semantic/odata-entity-map.yaml
    canonical_home: data-intelligence/
    rule: "OData exposes governed entity sets with $select/$apply/paging. No raw table passthrough."

# -----------------------------------------------------------------------------
# Projection flow (Odoo → UC → Semantic → OData)
# -----------------------------------------------------------------------------
projection_flow:

  odoo_to_uc:
    mechanism: azure_postgres_to_databricks_mirroring
    pattern: bronze_raw_silver_cleaned_gold_curated
    ownership: data-intelligence
    governance:
      - uc_catalog_per_environment (ipai_dev, ipai_staging, ipai_prod)
      - row_level_security_via_uc_policies
      - column_level_masking_for_pii
    contract: ssot/lakehouse/unity-catalog-map.yaml

  uc_to_semantic:
    mechanism: databricks_sql_views_plus_metric_definitions
    pattern: semantic_views_per_domain (finance, sales, inventory, projects, hr, tax_compliance, pulser_ops)
    ownership: data-intelligence
    governance:
      - every_metric_defined_once
      - dimension_reuse_across_domains
      - kpi_contracts_versioned
    contract: ssot/semantic/semantic-layer.yaml

  semantic_to_odata:
    mechanism: odata_v4_over_semantic_views
    pattern: entity_sets_per_bounded_context
    ownership: data-intelligence + platform
    governance:
      - consumer_access_policy_evaluated_per_query
      - $select_allowlist_per_entity
      - $apply_shapes_predeclared
      - paging_mandatory_over_1000_rows
    contract: platform/ssot/semantic/odata-entity-map.yaml
    consumer_policy: ssot/semantic/consumer-access-policy.yaml

# -----------------------------------------------------------------------------
# Consumer lanes
# -----------------------------------------------------------------------------
consumer_lanes:

  power_bi:
    via: odata_v4
    primary: true
    rationale: "CLAUDE.md #12 — Power BI is the mandatory BI surface."

  agent_platform:
    via:
      - odata_v4 (for grounded metric queries)
      - uc_sql (via Databricks SQL for ad-hoc agent tool calls)
    tool_adapter: agent-platform/src/agent_platform/tools/databricks/

  fabric_mirroring:
    via: fabric_shortcut_to_uc
    scope: mirroring_only (per CLAUDE.md #13)
    rule: "Fabric never replaces Databricks engineering."

  ui_reports_in_odoo:
    via: odoo_native_reports (studio-style)
    scope: operational_reports_only
    rule: "No analytics/BI in Odoo reports. Use Power BI via OData."

# -----------------------------------------------------------------------------
# Feature toggle → UC catalog enablement matrix
# -----------------------------------------------------------------------------
# Reads from ssot/odoo/settings_catalog.yaml and determines which UC schemas
# and tables must exist. A disabled CE toggle MUST NOT have a populated UC
# projection (data doesn't exist).
toggle_to_uc_matrix:
  rule: >
    A UC table/view under ipai_<env>.<domain>.<object> exists ONLY IF the
    corresponding CE toggle is enabled OR an OCA must-have module provides
    the source table. If the toggle is disabled, the projection pipeline
    skips that object silently.

  mappings:
    - toggle_group: accounting
      toggle_keys_any: [accounting, invoicing]
      enables_uc_domain: finance
      enables_uc_schemas: [bronze, silver, gold]

    - toggle_group: sales
      toggle_keys_any: [sale_management]
      enables_uc_domain: sales
      enables_uc_schemas: [bronze, silver, gold]

    - toggle_group: purchases
      toggle_keys_any: [purchase]
      enables_uc_domain: purchases
      enables_uc_schemas: [bronze, silver, gold]

    - toggle_group: projects
      toggle_keys_any: [project]
      enables_uc_domain: projects
      enables_uc_schemas: [bronze, silver, gold]

    - toggle_group: hr
      toggle_keys_any: [hr, hr_attendance]
      enables_uc_domain: hr
      enables_uc_schemas: [bronze, silver, gold]

    - toggle_group: inventory_mrp
      toggle_keys_any: [stock]
      enables_uc_domain: inventory
      enables_uc_schemas: [bronze, silver, gold]

# -----------------------------------------------------------------------------
# OCA module → OLTP source table → UC projection targets
# -----------------------------------------------------------------------------
oca_to_uc_projection_examples:
  # Finance/accounting OCA modules
  - oca_module: account_financial_report
    oca_repo: account-financial-reporting
    source_tables: [account.move, account.move.line]
    uc_projection: ipai_<env>.finance.gold.financial_reports
    semantic_entity: semantic.finance.report_pack

  # Sales
  - oca_module: sale_commission
    oca_repo: commission
    source_tables: [sale.commission, account.invoice.line.agent]
    uc_projection: ipai_<env>.sales.gold.commission_ledger
    semantic_entity: semantic.sales.commission

  # Projects
  - oca_module: project_timeline
    oca_repo: project
    source_tables: [project.task, project.project]
    uc_projection: ipai_<env>.projects.silver.task_timeline
    semantic_entity: semantic.projects.task_duration

# -----------------------------------------------------------------------------
# OData entity set policy
# -----------------------------------------------------------------------------
odata_entity_set_policy:
  rule: "Every OData entity set MUST be backed by a semantic view, never a raw UC table."
  minimum_exposure_elements:
    - entity_set_name
    - backing_semantic_view
    - primary_key
    - selectable_fields
    - filterable_fields
    - apply_aggregation_shapes
    - max_page_size
    - consumer_classes_allowed
  consumer_classes:
    - power_bi_service
    - agent_platform_runtime
    - authorized_internal_tools

# -----------------------------------------------------------------------------
# Governance enforcement
# -----------------------------------------------------------------------------
governance:

  write_boundary:
    writes_permitted:
      - odoo_orm (transactional)
    writes_forbidden:
      - unity_catalog (reads/analytics only)
      - semantic_layer (definitions only)
      - odata (query surface only)

  schema_evolution:
    authority: odoo_orm_migration
    propagation_order:
      - odoo ORM migration
      - UC bronze mirror refresh
      - UC silver/gold transforms
      - semantic view update
      - OData entity set update (if shape changed)
    rule: "A schema change at odoo ORM triggers downstream updates, not the reverse."

  pii_handling:
    classification_authority: ssot/lakehouse/unity-catalog-map.yaml
    masking_enforced_at: uc_and_semantic
    no_pii_in_odata_unless_consumer_class_permits: true

# -----------------------------------------------------------------------------
# 3-layer target architecture (canonical target)
# -----------------------------------------------------------------------------
three_layer_target:

  layer_a_transactional:
    name: "Odoo CE 18 + OCA"
    role: erp_source_of_record
    responsibilities:
      - transactional_sor
      - operational_workflows
      - branch_legal_commercial_dimensions

  layer_b_analytical_semantic:
    name: "Databricks + Unity Catalog"
    role: governed_consumption_model_not_source_of_record
    responsibilities:
      - curated_bronze_silver_gold_models
      - governed_semantic_serving_prep
      - bi_ai_agent_consumption
    medallion:
      bronze:
        purpose: raw_replication_from_odoo_and_adjacent_sources
      silver:
        purpose: conformed_business_entities_and_cleaned_facts
      gold:
        purpose: semantic_subject_areas_and_consumption_ready_marts

  layer_c_consumption_interchange:
    name: "Power BI / agent-platform / optional OData+CDM"
    role: business_facing_semantic_and_interop
    primary_consumers:
      - power_bi_semantic_models
      - agent_platform_tools
    optional_consumers:
      - odata_feeds_for_external_systems
      - cdm_manifest_exports_for_lake_interop

# -----------------------------------------------------------------------------
# Semantic subject areas (gold layer)
# -----------------------------------------------------------------------------
semantic_subject_areas:
  finance:
    facts: [gl_entry, ar_invoice, ap_invoice, payment, tax]
    dimensions: [date, legal_entity, branch, trade_name, customer, vendor, account]
  sales:
    facts: [sales_order, sales_order_line, invoice_line]
    dimensions: [date, product, customer, salesperson, branch, client_tenant]
  purchasing:
    facts: [purchase_order, purchase_order_line, vendor_bill]
    dimensions: [date, vendor, product, branch, legal_entity]
  projects:
    facts: [task, timesheet, milestone, cost]
    dimensions: [project, employee, department, branch]
  documents:
    facts: [document_event, extraction_result, approval_event]
    dimensions: [document_type, source_system, branch, client_tenant]

# -----------------------------------------------------------------------------
# Toggle model — functional / projection / consumer
# -----------------------------------------------------------------------------
toggle_model:

  functional_toggles:
    base_core: true
    accounting_core: true
    sales_core: true
    purchases_core: true
    projects_core: true
    crm_core: true
    stock_core: true
    document_controls: true
    multicompany: true
    multibranch: true
    trade_name_dimension: true
    client_tenant_dimension: true
    semantic_export: true
    odata_export: optional
    cdm_export: optional

  projection_toggles:
    transactional_odoo_views: true
    databricks_bronze_replication: true
    databricks_silver_conformed: true
    databricks_gold_marts: true
    powerbi_semantic_models: true
    odata_external_feeds: optional
    cdm_manifest_exports: optional

  consumer_toggles:
    erp_users: true
    finance_reporting: true
    ai_agents: true
    external_partners_via_odata: optional
    lake_interop_via_cdm: optional

  oca_bucket_toggles:
    base: enabled
    accounting: enabled
    sales: enabled
    purchases: enabled
    projects: enabled

# -----------------------------------------------------------------------------
# OData role (explicit)
# -----------------------------------------------------------------------------
odata_role:
  correct_use: integration_and_export_surface_not_canonical_semantic_authority
  recommended_use_cases:
    - lightweight_downstream_system_sync
    - external_reporting_tools_that_demand_odata
    - constrained_partner_feeds
    - narrow_read_models
  never_use_for:
    - core_erp_write_path
    - large_scale_analytical_backbone
    - richest_semantic_representation
    - primary_agent_grounding_store
  rule: >
    If OData is needed, expose gold/silver projections — NEVER raw Odoo
    tables. Power Query and Fabric Dataflow Gen2 both ingest OData; that
    is the supported consumption shape.

# -----------------------------------------------------------------------------
# CDM role (explicit)
# -----------------------------------------------------------------------------
cdm_role:
  correct_use: metadata_and_interchange_contract_only_if_needed
  format_policy:
    preferred: manifest.cdm.json
    legacy_supported_via_sdk: model.json
  recommended_use_cases:
    - exported_data_lake_contracts
    - interoperability_with_microsoft_style_lake_metadata_tooling
    - optional_schema_exchange_for_downstream_analytics
  never_use_as:
    - primary_odoo_internal_model
    - live_transactional_contract
    - replacement_for_unity_catalog_governance
  rule: >
    CDM is optional metadata on top of gold/silver projections. It is
    never the operational or analytical source of truth.

# -----------------------------------------------------------------------------
# Layer truth summary (one-liner for quick reference)
# -----------------------------------------------------------------------------
layer_truth_summary:
  odoo_model: operational_truth
  unity_catalog: governed_analytical_truth
  power_bi_semantic_model: business_consumption_truth
  odata_and_cdm: interoperability_surfaces_only

# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not a replacement for individual layer SSOTs (this binds them, doesn't subsume)
  - not an ETL DAG (that lives in data-intelligence)
  - not a metric definition (semantic-layer.yaml owns that)
  - not a RBAC matrix (identity SSOT owns that)
  - Odoo MUST NOT be forced to serve as the semantic layer
  - Unity Catalog tables MUST NOT be the final executive-facing model without a semantic projection

# -----------------------------------------------------------------------------
# Anchors
# -----------------------------------------------------------------------------
anchors:
  odoo_orm_registry: ssot/odoo/orm-registry.yaml
  settings_catalog: ssot/odoo/settings_catalog.yaml
  business_dimensions: ssot/odoo/business_dimensions.yaml
  package_classification: ssot/odoo/package-classification.yaml
  oca_base: infra/ssot/oca/must_have_base.yaml
  oca_accounting: infra/ssot/oca/must_have_accounting.yaml
  oca_sales: infra/ssot/oca/must_have_sales.yaml
  oca_purchases: infra/ssot/oca/must_have_purchases.yaml
  oca_projects: infra/ssot/oca/must_have_projects.yaml
  unity_catalog: ssot/lakehouse/unity-catalog-map.yaml
  semantic_layer: ssot/semantic/semantic-layer.yaml
  odata_entity_map: platform/ssot/semantic/odata-entity-map.yaml
  consumer_access_policy: ssot/semantic/consumer-access-policy.yaml
  aac_map: ssot/architecture/azure-architecture-center-map.yaml
