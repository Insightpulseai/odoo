version: 1
type: implementation_skill
family: odoo_developer_implementation
skill:
  name: odoo-orm-model-extension
  status: active
  owner: agents
  build_order: 2
  lane: backend_customization
  purpose: >
    Extend Odoo models with new fields, computed fields, constraints, and
    business logic using _inherit. Ensures all extensions follow Odoo 18
    ORM conventions, class attribute order, and field naming standards.

  triggers:
    - new field required on existing model
    - new computed field or business logic needed
    - model behavior needs customization via override
    - PR adds or modifies a models/ directory

  inputs:
    - target_model (_name of the model to extend)
    - fields_to_add (list of field definitions)
    - compute_methods (optional)
    - constraints (optional)
    - business_methods (optional)

  steps:
    - identify target model and its existing fields
    - create or update inherited model class using _inherit
    - add fields in correct order (related, computed, stored) per Odoo 18 conventions
    - implement compute methods with @api.depends decorators
    - implement inverse methods if needed
    - add SQL constraints with _sql_constraints
    - add Python constraints with @api.constrains
    - use Command tuples for x2many write operations
    - use with_context() for context changes (never mutate env.context)
    - use lazy translation _() with positional args (never f-strings or .format())
    - verify model compiles cleanly
    - test install on disposable DB

  outputs:
    - model_file_path
    - fields_added
    - methods_added
    - compilation_result
    - evidence

  guardrails:
    - never modify OCA or core source files — use _inherit in ipai_* module
    - never copy OCA files into addons/ipai/ — use proper _inherit overrides
    - follow Odoo 18 class attribute order strictly
    - field naming: *_id for Many2one, *_ids for One2many/Many2many, is_*/has_* for Boolean
    - compute method naming: _compute_<field>
    - constraint method naming: _check_<field>
    - never use cr.commit() — ORM handles transactions
    - never mutate self.env.context directly — use with_context()
    - use Command tuples (not raw tuples) for x2many writes
    - use recordset methods (mapped, filtered, sorted) over list comprehensions
    - prefer inherited extension over core patching
    - do not call cr.commit() unless explicitly justified

  evidence:
    required: true
    format: "docs/evidence/{stamp}/odoo-dev/odoo-orm-model-extension/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99
      policy_adherence: 0.95

cross_references:
  - agents/knowledge/benchmarks/odoo-developer-howtos.md
  - agents/knowledge/benchmarks/odoo-coding-guidelines.md
  - .claude/rules/odoo18-coding.md
  - .claude/rules/oca-governance.md
