# =============================================================================
# Odoo Asset Bundle Contract — CI Gate
# =============================================================================
# Runs on PRs that touch asset-bearing files:
#   - __manifest__.py (asset declarations)
#   - static/src/** (JS, CSS, SCSS, XML)
#   - views/** (QWeb templates)
#
# Two checks:
#   1. Static contract validation (always runs)
#   2. Web smoke test (runs when devcontainer is available)
# =============================================================================

name: Odoo Asset Contract

on:
  pull_request:
    paths:
      - 'addons/ipai/**/__manifest__.py'
      - 'addons/ipai/**/static/**'
      - 'addons/ipai/**/views/**'
  push:
    branches: [main]
    paths:
      - 'addons/ipai/**/__manifest__.py'
      - 'addons/ipai/**/static/**'
      - 'addons/ipai/**/views/**'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static asset contract validation (no Odoo runtime needed)
  # ---------------------------------------------------------------------------
  asset-contract:
    name: Asset Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run asset contract tests
        run: python3 -m pytest tests/test_odoo_asset_contract.py -v --tb=short

      - name: Summary
        if: always()
        run: |
          echo "### Asset Contract Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checked all \`addons/ipai/*/\` manifests for:" >> $GITHUB_STEP_SUMMARY
          echo "- Asset file paths exist on disk" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle keys are valid Odoo bundles" >> $GITHUB_STEP_SUMMARY
          echo "- No duplicate asset entries" >> $GITHUB_STEP_SUMMARY
          echo "- No out-of-bound asset references" >> $GITHUB_STEP_SUMMARY
          echo "- Data files exist in installable modules" >> $GITHUB_STEP_SUMMARY
