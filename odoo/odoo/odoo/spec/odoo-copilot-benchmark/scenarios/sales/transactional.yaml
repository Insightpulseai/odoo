# Sales — Transactional Benchmark Scenarios

scenarios:
  - id: "BM-SAL-T-001"
    domain: sales
    capability_class: transactional
    persona: sales_rep
    prompt: "Create a quotation for ACME Corp with 10 units of product 'Widget Pro' at $25 each"
    setup:
      seed_records:
        - model: res.partner
          values: { name: "ACME Corp", is_company: true }
        - model: product.product
          values: { name: "Widget Pro", list_price: 25.00 }
    expected_behavior:
      type: create
      model: sale.order
      fields:
        partner_id: "ACME Corp"
        order_line: { product_id: "Widget Pro", product_uom_qty: 10, price_unit: 25.00 }
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [sales, quotation, create]

  - id: "BM-SAL-T-002"
    domain: sales
    capability_class: transactional
    persona: sales_mgr
    prompt: "Confirm quotation S00042 and send the confirmation email to the customer"
    setup:
      seed_records:
        - model: sale.order
          values: { name: "S00042", state: "draft" }
    expected_behavior:
      type: action
      model: sale.order
      method: action_confirm
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [sales, confirm, workflow]

  - id: "BM-SAL-T-003"
    domain: sales
    capability_class: transactional
    persona: exec_readonly
    prompt: "Cancel quotation S00099"
    notes: "Permission-denied scenario: exec_readonly lacks write access to sale.order"
    expected_behavior:
      type: action
      model: sale.order
      method: action_cancel
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
      confirmation_required: true
      audit_trace: true
    soft_scores:
      completeness: { weight: 0.40 }
      clarity: { weight: 0.20 }
      latency: { target_ms: 10000, weight: 0.10 }
    tags: [sales, permission-denied, cancel, governance]
