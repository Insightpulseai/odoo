version: "1.0"
schema: supabase.edge-functions.deploy.v1
updated_at: "2026-03-14"

# Source: supabase/functions/ in this repo
# Deploy target: /opt/supabase-deploy/volumes/functions/ on VM
# Deploy script: ops-platform/supabase/scripts/supabase_edge_functions_sync.sh
#
# Tiers:
#   critical  — auth, ops, webhook, gateway; platform inoperable without these
#   standard  — AI, semantic, sync, config; degraded without these
#   optional  — low-frequency utilities; safe to lag
#
# Smoke test method: POST unless noted.
# expected_status: any HTTP status in this list = function is alive (not 502/503).
# Secrets listed are those the function reads via Deno.env.get() — must be present
# in /opt/supabase-deploy/.env before deployment.

source_dir: supabase/functions
deploy_target: /opt/supabase-deploy/volumes/functions

