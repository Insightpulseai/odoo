# schema: ssot.github.branch_protection.v1
# =============================================================================
# Branch Protection Rules SSOT — Insightpulseai/odoo
# =============================================================================
# Declares the DESIRED branch protection configuration for the odoo repository.
# This file covers both legacy branch protection rules and org-level rulesets.
#
# CI drift guard: .github/workflows/github-org-policy-guard.yml
# Drift checker:  scripts/ci/check_github_org_policy.py
#
# Companion files:
#   ssot/github/org-policy.yaml          — Org-level security policy
#   ssot/github/enterprise-cloud.yaml    — Enterprise Cloud governance
#
# Docs:
#   https://docs.github.com/en/repositories/configuring-branches-and-merges
#   https://docs.github.com/en/organizations/managing-organization-settings/managing-rulesets
#
# Last reviewed: 2026-03-05
# =============================================================================

schema_version: "1.0"
updated: "2026-03-05"
repo: Insightpulseai/odoo

# =============================================================================
# Branch Protection — main branch
# =============================================================================

branches:

  main:

    # ── Pull Request Requirements ────────────────────────────────────────────

    require_pull_request:
      desired: true
      required_approving_review_count: 1
      notes: >
        All changes to main must go through a pull request with at least
        one approving review. No direct pushes.

    dismiss_stale_reviews:
      desired: true
      notes: >
        When new commits are pushed to a PR branch, existing approvals are
        dismissed. Prevents merging outdated approvals after force-push or
        significant changes.

    require_code_owner_reviews:
      desired: true
      notes: >
        Changes to paths listed in CODEOWNERS require review from the
        designated code owner. Ensures domain experts review critical paths.

    # ── Status Check Requirements ────────────────────────────────────────────

    require_status_checks:
      desired: true
      strict: true
      # strict=true requires the branch to be up-to-date with main before merging.
      # This prevents "merge skew" where CI passes on a stale branch that would
      # fail when merged into current main.
      required_checks:
        - validate-ssot
        - deny-direct-main-push
      notes: >
        Required status checks must pass before merge. The strict flag
        ensures the PR branch includes the latest main commits.

    # ── Commit Requirements ──────────────────────────────────────────────────

    require_linear_history:
      desired: true
      notes: >
        Enforces rebase or squash merges. No merge commits. Keeps git
        history bisectable and audit-friendly.

    require_signed_commits:
      desired: false
      notes: >
        Not enforced currently. Evaluate after GPG key distribution to
        all team members and CI bots. Setting to true would block
        unsigned commits including those from GitHub Apps.

    # ── Push Restrictions ────────────────────────────────────────────────────

    restrict_force_push:
      desired: true
      notes: >
        Force pushes to main are blocked. Prevents history rewriting
        on the default branch. Protects audit trail integrity.

    restrict_deletions:
      desired: true
      notes: >
        The main branch cannot be deleted. Standard protection for
        the default branch.

    allow_bypass:
      desired: false
      notes: >
        No bypass actors. Even org owners must go through PRs.
        This can be relaxed temporarily via org rulesets if needed
        for emergency hotfixes (with audit trail).

    # ── Merge Strategy ───────────────────────────────────────────────────────

    allowed_merge_methods:
      - squash
      - rebase
      # merge commits disabled to enforce linear history
    notes: "Squash preferred for feature branches. Rebase for clean forward-ports."

# =============================================================================
# CODEOWNERS — Critical Path Protection
# =============================================================================
# These paths require review from designated owners before merge.
# This section is the SSOT for CODEOWNERS file content.
# Generate .github/CODEOWNERS from this block.

codeowners:

  # Infrastructure paths — require infra/security team review
  - pattern: "infra/"
    owners: ["@Insightpulseai/infra-team"]
    notes: "All infrastructure-as-code changes"

  - pattern: ".github/"
    owners: ["@Insightpulseai/infra-team"]
    notes: "CI/CD workflows, GitHub configuration"

  - pattern: "ssot/"
    owners: ["@Insightpulseai/infra-team"]
    notes: "SSOT policy files — security-critical"

  - pattern: "scripts/ci/"
    owners: ["@Insightpulseai/infra-team"]
    notes: "CI validation scripts"

  - pattern: "deploy/"
    owners: ["@Insightpulseai/infra-team"]
    notes: "Deployment configurations"

  # Security paths — require security review
  - pattern: "ssot/secrets/"
    owners: ["@Insightpulseai/security-team"]
    notes: "Secret registry (identifiers only, never values)"

  - pattern: "infra/supabase/vault_secrets.tf"
    owners: ["@Insightpulseai/security-team"]
    notes: "Vault secret declarations"

  # Odoo module paths — require Odoo team review
  - pattern: "addons/ipai/"
    owners: ["@Insightpulseai/odoo-team"]
    notes: "Custom IPAI Odoo modules"

  - pattern: "config/odoo/"
    owners: ["@Insightpulseai/odoo-team"]
    notes: "Odoo configuration files"

# =============================================================================
# Org-Level Rulesets (GitHub Enterprise Cloud)
# =============================================================================
# Rulesets are the modern replacement for legacy branch protection rules.
# They can be applied at org level and inherited by all repos.
# See: ssot/github/enterprise-cloud.yaml for org-level ruleset policy.

rulesets:

  default_branch_protection:
    target: default_branch
    enforcement: active
    bypass_actors: []
    rules:
      - type: pull_request
        parameters:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: true
      - type: required_status_checks
        parameters:
          strict_required_status_checks_policy: true
          required_status_checks:
            - context: validate-ssot
              integration_id: null
            - context: deny-direct-main-push
              integration_id: null
      - type: non_fast_forward
      - type: deletion
    notes: >
      This ruleset mirrors the branch protection rules above in the
      GitHub Enterprise Cloud rulesets format. When GHEC rulesets are
      adopted, the legacy branch protection rules can be removed.

# =============================================================================
# Known Drift
# =============================================================================

known_drift:

  - field: branches.main.require_pull_request
    current_value: false
    desired_value: true
    action: "Enable branch protection on main in repo Settings > Branches"
    severity: critical
    notes: "Direct pushes to main are currently allowed."

  - field: branches.main.require_status_checks
    current_value: false
    desired_value: true
    action: "Add required status checks after enabling branch protection"
    severity: high

  - field: branches.main.restrict_force_push
    current_value: false
    desired_value: true
    action: "Enable force push restriction in branch protection settings"
    severity: high

# =============================================================================
# Verification Notes
# =============================================================================
# Branch protection can be checked via:
#   gh api repos/Insightpulseai/odoo/branches/main/protection
#
# Rulesets can be checked via:
#   gh api repos/Insightpulseai/odoo/rulesets
#   gh api orgs/Insightpulseai/rulesets
#
# CODEOWNERS file should be generated from the codeowners block above
# and committed to .github/CODEOWNERS in the repo.
