doctrine: >
  W9 Studio is an IPAI business unit operating on Google Workspace
  (w9studio.net) — a distinct identity plane from IPAI's primary
  Entra tenant (insightpulseai.com). This introduces a cross-IdP
  governance surface that must be explicit. Shared role mailboxes
  are tolerated short-term but represent an accountability gap that
  should be remediated before any customer-facing W9 Studio workflow.

