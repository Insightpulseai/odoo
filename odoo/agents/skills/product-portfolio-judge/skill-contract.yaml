version: 1
type: product_skill
family: product_portfolio
status: draft
owner: agents

skill:
  name: product-portfolio-judge
  purpose: >
    Validate alignment between product specs and portfolio goals. Detect drift,
    orphan specs, unfunded goals, scope mismatch, and priority conflicts.
    Produces alignment reports but never auto-resolves — flags only.

  triggers:
    - pre-release gate (mandatory)
    - quarterly alignment review
    - new spec bundle merged to main
    - OKR update or amendment

  inputs:
    - spec bundle inventory (from product-manager)
    - OKR hierarchy (from portfolio-manager)
    - milestone timeline

  steps:
    - load validated spec bundles from product-manager output
    - load validated goal hierarchy from portfolio-manager output
    - cross-check specs against OKR hierarchy
    - detect specs without parent goals (orphan specs)
    - detect goals without implementing specs (unfunded goals)
    - validate priority consistency (spec priority vs goal priority)
    - check timeline feasibility (spec timelines vs milestone dates)
    - flag items older than 30 days without activity
    - produce alignment report with recommended actions

  outputs:
    - alignment_report
    - priority_conflict_list
    - timeline_feasibility_assessment
    - recommended_actions
    - evidence

  guardrails:
    - never auto-close orphan items (flag only)
    - never override priority without stakeholder input
    - require both product-manager and portfolio-manager outputs as inputs
    - flag items older than 30 days without activity
    - never run in isolation without upstream skill outputs
    - alignment report must categorize every item as matched, orphaned, or conflicting

  evidence:
    required: true
    format: "docs/evidence/{stamp}/alignment/{review-period}/"

  evals:
    dimensions:
      - accuracy
      - completeness
      - safety
      - policy_adherence
      - evidence_quality
    thresholds:
      accuracy: 0.95
      completeness: 0.95
      safety: 0.99
      policy_adherence: 0.99

cross_references:
  - agents/skills/product-manager/skill-contract.yaml
  - agents/skills/portfolio-manager/skill-contract.yaml
  - docs/contracts/boards-to-spec-contract.md
  - docs/contracts/spec-to-pipeline-contract.md
  - docs/contracts/eval-gate-contract.md
  - agents/knowledge/benchmarks/openai-product-use-cases.md
