# ============================================================================
# G5 — Observability (Tracing)
# ============================================================================
# Gate ref: agent-factory-lifecycle.yaml → G5_observability
# Foundry primitive: Foundry tracing + Application Insights
# Pass condition: Traces visible for runs and failures. Inputs, outputs,
#   tool usage, retries, latencies, costs, exceptions, and retrieval
#   operations captured.

g5_observability:

  ask-agent:
    agent_version: v3
    foundry_name: ask-agent
    trace_destination: Application Insights (connected via Foundry project ipai-copilot)
    captures:
      - inputs_and_outputs
      - tool_usage
      - retries
      - latencies
      - costs
      - exceptions
      - retrieval_operations
    status: CONFIGURED
    evidence: >
      Agent is registered via project.agents.create_version() which
      automatically emits traces to Application Insights through the
      Foundry project's connected observability pipeline.
    note: >
      Foundry Agent Service traces all responses.create() calls.
      No additional configuration required for registered agents.

  authoring-agent:
    agent_version: v2
    foundry_name: authoring-agent
