name: OCA Install Plan Check
on:
  push:
    branches: [main]
    paths:
      - 'ssot/odoo/oca_repos.yaml'
      - 'ssot/odoo/oca_lock.yaml'
      - 'scripts/odoo/install_oca_from_ssot.py'
  pull_request:
    branches: [main]
    paths:
      - 'ssot/odoo/oca_repos.yaml'
      - 'ssot/odoo/oca_lock.yaml'
      - 'scripts/odoo/install_oca_from_ssot.py'

jobs:
  plan-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: OCA install plan dry-run
        run: python scripts/odoo/install_oca_from_ssot.py --dry-run --json

      - name: Run tests
        run: python -m pytest tests/test_install_oca_from_ssot.py -v
