version: 1
namespace: ipai.org.org.artifact_naming_convention.v1
artifact_type: policy
repo_key: org
domain: org
subject: artifact_naming_convention

filename_pattern: "<repo_key>__<domain>__<subject>__v<major>.<artifact_type>.<ext>"
namespace_pattern: "ipai.<repo_key>.<domain>.<subject>.v<major>"
schema_id_pattern: "https://schemas.insightpulseai.com/ipai/<repo_key>/<domain>/<subject>/v<major>"

filename_regex: "^[a-z0-9_]+__[a-z0-9_]+__[a-z0-9_]+__v[0-9]+\\.(schema|registry|mapping|manifest|policy|contract|entity|catalog|inventory|config)\\.(yaml|json)$"

allowed_artifact_types:
  - schema
  - registry
  - mapping
  - manifest
  - policy
  - contract
  - entity
  - catalog
  - inventory
  - config

allowed_extensions:
  - yaml
  - json

forbidden_basenames:
  - schema
  - registry
  - mapping
  - manifest
  - contract
  - config
  - default
  - main
  - data
  - settings

repo_aliases:
  github: ".github"
  infra: "infra"
  ops_platform: "ops-platform"
  lakehouse: "lakehouse"
  agents: "agents"
  odoo: "odoo"
  web: "web"
  automations: "automations"
  design_system: "design-system"
  templates: "templates"

versioning_rules:
  - "Use major version only in filename and namespace"
  - "Breaking change bumps v1 to v2"
  - "Non-breaking additions keep same filename/namespace"
  - "Never put minor/patch in filenames"

uniqueness_rules:
  - "Basename must be unique across the entire repo"
  - "Namespace must be unique across the repo and ideally across the org"
  - "domain + subject + version + artifact_type must exist only once per repo"

congruence_rules:
  - "Filename repo_key must match repo contract"
  - "Filename tokens must match header namespace tokens"
  - "JSON schema $id must match namespace-derived path"
  - "Filename version must match header version"

required_header_fields:
  yaml:
    - version
    - namespace
    - artifact_type
    - repo_key
    - domain
    - subject
  json_schema:
    - "$schema"
    - "$id"
