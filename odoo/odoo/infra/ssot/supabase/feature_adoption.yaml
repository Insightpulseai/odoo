# schema: ssot.supabase.feature_adoption.v1
# Supabase feature adoption registry — verified against Supabase docs 2026-03-03.
#
# This file is the SSOT for which Supabase features this repo uses, plans to use,
# or has explicitly decided not to use. Every entry cites a verifiable source URL.
#
# Rules:
#   - "adopt" means: committed code/migration exists and is active
#   - "adopt_next" means: spec exists, blocked only by a concrete predecessor
#   - "evaluate" means: real feature, but cost/benefit not yet proven for this repo
#   - "experimental" means: Supabase labels it alpha/beta — do not take a hard dependency
#   - "avoid" means: explicitly rejected with a documented reason
#   - "not_applicable" means: feature exists but has no use case in this stack
#
# Decision criteria for moving evaluate → adopt_next:
#   1. Removes a whole subsystem (not just adds a feature)
#   2. Has a repo SSOT location (no console-only config)
#   3. Can be drift-gated in CI
#   4. Clean secret handling (Vault or GitHub Secrets compatible)
#
# Source verification date: 2026-03-03
# Verified by: manual review of supabase.com/features, supabase.com/docs, supabase.com/blog

version: "1.0.0"
schema: ssot.supabase.feature_adoption.v1
last_verified: "2026-03-03"

# ---------------------------------------------------------------------------
# CORE DATABASE
# ---------------------------------------------------------------------------
features:

  - id: postgres_rls
    name: "Postgres + Row Level Security"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/database/postgres/row-level-security"
    repo_artifacts:
      - "supabase/migrations/*"
      - "scripts/ci/check_supabase_contract.sh"
    notes: >
      Foundation. Every ops.*/ai.* table requires RLS before merge.
      CI gate: check_supabase_contract.sh exits non-zero if RLS missing.

  - id: auth
    name: "Supabase Auth (GoTrue)"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/auth"
    repo_artifacts:
      - "supabase/config.toml [auth]"
      - "supabase/functions/auth-bootstrap/"
      - "spec/supabase-auth-ssot/"
    notes: >
      IdP for all non-Odoo surfaces. Email/OTP, GitHub OAuth, Twilio SMS.
      Odoo is a relying party (x_supabase_user_id projection).
      Spec complete: spec/supabase-auth-ssot/.

  - id: vault
    name: "Supabase Vault"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/database/vault"
    repo_artifacts:
      - "ssot/secrets/registry.yaml"
    notes: >
      Vault-first policy for all server-readable secrets.
      Names registered in ssot/secrets/registry.yaml; values never in git.

  - id: edge_functions
    name: "Edge Functions (Deno)"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/functions"
    repo_artifacts:
      - "supabase/functions/*/"
    notes: >
      Integration bridges, webhook receivers, LLM copilot, ops automation.
      New features: NPM module support, S3 mount for cold starts — not yet used.

  - id: queues_pgmq
    name: "Queues (PGMQ)"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/queues"
    repo_artifacts:
      - "supabase/migrations/*_queues*.sql"
    notes: >
      Async job dispatch for OCR, sync, embedding, email.
      Replaces cron-script-based polling.

  - id: cron
    name: "pg_cron (Scheduled Jobs)"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/database/extensions/pg_cron"
    repo_artifacts:
      - "supabase/functions/cron-processor/"
    notes: >
      Used for ETL health ping and scheduled job orchestration.

  - id: database_webhooks
    name: "Database Webhooks"
    supabase_status: ga
    adoption: adopt
    priority: p0
    source_url: "https://supabase.com/docs/guides/database/webhooks"
    repo_artifacts:
      - "supabase/migrations/*_database_webhooks*.sql"
    notes: >
      CDC triggers on table mutations -> Edge Function payloads.

# ---------------------------------------------------------------------------
# STORAGE
# ---------------------------------------------------------------------------

  - id: storage
    name: "Supabase Storage"
    supabase_status: ga
    adoption: adopt_next
    priority: p1
    blocked_by: "Phase 1 completion (spec/supabase-maximization/tasks.md)"
    source_url: "https://supabase.com/docs/guides/storage"
    repo_artifacts:
      - "supabase/config.toml [storage]"
    notes: >
      6 buckets exist but RLS policies not deployed on all.
      Phase 2 tasks 2.1-2.2: deploy receipts bucket + RLS policies.
      ipai_expense_ocr still stores binary in ir_attachment.datas — needs migration to Storage URLs.

  - id: storage_s3_protocol
    name: "Storage S3 Protocol"
    supabase_status: ga
    adoption: evaluate
    priority: p2
    source_url: "https://supabase.com/docs/guides/storage/s3/authentication"
    notes: >
      S3-compatible access to Storage buckets. Could simplify tooling
      that already speaks S3 (DuckDB, existing ETL). Not yet evaluated.

# ---------------------------------------------------------------------------
# REALTIME
# ---------------------------------------------------------------------------

  - id: realtime
    name: "Realtime (Broadcast, Presence, Postgres Changes)"
    supabase_status: ga
    adoption: adopt_next
    priority: p1
    blocked_by: "Phase 1 completion"
    source_url: "https://supabase.com/docs/guides/realtime"
    repo_artifacts:
      - "supabase/functions/realtime-sync/"
    notes: >
      realtime-sync Edge Function exists. ops.task_queue publication
      not yet activated in config.toml. Phase 2 task 2.6.

# ---------------------------------------------------------------------------
# ANALYTICS + DATA REPLICATION
# ---------------------------------------------------------------------------

  - id: analytics_buckets
    name: "Analytics Buckets (Iceberg on S3 Tables)"
    supabase_status: public_alpha
    adoption: evaluate
    priority: p2
    source_url: "https://supabase.com/docs/guides/storage/analytics-buckets"
    decision_criteria:
      removes_subsystem: >
        Would remove: custom Iceberg REST Catalog schema (catalog.*),
        credential vending (vault.vend_table_credentials), DO Spaces storage.
      repo_ssot_possible: true
      drift_gatable: "Unknown — alpha feature, CI integration TBD"
      secret_handling: "Managed by Supabase — no separate S3 creds needed"
    risks:
      - "Public Alpha — breaking changes possible"
      - "Not self-hosted — creates Supabase lock-in for analytics plane"
      - "Compaction, snapshot mgmt, billing, limits not fully documented yet"
      - "Our DO Spaces setup gives full control over retention + lifecycle"
    notes: >
      We built an equivalent at the technology primitives level
      (Iceberg + Parquet + S3-compatible on DO Spaces + custom catalog).
      This is NOT automatically equivalent at the managed operational layer.
      Evaluate whether managed compaction/snapshots justify losing control.
      Decision: compare ops toil of self-hosted vs alpha-feature risk.

  - id: etl_replication
    name: "ETL Replication (CDC -> external destinations)"
    supabase_status: private_alpha
    adoption: adopt_next
    priority: p1
    blocked_by: "Phase 1 completion"
    source_url: "https://supabase.com/docs/guides/database/replication"
    repo_artifacts:
      - "infra/supabase-etl/odoo-expense.toml"
      - ".github/workflows/supabase-etl-expense.yml"
      - "scripts/ci/check_iceberg_etl_smoke.sh"
    notes: >
      CDC pipeline config ready. Worker not yet deployed to DO App Platform.
      EL-only invariant enforced (no transforms in ETL layer).
      DuckDB Iceberg smoke gate defined but blocked on active pipeline.

# ---------------------------------------------------------------------------
# AI + VECTOR
# ---------------------------------------------------------------------------

  - id: pgvector
    name: "pgvector (Vector Search)"
    supabase_status: ga
    adoption: adopt_next
    priority: p1
    blocked_by: "Phase 2 completion"
    source_url: "https://supabase.com/docs/guides/ai/vector-columns"
    repo_artifacts:
      - "supabase/migrations/*_kb_vector*"
      - "supabase/functions/embed-chunk-worker/"
    notes: >
      Migrations deployed for KB embeddings (ivfflat, 1536-dim).
      Phase 3 task 3.1: create ai.receipt_embeddings for OCR text.
      embed-chunk-worker exists but not wired to receipt OCR flow.
      PR #506 adds DB-native hybrid RRF retrieval RPC — correct direction.

  - id: vector_buckets
    name: "Vector Buckets (S3-backed embedding storage)"
    supabase_status: alpha
    adoption: experimental
    priority: p3
    source_url: "https://supabase.com/docs/guides/storage/vector-buckets"
    risks:
      - "Alpha feature — not production-ready"
      - "Supabase does not promise automatic hot/cold tiering in docs"
      - "Any tiering strategy (pgvector hot + Vector Buckets cold) is our design choice, not a Supabase guarantee"
    notes: >
      Built on Amazon S3 Vectors. Offers cold storage for embeddings with
      a query engine attached. Keep as a future-scale option only.
      Do not take a hard dependency until it leaves alpha.

# ---------------------------------------------------------------------------
# INTEGRATIONS (FIRST-PARTY / ONE-CLICK)
# ---------------------------------------------------------------------------

  - id: stripe_sync_engine
    name: "Stripe Sync Engine"
    supabase_status: ga_library
    adoption: adopt_next
    priority: p1
    source_url: "https://supabase.com/partners/integrations/stripe"
    additional_sources:
      - "https://github.com/supabase-community/stripe-sync-engine"
      - "https://www.npmjs.com/package/stripe-sync-engine"
      - "https://supabase.com/blog/stripe-sync-engine"
    repo_artifacts:
      - "ssot/integrations/supabase_wrappers_stripe.yaml"
      - "supabase/migrations/20260228000001_stripe_wrapper.sql"
    blocker: "Vault secret stripe_secret_key not provisioned; foreign tables commented out"
    notes: >
      Two surfaces: (a) standalone sync library/npm package (actively maintained),
      (b) dashboard one-click integration (blog-announced). Whether "GA" depends
      on which surface. Library is legitimate enough to plan adoption.
      FDW migration exists; activation blocked on Vault secret provisioning.
      Once active: stripe.customers, stripe.subscriptions, stripe.invoices
      queryable via SQL — directly feeds ipai_finance_ppm.

# ---------------------------------------------------------------------------
# AGENT / MCP
# ---------------------------------------------------------------------------

  - id: mcp_edge_functions
    name: "MCP Server on Edge Functions"
    supabase_status: ga
    adoption: evaluate
    priority: p3
    source_url: "https://supabase.com/docs/guides/functions/mcp-server"
    additional_sources:
      - "https://supabase.com/blog/mcp-server-on-supabase"
    notes: >
      Canonical SDK is mcp-lite (NOT mcp-use — earlier assessment was wrong).
      Supabase docs show deploying MCP servers on Edge Functions as an
      intended platform surface. We have mcp-gateway Edge Function already.
      Evaluate once we want standardized tool surfaces for agents (Phase 3+).

  - id: mcp_supabase_server
    name: "MCP Server for Supabase Schema Introspection"
    supabase_status: community
    adoption: adopt_next
    priority: p2
    blocked_by: "Phase 2 completion"
    source_url: "https://github.com/supabase-community/supabase-mcp"
    repo_artifacts:
      - "mcp/servers/plane/"
    notes: >
      Phase 3 task 3.2. Plane MCP server exists; Supabase schema
      introspection server planned for controlled ops.* reads.

