version: 1
namespace: ipai.org.foundry.model_selection_policy.v1
artifact_type: policy
repo_key: org
domain: foundry
subject: model_selection_policy

# ============================================================================
# ORG-LEVEL MODEL SELECTION POLICY
# ============================================================================
# Governs which models can be used, how they're deployed, and which SDK to use.
# Repos: agents (routing), ops-platform (registry), infra (deployment)
# App repos (web, odoo, automations, lakehouse) consume aliases ONLY.
# ============================================================================

defaults:
  production_source_preference:
    - azure_direct          # Microsoft support, SLAs, Responsible AI review
    - partner_exception     # Only when materially outperforming azure_direct
    - preview_exception_only  # Explicit non-prod or controlled exception

  deployment_preference:
    prototyping: serverless
    nonprod_shared: serverless
    production_controlled: managed_compute
    production_high_volume: managed_compute

  sdk_routing:
    agents_evals_traces: foundry_sdk
    direct_model_calls: openai_sdk
    local_multi_agent: agent_framework
    point_ai_services: foundry_tools_sdk

  preview_policy:
    allow_in_dev: true
    allow_in_staging: false
    allow_in_prod: false
    require_exception: true

guardrails:
  forbid_raw_catalog_names_in_app_code: true
  require_alias_usage: true
  require_registry_entry_for_publish: true
  require_owner_for_each_alias: true
  require_eval_before_prod: true
