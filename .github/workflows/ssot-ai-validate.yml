name: SSOT AI Manifest Validation

on:
  push:
    paths:
      - "ssot/ai/**"
      - "tests/ssot/**"
  pull_request:
    paths:
      - "ssot/ai/**"
      - "tests/ssot/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run SSOT AI manifest integrity tests
        run: python -m unittest tests.ssot.test_ai_manifests -v
