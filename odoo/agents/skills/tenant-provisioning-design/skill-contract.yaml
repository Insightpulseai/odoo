id: tenant-provisioning-design
name: Tenant Provisioning Design
version: 0.1.0
type: benchmark_skill
classification: capability_uplift
family: azure-saas-mt
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design automated tenant provisioning workflows including registration flow,
  resource allocation, configuration templates, onboarding automation, and
  provisioning SLA enforcement.

triggers:
  - "New SaaS platform bootstrapping"
  - "Tenant onboarding is manual or slow"
  - "Provisioning failures are frequent"
  - "Need to define provisioning SLA"

inputs:
  - tenant_tiers: "Available tenant tiers (free, standard, enterprise)"
  - target_provisioning_sla: "Max time from registration to operational tenant"
  - resource_templates: "ARM/Bicep templates for tenant resources"
  - identity_provider: "Entra ID, B2C, or custom"
  - automation_platform: "Durable Functions, Logic Apps, or custom orchestrator"

steps:
  - "Map the tenant registration flow end-to-end"
  - "Define resource allocation per tier using ARM/Bicep templates"
  - "Design configuration template system for tenant customization"
  - "Build onboarding automation with idempotent provisioning steps"
  - "Define provisioning SLA and monitoring for compliance"
  - "Implement rollback procedures for partial provisioning failures"

outputs:
  - provisioning_workflow: "End-to-end provisioning sequence diagram"
  - resource_templates: "ARM/Bicep templates parameterized per tenant tier"
  - configuration_schema: "Tenant configuration template structure"
  - onboarding_runbook: "Automated onboarding steps with verification"
  - sla_dashboard: "Provisioning SLA monitoring definition"

guardrails:
  - "Provisioning must be idempotent — re-running does not create duplicates"
  - "Partial failure must trigger rollback, not leave orphaned resources"
  - "Tenant configuration must be validated before resource creation"
  - "Provisioning SLA must be measurable and alerted"

evidence:
  - "Provisioning completes within SLA for all tiers"
  - "Idempotency verified via repeated provisioning attempts"
  - "Rollback verified via simulated mid-provisioning failure"

dependencies:
  - saas-resource-organization
  - tenant-identity-isolation

evals:
  - scenario: "Provision 10 tenants concurrently"
    pass: "All 10 operational within SLA, no resource conflicts"
  - scenario: "Provisioning fails mid-way"
    pass: "Rollback cleans all partial resources, tenant marked failed"
  - scenario: "Re-provision after failure"
    pass: "Idempotent — completes without duplicates"

benchmark_source: "Azure SaaS Dev Kit - Tenant Provisioning"
