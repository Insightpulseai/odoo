# Related:   ssot/identity/entra_target_state.yaml
#            ssot/identity/guest-groups.yaml
#            ops/entra/guests/tbwa-smp-finance-import.csv
#            docs/runbooks/entra-guest-onboarding.md
# =============================================================================

schema_version: "1.0"
last_updated: "2026-04-19"
owner: "platform-architecture"
status: canonical

doctrine: >
  External collaborators are Entra B2B Guest users. Real email is preserved
  (@omc.com). Display name carries the business context (TBWA\SMP), NOT the
  parent holding (Omnicom). No standing roles. No direct app assignment.
  Access only through guest-scoped groups.

# -----------------------------------------------------------------------------
# Guest naming and attribute standard
# -----------------------------------------------------------------------------
naming_standard:
  display_name_pattern: "<Full Name> (TBWA\\SMP)"
  mail_nickname_pattern: "ext-tbwasmp-<first>-<last>"
  user_type: Guest
  company_name: "TBWA\\SMP"
  department: Finance
  employee_type: ExternalClient
  account_enabled: true
  home_email_domain_preserved: true

