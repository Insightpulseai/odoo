# =============================================================================
# REVIEW — validate usage before keeping or retiring
# =============================================================================
review:

  rg-ipai-agents-dev:
    purpose: Legacy agents + Supabase VM
    concern: Contains duplicate Odoo runtime pieces alongside the canonical rg-ipai-dev
    resources:
      - name: odoo-web
        type: containerApp
        status: retire_candidate
        reason: Duplicate of ipai-odoo-dev-web in rg-ipai-dev
      - name: odoo-init
        type: containerAppJob
        status: retire_candidate
        reason: One-time init job, likely no longer needed
      - name: cae-ipai-dev
        type: managedEnvironment
        status: review
        reason: Second ACA environment — may still host Supabase sidecar
      - name: debug-odoo-ep
        type: containerGroup
        status: retire_candidate
        reason: Debug-only container instance
      - name: vm-ipai-supabase-dev
        type: virtualMachine
        status: keep_exception
        reason: Self-hosted Supabase requires full VM (documented exception)
      - name: id-ipai-aca-dev
        type: managedIdentity
        status: review
      - name: vm networking (NIC, NSG, PublicIP, VNet)
        status: keep_if_vm_stays

  rg-ipai-data-dev:
    purpose: Platform database
    concern: Second PostgreSQL server alongside ipai-odoo-dev-pg
    resources:
      - name: pg-ipai-dev
        type: postgresFlexibleServer
        status: review
        reason: Validate which apps connect here vs ipai-odoo-dev-pg
        action: Check connection logs. If only Supabase/platform uses it, keep. If unused, retire.

  rg-data-intel-ph:
    purpose: Separate Foundry project
    concern: Second Foundry estate alongside aifoundry-ipai-dev
    resources:
      - name: data-intel-ph-resource
        type: cognitiveServices
        status: review
        reason: This is the active Foundry project endpoint used by ipai_odoo_copilot
        action: Decide canonical Foundry estate. If this is primary, keep. If proj-ipai-claude is primary, consolidate.
      - name: data-intel-ph-resource/data-intel-ph
        type: cognitiveServicesProject
        status: review

  rg-ipai-devops:
    purpose: Azure DevOps infrastructure
    concern: Only needed if Dev Center / managed pools are actively used
    resources:
      - name: ipai-devcenter
        type: devCenter
        status: review
        action: Validate active usage. If no dev boxes in use, consider retiring.
      - name: ipai-devcenter-project
        type: devCenterProject
        status: review
      - name: ipai-build-pool
        type: managedDevOpsPool
        status: keep_if_azdo_active

# =============================================================================
# CONSOLIDATE — likely over-provisioned
# =============================================================================
consolidate:

  container_registries:
    current_count: 3
    target_count: 1-2
    resources:
      - name: ipaiodoodevacr
        rg: rg-ipai-dev
        recommendation: keep (Odoo images)
      - name: ipaiwebacr
        rg: rg-ipai-dev
        recommendation: merge_into_cripaidev
      - name: cripaidev
        rg: rg-ipai-shared-dev
        recommendation: keep_as_shared
    action: Consolidate to ipaiodoodevacr (Odoo) + cripaidev (shared). Retire ipaiwebacr.

  foundry_estates:
    current_count: 2
    target_count: 1
    resources:
      - name: aifoundry-ipai-dev + proj-ipai-claude
        rg: rg-ipai-ai-dev
        recommendation: review
      - name: data-intel-ph-resource + data-intel-ph
        rg: rg-data-intel-ph
        recommendation: review
    action: Pick one as canonical. The copilot module currently uses data-intel-ph.

  postgres_servers:
    current_count: 2
    target_count: 1-2
    resources:
      - name: ipai-odoo-dev-pg
        rg: rg-ipai-dev
        recommendation: keep (canonical Odoo DB)
      - name: pg-ipai-dev
        rg: rg-ipai-data-dev
        recommendation: review (platform/Supabase DB?)
    action: Validate connection usage. Keep both only if serving different planes.

# =============================================================================
# Gaps — under-provisioned for target state
# =============================================================================
gaps:
  - area: Staging application runtime
    status: missing
    note: Only shared services (KV + identities) exist for staging. No ACA apps, no PG, no Front Door route.

  - area: Prod application runtime
    status: missing
    note: Same as staging — only shared services exist. No production workloads deployed.

  - area: Redis
    status: missing
    note: Odoo production needs Redis for session store, bus polling, and caching. Not provisioned in any RG.

  - area: Defender for Cloud
    status: not_verified
    note: OBJ-007 target. Need to verify activation status.

  - area: Azure Monitor alerts
    status: not_verified
    note: OBJ-007 target. Log Analytics exists but alerting rules not verified.

# =============================================================================
# Migration Targets — maps keep/review resources to target RGs
# =============================================================================
migration_targets:
  rg-ipai-shared-observability:
    sources:
      - resource: law-ipai-dev
        from: rg-ipai-shared-dev
      - resource: appi-ipai-dev
        from: rg-ipai-shared-dev

  rg-ipai-dev-odoo-runtime:
    sources:
      - resource: ipai-odoo-dev-env (recreate)
        from: rg-ipai-dev
      - resource: "ipai-odoo-dev-{web,worker,cron} (recreate)"
        from: rg-ipai-dev
      - resource: "ipai-{auth,mcp,ocr,superset,plane,shelf,crm,website}-dev (recreate)"
        from: rg-ipai-dev
      - resource: mi-ipai-odoo-dev
        from: rg-ipai-shared-dev

  rg-ipai-dev-odoo-data:
    sources:
      - resource: ipai-odoo-dev-pg
        from: rg-ipai-dev
      - resource: stipaiodoodev
        from: rg-ipai-dev

  rg-ipai-dev-platform:
    sources:
      - resource: kv-ipai-dev
        from: rg-ipai-shared-dev
      - resource: ipai-odoo-dev-kv
        from: rg-ipai-dev
      - resource: cripaidev
        from: rg-ipai-shared-dev
      - resource: ipaiodoodevacr
        from: rg-ipai-dev
      - resource: mi-ipai-platform-dev
        from: rg-ipai-shared-dev

  rg-ipai-ai-dev:
    status: already_in_place
    notes: All AI resources already in target RG. No moves needed.
