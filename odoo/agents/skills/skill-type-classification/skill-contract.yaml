version: 1
name: skill-type-classification
description: "Classify agent skills as capability_uplift or encoded_preference to determine eval strategy"
type: benchmark_skill
skill_classification: encoded_preference
owner_persona: skill-author
source_family: anthropic_skill_authoring
status: active

triggers:
  - "new skill being created"
  - "skill classification needed"
  - "what kind of skill is this?"

inputs:
  - skill_name: "Name of the skill"
  - skill_purpose: "What the skill does"
  - skill_mechanism: "How it works — model enhancement vs. process encoding"

steps:
  - id: assess_mechanism
    action: "Determine if skill enhances model capability or encodes a team process"
  - id: classify
    action: "Tag as capability_uplift or encoded_preference"
  - id: set_eval_strategy
    action: "Assign regression testing (uplift) or fidelity validation (preference)"
  - id: set_durability
    action: "Flag durability: medium (uplift, may become obsolete) or high (preference, durable if process holds)"

outputs:
  - classification: "capability_uplift | encoded_preference"
  - eval_strategy: "regression_testing | fidelity_validation"
  - durability: "medium | high"
  - reassessment_trigger: "When to re-evaluate this classification"

guardrails:
  - "Every skill MUST be classified — no unclassified skills"
  - "Classification must be explicit in skill-contract.yaml"
  - "Ambiguous cases default to encoded_preference (safer eval strategy)"

benchmark_source: "https://claude.com/blog/improving-skill-creator-test-measure-and-refine-agent-skills"
