description: >
  Three Foundry control planes mapped to bounded personas and skills.
  Model governance, tool governance, and runtime promotion as separate surfaces.

planes:
  - id: model_selection
    personas:
      - foundry-model-governor
    skills:
      - foundry-model-selection
      - foundry-model-routing
      - foundry-model-benchmark-judge

  - id: tool_catalog
    personas:
      - foundry-tool-governor
    skills:
      - foundry-tool-catalog-curation
      - foundry-mcp-auth-design
      - foundry-remote-mcp-registration

  - id: runtime_promotion
    personas:
      - foundry-runtime-builder
      - foundry-eval-judge
    skills:
      - foundry-agent-runtime-promotion

