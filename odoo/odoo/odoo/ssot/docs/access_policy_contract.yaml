# Access Policy Contract for Documentation Platform
# Schema: ssot.docs.access-policy.v1
# Version: 1.0
# Updated: 2026-03-15
# Referenced by: docs/contracts/ORG_DOC_PLATFORM_CONTRACT.md

version: "1.0"
schema: ssot.docs.access-policy.v1

# ============================================================================
# ACCESS LEVELS
# ============================================================================

access_levels:
  public:
    description: Indexed, searchable by all (no authentication required)
    use_case: Published documentation, public-facing guides
    requires_auth: false

  internal:
    description: Indexed, searchable by authenticated users
    use_case: Architecture docs, contracts, specs, guides, module docs
    requires_auth: true
    auth_method: DefaultAzureCredential or API key

  restricted:
    description: Indexed, searchable by authorized roles only
    use_case: Security policies, secrets inventory, compliance docs
    requires_auth: true
    auth_method: DefaultAzureCredential with role check
    required_roles:
      - security_team
      - cto
      - compliance_reviewer

default_level: internal

# ============================================================================
# SOURCE RULES
# ============================================================================
# Maps file path patterns to access levels and indexing behavior.
# Rules are evaluated in order; first match wins.

source_rules:
  # --- Never index ---
  - pattern: ".env*"
    level: restricted
    indexing: never
    reason: Environment files may contain secrets

  - pattern: "**/.env*"
    level: restricted
    indexing: never
    reason: Environment files may contain secrets

  - pattern: "**/node_modules/**"
    level: internal
    indexing: never
    reason: Third-party dependencies, not project documentation

  - pattern: "archive/**"
    level: internal
    indexing: never
    reason: Archived content, superseded

  - pattern: "infra/vendor/**"
    level: internal
    indexing: never
    reason: Vendored third-party code

  - pattern: ".git/**"
    level: internal
    indexing: never
    reason: Git internals

  # --- Skip indexing (derived, not SSOT) ---
  - pattern: "docs/evidence/**"
    level: internal
    indexing: skip
    reason: Derived proof artifacts, not source of truth

  - pattern: "docs/data-model/**"
    level: internal
    indexing: skip
    reason: Generated artifacts (regenerate with scripts/generate_odoo_dbml.py)

  # --- Restricted ---
  - pattern: "docs/security/**"
    level: restricted
    indexing: index
    reason: Security-sensitive documentation

  - pattern: "infra/secrets/**"
    level: restricted
    indexing: index
    reason: Secrets registry (names only, no values)

  - pattern: "ssot/secrets/**"
    level: restricted
    indexing: index
    reason: Secrets inventory (names only, no values)

  - pattern: "agents/ssot/secrets/**"
    level: restricted
    indexing: index
    reason: Agent secrets registry

  # --- Internal (explicitly listed) ---
  - pattern: "spec/**"
    level: internal
    indexing: index
    reason: Product specifications

  - pattern: "docs/ai/**"
    level: internal
    indexing: index
    reason: AI reference documentation

  - pattern: "docs/contracts/**"
    level: internal
    indexing: index
    reason: Platform contracts

  - pattern: "docs/architecture/**"
    level: internal
    indexing: index
    reason: Architecture documentation

  - pattern: "CLAUDE.md"
    level: internal
    indexing: index
    reason: Agent policy document

  - pattern: "**/CLAUDE.md"
    level: internal
    indexing: index
    reason: Agent policy documents (all levels)

  - pattern: "ssot/**"
    level: internal
    indexing: index
    reason: SSOT manifests

  - pattern: "ssot/**"
    level: internal
    indexing: index
    reason: Infrastructure SSOT manifests

  - pattern: "config/**"
    level: internal
    indexing: index
    reason: Configuration files

  - pattern: "agents/knowledge/**"
    level: internal
    indexing: index
    reason: Knowledge base contracts

  - pattern: "agents/evals/**"
    level: internal
    indexing: index
    reason: Evaluation framework

  - pattern: "agents/skills/**/SKILL.md"
    level: internal
    indexing: index
    reason: Agent skill definitions

  - pattern: "addons/ipai/**/README.md"
    level: internal
    indexing: index
    reason: Module documentation

  - pattern: "docs/modules/**"
    level: internal
    indexing: index
    reason: Module reference documentation

  - pattern: "docs/guides/**"
    level: internal
    indexing: index
    reason: Guides and how-tos

  - pattern: "docs/governance/**"
    level: internal
    indexing: index
    reason: Governance policies

  - pattern: "docs/integrations/**"
    level: internal
    indexing: index
    reason: Integration documentation

  - pattern: "docs/deployment/**"
    level: internal
    indexing: index
    reason: Deployment documentation

  - pattern: "docs/releases/**"
    level: internal
    indexing: index
    reason: Release documentation

  - pattern: "docs/operations/**"
    level: internal
    indexing: index
    reason: Operations documentation

  # --- Public ---
  - pattern: "docs/ai/llms.txt"
    level: public
    indexing: index
    reason: LLM-friendly project summary

  - pattern: "docs/ai/llms-full.txt"
    level: public
    indexing: index
    reason: LLM-friendly full project context

  # --- Catch-all ---
  - pattern: "**/*.md"
    level: internal
    indexing: index
    reason: Default for unmatched markdown files

  - pattern: "**/*.yaml"
    level: internal
    indexing: index
    reason: Default for unmatched YAML files

  - pattern: "**/*.yml"
    level: internal
    indexing: index
    reason: Default for unmatched YAML files

# ============================================================================
# ENFORCEMENT
# ============================================================================

enforcement:
  search_service:
    description: >
      The RAG search service (apps/odoo-docs-kb/service.py) must check
      access level before returning results. Restricted documents require
      role verification.
    implementation: >
      Filter query results by sensitivity field in Azure AI Search.
      Public queries: filter to sensitivity=public.
      Authenticated queries: filter to sensitivity in (public, internal).
      Authorized queries: no filter (all levels visible).

  indexing_pipeline:
    description: >
      The indexing pipeline must set the sensitivity field on every chunk
      based on source_rules. Files matching 'indexing: never' or
      'indexing: skip' must not produce chunks.
    implementation: >
      During document loading, evaluate path against source_rules.
      Set sensitivity metadata field accordingly.
      Skip documents where indexing is 'never' or 'skip'.

  ci_validation:
    description: >
      CI must validate that no restricted or never-indexed files
      are accidentally exposed in public search results.
    workflow: .github/workflows/docs-access-policy-gate.yml
    status: planned
