  functions:
    - executive_sponsor
    - business_decision_maker
    - it_decision_maker
    - lead_architect
    - governance_owner
    - compliance_owner
    - finops_owner

execution_lanes:
  platform:
    - chief-architect
    - azure-platform
    - release-ops
  workloads:
    - odoo-runtime
    - foundry-agent
    - data-intelligence
    - web
    - automations
  review:
    - architecture-judge
    - security-judge
    - governance-judge
    - finops-judge
    - customer-value-judge
    - tbwa-fit-judge

training_surfaces:
  local_agent_training:
    platform: agent-framework-devui
    status: development_and_training_only
    purpose:
      - visualize_agents
      - debug_workflows
      - inspect_traces
      - test_tool_integration
    note: "Not for production use. Python-first samples. C# coming soon."

  production_agent_runtime:
    platform: microsoft_foundry
    status: production
    purpose:
      - host_agents
      - scale_agents
      - manage_runtime
      - production_telemetry
    note: "Fully managed Azure PaaS. Foundry Agent Service for hosted agents."

readiness_requirements:
  platform_lane:
    - understands_azure_operating_model
    - can_operate_identity_and_secret_boundaries
    - can_run_ci_cd_gates
    - can_set_up_monitoring_and_alerting

  workload_lane:
    - can_build_and_validate_product_plane_changes
    - can_run_tests_and_produce_evidence
    - understands_ownership_boundaries

  agent_lane:
    - can_run_local_devui_samples
    - can_inspect_agent_traces
    - can_promote_validated_patterns_to_foundry
    - understands_mcp_tool_boundaries

review_cadence:
  - per_objective
  - per_cutover
  - quarterly
  - on_new_tool_adoption
