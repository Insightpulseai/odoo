# ============================================================
# PUBLISH RULES
# ============================================================
# Gates and rules for publishing agents and offers.
# Last updated: 2026-03-15
# ============================================================

schema_version: "1.0"

# ----------------------------------------------------------
# Publish now (internal)
# ----------------------------------------------------------
publish_now:
  - internal_one_click
  - internal_preview
  - internal_beta
  - internal_service_catalog_metadata
  - internal_connector_stubs
  - internal_release_governance

# ----------------------------------------------------------
# Publish later (external)
# ----------------------------------------------------------
publish_later:
  - azure_marketplace
  - managed_applications_for_customers
  - hosted_saas_offers
  - public_plugin_connector_distribution
  - external_managed_service_offers

# ----------------------------------------------------------
# Priority order
# ----------------------------------------------------------
priority_order:
  1: "Internal one-click adoption"
  2: "Release governance"
  3: "Controlled packaging"
  4: "External publishing"

# ----------------------------------------------------------
# Agent publish rules
# ----------------------------------------------------------
agent_publish_rules:
  - rule: "No agent publishes without eval pass"
    enforced_by: factory
  - rule: "No write-mode agents without explicit approval"
    enforced_by: policy_pack
  - rule: "All agents must have owner metadata"
    enforced_by: catalog
  - rule: "All agents must have trace pipeline active"
    enforced_by: factory
  - rule: "Read-only mode is default for all new agents"
    enforced_by: policy_pack
  - rule: "External publish requires stable internal usage for 30+ days"
    enforced_by: promotion_rules

# ----------------------------------------------------------
# Model aliasing rules
# ----------------------------------------------------------
model_aliasing_rules:
  - rule: "All agent specs reference model aliases, never raw model IDs"
  - rule: "Model alias resolution happens at deploy time"
  - rule: "Alias mapping maintained in ssot/factory/model-aliases.yaml"
  - rule: "Alias changes require eval re-run before promotion"
