version: 1
namespace: ipai.ops_platform.docint.document_class_registry.v1
artifact_type: registry
repo_key: ops_platform
domain: docint
subject: document_class_registry

document_classes:
  - class_key: vendor_bill
    extraction_mode: prebuilt_invoice
    odoo_target_model: account.move
    odoo_move_type: in_invoice
    confidence_threshold_draft: 0.85
    confidence_threshold_review: 0.60
    auto_post_allowed: false

  - class_key: receipt
    extraction_mode: prebuilt_receipt
    odoo_target_model: hr.expense
    confidence_threshold_draft: 0.80
    confidence_threshold_review: 0.55
    auto_post_allowed: false

  - class_key: contract
    extraction_mode: layout
    odoo_target_model: ipai.contract_review
    confidence_threshold_draft: 0.75
    confidence_threshold_review: 0.50
    auto_post_allowed: false

  - class_key: bank_statement
    extraction_mode: layout
    odoo_target_model: account.bank.statement.line
    confidence_threshold_draft: 0.90
    confidence_threshold_review: 0.70
    auto_post_allowed: false

  - class_key: tax_document
    extraction_mode: layout
    odoo_target_model: ipai.tax_document
    confidence_threshold_draft: 0.80
    confidence_threshold_review: 0.60
    auto_post_allowed: false

  - class_key: policy_document
    extraction_mode: read
    odoo_target_model: ipai.knowledge_document
    confidence_threshold_draft: 0.70
    confidence_threshold_review: 0.50
    auto_post_allowed: false
