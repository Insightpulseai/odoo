      Programmatic project management. Not needed — single project,
      managed via CLI + migrations.

  - id: whitelabel_apis
    name: "White-label APIs (Custom Domains)"
    supabase_status: ga
    adoption: not_applicable
    source_url: "https://supabase.com/docs/guides/platform/custom-domains"
