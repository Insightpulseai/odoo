      - hostname: erp-azure.insightpulseai.com
        current_target: "N/A (new record)"
        current_proxy: none
        current_origin_port: null
        current_nginx_vhost: null
        azure_target: "Front Door → odoo-web Container App"
        cutover_order: 0
        cutover_group: validation
        test_hostname: null
        health_check_path: /web/health
        rollback_target: "Delete DNS record"
        dependencies:
          - "odoo-web deployed to ACA"
          - "PG Flexible Server migrated"
          - "Front Door profile provisioned"
        status: not-started

