# Databricks Job: JDBC Extract from Odoo PostgreSQL
# Replaces: Supabase ETL CDC (Private Alpha, self-hosted N/A)
# Pattern: Incremental JDBC extract → Parquet on ADLS → DLT Auto Loader
# Downstream: finance_bir_pipeline DLT (Bronze streaming tables)

resources:
  jobs:
    odoo_jdbc_extract:
      name: "Odoo JDBC Extract"
      description: "Incremental extract from Odoo PG to ADLS Bronze (feeds DLT pipeline)"
      tags:
        layer: bronze
        source: odoo-pg
        domain: finance
        team: platform

      tasks:
        - task_key: extract_finance_tables
          description: "Extract 10 Odoo finance tables via JDBC"
          notebook_task:
            notebook_path: ../../notebooks/bronze/jdbc_odoo_extract.py
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 1800
          max_retries: 2

      environments:
        - environment_key: default
          spec:
            client: "1"

      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: "Asia/Manila"
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - platform-alerts@insightpulseai.com
