# Safety Policy Configuration
# Reference: https://docs.pyup.io/docs/safety-20-policy-file

# Security policy for Python dependency scanning
version: "2.0"

# Ignore specific vulnerabilities (with justification)
ignore:
  # Example: Ignore low-severity development-only vulnerability
  # - id: 51499
  #   reason: "Development dependency only, not used in production"
  #   expires: "2026-12-31"

# Fail on severity levels
fail-on-severity:
  development: high
  staging: medium
  production: low

# Scan configuration
scan:
  # Maximum age of vulnerability database (days)
  max-age: 7

  # Include development dependencies
  include-dev: true

  # Scan installation requirements
  requirements:
    - requirements.txt
    - tests/requirements-testing.txt

# Alert configuration
alerts:
  # Send alerts for new vulnerabilities
  new-vulnerability: true

  # Alert on CVE assignments
  cve-assigned: true

  # Minimum severity for alerts
  min-severity: medium
