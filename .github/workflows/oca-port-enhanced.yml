name: OCA Module Port to 19.0 (Enhanced)

on:
  workflow_dispatch:
    inputs:
      module_name:
        description: 'OCA module to port (e.g., account_invoice_export)'
        required: true
      source_version:
        description: 'Source Odoo version'
        required: true
        type: choice
        options:
          - '14.0'
          - '15.0'
          - '16.0'
          - '17.0'
          - '18.0'
      target_version:
        description: 'Target Odoo version'
        required: true
        default: '19.0'
      oca_repository:
        description: 'OCA repository (e.g., account-financial-tools)'
        required: true
      skip_tests:
        description: 'Skip automated tests (use only for debugging)'
        type: boolean
        default: false
      create_plane_issue:
        description: 'Create Plane tracking issue'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PORT_ID: ${{ github.run_id }}-${{ github.event.inputs.module_name }}
  BACKUP_DIR: /tmp/oca-backup-${{ github.run_id }}
  EVIDENCE_TIMESTAMP: $(date +%Y%m%d-%H%M+0800)
  EVIDENCE_DIR: web/docs/evidence/$(date +%Y%m%d-%H%M+0800)/oca-port-${{ github.run_id }}-${{ github.event.inputs.module_name }}

jobs:
  validate-input:
    name: "🔍 Validate Input & Check Duplicates"
    runs-on: ubuntu-latest
    outputs:
      can_proceed: ${{ steps.validate.outputs.can_proceed }}
      duplicate_check: ${{ steps.duplicate.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate module name format
        id: validate
        run: |
          MODULE="${{ github.event.inputs.module_name }}"

          # Check format (lowercase, underscores only)
          if ! [[ "$MODULE" =~ ^[a-z_]+$ ]]; then
            echo "❌ Invalid module name format: $MODULE"
            echo "Module names must be lowercase with underscores only"
            exit 1
          fi

          echo "✅ Module name format valid"
          echo "can_proceed=true" >> $GITHUB_OUTPUT

      - name: Check for duplicate in port queue
        id: duplicate
        run: |
          if grep -q "name: ${{ github.event.inputs.module_name }}" config/oca/port_queue.yml; then
            echo "⚠️  Module already in port queue"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Module not in queue (will be added)"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check module existence in target
        run: |
          # This will be enhanced with actual OCA API check
          echo "Checking if module exists on target version..."

  setup-environment:
    name: "🔧 Setup OCA Port Environment"
    runs-on: ubuntu-latest
    needs: validate-input
    if: needs.validate-input.outputs.can_proceed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install oca-port CLI and dependencies
        run: |
          pip install --upgrade pip
          pip install oca-port
          pip install pre-commit
          pip install pylint-odoo

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Create backup directory
        run: |
          mkdir -p ${{ env.BACKUP_DIR }}
          mkdir -p ${{ env.EVIDENCE_DIR }}/logs
          echo "Backup directory: ${{ env.BACKUP_DIR }}"

  clone-repositories:
    name: "📥 Clone OCA Repository (with retry)"
    runs-on: ubuntu-latest
    needs: setup-environment
    steps:
      - name: Clone source branch (with retry)
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            git clone \
              --branch ${{ github.event.inputs.source_version }} \
              --single-branch \
              --depth 1 \
              https://github.com/OCA/${{ github.event.inputs.oca_repository }}.git \
              /tmp/oca-source

      - name: Clone target branch (with retry)
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            git clone \
              --branch ${{ github.event.inputs.target_version }} \
              --single-branch \
              --depth 1 \
              https://github.com/OCA/${{ github.event.inputs.oca_repository }}.git \
              /tmp/oca-target

      - name: Verify module exists in source
        run: |
          if [ ! -d "/tmp/oca-source/${{ github.event.inputs.module_name }}" ]; then
            echo "❌ ERROR: Module not found in source repository"
            echo "Repository: OCA/${{ github.event.inputs.oca_repository }}"
            echo "Branch: ${{ github.event.inputs.source_version }}"
            echo "Module: ${{ github.event.inputs.module_name }}"
            exit 1
          fi
          echo "✅ Module found in source repository"

      - name: Create backup of source module
        run: |
          cp -r "/tmp/oca-source/${{ github.event.inputs.module_name }}" \
                "${{ env.BACKUP_DIR }}/${{ github.event.inputs.module_name }}-source"
          echo "✅ Backup created: ${{ env.BACKUP_DIR }}/${{ github.event.inputs.module_name }}-source"

      - name: Archive repositories
        uses: actions/upload-artifact@v3
        with:
          name: oca-repositories-${{ env.PORT_ID }}
          path: |
            /tmp/oca-source
            /tmp/oca-target
            ${{ env.BACKUP_DIR }}
          retention-days: 30

  port-module:
    name: "🔄 Port Module with Transaction Safety"
    runs-on: ubuntu-latest
    needs: clone-repositories
    outputs:
      port_status: ${{ steps.port.outputs.status }}
      port_log: ${{ steps.port.outputs.log_file }}
    steps:
      - name: Download repositories
        uses: actions/download-artifact@v3
        with:
          name: oca-repositories-${{ env.PORT_ID }}
          path: /tmp

      - name: Install oca-port
        run: |
          pip install oca-port pre-commit

      - name: Run oca-port (with comprehensive logging)
        id: port
        run: |
          cd /tmp/oca-target

          LOG_FILE="${{ env.EVIDENCE_DIR }}/logs/oca-port-${{ github.event.inputs.module_name }}.log"

          echo "Starting oca-port for ${{ github.event.inputs.module_name }}..."
          echo "Source: ${{ github.event.inputs.source_version }}"
          echo "Target: ${{ github.event.inputs.target_version }}"
          echo "Log file: $LOG_FILE"

          # Run oca-port with full logging
          set +e  # Don't exit on error
          oca-port \
            --from-branch ${{ github.event.inputs.source_version }} \
            --to-branch ${{ github.event.inputs.target_version }} \
            --repo-name ${{ github.event.inputs.oca_repository }} \
            --addon ${{ github.event.inputs.module_name }} \
            --author "GitHub Actions <actions@github.com>" \
            --non-interactive \
            2>&1 | tee "$LOG_FILE"

          PORT_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $PORT_EXIT_CODE -eq 0 ]; then
            echo "✅ oca-port completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ oca-port failed with exit code $PORT_EXIT_CODE"
            echo "status=failed" >> $GITHUB_OUTPUT

            # Create failure evidence
            cat > "${{ env.EVIDENCE_DIR }}/logs/port-failure-summary.txt" << EOF
          Port Failed
          ===========
          Module: ${{ github.event.inputs.module_name }}
          Repository: OCA/${{ github.event.inputs.oca_repository }}
          Source: ${{ github.event.inputs.source_version }}
          Target: ${{ github.event.inputs.target_version }}
          Exit Code: $PORT_EXIT_CODE

          See full log: $LOG_FILE
          EOF

            # Don't exit yet - let rollback job handle cleanup
          fi

          echo "log_file=$LOG_FILE" >> $GITHUB_OUTPUT

      - name: Run OCA compliance validation
        if: steps.port.outputs.status == 'success'
        run: |
          python3 << 'VALIDATION_SCRIPT'
          import sys
          sys.path.insert(0, '/workspaces/odoo/scripts/oca')
          from validate_oca_compliance import OCAComplianceValidator
          from pathlib import Path

          module_path = Path(f"/tmp/oca-target/${{ github.event.inputs.module_name }}")
          validator = OCAComplianceValidator(module_path)
          success, errors, warnings = validator.validate()
          validator.print_summary()

          # Save validation report
          with open("${{ env.EVIDENCE_DIR }}/logs/validation-report.txt", "w") as f:
              f.write("OCA Compliance Validation Report\n")
              f.write("=" * 70 + "\n\n")
              f.write(f"Module: ${{ github.event.inputs.module_name }}\n")
              f.write(f"Errors: {len(errors)}\n")
              f.write(f"Warnings: {len(warnings)}\n\n")

              if errors:
                  f.write("ERRORS:\n")
                  for error in errors:
                      f.write(f"  {error}\n")
                  f.write("\n")

              if warnings:
                  f.write("WARNINGS:\n")
                  for warning in warnings:
                      f.write(f"  {warning}\n")

          sys.exit(0 if success else 1)
          VALIDATION_SCRIPT

      - name: Run pre-commit hooks
        if: steps.port.outputs.status == 'success'
        continue-on-error: true
        run: |
          cd /tmp/oca-target

          # Run pre-commit on the ported module only
          pre-commit run --all-files \
            --config .pre-commit-config.yaml \
            --files "${{ github.event.inputs.module_name }}/**/*" \
            2>&1 | tee "${{ env.EVIDENCE_DIR }}/logs/pre-commit.log" || true

      - name: Archive ported module
        if: steps.port.outputs.status == 'success'
        uses: actions/upload-artifact@v3
        with:
          name: ported-module-${{ env.PORT_ID }}
          path: /tmp/oca-target/${{ github.event.inputs.module_name }}
          retention-days: 30

      - name: Archive evidence logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: evidence-logs-${{ env.PORT_ID }}
          path: ${{ env.EVIDENCE_DIR }}/logs
          retention-days: 90

  test-ported-module:
    name: "🧪 Test Ported Module (Odoo 19.0)"
    runs-on: ubuntu-latest
    needs: port-module
    if: |
      needs.port-module.outputs.port_status == 'success' &&
      github.event.inputs.skip_tests == 'false'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: odoo
          POSTGRES_USER: odoo
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Download ported module
        uses: actions/download-artifact@v3
        with:
          name: ported-module-${{ env.PORT_ID }}
          path: /tmp/ported-module

      - name: Set up Odoo 19.0
        run: |
          # Install Odoo 19.0 from nightly builds
          wget -O - https://nightly.odoo.com/odoo.key | sudo gpg --dearmor -o /usr/share/keyrings/odoo-archive-keyring.gpg
          echo 'deb [signed-by=/usr/share/keyrings/odoo-archive-keyring.gpg] https://nightly.odoo.com/19.0/nightly/deb/ ./' | sudo tee /etc/apt/sources.list.d/odoo.list
          sudo apt-get update && sudo apt-get install odoo -y

      - name: Run Odoo tests
        id: odoo_test
        run: |
          TEST_LOG="${{ env.EVIDENCE_DIR }}/logs/odoo-test-${{ github.event.inputs.module_name }}.log"

          odoo \
            --addons-path=/tmp/ported-module,/usr/lib/python3/dist-packages/odoo/addons \
            -d test_${{ github.event.inputs.module_name }} \
            -i ${{ github.event.inputs.module_name }} \
            --test-enable \
            --stop-after-init \
            --log-level=test \
            2>&1 | tee "$TEST_LOG"

          TEST_EXIT_CODE=${PIPESTATUS[0]}

          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "✅ Odoo tests passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Odoo tests failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Archive test logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs-${{ env.PORT_ID }}
          path: ${{ env.EVIDENCE_DIR }}/logs/odoo-test-*.log
          retention-days: 90

  rollback-on-failure:
    name: "↩️  Rollback on Failure"
    runs-on: ubuntu-latest
    needs: [port-module, test-ported-module]
    if: |
      always() &&
      (needs.port-module.outputs.port_status == 'failed' ||
       needs.test-ported-module.result == 'failure')
    steps:
      - name: Download backup
        uses: actions/download-artifact@v3
        with:
          name: oca-repositories-${{ env.PORT_ID }}
          path: /tmp

      - name: Restore from backup
        run: |
          echo "🔄 Restoring original module from backup..."

          if [ -d "${{ env.BACKUP_DIR }}/${{ github.event.inputs.module_name }}-source" ]; then
            echo "✅ Backup found, restoration available"
            echo "Backup location: ${{ env.BACKUP_DIR }}/${{ github.event.inputs.module_name }}-source"
          else
            echo "⚠️  Backup not found - manual intervention may be required"
          fi

      - name: Create rollback evidence
        run: |
          mkdir -p ${{ env.EVIDENCE_DIR }}/rollback

          cat > "${{ env.EVIDENCE_DIR }}/rollback/rollback-summary.txt" << EOF
          Rollback Executed
          =================
          Module: ${{ github.event.inputs.module_name }}
          Repository: OCA/${{ github.event.inputs.oca_repository }}
          Reason: Port failed or tests failed
          Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          Backup Location: ${{ env.BACKUP_DIR }}/${{ github.event.inputs.module_name }}-source

          Next Steps:
          1. Review port logs in evidence artifacts
          2. Fix issues identified in validation report
          3. Re-run workflow after fixes
          EOF

      - name: Upload rollback evidence
        uses: actions/upload-artifact@v3
        with:
          name: rollback-evidence-${{ env.PORT_ID }}
          path: ${{ env.EVIDENCE_DIR }}/rollback
          retention-days: 90

  create-pr:
    name: "📝 Create Pull Request"
    runs-on: ubuntu-latest
    needs: [port-module, test-ported-module]
    if: |
      needs.port-module.outputs.port_status == 'success' &&
      needs.test-ported-module.result == 'success'
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download ported module
        uses: actions/download-artifact@v3
        with:
          name: ported-module-${{ env.PORT_ID }}
          path: addons/oca/${{ github.event.inputs.module_name }}

      - name: Create feature branch
        run: |
          git checkout -b oca-port/${{ github.event.inputs.module_name }}-${{ github.event.inputs.target_version }}

      - name: Commit ported module
        run: |
          git add addons/oca/${{ github.event.inputs.module_name }}
          git commit -m "chore(oca): port ${{ github.event.inputs.module_name }} from ${{ github.event.inputs.source_version }} to ${{ github.event.inputs.target_version }}

          Module: ${{ github.event.inputs.module_name }}
          Repository: OCA/${{ github.event.inputs.oca_repository }}
          Source: ${{ github.event.inputs.source_version }}
          Target: ${{ github.event.inputs.target_version }}

          Changes:
          - Ported using oca-port CLI
          - Applied pre-commit hooks
          - Validated OCA compliance
          - Passed Odoo unit tests

          Port ID: ${{ env.PORT_ID }}

          Co-Authored-By: GitHub Actions <actions@github.com>"

      - name: Push branch
        run: |
          git push origin oca-port/${{ github.event.inputs.module_name }}-${{ github.event.inputs.target_version }}

      - name: Create Pull Request
        id: create_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[OCA Port] ${context.payload.inputs.module_name} (${{ github.event.inputs.source_version }} → ${{ github.event.inputs.target_version }})`,
              head: `oca-port/${{ github.event.inputs.module_name }}-${{ github.event.inputs.target_version }}`,
              base: 'main',
              body: `
              ## OCA Module Port

              **Module**: \`${{ github.event.inputs.module_name }}\`
              **Repository**: [OCA/${{ github.event.inputs.oca_repository }}](https://github.com/OCA/${{ github.event.inputs.oca_repository }})
              **Source Version**: ${{ github.event.inputs.source_version }}
              **Target Version**: ${{ github.event.inputs.target_version }}
              **Port ID**: ${{ env.PORT_ID }}

              ## Automated Checks

              - ✅ Module ported using \`oca-port\` CLI
              - ✅ Pre-commit hooks applied
              - ✅ OCA compliance validation passed
              - ✅ Odoo unit tests passed

              ## Evidence

              Logs and validation reports are available in workflow artifacts:
              - Port logs: \`evidence-logs-${{ env.PORT_ID }}\`
              - Test logs: \`test-logs-${{ env.PORT_ID }}\`

              ## Manual Review Required

              - [ ] Review code changes for compatibility
              - [ ] Test module in development environment
              - [ ] Verify module functionality
              - [ ] Update module documentation if needed
              - [ ] Update port queue status to \`completed\`

              ---
              *Automated by GitHub Actions - Run ID: ${{ github.run_id }}*
              `
            });

            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);

            console.log(`PR created: ${pr.html_url}`);

  update-port-queue:
    name: "📊 Update Port Queue"
    runs-on: ubuntu-latest
    needs: [create-pr]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Update port queue YAML
        run: |
          # Update module status to 'completed' in config/oca/port_queue.yml
          # Add port_log entry with timestamp and evidence

          python3 << 'PYTHON_SCRIPT'
          import yaml
          from datetime import datetime, timezone

          with open('config/oca/port_queue.yml', 'r') as f:
              queue = yaml.safe_load(f)

          # Find module and update status
          module_found = False
          for priority in ['P0', 'P1', 'P2']:
              if priority in queue.get('priorities', {}):
                  for module in queue['priorities'][priority].get('modules', []):
                      if module['name'] == '${{ github.event.inputs.module_name }}':
                          module['status'] = 'completed'
                          module_found = True
                          break

          # Add port_log entry
          if 'port_log' not in queue:
              queue['port_log'] = []

          queue['port_log'].append({
              'module': '${{ github.event.inputs.module_name }}',
              'status': 'completed',
              'timestamp': datetime.now(timezone.utc).isoformat(),
              'pr_number': ${{ needs.create-pr.outputs.pr_number }},
              'pr_url': '${{ needs.create-pr.outputs.pr_url }}',
              'port_id': '${{ env.PORT_ID }}',
              'evidence': {
                  'logs': 'evidence-logs-${{ env.PORT_ID }}',
                  'tests': 'test-logs-${{ env.PORT_ID }}'
              }
          })

          with open('config/oca/port_queue.yml', 'w') as f:
              yaml.dump(queue, f, default_flow_style=False, sort_keys=False)

          print(f"✅ Updated port queue for module: ${{ github.event.inputs.module_name }}")
          PYTHON_SCRIPT

      - name: Commit port queue update
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add config/oca/port_queue.yml
          git commit -m "chore(oca): update port queue for ${{ github.event.inputs.module_name }} (completed)"
          git push

  notify-plane:
    name: "📊 Create/Update Plane Issue"
    runs-on: ubuntu-latest
    needs: [create-pr]
    if: |
      success() &&
      github.event.inputs.create_plane_issue == 'true'
    steps:
      - name: Fetch secrets from Supabase Vault
        run: |
          # Fetch Plane credentials from Vault (not GitHub Secrets)
          SECRETS_JSON=$(curl -s -X POST \
            https://spdtwktxdalcfigzeqrz.supabase.co/functions/v1/vault-github-actions-bridge \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"keys": ["PLANE_API_KEY", "PLANE_API_URL", "PLANE_WORKSPACE_SLUG", "PLANE_BIR_PROJECT_ID"]}')

          # Export to environment (for subsequent steps)
          echo "PLANE_API_KEY=$(echo "$SECRETS_JSON" | jq -r '.PLANE_API_KEY')" >> $GITHUB_ENV
          echo "PLANE_API_URL=$(echo "$SECRETS_JSON" | jq -r '.PLANE_API_URL')" >> $GITHUB_ENV
          echo "PLANE_WORKSPACE_SLUG=$(echo "$SECRETS_JSON" | jq -r '.PLANE_WORKSPACE_SLUG')" >> $GITHUB_ENV
          echo "PLANE_BIR_PROJECT_ID=$(echo "$SECRETS_JSON" | jq -r '.PLANE_BIR_PROJECT_ID')" >> $GITHUB_ENV

          echo "✅ Secrets fetched from Vault"

      - name: Create or update Plane issue
        run: |
          # Check if issue already exists for this module
          EXISTING_ISSUE=$(curl -s \
            "${PLANE_API_URL}/workspaces/${PLANE_WORKSPACE_SLUG}/projects/${PLANE_BIR_PROJECT_ID}/issues/" \
            -H "X-API-Key: ${PLANE_API_KEY}" \
            | jq -r '.results[] | select(.name | contains("${{ github.event.inputs.module_name }}")) | .id' \
            | head -n1)

          if [ -n "$EXISTING_ISSUE" ]; then
            # Update existing issue
            curl -X PATCH \
              "${PLANE_API_URL}/workspaces/${PLANE_WORKSPACE_SLUG}/projects/${PLANE_BIR_PROJECT_ID}/issues/$EXISTING_ISSUE/" \
              -H "X-API-Key: ${PLANE_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{
                "state": "in_progress",
                "description_html": "<p><strong>Port Status</strong>: Completed ✅</p><p><strong>PR</strong>: <a href=\"${{ needs.create-pr.outputs.pr_url }}\">#${{ needs.create-pr.outputs.pr_number }}</a></p><p><strong>Evidence</strong>: Port ID ${{ env.PORT_ID }}</p>"
              }'
            echo "✅ Updated existing Plane issue: $EXISTING_ISSUE"
          else
            # Create new issue
            curl -X POST \
              "${PLANE_API_URL}/workspaces/${PLANE_WORKSPACE_SLUG}/projects/${PLANE_BIR_PROJECT_ID}/issues/" \
              -H "X-API-Key: ${PLANE_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "[OCA Port] ${{ github.event.inputs.module_name }} (${{ github.event.inputs.source_version }} → ${{ github.event.inputs.target_version }})",
                "description_html": "<p>Automated OCA module port completed</p><p><strong>Repository</strong>: OCA/${{ github.event.inputs.oca_repository }}</p><p><strong>PR</strong>: <a href=\"${{ needs.create-pr.outputs.pr_url }}\">#${{ needs.create-pr.outputs.pr_number }}</a></p><p><strong>Port ID</strong>: ${{ env.PORT_ID }}</p>",
                "state": "in_progress",
                "priority": "medium",
                "labels": ["oca", "module-port", "automation"]
              }'
            echo "✅ Created new Plane issue"
          fi

  notify-slack:
    name: "💬 Notify Slack"
    runs-on: ubuntu-latest
    needs: [create-pr]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: 'C06DEVELOPMENT'
          slack-message: |
            ${{ needs.create-pr.result == 'success' && '✅' || '❌' }} **OCA Module Port: ${{ github.event.inputs.module_name }}**

            **Status**: ${{ needs.create-pr.result == 'success' && 'Completed' || 'Failed' }}
            **Repository**: OCA/${{ github.event.inputs.oca_repository }}
            **Version**: ${{ github.event.inputs.source_version }} → ${{ github.event.inputs.target_version }}

            ${{ needs.create-pr.result == 'success' && format('**PR**: {0}', needs.create-pr.outputs.pr_url) || '**Error**: Check workflow logs for details' }}

            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
