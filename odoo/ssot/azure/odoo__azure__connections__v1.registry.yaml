version: 1
namespace: ipai.odoo.azure.connections.v1
artifact_type: registry
repo_key: odoo
domain: azure
subject: connections

connections:
  - id: odoo-app-to-odoo-postgres
    source: ipai-odoo-dev-web
    target: ipai-odoo-dev-pg
    protocol: postgres
    database: odoo
    state: declared
    expected:
      tls: true
      private_only: true
      auth_mode: managed_identity_or_entra
    observed:
      tls: true
      private_only: false
      auth_mode: postgresql_only
    status: noncompliant
    remediation: "enable private endpoint, disable public access, evaluate Entra auth"

  - id: odoo-worker-to-odoo-postgres
    source: ipai-odoo-dev-worker
    target: ipai-odoo-dev-pg
    protocol: postgres
    database: odoo
    state: declared
    status: noncompliant

  - id: odoo-cron-to-odoo-postgres
    source: ipai-odoo-dev-cron
    target: ipai-odoo-dev-pg
    protocol: postgres
    database: odoo
    state: declared
    status: noncompliant

  - id: supabase-runtime-hosting
    source: azure
    target: vm-ipai-supabase-dev
    protocol: vm_runtime
    state: observed
    status: incomplete

  - id: supabase-to-platform-observability
    source: vm-ipai-supabase-dev
    target: monitoring-stack
    protocol: metrics_logs
    state: missing
    status: noncompliant

  - id: supabase-to-secret-source
    source: vm-ipai-supabase-dev
    target: kv-ipai-dev
    protocol: secret_injection
    state: missing
    status: noncompliant

  - id: supabase-to-private-ingress
    source: ipai-fd-dev
    target: vm-ipai-supabase-dev
    protocol: https
    state: missing
    status: noncompliant

  - id: supabase-to-odoo-sync
    source: vm-ipai-supabase-dev
    target: ipai-odoo-dev-pg
    protocol: postgres_or_api
    state: missing
    status: noncompliant

  - id: supabase-to-databricks
    source: vm-ipai-supabase-dev
    target: dbw-ipai-dev
    protocol: jdbc_or_api
    state: missing
    status: noncompliant
