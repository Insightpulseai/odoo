    - Agent workflow: ai-first/agent-workflow.md
    - Spec-kit methodology: ai-first/spec-kit.md
    - Claude Code integration: ai-first/claude-code.md
    - MCP servers: ai-first/mcp-servers.md
    - AI modules: ai-first/ai-modules.md

  - Odoo Modules:
