# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not treating w9studio.net as deprecated (only insightpulseai.net is deprecated per CLAUDE.md)
  - not forcing lane_4 full consolidation unless strategic pivot warrants it
  - not integrating w9studio users into production customer tenant flows (A3/A4 actor classes are separate)
  - not exposing w9studio role mailbox credentials in any governance surface

