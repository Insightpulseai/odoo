# schema: ssot.ai.provider_policy.v1
# Gemini-first provider policy for IPAI copilot architecture.
# Referenced by: ssot/ai/odoo_ai.yaml (provider_policy), ssot/ai/oca_ai_integration.yaml
# Gate: provider activation requires API key + SSOT registration.

version: 1
meta:
  owner: platform
  purpose: "Define default provider routing and fallback policy for AI capabilities."
  created: "2026-03-03"
  last_reviewed: "2026-03-03"

# ── Default provider ──────────────────────────────────────────────────────────
default_provider: gemini
default_model: google/gemini-2.0-flash

# ── Routing per capability ────────────────────────────────────────────────────
routing:
  knowledge_copilot:
    description: "RAG-augmented responses with citation-first behavior"
    provider: gemini
    model: google/gemini-2.0-flash
    fallback: null                     # No fallback — fail-closed if Gemini unavailable
    requires:
      - corpus_registry_entry          # Source must be registered in ssot/knowledge/corpus_registry.yaml
      - citation_coverage >= 0.95      # Eval gate: eval/knowledge_copilot_eval.yaml

  tool_use:
    description: "Function calling for governed tool execution"
    provider: gemini
    model: google/gemini-2.0-flash     # Flash sufficient for tool routing
    model_complex: google/gemini-2.0-pro  # Upgrade for multi-step tool chains
    fallback: null
    requires:
      - tool_contract_v1               # Tool must have spec in contracts/tools/
      - preview_approval_commit        # Write tools require confirmation gate
      - audit_envelope                 # Every invocation logged

  coding_agent:
    description: "Issue-to-PR coding agent (external service)"
    provider: gemini                   # Used for code understanding + generation
    model: google/gemini-2.0-pro       # Pro model for code tasks
    fallback: null
    notes: >
      Coding agent runs as external service (Cloud Run / GitHub Actions).
      Odoo triggers and observes; does not own the agent runtime.

  chatter_assist:
    description: "Chatter compose enhancement (draft suggestions)"
    provider: gemini
    model: google/gemini-2.0-flash
    fallback: ollama                   # Offline fallback for air-gapped
    notes: "Lightweight; Flash model is sufficient."

  html_editor:
    description: "Knowledge/email/notes AI action (OCA ai_oca_native_generate_ollama)"
    provider: ollama                   # OCA module uses Ollama natively
    model: configurable                # Set in Odoo Settings > AI
    fallback: gemini
    notes: "OCA module handles provider directly; IPAI bridge not involved."

# ── Fallback rules ────────────────────────────────────────────────────────────
fallback_rules:
  - condition: "API key missing for default provider"
    action: "Return 503 AI_KEY_NOT_CONFIGURED (fail-closed)"
    rationale: "Silent fallback to wrong provider is worse than explicit error"

  - condition: "Default provider timeout (>30s)"
    action: "Return 504 BRIDGE_TIMEOUT"
    rationale: "Do not silently retry on different provider"

  - condition: "Ollama fallback available and configured"
    action: "Route chatter_assist and html_editor only"
    rationale: "Ollama is opt-in for low-risk, offline-capable surfaces only"

# ── Restricted corpora ────────────────────────────────────────────────────────
restricted_corpora:
  - description: "Financial records (account.move, account.payment)"
    provider_restriction: "gemini only (no Ollama — local models may leak)"
    audit_level: "full"

  - description: "Employee PII (hr.employee private fields)"
    provider_restriction: "gemini only"
    audit_level: "full"
    notes: "Must not be sent to any local/self-hosted model"

# ── Prohibited providers ──────────────────────────────────────────────────────
prohibited:
  - id: odoo_iap
    reason: "Enterprise license required; CE-only constraint"
  - id: openai_direct
    reason: "Not first-class; use Gemini or Anthropic via IPAI bridge"

# ── References ────────────────────────────────────────────────────────────────
references:
  gateway_config: ssot/providers/ai/provider.yaml
  odoo_ai_config: ssot/ai/odoo_ai.yaml
  ai_bridge_constitution: spec/ai-bridge/constitution.md
