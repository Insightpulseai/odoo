# =============================================================================
# Curated Addons Manifest — Odoo 19.0 CE
# =============================================================================
# SSOT for which OCA modules are included in the production runtime image.
# Replaces: config/addons_manifest.oca_ipai.json (stale, targets Odoo 18)
#
# This manifest is consumed by:
#   - docker/Dockerfile.unified (build-time: which repos to flatten)
#   - scripts/odoo/validate_addons_manifest.py (CI: manifest integrity)
#   - gitaggregate (via oca-aggregate.yml — repo cloning)
#
# Relationship to oca-aggregate.yml:
#   oca-aggregate.yml  → defines WHICH repos to clone (gitaggregate input)
#   addons.manifest.yaml → defines WHICH modules to include and WHY
#   Both must stay in sync. validate_addons_manifest.py enforces this.
#
# Update flow:
#   1. Edit this file (add/remove repos or modules)
#   2. Update oca-aggregate.yml if adding/removing repos
#   3. Run: gitaggregate -c oca-aggregate.yml
#   4. Run: python scripts/odoo/validate_addons_manifest.py
#   5. Commit all changed files together
# =============================================================================

version: 2
odoo_version: "19.0"
image_name: ipai-odoo-runtime
registries:
  - ghcr.io/insightpulseai/odoo
  - ipaiodoo.azurecr.io  # target: Azure Container Registry

# Pinning policy:
#   - branch: "19.0" means track HEAD of OCA 19.0 branch (rolling)
#   - To freeze for production, replace with commit SHA:
#       ref: "abc1234def5678..."
#   - gitaggregate supports both branch names and commit SHAs
pinning_policy: branch  # or "sha" when ready for production freeze

# =============================================================================
# Addon Roots (SSOT invariant — order matters)
# =============================================================================
# Odoo CE core is implicit: /usr/lib/python3/dist-packages/odoo/addons
addon_roots:
  oca: /opt/odoo/addons/oca      # flattened from per-repo dirs
  ipai: /opt/odoo/addons/ipai    # direct copy

# =============================================================================
# OCA Repositories
# =============================================================================
# Each entry maps to one OCA GitHub repo.
# Fields:
#   repo:          GitHub OCA repo name
#   url:           Git clone URL
#   ref:           Branch, tag, or commit SHA to pin
#   tier:          Installation priority (0 = core infra, 9 = optional)
#   purpose:       Why this repo is included
#   must_have:     Specific modules required from this repo (null = all installable)
#   excluded:      Modules explicitly excluded (e.g., broken on 19.0)
# =============================================================================

oca_repositories:

  # ---------------------------------------------------------------------------
  # Tier 0 — Core Infrastructure
  # ---------------------------------------------------------------------------

  - repo: server-tools
    url: https://github.com/OCA/server-tools.git
    ref: "19.0"
    tier: 0
