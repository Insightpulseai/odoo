id: tenancy-model-selection
version: 1
status: active
classification: encoded_preference
persona: multitenancy-architect
updated_at: "2026-03-17"

purpose: >
  Select shared vs dedicated vs hybrid tenancy model based on cost,
  isolation, performance, and compliance tradeoffs.

inputs:
  - tenant_count: "Current and projected tenant count"
  - isolation_requirements: "Regulatory, contractual, or technical isolation needs"
  - performance_requirements: "SLO targets per tenant tier"
  - cost_constraints: "Budget per tenant and platform-wide"
  - compliance_requirements: "Data residency, industry regulations"

outputs:
  - tenancy_model: "Selected model with rationale"
  - decision_matrix: "Scored comparison across selection criteria"
  - tier_mapping: "Which tenancy model applies to which tier"
  - migration_path: "How to move tenants between models"
  - risk_assessment: "Risks of the selected model and mitigations"

guardrails:
  - "Decision must be documented with scored criteria"
  - "Hybrid model is the default recommendation for growing platforms"
  - "Dedicated model requires cost justification per tenant"
  - "Shared model requires noisy-neighbor mitigation plan"

benchmark_source: "Azure Multitenancy Checklist - Tenancy Models"
