name: SSOT Validate

on:
  push:
    paths:
      - 'ssot/**'
      - 'scripts/ssot/**'
      - '.github/workflows/ssot-validate.yml'
  pull_request:
    paths:
      - 'ssot/**'
      - 'scripts/ssot/**'

permissions:
  contents: read

jobs:
  syntax:
    name: Syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Python syntax
        run: |
          python3 -m py_compile scripts/ssot/build_snapshot_manifest.py
          python3 -m py_compile scripts/ssot/normalize_snapshot_inventory.py

      - name: Shell syntax
        run: bash -n scripts/ssot/snapshot_github.sh

      - name: YAML syntax
        run: |
          python3 -c "
          import yaml, sys, pathlib
          errors = []
          for f in pathlib.Path('ssot').rglob('*.yaml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          for f in pathlib.Path('ssot').rglob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          print('All YAML files valid')
          "

  schema:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate manifest schema
        run: |
          python3 -c "
          import json, sys
          schema = json.load(open('ssot/schema/snapshot-manifest.schema.json'))
          required = schema.get('required', [])
          props = schema.get('properties', {})
          print(f'Schema: {len(required)} required fields, {len(props)} properties')
          # Validate schema itself is valid JSON Schema
          assert 'generated_at' in props, 'Missing generated_at property'
          assert 'summary' in props, 'Missing summary property'
          assert 'sources' in props, 'Missing sources property'
          print('Schema structure valid')
          "

  classification:
    name: Repo classification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate target-state-repos.yaml
        run: |
          python3 -c "
          import yaml, sys

          ts = yaml.safe_load(open('ssot/github/target-state-repos.yaml'))
          valid_domains = set(ts.get('domains', []))
          repos = ts.get('canonical_repos', [])
          errors = []

          names = set()
          canonical_domains = {}

          for r in repos:
              name = r.get('name', '')

              # Check uniqueness
              if name in names:
                  errors.append(f'DUPLICATE: repo \"{name}\" appears more than once')
              names.add(name)

              # Check domain validity
              domain = r.get('domain', '')
              if domain not in valid_domains:
                  errors.append(f'INVALID_DOMAIN: repo \"{name}\" has domain \"{domain}\"')

              # Check canonical uniqueness per domain
              if r.get('canonical', False):
                  if domain in canonical_domains:
                      errors.append(
                          f'DUPLICATE_CANONICAL: domain \"{domain}\" claimed by both '
                          f'\"{canonical_domains[domain]}\" and \"{name}\"'
                      )
                  canonical_domains[domain] = name

              # Check archived have superseded_by (if policy requires)
              if r.get('status') == 'archived' and ts.get('archived_repos_should_be_superseded'):
                  if not r.get('superseded_by') and r.get('canonical', False):
                      errors.append(f'MISSING_SUPERSEDED: archived canonical repo \"{name}\" lacks superseded_by')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)

          print(f'Valid: {len(repos)} repos, {len(canonical_domains)} canonical domains')
          print(f'Domains: {sorted(canonical_domains.keys())}')
          "

  no-staged-snapshots:
    name: No raw snapshots in git
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for accidentally committed snapshot files
        run: |
          ERRORS=0

          # Check for raw snapshot JSON in tracked files
          for pattern in "ssot/github/*.snapshot.json" "ssot/evidence/snapshot-manifest.json"; do
            if git ls-files --error-unmatch ${pattern} 2>/dev/null; then
              echo "ERROR: Raw snapshot file tracked in git: ${pattern}"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check for repo-details directory contents
          if git ls-files --error-unmatch "ssot/github/repo-details/*.json" 2>/dev/null; then
            echo "ERROR: repo-details JSON tracked in git"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAIL: $ERRORS raw snapshot file(s) tracked in git"
            exit 1
          fi

          echo "PASS: No raw snapshots in git"

  normalize-dry-run:
    name: Normalize dry-run
    runs-on: ubuntu-latest
    needs: [syntax, classification]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Normalizer dry-run
        run: python3 scripts/ssot/normalize_snapshot_inventory.py --dry-run
