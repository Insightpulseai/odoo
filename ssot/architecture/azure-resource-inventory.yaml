  "docs":
    primary_resources: []
  "design":
    primary_resources: []
  "templates":
    primary_resources: []

# -----------------------------------------------------------------------------
# Cleanup observations
# -----------------------------------------------------------------------------
cleanup_observations:

  rg_naming_drift:
    finding: >
      rg-ipai-dev-odoo-sea is no longer just Odoo. It hosts Odoo, Prismalab,
      W9 Studio, website, and the shared ACA env. That is really an app
      runtime RG.
    action: rename_candidate_to_rg-ipai-dev-apps-sea
    priority: low (cosmetic, not blocking)

  foundry_regional_split:
    finding: >
      Foundry resource ipai-copilot-resource is East US 2, while the rest
      of the stack is Southeast Asia.
    action: treat_as_explicit_architectural_exception_in_docs
    priority: medium (document the exception; re-evaluate when Foundry
      SEA regional availability improves)

  managed_identity_model:
    finding: >
      MI separation already useful: id-ipai-dev, id-ipai-dev-agent,
      id-ipai-dev-data, id-ipai-dev-pipeline, id-ipai-dev-runtime.
      Maps cleanly to target repo split.
    action: formalize_in_ssot (already done above)
    priority: already_captured

  web_dedicated_identity_and_telemetry:
    finding: >
      ipai-website and ipai-w9studio currently share id-ipai-dev-runtime
      and appi-ipai-dev. Dedicated web MI + App Insights would give
      cleaner separation.
    action: planned_future_split (id-ipai-dev-web + appi-ipai-dev-web-sea)
    priority: low_until_web_traffic_warrants_separation

# -----------------------------------------------------------------------------
# Drift detection hooks
# -----------------------------------------------------------------------------
drift_detection:
  source_of_truth: this_ssot
  live_source: azure_resource_graph
  recommended_check:
    tool: az_graph_query
    command: >
      az graph query -q "Resources | where subscriptionId == 'eba824fb-332d-4623-9dfb-2c9f7ee83f4e' | project name, type, location, resourceGroup | order by resourceGroup, type"
  cadence: monthly_plus_on_infra_PRs
  evidence_path: docs/evidence/<YYYYMMDD-HHMM>/azure-resource-inventory-drift/

# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not_a_bicep_or_terraform_source_of_truth (that lives in infra/azure/)
  - not_a_cost_model (tracked separately)
  - not_a_permissions_matrix (tracked in ssot/identity/ and PIM)
  - not_auto_synced_to_live_state (refresh on inventory audits)

# -----------------------------------------------------------------------------
# Anchors
# -----------------------------------------------------------------------------
anchors:
  architecture_map: ssot/architecture/azure-architecture-center-map.yaml
  production_foundation: ssot/governance/production-ai-foundation-adoption.yaml
  site_templates: ssot/web/site-template-adoption.yaml
  identity_target: ssot/identity/entra_target_state.yaml
  agent_framework: ssot/agent-platform/agent_framework_adoption.yaml
  boards_taxonomy: ssot/governance/azure-boards-taxonomy.yaml
