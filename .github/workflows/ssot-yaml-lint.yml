name: SSOT YAML Lint

on:
  pull_request:
    paths:
      - 'ssot/**/*.yaml'
      - 'ssot/**/*.yml'
  push:
    branches: [main]
    paths:
      - 'ssot/**/*.yaml'
      - 'ssot/**/*.yml'

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint SSOT YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" ssot/

  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repo boundary SSOT exists
        run: |
          test -f ssot/repo/ownership-boundaries.yaml || (echo "FAIL: ssot/repo/ownership-boundaries.yaml missing" && exit 1)
          echo "PASS: ownership-boundaries.yaml exists"

      - name: Verify assistant surfaces SSOT exists
        run: |
          test -f ssot/agents/assistant_surfaces.yaml || (echo "FAIL: ssot/agents/assistant_surfaces.yaml missing" && exit 1)
          echo "PASS: assistant_surfaces.yaml exists"

      - name: Verify tenancy model SSOT exists
        run: |
          test -f ssot/architecture/tenancy_model.yaml || (echo "FAIL: ssot/architecture/tenancy_model.yaml missing" && exit 1)
          echo "PASS: tenancy_model.yaml exists"

      - name: Verify agentops policy SSOT exists
        run: |
          test -f ssot/governance/agentops_policy.yaml || (echo "FAIL: ssot/governance/agentops_policy.yaml missing" && exit 1)
          echo "PASS: agentops_policy.yaml exists"

      - name: Verify release stages SSOT exists
        run: |
          test -f ssot/governance/copilot_release_stages.yaml || (echo "FAIL: ssot/governance/copilot_release_stages.yaml missing" && exit 1)
          echo "PASS: copilot_release_stages.yaml exists"

      - name: Verify creative provider policy SSOT exists
        run: |
          test -f ssot/creative/provider_policy.yaml || (echo "FAIL: ssot/creative/provider_policy.yaml missing" && exit 1)
          echo "PASS: provider_policy.yaml exists"

      - name: Verify no nested repo content staged
        run: |
          # Check that .gitignore excludes nested repos
          for path in "/odoo/" "/data-intelligence/" "/documentaion/" "/web-site/" "/archive/dot-github-repo/" "/archive/work/"; do
            if grep -q "^${path}$" .gitignore; then
              echo "PASS: ${path} excluded in .gitignore"
            else
              echo "FAIL: ${path} not excluded in .gitignore"
              exit 1
            fi
          done
