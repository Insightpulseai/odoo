# Plane Docs Canonical Ownership Map
# SSOT for documentation surface ownership across Repo and Plane Wiki
#
# Spec bundle: spec/plane-unified-docs/
# Human-readable map: docs/migration/PLANE_DOCS_CONSOLIDATION_MAP.md
# Constitution: spec/plane-unified-docs/constitution.md
#
# Status: active
# Created: 2026-03-13
# Owner: Platform Architecture

schema_version: "1.0"
last_updated: "2026-03-13"

# -------------------------------------------------------------------
# Documentation domains and their canonical surface assignments
# -------------------------------------------------------------------

domains:

  # -----------------------------------------------------------------
  # 1. Architecture
  # -----------------------------------------------------------------
  - domain: architecture
    canonical_surface: both_linked
    repo_path: docs/architecture/
    plane_location: "Wiki > Architecture"
    owner: platform-architect
    status: planned
    migration_action: migrate
    duplicate_sources:
      - docs/ai/ARCHITECTURE.md
      - docs/architecture/INSIGHTPULSEAI_TECHNICAL_ARCHITECTURE.md
      - docs/architecture/IPAI_TARGET_ARCHITECTURE.md
    notes: >
      Machine-readable artifacts (schema.dbml, INDEX.json, PLACEMENT_AUDIT.yaml,
      runtime_identifiers.json) stay in repo. Human-readable overviews, ADRs,
      and strategy docs migrate to Plane Wiki. Duplicates between docs/ai/ and
      docs/architecture/ are merged into single Plane pages.

  # -----------------------------------------------------------------
  # 2. Product Specs (PRDs)
  # -----------------------------------------------------------------
  - domain: product-specs
    canonical_surface: both_linked
    repo_path: spec/*/prd.md
    plane_location: "Wiki > Product"
    owner: product-owner
    status: planned
    migration_action: link
    duplicate_sources:
      - docs/product/
    notes: >
      Full PRDs remain in repo spec bundles (CI-enforced structure).
      Plane Wiki gets a summary page per PRD with link to canonical
      repo path. Spec bundle constitutions always stay in repo.
      Active spec bundles: azure-target-state, enterprise-target-state,
      lakehouse, odoo-copilot, odoo-erp-saas, platform-auth,
      plane-unified-docs, sap-joule-concur-odoo-azure, and others.

  # -----------------------------------------------------------------
  # 3. Delivery Plans
  # -----------------------------------------------------------------
  - domain: delivery-plans
    canonical_surface: both_linked
    repo_path: spec/*/plan.md
    plane_location: "Wiki > Delivery"
    owner: delivery-lead
    status: planned
    migration_action: link
    duplicate_sources: []
    notes: >
      Implementation plans stay in repo spec bundles. Plane Wiki
      gets a summary page with timeline and links. Plane execution
      (L3 work items and cycles) tracks active delivery.

  # -----------------------------------------------------------------
  # 4. Runbooks
  # -----------------------------------------------------------------
  - domain: runbooks
    canonical_surface: plane_wiki
    repo_path: docs/architecture/GOLDEN_PATH.md
