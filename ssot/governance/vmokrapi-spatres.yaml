  PI-1.2:
    name: "Annual Recurring Revenue (ARR)"
    kra: KRA1
    unit: USD
    baseline: 0
    targets:
      Y1_end: 47040       # $3,920 MRR × 12
    frequency: quarterly

  PI-1.3:
