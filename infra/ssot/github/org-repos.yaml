# InsightPulseAI GitHub Organization — Canonical 12-Repo Governance Manifest
# SSOT for the 12 canonical repos: layer, type, lifecycle, required files, directory layout.
# Aligned with: ssot/repo/org_topology.yaml (8-plane model), ssot/repo/ownership-boundaries.yaml
# Read by: scripts/github/check_org_repos.sh

org:
  name: "InsightPulseAI"
  github_org: "Insightpulseai"
  governance_version: "2.0.0"

layers:
  - id: platform
    name: "Platform"
    purpose: "Org-wide governance, IaC, CI/CD, control plane, automations"
  - id: core-runtime
    name: "Core Runtime"
    purpose: "Revenue-bearing product code: ERP, web surfaces, data pipelines, agent runtime"
  - id: shared-library
    name: "Shared Systems"
    purpose: "Cross-repo packages, tokens, agent definitions, documentation"
  - id: template
    name: "Templates"
    purpose: "Scaffolds and starter kits for new repos/modules"
  - id: archived
    name: "Archived / Deprecated"
    purpose: "Repos that are no longer maintained"

repos:
  # --- Platform ---
  - name: ".github"
    layer: platform
    type: github-meta
    visibility: private
    lifecycle: active
    description: "Org-wide GitHub configuration: issue templates, labels, workflows"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
    directory_layout:
      - .github/workflows/
      - .github/ISSUE_TEMPLATE/

  - name: platform
    layer: platform
    type: control-plane
    visibility: private
    lifecycle: active
    description: "Platform control plane and SSOT — vault references, platform metadata, backend/control-plane contracts, and edge/runtime glue"
    note: "Renamed from ops-platform"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - supabase/migrations/
      - supabase/functions/
      - ssot/
      - docs/
      - scripts/
      - tests/
      - spec/

  - name: infra
    layer: platform
    type: iac
    visibility: private
    lifecycle: active
    description: "Azure-first infrastructure as code, Cloudflare edge/security, and remaining legacy/runtime infrastructure"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - infra/azure/
      - infra/cloudflare/
      - scripts/
      - docs/
      - ssot/

  # --- Core Runtime ---
  - name: odoo
    layer: core-runtime
    type: odoo
    visibility: public
    lifecycle: active
    description: "Odoo CE 19.0 + OCA + ipai_* custom modules"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
      - .github/pull_request_template.md
    directory_layout:
      - addons/
      - scripts/odoo/
      - docs/
      - spec/
      - ssot/odoo/
      - .devcontainer/
      - .github/workflows/

  - name: web
    layer: core-runtime
    type: web-app
    visibility: private
    lifecycle: planned
    description: "User-facing web surfaces — ops console, marketing sites, docs sites, and browser-facing product apps"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - apps/
      - packages/
      - src/
      - public/
      - config/
      - scripts/

  - name: data-intelligence
    layer: core-runtime
    type: lakehouse
    visibility: private
    lifecycle: active
    description: "Databricks + Unity Catalog analytics engineering, medallion contracts, semantic-serving prep, and BI delivery artifacts"
    note: "Renamed from lakehouse"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - src/bronze/
      - src/silver/
      - src/gold/
      - src/platinum/
      - apps/
      - contracts/
      - tests/
      - ssot/

  # --- Shared Systems ---
  - name: design
    layer: shared-library
    type: design
    visibility: internal
    lifecycle: active
    description: "Design tokens, components, icon pipeline, brand assets"
    note: "Renamed from design-system"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - tokens/
      - components/
      - icons/
      - docs/
      - scripts/

  - name: agents
    layer: shared-library
    type: agents
    visibility: public
    lifecycle: active
    description: "Agent personas, skills, judges, evals, metadata, registries, and prompt contracts"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - agents/registry/
      - agents/personas/
      - agents/skills/
      - agents/runbooks/
      - agents/mcp/
      - docs/
      - scripts/

  - name: agent-platform
    layer: core-runtime
    type: agent-runtime
    visibility: private
    lifecycle: active
    description: "Agent runtime platform — orchestration, task ledger, execution contracts, control-room integrations, and runtime glue"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
      - .github/workflows/ci.yml
    directory_layout:
      - apps/
      - packages/
      - ssot/runtime/
      - docs/
      - scripts/

  - name: automations
    layer: platform
    type: automation
    visibility: private
    lifecycle: active
    description: "Workflow automation, scheduled jobs, n8n assets, and operational runbooks"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
    directory_layout:
      - n8n/workflows/
      - scripts/
      - docs/

  - name: docs
    layer: shared-library
    type: documentation
    visibility: public
    lifecycle: active
    description: "Cross-repo architecture, strategy, governance, runbooks, evidence, and operating model docs"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
    directory_layout:
      - architecture/
      - governance/
      - runbooks/
      - evidence/

  # --- Template ---
  - name: templates
    layer: template
    type: template
    visibility: private
    lifecycle: active
    description: "Repo templates: OCA scaffolds, Supabase starters, Next.js starters"
    default_branch: main
    required_files:
      - README.md
      - CLAUDE.md
      - CONTRIBUTING.md
      - .github/CODEOWNERS
    directory_layout:
      - templates/odoo-module/
      - templates/supabase-function/
      - templates/nextjs-app/
      - docs/

