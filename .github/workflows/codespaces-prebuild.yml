# =============================================================================
# Codespaces Prebuild — Build & push devcontainer image to GHCR
# =============================================================================
# Triggers: push to main (devcontainer/docker paths), weekly Sunday 2am UTC,
#           manual dispatch.
# Pushes prebuilt image to ghcr.io/insightpulseai/odoo-devcontainer so that
# Codespace creation is fast (seconds instead of minutes).
# =============================================================================

name: Codespaces Prebuild

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - "docker-compose.yml"
      - "docker/**"
      - "requirements*.txt"
  schedule:
    # Weekly rebuild: Sunday 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      force_no_cache:
        description: "Force rebuild without cache"
        type: boolean
        default: false

concurrency:
  group: codespaces-prebuild-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/insightpulseai/odoo-devcontainer
  # Regions where GitHub Codespaces prebuilds are cached
  CODESPACE_REGIONS: "SouthEastAsia,UsWest2"

permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # Build & push the devcontainer image
  # ===========================================================================
  prebuild:
    name: "Build devcontainer (${{ matrix.region }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: [SouthEastAsia, UsWest2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y%m%d)"
          REGION_TAG="${{ matrix.region }}"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${DATE}" >> "$GITHUB_OUTPUT"
          echo "region_tag=${REGION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up pip cache directory
        run: mkdir -p /tmp/pip-cache

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: /tmp/pip-cache
          key: pip-prebuild-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            pip-prebuild-

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: /tmp/npm-cache
          key: npm-prebuild-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            npm-prebuild-

      - name: Build & push devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          cacheFrom: ${{ env.IMAGE_NAME }}
          imageTag: latest,${{ steps.tags.outputs.sha_tag }},${{ steps.tags.outputs.date_tag }},${{ steps.tags.outputs.region_tag }}
          push: always
          skipContainerUserIdUpdate: false
          runCmd: |
            set -euo pipefail
            echo "::group::Pre-install Python dependencies"
            if [ -f requirements.txt ]; then
              pip install --cache-dir /tmp/pip-cache --quiet -r requirements.txt || true
            fi
            if [ -f requirements-dev.txt ]; then
              pip install --cache-dir /tmp/pip-cache --quiet -r requirements-dev.txt || true
            fi
            if [ -f requirements-oca.txt ]; then
              pip install --cache-dir /tmp/pip-cache --quiet -r requirements-oca.txt || true
            fi
            echo "::endgroup::"

            echo "::group::Pre-build OCA addons cache"
            if [ -d addons/oca ]; then
              echo "OCA addons directory present — listing repos:"
              ls -1d addons/oca/*/ 2>/dev/null | head -30 || echo "No OCA subdirectories found"
              # Ensure OCA submodules are checked out
              git submodule update --init --recursive addons/oca/ || true
              # Pre-compile Python files for faster startup
              python -m compileall -q addons/oca/ 2>/dev/null || true
            fi
            echo "::endgroup::"

            echo "::group::Pre-compile IPAI addons"
            if [ -d addons/ipai ]; then
              python -m compileall -q addons/ipai/ 2>/dev/null || true
            fi
            echo "::endgroup::"

            echo "::group::Warm npm cache"
            if [ -f package.json ]; then
              npm install --prefer-offline --no-audit --ignore-scripts 2>/dev/null || true
            fi
            echo "::endgroup::"

            echo "::group::Verify environment"
            python --version
            pip --version
            git --version
            node --version 2>/dev/null || echo "Node not available in base image"
            echo "Prebuild cache warming complete for region: ${{ matrix.region }}"
            echo "::endgroup::"

      - name: Upload prebuild metadata
        if: always()
        run: |
          cat <<METADATA >> "$GITHUB_STEP_SUMMARY"
          ## Prebuild Summary — ${{ matrix.region }}

          | Property | Value |
          |----------|-------|
          | **Image** | \`${{ env.IMAGE_NAME }}\` |
          | **Tags** | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\`, \`${{ steps.tags.outputs.date_tag }}\`, \`${{ steps.tags.outputs.region_tag }}\` |
          | **Region** | ${{ matrix.region }} |
          | **Trigger** | \`${{ github.event_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Runner** | \`${{ runner.os }}\` / \`${{ runner.arch }}\` |
          | **Cache** | pip + npm + OCA compile |
          METADATA

  # ===========================================================================
  # Post-build validation — verify the image starts correctly
  # ===========================================================================
  validate:
    name: Validate devcontainer image
    needs: prebuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt image
        run: docker pull "${{ env.IMAGE_NAME }}:latest"

      - name: Validate image starts
        run: |
          echo "::group::Validate container starts and basic tools work"
          docker run --rm "${{ env.IMAGE_NAME }}:latest" bash -c '
            set -e
            echo "✓ Container started"
            python --version && echo "✓ Python available"
            pip --version && echo "✓ pip available"
            git --version && echo "✓ git available"
            # Verify Odoo is importable (basic sanity)
            python -c "import odoo; print(f\"✓ Odoo {odoo.release.version} importable\")" 2>/dev/null \
              || echo "⚠ Odoo not importable (expected if not in base image)"
            echo "✓ Validation complete"
          '
          echo "::endgroup::"

      - name: Validation summary
        if: always()
        run: |
          cat <<SUMMARY >> "$GITHUB_STEP_SUMMARY"
          ## Validation Result

          | Check | Status |
          |-------|--------|
          | Image pull | ✅ |
          | Container start | ✅ |
          | Python available | ✅ |
          | Git available | ✅ |
          SUMMARY
