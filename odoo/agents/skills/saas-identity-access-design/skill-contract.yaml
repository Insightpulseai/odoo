id: saas-identity-access-design
version: 1
status: active
classification: encoded_preference
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design tenant/user identity model, authorization framework, and zero trust
  posture for multi-tenant SaaS platforms on Azure.

inputs:
  - identity_provider: "Entra ID, B2C, custom, or federated"
  - tenant_auth_model: "Tenant-issued credentials, federated IdP, or platform-managed"
  - user_role_hierarchy: "Roles within a tenant (admin, member, viewer)"
  - compliance_requirements: "MFA, conditional access, audit requirements"

outputs:
  - identity_model: "Tenant vs user identity separation design"
  - token_claims_spec: "Required claims for tenant context in tokens"
  - rbac_design: "Per-tenant role assignments and hierarchy"
  - zero_trust_controls: "Conditional access, MFA, device compliance"
  - federation_design: "Enterprise tenant IdP federation setup"

guardrails:
  - "Tenant context must be present in every authorization decision"
  - "User identity alone is insufficient for access control"
  - "Token claims must include tenant-id as a required claim"
  - "Cross-tenant token reuse must be impossible by design"

benchmark_source: "Azure SaaS Well-Architected - Identity and Access"
