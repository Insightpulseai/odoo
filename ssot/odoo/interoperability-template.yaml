# RELATED SSOTs
# =============================================================================

anchors:
  odoo_extension_doctrine: CLAUDE.md (Odoo extension and customization doctrine)
  cross_layer_binding: ssot/odoo/ce18_oca_uc_semantic_odata_binding.yaml
  package_classification: ssot/odoo/package-classification.yaml
  settings_catalog: ssot/odoo/settings_catalog.yaml
  business_dimensions: ssot/odoo/business_dimensions.yaml
  odoo_18_vs_19_decision: ssot/odoo/odoo-18-vs-19-adoption-decision.yaml
  oca_must_have_base: infra/ssot/oca/must_have_base.yaml
  mail_transport_authority: ssot/identity/mailbox-authority.yaml
  identity_authorities: ssot/identity/entra-identity-matrix.yaml
  directory_authority: platform/ssot/identity/directory-authority-matrix.yaml
  pulser_pack_matrix: platform/ssot/agents/pulser-pack-matrix.yaml
  ai_governance_baseline: platform/ssot/policy/azure-ai-governance-baseline.yaml
  go_live_readiness: ssot/release/go-live-readiness.yaml
  unity_catalog_map: ssot/lakehouse/unity-catalog-map.yaml
  semantic_layer: ssot/semantic/semantic-layer.yaml
  odata_entity_map: platform/ssot/semantic/odata-entity-map.yaml
