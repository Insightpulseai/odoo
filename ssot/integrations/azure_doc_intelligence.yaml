# Azure Document Intelligence Integration — SSOT
version: "1.0.0"
schema: ssot.integrations.v1
updated_at: "2026-03-31"

integration:
  id: azure_doc_intelligence
  name: "Azure Document Intelligence"
  vendor: microsoft
  status: active
  category: document_processing

resources:
  - name: docai-ipai-dev
    type: document_intelligence
    rg: rg-ipai-ai-dev
    region: southeastasia

secrets:
  vault: kv-ipai-dev
  entries:
    - name: docai-endpoint
    - name: docai-key

consumers:
  - ipai-ocr-dev
  - platform/services/docflow
