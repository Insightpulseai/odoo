# =============================================================================
# Platform Boundaries — InsightPulse AI
# =============================================================================
#
# Machine-readable definition of the six-plane Azure-first architecture,
# system assignments, truth authorities, tenancy doctrine, and integration
# boundaries.
#
# This file is the SSOT for architectural placement decisions.
# Human-readable rationale: docs/architecture/WHOLESALE_SAAS_ERP_ON_AZURE.md
# Canonical target doctrine: docs/architecture/target-state/PLATFORM.md
#
# Last updated: 2026-03-18
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-18"

# -----------------------------------------------------------------------------
# Top-Level Architecture Model
# -----------------------------------------------------------------------------

architecture:
  top_level_model: six_plane_azure_first
  description: >
    InsightPulse AI is a six-plane Azure-first architecture. Within that model,
    Odoo serves as the transactional system of record, Azure Databricks serves
    as the governed system of intelligence, and Microsoft Foundry serves as the
    agent factory and hosted agent runtime plane.

# -----------------------------------------------------------------------------
# Six Planes
# -----------------------------------------------------------------------------
#
# Plane membership is architectural placement.
# Truth authority is a separate operational model (see truth_authorities below).
# No plane definition substitutes for the truth-authority model.
# -----------------------------------------------------------------------------

planes:
  - id: governance_control
    name: Governance / Control
    description: Planning, code, release, policy enforcement
    systems:
      - azure_boards
      - github
      - azure_pipelines
      - azure_policy
      - azure_resource_graph

  - id: identity_network_security
    name: Identity / Network / Security
    description: Authentication, authorization, edge routing, secrets, API governance
    systems:
      - microsoft_entra_id
      - azure_front_door
      - azure_key_vault
      - azure_api_management

  - id: business_systems
    name: Business Systems
    description: Transactional ERP and workflow automation
    systems:
      - odoo_ce_19
      - n8n

  - id: data_intelligence
    name: Data Intelligence
    description: Governed lakehouse, ML, feature store, BI serving
    systems:
      - azure_databricks
      - adls_gen2
      - unity_catalog

  - id: agent_ai_runtime
    name: Agent / AI Runtime
    description: Agent factory, model hosting, tracing, evaluations, monitoring
    systems:
      - microsoft_foundry
      - azure_openai
      - azure_ai_document_intelligence

  - id: experience_domain_apps
    name: Experience / Domain Applications
    description: User-facing surfaces consuming platform services
    systems:
      - ops_console
      - bi_surfaces
      - copilot_uis
      - slack_integrations

# -----------------------------------------------------------------------------
# System Assignments
# -----------------------------------------------------------------------------

systems:
  sor:
    name: Odoo CE 19
    role: System of Record
    plane: business_systems
    repo: odoo
    owns:
      - accounting
      - invoicing
      - projects
      - tasks
      - bir_filings
      - employees
      - vendors
      - analytic_accounts
      - expense_documents
    does_not_own:
      - identity
      - platform_events
      - vector_embeddings
      - analytical_workloads

  data_intelligence:
    name: Azure Databricks + ADLS/Delta + Unity Catalog
    role: System of Intelligence
    plane: data_intelligence
    repo: data-intelligence
    canonical: true  # not optional
    owns:
      - medallion_lakehouse
      - ml_features
      - serving_endpoints
      - gold_kpis
      - financial_consolidation
      - sales_forecasting
      - operational_bi
    does_not_own:
      - transactional_erp_data
      - identity
      - secrets

  agent_runtime:
    name: Microsoft Foundry
    role: Agent Runtime + Tracing + Evals + Monitoring
    plane: agent_ai_runtime
    repo: agent-platform
    owns:
      - agent_lifecycle
      - model_tool_governance
      - prompt_tracing
      - evaluation_pipelines
      - monitoring
    does_not_own:
      - transactional_erp_data
      - lakehouse_governance
      - identity

  api_gateway:
    name: Azure API Management
    role: Governed Ingress/Egress Boundary
    plane: identity_network_security
    notes:
      - not_system_of_record
      - not_agent_runtime
      - governed_ingress_egress_and_policy_boundary

# -----------------------------------------------------------------------------
# Truth Authorities
# -----------------------------------------------------------------------------
#
# Separate from plane membership. Each authority is the operational
# source of truth for its domain.
# -----------------------------------------------------------------------------

truth_authorities:
  planned_truth:
    system: azure_boards
    description: Work items, sprints, epics, capacity planning
  code_truth:
    system: github
    description: Source code, PRs, branch policies, CODEOWNERS
  release_truth:
    system: azure_pipelines
    description: Build/release gates, environment promotions, artifact registry
  live_inventory_truth:
    system: azure_resource_graph
    description: Actual Azure resource state, drift detection
  agent_runtime_truth:
    system: microsoft_foundry
    description: Agent deployments, model versions, trace logs, eval results
  intended_state_truth:
    system: repo_ssot
    description: Machine-readable YAML in ssot/ directories across repos

# -----------------------------------------------------------------------------
# Tenancy Doctrine
# -----------------------------------------------------------------------------

tenancy:
  default:
    app_model: shared_runtime_farm
    data_model: database_per_tenant
    description: >
      Single ACA environment serving all tenants.
      Each tenant gets a dedicated PostgreSQL database.
  premium:
    app_model: deployment_stamp_per_tenant
    data_model: dedicated_database
    description: >
      Dedicated ACA environment + database per regulated or premium tenant.
  migration_requirement:
    automated_shared_to_stamp_promotion: true
    description: >
      Promotion from shared to stamped deployment must be fully automated.
      No manual infrastructure provisioning for tenant tier upgrades.

# -----------------------------------------------------------------------------
# Integration Boundary
# -----------------------------------------------------------------------------

integration:
  api_gateway: azure_api_management
  event_bus: azure_service_bus
  edge: azure_front_door
  notes:
    - apim_is_governed_ingress_egress_only
    - apim_is_not_system_of_record
    - apim_is_not_agent_runtime
    - all_cross_tenant_routing_through_apim
    - all_agent_tool_calls_through_apim

# -----------------------------------------------------------------------------
# Repo Ownership
# -----------------------------------------------------------------------------

repo_ownership:
  - repo: odoo
    plane: business_systems
    description: Odoo CE 19, OCA modules, thin ipai_* bridges
  - repo: platform
    plane: governance_control
    description: Governance/control plane application surfaces
  - repo: data-intelligence
    plane: data_intelligence
    description: Databricks notebooks, ADLS schemas, Unity Catalog
  - repo: agent-platform
    plane: agent_ai_runtime
    description: Foundry agents, tools, evals, prompts
  - repo: web
    plane: experience_domain_apps
    description: Experience / domain application frontends
  - repo: infra
    plane: identity_network_security
    description: IaC, landing zones, networking, Key Vault, APIM
  - repo: automations
    plane: business_systems
    description: n8n workflows, orchestration assets
  - path: addons/ipai/
    plane: business_systems
    role: thin_bridge_meta_only
    description: >
      Integration glue and bridge modules only.
      Not a general business capability or EE parity lane.
  - path: addons/oca/
    plane: business_systems
    role: primary_business_capability_lane
    description: >
      OCA-first policy. CE + OCA is the primary EE parity vehicle.
  - path: ssot/
    role: intended_state_truth
    description: >
      Machine-readable YAML artifacts within each owning repo.
