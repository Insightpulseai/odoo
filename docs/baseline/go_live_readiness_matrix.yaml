readiness_stages_definition:
  prerequisite-pending:
    description: foundational prerequisites not yet met (infra, modules, env)
  readiness-review-pending:
    description: prerequisites met but formal readiness review not conducted
  deployment-ready:
    description: technically deployable but cutover steps not complete
  cutover-ready:
    description: deployment complete, cutover checklist (balances, data, UAT) satisfied
  go-live-ready:
    description: all cutover + operational readiness confirmed, can switch production traffic
  stabilization-required:
    description: live but in hypercare / stabilization period
  blocked:
    description: cannot progress due to a hard dependency or blocker
  unknown:
    description: insufficient evidence to determine stage

