# Control Room Event Contracts
# Governance: spec/control-room-platform/constitution.md (Rule 5)
# Validated by: scripts/ci/validate_event_contracts.sh
# Last Updated: 2026-03-07
#
# Rules:
#   - Each event has a JSON Schema for payload validation.
#   - Events are stored in Supabase ctrl.integration_events (when deployed).
#   - Event log is append-only (per spec/integration-control-plane/constitution.md Rule 3).
#   - No event handler may be implemented without a corresponding contract here.

version: "1.0"
schema_ref: "spec/control-room-platform/prd.md#data-model"

events:
  # ---------------------------------------------------------------------------
  # 1. Approval Completed
  # ---------------------------------------------------------------------------
  - id: evt_001
    name: "approval.completed"
    source: odoo-erp
    description: >
      Emitted when an approval item transitions to approved or rejected state.
      Feeds the Approval Turnaround KPI.
    schema:
      type: object
      required: [approval_id, domain, action, user_id, timestamp]
      properties:
        approval_id:
          type: integer
          description: "Odoo ID of the ipai.approval.item record"
        domain:
          type: string
          description: "Approval domain (finance, hr, procurement, etc.)"
        action:
          type: string
          enum: [approved, rejected]
          description: "Final approval action"
        user_id:
          type: integer
          description: "Odoo user ID of the approver"
        elapsed_hours:
          type: number
          description: "Hours between submission and approval"
        timestamp:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of the approval action"
    kpi_linkage:
      - kpi_001
      - kpi_004

  # ---------------------------------------------------------------------------
  # 2. Expense Submitted
  # ---------------------------------------------------------------------------
  - id: evt_002
    name: "expense.submitted"
    source: odoo-erp
    description: >
      Emitted when an expense sheet is submitted for approval.
      Starts the expense processing time clock for KPI tracking.
    schema:
      type: object
      required: [expense_sheet_id, employee_id, total_amount, currency, timestamp]
      properties:
        expense_sheet_id:
          type: integer
          description: "Odoo ID of the hr.expense.sheet record"
        employee_id:
          type: integer
          description: "Odoo employee ID"
        total_amount:
          type: number
          description: "Total expense amount"
        currency:
          type: string
          description: "ISO 4217 currency code (e.g., PHP, USD)"
          pattern: "^[A-Z]{3}$"
        line_count:
          type: integer
          description: "Number of expense lines in the sheet"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_002

  # ---------------------------------------------------------------------------
  # 3. Close Task Completed
  # ---------------------------------------------------------------------------
  - id: evt_003
    name: "close.task.completed"
    source: odoo-erp
    description: >
      Emitted when a month-end close task is marked as done.
      Feeds the Monthly Close Cycle Duration KPI.
    schema:
      type: object
      required: [task_id, period, task_name, completed_by, timestamp]
      properties:
        task_id:
          type: integer
          description: "Odoo ID of the ipai.ppm.close.task record"
        period:
          type: string
          description: "Accounting period (YYYY-MM format)"
          pattern: "^\\d{4}-\\d{2}$"
        task_name:
          type: string
          description: "Name of the close task"
        completed_by:
          type: integer
          description: "Odoo user ID who completed the task"
        is_final_task:
          type: boolean
          description: "Whether this is the last task in the close checklist"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_003

  # ---------------------------------------------------------------------------
  # 4. BIR Filing Submitted
  # ---------------------------------------------------------------------------
  - id: evt_004
    name: "bir.filing.submitted"
    source: odoo-erp
    description: >
      Emitted when a BIR tax filing is submitted. Tracks on-time compliance.
    schema:
      type: object
      required: [filing_id, form_type, period, filing_date, deadline_date, timestamp]
      properties:
        filing_id:
          type: integer
          description: "Odoo ID of the ipai.bir.filing record"
        form_type:
          type: string
          description: "BIR form type (1601-C, 2550M, 2550Q, 2316, etc.)"
          enum: ["1601-C", "2550M", "2550Q", "2316", "1701", "1702", "alphalist"]
        period:
          type: string
          description: "Filing period (YYYY-MM format)"
          pattern: "^\\d{4}-\\d{2}$"
        filing_date:
          type: string
          format: date
          description: "Actual filing date"
        deadline_date:
          type: string
          format: date
          description: "BIR deadline date"
        on_time:
          type: boolean
          description: "Whether filed before the deadline"
        amount:
          type: number
          description: "Tax amount declared"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_005
      - kpi_006

  # ---------------------------------------------------------------------------
  # 5. OCR Processed
  # ---------------------------------------------------------------------------
  - id: evt_005
    name: "ocr.processed"
    source: odoo-erp
    description: >
      Emitted when an OCR job completes (PaddleOCR-VL).
      Feeds accuracy and throughput KPIs.
    schema:
      type: object
      required: [ocr_result_id, document_type, confidence_score, timestamp]
      properties:
        ocr_result_id:
          type: integer
          description: "Odoo ID of the ipai.ocr.result record"
        document_type:
          type: string
          description: "Type of document processed (invoice, receipt, BIR form, etc.)"
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
          description: "OCR confidence score (0.0 to 1.0)"
        manual_correction:
          type: boolean
          description: "Whether manual correction was needed"
        processing_time_ms:
          type: integer
          description: "OCR processing time in milliseconds"
        field_count:
          type: integer
          description: "Number of fields extracted"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_007
      - kpi_008

  # ---------------------------------------------------------------------------
  # 6. Workflow Executed
  # ---------------------------------------------------------------------------
  - id: evt_006
    name: "workflow.executed"
    source: n8n
    description: >
      Emitted when an n8n workflow execution completes (success or failure).
      Feeds automation KPIs.
    schema:
      type: object
      required: [execution_id, workflow_id, workflow_name, status, timestamp]
      properties:
        execution_id:
          type: string
          description: "n8n execution ID"
        workflow_id:
          type: string
          description: "n8n workflow ID"
        workflow_name:
          type: string
          description: "Human-readable workflow name"
        status:
          type: string
          enum: [success, error, cancelled, waiting]
          description: "Execution result status"
        duration_ms:
          type: integer
          description: "Execution duration in milliseconds"
        node_count:
          type: integer
          description: "Number of nodes executed"
        error_message:
          type: string
          description: "Error message if status is error"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_009
      - kpi_010

  # ---------------------------------------------------------------------------
  # 7. Agent Tool Invoked
  # ---------------------------------------------------------------------------
  - id: evt_007
    name: "agent.tool.invoked"
    source: azure-foundry
    description: >
      Emitted when an AI agent invokes a tool via Azure AI Foundry or MCP.
      Feeds agent success rate and latency KPIs.
    schema:
      type: object
      required: [invocation_id, tool_name, agent_id, status, timestamp]
      properties:
        invocation_id:
          type: string
          format: uuid
          description: "Unique invocation identifier"
        tool_name:
          type: string
          description: "Name of the tool invoked (e.g., odoo-query, supabase-lookup)"
        agent_id:
          type: string
          description: "Agent identifier"
        status:
          type: string
          enum: [success, failure, timeout]
          description: "Tool invocation result"
        latency_ms:
          type: integer
          description: "Tool invocation latency in milliseconds"
        input_tokens:
          type: integer
          description: "Number of input tokens (if LLM-based)"
        output_tokens:
          type: integer
          description: "Number of output tokens (if LLM-based)"
        error_message:
          type: string
          description: "Error details if status is failure or timeout"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_012
      - kpi_013

  # ---------------------------------------------------------------------------
  # 8. Sync Completed
  # ---------------------------------------------------------------------------
  - id: evt_008
    name: "sync.completed"
    source: supabase
    description: >
      Emitted when a cross-system sync operation completes. Stored in
      ctrl.integration_events. Feeds identity resolution and sync lag KPIs.
    schema:
      type: object
      required: [sync_id, source_system, target_system, direction, status, timestamp]
      properties:
        sync_id:
          type: string
          format: uuid
          description: "Unique sync operation identifier"
        source_system:
          type: string
          description: "Source system identifier"
        target_system:
          type: string
          description: "Target system identifier"
        direction:
          type: string
          enum: [unidirectional, bidirectional]
          description: "Sync direction"
        status:
          type: string
          enum: [success, partial, failure]
          description: "Sync result"
        records_synced:
          type: integer
          description: "Number of records synchronized"
        records_failed:
          type: integer
          description: "Number of records that failed to sync"
        cursor_position:
          type: string
          description: "New cursor position after sync"
        duration_ms:
          type: integer
          description: "Sync duration in milliseconds"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_014
      - kpi_015

  # ---------------------------------------------------------------------------
  # 9. Escalation Triggered
  # ---------------------------------------------------------------------------
  - id: evt_009
    name: "escalation.triggered"
    source: odoo-erp
    description: >
      Emitted when an approval or task is escalated due to SLA breach.
      Indicates governance intervention is needed.
    schema:
      type: object
      required: [escalation_id, entity_type, entity_id, reason, escalated_to, timestamp]
      properties:
        escalation_id:
          type: integer
          description: "Odoo escalation record ID"
        entity_type:
          type: string
          description: "Type of entity being escalated (approval, expense, close_task, etc.)"
        entity_id:
          type: integer
          description: "ID of the entity being escalated"
        reason:
          type: string
          enum: [sla_breach, policy_violation, manual_override, threshold_exceeded]
          description: "Reason for escalation"
        original_assignee:
          type: integer
          description: "Original assignee user ID"
        escalated_to:
          type: integer
          description: "Escalation target user ID"
        elapsed_hours:
          type: number
          description: "Hours elapsed since entity creation"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_001
      - kpi_004

  # ---------------------------------------------------------------------------
  # 10. Delegation Activated
  # ---------------------------------------------------------------------------
  - id: evt_010
    name: "delegation.activated"
    source: odoo-erp
    description: >
      Emitted when an approval delegation rule is activated (e.g., out-of-office
      delegation). Affects approval routing and turnaround tracking.
    schema:
      type: object
      required: [delegation_id, delegator_id, delegate_id, scope, start_date, end_date, timestamp]
      properties:
        delegation_id:
          type: integer
          description: "Odoo delegation record ID"
        delegator_id:
          type: integer
          description: "User ID delegating authority"
        delegate_id:
          type: integer
          description: "User ID receiving delegated authority"
        scope:
          type: string
          description: "Delegation scope (all, finance, hr, procurement)"
        start_date:
          type: string
          format: date
          description: "Delegation start date"
        end_date:
          type: string
          format: date
          description: "Delegation end date"
        auto_activated:
          type: boolean
          description: "Whether delegation was automatically activated by schedule"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_001

  # ---------------------------------------------------------------------------
  # 11. Deployment Completed
  # ---------------------------------------------------------------------------
  - id: evt_011
    name: "deployment.completed"
    source: github-ci
    description: >
      Emitted when a GitHub Actions deployment workflow completes.
      Feeds deployment frequency and CI green rate KPIs.
    schema:
      type: object
      required: [run_id, workflow_name, environment, status, commit_sha, timestamp]
      properties:
        run_id:
          type: integer
          description: "GitHub Actions workflow run ID"
        workflow_name:
          type: string
          description: "Name of the deployment workflow"
        environment:
          type: string
          enum: [staging, production]
          description: "Target deployment environment"
        status:
          type: string
          enum: [success, failure, cancelled]
          description: "Deployment result"
        commit_sha:
          type: string
          pattern: "^[a-f0-9]{40}$"
          description: "Git commit SHA that was deployed"
        branch:
          type: string
          description: "Git branch deployed from"
        duration_seconds:
          type: integer
          description: "Deployment duration in seconds"
        deployer:
          type: string
          description: "GitHub username or bot that triggered deployment"
        timestamp:
          type: string
          format: date-time
    kpi_linkage:
      - kpi_016
      - kpi_017
