# =============================================================================
# Azure Resource Inventory — InsightPulse AI (SSOT)
# =============================================================================
#
# This file is the single source of truth for all confirmed Azure resource names.
# Do NOT add resources here unless they are deployed or defined in IaC.
#
# Naming convention:  {type}-ipai-{env}
# Region:             southeastasia (NOT used in resource names — no -sea suffix)
# Environments:       dev | staging | prod
#
# Sources:
#   bicep     — Defined in infra/azure/databricks/main.bicep
#   confirmed — Verified in Azure portal/CLI but not yet in Bicep
#   pending   — Planned but not yet provisioned
#
# IMPORTANT: Names like oai-ipai-sea, kv-ipai-sea, vnet-ipai-sea are WRONG.
# Those were erroneously generated aliases that do not exist in Azure.
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-09"
naming_convention: "{type}-ipai-{env}"
default_region: southeastasia
default_environment: dev

# -----------------------------------------------------------------------------
# Resource Groups
# -----------------------------------------------------------------------------
resource_groups:
  - name: rg-ipai-dev
    environment: dev
    region: southeastasia
    source: confirmed
    notes: Primary resource group (legacy or fallback)

  - name: rg-ipai-shared-dev
    environment: dev
    region: southeastasia
    source: bicep
    notes: Shared services (Key Vault). Referenced in main.bicep line 349-354.

  - name: rg-ipai-ai-dev
    environment: dev
    region: southeastasia
    source: confirmed
    notes: >
      Main resource group for AI, Databricks, and Data Plane.
      Confirmed via portal screenshot 2026-03-09.

  - name: rg-dbw-managed-ipai-dev
    environment: dev
    region: southeastasia
    source: confirmed
    notes: >
      Databricks-managed resource group (rg-dbw-managed-ipai-...).
      Created automatically by the Databricks workspace.

# -----------------------------------------------------------------------------
# Compute
# -----------------------------------------------------------------------------
compute:
  - name: dbw-ipai-dev
    type: Microsoft.Databricks/workspaces
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    sku: premium
    source: confirmed
    bicep_var: resolvedWorkspaceName
    notes: >
      Databricks workspace with VNet injection and Secure Cluster Connectivity
      (no public IP). Premium SKU required for Unity Catalog.

# -----------------------------------------------------------------------------
# Storage
# -----------------------------------------------------------------------------
storage:
  - name: stipaidevlake
    type: Microsoft.Storage/storageAccounts
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    kind: StorageV2
    sku: Standard_LRS
    hns_enabled: true # ADLS Gen2
    source: bicep
    bicep_var: resolvedStorageAccountName
    containers:
      - bronze
      - silver
      - gold
      - platinum
      - checkpoints
    lifecycle_rules:
      - name: archive-bronze-90d
        prefix: bronze/
        archive_after_days: 90
        delete_after_days: 730
    notes: >
      ADLS Gen2 storage for the Medallion Architecture data lake.
      Name is generated as st{ipai}{env}lake (no hyphens — SA naming rules).

# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------
network:
  - name: vnet-ipai-databricks
    type: Microsoft.Network/virtualNetworks
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    address_space: "10.10.0.0/16"
    source: confirmed
    bicep_var: vnetName
    subnets:
      - name: snet-dbw-public
        prefix: "10.10.1.0/24"
        delegation: Microsoft.Databricks/workspaces
      - name: snet-dbw-private
        prefix: "10.10.2.0/24"
        delegation: Microsoft.Databricks/workspaces
    notes: >
      Fixed name (not env-suffixed). Used for Databricks VNet injection.
      Both subnets are delegated to Databricks and share the same NSG.

  - name: nsg-dbw-ipai-dev
    type: Microsoft.Network/networkSecurityGroups
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    source: confirmed
    bicep_var: databricksNsgName
    notes: >
      NSG required by Databricks VNet injection. Contains rules for
      worker-to-worker, worker-to-webapp, worker-to-sql, worker-to-storage,
      and worker-to-eventhub traffic.

# -----------------------------------------------------------------------------
# Security & Identity
# -----------------------------------------------------------------------------
security:
  - name: kv-ipai-dev
    type: Microsoft.KeyVault/vaults
    resource_group: rg-ipai-shared-dev
    region: southeastasia
    source: bicep
    bicep_var: keyVaultName
    notes: >
      Key Vault in the shared resource group. Cross-RG role assignment
      (Key Vault Secrets User) must be done post-deployment via az CLI.
      See main.bicep lines 349-354.

  - name: id-ipai-databricks-dev
    type: Microsoft.ManagedIdentity/userAssignedIdentities
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    source: confirmed

  - name: id-ipai-agents-dev
    type: Microsoft.ManagedIdentity/userAssignedIdentities
    resource_group: rg-ipai-shared-dev
    region: southeastasia
    source: confirmed

  - name: unity-catalog-access-connector
    type: Microsoft.Databricks/accessConnectors
    resource_group: rg-dbw-managed-ipai-dev
    region: southeastasia
    source: confirmed
    bicep_var: managedIdentityName
    role_assignments:
      - role: Storage Blob Data Contributor
        scope: stipaidevlake
        source: bicep
      - role: Key Vault Secrets User
        scope: kv-ipai-dev
        source: bicep
        notes: Cross-RG assignment, applied post-deployment via az CLI

# -----------------------------------------------------------------------------
# AI Services
# -----------------------------------------------------------------------------
ai:
  - name: oai-ipai-dev
    type: "Microsoft.CognitiveServices/accounts (kind: OpenAI)"
    resource_group: rg-ipai-ai-dev
    region: eastus
    source: confirmed
    notes: >
      Azure OpenAI resource. Confirmed in portal (East US).

  - name: srch-ipai-dev
    type: Microsoft.Search/searchServices
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    source: confirmed
    notes: Azure AI Search confirmed in rg-ipai-ai-dev.

  - name: docai-ipai-dev
    type: Microsoft.CognitiveServices/accounts (DocumentIntelligence)
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    source: confirmed

  - name: lang-ipai-dev
    type: Microsoft.CognitiveServices/accounts (TextAnalytics)
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    source: confirmed

  - name: vision-ipai-dev
    type: Microsoft.CognitiveServices/accounts (ComputerVision)
    resource_group: rg-ipai-ai-dev
    region: southeastasia
    source: confirmed

# -----------------------------------------------------------------------------
# Database (Pending)
# -----------------------------------------------------------------------------
database:
  - name: pg-ipai-dev
    type: Microsoft.DBforPostgreSQL/flexibleServers
    resource_group: rg-ipai-dev
    region: southeastasia
    source: pending
    notes: >
      Azure PG Flexible Server for Odoo database migration from
      DigitalOcean self-hosted PostgreSQL 16. Not yet provisioned.
      Bicep module planned at infra/azure/modules/postgres.bicep.

# -----------------------------------------------------------------------------
# Errata — Names That Do NOT Exist
# -----------------------------------------------------------------------------
# The following names were generated in error and must NOT be used:
#
#   oai-ipai-sea       WRONG — correct name is oai-ipai-dev
#   kv-ipai-sea        WRONG — correct name is kv-ipai-dev
#   vnet-ipai-sea      WRONG — correct name is vnet-ipai-databricks
#   search-ipai-sea    WRONG — expected canonical name is srch-ipai-dev
#
# The -sea suffix does not exist in the naming convention.
# Region (southeastasia) is NOT encoded in resource names.
# =============================================================================
