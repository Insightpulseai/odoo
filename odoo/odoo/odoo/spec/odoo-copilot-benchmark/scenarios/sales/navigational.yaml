# Sales — Navigational Benchmark Scenarios

scenarios:
  - id: "BM-SAL-N-001"
    domain: sales
    capability_class: navigational
    persona: sales_rep
    prompt: "Show me my draft quotations"
    expected_behavior:
      type: navigate
      model: sale.order
      action_id: "sale.action_quotations_with_onboarding"
      view_type: list
      domain_filter: [["state", "=", "draft"], ["user_id", "=", "uid"]]
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
    soft_scores:
      completeness: { weight: 0.35 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 3000, weight: 0.10 }
    tags: [sales, quotations, filter]

  - id: "BM-SAL-N-002"
    domain: sales
    capability_class: navigational
    persona: sales_mgr
    prompt: "Open the sales analysis pivot report"
    expected_behavior:
      type: navigate
      model: sale.report
      view_type: pivot
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
    soft_scores:
      completeness: { weight: 0.35 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 3000, weight: 0.10 }
    tags: [sales, reporting, pivot]

  - id: "BM-SAL-N-003"
    domain: sales
    capability_class: navigational
    persona: sales_rep
    prompt: "Open quotation S00042"
    setup:
      seed_records:
        - model: sale.order
          values: { name: "S00042" }
    expected_behavior:
      type: navigate
      model: sale.order
      view_type: form
    hard_gates:
      capability: true
      correctness: true
      permission_check: true
    soft_scores:
      completeness: { weight: 0.35 }
      clarity: { weight: 0.25 }
      latency: { target_ms: 3000, weight: 0.10 }
    tags: [sales, record-lookup, form]
