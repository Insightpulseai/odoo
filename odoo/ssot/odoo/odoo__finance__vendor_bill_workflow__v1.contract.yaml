version: 1
namespace: ipai.odoo.finance.vendor_bill_workflow.v1
artifact_type: contract
repo_key: odoo
domain: finance
subject: vendor_bill_workflow

# odoo__finance__vendor_bill_workflow__v1.contract.yaml
# Boundary contract: How agents interact with vendor bill workflow in Odoo
apiVersion: ipai.contract/v1
kind: WorkflowContract
metadata:
  name: vendor-bill-workflow
  version: "1.0.0"
  owner: finance-team
  last_updated: "2026-03-16"

spec:
  odoo_model: account.move
  move_type: in_invoice
  description: "Vendor bill lifecycle from document ingestion to payment"

  states:
    draft:
      description: "Bill created, awaiting review"
      agent_can_create: true
      agent_can_modify: true
      human_gate: false
    posted:
      description: "Bill validated and posted to ledger"
      agent_can_create: false
      agent_can_modify: false
      human_gate: true
      gate_action: action_post
      gate_note: "Human must review and approve before posting"
    cancel:
      description: "Bill cancelled"
      agent_can_create: false
      agent_can_modify: false
      human_gate: true

  transitions:
    - from: draft
      to: posted
      action: action_post
      requires_human: true
      agent_role: "Agent prepares draft, notifies reviewer"
    - from: posted
      to: cancel
      action: button_cancel
      requires_human: true
      agent_role: "Agent may request cancellation with reason"
    - from: posted
      to: draft
      action: button_draft
      requires_human: true
      agent_role: "Agent may request reset to draft with justification"

  agent_permissions:
    create_draft:
      allowed: true
      conditions:
        - "Valid partner_id (resolved from document extraction)"
        - "At least one invoice line"
        - "Source document attached"
      auto_approve:
        max_amount: 50000
        min_confidence: 0.90
        currency: PHP

    modify_draft:
      allowed: true
      conditions:
        - "Bill is in draft state"
        - "Modification logged to audit trail"

    post_bill:
      allowed: false
      note: "Human-only action. Agent can prepare and notify."

    delete_bill:
      allowed: false
      note: "Never delete. Use cancel workflow instead."

  document_flow:
    ingestion:
      source: "Document upload (email, manual, API)"
      tool: document_intelligence_extract
      output: normalized_extraction_envelope
    matching:
      step: "Match vendor by name/VAT in Odoo"
      tool: odoo_search_partner
      on_no_match: "Flag for review, set partner_id = False"
    creation:
      step: "Create draft vendor bill"
      tool: odoo_create_vendor_bill
      attach: source_document
    notification:
      step: "Notify finance team"
      tool: slack_send_message
      channel: finance-alerts
      template: "New vendor bill draft: {partner_name} — {amount} {currency} — Review required"
    review:
      step: "Human reviews in Odoo"
      gate: human
      action: "Review accuracy, approve or correct"
    posting:
      step: "Human posts bill"
      gate: human
      action: action_post

  validation_rules:
    - name: amount_match
      description: "Extracted total must match sum of line amounts within 1%"
      tolerance: 0.01
    - name: duplicate_check
      description: "Check for existing bill with same partner + ref + date"
      action: flag_if_duplicate
    - name: currency_check
      description: "Currency must match partner's default or be PHP"
    - name: date_check
      description: "Invoice date must not be in the future"
