# base-cd-containerapp.yml — CD for stateless web apps
# Pipeline: Deploy_Dev → Release_Readiness → Deploy_Prod
# Prod uses lockBehavior: sequential (exclusive lock).
parameters:
  - name: imageName
    type: string
  - name: containerAppName
    type: string
  - name: devEnvironment
    type: string
    default: ipai-web-dev
  - name: prodEnvironment
    type: string
    default: ipai-web-prod
  - name: acrName
    type: string
    default: acripaiodoo
  - name: resourceGroup
    type: string
    default: rg-ipai-dev-odoo-runtime
  - name: azureServiceConnection
    type: string
    default: sc-azure-dev-platform
  - name: dockerfilePath
    type: string
    default: Dockerfile
  - name: buildContext
    type: string
    default: '.'

stages:
  # --- Build container image ---
  - stage: Build_Image
    displayName: 'CD: Build Image'
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: BuildImage
        displayName: Build and push container image
        steps:
          - checkout: self
            fetchDepth: 1
          - template: steps/build-container.yml
            parameters:
              acrName: ${{ parameters.acrName }}
              imageName: ${{ parameters.imageName }}
              dockerfilePath: ${{ parameters.dockerfilePath }}
              buildContext: ${{ parameters.buildContext }}
              azureServiceConnection: ${{ parameters.azureServiceConnection }}

  # --- Deploy to Dev ---
  - stage: Deploy_Dev
    displayName: 'CD: Deploy Dev'
    dependsOn: Build_Image
    pool:
      vmImage: ubuntu-latest
    jobs:
      - deployment: DeployDev
        displayName: Deploy to ${{ parameters.devEnvironment }}
        environment: ${{ parameters.devEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - template: steps/deploy-containerapp.yml
                  parameters:
                    acrName: ${{ parameters.acrName }}
                    imageName: ${{ parameters.imageName }}
                    containerAppName: ${{ parameters.containerAppName }}
                    resourceGroup: ${{ parameters.resourceGroup }}
                    azureServiceConnection: ${{ parameters.azureServiceConnection }}

  # --- Release Readiness ---
  - stage: Release_Readiness
    displayName: 'CD: Release Readiness'
    dependsOn: Deploy_Dev
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: ReleaseGates
        displayName: Release readiness gates
        steps:
          - checkout: self
            fetchDepth: 1
          - template: steps/release-gates.yml
            parameters:
              containerAppName: ${{ parameters.containerAppName }}
              resourceGroup: ${{ parameters.resourceGroup }}
              azureServiceConnection: ${{ parameters.azureServiceConnection }}

  # --- Deploy to Prod (exclusive lock) ---
  - stage: Deploy_Prod
    displayName: 'CD: Deploy Prod'
    dependsOn: Release_Readiness
    pool:
      vmImage: ubuntu-latest
    jobs:
      - deployment: DeployProd
        displayName: Deploy to ${{ parameters.prodEnvironment }}
        environment: ${{ parameters.prodEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - template: steps/deploy-containerapp.yml
                  parameters:
                    acrName: ${{ parameters.acrName }}
                    imageName: ${{ parameters.imageName }}
                    containerAppName: ${{ parameters.containerAppName }}
                    resourceGroup: ${{ parameters.resourceGroup }}
                    azureServiceConnection: ${{ parameters.azureServiceConnection }}
        lockBehavior: sequential
