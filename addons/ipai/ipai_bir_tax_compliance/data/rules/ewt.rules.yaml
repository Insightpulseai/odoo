---
# Expanded Withholding Tax (EWT) Rules for Philippines
# Pattern: PayrollEngine rules DSL with JSONLogic + ATC code matching
# Formula: base * rate (rate looked up from ATC table)
#
# ATC Code Namespace (BIR RR 11-2018 / RR 2-98 as amended):
#   WI = EWT payable by Individual payees
#   WC = EWT payable by Corporate/Juridical payees
#   WB = EWT payable by both (same rate)
#
# Legacy W-series (W010, W020) was an internal shorthand.
# Reconciled to official BIR WI/WC namespace 2026-04-01.
# The `atc_code` field is the official BIR ATC code.
# The `legacy_code` field preserves backward compatibility.

rules:
  # Professional fees - Individuals
  - code: EWT_PROF_WI010
    name: Professional fees - individuals (ATC WI010)
    description: 10% EWT on professional fees paid to individuals
    priority: 100
    tax_type: ewt
    atc_code: WI010
    legacy_code: W010
    payee_type: individual

    condition:
      and:
        - "==": [{"var": "doc_type"}, "bill"]
        - "in": [{"var": "atc_code"}, ["WI010", "W010"]]
        - "==": [{"var": "vendor_type"}, "PROFESSIONAL"]
        - ">": [{"var": "gross_amount"}, 0]

    base_source: gross_amount
    rate_code: WI010
    rate_value: 0.10
    formula: "base * rate"

    output_bucket: EWT_PROF_WI010

    notes: "10% creditable withholding on professional fees to individuals"

  - code: EWT_PROF_WC020
