# -----------------------------------------------------------------------------
# CI / pipeline placement (per CLAUDE.md authority split)
# -----------------------------------------------------------------------------
ci_placement:
  deploy_authority: azure_pipelines
  gha_allowed_scope: pr_validation_only
  azure_pipelines:
    - azure-pipelines.yml                 # main deploy
    - azure-pipelines-pr.yml              # PR validation (exists)
    - azure-pipelines-eval-gate.yml       # eval-gate promotion
    - azure-pipelines-contract-checks.yml # SSOT contract validation
  gha_scoped_exception:
    - .github/workflows/ci.yml            # ruff + mypy + pytest on PR only
  forbidden_gha:
    - deploy workflows
    - image builds
    - secret-bearing workflows

# -----------------------------------------------------------------------------
# Import boundary enforcement
# -----------------------------------------------------------------------------
import_boundary:
  rule: >
    `agent_framework`, `agent_framework.*`, and `agent-framework-azure-ai`
    imports are PERMITTED only under agent-platform/src/agent_platform/.
  permitted_paths:
    - agent-platform/src/agent_platform/**
  forbidden_paths:
    - agents/**
    - odoo/**
    - addons/**
    - platform/**
    - infra/**
    - data-intelligence/**
    - apps/**
  enforcement:
    tool: ruff or grep gate
    ci_job: azure-pipelines-contract-checks.yml

# -----------------------------------------------------------------------------
# Dependency pin
# -----------------------------------------------------------------------------
dependency:
  package: agent-framework-azure-ai
  minimum_version: "1.0.0b251105"
  pin_location: agent-platform/pyproject.toml
  rationale: >
    Pin minimum only; allow forward beta upgrades until MAF GA. Revisit pin
    policy when MAF reaches 1.0 stable.

# -----------------------------------------------------------------------------
# Migration drift
# -----------------------------------------------------------------------------
migration:
  current_drift:
    - MAF already imported at agent-platform/agents/release-manager/agent_orchestrator.py
    - per-agent requirements.txt pin (should move to root pyproject.toml)
    - existing src/ uses non-packaged layout (orchestration/, policy/, runtime/, tools/ at src root)
    - no pyproject.toml or uv.lock
    - existing ssot/ has runtime/ dir but lacks runtime/{agents,tools,models,environments}.yaml set
  phase_1_scaffold_skeleton:
    - add pyproject.toml, uv.lock
    - create src/agent_platform/ package with __init__.py files
    - create minimal runnable engine + foundry client + odoo tool + eval runner
    - add SSOT runtime/security/eval seed files
    - add spec-kit bundle for agent-platform-runtime
  phase_2_migrate_existing_code:
    - move agent-platform/src/orchestration/** → src/agent_platform/orchestration/
    - move agent-platform/src/runtime/** → src/agent_platform/runtime/
    - move agent-platform/src/tools/** → src/agent_platform/tools/
    - move agent-platform/src/policy/** → src/agent_platform/security/
    - refactor agents/release-manager/agent_orchestrator.py to import from agent_platform.runtime
  phase_3_enforce_boundary:
    - add azure-pipelines-contract-checks.yml gate
    - add ruff/grep rule: no agent_framework imports outside agent-platform/

# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not replacing supervisor-mediated orchestration pattern
  - not importing MAF outside agent-platform/
  - not forking MAF; adopt upstream as-is
  - not adopting MAF as the M365 surface protocol (Agent365 SDK owns that)
  - not mixing mailbox/user identity logic into runtime orchestration

# -----------------------------------------------------------------------------
# Anchors
# -----------------------------------------------------------------------------
anchors:
  architecture_doc: docs/architecture/agent-framework-adoption.md
  runtime_overview: agent-platform/docs/architecture/RUNTIME_OVERVIEW.md
  mcp_policy: ssot/agent-platform/mcp_policy.yaml
  agent_factory: ssot/agents/agent_factory.yaml
  orchestration_model: docs/architecture/agent-orchestration-model.md
  three_protocol_model: docs/architecture/three-protocol-model.md
  maf_upstream: https://github.com/microsoft/agent-framework
