third_party_descriptor_policy:
  odoo:
    allowed_descriptive_forms:
      - Pulser for Odoo
      - Ask Pulser for Odoo
      - "built on Odoo CE"
      - "works with Odoo"
    prohibited_primary_brand_forms:
      - Odoo Copilot
      - Odoo Pulser
      - InsightPulseAI Odoo
      - Odoo Assistant
  microsoft:
    allowed_descriptive_forms:
      - "works with Microsoft Teams"
      - "runs on Azure"
      - "powered by Azure AI Foundry"
    prohibited_primary_brand_forms:
      - Copilot (as product name)
      - Microsoft Copilot (implying our product)
      - Teams Copilot
  generic:
    preferred_descriptors:
      - intelligent assistant
      - AI assistant
      - AI-powered assistant
    avoid_descriptors:
      - copilot (capitalized, as product identity)
      - AI copilot (as brand)

