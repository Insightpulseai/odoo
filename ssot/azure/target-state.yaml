version: "1.0"
last_updated: "2026-03-07"
governance: "spec/azure-target-state/constitution.md"

platforms:
  azure_boards:
    role: planning
    status: active
    organization: insightpulseai
    projects:
      - name: lakehouse
        scope: [databricks, marketing-intelligence, customer-360, data-pipelines, ml-ai, bi-dashboards]
        primary_repos: [lakehouse]
      - name: erp-saas
        scope: [odoo-runtime, oca-ipai-modules, tenant-release, erp-integrations, environment-hardening]
        primary_repos: [odoo, odoo-modules]
      - name: platform
        scope: [supabase-control-plane, azure-runtime, boards-automation, agents, shared-services, observability]
        primary_repos: [platform, boards-automation, agents, infra, web]
    work_item_hierarchy: [Epic, Feature, "User Story", Task]
    board_columns:
      story: [New, Ready, "In Progress", Blocked, "In Review", Done]
      task: [To Do, Doing, Review, Done]
    swimlanes: [Expedite, Standard, "Debt / Hardening"]
    capabilities:
      boards: { status: active, service: "Azure Boards" }
      delivery_plans: { status: active, service: "Azure Boards Delivery Plans" }
    prohibited: [repos, pipelines, artifacts, test_plans, wiki]

  github:
    role: primary
    capabilities:
      source_control: { status: active, service: "GitHub Repos" }
      ci_cd: { status: active, service: "GitHub Actions", workflow_count: 153 }
      code_review: { status: active, service: "GitHub PRs" }
      issue_tracking: { status: active, service: "GitHub Issues + Plane" }
      documentation: { status: active, service: "In-repo spec kits" }
      releases: { status: active, service: "GitHub Releases" }
      packages: { status: active, service: "npm (pnpm workspaces)" }
      security: { status: active, service: "Dependabot + CodeQL" }

  azure_runtime:
    role: runtime_platform
    constraint: "Container Apps + PostgreSQL Flexible for ERP + platform services"
    capabilities:
      container_apps: { status: planned, service: "Azure Container Apps" }
      container_registry: { status: planned, service: "Azure Container Registry (ACR)" }
      postgresql_flexible: { status: planned, service: "Azure Database for PostgreSQL Flexible Server" }
      front_door: { status: planned, service: "Azure Front Door Premium" }
      key_vault: { status: planned, service: "Azure Key Vault" }
      managed_identity: { status: planned, service: "Azure Managed Identity (Entra ID)" }
      monitor: { status: planned, service: "Azure Monitor + App Insights + Log Analytics" }
      vnet: { status: planned, service: "Azure Virtual Network" }
      storage: { status: planned, service: "Azure Storage Account" }

  databricks:
    role: data_ai_plane
    constraint: "Analytics, CDP, ML, AI assistants — separate from delivery pipeline"
    NOT_in_delivery_path: true
    capabilities:
      lakehouse: { status: planned, service: "Databricks Lakehouse" }
      unity_catalog: { status: planned, service: "Unity Catalog" }
      ml_serving: { status: planned, service: "Model Serving Endpoints" }

  digitalocean:
    role: current_hosting
    migration_target: azure_runtime
    capabilities:
      compute: { status: active, service: "DO Droplets", ip: "178.128.112.214" }
      apps: { status: active, service: "DO App Platform" }
      dns: { status: active, service: "Cloudflare (delegated)" }
      container_registry: { status: active, service: "DO Container Registry" }

migration_direction: "digitalocean -> azure_runtime (compute + database)"
conflict_resolution: "github_authoritative"
sync_direction: "github -> azure_devops (one-way, never reverse)"

cross_references:
  constitution: "spec/azure-target-state/constitution.md"
  prd: "spec/azure-target-state/prd.md"
  service_matrix: "ssot/azure/service-matrix.yaml"
  dns_plan: "ssot/azure/dns-migration-plan.yaml"
  copilot_spec: "spec/odoo-copilot-azure/"
  mapping: "docs/diagrams/mappings/azure_to_do_supabase_odoo.yaml"
  deploy_matrix: "docs/architecture/DEPLOY_TARGET_MATRIX.md"
