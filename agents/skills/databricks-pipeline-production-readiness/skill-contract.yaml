version: 1
name: databricks-pipeline-production-readiness
status: draft
owner: agents
type: benchmark_skill
family: databricks_production_readiness

purpose: >
  Assess whether a Databricks data pipeline meets production-readiness criteria
  covering ingestion discipline, batch/stream/CDC handling, orchestration,
  troubleshooting, and observability.

triggers:
  - new pipeline deployment to production
  - pipeline promotion from dev/staging to production
  - quarterly pipeline readiness review

inputs:
  - pipeline definition (DLT/Jobs YAML or notebook)
  - target environment
  - data sources
  - SLA requirements

dependencies:
  - agents/knowledge/benchmarks/databricks-production-ready.md
  - docs/architecture/data/ENTERPRISE_DATA_PLATFORM.md

steps:
  - classify pipeline type (batch, streaming, CDC, hybrid)
  - verify Spark Declarative Pipelines or Jobs workflow is codified (not ad-hoc notebook runs)
  - check data quality expectations are defined (constraints, expectations)
  - verify orchestration is through Jobs/Workflows (not manual triggers)
  - confirm observability — event log, metrics, alerting configured
  - check error handling and retry policy
  - verify environment separation (dev/staging/prod)
  - confirm rollback path exists (checkpoint, versioned tables)

outputs:
  - pipeline_type_classification
  - readiness_assessment
  - gap_list
  - remediation_recommendations
  - evidence

guardrails:
  - >
    Databricks "production ready" is a benchmark for production discipline,
    not a blanket trust label. A Databricks capability is production-grade
    in our doctrine only when: release maturity is acceptable (GA or Public
    Preview with stable interface/SLA/support), deployment path is codified,
    observability/evaluation exists, rollback/recovery expectations are defined.
    Beta, Private Preview, and Experimental features must NOT be treated as
    canonical production baseline.
  - never approve pipeline without defined SLA
  - never treat notebook-only execution as production-ready
  - require observability evidence before sign-off
  - require environment separation evidence

evidence:
  format: docs/evidence/{stamp}/databricks/pipeline-readiness/
  required:
    - pipeline definition artifact
    - observability configuration proof
    - environment separation proof
    - SLA definition

evals:
  accuracy: 0.95
  completeness: 0.95
  safety: 0.99
  policy_adherence: 0.99
