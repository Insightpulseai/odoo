# ---------------------------------------------------------------------------
# 1. Risk Policy Baseline
# Source: Entra ID Protection — configure risk policies (Microsoft Learn)
# Retirement note: Legacy ID Protection risk policies retire 2026-10-01.
#                  All organizations must migrate to Conditional Access-based
#                  equivalents before that date.
# ---------------------------------------------------------------------------
risk_policy_baseline:
  rules:
    - id: RPB-01
      rule: user_risk_and_sign_in_risk_policies_must_be_separate
      rationale: >
        Combining both risk types in one Conditional Access policy is explicitly
        not recommended by Microsoft. Separate policies enable independent tuning
        and rollout sequencing.

    - id: RPB-02
      rule: policies_roll_out_in_report_only_first
      rationale: >
        Report-only mode allows impact assessment before enforcement. All new or
        migrated risk policies must stage in report-only before switching to
        enforce mode.

    - id: RPB-03
      rule: break_glass_accounts_must_be_excluded
      rationale: >
        Emergency access accounts must never be blocked by risk policies to
        preserve recovery access during incidents.

    - id: RPB-04
      rule: service_accounts_should_not_be_primary_identity_pattern
      rationale: >
        Interactive credentials for service accounts are a security anti-pattern.
        Service accounts that cannot be replaced must use named exclusion+monitoring.

    - id: RPB-05
      rule: managed_identities_preferred_for_workloads
      rationale: >
        Azure Managed Identities eliminate stored credentials for service-to-service
        flows and are the preferred identity type for all ACA, Functions, and
        Foundry workloads.

  microsoft_recommended_defaults:
    user_risk:
      threshold: high
      control: require_risk_remediation
      notes: >
        At High risk, require the user to perform self-service password reset or
        contact the helpdesk. Do not use MFA-only for user risk — remediation
        clears the risk signal.
    sign_in_risk:
      threshold: medium_or_high
      control: require_mfa
      notes: >
        At Medium or High sign-in risk, require MFA as a session-level gate.
        Separate from user risk policy.

  legacy_retirement:
    deadline: "2026-10-01"
    action: migrate_all_id_protection_risk_policies_to_conditional_access
    status: pending

# ---------------------------------------------------------------------------
# 2. Identity Governance Scope
# Source: Microsoft Entra ID Governance use cases (Microsoft Learn)
# ---------------------------------------------------------------------------
governance_scope:
  core_use_cases:
    - id: GOV-01
      use_case: govern_employee_guest_partner_lifecycle
      description: >
        Joiners/movers/leavers governance: automated provisioning, periodic access
        reviews, and deprovision on offboarding. Covers workforce, guests, and B2B
        partners.

    - id: GOV-02
      use_case: govern_access_to_applications
      description: >
        Entitlement management, role/group assignment to applications,
        access reviews, and auto-removal when conditions expire. Covers both
        Odoo (via Entra SSO) and all enterprise SaaS surfaces.

  out_of_scope_for_this_boundary:
    - customer_tenant_access_mapping
    - odoo_business_authorization_rules
    - enterprise_app_runtime_inventory
    - lakehouse_data_access_governance
