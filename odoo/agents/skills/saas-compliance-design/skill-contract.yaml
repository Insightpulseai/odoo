id: saas-compliance-design
name: SaaS Compliance Design
version: 0.1.0
type: benchmark_skill
classification: encoded_preference
family: azure-saas-mt
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design compliance controls for multi-tenant SaaS, covering data residency,
  GDPR tenant data export/delete, audit logging, SOC2 controls, and tenant
  data classification.

triggers:
  - "SaaS platform handling personal data (GDPR scope)"
  - "SOC2 certification required"
  - "Data residency requirements from tenants"
  - "Compliance audit preparation"

inputs:
  - regulatory_scope: "GDPR, SOC2, PCI-DSS, HIPAA, or local regulations"
  - data_residency_requirements: "Which regions tenant data must stay in"
  - data_classification: "Categories of data processed (PII, financial, health)"
  - audit_requirements: "Retention period, access logging, change tracking"
  - tenant_rights: "Data portability, right to erasure, access requests"

steps:
  - "Map regulatory requirements to technical controls"
  - "Design data residency enforcement via stamp placement and policy"
  - "Implement GDPR data subject rights (export, delete, access)"
  - "Configure audit logging meeting SOC2 requirements"
  - "Design data classification and labeling system"
  - "Build compliance reporting and evidence collection"

outputs:
  - compliance_matrix: "Regulatory requirements mapped to technical controls"
  - residency_design: "Data residency enforcement architecture"
  - dsr_procedures: "Data subject request handling workflows"
  - audit_configuration: "Audit logging and retention design"
  - classification_schema: "Data classification levels and handling rules"
  - evidence_collection: "Automated compliance evidence gathering"

guardrails:
  - "Data must not leave designated region without explicit tenant consent"
  - "GDPR deletion requests must complete within 30 days"
  - "Audit logs must be immutable and retained for minimum compliance period"
  - "Data classification must be applied at creation time, not retroactively"

evidence:
  - "Data residency verified — no cross-region data transfer"
  - "GDPR export produces complete tenant data package"
  - "GDPR deletion verified — zero residual PII"

dependencies:
  - data-isolation-pattern-design
  - tenant-lifecycle-automation
  - saas-observability-design

evals:
  - scenario: "GDPR data export request"
    pass: "Complete data package delivered within 30 days"
  - scenario: "GDPR deletion request"
    pass: "All PII removed, verification query confirms zero residual"
  - scenario: "Data residency audit"
    pass: "All tenant data confirmed within designated region"

benchmark_source: "Azure Policy, Microsoft Purview, Compliance Certifications"
