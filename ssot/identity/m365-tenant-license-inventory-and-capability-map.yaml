version: 1
kind: m365_tenant_license_inventory_and_capability_map
status: canonical
last_updated: "2026-04-19"
verified_against_live_tenant: true
verification_source: Microsoft 365 admin center — Billing → Your products
owner: platform-architecture + identity-ops

doctrine: >
  Licenses are capability entitlements, not decoration. Every active
  SKU in the tenant is evaluated against IPAI's canonical architecture.
  Excess seats are not a problem — they're headroom for governed
  rollout. Missing entitlements (e.g. Fabric paid capacity, Dynamics
  F&O) are surfaced explicitly, not silently assumed.

