name: Sync GitHub Project Templates

on:
  push:
    branches:
      - main
    paths:
      - "odoo/ssot/github/projects/templates/**"
      - "odoo/ssot/github/projects/*.yaml"
      - "odoo/scripts/github/sync_project_template.py"
      - "odoo/scripts/github/validate_project_template_ssot.py"
      - "odoo/.github/workflows/sync-github-project-templates.yml"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-template-ssot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: pip install pyyaml jsonschema
      - name: Validate template SSOT
        run: |
          python odoo/scripts/github/validate_project_template_ssot.py \
            --spec "odoo/ssot/github/projects/templates/*.project.yaml" \
            --schema "odoo/ssot/github/projects/templates/schema.project-template.v1.json" \
            --json-output "odoo/artifacts/github/projects/validation_report.json"

  apply-sync:
    runs-on: ubuntu-latest
    needs: validate-template-ssot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ensure project token is configured
        env:
          GITHUB_PROJECTS_TOKEN: ${{ secrets.GITHUB_PROJECTS_TOKEN }}
        run: |
          if [ -z "${GITHUB_PROJECTS_TOKEN}" ]; then
            echo "Missing secret: GITHUB_PROJECTS_TOKEN"
            exit 1
          fi
      - name: Install sync dependencies
        run: pip install pyyaml
      - name: Apply template sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PROJECTS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p odoo/artifacts/github/projects
          for spec in odoo/ssot/github/projects/templates/*.project.yaml; do
            base=$(basename "$spec" .project.yaml)
            out="odoo/artifacts/github/projects/drift_report_${base}.json"
            python odoo/scripts/github/sync_project_template.py --apply --spec "$spec" --output "$out"
          done
      - name: Upload apply drift reports
        uses: actions/upload-artifact@v4
        with:
          name: github-project-template-apply-drift-reports
          path: odoo/artifacts/github/projects/drift_report_*.json
