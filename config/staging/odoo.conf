[options]
; =============================================================================
; Odoo Staging Environment Configuration
; =============================================================================
; Azure-native Odoo.sh-equivalent staging environment.
; Environment: STAGING
; Database: odoo_staging
; Doctrine: AZURE_ODOOSH_EQUIVALENT.md §4
;
; Staging behavior:
;   - Mail captured (MailHog sink), never delivered externally
;   - Crons gated (created inactive, whitelist-only)
;   - Integrations sandboxed
;   - Data from sanitized production snapshot
; =============================================================================

; Environment label
running_env = staging

; Database
db_host = postgres
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo_staging
dbfilter = ^odoo_staging$

; Addons Path (identical to prod — parity matters)
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/opt/odoo/addons/oca,/opt/odoo/addons/ipai

; Server
http_port = 8069
proxy_mode = True
web.base.url = https://erp-staging.insightpulseai.com
workers = 2
max_cron_threads = 1

; Performance (prod-like but slightly lower limits)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1

; Logging
log_level = info
log_handler = :INFO
logfile = /var/log/odoo/odoo.log

; Security
list_db = False
admin_passwd = False

; Outgoing Mail — MailHog sink (NEVER Zoho in staging)
; All outbound mail is captured and viewable at http://mailhog:8025
; No email is delivered externally from staging.
smtp_server = mailhog
smtp_port = 1025
smtp_ssl = False
smtp_starttls = False
smtp_user = False
smtp_password = False
email_from = staging@insightpulseai.local

; Queue Job Configuration
[queue_job]
channels = root:2,high:1,medium:1,low:1
scheme = http
host = localhost
port = 8069
