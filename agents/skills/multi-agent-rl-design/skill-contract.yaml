id: multi-agent-rl-design
version: 1
status: active
classification: capability_uplift
owner: policy-optimization-engineer
benchmark_source: "HF Deep RL Course — Multi-Agents and AI vs AI"
implementation_source: "Sample Factory, PettingZoo docs"

purpose: >
  Design multi-agent RL systems where multiple agents learn to coordinate,
  compete, or coexist in a shared environment.

inputs:
  - name: environment
    type: string
    required: true
    description: "PettingZoo or custom multi-agent environment"
  - name: n_agents
    type: integer
    required: true
    description: "Number of agents"
  - name: interaction_type
    type: enum
    values: [cooperative, competitive, mixed]
    required: true

outputs:
  - name: policies
    type: list
    description: "Trained policy per agent (or shared policy)"
  - name: coordination_strategy
    type: text
    description: "How agents coordinate"
  - name: training_curve
    type: list
    description: "Team/individual returns over training"

constraints:
  - "PettingZoo API for standard multi-agent environments"
  - "HF course AI vs AI unit is non-functional — do not depend on it"
  - "Self-play requires careful opponent sampling strategy"
  - "Shared policy only when agents are homogeneous"

paradigms:
  - name: independent_learners
    description: "Each agent has its own policy, trained independently"
    pros: "Simple, scalable"
    cons: "Non-stationary environment from each agent's perspective"
  - name: ctde
    description: "Centralized training with global state, decentralized execution with local obs"
    pros: "Can learn coordination"
    cons: "More complex, requires global state during training"
  - name: self_play
    description: "Agent trains against past versions of itself"
    pros: "Automatically generates curriculum"
    cons: "Can lead to strategy cycling, forgetting"
  - name: shared_policy
    description: "All agents use the same policy network"
    pros: "Parameter efficient"
    cons: "Only works for homogeneous agents"

hyperparameters:
  algorithm:
    default: "PPO (per agent or shared)"
  opponent_sampling:
    description: "For self-play: how to select opponent versions"
    options: ["latest", "uniform_past", "prioritized"]
  communication:
    description: "Whether agents can share information"
    options: ["none", "message_passing", "shared_observation"]
