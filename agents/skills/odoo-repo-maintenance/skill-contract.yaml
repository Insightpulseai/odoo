version: 1
type: governance_skill
family: oca_community_governance
skill:
  name: odoo-repo-maintenance
  status: draft
  owner: odoo-release-manager
  purpose: >
    Validate OCA addon repository conformance — manifest standards, CI
    configuration, pre-commit hooks, README generation.

  triggers:
    - new module added
    - CI failure on OCA repo
    - maintainer review
    - pre-commit update

  inputs:
    - module path or repo path
    - manifest file (__manifest__.py)
    - pre-commit configuration
    - CI configuration

  steps:
    - check manifest against OCA standards (development_status, license, version)
    - verify pre-commit hooks configured
    - check README generated via oca-gen-addon-readme
    - verify CI passes
    - check .gitmodules pins are current (not >30 days stale)

  outputs:
    - conformance_report
    - violation_list
    - recommended_fixes
    - ci_status

  guardrails:
    - never modify OCA source directly
    - flag modules below Stable maturity for production
    - require test install evidence

  evidence:
    required: true
    format: "docs/evidence/{stamp}/oca-governance/odoo-repo-maintenance/"

  evals:
    dimensions: [accuracy, completeness, safety, policy_adherence, evidence_quality]
    thresholds:
      accuracy: 0.95
      safety: 0.99

cross_references:
  - agents/knowledge/benchmarks/oca-community-governance.md
  - agent-platform/ssot/learning/oca_skill_persona_map.yaml
