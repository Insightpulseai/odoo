# agent-factory-lifecycle.yaml
# SSOT: Universal agent lifecycle — applies to every agent without exception.
# No agent is special. No surface bypasses gates. No trace, no promotion.
# Last updated: 2026-04-06
#
# Companion files:
#   ssot/agents/certification-agent-architecture.yaml (team structure)
#   ssot/agents/assistant_surfaces.yaml (Pulser product surfaces)
#   ssot/agents/judge-rubrics.yaml (judge validation criteria)
#   ssot/agents/knowledge-bindings.yaml (KB collections)
#   docs/architecture/AGENT_FACTORY_DOCTRINE.md (doctrine reference)

version: 1
artifact: agent_factory_lifecycle

# ---------------------------------------------------------------------------
# Core principle
# ---------------------------------------------------------------------------

doctrine: >
  Every agent is a product artifact with the same lifecycle: design, build,
  bind knowledge, evaluate, trace, safety-check, publish, monitor, promote.
  Different agent types (prompt, workflow, hosted) are different implementations,
  not different governance rules. Pulser surfaces are product shells, not
  lifecycle exceptions. Makers, judges, and surface backends all pass the
  same factory gates.

# ---------------------------------------------------------------------------
# Stages
# ---------------------------------------------------------------------------

stages:
  - id: draft
    description: Agent contract exists. Design and initial implementation in progress.
    environment: local / dev only
  - id: internal
    description: Agent runs in internal environment. KB bound. Initial evals pass.
    environment: dev / internal test
  - id: staging
    description: Agent passes full eval suite, judge review, and safety checks.
    environment: staging
  - id: production
    description: Agent is monitored, traced, and serving real users.
    environment: production
  - id: retired
    description: Agent is decommissioned. Traces and records retained per policy.
    environment: none (archived)

# ---------------------------------------------------------------------------
# Required artifacts per agent
# ---------------------------------------------------------------------------

required_artifacts:
  contract:
    description: Agent identity, ownership, type, scope, and constraints
    fields:
      - agent_id
      - owner_domain
      - agent_type          # prompt | workflow | hosted
      - allowed_tools
      - allowed_kb_collections
      - judge_path
      - eval_suite_ref
      - trace_destination
      - promotion_stage
      - rollback_owner
    note: >
      agent_type determines implementation approach:
      - prompt: config-driven, single-turn or few-turn, grounded by KB
      - workflow: multi-step orchestration, approval gates, branching, A2A
      - hosted: long-running, stateful, custom runtime (e.g. ACA sidecar)

  knowledge_binding:
    description: Governed KB connection with approved corpus, metadata, freshness
    required_for: all retrieval-capable agents
    standard_ref: ssot/agents/knowledge-bindings.yaml
    foundry_primitive: Foundry IQ + MCP
    requirements:
      - approved_source_set
      - chunking_standard       # 500-1000 tokens, 50 overlap
      - metadata_standard       # cert_id, domain, skill_area, last_updated, source_type
      - freshness_cadence       # quarterly minimum
      - retrieval_eval_before_promotion

  eval_suite:
    description: Reproducible evaluation pack with defined thresholds
    standard_ref: ssot/agents/judge-rubrics.yaml
    foundry_primitive: Foundry evaluators

  judge_path:
    description: Which judge agents must approve before promotion
    standard_ref: ssot/agents/certification-agent-architecture.yaml

  tracing_config:
    description: Runtime trace emission configuration
    foundry_primitive: Foundry tracing + Application Insights
    captures:
      - inputs_and_outputs
      - tool_usage
      - retries
      - latencies
      - costs
      - exceptions
      - retrieval_operations

  monitoring_config:
    description: Production health, latency, failure, and cost dashboards
    foundry_primitive: Monitor AI apps + Azure Monitor
    requirements:
      - health_endpoint
      - latency_p50_p95_p99
      - failure_rate
      - cost_per_interaction
      - alert_rules

  promotion_record:
    description: Explicit record of promotion decision with approver and evidence
    fields:
      - from_stage
      - to_stage
      - approved_by          # judge agent ID or human
      - eval_results_ref
      - trace_evidence_ref
      - timestamp
      - rollback_path

  fine_tuning_record:
    description: >
      Late-stage optimization record. Only created when baseline eval fails
      for a stable behavioral pattern that prompts/retrieval/workflow did not fix.
    required_for: agents entering G9_fine_tuning gate
    fields:
      - agent_id
      - failure_pattern           # documented behavioral failure
      - remediation_attempts      # what was tried before fine-tuning
      - base_model                # gpt-4.1, gpt-4.1-mini, gpt-4.1-nano, o4-mini
      - technique                 # sft (default), dpo, rft
      - technique_justification   # why this technique was chosen
      - training_dataset_ref      # pointer to curated dataset
      - dataset_size              # 50-100 pilot, 500+ production
      - pre_tune_eval_results     # baseline scores before tuning
      - post_tune_eval_results    # scores after tuning
      - improvement_delta         # quantified improvement
      - judge_review_ref          # G7 judge approval of tuned model
      - tracing_attached          # bool — traces enabled on tuned deployment
      - monitoring_attached       # bool — dashboards on tuned deployment
      - rollback_path             # untuned model deployment name
      - hosting_mode              # serverless (default) | managed-compute

# ---------------------------------------------------------------------------
# Gate definitions
# ---------------------------------------------------------------------------

gates:

  G1_identity:
    name: Identity
    required_artifact: contract
    foundry_primitive: Agent Service type + registry
    pass_condition: >
      Agent has owner, type, tools allowlist, KB scope, judge path.

  G2_knowledge:
    name: Knowledge
    required_artifact: knowledge_binding
    foundry_primitive: Foundry IQ + MCP
    pass_condition: >
      Approved corpus bound. Metadata present. Freshness policy defined.
      Retrieval evaluation passes before promotion.
    applies_to: retrieval-capable agents

  G3_evaluation:
    name: Evaluation
    required_artifact: eval_suite
    foundry_primitive: Foundry evaluators
    pass_condition: >
      All common evaluators pass at defined thresholds.
      Retrieval evaluators pass for retrieval-heavy agents.

  G4_safety:
    name: Safety
    required_artifact: safety_pack
    foundry_primitive: Content Safety + red-team scenarios
    pass_condition: >
      Content-safety policy applied. Tool allowlist enforced. KB scope
      enforced. Secret-handling validated. Prompt-defense / misuse cases
      tested. Red-team scenarios for harmful/unsafe outputs completed.

  G5_observability:
    name: Observability
    required_artifact: tracing_config
    foundry_primitive: Foundry tracing + Application Insights
    pass_condition: >
      Traces visible for runs and failures. Inputs, outputs, tool usage,
      retries, latencies, costs, exceptions, and retrieval operations captured.

  G6_monitoring:
    name: Monitoring
    required_artifact: monitoring_config
    foundry_primitive: Monitor AI apps + Azure Monitor
    pass_condition: >
      Health, latency, failures, and cost visible in dashboards.
      Alert rules configured.

  G7_judge_review:
    name: Judge Review
    required_artifact: rubric_result
    foundry_primitive: judge agents (certification-mapped)
    pass_condition: >
      Domain judge(s) and business judge(s) approve per rubric thresholds.
      All judges on the agent's judge_path must pass.

  G8_promotion:
    name: Promotion
    required_artifact: promotion_record
    foundry_primitive: release / promotion policy
    pass_condition: >
      Explicit promotion to next environment with approver, evidence,
      and rollback path recorded.

  G9_fine_tuning:
    name: Fine-Tuning (late-stage, conditional)
    required_artifact: fine_tuning_record
    foundry_primitive: Azure OpenAI fine-tuning (serverless)
    pass_condition: >
      May only be entered when baseline evals (G3) fail for a stable,
      repeatable behavioral pattern that prompts, retrieval, workflow,
      and tool changes did not fix. Not a default step — most agents
      never need this gate.
    prerequisite_gates: [G3_evaluation, G7_judge_review]
    applies_to: agents with documented behavioral failure pattern

# ---------------------------------------------------------------------------
# Stage transitions
# ---------------------------------------------------------------------------

transitions:

  draft_to_internal:
    required_gates: [G1_identity]
    recommended_gates: [G2_knowledge]
    pass_condition: >
      Contract present. Tool allowlist defined. KB binding present
      (required for retrieval agents, recommended for all).

  internal_to_staging:
    required_gates: [G1_identity, G2_knowledge, G3_evaluation, G4_safety, G5_observability, G7_judge_review]
    pass_condition: >
      All common evaluators pass. Traces visible. Safety pack passes.
      At least one domain judge and one business judge approve.
      No unrestricted tools. KB provenance attached.

  staging_to_production:
    required_gates: [G1_identity, G2_knowledge, G3_evaluation, G4_safety, G5_observability, G6_monitoring, G7_judge_review, G8_promotion]
    pass_condition: >
      All gates pass. Monitoring attached. Rollback path defined.
      Promotion explicitly approved and recorded.

  production_to_retired:
    required: >
      Retirement record with reason, successor (if any), trace retention
      period, and data cleanup plan.

# ---------------------------------------------------------------------------
# Common evaluators (all agents)
# ---------------------------------------------------------------------------

common_evaluators:
  - id: task_completion
    description: Did the agent complete the requested task?
    foundry_evaluator: TaskCompletionEvaluator
    threshold: 0.8

  - id: task_adherence
    description: Did the agent stay within its defined scope and constraints?
    foundry_evaluator: TaskAdherenceEvaluator
    threshold: 0.9

  - id: task_navigation_efficiency
    description: Did the agent reach the answer efficiently (minimal unnecessary steps)?
    foundry_evaluator: NavigationEfficiencyEvaluator
    threshold: 0.7

  - id: intent_resolution
    description: Did the agent correctly resolve the user's intent?
    foundry_evaluator: IntentResolutionEvaluator
    threshold: 0.85

  - id: tool_call_accuracy
    description: Did the agent invoke the correct tools with correct parameters?
    foundry_evaluator: ToolCallAccuracyEvaluator
    threshold: 0.85
    applies_to: agents with tool definitions

# ---------------------------------------------------------------------------
# Retrieval evaluators (retrieval-capable agents only)
# ---------------------------------------------------------------------------

retrieval_evaluators:
  - id: groundedness
    description: Are agent responses grounded in the provided KB content?
    foundry_evaluator: GroundednessEvaluator
    threshold: 0.60    # Adjusted from 0.85: GPT-4.1 judge (1-10→0-1) grades 6-7/10 for helpful copilot augmentation; 0.60=avg 6.4/10 gates fabrication

  - id: relevance
    description: Is the retrieved content relevant to the query?
    foundry_evaluator: RelevanceEvaluator
    threshold: 0.8

# ---------------------------------------------------------------------------
# Invariant policies
# ---------------------------------------------------------------------------

policies:
  no_trace_no_promotion: true
  no_kb_no_retrieval_agent: true
  no_judge_pass_no_prod: true
  no_monitoring_no_prod: true
  no_rollback_no_prod: true
  no_eval_no_staging: true
  no_safety_no_staging: true
  no_fine_tune_without_baseline_eval: true
  no_fine_tune_without_behavioral_failure: true

# ---------------------------------------------------------------------------
# Agent types (implementation, not governance)
# ---------------------------------------------------------------------------

agent_types:
  prompt:
    description: Config-driven. Single-turn or few-turn. Grounded by KB.
    foundry_primitive: Foundry Agent Service (prompt agent)
    governance: same as all agents
    typical_use: advisory queries, informational retrieval, simple actions

  workflow:
    description: Multi-step orchestration. Approval gates. Branching. A2A coordination.
    foundry_primitive: Foundry Agent Service (workflow agent)
    governance: same as all agents
    typical_use: >
      Maker-checker loops, sequential build pipelines, concurrent judge panels,
      human-in-the-loop approvals, cross-surface handoffs.

  hosted:
    description: Long-running. Stateful. Custom runtime (ACA sidecar, Function, etc).
    foundry_primitive: Custom hosting + Foundry tracing
    governance: same as all agents
    typical_use: >
      Background jobs, continuous monitoring, event-driven processing,
      long-running data pipelines.

# ---------------------------------------------------------------------------
# Scope
# ---------------------------------------------------------------------------

applies_to:
  - all 6 primary maker agents
  - all 6 judge agents
  - all Pulser surface backends (pulser-erp, pulser-diva, pulser-docs, pulser-genie, pulser-studio, ask-pulser)
  - all domain skills (tax-guru-ph, finance-close, ap-invoice, bank-reconciliation, expense-liquidation)
  - all future agents regardless of type, domain, or persona

exceptions: none

