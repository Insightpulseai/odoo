# Knowledge Base Registry — All KBs in the IPAI Agent Platform
# Single source of truth for what knowledge is indexed and where.

name: ipai-knowledge-registry
description: Central registry of all knowledge bases powering IPAI agent skills

knowledge_bases:
  # 1. Odoo 18 Documentation
  - name: odoo18-docs
    description: Odoo 18 official documentation (RST)
    status: active
    index_name: odoo18-docs
    source_contract: agents/knowledge/odoo18_docs/source.yaml
    chunking_contract: agents/knowledge/odoo18_docs/chunking.yaml
    indexing_contract: agents/knowledge/odoo18_docs/indexing.yaml
    skill: agents/skills/odoo_docs_rag/skill.yaml
    service: apps/odoo-docs-kb/service.py
    loader: packages/odoo-docs-kb/loader.py
    chunker: packages/odoo-docs-kb/chunker.py  # RST heading-aware
    refresh_workflow: .github/workflows/odoo-docs-kb-refresh.yml
    source_type: git-repo
    source_repo: odoo/documentation
    source_branch: "19.0"
    stats:
      files: 1106
      chunks: 7224
      avg_chunks_per_file: 6.5
    embedding:
      model: text-embedding-ada-002
      dimensions: 1536
    runtime:
      service_app:
        status: exists
        path: apps/odoo-docs-kb/service.py
      search_index:
        status: missing
      ingestion_last_run: null
      retrieval_smoke_test: not_run

  # 2. Azure Platform Documentation
  - name: azure-platform
    description: Azure platform docs (Container Apps, Front Door, AI Search, OpenAI, PostgreSQL, Key Vault, Entra ID, Foundry, DevOps)
    status: scaffold
    index_name: azure-platform-docs
    source_contract: agents/knowledge/azure_platform/source.yaml
    chunking_contract: agents/knowledge/azure_platform/chunking.yaml
    indexing_contract: agents/knowledge/azure_platform/indexing.yaml
    skill: agents/skills/azure_platform/skill.yaml
    loader: packages/odoo-docs-kb/web_loader.py
    chunker: packages/odoo-docs-kb/md_chunker.py  # Markdown heading-aware
    source_type: web-crawl
    source_domains:
      - learn.microsoft.com
      - azure.microsoft.com
    service_scope:
      - container-apps
      - frontdoor
      - search
      - ai-services/openai
      - postgresql/flexible-server
      - key-vault
      - entra
      - foundry
      - devops/repos
    foundry:
      description: >
        Microsoft Foundry coverage — explicit subdomain tracking for the unified AI platform.
        Coverage contract defined in foundry_coverage_matrix.yaml.
      coverage_contract: agents/knowledge/azure_platform/foundry_coverage_matrix.yaml
      coverage_buckets:
        - get-started           # Project creation, portal, quickstarts
        - agent-service         # Agent deployment, tools, sharing, multi-agent
        - models                # Model catalog, deployment, inference
        - guardrails            # Content filters, safety, tool governance
        - responsible-ai        # RAI constraints, limited access, transparency
        - api-sdk               # azure-ai-projects SDK, REST API, client patterns
        - evaluation-tracing    # Evaluation, tracing, continuous monitoring
        - developer-experience  # VS Code, playgrounds, hosted agents
        - security-governance   # RBAC, networking, identity, data protection
        - operations            # Quotas, regions, support, operate
        - architecture          # Hub/project topology, resource providers
        - migration             # Azure AI Studio to Foundry migration
    embedding:
      model: text-embedding-ada-002
      dimensions: 1536
    runtime:
      service_app:
        status: missing
      search_index:
        status: missing
      ingestion_last_run: null
      retrieval_smoke_test: not_run

