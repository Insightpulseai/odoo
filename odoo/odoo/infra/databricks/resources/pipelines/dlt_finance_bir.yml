# DLT Pipeline: Finance & BIR Compliance
# Bronze (CDC/Iceberg) → Silver (cleaned) → Gold (compliance marts)
# Source: Odoo PG → Supabase ETL → Iceberg → ADLS Bronze
# Workspace: https://adb-7405610347978231.11.azuredatabricks.net

resources:
  pipelines:
    finance_bir_pipeline:
      name: "Finance & BIR Compliance"
      target: "${var.schema_gold}"
      catalog: "${var.catalog}"
      development: true  # false in prod
      continuous: false
      channel: "PREVIEW"
      photon: true

      clusters:
        - label: "default"
          autoscale:
            min_workers: 1
            max_workers: 4
            mode: "ENHANCED"

      libraries:
        - notebook:
            path: ../../dlt/finance_bir_pipeline.sql

      configuration:
        "spark.databricks.delta.preview.enabled": "true"
        "bronze_path": "${var.bronze_storage_path}/odoo_finance"

      notifications:
        - email_recipients:
            - platform-alerts@insightpulseai.com
          alerts:
            - on_failure
            - on_flow_failure
