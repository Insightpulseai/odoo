version: 1
namespace: ipai.ops_platform.database.naming.v1
artifact_type: policy
repo_key: ops_platform
domain: database
subject: naming

servers:
  dev: ipai-odoo-dev-pg
  staging: ipai-odoo-staging-pg
  prod: ipai-odoo-prod-pg

databases:
  dev: odoo_dev
  staging: odoo_staging
  prod: odoo

forbidden_names:
  - odoo_prod

rules:
  server_name_may_contain_prod: true
  database_name_for_prod_must_be_odoo: true
  database_name_must_never_be_odoo_prod: true
  test_databases_use_pattern: "test_<module_name>"
  test_databases_are_disposable: true
  auxiliary_demo_db_name: odoo_dev_demo
  auxiliary_demo_is_not_environment: true
