# Databricks RAG — Agent Skill Definition

name: databricks_rag
description: Retrieval-augmented generation over Databricks documentation — CLI, data engineering, apps, Azure integration, and industry solutions
version: "1.0"

service:
  app: apps/databricks-kb
  entrypoint: service.py
  runtime: azure-container-apps
  health_check: /health

tools:
  - name: search_databricks_docs
    description: >
      Search Databricks documentation and product pages.
      Returns ranked chunks with citation metadata.
    parameters:
      query:
        type: string
        required: true
        description: Natural language search query
      domain:
        type: string
        required: false
        description: >
          Filter to domain: "developer", "data-engineering", "apps",
          "azure-integration", "industry-solutions"
      top_k:
        type: integer
        default: 8
        description: Number of results (max 20)
    returns:
      type: array
      items:
        chunk_id: string
        content: string
        path: string
        heading_chain: string
        domain: string
        score: float
        citation: string

  - name: answer_databricks_question
    description: >
      Answer a question about Databricks using grounded retrieval.
      Returns an answer with source citations.
    parameters:
      query:
        type: string
        required: true
      domain:
        type: string
        required: false
    returns:
      answer: string
      citations:
        type: array
        items:
          chunk_id: string
          path: string
          heading_chain: string
          relevance: float

  - name: search_databricks_cli
    description: >
      Search Databricks CLI commands and tutorials.
    parameters:
      query:
        type: string
        required: true
        description: CLI command or action to search for
      top_k:
        type: integer
        default: 5
    returns:
      type: array
      items:
        chunk_id: string
        content: string
        path: string
        heading_chain: string
        score: float

  - name: search_industry_solution
    description: >
      Search Databricks industry-specific solutions and use cases.
    parameters:
      industry:
        type: string
        required: true
        description: >
          Industry: "financial-services", "marketing", "retail", "media-entertainment"
      query:
        type: string
        required: true
        description: Business question or use case
      top_k:
        type: integer
        default: 5
    returns:
      type: array
      items:
        chunk_id: string
        content: string
        path: string
        heading_chain: string
        industry: string
        score: float

  - name: get_data_engineering_pattern
    description: >
      Get data engineering patterns and best practices from Databricks.
      Covers Spark, Delta Lake, workflows, pipelines, streaming.
    parameters:
      topic:
        type: string
        required: true
        description: >
          Topic: "spark", "delta-lake", "workflows", "pipelines",
          "streaming", "etl", "lakehouse"
      query:
        type: string
        required: true
    returns:
      answer: string
      citations:
        type: array

knowledge_source: agents/knowledge/databricks/source.yaml
chunking_config: agents/knowledge/databricks/chunking.yaml
indexing_config: agents/knowledge/databricks/indexing.yaml
