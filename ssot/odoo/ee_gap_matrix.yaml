metadata:
  platform: ipai
  workload: odoo_ce_plus_oca_on_azure
  intent: >
    Functional gap ledger for Odoo CE + OCA, separating what is covered by OCA,
    what requires Azure-native bridges, and what still needs custom or third-party handling.
  decision_policy:
    - Prefer OCA for application-layer parity.
    - Prefer Azure bridges for platform/system capabilities.
    - Do not force Azure services to impersonate missing Odoo business modules.
    - Mark unsupported or unverified areas as evidence_missing.

