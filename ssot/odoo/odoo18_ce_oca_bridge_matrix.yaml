priorities:
  p0_accept_as_done:
    - base_admin_ux_controls
    - finance
    - sales
    - purchase
    - projects_timesheets
  p1_small_cleanup:
    - evaluate_hr_timesheet_begin_end
    - decide_ai_oca_bridge_chatter
  p2_bridge_program:
    - ai_copilot
    - finance.bridge_next
    - projects_timesheets.bridge_next
    - productivity_customization_platform.bridge_next
  p3_backlog_program:
    - website
    - inventory_supply_chain_advanced
    - hr
    - marketing
    - productivity_customization_platform.backlog_later

acceptance_position:
  statement: "Core ERP baseline is deployed on Odoo 18 CE + OCA; next major work is bridge-layer expansion, not baseline OCA recovery."
