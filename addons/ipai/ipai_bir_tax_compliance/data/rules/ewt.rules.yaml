    output_bucket: EWT_TOTAL

    notes: "Total creditable expanded withholding tax"

# Legacy code mapping for backward compatibility
legacy_code_map:
  W010: WI010
  W020: WC020
  W030: WI030
  W040: WI040
  W157: [WI157, WC157]
  W158: [WI158, WC158]
  W161: WI161
  W169: [WI169, WC169]
  W170: [WI170, WC170]

metadata:
  version: 2.0.0
  effective_from: "2025-01-01"
  atc_namespace_reconciled: "2026-04-01"
  legal_basis:
    - "NIRC Section 57"
    - "RR 2-98 (Consolidated Withholding Tax Regulations)"
    - "RR 11-2018 (TRAIN Law EWT implementation / Updated ATC Master List)"
    - "RR 14-2018 (EWT amendments)"
    - "RMC 25-2011 (Updated ATC Codes)"
  breaking_changes:
    - "ATC codes migrated from short-form (W010, W157, W169) to BIR official format (WI010, WC010, WB010) per RR 11-2018 Annex"
    - "Added WI011 (5% for non-VAT individuals ≤ PHP 3M)"
    - "Separated supplier goods/services codes (WI157/WC157/WI158/WC158)"
    - "Added government procurement codes (WC600/WC610)"
    - "Split rent by payee type: individual (WI169/WI170) and corporate (WC169/WC170)"
    - "Added legacy_code and payee_type fields for all entries"
  notes: |
    EWT rules match transactions to ATC codes and apply creditable withholding rates.
    These amounts are reported on BIR Form 1601-E (Monthly) or 1601-EQ (Quarterly).
    ATC codes use official BIR WI/WC namespace per RR 11-2018.
    Legacy W-series codes accepted for backward compatibility via `in` conditions.
