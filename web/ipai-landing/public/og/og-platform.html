<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>InsightPulseAI - Platform OG Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0F1A;
  }

  .card {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(160deg, #0D0F1A 0%, #151833 35%, #1A1440 65%, #12102B 100%);
  }

  /* Top border accent */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6366F1 0%, #8B5CF6 40%, #A78BFA 70%, transparent 100%);
  }

  /* Dashboard panels on right side */
  .dashboard {
    position: absolute;
    right: 50px;
    top: 80px;
    width: 460px;
    height: 470px;
    z-index: 1;
    perspective: 800px;
  }

  .panel {
    position: absolute;
    border: 1px solid rgba(139, 92, 246, 0.15);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(1px);
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 32px;
    background: rgba(139, 92, 246, 0.06);
    border-bottom: 1px solid rgba(139, 92, 246, 0.08);
  }

  /* Panel title dots */
  .panel::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 12px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(139, 92, 246, 0.3);
    box-shadow: 14px 0 0 rgba(99, 102, 241, 0.2), 28px 0 0 rgba(99, 102, 241, 0.12);
  }

  .panel-1 {
    top: 0;
    left: 40px;
    width: 280px;
    height: 200px;
    transform: rotateY(-2deg);
  }

  .panel-2 {
    top: 30px;
    left: 180px;
    width: 260px;
    height: 240px;
    border-color: rgba(99, 102, 241, 0.2);
    z-index: 2;
  }

  .panel-3 {
    top: 220px;
    left: 20px;
    width: 240px;
    height: 180px;
    transform: rotateY(-1deg);
  }

  .panel-4 {
    top: 290px;
    left: 160px;
    width: 280px;
    height: 160px;
    border-color: rgba(167, 139, 250, 0.18);
    z-index: 3;
  }

  /* Panel content elements */
  .panel-bar {
    position: absolute;
    bottom: 16px;
    left: 14px;
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }

  .bar {
    width: 18px;
    border-radius: 3px 3px 0 0;
    background: linear-gradient(180deg, rgba(99, 102, 241, 0.4), rgba(99, 102, 241, 0.12));
  }

  .panel-lines {
    position: absolute;
    top: 46px;
    left: 14px;
    right: 14px;
  }

  .p-line {
    height: 6px;
    border-radius: 3px;
    background: rgba(139, 92, 246, 0.08);
    margin-bottom: 8px;
  }

  .p-line.short { width: 60%; }
  .p-line.med { width: 80%; }
  .p-line.long { width: 95%; }
  .p-line.accent {
    background: rgba(99, 102, 241, 0.18);
  }

  /* Panel metric */
  .panel-metric {
    position: absolute;
    top: 48px;
    left: 14px;
    font-size: 28px;
    font-weight: 800;
    color: rgba(167, 139, 250, 0.5);
    letter-spacing: -0.02em;
  }

  .panel-metric-label {
    position: absolute;
    top: 82px;
    left: 14px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(139, 92, 246, 0.3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Subtle glow */
  .glow-purple {
    position: absolute;
    right: 160px;
    top: 200px;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 65%);
    z-index: 0;
  }

  /* Content */
  .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 64px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 5;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .wordmark-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wordmark-icon::after {
    content: '';
    width: 14px;
    height: 14px;
    border: 2.5px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
  }

  .wordmark-text {
    font-size: 22px;
    font-weight: 700;
    color: #E0E0F0;
    letter-spacing: -0.02em;
  }

  .wordmark-text span {
    color: #A78BFA;
  }

  .headline-block {
    max-width: 560px;
  }

  .headline {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.12;
    color: #FFFFFF;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  .headline .accent {
    background: linear-gradient(135deg, #A78BFA, #6366F1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 6px;
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.15);
    font-size: 14px;
    font-weight: 600;
    color: #A78BFA;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .domain {
    font-size: 15px;
    font-weight: 500;
    color: #3D3A5C;
    letter-spacing: 0.02em;
  }

  /* Workflow steps between panels */
  .workflow-connector {
    position: absolute;
    z-index: 1;
  }

  .connector-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(99, 102, 241, 0.35);
    position: absolute;
  }

  .connector-line {
    position: absolute;
    background: rgba(99, 102, 241, 0.1);
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-line"></div>
  <div class="glow-purple"></div>

  <!-- Dashboard panels -->
  <div class="dashboard">
    <!-- Panel 1: Chart panel -->
    <div class="panel panel-1">
      <div class="panel-bar">
        <div class="bar" style="height: 40px;"></div>
        <div class="bar" style="height: 65px;"></div>
        <div class="bar" style="height: 50px;"></div>
        <div class="bar" style="height: 80px;"></div>
        <div class="bar" style="height: 55px;"></div>
        <div class="bar" style="height: 90px;"></div>
        <div class="bar" style="height: 72px;"></div>
        <div class="bar" style="height: 95px;"></div>
        <div class="bar" style="height: 60px;"></div>
      </div>
    </div>

    <!-- Panel 2: Metrics panel -->
    <div class="panel panel-2">
      <div class="panel-metric">98.7%</div>
      <div class="panel-metric-label">Uptime score</div>
      <div class="panel-lines" style="top: 110px;">
        <div class="p-line long accent"></div>
        <div class="p-line med"></div>
        <div class="p-line short"></div>
        <div class="p-line long"></div>
        <div class="p-line med accent"></div>
        <div class="p-line short"></div>
      </div>
    </div>

    <!-- Panel 3: List panel -->
    <div class="panel panel-3">
      <div class="panel-lines">
        <div class="p-line long"></div>
        <div class="p-line med accent"></div>
        <div class="p-line long"></div>
        <div class="p-line short"></div>
        <div class="p-line med"></div>
        <div class="p-line long accent"></div>
        <div class="p-line short"></div>
        <div class="p-line med"></div>
      </div>
    </div>

    <!-- Panel 4: Wide analytics panel -->
    <div class="panel panel-4">
      <div class="panel-lines">
        <div class="p-line long accent"></div>
        <div class="p-line short"></div>
        <div class="p-line med"></div>
        <div class="p-line long"></div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="wordmark">
      <div class="wordmark-icon"></div>
      <div class="wordmark-text">InsightPulse<span>AI</span></div>
    </div>

    <div class="headline-block">
      <h1 class="headline">Run Odoo in the Cloud<br>with <span class="accent">Practical AI</span></h1>
      <div class="sub-label">Odoo on Cloud</div>
    </div>

    <div class="bottom-bar">
      <div class="domain">insightpulseai.com</div>
    </div>
  </div>
</div>
</body>
</html>
