corporate_brand: InsightPulseAI
assistant_family_brand:
  canonical: Pulser
  tagline: "Intelligent Assistant"
  derivation: "InsightPulseAI → Pulse → Pulser"
  deprecated_spellings:
    - Pulsar

products:
  core:
    canonical_name: Pulser
    ui_label: Pulser
    compact_label: Pulser
    platform_explicit: Pulser for Odoo
    legacy_aliases:
      - Odoo Copilot
      - Copilot
    status: active

  diva:
    canonical_name: Pulser Diva
    ui_label: Diva
    compact_label: Diva
    legacy_aliases:
      - DIVA Copilot
      - Diva Copilot
    status: active

  studio:
    canonical_name: Pulser Studio
    ui_label: Studio
    compact_label: Studio
    legacy_aliases:
      - W9 Studio Copilot
      - W9 Studio
      - Studio Copilot
    status: active

  genie:
    canonical_name: Pulser Genie
    ui_label: Genie
    compact_label: Genie
    legacy_aliases: []
    status: active

  docs:
    canonical_name: Pulser Docs
    ui_label: Docs
    compact_label: Docs
