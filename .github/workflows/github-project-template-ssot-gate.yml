name: GitHub Project Template SSOT Gate

on:
  pull_request:
    paths:
      - "odoo/ssot/github/projects/templates/**"
      - "odoo/ssot/github/projects/*.yaml"
      - "odoo/scripts/github/sync_project_template.py"
      - "odoo/scripts/github/validate_project_template_ssot.py"
      - "odoo/.github/workflows/github-project-template-ssot-gate.yml"

permissions:
  contents: read

jobs:
  validate-template-ssot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: pip install pyyaml jsonschema
      - name: Validate template SSOT
        run: |
          python odoo/scripts/github/validate_project_template_ssot.py \
            --spec "odoo/ssot/github/projects/templates/*.project.yaml" \
            --schema "odoo/ssot/github/projects/templates/schema.project-template.v1.json" \
            --json-output "odoo/artifacts/github/projects/validation_report.json"
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: github-project-template-validation-report
          path: odoo/artifacts/github/projects/validation_report.json

  dry-run-sync:
    runs-on: ubuntu-latest
    needs: validate-template-ssot
    if: ${{ secrets.GITHUB_PROJECTS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install sync dependencies
        run: pip install pyyaml
      - name: Dry-run template sync for changed templates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PROJECTS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p odoo/artifacts/github/projects
          base_ref="${{ github.event.pull_request.base.sha }}"
          head_ref="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base_ref" "$head_ref" | grep '^odoo/ssot/github/projects/templates/.*\.project\.yaml$' || true)
          if [ -z "$changed" ]; then
            changed="odoo/ssot/github/projects/templates/finops_month_end.project.yaml"
          fi

          i=0
          for spec in $changed; do
            i=$((i+1))
            out="odoo/artifacts/github/projects/drift_report_${i}.json"
            python odoo/scripts/github/sync_project_template.py --dry-run --spec "$spec" --output "$out"
          done
      - name: Upload drift reports
        uses: actions/upload-artifact@v4
        with:
          name: github-project-template-drift-reports
          path: odoo/artifacts/github/projects/drift_report_*.json
