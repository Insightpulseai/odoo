version: 1
namespace: ipai.ops_platform.openai.project_model.v1
artifact_type: policy
repo_key: ops_platform
domain: openai
subject: project_model

# ============================================================================
# OPENAI ACADEMY PROJECT MODEL
# ============================================================================
# Projects = shared workspaces with context, files, instructions, collaborators.
# The factory emits a project/workspace as Layer 1 output.
# Source: OpenAI Academy Projects concept
# ============================================================================

project_schema:
  required_fields:
    - project_id
    - title
    - description
    - owner
    - collaborators
    - context_files
    - instructions
    - status

  statuses:
    - draft
    - active
    - review
    - archived

  context_types:
    - spec_bundle
    - skill_pack
    - knowledge_base_ref
    - upstream_template_ref
    - eval_dataset_ref
    - constitution_ref

rules:
  every_factory_output_must_create_project: true
  project_must_have_owner: true
  project_must_have_instructions: true
  project_context_must_be_machine_readable: true
  project_files_must_reference_ssot_paths: true

factory_output_layer_1:
  name: work_container
  inspired_by: openai_academy_projects
  produces:
    - project_workspace
    - shared_context
    - instructions
    - collaborator_assignments
    - file_attachments
    - long_running_workstream_state
