# =============================================================================
# Benchmark Registry — External Reference Materials
# =============================================================================
# Catalog of external benchmarks, eBooks, and guidance that reinforce
# (but do not replace) IPAI platform architecture decisions.
#
# Rule: benchmarks are confirmation materials, not implementation workstreams.
# Each entry documents what to borrow and what NOT to borrow.
# =============================================================================

version: 1
owner_repo: platform
updated: "2026-04-04"

# =============================================================================
# Priority 1 — Immediate operational relevance
# =============================================================================

benchmarks:

  - id: prototype-to-production
    name: "Prototype to Production — AgentOps Benchmark"
    source: "Microsoft / Azure AI"
    type: agentops_benchmark
    priority: 1
    relevance: immediate
    description: >
      Production-grade AgentOps benchmark for CI/CD, evaluation, observability,
      and A2A/MCP patterns. Centers on: evaluation as quality gate, automated
      CI/CD, safe rollout, observability, performance/cost/scale, security
      response, multi-agent operations, A2A + MCP working together.
    key_insight: >
      The hard part is not building the agent prototype, but making it safe,
      observable, governed, and deployable in production.
    use_for:
      - evidence_contract_validation        # Validates #672, #674, #675
      - verification_runner_pattern          # prod_verify_playwright.sh
      - agent_platform_production_doctrine
      - rollout_eval_observability_guidance
      - mcp_a2a_registry_design             # Future MCP + A2A integration
    borrow:
      - evaluation_as_gate                   # Maps to eval thresholds in agent manifest
      - safe_rollout_strategies              # Maps to staging → prod pipeline
      - observability_patterns               # Maps to evidence publishing contract
      - multi_agent_coordination             # Maps to Pulser specialist agents
    do_not_borrow:
      - specific_model_choices               # IPAI uses GPT-4.1 per Foundry config
      - infrastructure_hosting_patterns      # IPAI is ACA, not AKS
      - vendor_specific_orchestration        # IPAI has own agent-platform runtime
    repo_fit:
      agent-platform: primary
      platform: supporting
      automations: supporting
      infra: reference_only

  # ===========================================================================
  # Priority 2 — Governance / FinOps reinforcement
  # ===========================================================================

  - id: azure-ai-adoption-ebook
    name: "Azure AI Adoption eBook — FinOps & Governance"
    source: "Microsoft Azure"
    type: governance_benchmark
    priority: 2
    relevance: governance_reinforcement
    description: >
      Three-phase AI governance model: (1) Establish AI foundation,
      (2) Build GenAI solutions efficiently, (3) Manage AI investments.
      Adds operating guidance: business case first, FinOps discipline,
      governance policies, quantify business value, monitor + optimize.
    use_for:
      - finops_governance_runbooks
      - business_case_structure
      - ai_investment_justification
      - commercial_strategy_for_pulser_taxpulse
    borrow:
      - three_phase_governance_model
      - business_case_methodology
      - finops_discipline_framework
      - continuous_optimization_cycle
    do_not_borrow:
      - azure_specific_pricing_models        # IPAI has own cost structure
      - org_change_management_advice         # Solo builder, not enterprise org
    repo_fit:
      platform: primary
      docs: supporting

  - id: azure-ai-finops-infographic
    name: "Azure AI FinOps Infographic — Governance One-Pager"
    source: "Microsoft Azure"
    type: governance_benchmark
    priority: 2
    relevance: governance_reinforcement
    description: >
      One-page summary tying FinOps to Azure AI Foundry: governance,
      evaluation, quota/cost management, safe rollout, monitoring,
      GenAIOps cycle. Cleaner visual of the same three-phase model.
    use_for:
      - adaptation_map_governance_section
      - pulser_taxpulse_cost_governance
      - genaiops_lifecycle_reference
    borrow:
      - genaiops_cycle_visualization
      - governance_evaluation_quota_pattern
      - safe_rollout_monitoring_loop
    do_not_borrow:
      - azure_portal_specific_workflows
    repo_fit:
      platform: primary

  # ===========================================================================
  # Priority 3 — Data-intelligence benchmark reinforcement
  # ===========================================================================

  - id: databricks-financial-services
    name: "Databricks Financial Services eBook — Data Intelligence Benchmark"
    source: "Databricks"
    type: data_intelligence_benchmark
    priority: 3
    relevance: data_plane_reinforcement
    description: >
      Financial-services data platform benchmark. Three business outcomes:
      driving growth, protecting the firm, driving efficiency. Emphasizes
      unified data + AI, regulatory compliance, fraud/risk analytics,
      agent/model creation at scale in regulated environment.
    key_insight: >
      Concrete outcome examples: faster compliance processes, fraud model
      accuracy, cost reduction, faster analytics. Validates Databricks
      in the governed OLAP / lakehouse lane.
    use_for:
      - data_intelligence_plane_doctrine
      - fraud_risk_finance_analytics_benchmarks
      - databricks_lakehouse_justification
      - regulated_environment_patterns
    borrow:
      - unified_data_ai_framing
      - compliance_analytics_patterns
      - regulated_environment_governance
    do_not_borrow:
      - databricks_as_control_plane          # Databricks = analytics, not operations
      - databricks_as_runtime_authority      # Odoo = operational SoR
      - cloud_provider_specific_infra        # IPAI is Azure-first, not Databricks-hosted
    repo_fit:
      data-intelligence: primary
      platform: reference_only

# =============================================================================
# Cross-reference to existing adaptation map
# =============================================================================

integration:
  adaptation_map: platform/templates/adaptation-map.yaml
  note: >
    Benchmarks complement the adaptation map but do not override it.
    The adaptation map governs template adoption decisions.
    This registry governs benchmark/supporting reference materials.
  governance_section_refs:
    - adaptation_map.microsoft_runtime_guidance.azure_ai_finops_guidance
    - adaptation_map.partner_center

# =============================================================================
# DevOps Architecture Reference (Azure Architecture Center)
# =============================================================================
# Added 2026-04-04 — reinforces existing CI/CD authority split.
# Not a benchmark per se, but a canonical Microsoft reference that validates
# the PR pipeline → CI pipeline → CD pipeline pattern already in use.

devops_references:
  - id: azure-pipelines-baseline
    name: "CI/CD Baseline Architecture with Azure Pipelines"
    source: "Azure Architecture Center"
    docs: "https://learn.microsoft.com/en-us/azure/architecture/example-scenario/apps/devops-dotnet-baseline"
    relevance: validation
    maps_to:
      pr_pipeline: "GitHub Actions CI (lint, typecheck, build)"
      ci_pipeline: ".azuredevops/pipelines/odoo-test.yml (test, evidence)"
      cd_pipeline: "Azure DevOps deploy pipeline (ACA)"
      key_vault: "kv-ipai-dev (managed identity)"
      monitoring: "Evidence publishing contract (partial — App Insights gap)"
    gaps:
      - "Application Insights not yet instrumented on Odoo ACA containers"
      - "Prod release gate (manual intervention step) not yet wired"

  - id: azure-devops-architecture-design
    name: "DevOps Architecture Design (Overview)"
    source: "Azure Architecture Center"
    docs: "https://learn.microsoft.com/en-us/azure/architecture/guide/devops/devops-start-here"
    relevance: validation
    note: >
      Top-level DevOps hub page. Validates Well-Architected alignment
      (Reliability, Security, Cost Optimization, Operational Excellence,
      Performance Efficiency). No new patterns beyond existing setup.
