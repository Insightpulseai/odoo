      short_description: >
        AI operating copilot for Odoo — custom-engine, multi-agent,
        policy-gated enterprise copilot orchestrating finance, project
        management, identity ops, and ERP workflows inside Odoo CE 18.
        Runs on Azure Container Apps + Microsoft Foundry (gpt-4.1)
        + Unity Catalog + Entra ID. Delivered as a SaaS transactable
        marketplace offer.
      main_challenges:
        - foundry_project_provisioning_pending (rg-ipai-dev-ai-sea)
        - azure_front_door_routing_authority_provisioning_pending
        - azure_credit_stacking_conflict_with_existing_sponsorship (see benefits.azure_credit)
        - scim_saml_enterprise_identity_provisioning_pending
      is_transactable: yes_saas_transactable
      approximate_publication: Aug-Sep 2026

  business_summary_template:
    fields_requested:
      - company_overview_size_markets
      - current_offers_and_services
      - typical_customer
      - listings_in_non_microsoft_marketplaces
      - markets_and_countries_today
    ipai_prefilled_answers:
      company_overview: >
        InsightPulseAI (IPAI, legal entity Dataverse IT Consultancy)
        is a Philippines-registered ISV building governed AI copilots
        for ERP and enterprise operations. Currently pre-revenue,
        Microsoft ISV Success-enrolled, Azure-first.
      current_offers:
