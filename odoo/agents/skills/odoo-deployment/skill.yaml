# Odoo Deployment Skill
# Production deployment, scaling, and infrastructure management

name: odoo_deployment
version: 1.0.0
key: odoo.deployment
description: |
  Deploy Odoo CE to production: Docker builds, reverse proxy,
  SSL, database backup, monitoring, and scaling.

intents:
  - deploy odoo
  - odoo production setup
  - odoo docker deploy
  - configure odoo nginx
  - odoo backup strategy
  - scale odoo

guardrails:
  - Self-hosted only (DigitalOcean, no AWS/Azure/GCP managed)
  - File-based secrets (Docker secrets or .env, never in git)
  - Always create database backup before deployment
  - Health check must pass before routing traffic
  - Evidence pack required for every deployment

tools:
  - key: deploy.build
    name: Build Image
    target_model: ipai.deploy.runner
    target_method: build_image
    description: Build Docker image with seeded addons

  - key: deploy.infra
    name: Infrastructure Setup
    target_model: ipai.deploy.runner
    target_method: setup_infra
    description: Configure nginx, SSL, firewall, DNS

  - key: deploy.migrate
    name: Database Migration
    target_model: ipai.deploy.runner
    target_method: run_migration
    description: Run database migrations and module updates

  - key: deploy.release
    name: Release
    target_model: ipai.deploy.runner
    target_method: release
    description: Deploy new version with zero-downtime swap

  - key: deploy.verify
    name: Post-Deploy Verify
    target_model: ipai.deploy.runner
    target_method: verify_deployment
    description: Run health checks and generate evidence pack

workflow:
  - deploy.build
  - deploy.infra
  - deploy.migrate
  - deploy.release
  - deploy.verify

input_schema:
  type: object
  required:
    - environment
  properties:
    environment:
      type: string
      enum: [staging, prod]
    image_tag:
      type: string
      description: Docker image tag to deploy
    modules_to_update:
      type: array
      items: { type: string }
      description: Modules requiring -u update
    backup_before:
      type: boolean
      default: true

output_schema:
  type: object
  properties:
    image_digest: { type: string }
    deployment_status: { type: string, enum: [success, failed, rolled_back] }
    health_check: { type: object }
    evidence_path: { type: string }
    backup_path: { type: string }

agentInstructions: |
  When deploying Odoo:

  1. **Pre-Deploy**:
     - Backup database: pg_dump to timestamped file
     - Build image: docker build -f docker/Dockerfile.seeded
     - Tag with git SHA + timestamp

  2. **Infrastructure**:
     - Nginx reverse proxy with SSL (Let's Encrypt)
     - PostgreSQL 16 with connection pooling
     - Disable list_db in production
     - Set proper workers count based on CPU

  3. **Deploy**:
     - Pull new image, run migrations with --stop-after-init
     - Swap container (docker compose up -d)
     - Wait for health check to pass

  4. **Verify**:
     - HTTP 200 on /web/health
     - Module list matches expected
     - No error logs in first 60 seconds
     - Generate evidence pack in docs/evidence/

  5. **Rollback** (if needed):
     - Stop new container
     - Restore database from backup
     - Start previous image version
