name: Contract Tests (12 repo planes)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-tests:
    name: Contract Tests (12 repo planes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Discover contract test directories
        run: |
          echo "Scanning for contract test files..."
          dirs=(
            platform/tests/contract
            agent-platform/tests/contract
            agent-platform/tests/smoke
            agents/tests/contract
            automations/tests/contract
            data-intelligence/tests/contract
            web/tests/contract
            design/tests/contract
            docs/tests/contract
            templates/tests/template-contract
            tests/contract
          )
          total=0
          for d in "${dirs[@]}"; do
            if [ -d "$d" ]; then
              count=$(find "$d" -name 'test_*.py' -o -name '*_test.py' | wc -l)
              echo "  $d: $count test file(s)"
              total=$((total + count))
            else
              echo "  $d: MISSING"
            fi
          done
          echo "Total contract test files: $total"

      - name: Run contract tests
        run: |
          python -m pytest \
            platform/tests/contract/ \
            agent-platform/tests/contract/ \
            agent-platform/tests/smoke/ \
            agents/tests/contract/ \
            automations/tests/contract/ \
            data-intelligence/tests/contract/ \
            web/tests/contract/ \
            design/tests/contract/ \
            docs/tests/contract/ \
            templates/tests/template-contract/ \
            tests/contract/ \
            --import-mode=importlib \
            -ra -v
