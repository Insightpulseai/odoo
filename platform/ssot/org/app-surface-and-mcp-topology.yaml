version: 1
kind: app_surface_and_mcp_topology
status: canonical
org:
  enterprise: ipai
  primary_operating_org: Insightpulse-ai
ownership:
  app_surfaces_repo: web
  control_plane_repo: platform
  runtime_repo: agent-platform
  definitions_repo: agents
  transactional_repo: odoo
  analytics_repo: data-intelligence
  infra_repo: infra
  docs_repo: docs
application_surfaces:
  canonical_count: 4
  apps:
    - app_id: erp
      name: ERP
      primary_domain: erp.insightpulseai.com
      class: transactional_app
      audience:
        - internal_ops
        - finance
        - approvers
        - invited_external_users_if_enabled
      repos:
        primary: web
        depends_on:
          - odoo
          - platform
          - agent-platform
          - infra
      systems_of_truth:
        transactional: odoo
        control_plane: platform
        runtime: agent-platform
        release: azure_pipelines
        planning: azure_boards
      mcp_scope:
        allowed_categories:
          - odoo_tools
          - approval_workflows
          - document_ai
          - notifications
          - github_search_readonly_optional
        disallowed_categories:
          - unrestricted_external_connectors
          - cross_app_admin_tools
        side_effect_policy: guarded
      auth:
        primary: entra
        guest_access_allowed: conditional
      launch_priority: P0
    - app_id: insightpulseai_main
      name: InsightPulseAI Main
      primary_domain: www.insightpulseai.com
      class: flagship_web_app
      audience:
        - prospects
        - customers
        - operators
      repos:
        primary: web
        depends_on:
          - platform
          - agent-platform
          - infra
          - data-intelligence
      systems_of_truth:
        public_content: web
        control_plane: platform
        runtime: agent-platform
        analytics: data-intelligence
      mcp_scope:
        allowed_categories:
          - public_content_tools
          - analytics_read_tools
          - assistant_tools
          - document_search_readonly
        disallowed_categories:
          - direct_transactional_write_tools
          - internal_finance_tools
        side_effect_policy: mostly_readonly
      auth:
        primary: entra_or_app_specific
        guest_access_allowed: false
      launch_priority: P1
    - app_id: w9studio
      name: W9 Studio
      primary_domain: www.w9studio.net
      class: business_unit_app
      audience:
        - studio_ops
        - clients
        - content_team
      repos:
        primary: web
        depends_on:
          - platform
          - agent-platform
          - infra
      systems_of_truth:
        app: web
        control_plane: platform
        runtime: agent-platform
      mcp_scope:
        allowed_categories:
          - content_ops_tools
          - booking_tools_optional
          - asset_ops_tools_optional
          - notifications
        disallowed_categories:
          - erp_finance_admin_tools
          - broad_cross_tenant_connectors
        side_effect_policy: guarded
      auth:
        primary: entra_or_app_specific
        guest_access_allowed: conditional
      launch_priority: P2
    - app_id: prismalab
      name: PrismaLab
      primary_domain: prismalab.insightpulseai.com
      class: domain_app
      audience:
        - research_ops
        - reviewers
        - invited_collaborators
      repos:
        primary: web
        depends_on:
          - platform
          - agent-platform
          - infra
          - data-intelligence
      systems_of_truth:
        app: web
        control_plane: platform
        runtime: agent-platform
        analytics: data-intelligence
      mcp_scope:
        allowed_categories:
          - research_tools
          - document_ai
          - analytics_read_tools
          - citation_search
        disallowed_categories:
          - unrelated_business_unit_tools
          - unrestricted_procurement_tools
        side_effect_policy: guarded
      auth:
        primary: entra
        guest_access_allowed: conditional
      launch_priority: P2
mcp_global_considerations:
  principles:
    - tools_must_be_scoped_per_app
    - tools_must_be_scoped_per_environment
    - tenant_and_domain_boundaries_must_be_explicit
    - no_plaintext_credentials_in_runtime
    - secrets_must_be_brokered_or_vaulted
    - every_side_effecting_tool_call_must_be_audited
    - external_connectors_must_be_explicitly_allowed
    - prod_and_nonprod_tool_surfaces_must_be_separable
  control_plane:
    owned_by: platform
    responsibilities:
      - tool_registry
      - connector_policies
      - app_to_tool_binding
      - tenant_boundary_rules
      - environment_rules
      - secret_reference_registry
  runtime:
    owned_by: agent-platform
    responsibilities:
      - session_management
      - tool_invocation
      - approval_gating
      - audit_emission
      - retry_and_failure_handling
  definitions:
    owned_by: agents
    responsibilities:
      - app_specific_skills
      - personas
      - judges
      - task_contracts
      - prompt_contracts
environment_scoping:
  environments:
    - dev
    - staging
    - production
  rules:
    dev:
      connectors:
        relaxed_readonly_allowed: true
        side_effecting_tools: test_or_sandbox_only
    staging:
      connectors:
        production_like_read_tools: true
        side_effecting_tools: guarded_nonprod_only
    production:
      connectors:
        only_explicitly_approved: true
        side_effecting_tools: approval_and_audit_required
tenant_and_domain_boundaries:
  rules:
    - app_domain_maps_to_allowed_tool_scope
    - no_cross_app_tool_access_without_explicit_policy
    - no_cross_tenant_data_access_without_explicit_grant
    - hidden_or_sensitive_data_visibility_must_follow_rbac
cross_repo_contracts:
  - producer: platform
    consumer: agent-platform
    contract: mcp_tool_registry_and_policy
  - producer: agents
    consumer: agent-platform
    contract: app_specific_personas_skills_judges
  - producer: data-intelligence
    consumer:
      - agent-platform
      - web
    contract: analytics_and_retrieval_surfaces
  - producer: odoo
    consumer:
      - agent-platform
      - web
    contract: transactional_tool_surfaces_for_erp
assertions:
  - Insightpulse-ai_is_primary_operating_org_for_all_4_apps
  - MCP_is_cross_cutting_not_a_standalone_app
  - platform_owns_policy
  - agent-platform_owns_runtime_execution
  - agents_owns_behavioral_definitions
  - each_app_has_explicit_tool_scope
