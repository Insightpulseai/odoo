# -----------------------------------------------------------------------------
# Maker Agents
# -----------------------------------------------------------------------------
makers:
  - id: chief-architect
    maturity: L2
    stage: S07
    domain: orchestration
    health: green
    promotion_path:
      next_level: L3
      next_stage: S08
      blockers:
        - canary deployment not yet configured
        - human-approval workflow not yet wired
      evidence_needed:
        - integration_test_results
        - judge_score_ge_70
        - error_rate_lt_5_percent
    risk: low
    notes: Strong architecture artifacts. Needs runtime execution evidence.

  - id: azure-platform
    maturity: L1
    stage: S05
    domain: infrastructure
    health: yellow
    promotion_path:
      next_level: L2
      next_stage: S06
      blockers:
        - no integration tests against live Azure resources
        - staging environment isolation not validated
      evidence_needed:
        - integration_test_results
        - staging_deployment_log
        - error_recovery_demonstration
    risk: medium
    notes: Infra provisioning scripts exist but agent execution is untested.

  - id: odoo-runtime
    maturity: L3
    stage: S09
    domain: erp
    health: green
    promotion_path:
      next_level: L4
      next_stage: S10
      blockers:
        - no 30-day supervised production log
        - cost projection under load not measured
      evidence_needed:
        - canary_success_rate_ge_95
        - human_override_rate_lt_15_percent
        - cost_per_task_within_budget
        - no_critical_incidents_in_7_days
    risk: low
    notes: Highest maturity. Inherits odoo-sage production capabilities. Closest to autonomous production.

  - id: foundry-agent
    maturity: L1
    stage: S05
    domain: agent-platform
    health: yellow
    promotion_path:
      next_level: L2
      next_stage: S06
      blockers:
        - Azure AI Foundry project not yet provisioned (P0 blocker)
        - Knowledge index needs seeding
      evidence_needed:
        - integration_test_results
        - staging_deployment_log
        - latency_baseline_measurement
    risk: high
    notes: Critical path for agent platform but blocked on Foundry provisioning.

  - id: data-intelligence
    maturity: L1
    stage: S04
    domain: data
    health: yellow
    repo_status: split_required
    canonical_repo: data-intelligence
    current_surface:
      - infra/databricks/
      - odoo/infra/databricks/sql/
      - lakehouse/contracts/
    blocking_gate: standalone_repo_creation_and_asset_consolidation
    next_major_milestone: bootstrap_data_intelligence_repo
    split_plan: docs/architecture/data-intelligence/repo-split-plan.md
    promotion_path:
      next_level: L2
      next_stage: S06
      blockers:
        - standalone data-intelligence repo not yet created
        - Databricks credentials not scoped for agent use
        - DLT pipeline not yet tested end-to-end
        - active assets scattered across 3 monorepo paths
      evidence_needed:
        - repo_created_and_assets_migrated
        - integration_test_results
        - staging_deployment_log
        - error_recovery_demonstration
    risk: medium-high
    notes: >-
      No standalone repo exists. Assets embedded in monorepo under
      infra/databricks/, odoo/infra/databricks/sql/, lakehouse/contracts/.
      Repo split is a prerequisite for L2 promotion.

  - id: release-ops
    maturity: L2
    stage: S07
    domain: devops
    health: green
    promotion_path:
      next_level: L3
      next_stage: S08
      blockers:
        - canary deployment pattern not implemented
        - cost ceiling enforcement not configured
      evidence_needed:
        - canary_deployment_metrics
        - human_approval_workflow_verification
        - rollback_procedure_tested
    risk: low
    notes: CI/CD pipelines are production-grade. Good candidate for next promotion.

