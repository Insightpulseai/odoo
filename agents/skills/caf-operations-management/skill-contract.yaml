version: 1
type: benchmark_skill
classification: encoded_preference
family: microsoft-caf
skill:
  name: caf-operations-management
  id: caf-operations-management
  version: "0.1.0"
  status: draft
  owner_persona: cloud-governance-operator
  source_family: microsoft-caf
  benchmark_source: "Microsoft Cloud Adoption Framework"
  purpose: >
    Manage cloud operations with proper baselines and processes using CAF
    Manage phase methodology. Covers management baseline (inventory, visibility,
    compliance), enhanced management (platform and workload specialization),
    and business alignment through operational fitness reviews.

  triggers:
    - operations baseline establishment for new environment
    - operational fitness review scheduled
    - SLA/SLO definition or revision
    - monitoring or alerting gap identified
    - incident postmortem requiring operational improvement

  inputs:
    - current monitoring and alerting configuration
    - SLA/SLO targets per workload
    - incident history and postmortem findings
    - backup and disaster recovery configuration
    - operational runbooks and procedures

  steps:
    - assess current operations maturity (baseline, enhanced, business-aligned)
    - audit management baseline components (inventory, visibility, compliance)
    - evaluate monitoring coverage (metrics, logs, traces, alerts)
    - review backup and disaster recovery configuration
    - assess update management and patching strategy
    - evaluate operational runbooks and automation
    - define SLA/SLO targets with measurement methodology
    - identify enhanced management opportunities (platform/workload specialization)
    - conduct operational fitness review
    - define operations improvement roadmap
    - produce operations posture report with evidence

  outputs:
    - operations_maturity_assessment
    - management_baseline_audit
    - monitoring_coverage_report
    - backup_dr_status
    - sla_slo_definition
    - operations_roadmap
    - evidence

  guardrails:
    - "CAF is a benchmark reference, not a runtime dependency"
    - "Canonical stack remains Odoo CE + Azure Container Apps"
    - "A benchmark becomes integration only with explicit contract in docs/contracts/"
    - "Operations baselines must integrate with existing Azure Monitor setup"
    - "SLA/SLO targets must be achievable with current architecture"
    - "Operational complexity must match team capacity (solo developer)"

  evidence:
    required: true
    format: "docs/evidence/{stamp}/caf/operations/"

  evals:
    dimensions: [accuracy, completeness, monitoring_coverage, resilience, evidence_quality]
    thresholds:
      accuracy: 0.90
      monitoring_coverage: 0.90

cross_references:
  - agents/knowledge/benchmarks/microsoft-cloud-adoption-framework.md
  - agents/personas/cloud-governance-operator.md
  - agents/skills/azure-observability-ops/
  - agents/skills/azure-resiliency-ops/
  - agents/skills/caf-governance-baseline/
