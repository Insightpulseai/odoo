name: Org Docs Refresh

on:
  schedule:
    - cron: "0 7 * * 1"  # Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode"
        type: choice
        options:
          - incremental
          - full
        default: incremental

env:
  PYTHON_VERSION: "3.12"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyyaml openai azure-search-documents azure-core

      - name: Run ingestion
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: "2024-06-01"
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
        run: |
          MODE="${{ inputs.mode || 'incremental' }}"
          FLAGS="--repo-root . --index org-docs"

          if [ "$MODE" = "full" ]; then
            FLAGS="$FLAGS --full"
          else
            FLAGS="$FLAGS --incremental"
          fi

          python -m packages.odoo_docs_kb.cli ingest $FLAGS \
            | tee ${{ runner.temp }}/ingest_stats.json

      - name: Report stats
        run: |
          echo "## Org Docs Ingestion Stats" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ${{ runner.temp }}/ingest_stats.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MANIFEST="agents/knowledge/org_docs/.index_manifest.json"
          if [ -f "$MANIFEST" ] && ! git diff --quiet "$MANIFEST" 2>/dev/null; then
            git add "$MANIFEST"
            git commit -m "chore(kb): update org-docs index manifest"
            git push
          else
            echo "No manifest changes to commit"
          fi
