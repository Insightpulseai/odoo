# DISABLED: GHA runners non-functional (billing). CI migrating to Azure DevOps Pipelines.
# To re-enable: remove `if: false` from jobs.
name: Platform Strategy SSOT Check

on:
  push:
    paths:
      - 'ssot/governance/platform-strategy*'
      - 'scripts/ci/validate_platform_strategy.py'
      - '.github/workflows/platform-strategy-ssot-check.yml'
  pull_request:
    paths:
      - 'ssot/governance/platform-strategy*'
      - 'scripts/ci/validate_platform_strategy.py'
      - '.github/workflows/platform-strategy-ssot-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate platform strategy SSOT
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate SSOT
        run: python scripts/ci/validate_platform_strategy.py
