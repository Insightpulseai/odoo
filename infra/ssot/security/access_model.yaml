# =============================================================================
# Access Model — InsightPulse AI
# =============================================================================
#
# Master access model: identity classes, human role catalog, authentication
# methods, and operating model.
#
# Human-readable narrative: docs/security/ACCESS_MODEL.md
# Cross-references:
#   - ssot/security/entra_groups.yaml
#   - ssot/security/azure_rbac_matrix.yaml
#   - ssot/security/app_authorization_matrix.yaml
#   - ssot/security/workload_identities.yaml
#   - ssot/security/separation_of_duties.yaml
#   - infra/entra/app-roles-manifest.json
#   - infra/entra/role-tool-mapping.yaml
#
# Last updated: 2026-03-18
# =============================================================================

schema_version: "1.0"
last_updated: "2026-03-18"

# -----------------------------------------------------------------------------
# Tenant
# -----------------------------------------------------------------------------

tenant:
  name: ceoinsightpulseai.onmicrosoft.com
  id: 402de71a-87ec-4302-a609-fb76098d1da7
  default_domain: insightpulseai.com
  subscription_id: 536d8cf6-89e1-4815-aef3-d5f2c5f4d070
  primary_region: southeastasia
  entra_tier: free  # target: p1 (M365 Business Premium)
  security_defaults_enabled: false  # RISK — re-enable or deploy CA

# -----------------------------------------------------------------------------
# Identity Classes
# -----------------------------------------------------------------------------

identity_classes:

  - id: human_internal
    description: Platform team members with @insightpulseai.com mailboxes
    entra_object_type: member_user
    auth_method: entra_id_mfa
    target_auth: phishing_resistant_mfa  # FIDO2
    lifecycle: hr_driven
    mfa_required: true

  - id: human_external
    description: Partners, contractors, client stakeholders
    entra_object_type: guest_user
    auth_method: entra_b2b_home_tenant_mfa
    lifecycle: sponsor_driven_time_bounded
    mfa_required: true  # enforced by home tenant

  - id: workload_managed
    description: Azure services authenticating to other Azure services
    entra_object_type: user_assigned_managed_identity
    auth_method: imds_token  # no secret
    lifecycle: terraform_iac
    mfa_required: false  # not applicable

  - id: workload_app
    description: CI/CD pipelines, GitHub Actions, external SaaS
    entra_object_type: service_principal
    auth_method: workload_identity_federation  # no secret
    lifecycle: pipeline_iac
    mfa_required: false  # not applicable

# -----------------------------------------------------------------------------
# Human Role Catalog
# -----------------------------------------------------------------------------

human_roles:

  - id: platform_owner
    name: Platform Owner
    purpose: Single accountable human for all platform decisions
    scope: all_planes_all_environments
    current_holders:
      - admin@insightpulseai.com
      - ceo@insightpulseai.com
    entra_group: sg-ipai-platform-owners
    allowed_systems:
      - azure_portal
      - entra_admin
      - devops_org_admin
      - github_org_owner
      - databricks_workspace_admin
      - foundry_admin
      - odoo_settings
      - key_vault_admin
      - apim_admin
    prohibited_actions:
      - use_global_admin_for_daily_ops
      - deploy_without_pipeline
      - modify_oca_source
    day_to_day_role: scoped_admin
    escalation: global_admin_jit_via_pim  # target

  - id: emergency_admin
    name: Emergency Admin
    purpose: Break-glass access when primary admin is locked out
    scope: entra_global_admin_subscription_owner
    current_holders:
      - admin@insightpulseai.com
      - emergency-admin@insightpulseai.com
    entra_group: sg-ipai-emergency-admins
    allowed_systems:
      - entra_admin
      - azure_portal
    prohibited_actions:
      - daily_operations
      - code_deployment
      - data_access
    auth_requirements:
      - cloud_only_account
      - fido2_security_key  # target
      - password_plus_mfa  # current

  - id: developer
    name: Developer / Engineer
    purpose: Build, test, deploy platform features
    scope: dev_full_staging_deploy_prod_pipeline
    current_holders: []  # future
    entra_group: sg-ipai-developers
    allowed_systems:
      - github_repo_write
      - devops_pipeline_run
      - dev_rg_contributor
      - databricks_dev_user
      - key_vault_secrets_user_dev
    prohibited_actions:
      - prod_direct_access
      - global_admin
      - identity_policy_changes
      - key_vault_admin
      - odoo_prod_settings

  - id: data_engineer
    name: Data Engineer
    purpose: Build and maintain ETL pipelines, lakehouse schemas
    scope: databricks_adls_unity_catalog
    current_holders: []  # future
    entra_group: sg-ipai-data-engineers
    allowed_systems:
      - databricks_sql_notebook
      - unity_catalog_schema_management
      - adls_read_write
      - dbt_model_authoring
    prohibited_actions:
      - odoo_direct_database_access
      - key_vault_admin
      - identity_policy_changes
      - odoo_prod_settings

  - id: finance_operator
    name: Finance Operator
    purpose: Execute financial close, manage invoices, BIR compliance
    scope: odoo_finance_modules
    current_holders: []  # future
    entra_group: sg-ipai-finance-operators
    app_roles:
      - finance.close.operator
      - finance.viewer
    prohibited_actions:
      - settings_access
      - user_management
      - code_deployment
      - databricks_admin
      - infrastructure_changes

  - id: analyst
    name: Analyst / Viewer
    purpose: Consume dashboards, reports, and analytics outputs
    scope: bi_surfaces_read_only
    current_holders: []  # future
    entra_group: sg-ipai-analysts
    app_roles:
      - analytics.viewer
      - copilot.advisory
    prohibited_actions:
      - any_write_operation
      - settings_access
      - infrastructure_access

  - id: client_stakeholder
    name: Client Stakeholder
    purpose: External client accessing their vertical's data
    scope: single_vertical_read_only
    current_holders: []  # future
    identity_class: human_external
    prohibited_actions:
      - cross_vertical_access
      - any_write
      - infrastructure
      - settings

# -----------------------------------------------------------------------------
# Operating Model
# -----------------------------------------------------------------------------

operating_model:
  current: one_person_with_delegated_agents
  target: small_team_with_agent_delegation
  description: >
    Currently one accountable human with maker/judge agent delegation.
    Designed for single-person operation without encoding bad practices.
    Scales to small team by adding members to existing Entra groups.
  agent_pattern:
    maker: agent_drafts_artifacts
    judge: human_approves_or_rejects
    enforcement: pipeline_gates_and_audit_logs

# -----------------------------------------------------------------------------
# Authentication Methods
# -----------------------------------------------------------------------------

auth_methods:

  - id: entra_oidc
    systems:
      - odoo_ce_19
      - databricks
      - devops
      - azure_portal
    protocol: OpenID Connect
    token_claims:
      - sub
      - email
      - roles  # app roles from manifest
      - groups  # transitive group membership
    notes: Odoo integration via ipai_auth_oidc module

  - id: managed_identity_token
    systems:
      - container_apps_to_key_vault
      - container_apps_to_acr
      - databricks_to_adls
      - agents_to_openai
      - agents_to_apim
    protocol: Azure IMDS
    notes: No secret; token issued by Azure fabric

  - id: workload_identity_federation
    systems:
      - devops_pipelines
      - github_actions  # if needed
    protocol: OIDC federation
    notes: No client secret; federated credential trust

  - id: keycloak_oidc
    systems:
      - odoo_ce_19  # transitional
      - superset  # transitional
      - plane  # transitional
    protocol: OpenID Connect
    status: transitional
    retirement_gates:
      - oidc_saml_parity
      - group_role_mapping
      - service_account_replacement
      - break_glass_functional
      - user_provisioning_automated
      - per_app_cutover_verified

# -----------------------------------------------------------------------------
# App Registration
# -----------------------------------------------------------------------------

app_registration:
  display_name: "InsightPulse AI - Odoo ERP"
  app_id: 3605a67d-7135-44a0-8640-03a9b4225923
  roles_count: 15
  roles_manifest: infra/entra/app-roles-manifest.json
  tool_mapping: infra/entra/role-tool-mapping.yaml
  auth_current: client_secret  # RISK — migrate to certificate or WIF
  auth_target: certificate_or_wif

