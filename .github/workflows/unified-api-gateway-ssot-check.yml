name: Unified API Gateway SSOT Check

on:
  push:
    paths:
      - 'ssot/api/unified-api-gateway*'
      - 'scripts/validate_unified_api_gateway_ssot.py'
      - '.github/workflows/unified-api-gateway-ssot-check.yml'
  pull_request:
    paths:
      - 'ssot/api/unified-api-gateway*'
      - 'scripts/validate_unified_api_gateway_ssot.py'
      - '.github/workflows/unified-api-gateway-ssot-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate unified API gateway SSOT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate SSOT
        run: python scripts/validate_unified_api_gateway_ssot.py
