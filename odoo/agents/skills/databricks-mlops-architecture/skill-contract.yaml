version: 1
name: databricks-mlops-architecture
status: draft
owner: agents
type: benchmark_skill
family: databricks-architecture
classification: capability_uplift

purpose: >
  Design MLOps orchestration using Azure Databricks. Covers training orchestration,
  staging/production promotion path, batch scoring and serving promotion, model
  lifecycle handoff, Git integration, and Jobs/Workflows patterns.

source: "Use Azure Databricks to Orchestrate MLOps" (Microsoft Learn architecture card)

triggers:
  - new ML workload design requiring orchestration
  - MLOps pipeline architecture review
  - model promotion workflow design
  - training-to-serving pipeline setup

inputs:
  - ML workload description (use case, data sources, model type)
  - target environment (dev/staging/production)
  - serving requirements (batch vs. real-time vs. both)
  - existing infrastructure context

dependencies:
  - agents/knowledge/benchmarks/azure-databricks-architecture-cards.md
  - agent-platform/ssot/learning/databricks_architecture_card_map.yaml
  - agents/skills/databricks-model-serving-production-readiness/
  - agents/skills/databricks-pipeline-production-readiness/

steps:
  - assess ML workload type and serving requirements
  - design training orchestration pipeline (data prep, feature engineering, training, evaluation)
  - define staging/production promotion gates (metric thresholds, automated tests)
  - design batch scoring workflow or real-time serving endpoint configuration
  - establish model lifecycle management (MLflow Registry or Unity Catalog)
  - configure Git integration for pipeline code version control
  - define Jobs/Workflows structure with task dependencies and retry policies
  - document monitoring and alerting for training and serving

outputs:
  - mlops_architecture_design
  - promotion_gate_definition
  - pipeline_workflow_specification
  - monitoring_plan
  - evidence

guardrails:
  - >
    This skill designs MLOps orchestration architecture. It does not replace
    production readiness assessment — use databricks-model-serving-production-readiness
    and databricks-pipeline-production-readiness for deployment gate checks.
  - never design pipelines that rely on manual notebook execution for production
  - require Git-backed code for all training and serving pipelines
  - require defined promotion gates between environments
  - require monitoring and alerting configuration in every design

evidence:
  format: docs/evidence/{stamp}/databricks/mlops-architecture/
  required:
    - architecture diagram or description
    - promotion gate specification
    - pipeline workflow definition
    - monitoring plan

evals:
  accuracy: 0.95
  completeness: 0.95
  safety: 0.99
  policy_adherence: 0.99
