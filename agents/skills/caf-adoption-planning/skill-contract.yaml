version: 1
type: benchmark_skill
classification: capability_uplift
family: microsoft-caf
skill:
  name: caf-adoption-planning
  id: caf-adoption-planning
  version: "0.1.0"
  status: draft
  owner_persona: cloud-strategy-advisor
  source_family: microsoft-caf
  benchmark_source: "Microsoft Cloud Adoption Framework"
  purpose: >
    Create cloud adoption plan with timeline, digital estate inventory,
    skills readiness assessment, and organizational alignment. Translates
    strategy into actionable adoption backlog.

  triggers:
    - cloud strategy approved and ready for planning
    - new adoption wave initiated
    - organizational restructuring affecting cloud team
    - skills gap identified in cloud operations

  inputs:
    - approved cloud strategy document
    - current digital estate inventory
    - team skills assessment
    - organizational structure and RACI
    - existing DevOps/planning tools (Azure DevOps, GitHub)

  steps:
    - catalog digital estate (servers, databases, applications, dependencies)
    - classify workloads by priority and complexity
    - sequence migration/modernization waves
    - assess team skills against required cloud competencies
    - identify training needs and certification paths
    - define organizational alignment (CCoE, cloud team structure)
    - create adoption backlog in planning tool
    - establish iteration cadence and review gates
    - define success metrics per wave

  outputs:
    - digital_estate_inventory
    - adoption_plan_backlog
    - wave_sequence
    - skills_readiness_assessment
    - organizational_alignment_model
    - timeline_with_milestones

  guardrails:
    - "CAF is a benchmark reference, not a runtime dependency"
    - "Canonical stack remains Odoo CE + Azure Container Apps"
    - "A benchmark becomes integration only with explicit contract in docs/contracts/"
    - "Plans must be realistic given team size and budget constraints"
    - "Wave sequencing must respect workload dependencies"

  evidence:
    required: true
    format: "docs/evidence/{stamp}/caf/planning/"

  evals:
    dimensions: [accuracy, completeness, feasibility, organizational_fit, evidence_quality]
    thresholds:
      accuracy: 0.90
      feasibility: 0.90

cross_references:
  - agents/knowledge/benchmarks/microsoft-cloud-adoption-framework.md
  - agents/personas/cloud-strategy-advisor.md
  - agents/skills/caf-strategy-definition/
  - agent-platform/ssot/learning/microsoft_caf_skill_map.yaml
