version: 1
source: platform_cli_benchmark_layer
status: active
type: benchmark_curriculum
family: platform_cli_operations
updated_at: "2026-03-17"

# One-line rule:
# Use Databricks CLI for Databricks workspace/data/serving operations,
# use Odoo CLI for Odoo runtime/admin/developer operations,
# and treat odo as deprecated and out of the canonical stack.

personas:
  - id: databricks-cli-operator
    role: owns_databricks_cli_operations
    file: agents/personas/databricks-cli-operator.md
    skills:
      - databricks-workspace-ops
      - databricks-compute-jobs-ops
      - databricks-ml-serving-ops
      - databricks-identity-sql-ops

  - id: odoo-cli-operator
    role: owns_odoo_cli_operations
    file: agents/personas/odoo-cli-operator.md
    skills:
      - odoo-server-ops
      - odoo-db-ops
      - odoo-shell-ops
      - odoo-module-scaffold-ops
      - odoo-test-runner-ops
      - odoo-dataset-neutralize-populate-ops
      - odoo-code-metrics-ops

  - id: platform-cli-judge
    role: routes_tasks_to_correct_cli_surface
    file: agents/personas/platform-cli-judge.md
    skills:
      - cli-surface-selection

  - id: deprecated-tool-reviewer
    role: rejects_deprecated_tools
    file: agents/personas/deprecated-tool-reviewer.md
    skills:
      - deprecated-cli-assessment

skills:
  # Databricks CLI family
  - id: databricks-workspace-ops
    lane: databricks_cli
    role: manage_workspace_artifacts
    build_order: 1
    skill_dir: agents/skills/databricks-workspace-ops/
    knowledge_ref: agents/knowledge/benchmarks/databricks-cli.md
    owner: databricks-cli-operator

  - id: databricks-compute-jobs-ops
    lane: databricks_cli
    role: manage_compute_and_job_execution
    build_order: 2
    skill_dir: agents/skills/databricks-compute-jobs-ops/
    knowledge_ref: agents/knowledge/benchmarks/databricks-cli.md
    owner: databricks-cli-operator

  - id: databricks-ml-serving-ops
    lane: databricks_cli
    role: manage_ml_and_model_serving
    build_order: 3
    skill_dir: agents/skills/databricks-ml-serving-ops/
    knowledge_ref: agents/knowledge/benchmarks/databricks-cli.md
    owner: databricks-cli-operator

  - id: databricks-identity-sql-ops
    lane: databricks_cli
    role: manage_identity_and_sql_warehouses
    build_order: 4
    skill_dir: agents/skills/databricks-identity-sql-ops/
    knowledge_ref: agents/knowledge/benchmarks/databricks-cli.md
    owner: databricks-cli-operator

  # Odoo CLI family
  - id: odoo-server-ops
    lane: odoo_cli
    role: manage_odoo_server_lifecycle
    build_order: 5
    skill_dir: agents/skills/odoo-server-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  - id: odoo-db-ops
    lane: odoo_cli
    role: manage_odoo_databases
    build_order: 6
    skill_dir: agents/skills/odoo-db-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  - id: odoo-shell-ops
    lane: odoo_cli
    role: use_odoo_interactive_shell
    build_order: 7
    skill_dir: agents/skills/odoo-shell-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  - id: odoo-module-scaffold-ops
    lane: odoo_cli
    role: scaffold_new_odoo_modules
    build_order: 8
    skill_dir: agents/skills/odoo-module-scaffold-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  - id: odoo-test-runner-ops
    lane: odoo_cli
    role: run_odoo_tests
    build_order: 9
    skill_dir: agents/skills/odoo-test-runner-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  - id: odoo-dataset-neutralize-populate-ops
    lane: odoo_cli
    role: neutralize_and_populate_databases
    build_order: 10
    skill_dir: agents/skills/odoo-dataset-neutralize-populate-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  - id: odoo-code-metrics-ops
    lane: odoo_cli
    role: measure_codebase_metrics
    build_order: 11
    skill_dir: agents/skills/odoo-code-metrics-ops/
    knowledge_ref: agents/knowledge/benchmarks/odoo-cli.md
    owner: odoo-cli-operator

  # Cross-cutting
  - id: cli-surface-selection
    lane: cross_cutting
    role: route_tasks_to_correct_cli_surface
    build_order: 12
    skill_dir: agents/skills/cli-surface-selection/
    knowledge_ref: agents/knowledge/benchmarks/databricks-cli.md
    owner: platform-cli-judge
    type: judge

  - id: deprecated-cli-assessment
    lane: cross_cutting
    role: assess_deprecated_cli_tools
    build_order: 13
    skill_dir: agents/skills/deprecated-cli-assessment/
    knowledge_ref: agents/knowledge/benchmarks/deprecated-cli-surfaces.md
    owner: deprecated-tool-reviewer
    type: judge

knowledge_bases:
  - id: databricks-cli
    file: agents/knowledge/benchmarks/databricks-cli.md
    covers: databricks_cli_v0205_command_reference

  - id: odoo-cli
    file: agents/knowledge/benchmarks/odoo-cli.md
    covers: odoo_bin_command_reference

  - id: deprecated-cli-surfaces
    file: agents/knowledge/benchmarks/deprecated-cli-surfaces.md
    covers: deprecated_tool_registry

routing_rules:
  - pattern: "workspace|notebook|repo|secret|files|dbfs"
    surface: DATABRICKS_CLI
    delegate: databricks-workspace-ops

  - pattern: "cluster|instance.?pool|job|pipeline|run|spark"
    surface: DATABRICKS_CLI
    delegate: databricks-compute-jobs-ops

  - pattern: "experiment|model.*(registry|serving)|serving.?endpoint|mlflow"
    surface: DATABRICKS_CLI
    delegate: databricks-ml-serving-ops

  - pattern: "user|group|service.?principal|warehouse|sql.?query|dashboard"
    surface: DATABRICKS_CLI
    delegate: databricks-identity-sql-ops

  - pattern: "odoo.*server|http.?port|workers|proxy.?mode|dev.?mode|addons.?path"
    surface: ODOO_CLI
    delegate: odoo-server-ops

  - pattern: "odoo.*database|createdb|dropdb|backup|restore|pg_dump"
    surface: ODOO_CLI
    delegate: odoo-db-ops

  - pattern: "odoo.*shell|env\\[|recordset|self\\.env"
    surface: ODOO_CLI
    delegate: odoo-shell-ops

  - pattern: "scaffold|new.?module|ipai_.*_"
    surface: ODOO_CLI
    delegate: odoo-module-scaffold-ops

  - pattern: "test.?enable|test.?tags|test_.*module|run.*test"
    surface: ODOO_CLI
    delegate: odoo-test-runner-ops

  - pattern: "neutralize|populate|demo.?data|strip.*production"
    surface: ODOO_CLI
    delegate: odoo-dataset-neutralize-populate-ops

  - pattern: "cloc|lines.?of.?code|module.?size|code.?metrics"
    surface: ODOO_CLI
    delegate: odoo-code-metrics-ops

  - pattern: "odo|openshift"
    surface: REJECTED
    delegate: deprecated-cli-assessment
