# -----------------------------------------------------------------------------
# Prohibitions
# -----------------------------------------------------------------------------
prohibitions:
  - guest_to_app_direct_assignment_is_forbidden
  - guest_groups_must_not_contain_member_users
  - guest_groups_must_not_be_assigned_to_directory_roles
  - sub_groups_must_roll_up_into_the_parent_group
