# Azure DevOps — Indexing Contract

name: azure-devops-indexing
description: Vector index configuration for Azure DevOps KB

index:
  backend: azure-ai-search
  index_name: azure-devops-docs
  api_version: "2024-07-01"

  embedding:
    model: text-embedding-ada-002
    dimensions: 1536
    batch_size: 100

  search:
    semantic_config: azure-devops-semantic
    scoring_profile: azure-devops-scoring
    default_top_k: 8
    max_top_k: 20

  fields:
    - name: chunk_id
      type: Edm.String
      key: true
      filterable: true
    - name: content
      type: Edm.String
      searchable: true
      analyzer: en.microsoft
    - name: content_vector
      type: Collection(Edm.Single)
      searchable: true
      dimensions: 1536
      vector_search_profile: azure-devops-vector-profile
    - name: path
      type: Edm.String
      filterable: true
      facetable: true
    - name: heading_chain
      type: Edm.String
      searchable: true
      filterable: true
    - name: domain
      type: Edm.String
      filterable: true
      facetable: true
    - name: source
      type: Edm.String
      filterable: true
    - name: source_type
      type: Edm.String
      filterable: true
    - name: product
      type: Edm.String
      filterable: true
    - name: lang
      type: Edm.String
      filterable: true
    - name: ordinal
      type: Edm.Int32
      sortable: true
    - name: content_hash
      type: Edm.String
      filterable: true
    - name: indexed_at
      type: Edm.DateTimeOffset
      sortable: true

incremental:
  strategy: content-hash
  tracking:
    manifest_path: agents/knowledge/azure_devops/.index_manifest.json
  behavior:
    on_content_changed: re-chunk + re-embed + upsert
    on_page_removed: delete chunks by path
    on_new_page: chunk + embed + insert
    on_unchanged: skip

refresh:
  schedule: weekly
  workflow: .github/workflows/azure-devops-kb-refresh.yml

citation:
  format: "domain={domain} path={path} heading={heading_chain} chunk_id={chunk_id}"
  required_fields:
    - domain
    - path
    - heading_chain
    - chunk_id
