name: Integration Inventory Guard

on:
  pull_request:
    paths:
      - "ssot/integrations/platform_inventory.yaml"
      - "ssot/integrations/_index.yaml"
      - ".github/workflows/integration-inventory-guard.yml"
  push:
    branches: [main]
    paths:
      - "ssot/integrations/platform_inventory.yaml"
      - "ssot/integrations/_index.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          set -euo pipefail
          echo "=== Validating integration inventory YAML ==="

          # Check YAML is parseable
          python3 -c "
          import yaml, sys
          for f in ['ssot/integrations/platform_inventory.yaml', 'ssot/integrations/_index.yaml']:
              try:
                  with open(f) as fh:
                      data = yaml.safe_load(fh)
                  if not data:
                      print(f'ERROR: {f} is empty')
                      sys.exit(1)
                  print(f'OK: {f} ({len(str(data))} chars)')
              except Exception as e:
                  print(f'ERROR: {f}: {e}')
                  sys.exit(1)
          "

      - name: Validate required fields
        run: |
          set -euo pipefail
          python3 -c "
          import yaml, sys

          with open('ssot/integrations/platform_inventory.yaml') as f:
              inv = yaml.safe_load(f)

          errors = []

          # Required top-level keys
          for key in ['schema_version', 'updated', 'org', 'github', 'cloud', 'email', 'automation']:
              if key not in inv:
                  errors.append(f'Missing required top-level key: {key}')

          # GitHub runner must be defined
          runner = inv.get('github', {}).get('runner', {})
          if not runner.get('name'):
              errors.append('github.runner.name is required')
          if not runner.get('labels'):
              errors.append('github.runner.labels is required')

          # Cloud platforms must have status
          for platform_name, platform in inv.get('cloud', {}).items():
              if isinstance(platform, dict) and 'status' not in platform:
                  errors.append(f'cloud.{platform_name}.status is required')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          else:
              print('OK: All required fields present')
          "

      - name: Check index references exist
        run: |
          set -euo pipefail
          python3 -c "
          import yaml, os, sys

          with open('ssot/integrations/_index.yaml') as f:
              idx = yaml.safe_load(f)

          missing = []
          for entry in idx.get('integrations', []):
              fpath = entry.get('file', '')
              if not os.path.exists(fpath):
                  missing.append(f'{entry[\"id\"]}: {fpath}')

          if missing:
              for m in missing:
                  print(f'ERROR: Missing file for {m}')
              sys.exit(1)
          else:
              print(f'OK: All {len(idx[\"integrations\"])} index entries have files')
          "
