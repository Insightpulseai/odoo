# =============================================================================
# Foundry Runtime CI — platform/ci/foundry-runtime-ci.yml
# =============================================================================
# Replaces agent-platform/azure-pipelines.yml.
# Foundry runtime/governance belongs under platform, not agent-platform.
#
# Stages: Build → Eval Gate → Release (staging)
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - platform/**
      - packages/**
      - apps/**

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'TypeScript Build + Smoke Tests'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node.js 20.x'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'TypeScript build'

          - script: npm run test -w @ipai/builder-factory 2>/dev/null || echo "No tests configured"
            displayName: 'Run smoke tests'

          - publish: $(System.DefaultWorkingDirectory)/apps/builder-factory/dist
            artifact: builder-factory
            displayName: 'Publish build artifact'
            condition: succeededOrFailed()

  - stage: Evaluate
    displayName: 'Eval Gate'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - template: ../../azure-pipelines/templates/jobs/foundry-eval.yml
        parameters:
          evalDataset: agents/evals/pulser/golden-set.jsonl
          thresholds: agents/evals/pulser/thresholds.yaml

  - stage: Release
    displayName: 'Release Gate'
    dependsOn: Evaluate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to staging'
        environment: 'platform-staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Staging deployment — placeholder until ACA target is configured"
                  displayName: 'Deploy to staging (placeholder)'
