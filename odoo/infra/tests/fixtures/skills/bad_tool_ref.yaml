# tests/fixtures/skills/bad_tool_ref.yaml
# INTENTIONALLY INVALID — used by CI to prove the validator blocks bad tool refs.
#
# This fixture is NOT loaded by the skills validator directly.
# It is passed via --ssot-path in the test job to assert that the validator
# exits with code 1 when a skill references an unknown tool.
#
# Expected failure output from validate_skills_registry.py:
#   skills[0].allowed_tools: 'nonexistent_tool_abc' not found in ssot/tools/registry.yaml
#   skills[0].allowed_tools: 'another_ghost_tool' not found in ssot/tools/registry.yaml
#   2 error(s) found in 1 skill(s)

meta:
  schema_version: "1.1"
  updated_at: "2026-03-02"

skills:
  - id: bad-tool-test-skill
    name: "Bad Tool Reference Test"
    description: >
      Fixture skill whose allowed_tools list contains tool IDs that do not exist
      in ssot/tools/registry.yaml. The validator must exit 1 on this file.
    executor: vercel_sandbox
    max_duration_s: 60
    tags: [test, fixture, ci]
    state_machine: [PLAN, VERIFY]
    owner: platform-team
    status: experimental
    allowed_tools:
      - ops_start_run           # valid — exists in ssot/tools/registry.yaml
      - nonexistent_tool_abc    # INVALID — does not exist; must cause CI failure
      - another_ghost_tool      # INVALID — does not exist; must cause CI failure
    security:
      path_traversal_guard: true
      symlink_guard: true
      metadata_escaping: true
      max_skill_body_bytes: 5000
