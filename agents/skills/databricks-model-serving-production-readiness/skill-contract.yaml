version: 1
name: databricks-model-serving-production-readiness
status: draft
owner: agents
type: benchmark_skill
family: databricks_production_readiness

purpose: >
  Assess whether a model serving deployment meets production-readiness criteria
  covering model lifecycle, staging-to-production movement, serving architecture,
  endpoint scalability/security, and model governance.

triggers:
  - model promotion to production
  - serving endpoint creation
  - model governance review

inputs:
  - model artifact (MLflow model)
  - serving endpoint config
  - governance policy
  - SLA requirements

dependencies:
  - agents/knowledge/benchmarks/databricks-production-ready.md
  - docs/architecture/enterprise_data_platform.md

steps:
  - verify model is registered in Unity Catalog with lineage
  - check staging-to-production promotion gate (not direct-to-prod)
  - verify serving endpoint configuration (throughput, latency SLA)
  - confirm A/B serving or traffic splitting capability
  - check endpoint security — authentication, rate limiting, network isolation
  - verify monitoring — inference latency, error rate, data drift detection
  - confirm rollback path (previous model version, endpoint version)
  - check model governance — approval workflow, audit trail, compliance tags

outputs:
  - model_serving_readiness_assessment
  - governance_compliance_report
  - sla_feasibility
  - gap_list
  - remediation_recommendations
  - evidence

guardrails:
  - >
    Databricks "production ready" is a benchmark for production discipline,
    not a blanket trust label. A Databricks capability is production-grade
    in our doctrine only when: release maturity is acceptable (GA or Public
    Preview with stable interface/SLA/support), deployment path is codified,
    observability/evaluation exists, rollback/recovery expectations are defined.
    Beta, Private Preview, and Experimental features must NOT be treated as
    canonical production baseline.
  - never approve model without staging validation
  - never skip governance review
  - require drift monitoring before production sign-off
  - require rollback path evidence

evidence:
  format: docs/evidence/{stamp}/databricks/model-serving-readiness/
  required:
    - model registration proof (Unity Catalog)
    - staging validation results
    - endpoint configuration
    - governance approval trail

evals:
  accuracy: 0.95
  completeness: 0.95
  safety: 0.99
  policy_adherence: 0.99
