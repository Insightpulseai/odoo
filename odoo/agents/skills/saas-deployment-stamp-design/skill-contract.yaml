id: saas-deployment-stamp-design
name: SaaS Deployment Stamp Design
version: 0.1.0
type: benchmark_skill
classification: capability_uplift
family: azure-saas-mt
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design deployment stamp patterns for horizontal scaling of multi-tenant
  SaaS, covering stamp topology, tenant-to-stamp assignment, stamp lifecycle,
  geo-distribution, and capacity planning.

triggers:
  - "Single deployment reaching capacity limits"
  - "Geo-distribution required for data residency or latency"
  - "Need horizontal scaling strategy for tenant growth"
  - "Blast radius reduction required"

inputs:
  - tenant_growth_projection: "Expected tenant count over 12-24 months"
  - geo_requirements: "Regions where tenants must be served"
  - stamp_capacity: "Max tenants per stamp (compute, storage, connections)"
  - isolation_requirements: "Whether certain tenants need dedicated stamps"
  - sla_targets: "Availability and latency SLAs per tenant tier"

steps:
  - "Define stamp composition (which Azure resources constitute one stamp)"
  - "Calculate stamp capacity based on resource limits"
  - "Design tenant-to-stamp assignment algorithm"
  - "Plan stamp lifecycle (create, scale, drain, decommission)"
  - "Design geo-distribution strategy and traffic routing"
  - "Build stamp health monitoring and capacity alerting"

outputs:
  - stamp_definition: "Resources, configuration, and IaC template per stamp"
  - capacity_model: "Tenants per stamp, scaling triggers, resource limits"
  - assignment_algorithm: "How tenants are placed into stamps"
  - lifecycle_procedures: "Stamp creation, scaling, draining, decommission"
  - routing_design: "Front Door or Traffic Manager configuration per stamp"

guardrails:
  - "Stamp must be deployable from a single IaC template"
  - "Tenant assignment must be reversible (tenant can move between stamps)"
  - "Stamp failure must not cascade to other stamps"
  - "New stamp must be provisionable without manual steps"

evidence:
  - "New stamp deployed from template in under 30 minutes"
  - "Tenant migrated between stamps with zero downtime"
  - "Stamp failure isolated — other stamps unaffected"

dependencies:
  - saas-resource-organization
  - saas-networking-design

evals:
  - scenario: "Stamp reaches 80% capacity"
    pass: "New stamp auto-provisioned, new tenants routed there"
  - scenario: "Stamp failure in one region"
    pass: "Tenants on failed stamp degraded, other stamps unaffected"
  - scenario: "Tenant migration between stamps"
    pass: "Zero-downtime migration with DNS cutover"

benchmark_source: "Azure Deployment Stamps Pattern, Azure Mission-Critical"
