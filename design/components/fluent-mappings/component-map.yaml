# =============================================================================
# Component-to-Fluent Mapping Registry
# =============================================================================
# Every product-facing component must have an entry here mapping it to
# Fluent UI semantics. Components without a mapping entry fail CI parity checks.
#
# Reference: design/validation/parity-rules.yaml
# Upstream: Fluent UI v9 / Fluent 2 component library
# =============================================================================

version: 1

components:

  # ---------------------------------------------------------------------------
  # Core controls
  # ---------------------------------------------------------------------------
  Button:
    fluent_reference: button
    foundations:
      - color
      - typography
      - spacing
      - radius
      - motion
    states:
      - default
      - hover
      - active
      - focus
      - disabled
      - loading

  Input:
    fluent_reference: input
    foundations:
      - color
      - typography
      - spacing
      - radius
      - motion
    states:
      - default
      - hover
      - focus
      - disabled
      - error

  Select:
    fluent_reference: select
    foundations:
      - color
      - typography
      - spacing
      - radius
    states:
      - default
      - hover
      - focus
      - disabled
      - error
      - open

  Checkbox:
    fluent_reference: checkbox
    foundations:
      - color
      - spacing
      - radius
      - motion
    states:
      - default
      - hover
      - focus
      - disabled
      - selected

  # ---------------------------------------------------------------------------
  # Layout and containers
  # ---------------------------------------------------------------------------
  Dialog:
    fluent_reference: dialog
    foundations:
      - color
      - typography
      - spacing
      - radius
      - elevation
      - shadow
      - motion
    states:
      - default
      - open
      - closing

  Card:
    fluent_reference: card
    foundations:
      - color
      - spacing
      - radius
      - elevation
      - shadow
    states:
      - default
      - hover
      - selected

  Table:
    fluent_reference: table
    foundations:
      - color
      - typography
      - spacing
      - motion
    states:
      - default
      - hover
      - selected
      - loading
      - error

  # ---------------------------------------------------------------------------
  # Navigation
  # ---------------------------------------------------------------------------
  NavList:
    fluent_reference: nav-list
    foundations:
      - color
      - typography
      - spacing
    states:
      - default
      - hover
      - active
      - focus
      - selected

  Sidebar:
    fluent_reference: drawer
    foundations:
      - color
      - spacing
      - elevation
      - shadow
      - motion
    states:
      - default
      - open
      - collapsed

  Toolbar:
    fluent_reference: toolbar
    foundations:
      - color
      - spacing
    states:
      - default

  # ---------------------------------------------------------------------------
  # Feedback and status
  # ---------------------------------------------------------------------------
  Avatar:
    fluent_reference: avatar
    foundations:
      - color
      - spacing
      - radius
    states:
      - default
      - hover

  Badge:
    fluent_reference: badge
    foundations:
      - color
      - typography
      - spacing
      - radius
    states:
      - default

  Toast:
    fluent_reference: toast
    foundations:
      - color
      - typography
      - spacing
      - radius
      - elevation
      - motion
    states:
      - default
      - entering
      - exiting

  Spinner:
    fluent_reference: spinner
    foundations:
      - color
      - motion
    states:
      - default

  # ---------------------------------------------------------------------------
  # AI / Copilot
  # ---------------------------------------------------------------------------
  Copilot:
    fluent_reference: copilot-chat
    foundations:
      - color
      - typography
      - spacing
      - radius
      - elevation
      - motion
    states:
      - default
      - open
      - loading
      - error
    notes: "Maps to Fluent Copilot components. Odoo implementation via ipai_ai_copilot."
