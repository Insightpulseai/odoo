id: multitenant-performance-scaling
version: 1
status: active
classification: capability_uplift
persona: saas-operations-judge
updated_at: "2026-03-17"

purpose: >
  Design and validate multi-tenant performance and scaling strategies
  for compute, database, storage, and networking.

inputs:
  - tenant_workload_profiles: "Expected workload per tier (requests/sec, storage, compute)"
  - scaling_infrastructure: "ACA, AKS, App Service, or custom"
  - database_topology: "Shared pool, dedicated, or hybrid"
  - slo_targets: "Latency, throughput, availability per tier"

outputs:
  - compute_scaling_design: "Auto-scaling rules per tenant tier"
  - database_scaling_design: "Connection pool, read replicas, sharding strategy"
  - storage_scaling_design: "Tier selection, auto-tiering, lifecycle management"
  - cdn_design: "Multi-tenant CDN configuration"
  - load_test_plan: "Multi-tenant load test scenarios and acceptance criteria"

guardrails:
  - "Scaling must be tested, not assumed from documentation"
  - "Per-tenant performance must be predictable under shared infrastructure"
  - "Scale-up and scale-down must both be validated"
  - "Cost efficiency must be considered alongside performance"

benchmark_source: "Azure Multitenancy Checklist - Performance Efficiency"
