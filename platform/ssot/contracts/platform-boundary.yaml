# platform-boundary.yaml — platform repo ownership contract
# SSOT: defines what the platform/ directory owns and does not own.
# Referenced by: tests/contract/test_platform_boundary.py

owns:
  - control-plane
  - admin-console
  - ops-portal
  - shared-apis
  - identity-bridge
  - shared-sdk
  - cross-plane-contracts

does_not_own:
  - agent-runtime
  - agent-definitions
  - odoo-runtime
  - lakehouse
  - public-web

decision_rule: "shared control-plane or operator-facing product surface"

