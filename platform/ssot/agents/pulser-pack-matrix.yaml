# =============================================================================
# Pulser Pack Matrix — SSOT
# =============================================================================
# Authority: canonical personas / tasks / judges / tools / surfaces per
#            Pulser pack. Machine-readable source for runtime pack
#            selection and policy enforcement.
# Related:   platform/ssot/agents/pulser-context-awareness.yaml
#            platform/ssot/agents/pulser-domain-packs.yaml
#            platform/ssot/agents/surface-bindings.yaml
#            platform/ssot/agents/pulser-hook-lifecycle.yaml
# =============================================================================

schema_version: "1.0"
last_updated: "2026-04-19"
owner: "platform-architecture"
status: canonical

doctrine: >
  One Pulser Core + shared role packs + domain packs + judge packs.
  Google production disciplines (models/tools/orchestration/memory/
  evaluation/productionization) + VS Code hook lifecycle + context-
  resolved routing. Split only when ontology, tools, risk, eval
  contract, tenant isolation, or latency profile diverge.

# -----------------------------------------------------------------------------
# Pack matrix — core + shared role packs + domain packs
# -----------------------------------------------------------------------------
pulser_pack_matrix:

  # --- Core (centralized, non-optional) --------------------------------------

  pulser_core:
    tier: core
    personas: []
    tasks:
      - resolve_context
      - route_request
      - enforce_policy
      - audit_event
    judges:
      - policy_judge
    tools:
      - context_resolver
      - policy_engine
      - audit_log
    surfaces: [all]
    placement:
      runtime: agent-platform/src/agent_platform/
      bindings: platform/ssot/agents/

  # --- Shared role packs (reusable, agency-agents taxonomy influence) --------

  strategy_pack:
    tier: shared
    personas: [platform_strategist, solution_advisor]
    tasks: [explain_capabilities, draft_solution_narrative, compare_options]
    judges: [grounding_judge, brand_judge]
    tools: [docs_retrieval, platform_metadata_read]
    surfaces: [www.insightpulseai.com]
    placement: agents/shared/strategy/

  product_pack:
    tier: shared
    personas: [product_architect]
    tasks: [describe_capability, draft_roadmap_narrative, summarize_release_notes]
    judges: [grounding_judge, brand_judge]
    tools: [docs_retrieval, platform_metadata_read]
    surfaces: [www.insightpulseai.com]
    placement: agents/shared/product/

  engineering_pack:
    tier: shared
    personas: [engineering_explainer]
    tasks: [explain_architecture, generate_integration_snippet, summarize_technical_doc]
    judges: [grounding_judge, policy_judge]
    tools: [docs_retrieval, code_sample_retrieval]
    surfaces: [www.insightpulseai.com]
    placement: agents/shared/engineering/

  marketing_pack:
    tier: shared
    personas: [content_writer, creative_briefing_assistant]
    tasks: [draft_landing_copy, restyle_marketing_page, produce_case_study_outline]
    judges: [brand_judge, safe_public_response_judge]
    tools: [storage_blobs, notifications]
    surfaces: [www.w9studio.net, www.insightpulseai.com]
    placement: agents/shared/marketing/

  sales_pack:
    tier: shared
    personas: [studio_sales_assistant, solution_qualifier]
    tasks: [qualify_lead, answer_package_pricing_questions, draft_followup]
    judges: [brand_judge, customer_value_judge, safe_public_response_judge]
    tools: [crm_read_write_guarded, notifications]
    surfaces: [www.w9studio.net]
    placement: agents/shared/sales/

  support_pack:
    tier: shared
    personas: [support_concierge, client_support_agent]
    tasks: [route_request, summarize_ticket_state, draft_response]
    judges: [grounding_judge, brand_judge]
    tools: [docs_retrieval, crm_read, notifications]
    surfaces: [all]
    placement: agents/shared/support/

  project_management_pack:
    tier: shared
    personas: [booking_coordinator, project_ops_coordinator]
    tasks: [collect_booking_requirements, summarize_project_state, draft_status_update]
    judges: [brand_judge, policy_judge]
    tools: [scheduling_optional, crm_read_write_guarded]
    surfaces: [www.w9studio.net, erp.insightpulseai.com]
    placement: agents/shared/project_management/

  # --- Domain packs (IPAI-owned, authored locally) ---------------------------

  pulser_platform:
    tier: domain
    personas: [platform_strategist, product_architect, support_concierge]
    tasks:
      - explain_platform_capabilities
      - route_user_to_workspace
      - summarize_platform_state
      - draft_solution_response
    judges: [grounding_judge, platform_policy_judge, brand_judge]
    tools: [docs_retrieval, platform_metadata_read]
    surfaces: [www.insightpulseai.com]
    placement: agents/domain/platform/

  pulser_web:
    tier: domain
    personas: [content_writer, studio_creative]
    tasks: [draft_landing_copy, restyle_marketing_page, produce_case_study_outline]
    judges: [brand_judge, tbwa_fit_judge, safety_judge]
    tools: [storage_blobs, notifications]
    blocked_defaults: [any_erp_write_path]
    surfaces: [www.insightpulseai.com]
    placement: agents/domain/web/

  pulser_w9studio:
    tier: domain
    personas:
      - studio_sales_assistant
      - booking_coordinator
      - client_support_agent
      - creative_briefing_assistant
    tasks:
      - qualify_lead
      - answer_booking_questions
      - draft_followup
      - summarize_client_request
      - collect_booking_requirements
    judges: [brand_judge, customer_value_judge, safe_public_response_judge]
    tools: [crm_read_write_guarded, notifications, scheduling_optional]
    blocked_defaults: [finance_posting, identity_admin, deep_erp_mutation]
    surfaces: [www.w9studio.net]
    placement: agents/domain/w9studio/

  pulser_prismalab_research:
    tier: domain
    personas:
      - research_screener
      - evidence_extractor
      - synthesis_assistant
      - methods_reviewer
    tasks:
      - classify_document
      - extract_evidence
      - compare_studies
      - generate_cited_summary
    judges: [grounding_judge, citation_judge, evidence_quality_judge, research_policy_judge]
    tools: [doc_ingest, retrieval, extraction, citation_export]
    blocked_defaults: [unsupported_claim_generation, uncited_synthesis_for_high_stakes_outputs]
    surfaces: [prismalab.insightpulseai.com]
    placement: agents/domain/prismalab/research/

  pulser_prismalab_screening:
    tier: domain
    personas: [research_screener]
    tasks: [apply_inclusion_criteria, flag_exclusions, triage_for_extraction]
    judges: [grounding_judge, research_policy_judge]
    tools: [retrieval, extraction]
    surfaces: [prismalab.insightpulseai.com]
    placement: agents/domain/prismalab/screening/

  pulser_prismalab_extraction:
    tier: domain
    personas: [evidence_extractor]
    tasks: [extract_pico, extract_outcome_measures, structured_evidence_capture]
    judges: [grounding_judge, citation_judge, evidence_quality_judge]
    tools: [doc_ingest, extraction]
    surfaces: [prismalab.insightpulseai.com]
    placement: agents/domain/prismalab/extraction/

  pulser_prismalab_synthesis:
    tier: domain
    personas: [synthesis_assistant, methods_reviewer]
    tasks: [generate_cited_summary, prisma_report_generation, meta_analysis_prep]
    judges: [grounding_judge, citation_judge, evidence_quality_judge, research_policy_judge]
    tools: [retrieval, citation_export]
    surfaces: [prismalab.insightpulseai.com]
    placement: agents/domain/prismalab/synthesis/

  pulser_erp:
    tier: domain
    personas: [erp_operator, project_ops_coordinator]
    tasks:
      - inspect_object_state
      - summarize_order_or_project
      - prepare_safe_action
      - navigate_branch_data
      - route_approval
    judges: [erp_mutation_guard_judge, branch_context_judge, policy_judge]
    tools: [odoo_read, guarded_odoo_write]
    blocked_defaults: [public_access, uncontrolled_mutations]
    surfaces: [erp.insightpulseai.com]
    placement: agents/domain/erp/

  pulser_finance:
    tier: domain
    personas: [finance_ops_assistant, invoice_analyst, reconciliation_assistant]
    tasks:
      - summarize_receivables
      - summarize_payables
      - explain_invoice
      - stage_reconciliation
      - vat_filing_prep
    judges: [finance_correctness_judge, policy_judge, grounding_judge]
    tools: [accounting_read, payment_read, guarded_finance_actions]
    blocked_defaults: [post_payment_without_approval, alter_journal, force_close_period]
    surfaces: [erp.insightpulseai.com, www.insightpulseai.com]
    placement: agents/domain/finance/

  pulser_identity_ops:
    tier: domain
    personas: [identity_operator, guest_onboarding_advisor]
    tasks: [list_guest_users, propose_role_reduction, draft_ca_policy_change]
    judges: [privileged_action_judge, pim_eligibility_judge, grounding_judge]
    tools: [entra_read, guarded_entra_write]
    blocked_defaults: [create_user, assign_role, modify_ca_policy]
    tool_policy_rule: privileged_tools_require_dual_control_and_pim_active
    surfaces: [www.insightpulseai.com]
    placement: agents/domain/identity_ops/

# -----------------------------------------------------------------------------
# Runtime default-selection algorithm
# -----------------------------------------------------------------------------
runtime_default_selection:
  resolution_order:
    - 1_surface               # erp.insightpulseai.com / prismalab / w9studio / insightpulseai
    - 2_actor_role            # from context envelope actor.role_assignments
    - 3_domain                # from context envelope domain.domain_code
    - 4_contact_object_context  # partner_id / object_type + object_ids
    - 5_environment           # dev / staging / prod
    - 6_explicit_user_override

  worked_example_prismalab_specialist:
    inputs:
      surface: prismalab.insightpulseai.com
      object_type: paper_set
      actor_role: specialist_reviewer
      environment: prod
    derived_binding:
      pack: pulser_prismalab_research
      task: extract_evidence | generate_cited_summary
      judges: [grounding_judge, citation_judge, evidence_quality_judge]
      user_selection_required: false

# -----------------------------------------------------------------------------
# Google-style production disciplines (mandatory per pack)
# -----------------------------------------------------------------------------
production_disciplines:
  every_pack_must_declare:
    tools:
      - allowed
      - blocked
      - human_approval_requirements
      - environment_restrictions
    memory:
      - session_memory
      - long_term_memory_by_object_contact_tenant
      - compaction_aware_export_handoff
    evaluation:
      - golden_scenarios
      - judge_configs
      - threshold_policies
      - failure_escalation_paths
    production:
      - deployment_surfaces
      - scaling_class
      - logging_requirements
      - audit_requirements
      - safe_defaults

# -----------------------------------------------------------------------------
# Non-goals
# -----------------------------------------------------------------------------
non_goals:
  - not encoding permissions into persona text (role + policy_engine own authority)
  - not duplicating persona content across packs (shared/ cross-references)
  - not inlining tool code (lives in agent-platform/src/agent_platform/tools/)

# -----------------------------------------------------------------------------
# Anchors
# -----------------------------------------------------------------------------
anchors:
  context_awareness: platform/ssot/agents/pulser-context-awareness.yaml
  domain_packs: platform/ssot/agents/pulser-domain-packs.yaml
  surface_bindings: platform/ssot/agents/surface-bindings.yaml
  hook_lifecycle: platform/ssot/agents/pulser-hook-lifecycle.yaml
  agent_framework: ssot/agent-platform/agent_framework_adoption.yaml
  architecture_doc: docs/architecture/pulser-context-awareness.md
