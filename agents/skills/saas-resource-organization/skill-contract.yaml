id: saas-resource-organization
version: 1
status: active
classification: encoded_preference
persona: saas-platform-architect
updated_at: "2026-03-17"

purpose: >
  Design subscription, resource group, naming, and tagging strategies
  for multi-tenant SaaS platforms on Azure.

inputs:
  - tenant_count_estimate: "Expected number of tenants"
  - isolation_tier: "Shared pool, dedicated, or hybrid"
  - compliance_requirements: "Data residency, regulatory constraints"
  - cost_attribution_needs: "Per-tenant billing, shared infrastructure"

outputs:
  - subscription_topology: "Subscription layout diagram or description"
  - resource_group_structure: "RG naming and grouping strategy"
  - naming_convention: "Resource naming pattern with tenant identifiers"
  - tagging_policy: "Required tags and enforcement rules"
  - rbac_scoping: "RBAC assignments at each scope level"

guardrails:
  - "Naming convention must include tenant identifier"
  - "Tags must support cost attribution per tenant"
  - "RBAC must follow least-privilege at each scope"
  - "Subscription limits must be validated against tenant count"

benchmark_source: "Azure SaaS Well-Architected - Resource Organization"
