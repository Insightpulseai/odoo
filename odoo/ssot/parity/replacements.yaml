# EE Feature Parity Replacement Registry (SSOT)
#
# Maps Odoo Enterprise Edition features to Community Edition replacements
# via CE modules + OCA modules + ipai_* custom modules + automation bridges
#
# STATUS: ✅ Active | LAST_UPDATED: 2026-03-05
# ENFORCEMENT: Automated via .github/workflows/ee-parity-automation.yml
#
# RULES:
# - This file is read-only SSOT (edit here, never in workflows)
# - All parity claims must be backed by evidence in docs/ee-parity/evidence/
# - Target parity >= 80% for production readiness
# - Each feature tracks: status, parity %, implementation, gaps

---
meta:
  repo: Insightpulseai/odoo
  odoo_version: "19.0"
  parity_target: 80  # Minimum percentage for production
  last_assessed: "2026-03-05"
  assessment_frequency: "weekly"

features:
  # ============================================================================
  # Studio - Low-code app builder
  # ============================================================================
  - name: studio
    ee_feature: "Odoo Studio"
    ee_description: "Drag-and-drop UI builder for custom apps"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"  # draft | partial | production | deprecated
    parity_percent: 70
    target_parity: 85

    replacements:
      # Primary replacement (weighted 70%)
      - type: automation
        name: "n8n Field Builder"
        path: "automations/n8n/workflows/studio-field-builder.json"
        coverage: 70
        notes: "Dynamic field creation via n8n → Odoo API"
        gaps:
          - "No drag-and-drop UI (API-based only)"
          - "No visual workflow designer"
          - "No automated reports builder"

      # Secondary replacement (weighted 30%)
      - type: ipai_module
        name: "ipai_dynamic_forms"
        path: "addons/ipai/ipai_dynamic_forms"
        coverage: 30
        notes: "JSON schema-driven form builder"
        gaps:
          - "Requires technical knowledge (JSON schemas)"
          - "No visual designer"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/studio/README.md"
      - type: test_results
        path: "docs/ee-parity/evidence/studio/test-report-20260305.md"
      - type: user_feedback
        path: "docs/ee-parity/evidence/studio/user-survey-Q1-2026.md"

    next_milestones:
      - action: "Build visual field drag-and-drop UI"
        target_date: "2026-Q2"
        parity_impact: "+10%"
      - action: "Add automated report builder"
        target_date: "2026-Q3"
        parity_impact: "+5%"

  # ============================================================================
  # Approvals - Multi-level approval workflows
  # ============================================================================
  - name: approvals
    ee_feature: "Approvals"
    ee_description: "Multi-level approval workflows for expenses, POs, time off"
    ee_price_tier: "Enterprise ($$$)"

    status: "production"
    parity_percent: 95
    target_parity: 95

    replacements:
      # Primary replacement (100% coverage)
      - type: automation
        name: "n8n Multi-Level Approval Router"
        path: "automations/n8n/workflows/approval-multi-level.json"
        coverage: 95
        notes: "Complete approval workflow with parallel/sequential routing"
        gaps:
          - "No built-in mobile app notifications (uses Slack/email)"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/approvals/README.md"
      - type: production_usage
        path: "docs/ee-parity/evidence/approvals/production-metrics-2026-01.md"
        metrics:
          total_approvals_processed: 1247
          average_approval_time_hours: 4.2
          user_satisfaction: 4.5/5

    next_milestones:
      - action: "Add mobile push notifications"
        target_date: "2026-Q2"
        parity_impact: "+5%"

  # ============================================================================
  # Marketing Automation - Email campaigns, drip sequences
  # ============================================================================
  - name: marketing_automation
    ee_feature: "Marketing Automation"
    ee_description: "Email campaigns, lead nurturing, A/B testing"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"
    parity_percent: 85
    target_parity: 90

    replacements:
      - type: automation
        name: "n8n Email Drip Campaigns"
        path: "automations/n8n/workflows/marketing-drip-campaigns.json"
        coverage: 60
        notes: "Multi-step email sequences with triggers"

      - type: oca_module
        name: "marketing_campaign"
        oca_repo: "marketing"
        version: "19.0"
        coverage: 25
        notes: "Campaign tracking and analytics"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/marketing/README.md"

    gaps:
      - "No A/B testing (planned Q2 2026)"
      - "Limited SMS support"
      - "No visual campaign builder"

  # ============================================================================
  # Spreadsheet Dashboards - Interactive BI dashboards
  # ============================================================================
  - name: spreadsheet_dashboards
    ee_feature: "Spreadsheet & Dashboards"
    ee_description: "Interactive BI dashboards with pivot tables and charts"
    ee_price_tier: "Enterprise ($$$)"

    status: "production"
    parity_percent: 85
    target_parity: 90

    replacements:
      - type: external_service
        name: "Apache Superset"
        url: "http://localhost:8088"
        coverage: 70
        notes: "Full BI platform with 40+ visualizations"
        integration: "Supabase PostgreSQL (read replica)"

      - type: automation
        name: "Superset Dashboard Sync"
        path: "automations/n8n/workflows/superset-dashboard-sync.json"
        coverage: 15
        notes: "Auto-generate dashboards from Odoo data"

    evidence:
      - type: production_usage
        path: "docs/ee-parity/evidence/dashboards/superset-adoption-2026-Q1.md"
        metrics:
          active_dashboards: 23
          monthly_queries: 4521
          user_count: 12

  # ============================================================================
  # Documents (DMS) - Document management system
  # ============================================================================
  - name: documents_dms
    ee_feature: "Documents"
    ee_description: "Enterprise document management with OCR and workflow automation"
    ee_price_tier: "Enterprise ($$$)"

    status: "production"
    parity_percent: 80
    target_parity: 85

    replacements:
      - type: external_service
        name: "Supabase Storage"
        url: "https://spdtwktxdalcfigzeqrz.supabase.co/storage/v1"
        coverage: 60
        notes: "S3-compatible object storage with CDN"

      - type: ipai_module
        name: "ipai_ocr_paddleocr"
        path: "addons/ipai/ipai_ocr_paddleocr"
        coverage: 20
        notes: "OCR processing with PaddleOCR-VL"

    evidence:
      - type: production_usage
        path: "docs/ee-parity/evidence/documents/storage-metrics-2026-Q1.md"
        metrics:
          total_documents: 3421
          total_storage_gb: 127.3
          ocr_processed: 892

  # ============================================================================
  # Knowledge Base - Internal wiki and documentation
  # ============================================================================
  - name: knowledge_base
    ee_feature: "Knowledge"
    ee_description: "Internal wiki with search and collaboration"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"
    parity_percent: 75
    target_parity: 80

    replacements:
      - type: oca_module
        name: "knowledge"
        oca_repo: "knowledge"
        version: "19.0"
        coverage: 50
        notes: "Basic wiki functionality"

      - type: automation
        name: "pgvector Search Enhancement"
        path: "supabase/functions/knowledge-search/index.ts"
        coverage: 25
        notes: "AI-powered search with embeddings"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/knowledge/README.md"

    gaps:
      - "No collaborative editing (planned Q3 2026)"
      - "Limited multimedia support"

  # ============================================================================
  # Digital Sign - Electronic signature workflows
  # ============================================================================
  - name: digital_sign
    ee_feature: "Sign"
    ee_description: "Electronic signature requests and tracking"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"
    parity_percent: 70
    target_parity: 80

    replacements:
      - type: external_service
        name: "DocuSign API Integration"
        coverage: 70
        notes: "Full e-signature workflow via DocuSign API"
        requires_setup: true
        setup_docs: "docs/integrations/DOCUSIGN_SETUP.md"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/sign/README.md"

    gaps:
      - "Requires external DocuSign subscription"
      - "No built-in signing UI"

  # ============================================================================
  # Helpdesk SLA - Customer support with SLA tracking
  # ============================================================================
  - name: helpdesk_sla
    ee_feature: "Helpdesk"
    ee_description: "Customer support tickets with SLA tracking"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"
    parity_percent: 60
    target_parity: 75

    replacements:
      - type: oca_module
        name: "helpdesk_mgmt"
        oca_repo: "helpdesk"
        version: "19.0"
        coverage: 50
        notes: "Basic ticketing system"

      - type: automation
        name: "SLA Alert Monitor"
        path: "automations/n8n/workflows/helpdesk-sla-alerts.json"
        coverage: 10
        notes: "SLA breach notifications"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/helpdesk/README.md"

    gaps:
      - "No built-in SLA policies (custom workflow only)"
      - "Limited customer portal"
      - "No live chat widget"

  # ============================================================================
  # Field Service - Mobile workforce management
  # ============================================================================
  - name: field_service
    ee_feature: "Field Service"
    ee_description: "Mobile workforce management with scheduling"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"
    parity_percent: 55
    target_parity: 70

    replacements:
      - type: oca_module
        name: "fieldservice"
        oca_repo: "field-service"
        version: "19.0"
        coverage: 55
        notes: "Basic field service management"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/field-service/README.md"

    gaps:
      - "No mobile app"
      - "Limited GPS tracking"
      - "Basic scheduling only"

  # ============================================================================
  # Planning - Resource planning and scheduling
  # ============================================================================
  - name: planning
    ee_feature: "Planning"
    ee_description: "Resource planning with Gantt charts"
    ee_price_tier: "Enterprise ($$$)"

    status: "partial"
    parity_percent: 50
    target_parity: 70

    replacements:
      - type: oca_module
        name: "project_timeline"
        oca_repo: "project"
        version: "19.0"
        coverage: 50
        notes: "Basic timeline view"

    evidence:
      - type: documentation
        path: "docs/ee-parity/evidence/planning/README.md"

    gaps:
      - "No drag-and-drop scheduling"
      - "Limited resource optimization"
      - "No capacity planning"

# ============================================================================
# Summary Statistics
# ============================================================================
summary:
  total_features: 10
  production_ready: 3  # approvals, dashboards, documents
  partial_implementation: 7
  average_parity: 72.5
  target_average: 80.0
  gap_to_target: 7.5

  prioritization:
    high_priority:
      - studio  # Most requested, high value
      - helpdesk_sla  # Critical for support operations
      - planning  # Essential for project management
    medium_priority:
      - marketing_automation  # Nice to have
      - field_service  # Limited use case
    low_priority:
      - digital_sign  # Low volume, external service acceptable

# ============================================================================
# Validation Rules
# ============================================================================
validation:
  rules:
    - name: "Evidence Required"
      description: "All parity claims must have documentation evidence"
      enforcement: "CI workflow validates evidence paths exist"

    - name: "Parity Realism"
      description: "No feature can claim >95% parity (always gaps vs EE)"
      enforcement: "CI fails if any feature > 95%"

    - name: "Status Consistency"
      description: "Production status requires >= 80% parity"
      enforcement: "CI fails if production but parity < 80%"

    - name: "Gap Documentation"
      description: "All features must list known gaps"
      enforcement: "CI warns if gaps array is empty"
